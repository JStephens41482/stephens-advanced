function generateQuestion(){const l=Math.min(state.level,10),pool=levelPool[l],gn=pool[randInt(0,pool.length-1)],q=qg[gn](l),isD=q.isDecimal||false,w=makeWrongAnswers(q.answer,3,!isD),opts=shuffle([q.answer,...w]);return{text:q.text,answer:q.answer,options:opts.map(o=>isD?parseFloat(o.toFixed(2)):o),topic:q.topic,isDecimal:isD}}
const $=id=>document.getElementById(id);
function showScreen(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));$(id).classList.add('active')}
function updateHUD(){$('healthFill').style.width=`${(state.health/state.maxHealth)*100}%`;$('hudLevel').textContent=`LV ${state.level}`;$('hudStreak').textContent=`🔥${state.streak}`;$('hudScore').textContent=state.score;const d=state.monsterDistance;$('distanceFill').style.width=`${d}%`;$('distanceLabel').textContent=d<30?'far away':d<60?'approaching...':d<80?'CLOSE':'!! DANGER !!'}
function showFeedback(t,type){const fb=$('feedback');fb.textContent=t;fb.className=`feedback show ${type}-fb`;setTimeout(()=>fb.classList.remove('show'),1500)}
function flashScreen(){const f=$('screenFlash');f.className='screen-flash hit';setTimeout(()=>f.className='screen-flash',400)}
function spawnMonster(){const m=monsters[randInt(0,monsters.length-1)];$('monster').textContent=m.emoji;$('monsterName').textContent=m.name;state.monsterHP=m.hp+Math.floor(state.level/2);state.monsterMaxHP=state.monsterHP;state.monsterDistance=10;$('monster').className='monster'}
function showLevelUp(){const o=$('levelUpOverlay'),desc={1:'WARMUP: Multiply & Divide',2:'WARMUP: Integers',3:'TEKS 7.3A: Rational Numbers',4:'TEKS 7.3A/7.12A: Fractions & Order of Ops',5:'TEKS 7.4: Proportions & Percent',6:'TEKS 7.4D/7.11A: Percent Change & Equations',7:'TEKS 7.11B/C: Two-Step Equations',8:'TEKS 7.9B/7.10A: Geometry & Angles',9:'TEKS 7.6/7.13A: Probability & Money',10:'TEKS 7.13: Financial Literacy Boss Round'};$('levelUpText').textContent=`LEVEL ${state.level}`;$('levelUpSub').textContent=desc[Math.min(state.level,10)]||'';o.classList.add('show');setTimeout(()=>o.classList.remove('show'),2500)}
function startTimer(){clearInterval(state.timerInterval);state.timerLeft=state.timerMax;const f=$('timerFill');f.style.width='100%';f.className='timer-fill';const tick=100;state.timerInterval=setInterval(()=>{state.timerLeft-=tick;const p=(state.timerLeft/state.timerMax)*100;f.style.width=`${p}%`;if(p<20)f.className='timer-fill critical';else if(p<40)f.className='timer-fill urgent';else f.className='timer-fill';if(state.timerLeft%1000===0){state.monsterDistance=Math.min(100,state.monsterDistance+3);updateHUD()}if(state.timerLeft<=0){clearInterval(state.timerInterval);handleTimeout()}},tick)}
function handleTimeout(){if(state.answered)return;state.answered=true;state.wrongStreak++;takeDamage(20);showFeedback(`TIME'S UP! Answer: ${state.currentQuestion.answer}`,'wrong');state.streak=0;state.monsterDistance=Math.min(100,state.monsterDistance+15);if(state.monsterDistance>=70&&state.wrongStreak>=2){state.wrongStreak=0;triggerJumpscare()}updateHUD();setTimeout(nextQuestion,1800)}
function takeDamage(a){state.health=Math.max(0,state.health-a);flashScreen();$('monster').className='monster attacking';setTimeout(()=>$('monster').className='monster',300);updateHUD();if(state.health<=0){clearInterval(state.timerInterval);gameOver()}}
function heal(a){state.health=Math.min(state.maxHealth,state.health+a);updateHUD()}
function startGame(){state.health=100;state.score=0;state.streak=0;state.bestStreak=0;state.level=1;state.questionsAnswered=0;state.correctAnswers=0;state.monsterDistance=10;state.monstersDefeated=0;state.timerMax=15000;state.wrongStreak=0;state.levelCorrect=0;showScreen('game-screen');spawnMonster();nextQuestion()}
function nextQuestion(){state.answered=false;state.currentQuestion=generateQuestion();$('topicLabel').textContent=state.currentQuestion.topic;$('questionText').textContent=state.currentQuestion.text;const g=$('answersGrid');g.innerHTML='';state.currentQuestion.options.forEach(opt=>{const btn=document.createElement('button');btn.className='answer-btn';btn.textContent=opt;btn.addEventListener('click',()=>handleAnswer(opt,btn));g.appendChild(btn)});startTimer()}
function handleAnswer(chosen,btn){if(state.answered)return;state.answered=true;clearInterval(state.timerInterval);state.questionsAnswered++;const correct=state.currentQuestion.isDecimal?Math.abs(chosen-state.currentQuestion.answer)<0.01:chosen===state.currentQuestion.answer;if(correct){btn.classList.add('correct');state.correctAnswers++;state.streak++;state.wrongStreak=0;if(state.streak>state.bestStreak)state.bestStreak=state.streak;const sb=Math.floor(state.timerLeft/1000),stb=state.streak*5,pts=10+sb+stb;state.score+=pts;if(state.streak>=3)heal(5);if(state.streak>=5)heal(10);state.monsterDistance=Math.max(0,state.monsterDistance-12);$('monster').className='monster hurt';setTimeout(()=>$('monster').className='monster',400);state.monsterHP--;if(state.monsterHP<=0){state.monstersDefeated++;showFeedback(`💀 ${$('monsterName').textContent} DESTROYED! +${pts}pts`,'correct');setTimeout(()=>spawnMonster(),500)}else{showFeedback(`HIT! +${pts}pts (🔥${state.streak})`,'correct')}state.levelCorrect++;const th=state.level<=2?3:5;if(state.levelCorrect>=th&&state.level<10){state.level++;state.levelCorrect=0;state.timerMax=Math.max(8000,state.timerMax-500);showLevelUp()}}else{btn.classList.add('wrong');document.querySelectorAll('.answer-btn').forEach(b=>{const v=state.currentQuestion.isDecimal?Math.abs(parseFloat(b.textContent)-state.currentQuestion.answer)<0.01:parseFloat(b.textContent)===state.currentQuestion.answer;if(v)b.classList.add('correct')});state.streak=0;state.wrongStreak++;const st=state.monsterDistance>60?2:3;if(state.wrongStreak>=st){state.wrongStreak=0;triggerJumpscare()}const dmg=state.monsterDistance>70?25:15;takeDamage(dmg);showFeedback(`WRONG! Answer: ${state.currentQuestion.answer}`,'wrong')}updateHUD();if(state.health>0)setTimeout(nextQuestion,1800)}
function gameOver(){showScreen('gameover-screen');const p=state.questionsAnswered>0?Math.round((state.correctAnswers/state.questionsAnswered)*100):0;$('finalStats').innerHTML=`Score: <span>${state.score}</span><br>Level: <span>${state.level}</span><br>Monsters: <span>${state.monstersDefeated}</span><br>Streak: <span>🔥${state.bestStreak}</span><br>Accuracy: <span>${p}%</span> (${state.correctAnswers}/${state.questionsAnswered})`}
const scareMessages=['SOLVE FASTER','I SEE YOU','YOU CAN\'T ESCAPE','MATH OR DEATH','TOO SLOW','I\'M HUNGRY','WRONG AGAIN?','RUN THE NUMBERS','FOCUS','LAST CHANCE'];
const scareFaces=['👹','💀','👻','🧟','😈','👁️','👽','🕷️'];
function playScareSound(){try{const ctx=new(window.AudioContext||window.webkitAudioContext)(),dur=0.8,buf=ctx.createBuffer(1,ctx.sampleRate*dur,ctx.sampleRate),d=buf.getChannelData(0);for(let i=0;i<d.length;i++){const t=i/ctx.sampleRate;d[i]=((Math.random()*2-1)*0.7+Math.sin(t*80*Math.PI*2)*Math.sin(t*3*Math.PI*2)*0.8+Math.sin(t*2000*Math.PI*2)*Math.exp(-t*4)*0.5)*Math.exp(-t*3)*(t<0.01?t/0.01:1)}const s=ctx.createBufferSource();s.buffer=buf;const dist=ctx.createWaveShaper(),c=new Float32Array(256);for(let i=0;i<256;i++){const x=(i*2)/256-1;c[i]=(Math.PI+100)*x/(Math.PI+100*Math.abs(x))}dist.curve=c;const g=ctx.createGain();g.gain.value=0.6;s.connect(dist);dist.connect(g);g.connect(ctx.destination);s.start();setTimeout(()=>ctx.close(),1500)}catch(e){}}
function triggerJumpscare(){const o=$('jumpscareOverlay');$('jumpscareFace').textContent=scareFaces[randInt(0,scareFaces.length-1)];$('jumpscareMsg').textContent=scareMessages[randInt(0,scareMessages.length-1)];o.classList.add('active');playScareSound();if(navigator.vibrate)navigator.vibrate([100,50,200,50,100]);setTimeout(()=>o.classList.remove('active'),1800)}
function initParticles(){const c=$('particles');for(let i=0;i<15;i++){const p=document.createElement('div');p.className='particle';p.style.left=`${Math.random()*100}%`;p.style.animationDuration=`${5+Math.random()*10}s`;p.style.animationDelay=`${Math.random()*5}s`;c.appendChild(p)}}
initParticles();
