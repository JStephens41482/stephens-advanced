async function handleExtPhoto(ev){
  const file=ev.target.files[0];if(!file)return
  const reader=new FileReader()
  reader.onload=async e=>{
    const b64Full=e.target.result
    // resize
    const img=new Image()
    img.onload=async()=>{
      const canvas=document.createElement('canvas')
      const max=800;let w=img.width,h=img.height
      if(w>max||h>max){if(w>h){h=Math.round(h*max/w);w=max}else{w=Math.round(w*max/h);h=max}}
      canvas.width=w;canvas.height=h;canvas.getContext('2d').drawImage(img,0,0,w,h)
      const small=canvas.toDataURL('image/jpeg',0.7)

      // AI identify for both new and existing
      toast('AI reading extinguisher...')
      try{
        const res=await fetch('/api/claude',{method:'POST',headers:{'Content-Type':'application/json'},
          body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:500,
            messages:[{role:'user',content:[
              {type:'image',source:{type:'base64',media_type:'image/jpeg',data:small.split(',')[1]}},
              {type:'text',text:`Identify this fire extinguisher. Return ONLY valid JSON: {"type":"ABC Dry Chemical|CO2|Class K|Water|Halon|Halotron|Class D|Purple K|Clean Agent","size":"e.g. 5lb or 6 Liter","color":"red/silver/yellow/etc","brand":"if visible","mfgDate":"YYYY-MM if visible on label","condition":"pass or fail","notes":"any visible damage, expired tags, missing pin, dented, corroded, or other notable features"}`}
            ]}]
          })
        })
        const data=await res.json()
        const txt=data.content?.[0]?.text||''
        let p;try{p=JSON.parse(txt.replace(/```json|```/g,'').trim())}catch{p={type:'ABC Dry Chemical',size:'',notes:'Could not identify'}}

        if(_snapExtIdx===-2){
          // new extinguisher — add to location
          await SB.from('extinguishers').insert({
            location_id:window._snapExtLocId,type:p.type||'ABC Dry Chemical',
            size:p.size||null,location_in_building:null,manufacture_date:p.mfgDate||null
          })
          await load()
          toast(`Added: ${p.type} ${p.size||''}`)
          pop()
          openExtReport(window._snapExtJobId)
        }else if(_snapExtIdx>=0){
          // existing ext — AI populates fields + saves photo
          const d=_extRptData[_snapExtIdx]
          d.photoB64=small
          if(p.type)d.type=p.type
          if(p.size)d.size=p.size
          if(p.mfgDate)d.mfgDate=p.mfgDate
          if(p.condition)d.condition=p.condition
          if(p.notes)d.notes=(d.notes?d.notes+'; ':'')+p.notes
          // update the DB record too
          if(d.id){
            try{await SB.from('extinguishers').update({type:p.type||d.type,size:p.size||d.size,manufacture_date:p.mfgDate||null}).eq('id',d.id)}catch(e){}
          }
          toast(`Identified: ${p.type} ${p.size||''} — ${p.condition||''}`)
          // refresh the report view
          await load()
          pop()
          openExtReport(window._snapExtJobId||_extRptData[0]?._jobId)
        }
      }catch(err){console.error(err);toast('Could not identify',false)}
    }
    img.src=b64Full
  }
  reader.readAsDataURL(file)
  ev.target.value=''
}

function suppAgentChanged(){
  const agent=$('supp-agent')?.value
  const brandWrap=$('supp-brand-wrap')
  const modelWrap=$('supp-model-wrap')
  const tankWrap=$('supp-tank-wrap')
  const customInput=$('supp-agent-custom')
  const priceNote=$('supp-price-note')

  if(agent==='_custom'){
    if(customInput)customInput.style.display='block'
    if(brandWrap)brandWrap.style.display='none'
    if(modelWrap)modelWrap.style.display='none'
    if(tankWrap)tankWrap.style.display='none'
    if(priceNote)priceNote.style.display='none'
    return
  }
  if(customInput)customInput.style.display='none'
  if(!agent||!SUPP_DATA[agent]){
    if(brandWrap)brandWrap.style.display='none'
    if(modelWrap)modelWrap.style.display='none'
    if(tankWrap)tankWrap.style.display='none'
    if(priceNote)priceNote.style.display='none'
    return
  }

  // show price note for Water+ / CORE
  if(agent==='Water+'){
    if(priceNote){priceNote.style.display='block';priceNote.textContent='Captive-Aire CORE — $650.00 per 6-month test & maintenance'}
  }else{if(priceNote)priceNote.style.display='none'}

  const brands=Object.keys(SUPP_DATA[agent])
  const sel=$('supp-brand')
  sel.innerHTML=`<option value="">-- Select Brand --</option>`+brands.map(b=>`<option value="${b}">${b}</option>`).join('')+`<option value="_custom">+ Add Brand...</option>`
  if(brandWrap)brandWrap.style.display='block'
  if(modelWrap)modelWrap.style.display='none'
  if(tankWrap)tankWrap.style.display='none'

  // auto-select if only one brand
  if(brands.length===1){sel.value=brands[0];suppBrandChanged()}
}

function suppBrandChanged(){
  const agent=$('supp-agent')?.value
  const brand=$('supp-brand')?.value
  const modelWrap=$('supp-model-wrap')
  const tankWrap=$('supp-tank-wrap')

  if(!brand||brand==='_custom'||!agent||!SUPP_DATA[agent]?.[brand]){
    if(modelWrap)modelWrap.style.display='none'

  }

  const brandData=SUPP_DATA[agent][brand]
  const models=Object.keys(brandData.models)
  const sel=$('supp-model')

  if(customM)customM.style.display='none'

  if(modelWrap)modelWrap.style.display='block'
  if(tankWrap)tankWrap.style.display='none'

function suppModelChanged(){
  const agent=$('supp-agent')?.value
  const brand=$('supp-brand')?.value
  const model=$('supp-model')?.value
  const tankWrap=$('supp-tank-wrap')

function showJobList(filter){
  const t=new Date().toISOString().split('T')[0]
  let jobs=[]
  let title=''
  if(filter==='today'){jobs=D.jobs.filter(j=>j.scheduled_date===t);title='Today\'s Jobs'}
  else if(filter==='overdue'){jobs=D.jobs.filter(j=>j.status==='scheduled'&&j.scheduled_date<t);title='Overdue Jobs'}
  else if(filter==='estimated'){jobs=D.jobs.filter(j=>j.scheduled_date===t);title='Today\'s Estimated Revenue'}
  let h=`<div class="ov-hdr"><button class="ov-back" onclick="pop()">‹</button><div class="ov-title">${title}</div></div><div class="ov-body">`
  if(!jobs.length)h+=`<div class="ey"><div class="ey-i">📋</div><div class="ey-t">No jobs here.</div></div>`
  else jobs.forEach(j=>h+=jCard(j,filter==='overdue'))
  h+=`</div>`
  push(h)
}

// ═══ MONEY FILTER ═══
function filterInvs(filter){
  const now=new Date()
  const monthStart=new Date(now.getFullYear(),now.getMonth(),1).toISOString().split('T')[0]
  const monthEnd=new Date(now.getFullYear(),now.getMonth()+1,0).toISOString().split('T')[0]
  let invs=[]
  let title=''
  if(filter==='paid'){
    invs=D.invs.filter(i=>i.status==='paid'&&i.date>=monthStart&&i.date<=monthEnd)
    title='Collected This Month'
  }else{
    invs=D.invs.filter(i=>!['paid','void','record','factored'].includes(i.status))
    title='Outstanding Invoices'
  }
  const total=invs.reduce((s,i)=>s+(+i.total),0)
  let h=`<div class="ov-hdr"><button class="ov-back" onclick="pop()">‹</button><div class="ov-title">${title}</div></div><div class="ov-body">`
  h+=`<div style="background:var(--c1);border:1px solid var(--b1);border-radius:var(--r);padding:14px;margin-bottom:16px;text-align:center"><div style="font-size:28px;font-weight:900;color:${filter==='paid'?'var(--ok)':'var(--bad)'}">${fmt(total)}</div><div style="font-size:11px;color:var(--g1);margin-top:4px">${invs.length} invoice${invs.length!==1?'s':''}</div></div>`
  if(!invs.length)h+=`<div class="ey"><div class="ey-i">💰</div><div class="ey-t">No invoices here.</div></div>`
  else h+=iHtml(invs)
  h+=`</div>`
  push(h)
}

let rptSigCtx={}
function initRptSig(key,canvasId,phId){
  const c=$(canvasId);if(!c)return
  const r=c.parentElement.getBoundingClientRect();c.width=r.width;c.height=r.height
  const ctx=c.getContext('2d');ctx.strokeStyle='#222';ctx.lineWidth=2.5;ctx.lineCap='round';ctx.lineJoin='round'
  rptSigCtx[key]=ctx
  let on=false
  const sp=e=>{e.preventDefault();on=true;if($(phId))$(phId).style.display='none';const p=gpC(e,c);ctx.beginPath();ctx.moveTo(p.x,p.y)}
  const sm=e=>{if(!on)return;e.preventDefault();const p=gpC(e,c);ctx.lineTo(p.x,p.y);ctx.stroke()}
  const se=()=>{on=false}
  c.addEventListener('touchstart',sp,{passive:false});c.addEventListener('touchmove',sm,{passive:false});c.addEventListener('touchend',se)
  c.addEventListener('mousedown',sp);c.addEventListener('mousemove',sm);c.addEventListener('mouseup',se)
}

function gpC(e,c){const r=c.getBoundingClientRect(),t=e.touches?e.touches[0]:e;return{x:t.clientX-r.left,y:t.clientY-r.top}}

function clrRptSig(key){
  const canvasId=key==='tech'?'rptTechSig':'rptOwnerSig'
  const phId=key==='tech'?'rptTechSigPh':'rptOwnerSigPh'
  const c=$(canvasId)
  if(c&&rptSigCtx[key])rptSigCtx[key].clearRect(0,0,c.width,c.height)
  if($(phId))$(phId).style.display=''
}

let _applianceImages=[]
async function handleAppliancePhotos(ev){
  const files=Array.from(ev.target.files);if(!files.length)return
  const wrap=$('appliance-photos');if(wrap)wrap.innerHTML=''
  _applianceImages=[]
  const st=$('appliance-ai-status');if(st)st.style.display='block'

  for(const file of files.slice(0,3)){
    const reader=new FileReader()
    const b64=await new Promise(r=>{reader.onload=e=>r(e.target.result);reader.readAsDataURL(file)})
    if(wrap){
      const img=document.createElement('img')
      img.src=b64;img.style.cssText='width:80px;height:60px;object-fit:cover;border-radius:6px;border:1px solid var(--b1)'
      wrap.appendChild(img)
    }
    // resize for AI
    const imgEl=new Image()
    const resized=await new Promise(r=>{
      imgEl.onload=()=>{
        const canvas=document.createElement('canvas')
        const max=1200;let w=imgEl.width,h=imgEl.height
        if(w>max||h>max){if(w>h){h=Math.round(h*max/w);w=max}else{w=Math.round(w*max/h);h=max}}
        canvas.width=w;canvas.height=h;canvas.getContext('2d').drawImage(imgEl,0,0,w,h)
        r(canvas.toDataURL('image/jpeg',0.8).split(',')[1])
      };imgEl.src=b64
    })
    _applianceImages.push(resized)
  }
  $('applianceInput').value=''
  // send to AI
  try{
    const content=_applianceImages.map(b=>({type:'image',source:{type:'base64',media_type:'image/jpeg',data:b}}))
    content.push({type:'text',text:'You are looking at commercial cooking appliances in a kitchen. List every appliance you see from LEFT to RIGHT, one per line. Include type (fryer, grill, range, oven, broiler, steamer, etc.) and any visible brand names. Be specific. Return ONLY the list, no other text.'})
    const res=await fetch('/api/claude',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:1000,messages:[{role:'user',content}]})
    })
    const data=await res.json()
    const txt=data.content?.[0]?.text||''
    const ta=$('rpt-appliances')
    if(ta){ta.value=ta.value?(ta.value+'\n'+txt):txt}
    toast('Appliances identified')
  }catch(e){console.error('appliance AI:',e);toast('Could not read photos',false)}
  if(st)st.style.display='none'
}

      const{data:allRpts}=await SB.from('reports').select('id,report_data').eq('job_id',jobId).eq('report_type','kitchen_suppression')
      const existing=(allRpts||[]).find(r=>r.report_data?.sysId===sysId)
      if(existing){
        await SB.from('reports').update({report_data:{...data,sysId}}).eq('id',existing.id)
      }else{
        await SB.from('reports').insert({job_id:jobId,location_id:locId,report_type:'kitchen_suppression',report_data:{...data,sysId}})
      }
    }else{
      await SB.from('reports').insert({job_id:jobId,location_id:locId,report_type:'kitchen_suppression',report_data:data})

function calcCaNet(i){
  const c=window._caCyls[i]
  const t=parseFloat(c.tare||0),g=parseFloat(c.gross||0)
  const net=g>0&&t>0?+(g-t).toFixed(1):null
  c.actual=net!==null?net:''
  const el=$('ca-net-'+i)
  if(el){el.textContent=net!==null?net+' lb':'—';el.style.color=net!==null&&net>0?'var(--ok)':'var(--warn)'}
}

function addCaCylRow(){
  const i=window._caCyls.length

function toggleCaCylOk(i){

  b.style.borderColor=c.ok==='yes'?'var(--ok)':'var(--b1)'
  b.style.background=c.ok==='yes'?'var(--oks)':'var(--c2)'
  b.style.color=c.ok==='yes'?'var(--ok)':'var(--g2)'
}

function setCaCheck(i,val){
  window._caCheckState[i]=window._caCheckState[i]===val?'':val
  const y=$('ca-chk-y-'+i),n=$('ca-chk-n-'+i)
  if(y)y.style.background=window._caCheckState[i]==='yes'?'var(--oks)':'var(--c2)',y.style.borderColor=window._caCheckState[i]==='yes'?'var(--ok)':'var(--b1)',y.style.color=window._caCheckState[i]==='yes'?'var(--ok)':'var(--g2)'
  if(n)n.style.background=window._caCheckState[i]==='no'?'var(--bads)':'var(--c2)',n.style.borderColor=window._caCheckState[i]==='no'?'var(--bad)':'var(--b1)',n.style.color=window._caCheckState[i]==='no'?'var(--bad)':'var(--g2)'
}

function toggleCaType(t){
  window._caServiceType=t
  ;['annual','semi','install'].forEach(k=>{
    const b=$('ca-'+k);if(!b)return
    const on=k===t
    b.style.borderColor=on?'var(--fire)':'var(--b1)'
    b.style.background=on?'var(--fires)':'var(--c2)'
    b.style.color=on?'var(--fire)':'var(--g2)'
  })
}

function clrCaSig(key){
  const canvasId=key==='tech'?'caTechSig':'caOwnerSig'
  const phId=key==='tech'?'caTechSigPh':'caOwnerSigPh'
  const c=$(canvasId)
  if(c&&rptSigCtx['ca-'+key])rptSigCtx['ca-'+key].clearRect(0,0,c.width,c.height)

async function saveCleanAgentReport(jobId,sysId){
  const ownerSigData=$('caOwnerSig')?.toDataURL()||null
  const reportHtml=await generateCleanAgentReport(jobId,sysId,true) // capture while form is open
  const data={
    checks:window._caCheckState||{},
    serviceType:window._caServiceType||'semi',
    agentType:$('ca-agent-type')?.value||'',
    mfg:$('ca-mfg')?.value||'',model:$('ca-model')?.value||'',
    serial:$('ca-serial')?.value||'',area:$('ca-area')?.value||'',
    concentration:$('ca-conc')?.value||'',panel:$('ca-panel')?.value||'',
    cylinders:window._caCyls||[],
    techName:$('ca-tech-name')?.value||'',
    permit:$('ca-permit')?.value||'',
    ownerName:$('ca-owner-name')?.value||'',
    deficiencies:$('ca-deficiencies')?.value||'',
    reportHtml:reportHtml||''
  }
  const j=D.jobs.find(x=>x.id===jobId)||{}
  const locId2=j.location_id||j.location?.id
  try{
    // check for existing clean agent report for this job
    const{data:caExist}=await SB.from('reports').select('id').eq('job_id',jobId).eq('report_type','clean_agent').limit(1)
    if(caExist?.length){
      await SB.from('reports').update({report_data:data}).eq('id',caExist[0].id)
    }else{
      await SB.from('reports').insert({job_id:jobId,location_id:locId2,report_type:'clean_agent',report_data:data})
    }
    if(ownerSigData)await SB.from('jobs').update({signature_data:ownerSigData,notes:($('ca-deficiencies')?.value||j.notes||null)}).eq('id',jobId)
  }catch(e){console.error('ca report save:',e)}
  toast('Report saved ✓')
  pop()
}
