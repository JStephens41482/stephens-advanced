<!--
  SUPABASE SQL — run this if brycer_queue table does not exist:

  create table brycer_queue (
    id uuid default gen_random_uuid() primary key,
    job_id uuid references jobs(id),
    location_id uuid references locations(id),
    location_name text,
    system_type text,
    job_date date,
    report_generated boolean default false,
    submitted boolean default false,
    submitted_date date,
    created_at timestamptz default now()
  );
  alter table brycer_queue enable row level security;
  create policy "allow all" on brycer_queue for all using (true) with check (true);

  -- Techs table
  create table techs (
    id uuid default gen_random_uuid() primary key,
    name text not null,
    phone text,
    email text,
    license_number text,
    color text default '#f05a28',
    active boolean default true,
    created_at timestamptz default now()
  );
  alter table techs enable row level security;
  create policy "allow all" on techs for all using (true) with check (true);

  -- Add assigned_to column to jobs
  alter table jobs add column if not exists assigned_to uuid references techs(id);

  -- Add service date tracking to extinguishers
  alter table extinguishers add column if not exists last_internal text;
  alter table extinguishers add column if not exists last_hydro text;

  -- Portal tokens
  create table portal_tokens (
    id uuid default gen_random_uuid() primary key,
    token text unique not null,
    location_id uuid references locations(id),
    billing_account_id uuid,
    is_active boolean default true,
    last_accessed_at timestamptz,
    created_at timestamptz default now()
  );
  alter table portal_tokens enable row level security;
  create policy "allow all" on portal_tokens for all using (true) with check (true);

  -- Service requests from portal
  create table service_requests (
    id uuid default gen_random_uuid() primary key,
    location_id uuid references locations(id),
    billing_account_id uuid,
    job_id uuid,
    requested_date date,
    reason text,
    status text default 'pending',
    created_at timestamptz default now()
  );
  alter table service_requests enable row level security;
  create policy "allow all" on service_requests for all using (true) with check (true);
-->

<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--bg:#0d0f14;--c1:#151820;--c2:#1c1f2a;--c3:#252937;--b1:#2a2f3e;--b2:#353b4d;--w:#f0f1f4;--w2:#c8ccd6;--g1:#7c8497;--g2:#555d72;--g3:#3d4456;--fire:#f05a28;--fires:rgba(240,90,40,.08);--ok:#10b981;--oks:rgba(16,185,129,.08);--warn:#f59e0b;--warns:rgba(245,158,11,.08);--bad:#ef4444;--bads:rgba(239,68,68,.08);--info:#6366f1;--infos:rgba(99,102,241,.08);--r:12px;--rs:8px}

.badge{font-size:8.5px;font-weight:800;text-transform:uppercase;letter-spacing:.6px;padding:3.5px 10px;border-radius:20px}
.bpaid{background:var(--oks);color:var(--ok)}.bsent{background:var(--infos);color:var(--info)}.bover{background:var(--bads);color:var(--bad)}.bdraft{background:rgba(124,132,151,.08);color:var(--g1)}.brec{background:rgba(124,132,151,.08);color:var(--g1)}.bfact{background:rgba(99,102,241,.15);color:var(--info)}

const KNOWN_KEYS=new Set(['extinguisherinspection','suppressionsemiannual','suppressioncatank','suppressioncacore','fusiblelink','blowoffcap','siliconecap','nozzle','ansullt10cartridge','ansullt30cartridge','16gco2cartridge','new5lbabcextinguisher','new10lbabcextinguisher','newclasskextinguisher','elightannualtest','hydrostatictestclassk','hydrostatictestco2','hydrostatictesth2o','hydrostatictestabс','drycheminalinternalinspection','labor','emergencycall','afterhourscall','holidayweekendcall'])
async function saveCustomItem(desc,price){
  const nk=norm(desc);if(!nk||KNOWN_KEYS.has(nk))return
  try{await SB.from('custom_items').upsert({normalized_key:nk,description:desc,unit_price:+(price)||0},{onConflict:'normalized_key'})}catch(e){}
}
const fmtD=n=>isNaN(+n)?'$0.00':('$'+(+n).toFixed(2))

function cart(s){const t=s.system_type||'';if(t.includes('R-102')||t.includes('Piranha'))return s.tank_count>1?'LT-30':'LT-10';if(t.includes('Pyro')||t.includes('Knight'))return '16g CO2';if(t.includes('Buck'))return 'Buckeye N2';if(t.includes('Kidde'))return 'Kidde XV N2';return 'Cart'}

function est(j){
  const l=j.location||{},rc=D.rc,sc=j.scope||[];let t=0
  if(sc.includes('extinguishers'))t+=(l.extinguishers?.length||0)*(rc.extinguisher_inspection||20)
  if(sc.includes('suppression'))for(const s of(l.suppression_systems||[])){
    let b=rc.suppression_standard||250
    if(s.category==='captiveaire_tank')b=rc.suppression_captiveaire_tank||450
    if(s.category==='captiveaire_core')b=rc.suppression_captiveaire_core||650
    t+=b+((s.tank_count-1)*(rc.suppression_additional_tank||50))+(s.fusible_link_count||0)*(rc.fusible_link||25)+(s.nozzle_count||0)*(rc.metal_blowoff_cap||25)
  }
  if(sc.includes('elights'))t+=(l.emergency_lights?.[0]?.fixture_count||0)*(rc.emergency_light||20)
  return t
}

function trkLoad(jobs){
  let tg=0,lk=0,cp=0,ct=[]
  jobs.forEach(j=>{const l=j.location||{},sc=j.scope||[]
    if(sc.includes('extinguishers'))tg+=l.extinguishers?.length||0
    if(sc.includes('suppression'))for(const s of(l.suppression_systems||[])){lk+=s.fusible_link_count||0;cp+=s.nozzle_count||0;ct.push(cart(s))}
  })
  return{tg,lk,cp,ct}
}

// swipe-to-delete handler
function initSwipe(el,onDelete){
  let sx=0,sy=0,swiping=false,moved=false
  const inner=el.querySelector('.swipe-inner')
  if(!inner)return
  el.addEventListener('touchstart',e=>{sx=e.touches[0].clientX;sy=e.touches[0].clientY;swiping=true;moved=false},{passive:true})
  el.addEventListener('touchmove',e=>{
    if(!swiping)return
    const dx=e.touches[0].clientX-sx,dy=Math.abs(e.touches[0].clientY-sy)
    if(dy>30){swiping=false;inner.style.transform='';return}
    if(dx<-10){moved=true;inner.style.transition='none';inner.style.transform=`translateX(${Math.max(dx,-90)}px)`}
  },{passive:true})
  el.addEventListener('touchend',e=>{
    swiping=false;inner.style.transition='transform .2s ease'
    if(!moved){inner.style.transform='';return}
    const dx=e.changedTouches[0].clientX-sx
    if(dx<-60){
      inner.style.transform='translateX(-90px)'
      // show delete zone — tap to confirm
    }else{inner.style.transform=''}
    moved=false
  },{passive:true})
  // delete button click
  const delBtn=el.querySelector('.swipe-del')
  if(delBtn)delBtn.addEventListener('click',()=>{
    el.style.transition='all .2s';el.style.maxHeight=el.offsetHeight+'px'
    requestAnimationFrame(()=>{el.style.maxHeight='0';el.style.opacity='0';el.style.marginBottom='0';el.style.padding='0'})
    setTimeout(()=>{el.remove();onDelete()},250)
  })
}

// ═══ ROUTING ENGINE ═══
// City proximity order from Euless base (lat/lng approximations for DFW)
const CITY_COORDS={
  'euless':{lat:32.837,lng:-97.082},'bedford':{lat:32.844,lng:-97.143},
  'hurst':{lat:32.823,lng:-97.188},'colleyville':{lat:32.900,lng:-97.150},
  'grapevine':{lat:32.934,lng:-97.078},'irving':{lat:32.814,lng:-96.949},
  'grand prairie':{lat:32.746,lng:-96.994},'arlington':{lat:32.735,lng:-97.108},
  'mansfield':{lat:32.563,lng:-97.141},'fort worth':{lat:32.755,lng:-97.333},
  'dallas':{lat:32.779,lng:-96.800},'garland':{lat:32.912,lng:-96.638},
  'mesquite':{lat:32.767,lng:-96.599},'carrollton':{lat:32.954,lng:-96.890},
  'lewisville':{lat:33.046,lng:-96.994},'denton':{lat:33.215,lng:-97.133},
  'plano':{lat:33.020,lng:-96.699},'frisco':{lat:33.150,lng:-96.824},
  'mckinney':{lat:33.197,lng:-96.640},'allen':{lat:33.103,lng:-96.671},
  'richardson':{lat:32.948,lng:-96.730},'sachse':{lat:32.970,lng:-96.578},
  'wylie':{lat:33.015,lng:-96.539},'melissa':{lat:33.284,lng:-96.571},
  'weatherford':{lat:32.760,lng:-97.797},'glen rose':{lat:32.233,lng:-97.757},
  'cleburne':{lat:32.350,lng:-97.386},'burleson':{lat:32.542,lng:-97.321}
}
const BASE={lat:32.837,lng:-97.082} // Euless

function cityCoords(city){
  if(!city)return BASE
  const k=city.toLowerCase().trim()
  return CITY_COORDS[k]||BASE
}

function distBetween(a,b){
  const R=3959,dLat=(b.lat-a.lat)*Math.PI/180,dLng=(b.lng-a.lng)*Math.PI/180
  const x=Math.sin(dLat/2)**2+Math.cos(a.lat*Math.PI/180)*Math.cos(b.lat*Math.PI/180)*Math.sin(dLng/2)**2
  return R*2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x))
}

// travel charge calculation origin (do not expose in UI)
const TRAVEL_ORIGIN={lat:32.837,lng:-97.082}
function calcTravelCharge(loc){
  console.log('calcTravelCharge called with loc:',loc?.name,loc?.city,loc?.address)
  if(!loc){console.log('travel: no loc, returning 0');return{charge:0,desc:''}}
  const dest=cityCoords(loc.city)
  console.log('travel: city=',loc.city,'dest coords=',dest,'origin=',TRAVEL_ORIGIN)
  const straightMi=distBetween(TRAVEL_ORIGIN,dest)
  const driveMi=Math.round(straightMi*1.25)
  console.log('travel: straightMi=',straightMi.toFixed(1),'driveMi=',driveMi)
  if(driveMi<=50){console.log('travel: under 50mi, no charge');return{charge:0,desc:''}}
  const excessMi=driveMi-50
  const rtMi=excessMi*2
  const rtHrs=rtMi/55
  const timeCharge=rtHrs*250
  const mileageCharge=rtMi*0.67
  const total=Math.round(timeCharge+mileageCharge)
  const desc=`Travel — ${excessMi} mi over 50-mile radius, ${rtHrs.toFixed(1)} hrs round trip`
  console.log('travel: CHARGE=',total,'desc=',desc)
  return{charge:total,desc}
}

function routeJobs(jobs){
  // nearest-neighbor from base
  let remaining=[...jobs],route=[],cur=BASE
  while(remaining.length){
    let best=null,bestD=Infinity,bestI=0
    remaining.forEach((j,i)=>{
      const c=cityCoords(j.location?.city)
      const d=distBetween(cur,c)
      if(d<bestD){bestD=d;best=j;bestI=i}
    })
    route.push({job:best,dist:bestD})
    cur=cityCoords(best.location?.city)
    remaining.splice(bestI,1)
  }
  return route
}

  const j=D.jobs.find(x=>x.id===jobId);if(!j)return

  const a=[l.address,l.city].filter(Boolean).join(', ')
  if(!a){window.open('https://maps.apple.com/');return}

  // estimate ETA from city coords
  const city=(l.city||'').toLowerCase().trim()
  const dest=CITY_COORDS[city]
  let etaMin=20 // default
  if(dest){
    const d=Math.sqrt(Math.pow((dest.lat-BASE.lat)*69,2)+Math.pow((dest.lng-BASE.lng)*60,2))
    etaMin=Math.max(10,Math.round(d*2.2)) // ~2.2 min per mile in DFW

  const lo=etaMin,hi=etaMin+5

async function openReports(){

  const{data:allJobs}=await SB.from('jobs').select('*,location:locations(name,city,address)').order('scheduled_date',{ascending:false})
  const invs=allInvs||[]
  const jobs=allJobs||[]
  const locs=D.locs||[]
  const now=new Date()
  const thisYear=now.getFullYear()
  const thisMonth=now.getMonth()

  // helper: group by period
  function groupBy(arr,keyFn){const g={};arr.forEach(x=>{const k=keyFn(x);if(!g[k])g[k]=[];g[k].push(x)});return g}
  function weekOf(d){const dt=new Date(d+'T12:00:00');const jan1=new Date(dt.getFullYear(),0,1);return Math.ceil(((dt-jan1)/86400000+jan1.getDay()+1)/7)}

  // === OVERALL METRICS ===
  const totalRev=invs.filter(i=>i.status==='paid').reduce((s,i)=>s+(+i.total||0),0)
  const totalOutstanding=invs.filter(i=>!['paid','void','record'].includes(i.status)).reduce((s,i)=>s+(+i.total||0),0)
  const totalJobs=jobs.length

  const activeClients=new Set(jobs.filter(j=>j.scheduled_date>=(thisYear-1)+'-01-01').map(j=>j.location_id)).size
  const totalClients=locs.length
  const avgJobValue=completedJobs?totalRev/completedJobs:0

  // === YEARLY BREAKDOWN ===
  const invsByYear=groupBy(invs.filter(i=>i.date),i=>i.date.slice(0,4))
  const jobsByYear=groupBy(jobs.filter(j=>j.scheduled_date),j=>j.scheduled_date.slice(0,4))
  const years=Array.from(new Set([...Object.keys(invsByYear),...Object.keys(jobsByYear)])).sort().reverse()

    <div class="ds-row"><div class="ds-lbl">Current (0-30 days)</div><div class="ds-val" style="color:var(--ok)">${fmt(aging.current)}</div></div>
    <div class="ds-row"><div class="ds-lbl">31-60 days</div><div class="ds-val" style="color:var(--warn)">${fmt(aging.d30)}</div></div>
    <div class="ds-row"><div class="ds-lbl">61-90 days</div><div class="ds-val" style="color:var(--fire)">${fmt(aging.d60)}</div></div>
    <div class="ds-row"><div class="ds-lbl">90+ days</div><div class="ds-val" style="color:var(--bad)">${fmt(aging.over90)}</div></div>
    <div class="ds-row" style="border-top:2px solid var(--b1)"><div class="ds-lbl" style="font-weight:800;color:var(--w)">Total Outstanding</div><div class="ds-val" style="font-weight:800;color:var(--bad)">${fmt(aging.current+aging.d30+aging.d60+aging.over90)}</div></div>
  </div>`

  // WEEKLY (last 8 weeks)
  h+=`<div class="ds"><div class="ds-t">Weekly Breakdown</div>`
  weeks.forEach(w=>{
    const rev=w.invs.filter(i=>i.status==='paid').reduce((s,i)=>s+(+i.total||0),0)
    const billed=w.invs.reduce((s,i)=>s+(+i.total||0),0)
    h+=`<div class="ds-row">
      <div class="ds-lbl" style="min-width:120px">${w.label}</div>
      <div style="flex:1;display:flex;gap:12px;justify-content:flex-end;font-size:12px">
        <span style="color:var(--g1)">${w.jobs.length} jobs</span>
        <span style="color:var(--ok);font-weight:700">${fmt(rev)}</span>
      </div>
    </div>`
  })
  h+=`</div>`

  // MONTHLY (current year)
  h+=`<div class="ds"><div class="ds-t">Monthly — ${thisYear}</div>`
  const monthNames=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec']
  months.forEach(key=>{
    const mInvs=invsByMonth[key]||[]
    const mJobs=jobsByMonth[key]||[]
    const rev=mInvs.filter(i=>i.status==='paid').reduce((s,i)=>s+(+i.total||0),0)
    const billed=mInvs.reduce((s,i)=>s+(+i.total||0),0)
    const mi=parseInt(key.split('-')[1])-1
    h+=`<div class="ds-row">
      <div class="ds-lbl" style="min-width:50px;font-weight:700">${monthNames[mi]}</div>
      <div style="flex:1;display:flex;gap:10px;justify-content:flex-end;font-size:12px">
        <span style="color:var(--g1)">${mJobs.length} jobs</span>
        <span style="color:var(--w2)">${fmt(billed)} billed</span>
        <span style="color:var(--ok);font-weight:700">${fmt(rev)} collected</span>
      </div>
    </div>`
  })
  h+=`</div>`

  // YEARLY
  h+=`<div class="ds"><div class="ds-t">Yearly Summary</div>`
  years.forEach(yr=>{
    const yInvs=invsByYear[yr]||[]
    const yJobs=jobsByYear[yr]||[]
    const rev=yInvs.filter(i=>i.status==='paid').reduce((s,i)=>s+(+i.total||0),0)
    const billed=yInvs.reduce((s,i)=>s+(+i.total||0),0)
    const clients=new Set(yJobs.map(j=>j.location_id)).size
    h+=`<div style="background:var(--c1);border:1px solid var(--b1);border-radius:var(--rs);padding:14px;margin-bottom:8px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
        <span style="font-size:18px;font-weight:900">${yr}</span>
        <span style="font-size:18px;font-weight:900;color:var(--ok)">${fmt(rev)}</span>
      </div>
      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;font-size:11px">
        <div><div style="color:var(--g1)">Jobs</div><div style="font-weight:800;font-size:14px">${yJobs.length}</div></div>
        <div><div style="color:var(--g1)">Billed</div><div style="font-weight:800;font-size:14px">${fmt(billed)}</div></div>
        <div><div style="color:var(--g1)">Clients</div><div style="font-weight:800;font-size:14px">${clients}</div></div>
      </div>
    </div>`
  })
  h+=`</div>`

  // TOP CLIENTS
  h+=`<div class="ds"><div class="ds-t">Top Clients by Revenue</div>`
  topClients.forEach((c,i)=>{
    h+=`<div class="ds-row">
      <div class="ds-lbl" style="flex:1"><span style="color:var(--fire);font-weight:800;margin-right:6px">${i+1}.</span>${esc(c.name)}${c.city?' <span style="color:var(--g2)">'+esc(c.city)+'</span>':''}</div>
      <div class="ds-val" style="color:var(--ok);font-weight:800">${fmt(c.rev)}</div>
    </div>`
  })
  h+=`</div>`

  // RECURRING REVENUE INDICATOR
  const recurringClients=new Set()
  const jobsByLoc=groupBy(jobs.filter(j=>j.status==='completed'),j=>j.location_id)
  Object.entries(jobsByLoc).forEach(([lid,jbs])=>{if(jbs.length>=2)recurringClients.add(lid)})
  const recurringPct=totalClients?(recurringClients.size/totalClients*100).toFixed(0):0

  h+=`<div class="ds"><div class="ds-t">Buyer Metrics</div>
    <div class="ds-row"><div class="ds-lbl">Recurring Clients (2+ jobs)</div><div class="ds-val">${recurringClients.size} (${recurringPct}%)</div></div>
    <div class="ds-row"><div class="ds-lbl">Avg Revenue per Client</div><div class="ds-val">${fmt(activeClients?totalRev/activeClients:0)}</div></div>
    <div class="ds-row"><div class="ds-lbl">Equipment Under Management</div><div class="ds-val">${totalExt+totalSys} units</div></div>
    <div class="ds-row"><div class="ds-lbl">Service Locations</div><div class="ds-val">${totalClients}</div></div>
    <div class="ds-row"><div class="ds-lbl">Compliance Jurisdictions</div><div class="ds-val">${brycerLocs} Brycer</div></div>
  </div>`

  // PRINT BUTTONS
  h+=`<div class="ds"><div class="ds-t">Print / Export</div>
    <button class="trk-btn trk-go" style="margin-bottom:8px;font-size:13px" onclick="printFullReport()">📄 Print Full Business Report</button>
    <button class="trk-btn" style="margin-bottom:8px;background:var(--c2);border:1.5px solid var(--b1);color:var(--w2);font-size:12px" onclick="printSection('monthly')">📄 Monthly Revenue Report — ${thisYear}</button>
    <button class="trk-btn" style="margin-bottom:8px;background:var(--c2);border:1.5px solid var(--b1);color:var(--w2);font-size:12px" onclick="printSection('ar')">📄 Accounts Receivable Report</button>
    <button class="trk-btn" style="margin-bottom:8px;background:var(--c2);border:1.5px solid var(--b1);color:var(--w2);font-size:12px" onclick="printSection('clients')">📄 Client List</button>
    <button class="trk-btn" style="margin-bottom:8px;background:var(--c2);border:1.5px solid var(--b1);color:var(--w2);font-size:12px" onclick="printSection('equipment')">📄 Equipment Inventory</button>
  </div>`

  // stash data for print functions
  window._rptData={invs,jobs,locs,totalRev,totalOutstanding,totalJobs,completedJobs,activeClients,totalClients,avgJobValue,aging,weeks,months,invsByMonth,jobsByMonth,years,invsByYear,jobsByYear,topClients,recurringClients,recurringPct,totalExt,totalSys,totalLights,brycerLocs,thisYear,monthNames}

  h+=`</div>`
  push(h)
}

function printFullReport(){
  const d=window._rptData;if(!d)return
  const html=buildPrintReport('full',d)
  const w=window.open('','_blank');if(w){w.document.write(html);w.document.close()}
}

function printSection(type){
  const d=window._rptData;if(!d)return
  const html=buildPrintReport(type,d)
  const w=window.open('','_blank');if(w){w.document.write(html);w.document.close()}
}

function buildPrintReport(type,d){
  const today=new Date().toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'})
  let body=''

  if(type==='full'||type==='monthly'){
    body+=`<h2>Revenue Report — ${d.thisYear}</h2>
    <table><tr><th>Month</th><th style="text-align:right">Jobs</th><th style="text-align:right">Billed</th><th style="text-align:right">Collected</th></tr>`
    let totalBilled=0,totalCollected=0,totalJobsYr=0
    d.months.forEach(key=>{
      const mInvs=d.invsByMonth[key]||[]
      const mJobs=d.jobsByMonth[key]||[]
      const rev=mInvs.filter(i=>i.status==='paid').reduce((s,i)=>s+(+i.total||0),0)
      const billed=mInvs.reduce((s,i)=>s+(+i.total||0),0)
      totalBilled+=billed;totalCollected+=rev;totalJobsYr+=mJobs.length
      const mi=parseInt(key.split('-')[1])-1
      body+=`<tr><td>${d.monthNames[mi]} ${d.thisYear}</td><td style="text-align:right">${mJobs.length}</td><td style="text-align:right">$${billed.toFixed(2)}</td><td style="text-align:right">$${rev.toFixed(2)}</td></tr>`
    })
    body+=`<tr style="font-weight:900;border-top:2px solid #000"><td>TOTAL</td><td style="text-align:right">${totalJobsYr}</td><td style="text-align:right">$${totalBilled.toFixed(2)}</td><td style="text-align:right">$${totalCollected.toFixed(2)}</td></tr></table>`
  }

  if(type==='full'){
    body+=`<div style="page-break-before:always"></div>`
    body+=`<h2>Yearly Summary</h2><table><tr><th>Year</th><th style="text-align:right">Jobs</th><th style="text-align:right">Revenue</th><th style="text-align:right">Clients</th></tr>`
    d.years.forEach(yr=>{
      const yInvs=d.invsByYear[yr]||[]
      const yJobs=d.jobsByYear[yr]||[]
      const rev=yInvs.filter(i=>i.status==='paid').reduce((s,i)=>s+(+i.total||0),0)
      const clients=new Set(yJobs.map(j=>j.location_id)).size
      body+=`<tr><td>${yr}</td><td style="text-align:right">${yJobs.length}</td><td style="text-align:right">$${rev.toFixed(2)}</td><td style="text-align:right">${clients}</td></tr>`
    })
    body+=`</table>`
  }

  if(type==='full'||type==='ar'){
    if(type==='full')body+=`<div style="page-break-before:always"></div>`
    body+=`<h2>Accounts Receivable Aging</h2>
    <table><tr><th>Period</th><th style="text-align:right">Amount</th></tr>
    <tr><td>Current (0-30 days)</td><td style="text-align:right">$${d.aging.current.toFixed(2)}</td></tr>
    <tr><td>31-60 days</td><td style="text-align:right">$${d.aging.d30.toFixed(2)}</td></tr>
    <tr><td>61-90 days</td><td style="text-align:right">$${d.aging.d60.toFixed(2)}</td></tr>
    <tr><td>90+ days</td><td style="text-align:right">$${d.aging.over90.toFixed(2)}</td></tr>
    <tr style="font-weight:900;border-top:2px solid #000"><td>TOTAL</td><td style="text-align:right">$${(d.aging.current+d.aging.d30+d.aging.d60+d.aging.over90).toFixed(2)}</td></tr></table>`
    // unpaid invoice detail
    const unpaid=d.invs.filter(i=>!['paid','void','record'].includes(i.status)&&i.date).sort((a,b)=>a.date.localeCompare(b.date))
    if(unpaid.length){
      body+=`<h3>Unpaid Invoice Detail</h3><table><tr><th>Invoice</th><th>Customer</th><th>Date</th><th style="text-align:right">Amount</th><th style="text-align:right">Days</th></tr>`
      unpaid.forEach(i=>{
        const loc=d.locs.find(l=>l.id===i.location_id)
        const days=Math.round((new Date()-new Date(i.date+'T12:00:00'))/86400000)
        body+=`<tr><td>${i.invoice_number||'—'}</td><td>${loc?.name||'Unknown'}</td><td>${i.date}</td><td style="text-align:right">$${(+i.total).toFixed(2)}</td><td style="text-align:right">${days}</td></tr>`
      })
      body+=`</table>`
    }
  }

  if(type==='full'||type==='clients'){
    if(type==='full')body+=`<div style="page-break-before:always"></div>`
    body+=`<h2>Client List — ${d.totalClients} Locations</h2>
    <table><tr><th>Client</th><th>City</th><th>Ext</th><th>Systems</th><th>Brycer</th><th style="text-align:right">Revenue</th></tr>`
    d.locs.sort((a,b)=>(a.name||'').localeCompare(b.name||'')).forEach(l=>{
      const rev=d.invs.filter(i=>i.status==='paid'&&i.location_id===l.id).reduce((s,i)=>s+(+i.total||0),0)
      body+=`<tr><td>${l.name||''}</td><td>${l.city||''}</td><td style="text-align:center">${l.extinguishers?.length||0}</td><td style="text-align:center">${l.suppression_systems?.length||0}</td><td style="text-align:center">${l.is_brycer_jurisdiction?'Yes':''}</td><td style="text-align:right">$${rev.toFixed(2)}</td></tr>`
    })
    body+=`</table>`
  }

  if(type==='full'||type==='equipment'){
    if(type==='full')body+=`<div style="page-break-before:always"></div>`
    body+=`<h2>Equipment Inventory</h2>`
    d.locs.filter(l=>(l.extinguishers?.length||0)+(l.suppression_systems?.length||0)>0).sort((a,b)=>(a.name||'').localeCompare(b.name||'')).forEach(l=>{
      body+=`<h3>${l.name||'Unknown'}${l.city?' — '+l.city:''}</h3>`
      if(l.suppression_systems?.length){
        body+=`<table><tr><th>Suppression System</th><th>Tanks</th><th>Nozzles</th><th>Links</th></tr>`
        l.suppression_systems.forEach(s=>{
          body+=`<tr><td>${s.system_type||'—'}</td><td style="text-align:center">${s.tank_count}</td><td style="text-align:center">${s.nozzle_count}</td><td style="text-align:center">${s.fusible_link_count}</td></tr>`
        })
        body+=`</table>`
      }
      if(l.extinguishers?.length){
        body+=`<table><tr><th>Extinguisher</th><th>Size</th><th>Location</th><th>Mfg Date</th></tr>`
        l.extinguishers.forEach(e=>{
          body+=`<tr><td>${e.type||''}</td><td>${e.size||''}</td><td>${e.location_in_building||''}</td><td>${e.manufacture_date||''}</td></tr>`
        })
        body+=`</table>`
      }
    })
  }

  if(type==='full'){
    body+=`<div style="page-break-before:always"></div>`
    body+=`<h2>Business Valuation Metrics</h2>
    <table>
    <tr><td>Total Revenue (All Time)</td><td style="text-align:right;font-weight:700">$${d.totalRev.toFixed(2)}</td></tr>
    <tr><td>Average Job Value</td><td style="text-align:right">$${d.avgJobValue.toFixed(2)}</td></tr>
    <tr><td>Active Clients (12 months)</td><td style="text-align:right">${d.activeClients}</td></tr>
    <tr><td>Total Service Locations</td><td style="text-align:right">${d.totalClients}</td></tr>
    <tr><td>Recurring Clients (2+ jobs)</td><td style="text-align:right">${d.recurringClients.size} (${d.recurringPct}%)</td></tr>
    <tr><td>Equipment Under Management</td><td style="text-align:right">${d.totalExt+d.totalSys} units</td></tr>
    <tr><td>Avg Revenue per Client</td><td style="text-align:right">$${(d.activeClients?d.totalRev/d.activeClients:0).toFixed(2)}</td></tr>
    <tr><td>Compliance Jurisdictions</td><td style="text-align:right">${d.brycerLocs} (Brycer/Fort Worth)</td></tr>
    <tr><td>Total Jobs Completed</td><td style="text-align:right">${d.completedJobs}</td></tr>
    <tr><td>Outstanding Receivables</td><td style="text-align:right">$${d.totalOutstanding.toFixed(2)}</td></tr>
    </table>`
  }

  return`<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Stephens Advanced — ${type==='full'?'Business Report':type==='monthly'?'Monthly Revenue':type==='ar'?'AR Aging':type==='clients'?'Client List':'Equipment Inventory'}</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Arial,sans-serif;font-size:10pt;color:#000;padding:24px;max-width:800px;margin:0 auto}
h1{font-size:20pt;margin-bottom:4px}
h2{font-size:14pt;margin:20px 0 8px;padding-bottom:4px;border-bottom:2px solid #000}
h3{font-size:11pt;margin:14px 0 6px;color:#333}
table{width:100%;border-collapse:collapse;margin-bottom:16px;font-size:9pt}
th{text-align:left;padding:6px 8px;border-bottom:2px solid #333;font-size:8pt;text-transform:uppercase;letter-spacing:.5px;color:#666}
td{padding:5px 8px;border-bottom:1px solid #ddd}
.hdr{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:20px;padding-bottom:12px;border-bottom:3px solid #f05a28}
.co{font-size:22pt;font-weight:900;letter-spacing:-1px}
.co span{color:#f05a28}
.sub{font-size:9pt;color:#888;margin-top:2px}
.date{font-size:9pt;color:#888;text-align:right}
@media print{body{padding:12px}button{display:none}}
</style></head><body>
<div class="hdr">
  <div><div class="co">Stephens <span>Advanced</span> LLC</div><div class="sub">Fire Suppression & Safety · (214) 994-4799 · jonathan@stephensadvanced.com</div></div>
  <div class="date">Generated ${today}</div>
</div>
${body}
<script>window.print()<\/script>
</body></html>`
}

function rTechs(){
  const techs=D.techs||[]
  const activeTechs=techs.filter(t=>t.active)
  const inactiveTechs=techs.filter(t=>!t.active)
  const t=td()

  let h=`<div class="sec" style="margin-top:8px"><div class="sec-t">Technicians · ${activeTechs.length}</div><button class="sec-a" onclick="openAddTech()">+ Add</button></div>`

  if(!activeTechs.length){
    h+=`<div class="ey"><div class="ey-i">👥</div><div class="ey-t">No technicians yet. Tap + Add to create one.<br><br><span style="font-size:12px;color:var(--g2)">Add yourself first — Jon Stephens</span></div></div>`
  }else{
    activeTechs.forEach(tk=>{
      const techJobs=D.jobs.filter(j=>j.assigned_to===tk.id)
      const todayJobs=techJobs.filter(j=>j.scheduled_date===t)
      const completedJobs=techJobs.filter(j=>j.status==='completed')
      const techRev=D.invs.filter(i=>i.status==='paid'&&techJobs.some(j=>j.id===i.job_id)).reduce((s,i)=>s+(+i.total||0),0)
      h+=`<div class="cc" onclick="openTechDetail('${tk.id}')">
        <div style="width:40px;height:40px;border-radius:50%;background:${tk.color||'var(--fire)'};display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:900;color:#fff;flex-shrink:0">${(tk.name||'?')[0].toUpperCase()}</div>
        <div class="cc-l">
          <div class="cc-nm">${esc(tk.name)}</div>
          <div class="cc-meta">
            <span><b>${todayJobs.length}</b> today</span>
            <span><b>${completedJobs.length}</b> completed</span>
            <span style="color:var(--ok);font-weight:700">${fmt(techRev)}</span>
          </div>
          ${tk.license_number?`<div style="font-size:10px;color:var(--g2);margin-top:2px">${esc(tk.license_number)}</div>`:''}
        </div><div class="cc-arr">›</div>
      </div>`
    })
  }

  // unassigned jobs
  const unassigned=D.jobs.filter(j=>!j.assigned_to&&j.status==='scheduled')
  if(unassigned.length){
    h+=`<div style="background:var(--warns);border:1.5px solid var(--warn);border-radius:var(--r);padding:12px;margin-top:12px">
      <div style="font-size:12px;font-weight:800;color:var(--warn)">${unassigned.length} Unassigned Job${unassigned.length>1?'s':''}</div>
      <div style="font-size:11px;color:var(--w2);margin-top:4px">These jobs haven't been assigned to a technician yet.</div>
    </div>`
  }

  if(inactiveTechs.length){
    h+=`<div class="sec"><div class="sec-t" style="color:var(--g2)">Inactive</div></div>`
    inactiveTechs.forEach(tk=>{
      h+=`<div class="cc" style="opacity:.5" onclick="openTechDetail('${tk.id}')">
        <div style="width:40px;height:40px;border-radius:50%;background:var(--g3);display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:900;color:var(--g1);flex-shrink:0">${(tk.name||'?')[0].toUpperCase()}</div>
        <div class="cc-l"><div class="cc-nm">${esc(tk.name)}</div><div style="font-size:11px;color:var(--g2)">Inactive</div></div><div class="cc-arr">›</div>
      </div>`
    })
  }
  $('techsC').innerHTML=h
}

  const colorOpts=colors.map(c=>`<button style="width:36px;height:36px;border-radius:50%;background:${c};border:2px solid var(--b1);cursor:pointer" onclick="document.querySelectorAll('#tech-colors button').forEach(b=>b.style.borderColor='var(--b1)');this.style.borderColor='#fff';$('tech-color-val').value='${c}'"></button>`).join('')

    <button class="ov-back" onclick="pop()">‹</button>
    <div class="ov-title">Add Technician</div>
    <button class="ov-act" id="saveTechBtn" onclick="saveTech()">Save</button>
  </div><div class="ov-body">
    <div class="fg"><label class="fg-l">Name *</label><input id="tech-name" placeholder="e.g. Jon Stephens"></div>
    <div class="fg"><label class="fg-l">Phone</label><input id="tech-phone" type="tel"></div>
    <div class="fg"><label class="fg-l">Email</label><input id="tech-email" type="email"></div>
    <div class="fg"><label class="fg-l">License / Permit No.</label><input id="tech-license" placeholder="e.g. FEL-A-2593933"></div>
    <div class="fg"><label class="fg-l">Color</label>
      <div style="display:flex;gap:8px;flex-wrap:wrap" id="tech-colors">${colorOpts}</div>
      <input type="hidden" id="tech-color-val" value="#f05a28">
    </div>
    <div class="err" id="tech-err"></div>
  </div>`)
}

async function saveTech(){
  const name=$('tech-name')?.value?.trim()
  if(!name){if($('tech-err'))$('tech-err').textContent='Name is required';return}
  const b=$('saveTechBtn');if(b){b.textContent='Saving...';b.style.opacity='.5'}
  const{error}=await SB.from('techs').insert({
    name,phone:$('tech-phone')?.value?.trim()||null,
    email:$('tech-email')?.value?.trim()||null,
    license_number:$('tech-license')?.value?.trim()||null,

function buildJobLines(j){
  const l=j.location||{},rc=D.rc,sc=j.scope||[]
  const lines=[]
  // suppression
  if(sc.includes('suppression'))for(const s of(l.suppression_systems||[])){
    let bv=rc.suppression_standard||250
    if(s.category==='captiveaire_tank')bv=rc.suppression_captiveaire_tank||450
    if(s.category==='captiveaire_core')bv=rc.suppression_captiveaire_core||650
    lines.push({desc:`${s.system_type} Semi-Annual`,qty:1,price:bv})
    if(s.tank_count>1)lines.push({desc:`Additional Tank Fee`,qty:s.tank_count-1,price:rc.suppression_additional_tank||50})
    if(s.fusible_link_count)lines.push({desc:`Fusible Links`,qty:s.fusible_link_count,price:rc.fusible_link||25})
    if(s.nozzle_count)lines.push({desc:`Blow-Off Caps`,qty:s.nozzle_count,price:rc.metal_blowoff_cap||25})
  }
  // extinguishers
  if(sc.includes('extinguishers')&&l.extinguishers?.length){
    lines.push({desc:`Extinguisher Inspection`,qty:l.extinguishers.length,price:rc.extinguisher_inspection||20})
    // check for due internals and hydros based on NFPA 10 intervals
    const now=new Date()
    let internalDueCount=0,hydroDueCount=0
    const hydroByType={}
    l.extinguishers.forEach(e=>{
      const nfpa=NFPA10?.[e.type]||{hydro:12,internal:6}
      // 6-year internal check
      if(nfpa.internal){
        const base=e.last_internal?new Date(e.last_internal+'-01'):e.manufacture_date?new Date(e.manufacture_date+'-01'):null
        if(base){const due=new Date(base);due.setFullYear(due.getFullYear()+nfpa.internal);if(due<=now)internalDueCount++}
      }
      // hydro check
      const hBase=e.last_hydro?new Date(e.last_hydro+'-01'):e.manufacture_date?new Date(e.manufacture_date+'-01'):null
      if(hBase){const due=new Date(hBase);due.setFullYear(due.getFullYear()+nfpa.hydro);if(due<=now){
        const key=`Hydrostatic Test ${e.type}`;hydroByType[key]=(hydroByType[key]||0)+1
      }}
    })
    if(internalDueCount)lines.push({desc:`Dry Chem Internal Inspection (6-yr due)`,qty:internalDueCount,price:68})
    Object.entries(hydroByType).forEach(([desc,qty])=>{
      const hPrice=desc.includes('Class K')?275:desc.includes('CO2')?72:desc.includes('Water')?57:68
      lines.push({desc:`${desc} (hydro due)`,qty,price:hPrice})
    })
  }
  // elights
  if(sc.includes('elights')&&l.emergency_lights?.[0]?.fixture_count){
    const fc=l.emergency_lights[0].fixture_count
    lines.push({desc:`E-Light Annual Test`,qty:fc,price:rc.emergency_light||20})
  }
  // fallback — nothing auto-populated, start with blank
  return lines.length?lines:[{desc:'',qty:1,price:0}]
}

function renderJobLines(){
  const wrap=$('wo-lines');if(!wrap)return
  wrap.innerHTML=jobLines.map((l2,i)=>`
    <div class="li-row" data-jli="${i}">
      <input placeholder="Description" value="${esc(l2.desc||'')}" oninput="jlEdit(${i},'desc',this.value)" style="flex:2">
      <input class="li-qty" type="number" value="${l2.qty||1}" min="0.5" step="0.5" oninput="jlEdit(${i},'qty',this.value)">
      <input class="li-price" type="number" value="${+(l2.price||0)}" step="0.01" oninput="jlEdit(${i},'price',this.value)">
      <button class="li-del" onclick="jlDel(${i})">✕</button>
    </div>`).join('')
  updateWoTotal()
}

function jlEdit(i,field,val){
  if(!jobLines[i])return
  if(field==='desc')jobLines[i].desc=val
  else if(field==='qty')jobLines[i].qty=parseFloat(val)||1
  else if(field==='price')jobLines[i].price=parseFloat(val)||0
  updateWoTotal()
}

function jlDel(i){
  jobLines.splice(i,1)
  renderJobLines()
}

function updateWoTotal(){
  const total=jobLines.reduce((s,l2)=>s+(+(l2.qty||1))*(+(l2.price||0)),0)
  const el=$('wo-total');if(el)el.textContent=fmtD(total)
}

function addPartLine(sel){
  const v=sel.value;if(!v)return
  sel.value='' // reset dropdown
  if(v==='CUSTOM'){
    jobLines.push({desc:'',qty:1,price:0,id:'jl'+Date.now()})
    renderJobLines()
    // focus last description field
    setTimeout(()=>{const inputs=$('wo-lines')?.querySelectorAll('input[placeholder="Description"]');if(inputs?.length)inputs[inputs.length-1].focus()},50)
    return
  }
  const parts=v.split('|')
  const desc=parts[0]||'',qty=parseFloat(parts[1])||1,price=parseFloat(parts[2])||0
  // fuzzy match — normalize to catch "Ansul LT-10" vs "ansul lt10" etc.
  const nd=norm(desc)
  const existing=jobLines.find(l2=>norm(l2.desc)===nd)
  if(existing){existing.qty=(+existing.qty||1)+1;renderJobLines();return}
  jobLines.push({desc,qty,price,id:'jl'+Date.now()})
  renderJobLines()
}

async function compJ(id){
  setLoad('compBtn',true)
  const j=D.jobs.find(x=>x.id===id);if(!j)return
  const l=D.locs.find(x=>x.id===(j.location_id||j.location?.id))||j.location||{}
  const sc=j.scope||[]

  // read lines from jobLines state
  const lines=jobLines.filter(l2=>(l2.desc||'').trim()).map(l2=>({
    description:l2.desc.trim(),
    quantity:+(l2.qty)||1,
    unit_price:+(l2.price)||0,
    total:(+(l2.qty)||1)*(+(l2.price)||0)
  }))
  if(!lines.length){toast('Add at least one line item',false);setLoad('compBtn',false,'✓ Complete Job — Generate Invoice');return}

  // auto-add travel charge if over 50 miles
  console.log('compJ: calling calcTravelCharge with l=',l?.name,l?.city)
  const travel=calcTravelCharge(l)
  console.log('compJ: travel result=',travel)
  if(travel.charge>0){
    console.log('compJ: ADDING travel line item, charge=',travel.charge)
    lines.push({description:travel.desc,quantity:1,unit_price:travel.charge,total:travel.charge})
  }else{
    console.log('compJ: no travel charge (under 50mi or $0)')
  }

  const sub=lines.reduce((s,l2)=>s+l2.total,0)
  const notes=($('job-notes')?.value||jobNotes||'').trim()
  const sig=$('sigC')?.toDataURL()||null

  const invNum='INV-'+Date.now().toString().slice(-6)
  const{data:inv,error}=await SB.from('invoices').insert({
    job_id:id,location_id:l.id,billing_account_id:l.billing_account_id,
    invoice_number:invNum,subtotal:sub,total:sub,status:'draft',date:td(),
    notes:notes||null
  }).select().single()
  if(error){toast('Error generating invoice',false);setLoad('compBtn',false,'✓ Complete Job — Generate Invoice');return}

  if(inv&&lines.length)await SB.from('invoice_lines').insert(lines.map((ln,i2)=>({invoice_id:inv.id,...ln,sort_order:i2})))

  // save any custom items for future reuse
  for(const ln of lines)await saveCustomItem(ln.description,ln.unit_price)

  await SB.from('jobs').update({
    status:'completed',
    completed_at:new Date().toISOString(),
    signature_data:sig,
    notes:notes||null
  }).eq('id',id)

  // save extinguisher results
  for(const[eid,st] of Object.entries(extR)){
    try{await SB.from('extinguisher_results').insert({job_id:id,extinguisher_id:eid,status:st})}catch(e){}
  }

  // auto-reschedule: if location has any suppression system, create follow-up job ~5.5 months out
  if(sc.includes('suppression')&&l.suppression_systems&&l.suppression_systems.length){
    const nextDate=new Date()
    nextDate.setMonth(nextDate.getMonth()+5)
    nextDate.setDate(nextDate.getDate()+Math.floor(Math.random()*31)) // 5–6 months window
    const nds=nextDate.toISOString().split('T')[0]
    try{
      await SB.from('jobs').insert({location_id:l.id,billing_account_id:l.billing_account_id||null,type:j.type||'inspection',scope:sc,scheduled_date:nds,scheduled_time:j.scheduled_time||'09:00',status:'scheduled',notes:'Auto-scheduled follow-up (semi-annual suppression)'})
      toast('Follow-up scheduled for '+new Date(nds+'T12:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}))
    }catch(e){console.error('auto-reschedule:',e)}
  }

  // auto-add to Brycer queue if Fort Worth jurisdiction
  if(l.is_brycer_jurisdiction){
    const sysTypes=(l.suppression_systems||[]).map(s=>s.system_type).filter(Boolean).join(', ')||'Suppression System'
    try{
      await SB.from('brycer_queue').insert({job_id:id,location_id:l.id,location_name:l.name||'',system_type:sysTypes,job_date:td(),report_generated:false,submitted:false})
    }catch(e){console.error('brycer queue:',e)}
  }

  await load()
  pop()
  showInv({num:inv?.invoice_number||'—',nm:l.name||'',addr:[l.address,l.city].filter(Boolean).join(', '),lines,total:sub,ro:false,iid:inv?.id,locId:l.id,jobId:id,scope:j.scope||[],syss:l.suppression_systems||[]})
}

  const map={pass:'sp',swap:'ss',replace:'sr',condemn:'sc2',remove:'sx'}
  btn.classList.add(map[st]||'')

let sigCtx=null,sigOn=false
function initSig(){
  const c=$('sigC');if(!c)return
  const r=c.parentElement.getBoundingClientRect();c.width=r.width;c.height=r.height
  sigCtx=c.getContext('2d');sigCtx.strokeStyle='#222';sigCtx.lineWidth=2.5;sigCtx.lineCap='round';sigCtx.lineJoin='round'
  const sp=e=>{e.preventDefault();sigOn=true;if($('sigPh'))$('sigPh').style.display='none';const p=gp(e);sigCtx.beginPath();sigCtx.moveTo(p.x,p.y)}
  const sm=e=>{if(!sigOn)return;e.preventDefault();const p=gp(e);sigCtx.lineTo(p.x,p.y);sigCtx.stroke()}
  const se=()=>{sigOn=false}
  c.addEventListener('touchstart',sp,{passive:false});c.addEventListener('touchmove',sm,{passive:false});c.addEventListener('touchend',se)
  c.addEventListener('mousedown',sp);c.addEventListener('mousemove',sm);c.addEventListener('mouseup',se)
}
function gp(e){const c=$('sigC'),r=c.getBoundingClientRect(),t=e.touches?e.touches[0]:e;return{x:t.clientX-r.left,y:t.clientY-r.top}}
function clrSig(){if(sigCtx){const c=$('sigC');sigCtx.clearRect(0,0,c.width,c.height)}if($('sigPh'))$('sigPh').style.display=''}

async function saveCustEdit(id){
  const b=$('saveCBtn');if(b){b.textContent='Saving...';b.style.opacity='.5';b.style.pointerEvents='none'}
  const bry=$('ec-bry').value==='true'
  const{error}=await SB.from('locations').update({
    name:$('ec-name')?.value?.trim(),contact_name:$('ec-contact')?.value?.trim()||null,
    contact_phone:$('ec-phone')?.value?.trim()||null,contact_email:$('ec-email')?.value?.trim()||null,
    address:$('ec-addr')?.value?.trim()||null,city:$('ec-city')?.value?.trim()||null,
    zip:$('ec-zip')?.value?.trim()||null,notes:$('ec-notes')?.value?.trim()||null,
    is_brycer_jurisdiction:bry,brycer_ahj_name:bry?'Fort Worth Fire Department':null
  }).eq('id',id)
  if(error){if($('ec-err'))$('ec-err').textContent='Error: '+error.message;if(b){b.textContent='Save';b.style.opacity='';b.style.pointerEvents=''}return}
  await load();toast('Client updated')
  pop();pop();openCust(id)
}

function renderInvLines(locked){
  const wrap=$('inv-det-lines');if(!wrap)return
  if(!invLines.length){wrap.innerHTML=`<div style="color:var(--g2);font-size:12px;padding:8px 0">No line items</div>`;return}
  wrap.innerHTML=invLines.map((l2,i)=>{
    const isTravel=(l2.desc||'').startsWith('Travel —')
    return locked
    ?`<div class="ds-row"><div class="ds-lbl" style="flex:1;font-size:12px;color:var(--w2)">${isTravel?'🚗 ':''}${esc(l2.desc)}${l2.qty>1?' ×'+l2.qty:''}</div><div class="ds-val" style="font-variant-numeric:tabular-nums;flex-shrink:0">${fmtD(l2.qty*l2.price)}</div></div>`
    :`<div class="li-row" data-ili="${i}" style="${isTravel?'border-left:3px solid var(--warn);padding-left:8px':''}">
      <input placeholder="Description" value="${esc(l2.desc||'')}" oninput="ilEdit(${i},'desc',this.value)" style="flex:2${isTravel?';color:var(--warn)':''}">
      <input class="li-qty" type="number" value="${l2.qty||1}" min="0.5" step="0.5" oninput="ilEdit(${i},'qty',this.value)">
      <input class="li-price" type="number" value="${+(l2.price||0)}" step="0.01" oninput="ilEdit(${i},'price',this.value)">
      <button class="li-del" onclick="ilDel(${i})">✕</button>
    </div>`
  }).join('')
  if(!locked){
    const t=invLines.reduce((s,l2)=>s+(+(l2.qty||1))*(+(l2.price||0)),0)
    wrap.innerHTML+=`<div class="ds-row" style="padding-top:10px;border-top:1.5px solid var(--b1)"><div class="ds-lbl" style="font-weight:800;color:var(--w)">Total</div><div class="ds-val" style="font-size:17px;font-weight:800;color:var(--fire)" id="inv-lines-total">${fmtD(t)}</div></div>`
  }
}

function ilEdit(i,field,val){
  if(!invLines[i])return
  if(field==='desc')invLines[i].desc=val
  else if(field==='qty')invLines[i].qty=parseFloat(val)||1
  else if(field==='price')invLines[i].price=parseFloat(val)||0
  // update totals
  const t=invLines.reduce((s,l2)=>s+(+(l2.qty||1))*(+(l2.price||0)),0)
  const el=$('inv-lines-total');if(el)el.textContent=fmtD(t)
  const el2=$('inv-det-total-sm');if(el2)el2.textContent=fmtD(t)
}

function ilDel(i){
  invLines.splice(i,1)
  renderInvLines(false)
}

function addInvLine(sel,invId){
  const v=sel.value;if(!v)return
  sel.value=''
  if(v==='CUSTOM'){
    invLines.push({desc:'',qty:1,price:0})
    renderInvLines(false)
    setTimeout(()=>{const inputs=$('inv-det-lines')?.querySelectorAll('input[placeholder="Description"]');if(inputs?.length)inputs[inputs.length-1].focus()},50)
    return
  }
  const parts=v.split('|')
  const desc=parts[0]||'',qty=parseFloat(parts[1])||1,price=parseFloat(parts[2])||0
  const nd=norm(desc)
  const existing=invLines.find(l2=>norm(l2.desc)===nd)
  if(existing){existing.qty=(+existing.qty||1)+1;renderInvLines(false);return}
  invLines.push({desc,qty,price})
  renderInvLines(false)
}

async function saveInvLines(invId){
  const btn=$('inv-save-lines-btn');if(btn){btn.textContent='Saving...';btn.disabled=true}
  const lines=invLines.filter(l2=>(l2.desc||'').trim())
  const newTotal=lines.reduce((s,l2)=>s+(+(l2.qty||1))*(+(l2.price||0)),0)
  try{
    // delete existing lines and reinsert
    await SB.from('invoice_lines').delete().eq('invoice_id',invId)
    if(lines.length)await SB.from('invoice_lines').insert(lines.map((l2,i)=>({
      invoice_id:invId,
      description:l2.desc.trim(),
      quantity:+(l2.qty)||1,
      unit_price:+(l2.price)||0,
      total:(+(l2.qty)||1)*(+(l2.price)||0),
      sort_order:i
    })))
    await SB.from('invoices').update({total:newTotal,subtotal:newTotal}).eq('id',invId)
    // save any custom items for future reuse
    for(const l2 of lines)await saveCustomItem(l2.desc.trim(),+(l2.price)||0)
    await load()
    toast('Invoice updated ✓')
    const el=$('inv-det-total');if(el)el.textContent=fmtD(newTotal)
  }catch(e){toast('Save failed',false);console.error(e)}
  if(btn){btn.textContent='💾 Save Changes';btn.disabled=false}
}

function collectPayment(id,method){
  if(method==='undecided'){
    toast('Invoice left unpaid')
    pop();openInvDetail(id)
    return
  }
  if(method==='check'){
    const num=prompt('Enter check number:')
    if(!num)return
    markPaid(id,'check',`Check #${num.trim()}`)
    return
  }
  if(method==='cash'){
    if(!confirm('Cash — mark as paid in full?'))return
    markPaid(id,'cash','Cash — paid in full')
    return
  }
  if(method==='card'){
    if(!confirm('Card — mark as paid in full?'))return
    markPaid(id,'card','Card — paid in full')
    return
  }
  markPaid(id,method)
}
async function markPaid(id,method,note){
  const upd={status:'paid',payment_method:method,paid_at:new Date().toISOString()}
  if(note)upd.payment_note=note
  const{error}=await SB.from('invoices').update(upd).eq('id',id)
  if(error){toast('Error',false);return}
  await load();toast('Marked as paid ✓')
  pop();openInvDetail(id)
}

async function markUnpaid(id){
  if(!confirm('Mark this invoice as unpaid?'))return
  const{error}=await SB.from('invoices').update({status:'draft',payment_method:null,payment_note:null,paid_at:null}).eq('id',id)
  if(error){toast('Error',false);return}
  await load();toast('Marked as unpaid')
  pop();openInvDetail(id)
}

let mazonSigCtx=null,mazonSigOn=false
function initMazonSig(){
  const c=$('mazonSigC');if(!c)return
  const r=c.parentElement.getBoundingClientRect();c.width=r.width;c.height=r.height
  mazonSigCtx=c.getContext('2d');mazonSigCtx.strokeStyle='#222';mazonSigCtx.lineWidth=2.5;mazonSigCtx.lineCap='round';mazonSigCtx.lineJoin='round'
  const sp=e=>{e.preventDefault();mazonSigOn=true;if($('mazonSigPh'))$('mazonSigPh').style.display='none';const p=gp2(e);mazonSigCtx.beginPath();mazonSigCtx.moveTo(p.x,p.y)}
  const sm=e=>{if(!mazonSigOn)return;e.preventDefault();const p=gp2(e);mazonSigCtx.lineTo(p.x,p.y);mazonSigCtx.stroke()}
  const se=()=>{mazonSigOn=false}
  c.addEventListener('touchstart',sp,{passive:false});c.addEventListener('touchmove',sm,{passive:false});c.addEventListener('touchend',se)
  c.addEventListener('mousedown',sp);c.addEventListener('mousemove',sm);c.addEventListener('mouseup',se)
}
function gp2(e){const c=$('mazonSigC'),r=c.getBoundingClientRect(),t=e.touches?e.touches[0]:e;return{x:t.clientX-r.left,y:t.clientY-r.top}}
function clrMazonSig(){if(mazonSigCtx){const c=$('mazonSigC');mazonSigCtx.clearRect(0,0,c.width,c.height)}if($('mazonSigPh'))$('mazonSigPh').style.display=''}

async function submitMazon(invId,custName,total){
  const sig=$('mazonSigC')?.toDataURL()||null
  const name=$('mazon-name')?.value?.trim()||''
  const b=$('mazonSubmitBtn');if(b){b.innerHTML='<span class="spin"></span> Adding to queue...';b.classList.add('loading')}

  // get invoice + location for address and service date
  const inv=D.invs.find(x=>x.id===invId)||{}
  const loc=D.locs.find(x=>x.id===inv.location_id)||{}
  const addr=[loc.address,loc.city,loc.state,loc.zip].filter(Boolean).join(', ')

  // save to mazon_queue
  const{error:qErr}=await SB.from('mazon_queue').insert({
    invoice_id:invId,customer_name:name||custName,amount:+total||0,
    location_address:addr,date_of_service:inv.date||td(),
    signature_data:sig,status:'pending',invoice_number:inv.invoice_number||''
  })
  if(qErr){toast('Error queuing',false);if(b){b.innerHTML='Submit to Mazon';b.classList.remove('loading')}return}

  // mark invoice as factored (not paid yet — pending Mazon submission)
  await SB.from('invoices').update({
    status:'factored',payment_method:'mazon',
    notes:'Mazon Factoring — Client #1410. Customer: '+(name||custName)+'. In queue for submission.'
  }).eq('id',invId)

  await load()
  toast('Added to Mazon queue ✓')
  popAll()
  rMoney()
  go(document.querySelector('[data-v="vMoney"]'))
}

async function sendMazonSchedule(){

  // fetch current pending
  const{data:pending}=await SB.from('mazon_queue').select('*').eq('status','pending').order('created_at')
  if(!pending?.length){toast('No pending invoices',false);if(btn){btn.textContent='Send';btn.disabled=false};return}

  const totalAmt=pending.reduce((s,x)=>s+(+x.amount||0),0)
  const today=new Date().toLocaleDateString('en-US',{month:'2-digit',day:'2-digit',year:'numeric'})

  // build Mazon schedule email
  let scheduleHtml=`<div style="font-family:Arial,sans-serif;font-size:14px;color:#222;max-width:600px">
    <p>Good morning,</p>
    <p>Please find below the schedule submission for <b>Stephens Advanced LLC</b>.</p>

      </tr>`
  pending.forEach(q=>{
    scheduleHtml+=`<tr>
      <td style="padding:8px;border:1px solid #ddd">${esc(q.invoice_number||'—')}</td>
      <td style="padding:8px;border:1px solid #ddd">${esc(q.customer_name)}</td>

      <td style="padding:8px;border:1px solid #ddd;text-align:center">${q.date_of_service||'—'}</td>

  scheduleHtml+=`<tr style="background:#f0f0f0;font-weight:bold">

      <td style="padding:8px;border:1px solid #ddd;text-align:right">${fmt(totalAmt)}</td>

    </tr></table>
    <p>Thank you,<br><b>Jonathan Stephens</b><br>Stephens Advanced LLC<br>(214) 994-4799<br>jonathan@stephensadvanced.com</p>
  </div>`

  try{

      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        to:'schedule@mazon.com',
        subject:'Stephens Advanced LLC — Schedule Submission — Client #1410 — '+today,
        html:scheduleHtml
      })
    })
    const data=await res.json()
    if(!res.ok)throw new Error(data.error||'Send failed')

    // mark all as submitted
    const now=new Date().toISOString()
    for(const q of pending){
      await SB.from('mazon_queue').update({status:'submitted',submitted_at:now}).eq('id',q.id)
      // mark invoice as paid via mazon
      if(q.invoice_id){
        await SB.from('invoices').update({status:'paid',paid_at:now,payment_note:'Mazon schedule submitted '+today}).eq('id',q.invoice_id)

function iHtml(invs){
  if(!invs.length)return`<div class="ey"><div class="ey-i">💰</div><div class="ey-t">No invoices yet.</div></div>`
  return invs.map(i=>{
    const loc=D.locs.find(l=>l.id===i.location_id)
    const bc=i.status==='paid'?'bpaid':i.status==='sent'?'bsent':i.status==='overdue'?'bover':i.status==='record'?'brec':i.status==='factored'?'bfact':'bdraft'
    return`<div class="swipe-wrap" data-swipe-inv="${i.id}">
      <div class="swipe-del" onclick="event.stopPropagation()">Delete</div>
      <div class="swipe-inner ic" onclick="openInvDetail('${i.id}')" style="margin-bottom:0">
        <div class="ic-r1"><div><div class="ic-nm">${esc(loc?.name||'Unknown')}</div><div class="ic-sub">${i.invoice_number||'—'}</div></div><span class="badge ${bc}">${i.status}</span></div>
        <div class="ic-sub">${i.date?new Date(i.date).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}):''}</div>
        <div class="ic-amt">${fmt(+i.total)}</div>
      </div>
    </div>`
  }).join('')
}
function initSwipes(){
  document.querySelectorAll('.swipe-wrap[data-swipe-inv]').forEach(el=>{
    initSwipe(el,async()=>{
      const id=el.dataset.swipeInv
      await SB.from('invoice_lines').delete().eq('invoice_id',id)
      await SB.from('invoices').delete().eq('id',id)
      await load();toast('Invoice deleted');rMoney()
    })
  })
  document.querySelectorAll('.swipe-wrap[data-swipe-job]').forEach(el=>{
    initSwipe(el,async()=>{
      const id=el.dataset.swipeJob
      const{data:invs2}=await SB.from('invoices').select('id').eq('job_id',id)
      const invIds2=(invs2||[]).map(x=>x.id)
      if(invIds2.length)await SB.from('invoice_lines').delete().in('invoice_id',invIds2)
      if(invIds2.length)await SB.from('invoices').delete().in('id',invIds2)
      try{await SB.from('reports').delete().eq('job_id',id)}catch(e){}
      try{await SB.from('extinguisher_results').delete().eq('job_id',id)}catch(e){}
      await SB.from('jobs').delete().eq('id',id)
      await load();toast('Job deleted');rJobs();rDash()
    })
  })
}
function fI(q){
  const ql=q.toLowerCase()
  $('iL').innerHTML=iHtml(D.invs.filter(i=>{const loc=D.locs.find(l=>l.id===i.location_id);return(loc?.name||'').toLowerCase().includes(ql)||(i.invoice_number||'').toLowerCase().includes(ql)}))

function handlePhoto(ev){
  const file=ev.target.files[0];if(!file)return
  const reader=new FileReader()
  reader.onload=e=>{
    const prev=$('photoPrev');if(prev){prev.src=e.target.result;prev.style.display='block'}
    const st=$('aiStatus');if(st)st.style.display='block'
    $('camInput').value=''
    const img=new Image()
    img.onload=async()=>{
      const canvas=document.createElement('canvas')
      const max=1600;let w=img.width,h2=img.height
      if(w>max||h2>max){if(w>h2){h2=Math.round(h2*max/w);w=max}else{w=Math.round(w*max/h2);h2=max}}
      canvas.width=w;canvas.height=h2
      canvas.getContext('2d').drawImage(img,0,0,w,h2)
      await runPhotoAI(canvas.toDataURL('image/jpeg',0.85).split(',')[1],'image/jpeg')
    }
    img.src=e.target.result
  }
  reader.readAsDataURL(file)
}

async function runPhotoAI(b64,mtype){
  const locList=D.locs.map(l=>({id:l.id,name:l.name,city:l.city||''}))
  try{
    const res=await fetch('/api/claude',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        model:'claude-sonnet-4-6',max_tokens:2000,
        messages:[{role:'user',content:[
          {type:'image',source:{type:'base64',media_type:mtype,data:b64}},
          {type:'text',text:`You are the AI assistant for Stephens Advanced LLC, a fire suppression contractor in DFW Texas. Extract ALL invoice and job details from this image. Scan the ENTIRE image top to bottom.

RULES:
- LINE ITEMS: Only items with a dollar amount written next to them. No price = notes field only.
- Copy dollar amounts EXACTLY as written. Never recalculate or change math.
- Copy customer name, address, phone, email exactly as written.
- SUB TOTAL and TOTAL at the bottom are most important — copy exactly.
- Note payment method if visible (check, cash, card, PAID).
- Include work order number and date if visible.

Known customers: ${JSON.stringify(locList)}

Return ONLY valid JSON, no markdown:
{"customer_name":"","matched_location_id":null,"is_new_customer":true,"new_customer":{"name":"","address":"","city":"","state":"TX","zip":"","contact_name":"","contact_phone":"","email":""},"service_date":null,"work_order_number":"","service_type":"","has_suppression":false,"has_extinguishers":false,"line_items":[{"description":"","quantity":1,"unit_price":0,"total_as_written":""}],"subtotal_as_written":"","total_as_written":"","payment_method":"","notes":"","confidence":"high/medium/low"}

IMPORTANT: Set has_suppression=true if ANY line item mentions suppression, hood, Ansul, kitchen, clean agent, FM-200, halon, novec, semi-annual inspection of systems, fusible link, nozzle, blow-off cap, or similar fire suppression system work. Set has_extinguishers=true if ANY line item mentions extinguisher, fire ext, tag, inspection tag, hydro test, or similar portable extinguisher work. service_date MUST be in YYYY-MM-DD format if found.`}
        ]}]
      })
    })
    const data=await res.json()
    const txt=data.content?.[0]?.text||''
    let p;try{p=JSON.parse(txt.replace(/```json|```/g,'').trim())}catch{throw new Error('parse')}
    const st=$('aiStatus');if(st)st.style.display='none'
    if(_recordMode)renderRecordResult(p);else renderAIResult(p)
  }catch(err){
    const tx=$('aiTxt');if(tx)tx.textContent='Could not read photo — try again or build manually.'
    console.error(err)
  }
}

  // if AI read a name but no match, pre-fill the search or auto-show new customer form
  if(!matchedLoc&&p.customer_name){
    if(p.confidence==='high'&&p.is_new_customer){
      // high confidence new customer — go straight to new customer form
    }else{
      setTimeout(()=>{const s=$('ai-loc-search');if(s){s.value=p.customer_name;aiCustSearch(p.customer_name)}},50)
    }
  }
  // if new customer, show the form pre-populated
  if(p.is_new_customer&&!matchedLoc){
    const nc=p.new_customer||{}
    setTimeout(()=>{
      showAiNewCust(nc.name||p.customer_name||'')
      setTimeout(()=>{
        if(nc.address){const e=$('ai-nc-addr');if(e)e.value=nc.address}
        if(nc.city){const e=$('ai-nc-city');if(e)e.value=nc.city}
        if(nc.zip){const e=$('ai-nc-zip');if(e)e.value=nc.zip}
        if(nc.contact_name){const e=$('ai-nc-contact');if(e)e.value=nc.contact_name}
        if(nc.contact_phone){const e=$('ai-nc-phone');if(e)e.value=nc.contact_phone}
        if(nc.email){const e=$('ai-nc-email');if(e)e.value=nc.email}
      },30)
    },60)
  }
  // auto-detect payment from AI
  if(p.payment_method){
    const pm=p.payment_method.toLowerCase()
    let mKey='old_system'
    if(pm.includes('check'))mKey='check'
    else if(pm.includes('cash'))mKey='cash'
    else if(pm.includes('card')||pm.includes('credit')||pm.includes('debit'))mKey='card'
    else if(pm.includes('unpaid')||pm.includes('due'))mKey='unpaid'
    setTimeout(()=>{const btn=document.querySelector(`#ai-pay button[data-m="${mKey}"]`);if(btn)aiSetPay(btn)},80)
  }
}

function aiCustSearch(q){

  const canMk=q.length>=2&&!matches.some(l=>l.name.toLowerCase()===ql)

// franchise detection — find existing customers that share a name prefix
function detectFranchise(name){
  if(!name||name.length<3)return[]
  const words=name.trim().split(/\s+/)
  // try progressively shorter prefixes: "Look Cinemas" from "Look Cinemas Arlington"
  const matches=[]
  for(let len=words.length-1;len>=1;len--){
    const prefix=words.slice(0,len).join(' ').toLowerCase()
    if(prefix.length<3)continue
    const found=D.locs.filter(l=>l.name.toLowerCase().startsWith(prefix))
    if(found.length){
      return found.map(l=>({id:l.id,name:l.name,city:l.city||'',prefix:words.slice(0,len).join(' ')}))
    }
  }
  return[]
}

function recUpdateDue(){
  const dateVal=$('rec-date')?.value
  const scopeBtns=$('rec-scope')?.querySelectorAll('button.ts')||[]
  const scopes=Array.from(scopeBtns).map(b=>b.dataset.k)
  const hasSup=scopes.includes('suppression')
  const hasExt=scopes.includes('extinguishers')
  const svcDate=dateVal?new Date(dateVal+'T12:00:00'):null
  const alert=$('rec-due-alert')
  const btn=$('recSaveBtn')
  _recData={hasSup,hasExt,isDue:false,dueType:'',monthsAgo:0}

  if(!svcDate||isNaN(svcDate)||!alert){if(alert)alert.innerHTML='';if(btn)btn.textContent='Record Old Job';return}
  const now=new Date()
  const monthsAgo=Math.round((now-svcDate)/(1000*60*60*24*30.44))
  _recData.monthsAgo=monthsAgo
  const supDue=hasSup&&monthsAgo>=6
  const extDue=hasExt&&!hasSup&&monthsAgo>=12

  if(supDue){
    _recData.isDue=true;_recData.dueType='suppression'
    alert.innerHTML=`<div style="background:var(--bads);border:2px solid var(--bad);border-radius:var(--r);padding:14px;margin-bottom:14px">
      <div style="font-size:13px;font-weight:800;color:var(--bad);margin-bottom:4px">REINSPECTION DUE — Suppression</div>
      <div style="font-size:12px;color:var(--w2)">Last service ${monthsAgo} months ago. Semi-annual (6 mo) required.</div>
    </div>`
    if(btn)btn.textContent='Record Old Job + Schedule Reinspection'
  }else if(extDue){
    _recData.isDue=true;_recData.dueType='extinguishers'
    alert.innerHTML=`<div style="background:var(--warns);border:2px solid var(--warn);border-radius:var(--r);padding:14px;margin-bottom:14px">
      <div style="font-size:13px;font-weight:800;color:var(--warn);margin-bottom:4px">REINSPECTION DUE — Extinguishers</div>
      <div style="font-size:12px;color:var(--w2)">Last service ${monthsAgo} months ago. Annual (12 mo) required.</div>
    </div>`
    if(btn)btn.textContent='Record Old Job + Schedule Reinspection'
  }else{
    const nextMonths=hasSup?6-monthsAgo:hasExt?12-monthsAgo:null
    if(nextMonths!==null&&nextMonths>0){
      alert.innerHTML=`<div style="background:var(--oks);border:2px solid var(--ok);border-radius:var(--r);padding:12px;margin-bottom:14px">
        <div style="font-size:12px;font-weight:700;color:var(--ok)">Not yet due — ~${nextMonths} month${nextMonths!==1?'s':''} until next inspection</div>
      </div>`
    }else{alert.innerHTML=''}
    if(btn)btn.textContent='Record Old Job'
  }
}

  for(let i=0;i<_aiN;i++){

    const q=parseFloat($('alq'+i)?.value)||1
    const up=parseFloat($('alup'+i)?.value)||parseFloat($('alp'+i)?.value)||0
    const lt=parseFloat($('alp'+i)?.value)||(q*up)
    lines.push({description:d,quantity:q,unit_price:up,total:lt})
  }
  if(!lines.length){toast('Add at least one line item',false);resetBtn();return}
  const total=lines.reduce((s,l2)=>s+l2.total,0)
  const invNum='INV-'+Date.now().toString().slice(-6)
  const isPaid=_recPayMethod&&_recPayMethod!=='unpaid'
  const payNote=_recPayMethod==='old_system'?'Old system file — paid':_recPayMethod==='check'?'Check #'+($('rec-check-num')?.value?.trim()||'?'):_recPayMethod==='cash'?'Cash — paid in full':_recPayMethod==='card'?'Card — paid in full':null
  const{data:inv,error}=await SB.from('invoices').insert({
    location_id:finalLocId,invoice_number:invNum,date:$('rec-date')?.value||td(),
    due_date:null,status:isPaid?'paid':'record',subtotal:total,total,
    notes:$('ai-notes')?.value?.trim()||null,
    ...(isPaid?{payment_method:_recPayMethod,payment_note:payNote,paid_at:new Date().toISOString()}:{})
  }).select().single()
  if(error){toast('Error saving',false);resetBtn();return}
  await SB.from('invoice_lines').insert(lines.map((l2,i)=>({invoice_id:inv.id,description:l2.description,quantity:l2.quantity,unit_price:l2.unit_price,total:l2.total,sort_order:i})))

  // auto-schedule reinspection if due
  let scheduledMsg=''
  if(_recData.isDue&&finalLocId){
    const scopeBtns=$('rec-scope')?.querySelectorAll('button.ts')||[]
    const scopes=Array.from(scopeBtns).map(b=>b.dataset.k)
    const nextDate=new Date()
    nextDate.setDate(nextDate.getDate()+7)
    const nds=nextDate.toISOString().split('T')[0]
    try{
      await SB.from('jobs').insert({
        location_id:finalLocId,type:'inspection',scope:scopes.length?scopes:['extinguishers','suppression'],
        scheduled_date:nds,scheduled_time:'09:00',status:'scheduled',
        notes:'Reinspection — from old work order ('+($('rec-date')?.value||'')+')'
      })
      scheduledMsg=' + reinspection '+new Date(nds+'T12:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric'})
    }catch(e){console.error('auto-schedule:',e)}
  }

  await load();_recordMode=false;popAll()
  toast('Recorded'+scheduledMsg)
  openInvDetail(inv.id)
}

function addAILine(){
  const wrap=$('ai-li-wrap');if(!wrap)return
  const i=_aiN++
  const d=document.createElement('div');d.className='li-row'
  d.innerHTML=`<input placeholder="Description" id="ald${i}" style="flex:2"><input class="li-qty" type="number" id="alq${i}" value="1" oninput="updateRecTotal()"><input type="number" id="alup${i}" value="0" placeholder="Unit $" oninput="updateRecTotal()" style="width:80px!important;flex:none!important"><input type="number" id="alp${i}" value="0" placeholder="Total" oninput="updateRecTotalFromLine(${i})" style="width:80px!important;flex:none!important;color:var(--fire);font-weight:700">`
  // insert before the total row
  const totalRow=wrap.querySelector('[id=rec-running-total]')?.parentElement
  if(totalRow)wrap.insertBefore(d,totalRow)
  else wrap.appendChild(d)
  updateRecTotal()
}

function updateRecTotal(){
  let total=0
  for(let i=0;i<_aiN;i++){
    const q=parseFloat($('alq'+i)?.value)||1
    const up=parseFloat($('alup'+i)?.value)||0
    const lt=q*up
    const tp=$('alp'+i);if(tp)tp.value=lt.toFixed(2)
    total+=lt
  }
  const el=$('rec-running-total');if(el)el.textContent=fmtD(total)
}

function updateRecTotalFromLine(idx){
  // user edited the line total directly — back-calc unit price
  const q=parseFloat($('alq'+idx)?.value)||1
  const lt=parseFloat($('alp'+idx)?.value)||0
  const up=$('alup'+idx);if(up&&q>0)up.value=(lt/q).toFixed(2)
  // recalc running total
  let total=0
  for(let i=0;i<_aiN;i++){total+=parseFloat($('alp'+i)?.value)||0}
  const el=$('rec-running-total');if(el)el.textContent=fmtD(total)
}

async function sendInvoiceEmail(invId,toEmail,custName,invNum,btn){
  // use whatever is in the editable field if present
  const emailField=$('inv-email-to')
  const to=emailField?emailField.value.trim():toEmail
  if(!to){
    const st=$('inv-email-status');if(st){st.textContent='No email address — enter one above.';st.style.color='var(--bad)'}
    return
  }
  if(btn){btn.innerHTML='<span class="spin"></span> Sending...';btn.style.pointerEvents='none'}
  const st=$('inv-email-status');if(st){st.textContent='Sending...';st.style.color='#888'}

  // fetch full invoice data — reload from DB to ensure fresh state
  const{data:invFresh}=await SB.from('invoices').select('*').eq('id',invId).single()
  const inv=invFresh||D.invs.find(x=>x.id===invId)||{}
  const{data:lines}=await SB.from('invoice_lines').select('*').eq('invoice_id',invId).order('sort_order')
  const ls=lines||[]
  const total=ls.reduce((s,l)=>s+(+l.total||0),0)||+inv.total||0
  const loc=D.locs.find(x=>x.id===inv.location_id)||{}

  // generate portal link
  let portalUrl=''
  try{
    const pToken=await getOrCreatePortalToken(inv.location_id,loc.billing_account_id||null)
    if(pToken)portalUrl='https://stephensadvanced.com/portal?t='+pToken
  }catch(e){console.error('portal token:',e)}

  const html=buildInvoiceEmailHtml({
    invNum:inv.invoice_number||invNum,
    custName:custName||loc.name||'',
    addr:[loc.address,loc.city,loc.state,loc.zip].filter(Boolean).join(', '),
    date:inv.date?new Date(inv.date).toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'}):'',
    dueDate:inv.due_date?new Date(inv.due_date).toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'}):'',
    lines:ls,
    total,
    portalUrl
  })

  try{
    const res=await fetch('/api/send-email',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        to,
        subject:`Invoice ${inv.invoice_number||invNum} — Stephens Advanced LLC`,
        html,
        invoiceNumber:inv.invoice_number||invNum,
        customerName:custName||loc.name||''
      })
    })
    const data=await res.json()
    if(data.success){
      // update invoice status to sent + record email
      await SB.from('invoices').update({status:'sent'}).eq('id',invId)
      await load()
      if(st){st.textContent='✓ Email sent to '+to;st.style.color='var(--ok)'}
      if(btn){btn.innerHTML='✓ Sent';btn.style.background='var(--ok)'}
      toast('Invoice emailed ✓')
    }else{
      throw new Error(data.error||'Send failed')
    }
  }catch(err){
    if(st){st.textContent='Error: '+err.message;st.style.color='var(--bad)'}
    if(btn){btn.innerHTML='✉️ Send Email';btn.style.pointerEvents=''}
    toast('Email failed — check credentials',false)
    console.error(err)
  }
}

async function getOrCreatePortalToken(locId,baId){
  // check for existing token
  const col=baId?'billing_account_id':'location_id'
  const val=baId||locId
  if(!val)return null
  const{data:existing}=await SB.from('portal_tokens').select('token').eq(col,val).eq('is_active',true).limit(1)
  if(existing?.[0])return existing[0].token
  // generate new token
  const arr=new Uint8Array(16);crypto.getRandomValues(arr)
  const token=Array.from(arr,b=>b.toString(16).padStart(2,'0')).join('')
  await SB.from('portal_tokens').insert({token,location_id:locId||null,billing_account_id:baId||null})
  return token
}

  if(nSt.mk){
    const nm=$('nn')?.value?.trim();if(!nm){toast('Enter business name',false);setLoad('saveJobBtn',false,'Create Job');return}

  const ty=document.querySelector('#nTy button.on')?.dataset.k||'inspection'

  const jobDate=$('ndt')?.value||new Date(Date.now()+86400000).toISOString().split('T')[0]

  go(document.querySelector('[data-v="vJobs"]'))
  // offer to add to iPhone calendar
  const calLoc=D.locs.find(x=>x.id===lid)||{}
  addToCalendar({
    title:'Stephens Advanced — '+(calLoc.name||'Job'),
    date:jobDate,time:jobTime,
    addr:[calLoc.address,calLoc.city].filter(Boolean).join(', '),
    notes:jobNoteTxt
  })
}

function addToCalendar({title,date,time,addr,notes}){
  const fmtDT=(d,t)=>(d+'T'+t+':00').replace(/-|:/g,'')
  const endHr=(parseInt((time||'09').split(':')[0])+2).toString().padStart(2,'0')
  const endTime=endHr+':'+(time||'09:00').split(':')[1]
  const ics=[
    'BEGIN:VCALENDAR',
    'VERSION:2.0',
    'PRODID:-//Stephens Advanced//App//EN',
    'BEGIN:VEVENT',
    'DTSTART:'+fmtDT(date,time),
    'DTEND:'+fmtDT(date,endTime),
    'SUMMARY:'+title,
    addr?'LOCATION:'+addr:'',
    notes?'DESCRIPTION:'+notes.replace(/\n/g,'\\n'):'',
    'END:VEVENT',
    'END:VCALENDAR'
  ].filter(Boolean).join('\r\n')
  const blob=new Blob([ics],{type:'text/calendar;charset=utf-8'})
  const url=URL.createObjectURL(blob)
  const a=document.createElement('a');a.href=url;a.download='stephens-job.ics';a.click()
  setTimeout(()=>URL.revokeObjectURL(url),5000)
}

async function sendInvoiceEmailFromDetail(invId,custName,invNum){
  const to=$('det-email-to')?.value?.trim()
  const st=$('det-email-status')
  const btn=$('det-send-btn')
  if(!to){if(st){st.textContent='Enter an email address.';st.style.color='var(--bad)'}return}
  if(btn){btn.innerHTML='<span class="spin"></span>';btn.style.pointerEvents='none'}
  if(st){st.textContent='Sending...';st.style.color='var(--g1)'}
  const{data:invFresh2}=await SB.from('invoices').select('*').eq('id',invId).single()
  const inv=invFresh2||D.invs.find(x=>x.id===invId)||{}
  const{data:lines}=await SB.from('invoice_lines').select('*').eq('invoice_id',invId).order('sort_order')
  const ls=lines||[]
  const total=ls.reduce((s,l)=>s+(+l.total||0),0)||+inv.total||0
  const loc=D.locs.find(x=>x.id===inv.location_id)||{}
  let portalUrl2=''
  try{const pTk=await getOrCreatePortalToken(inv.location_id,loc.billing_account_id||null);if(pTk)portalUrl2='https://stephensadvanced.com/portal?t='+pTk}catch(e){}
  const html=buildInvoiceEmailHtml({
    invNum:inv.invoice_number||invNum,custName:custName||loc.name||'',
    addr:[loc.address,loc.city,loc.state,loc.zip].filter(Boolean).join(', '),
    date:inv.date?new Date(inv.date).toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'}):'',
    dueDate:inv.due_date?new Date(inv.due_date).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}):'',
    lines:ls,total,portalUrl:portalUrl2
  })
  // attach ALL inspection reports for this job
  let attachments=[]
  if(inv.job_id){
    try{
      const{data:rpts}=await SB.from('reports').select('report_data,report_type').eq('job_id',inv.job_id).order('created_at')
      if(rpts?.length){
        rpts.forEach((rpt,ri)=>{
          let rHtml=rpt.report_data?.reportHtml||''
          // generate HTML for extinguisher reports (they don't have reportHtml)
          if(!rHtml&&rpt.report_type==='extinguisher'&&rpt.report_data?.units){
            rHtml=buildExtReportHtml(rpt.report_data,loc)
          }
          if(!rHtml)return
          const sysLoc=rpt.report_data?.sysLocation||''
          const rType=rpt.report_type==='extinguisher'?'extinguisher-report':rpt.report_type==='clean_agent'?'clean-agent-report':'suppression-report'
          const suffix=rpts.length>1?'-'+(sysLoc||ri+1):''
          const bytes=new TextEncoder().encode(rHtml)
          let bin='';bytes.forEach(b2=>bin+=String.fromCharCode(b2))
          attachments.push({filename:rType+suffix+'.html',content:btoa(bin)})
        })
      }
    }catch(e){console.error('report attach:',e)}
  }
  try{
    const res=await fetch('/api/send-email',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({to,subject:`Invoice ${inv.invoice_number||invNum} — Stephens Advanced LLC`,html,invoiceNumber:inv.invoice_number||invNum,customerName:custName||loc.name||'',attachments})
    })
    const data=await res.json()
    if(data.success){
      await SB.from('invoices').update({status:'sent'}).eq('id',invId)
      await load()
      if(st){st.textContent=`✓ Sent to ${to}${attachments.length?' + report':''}`; st.style.color='var(--ok)'}
      if(btn){btn.innerHTML='✓ Sent';btn.style.background='var(--ok)'}
      toast('Invoice emailed ✓'+(attachments.length?' with report':''))
    }else{throw new Error(data.error||'Send failed')}
  }catch(err){
    if(st){st.textContent='Error: '+err.message;st.style.color='var(--bad)'}
    if(btn){btn.innerHTML='✉️ Send';btn.style.pointerEvents=''}
    toast('Email failed',false)
  }
}

async function delJob(id){
  // cascade: invoice_lines → invoices → reports → extinguisher_results → job
  try{
    const{data:invs}=await SB.from('invoices').select('id').eq('job_id',id)
    const invIds=(invs||[]).map(i=>i.id)
    if(invIds.length)await SB.from('invoice_lines').delete().in('invoice_id',invIds)
    if(invIds.length)await SB.from('invoices').delete().in('id',invIds)
    await SB.from('reports').delete().eq('job_id',id)
    await SB.from('extinguisher_results').delete().eq('job_id',id)
  }catch(e){console.error('delJob cascade:',e)}
  const{error}=await SB.from('jobs').delete().eq('id',id)
  if(error){toast('Error deleting job',false);return}
  await load();toast('Job deleted')
  popAll()
  rJobs();rDash()
}

async function delCust(id){
  // cascade: extinguisher_results, suppression_results, invoice_lines, invoices, jobs, extinguishers, suppression_systems, emergency_lights, then location
  const jobIds=D.jobs.filter(j=>j.location_id===id||j.location?.id===id).map(j=>j.id)
  const invIds=D.invs.filter(i=>i.location_id===id).map(i=>i.id)
  if(invIds.length)await SB.from('invoice_lines').delete().in('invoice_id',invIds)
  if(invIds.length)await SB.from('invoices').delete().in('id',invIds)
  if(jobIds.length){try{await SB.from('extinguisher_results').delete().in('job_id',jobIds)}catch(e){}}
  if(jobIds.length)await SB.from('jobs').delete().in('id',jobIds)
  try{await SB.from('extinguishers').delete().eq('location_id',id)}catch(e){}
  try{await SB.from('suppression_systems').delete().eq('location_id',id)}catch(e){}
  try{await SB.from('emergency_lights').delete().eq('location_id',id)}catch(e){}
  const{error}=await SB.from('locations').delete().eq('id',id)
  if(error){toast('Error deleting client',false);return}
  await load();toast('Client deleted')
  popAll();rCust()
}

async function openExtReport(jobId,editMode){
  const j=D.jobs.find(x=>x.id===jobId);if(!j)return
  const l=D.locs.find(x=>x.id===(j.location_id||j.location?.id))||j.location||{}
  const exts=l.extinguishers||[]

  const{data:prevRpt}=await SB.from('reports').select('report_data').eq('job_id',jobId).eq('report_type','extinguisher').limit(1)
  const prev=prevRpt?.[0]?.report_data||{}
  const hasSaved=!!prevRpt?.length

  _extRptData=exts.map((e,i)=>{
    // match by id first, then by index
    const p=(prev.units||[]).find(u=>u.id===e.id)||(prev.units||[])[i]||{}
    return{
      id:e.id,type:p.type||e.type||'',size:p.size||e.size||'',
      location:p.location||e.location_in_building||'',
      mfgDate:p.mfgDate||e.manufacture_date||'',
      lastInternal:p.lastInternal||e.last_internal||'',
      lastHydro:p.lastHydro||e.last_hydro||'',condition:p.condition||'pass',
      notes:p.notes||'',photoB64:p.photoB64||''
    }
  })

  // if report exists and not in edit mode, show summary view
  if(hasSaved&&!editMode){
    showExtReportSummary(jobId,l)
    return
  }

  // edit mode — show one extinguisher at a time
  _extRptIdx=0
  if(exts.length)showExtEntry(jobId,l)
  else showExtEmpty(jobId,l)
}

async function finishExtReport(jobId){
  const j=D.jobs.find(x=>x.id===jobId)||{}
  const locId=j.location_id||j.location?.id
  const data={units:_extRptData,savedAt:new Date().toISOString()}
  try{
    const{data:existing}=await SB.from('reports').select('id').eq('job_id',jobId).eq('report_type','extinguisher').limit(1)
    if(existing?.length){await SB.from('reports').update({report_data:data}).eq('id',existing[0].id)}
    else{await SB.from('reports').insert({job_id:jobId,location_id:locId,report_type:'extinguisher',report_data:data})}
  }catch(e){console.error('ext report save:',e)}
  for(const d of _extRptData){
    if(!d.id)continue
    const upd={};if(d.lastInternal)upd.last_internal=d.lastInternal;if(d.lastHydro)upd.last_hydro=d.lastHydro
    if(Object.keys(upd).length){try{await SB.from('extinguishers').update(upd).eq('id',d.id)}catch(e){}}
  }
  toast('Extinguisher report saved ✓')
  await load()
  popAll()
  openJob(jobId)
}
