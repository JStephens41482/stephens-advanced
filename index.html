<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0d0f14">
<title>Stephens Advanced</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0d0f14;--c1:#151820;--c2:#1c1f2a;--c3:#252937;
  --b1:#2a2f3e;--b2:#353b4d;
  --w:#f0f1f4;--w2:#c8ccd6;--g1:#7c8497;--g2:#555d72;--g3:#3d4456;
  --fire:#f05a28;--fire2:#ff7847;--fires:rgba(240,90,40,.08);--firem:rgba(240,90,40,.15);
  --ok:#10b981;--oks:rgba(16,185,129,.08);
  --warn:#f59e0b;--warns:rgba(245,158,11,.08);
  --bad:#ef4444;--bads:rgba(239,68,68,.08);
  --info:#6366f1;--infos:rgba(99,102,241,.08);
  --r:12px;--rs:8px;
}
html,body{height:100%;overflow:hidden;overscroll-behavior:none}
body{font-family:'Inter',system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--w);font-size:14px;line-height:1.45;-webkit-font-smoothing:antialiased}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,select,textarea{font-family:inherit;color:var(--w);background:var(--c1);border:1.5px solid var(--b1);border-radius:var(--rs);padding:11px 13px;font-size:14px;outline:none;width:100%;transition:border-color .15s}
input:focus,select:focus,textarea:focus{border-color:var(--fire)}
input::placeholder,textarea::placeholder{color:var(--g2)}
textarea{resize:none;min-height:60px}
select{-webkit-appearance:none;appearance:none}
::-webkit-scrollbar{width:0;height:0}

/* ═══ SHELL ═══ */
#app{display:flex;flex-direction:column;height:100dvh}

/* ═══ HEADER ═══ */
.hdr{padding:max(env(safe-area-inset-top),10px) 16px 10px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;border-bottom:1px solid var(--b1);background:var(--bg)}
.hdr-logo{font-size:17px;font-weight:900;letter-spacing:-.4px}
.hdr-logo span{color:var(--fire)}
.hdr-r{display:flex;align-items:center;gap:12px}
.hdr-date{font-size:11px;color:var(--g1);font-weight:600}
.hdr-btn{width:32px;height:32px;border-radius:50%;background:var(--c2);display:flex;align-items:center;justify-content:center;font-size:16px}

/* ═══ NAV ═══ */
.nav{display:flex;border-top:1px solid var(--b1);background:var(--c1);padding:4px 0 max(env(safe-area-inset-bottom),20px);flex-shrink:0}
.nav button{flex:1;display:flex;flex-direction:column;align-items:center;gap:1px;padding:8px 0;color:var(--g2);transition:color .15s}
.nav button.on{color:var(--fire)}
.nav .ni{font-size:20px;line-height:1}
.nav .nt{font-size:9px;font-weight:700;letter-spacing:.6px;text-transform:uppercase;margin-top:2px}

/* ═══ VIEWS ═══ */
.vw{display:none;flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
.vw.on{display:block}
.vw-pad{padding:12px 16px 140px}

/* ═══ STATS ═══ */
.stats{display:grid;gap:8px;margin-bottom:16px}
.stats-3{grid-template-columns:repeat(3,1fr)}
.stats-2{grid-template-columns:repeat(2,1fr)}
.st{background:var(--c1);border:1px solid var(--b1);border-radius:var(--r);padding:16px 10px;text-align:center}
.st-n{font-size:24px;font-weight:800;line-height:1;font-variant-numeric:tabular-nums}
.st-n.o{color:var(--fire)}.st-n.g{color:var(--ok)}.st-n.y{color:var(--warn)}.st-n.r{color:var(--bad)}.st-n.i{color:var(--info)}
.st-l{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:1.2px;color:var(--g1);margin-top:6px}

/* ═══ SECTION ═══ */
.sec{margin:20px 0 10px;display:flex;align-items:center;justify-content:space-between}
.sec-t{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:1.8px;color:var(--g2)}
.sec-a{font-size:11px;font-weight:700;color:var(--fire);padding:4px 8px}

/* ═══ TRUCK READINESS ═══ */
.trk{background:var(--c1);border:1px solid var(--b1);border-radius:var(--r);padding:14px;margin-bottom:16px}
.trk-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.trk-t{font-size:14px;font-weight:700}
.pill{font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:.6px;padding:4px 12px;border-radius:20px}
.pill-ok{background:var(--oks);color:var(--ok)}.pill-chk{background:var(--warns);color:var(--warn)}.pill-no{background:var(--bads);color:var(--bad)}
.trk-chips{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px}
.trk-chip{display:inline-flex;align-items:center;gap:5px;background:var(--c2);border:1px solid var(--b1);border-radius:var(--rs);padding:7px 11px;font-size:12px;font-weight:500}
.trk-chip b{font-weight:800;color:var(--fire);font-variant-numeric:tabular-nums}
.trk-btn{width:100%;padding:12px;border-radius:var(--rs);font-size:13px;font-weight:800;letter-spacing:.3px;transition:all .15s}
.trk-btn:active{transform:scale(.98)}
.trk-go{background:var(--fire);color:#fff}
.trk-ok{background:var(--ok);color:#fff}

/* ═══ JOB CARD ═══ */
.jc{background:var(--c1);border:1px solid var(--b1);border-radius:var(--r);padding:14px 14px 14px 18px;margin-bottom:8px;position:relative;overflow:hidden;transition:border-color .12s}
.jc:active{border-color:var(--fire)}
.jc::after{content:'';position:absolute;left:0;top:0;bottom:0;width:3.5px;border-radius:0 2px 2px 0}
.jc.j-bl::after{background:var(--info)}.jc.j-gn::after{background:var(--ok)}.jc.j-rd::after{background:var(--bad)}.jc.j-gy::after{background:var(--g3)}
.jc-r1{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:4px}
.jc-nm{font-size:15px;font-weight:700;line-height:1.25;flex:1;margin-right:8px}
.jc-tm{font-size:11px;font-weight:600;color:var(--g1);white-space:nowrap;font-variant-numeric:tabular-nums}
.jc-addr{font-size:11px;color:var(--g1);margin-bottom:8px;line-height:1.3}
.jc-tags{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:8px}
.tg{font-size:8.5px;font-weight:800;text-transform:uppercase;letter-spacing:.7px;padding:3.5px 8px;border-radius:4px}
.tg-s{background:var(--fires);color:var(--fire)}.tg-e{background:var(--oks);color:var(--ok)}.tg-l{background:var(--warns);color:var(--warn)}
.tg-h{background:var(--infos);color:var(--info)}.tg-o{background:var(--bads);color:var(--bad)}.tg-b{background:rgba(168,85,247,.08);color:#a78bfa}
.jc-val{font-size:15px;font-weight:800;color:var(--ok);font-variant-numeric:tabular-nums;margin-bottom:10px}
.jc-btns{display:flex;gap:6px}
.jb{flex:1;padding:11px;border-radius:var(--rs);font-size:12px;font-weight:800;text-transform:uppercase;letter-spacing:.5px;transition:all .1s}
.jb:active{transform:scale(.97)}
.jb-nav{background:var(--c2);border:1px solid var(--b1);color:var(--w2)}
.jb-go{background:var(--fire);color:#fff}
.jb-act{background:var(--ok);color:#fff}

/* ═══ CUSTOMER CARD ═══ */
.cc{background:var(--c1);border:1px solid var(--b1);border-radius:var(--r);padding:14px;margin-bottom:8px;transition:border-color .12s}
.cc:active{border-color:var(--fire)}
.cc-nm{font-size:15px;font-weight:700}
.cc-addr{font-size:11px;color:var(--g1);margin-top:3px}
.cc-meta{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px;font-size:11px;color:var(--g1)}
.cc-meta b{color:var(--w2);font-weight:700}
.cc-bry{color:var(--warn);font-weight:700}

/* ═══ INVOICE CARD ═══ */
.ic{background:var(--c1);border:1px solid var(--b1);border-radius:var(--r);padding:14px;margin-bottom:8px}
.ic-r1{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:4px}
.ic-num{font-size:14px;font-weight:700}
.ic-dt{font-size:11px;color:var(--g1)}
.ic-amt{font-size:16px;font-weight:800;margin-top:4px;font-variant-numeric:tabular-nums}
.badge{font-size:8.5px;font-weight:800;text-transform:uppercase;letter-spacing:.6px;padding:3.5px 10px;border-radius:20px}
.b-paid{background:var(--oks);color:var(--ok)}.b-sent{background:var(--infos);color:var(--info)}.b-over{background:var(--bads);color:var(--bad)}.b-draft{background:rgba(124,132,151,.08);color:var(--g1)}

/* ═══ SEARCH ═══ */
.srch{margin-bottom:12px}

/* ═══ EMPTY STATE ═══ */
.ey{text-align:center;padding:60px 24px;color:var(--g2)}
.ey-i{font-size:44px;margin-bottom:12px;opacity:.2}
.ey-t{font-size:13px;line-height:1.6}

/* ═══ FAB ═══ */
.fab{position:fixed;bottom:78px;right:16px;width:54px;height:54px;border-radius:16px;background:var(--fire);color:#fff;font-size:28px;font-weight:300;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 24px rgba(240,90,40,.3);z-index:80;transition:transform .1s}
.fab:active{transform:scale(.9)}

/* ═══ OVERLAY ═══ */
.ov{display:none;position:fixed;inset:0;z-index:100;background:var(--bg);flex-direction:column}
.ov.open{display:flex}
.ov-hdr{display:flex;align-items:center;gap:10px;padding:max(env(safe-area-inset-top),10px) 16px 10px;border-bottom:1px solid var(--b1);flex-shrink:0;background:var(--bg)}
.ov-back{font-size:24px;padding:4px;color:var(--g1);line-height:1}
.ov-title{font-size:17px;font-weight:700;flex:1}
.ov-body{flex:1;overflow-y:auto;padding:16px 16px 160px;-webkit-overflow-scrolling:touch}
.ov-foot{position:fixed;bottom:0;left:0;right:0;padding:12px 16px max(env(safe-area-inset-bottom),20px);background:var(--c1);border-top:1px solid var(--b1);z-index:101}

/* ═══ DETAIL SECTION ═══ */
.ds{margin-bottom:20px}
.ds-t{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:1.8px;color:var(--g2);margin-bottom:8px}
.ds-info{font-size:13px;color:var(--g1);line-height:1.6}
.ds-info a{color:var(--fire)}

/* ═══ EQUIPMENT ROW ═══ */
.eq{background:var(--c1);border:1px solid var(--b1);border-radius:10px;padding:12px;margin-bottom:6px}
.eq-r1{display:flex;justify-content:space-between;align-items:flex-start}
.eq-nm{font-size:13px;font-weight:700}
.eq-sub{font-size:11px;color:var(--g1);margin-top:2px;line-height:1.4}
.eq-pr{font-size:14px;font-weight:800;color:var(--ok);font-variant-numeric:tabular-nums;white-space:nowrap}
.eq-flags{display:flex;gap:4px;margin-top:4px;flex-wrap:wrap}
.eq-flag{font-size:8px;font-weight:800;text-transform:uppercase;letter-spacing:.5px;padding:2px 6px;border-radius:3px}
.eq-flag.due{background:var(--warns);color:var(--warn)}.eq-flag.over{background:var(--bads);color:var(--bad)}

/* ═══ STATUS BUTTONS ═══ */
.sb-row{display:flex;flex-wrap:wrap;gap:4px;margin-top:8px}
.sb{padding:8px 12px;border-radius:var(--rs);font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.4px;border:1.5px solid var(--b1);background:var(--c2);color:var(--g2);transition:all .1s}
.sb:active{transform:scale(.95)}
.sb.s-p{background:var(--oks);color:var(--ok);border-color:var(--ok)}
.sb.s-s{background:var(--warns);color:var(--warn);border-color:var(--warn)}
.sb.s-r{background:var(--fires);color:var(--fire);border-color:var(--fire)}
.sb.s-c{background:var(--bads);color:var(--bad);border-color:var(--bad)}
.sb.s-x{background:rgba(124,132,151,.1);color:var(--g1);border-color:var(--g2)}

/* ═══ SIGNATURE ═══ */
.sig-wrap{background:#fff;border-radius:var(--r);height:130px;position:relative;touch-action:none}
.sig-wrap canvas{width:100%;height:100%;border-radius:var(--r);display:block}
.sig-ph{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:#b0b0b0;font-size:13px;font-weight:500;pointer-events:none}
.sig-clr{position:absolute;top:6px;right:6px;background:rgba(0,0,0,.45);color:#fff;border-radius:6px;padding:4px 10px;font-size:10px;font-weight:700}

/* ═══ PRIMARY BUTTON ═══ */
.btn-p{width:100%;padding:16px;border-radius:var(--r);background:var(--fire);color:#fff;font-size:15px;font-weight:800;letter-spacing:.2px;transition:all .1s}
.btn-p:active{transform:scale(.98);opacity:.9}
.btn-p:disabled{opacity:.4}

/* ═══ FORM ELEMENTS ═══ */
.fg{margin-bottom:14px}
.fg-l{display:block;font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:1.2px;color:var(--g2);margin-bottom:6px}
.fg-row{display:grid;gap:8px}
.fg-row2{grid-template-columns:1fr 1fr}
.fg-row3{grid-template-columns:2fr 1fr 1fr}

/* ═══ TOGGLE CHIPS ═══ */
.tgl{display:flex;flex-wrap:wrap;gap:6px}
.tgl button{padding:9px 15px;border-radius:var(--rs);font-size:12px;font-weight:700;border:1.5px solid var(--b1);background:var(--c1);color:var(--g2);transition:all .1s}
.tgl button:active{transform:scale(.96)}
.tgl button.on{border-color:var(--fire);background:var(--fires);color:var(--fire)}
.tgl button.gn{border-color:var(--ok);background:var(--oks);color:var(--ok)}

/* ═══ AUTOCOMPLETE ═══ */
.ac{position:relative}
.ac-dd{position:absolute;left:0;right:0;top:100%;margin-top:4px;background:var(--c2);border:1px solid var(--b1);border-radius:var(--r);max-height:220px;overflow-y:auto;z-index:20;box-shadow:0 12px 40px rgba(0,0,0,.5);display:none}
.ac-dd.vis{display:block}
.ac-it{padding:11px 14px;border-bottom:1px solid var(--b1);transition:background .08s}
.ac-it:last-child{border-bottom:none}
.ac-it:active{background:var(--c3)}
.ac-n{font-size:13px;font-weight:600}
.ac-d{font-size:11px;color:var(--g1);margin-top:1px}
.ac-new{padding:12px 14px;background:var(--fires)}
.ac-new:active{background:var(--firem)}
.ac-new .ac-n{color:var(--fire);font-weight:700}

/* ═══ INLINE CREATE ═══ */
.inl{background:var(--c1);border:1.5px solid rgba(240,90,40,.2);border-radius:var(--r);padding:14px;margin-top:6px}
.inl-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.inl-hdr span{font-size:10px;font-weight:800;color:var(--fire);text-transform:uppercase;letter-spacing:1.2px}
.inl-hdr button{font-size:11px;color:var(--g1);padding:4px}
.inl input{margin-bottom:8px;background:var(--c2);font-size:13px;padding:10px 12px}
.inl .r2{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.inl .r3{display:grid;grid-template-columns:2fr 1fr 1fr;gap:6px}

/* ═══ INVOICE MODAL ═══ */
.inv-ov{display:none;position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.92);overflow-y:auto;padding:16px}
.inv-ov.open{display:block}
.inv-p{background:#fff;color:#111;border-radius:16px;padding:28px 22px;max-width:440px;margin:20px auto}
.inv-p h2{font-size:20px;font-weight:900}
.inv-p .co{font-size:11px;color:#888;margin-bottom:16px}
.inv-p .dt{font-size:12px;color:#999;margin-bottom:4px}
.inv-p .to{font-size:14px;padding-bottom:12px;border-bottom:1px solid #eee;margin-bottom:10px}
.inv-p .to strong{display:block;font-size:15px;font-weight:700}
.inv-ln{display:flex;justify-content:space-between;padding:7px 0;font-size:13px;border-bottom:1px solid #f5f5f5}
.inv-ln .d{flex:1;padding-right:8px}.inv-ln .a{font-weight:700;white-space:nowrap;font-variant-numeric:tabular-nums}
.inv-tot{display:flex;justify-content:space-between;margin-top:14px;padding-top:14px;border-top:2.5px solid #111;font-size:20px;font-weight:900}
.inv-acts{display:flex;gap:8px;margin-top:20px}
.inv-acts button{flex:1;padding:14px;border-radius:var(--r);font-size:14px;font-weight:700}
.inv-close{background:#f0f0f0;color:#333}
.inv-send{background:var(--fire);color:#fff}

/* ═══ TOAST ═══ */
.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%) translateY(12px);background:var(--ok);color:#fff;padding:10px 24px;border-radius:30px;font-size:13px;font-weight:700;z-index:300;opacity:0;transition:all .2s;pointer-events:none;white-space:nowrap}
.toast.vis{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<div id="app">
  <div class="hdr">
    <div class="hdr-logo">Stephens <span>Advanced</span></div>
    <div class="hdr-r"><div class="hdr-date" id="hdrDate"></div></div>
  </div>

  <div class="vw on" id="vDash"><div class="vw-pad" id="dashC"></div></div>
  <div class="vw" id="vJobs"><div class="vw-pad" id="jobsC"></div></div>
  <div class="vw" id="vCust"><div class="vw-pad" id="custC"></div></div>
  <div class="vw" id="vMoney"><div class="vw-pad" id="moneyC"></div></div>

  <button class="fab" onclick="openNew()">+</button>

  <div class="nav">
    <button class="on" data-v="vDash" onclick="go(this)"><span class="ni">⚡</span><span class="nt">Today</span></button>
    <button data-v="vJobs" onclick="go(this)"><span class="ni">📋</span><span class="nt">Jobs</span></button>
    <button data-v="vCust" onclick="go(this)"><span class="ni">👤</span><span class="nt">Clients</span></button>
    <button data-v="vMoney" onclick="go(this)"><span class="ni">💰</span><span class="nt">Money</span></button>
  </div>
</div>

<div class="ov" id="jobOv"></div>
<div class="ov" id="newOv"></div>
<div class="inv-ov" id="invOv"></div>
<div class="toast" id="toast"></div>

<script>
const SB=supabase.createClient('https://motjasdokoxwiodwzyps.supabase.co','sb_publishable_9lsQtlPsnPjeODdys7EKMw_cpXeppYb')
document.getElementById('hdrDate').textContent=new Date().toLocaleDateString('en-US',{weekday:'long',month:'short',day:'numeric'})

let D={jobs:[],locs:[],invs:[],bas:[],rc:{}}
let extR={}

async function load(){
  const[j,l,i,b,r]=await Promise.all([
    SB.from('jobs').select('*,location:locations(*)').order('scheduled_date').order('scheduled_time'),
    SB.from('locations').select('*,extinguishers(id,type,size,serial_number,location_in_building,manufacture_date),suppression_systems(id,system_type,category,tank_count,nozzle_count,fusible_link_count),emergency_lights(id,fixture_count),billing_account:billing_accounts(*)').order('name'),
    SB.from('invoices').select('*').order('date',{ascending:false}).limit(50),
    SB.from('billing_accounts').select('*').order('name'),
    SB.from('rate_card').select('key,price')
  ])
  D.jobs=j.data||[];D.locs=l.data||[];D.invs=i.data||[];D.bas=b.data||[]
  const rc={};(r.data||[]).forEach(x=>rc[x.key]=+x.price);D.rc=rc
}

const td=()=>new Date().toISOString().split('T')[0]
const $=id=>document.getElementById(id)
const fmt=n=>'$'+Math.round(n).toLocaleString()
const esc=s=>(s||'').replace(/'/g,"\\'").replace(/"/g,'&quot;')

function cart(s){const t=s.system_type||'';if(t.includes('R-102')||t.includes('Piranha'))return s.tank_count>1?'LT-30':'LT-10';if(t.includes('Pyro')||t.includes('Knight'))return '16g CO2';if(t.includes('Buck'))return 'Buckeye N2';if(t.includes('Kidde'))return 'Kidde XV N2';return'Cart'}

function est(j){
  const l=j.location||{},rc=D.rc,sc=j.scope||[];let t=0
  if(sc.includes('extinguishers'))t+=(l.extinguishers?.length||0)*(rc.extinguisher_inspection||20)
  if(sc.includes('suppression'))for(const s of(l.suppression_systems||[])){
    let b=rc.suppression_standard||250;if(s.category==='captiveaire_tank')b=rc.suppression_captiveaire_tank||450;if(s.category==='captiveaire_core')b=rc.suppression_captiveaire_core||650
    t+=b+((s.tank_count-1)*(rc.suppression_additional_tank||50))+(s.fusible_link_count||0)*(rc.fusible_link||25)+(s.nozzle_count||0)*(rc.metal_blowoff_cap||25)
  }
  if(sc.includes('elights'))t+=(l.emergency_lights?.[0]?.fixture_count||0)*(rc.emergency_light||20)
  return t
}

function tLoad(jobs){let tg=0,lk=0,cp=0,ct=[];jobs.forEach(j=>{const l=j.location||{},sc=j.scope||[]
  if(sc.includes('extinguishers'))tg+=l.extinguishers?.length||0
  if(sc.includes('suppression'))for(const s of(l.suppression_systems||[])){lk+=s.fusible_link_count||0;cp+=s.nozzle_count||0;ct.push(cart(s))}
});return{tg,lk,cp,ct}}

function go(btn){
  const v=btn.dataset.v;document.querySelectorAll('.vw').forEach(e=>{e.classList.remove('on')});$(v).classList.add('on')
  document.querySelectorAll('.nav button').forEach(b=>b.classList.remove('on'));btn.classList.add('on')
  if(v==='vDash')rDash();if(v==='vJobs')rJobs();if(v==='vCust')rCust();if(v==='vMoney')rMoney()
}

function toast(m){const t=$('toast');t.textContent=m;t.classList.add('vis');setTimeout(()=>t.classList.remove('vis'),2500)}

// ═══ DASHBOARD ═══
function rDash(){
  const t=td(),tj=D.jobs.filter(j=>j.scheduled_date===t),ov=D.jobs.filter(j=>j.status==='scheduled'&&j.scheduled_date<t),e=tj.reduce((s,j)=>s+est(j),0),ld=tLoad(tj)
  let h=`<div class="stats stats-3"><div class="st"><div class="st-n o">${tj.length}</div><div class="st-l">Today</div></div><div class="st"><div class="st-n g">${fmt(e)}</div><div class="st-l">Estimated</div></div><div class="st"><div class="st-n ${ov.length?'r':'g'}">${ov.length}</div><div class="st-l">Overdue</div></div></div>`
  h+=`<div class="trk"><div class="trk-top"><div class="trk-t">🔧 Truck Load</div><span class="pill pill-chk" id="trkP">Check</span></div><div class="trk-chips">`
  if(!tj.length)h+=`<span class="trk-chip">No jobs today</span>`;else{
    if(ld.tg)h+=`<span class="trk-chip"><b>${ld.tg}</b> Tags</span>`;if(ld.lk)h+=`<span class="trk-chip"><b>${ld.lk}</b> Links</span>`;if(ld.cp)h+=`<span class="trk-chip"><b>${ld.cp}</b> Caps</span>`
    ld.ct.forEach(c=>h+=`<span class="trk-chip"><b>1</b> ${c}</span>`)
  }
  h+=`</div><button class="trk-btn trk-go" onclick="this.textContent='✓ Ready';this.className='trk-btn trk-ok';$('trkP').className='pill pill-ok';$('trkP').textContent='Ready';toast('Truck confirmed')">I have everything</button></div>`
  if(tj.length){h+=`<div class="sec"><div class="sec-t">Today's Jobs</div></div>`;tj.forEach(j=>h+=jcH(j))}
  if(ov.length){h+=`<div class="sec"><div class="sec-t">Overdue · ${ov.length}</div></div>`;ov.slice(0,5).forEach(j=>h+=jcH(j,true))}
  $('dashC').innerHTML=h
}

function jcH(j,isOv){
  const l=j.location||{},sc=j.scope||[],v=est(j),a=[l.address,l.city].filter(Boolean).join(', ')
  const ds=j.scheduled_date?new Date(j.scheduled_date+'T12:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric'}):''
  const cls=isOv?'j-rd':j.status==='active'?'j-gn':j.status==='completed'?'j-gy':'j-bl'
  return`<div class="jc ${cls}" onclick="openJob('${j.id}')"><div class="jc-r1"><div class="jc-nm">${l.name||'Unknown'}</div><div class="jc-tm">${ds} ${(j.scheduled_time||'').slice(0,5)}</div></div><div class="jc-addr">${a||'No address'}</div><div class="jc-tags">${sc.includes('suppression')?'<span class="tg tg-s">Suppression</span>':''}${sc.includes('extinguishers')?'<span class="tg tg-e">Extinguishers</span>':''}${sc.includes('elights')?'<span class="tg tg-l">E-Lights</span>':''}${sc.includes('hydro')?'<span class="tg tg-h">Hydro</span>':''}${isOv?'<span class="tg tg-o">Overdue</span>':''}${l.is_brycer_jurisdiction?'<span class="tg tg-b">Brycer</span>':''}</div><div class="jc-val">${fmt(v)}</div><div class="jc-btns"><button class="jb jb-nav" onclick="event.stopPropagation();window.open('https://maps.apple.com/?daddr='+encodeURIComponent('${esc(a)}'))">Navigate</button><button class="jb jb-go" onclick="event.stopPropagation();stJ('${j.id}')">Start Job</button></div></div>`
}

async function stJ(id){await SB.from('jobs').update({status:'active',started_at:new Date().toISOString()}).eq('id',id);toast('Job started · Customer notified');await load();rDash()}

// ═══ JOBS VIEW ═══
function rJobs(){
  const t=td(),all=D.jobs.filter(j=>j.status!=='cancelled'),ov=all.filter(j=>j.status==='scheduled'&&j.scheduled_date<t),up=all.filter(j=>j.status==='scheduled'&&j.scheduled_date>=t),done=all.filter(j=>j.status==='completed').slice(0,10)
  let h=`<div class="sec" style="margin-top:8px"><div class="sec-t">All Jobs</div></div>`
  if(ov.length){h+=`<div class="sec"><div class="sec-t" style="color:var(--bad)">Overdue · ${ov.length}</div></div>`;ov.forEach(j=>h+=jcH(j,true))}
  if(up.length){h+=`<div class="sec"><div class="sec-t">Scheduled</div></div>`;up.forEach(j=>h+=jcH(j))}
  if(done.length){h+=`<div class="sec"><div class="sec-t">Completed</div></div>`;done.forEach(j=>h+=jcH(j))}
  if(!all.length)h=`<div class="ey"><div class="ey-i">📋</div><div class="ey-t">No jobs yet. Tap + to create one.</div></div>`
  $('jobsC').innerHTML=h
}

// ═══ JOB DETAIL ═══
async function openJob(id){
  await load();const j=D.jobs.find(x=>x.id===id);if(!j)return;extR={};const l=j.location||{},sc=j.scope||[],rc=D.rc
  let h=`<div class="ov-hdr"><button class="ov-back" onclick="$('jobOv').classList.remove('open')">‹</button><div class="ov-title">${l.name||'Job'}</div></div><div class="ov-body">`
  h+=`<div class="ds"><div class="ds-t">Location</div><div class="ds-info">${[l.address,l.city,l.state,l.zip].filter(Boolean).join(', ')}`
  if(l.contact_name)h+=`<br>${l.contact_name}${l.contact_phone?' · '+l.contact_phone:''}`
  if(l.is_brycer_jurisdiction)h+=`<br><span style="color:var(--warn);font-weight:700">⚡ Brycer — ${l.brycer_ahj_name||'AHJ'}</span>`
  if(j.notes)h+=`<br><span style="color:var(--g2)">📝 ${j.notes}</span>`
  h+=`</div></div>`

  if(sc.includes('suppression')&&l.suppression_systems?.length){
    h+=`<div class="ds"><div class="ds-t">Suppression Systems</div>`
    l.suppression_systems.forEach(s=>{
      let b=rc.suppression_standard||250;if(s.category==='captiveaire_tank')b=rc.suppression_captiveaire_tank||450;if(s.category==='captiveaire_core')b=rc.suppression_captiveaire_core||650
      const p=b+((s.tank_count-1)*(rc.suppression_additional_tank||50)),lp=(s.fusible_link_count||0)*(rc.fusible_link||25),cp=(s.nozzle_count||0)*(rc.metal_blowoff_cap||25)
      h+=`<div class="eq"><div class="eq-r1"><div><div class="eq-nm">${s.system_type}</div><div class="eq-sub">${s.tank_count} tank${s.tank_count>1?'s':''} · ${s.nozzle_count} nozzles · ${s.fusible_link_count} links<br>${cart(s)} cartridge</div></div><div class="eq-pr">${fmt(p+lp+cp)}</div></div></div>`
    });h+=`</div>`
  }

  if(sc.includes('extinguishers')&&l.extinguishers?.length){
    h+=`<div class="ds"><div class="ds-t">Extinguishers · ${l.extinguishers.length}</div>`
    l.extinguishers.forEach(e=>{
      h+=`<div class="eq"><div class="eq-r1"><div><div class="eq-nm">${e.type} ${e.size||''}</div><div class="eq-sub">${e.location_in_building||''}${e.serial_number?' · '+e.serial_number:''}</div></div></div><div class="sb-row">`
      ;['Pass','Swap','Replace','Condemn','Remove'].forEach(s=>{
        const k=s.toLowerCase(),c=k[0]
        h+=`<button class="sb" onclick="setSt(this,'${e.id}','${k}')">${s}</button>`
      });h+=`</div></div>`
    });h+=`</div>`
  }

  if(sc.includes('elights')&&l.emergency_lights?.[0]?.fixture_count){
    const fc=l.emergency_lights[0].fixture_count,pr=fc*(rc.emergency_light||20)
    h+=`<div class="ds"><div class="ds-t">Emergency Lighting · ${fc} fixtures</div><div class="eq"><div class="eq-r1"><div><div class="eq-nm">90-Minute Annual Test</div><div class="eq-sub">${fc} × ${fmt(rc.emergency_light||20)}</div></div><div class="eq-pr">${fmt(pr)}</div></div></div></div>`
  }

  h+=`<div class="ds"><div class="ds-t">Customer Signature</div><div class="sig-wrap"><canvas id="sigC"></canvas><div class="sig-ph" id="sigPh">Sign here</div><button class="sig-clr" onclick="clrSig()">Clear</button></div></div>`
  h+=`</div><div class="ov-foot"><button class="btn-p" onclick="compJ('${j.id}')">Complete Job — Generate Invoice</button></div>`
  $('jobOv').innerHTML=h;$('jobOv').classList.add('open');setTimeout(initSig,80)
}

function setSt(btn,eid,st){
  extR[eid]=st;const row=btn.parentElement;row.querySelectorAll('.sb').forEach(b=>b.className='sb')
  const cls={pass:'s-p',swap:'s-s',replace:'s-r',condemn:'s-c',remove:'s-x'}
  btn.classList.add(cls[st]||'')
}

let sigCtx=null,sigOn=false
function initSig(){
  const c=$('sigC');if(!c)return;const r=c.parentElement.getBoundingClientRect();c.width=r.width;c.height=r.height
  sigCtx=c.getContext('2d');sigCtx.strokeStyle='#222';sigCtx.lineWidth=2;sigCtx.lineCap='round'
  const sp=e=>{e.preventDefault();sigOn=true;$('sigPh').style.display='none';const p=gp(e);sigCtx.beginPath();sigCtx.moveTo(p.x,p.y)}
  const sm=e=>{if(!sigOn)return;e.preventDefault();const p=gp(e);sigCtx.lineTo(p.x,p.y);sigCtx.stroke()}
  const se=()=>sigOn=false
  c.addEventListener('touchstart',sp,{passive:false});c.addEventListener('touchmove',sm,{passive:false});c.addEventListener('touchend',se)
  c.addEventListener('mousedown',sp);c.addEventListener('mousemove',sm);c.addEventListener('mouseup',se)
}
function gp(e){const c=$('sigC'),r=c.getBoundingClientRect(),t=e.touches?e.touches[0]:e;return{x:t.clientX-r.left,y:t.clientY-r.top}}
function clrSig(){if(sigCtx){const c=$('sigC');sigCtx.clearRect(0,0,c.width,c.height)}$('sigPh').style.display=''}

async function compJ(id){
  const j=D.jobs.find(x=>x.id===id);if(!j)return;const l=j.location||{},rc=D.rc,sc=j.scope||[]
  let lines=[],sub=0
  if(sc.includes('suppression'))for(const s of(l.suppression_systems||[])){
    let b=rc.suppression_standard||250;if(s.category==='captiveaire_tank')b=rc.suppression_captiveaire_tank||450;if(s.category==='captiveaire_core')b=rc.suppression_captiveaire_core||650
    const p=b+((s.tank_count-1)*(rc.suppression_additional_tank||50));lines.push({d:`${s.system_type} Semi-Annual (${s.tank_count}T)`,t:p});sub+=p
    if(s.fusible_link_count){const v=s.fusible_link_count*(rc.fusible_link||25);lines.push({d:`Fusible Links ×${s.fusible_link_count}`,t:v});sub+=v}
    if(s.nozzle_count){const v=s.nozzle_count*(rc.metal_blowoff_cap||25);lines.push({d:`Blow-Off Caps ×${s.nozzle_count}`,t:v});sub+=v}
  }
  if(sc.includes('extinguishers')&&l.extinguishers?.length){
    const n=l.extinguishers.length,v=n*(rc.extinguisher_inspection||20);lines.push({d:`Extinguisher Inspection ×${n}`,t:v});sub+=v
    for(const[eid,st]of Object.entries(extR)){if(st==='replace'){const x=l.extinguishers.find(e=>e.id===eid),p=x?.size==='5lb'?(rc.new_5lb_ext||102.5):(rc.new_10lb_ext||141.5);lines.push({d:`New ${x?.size||''} ${x?.type||''} Extinguisher`,t:p});sub+=p}}
  }
  if(sc.includes('elights')&&l.emergency_lights?.[0]?.fixture_count){const fc=l.emergency_lights[0].fixture_count,v=fc*(rc.emergency_light||20);lines.push({d:`E-Light Annual Test ×${fc}`,t:v});sub+=v}

  const sig=$('sigC')?.toDataURL()||null
  const{data:inv}=await SB.from('invoices').insert({job_id:id,location_id:l.id,billing_account_id:l.billing_account_id,subtotal:sub,total:sub,status:'sent',sent_at:new Date().toISOString()}).select().single()
  if(inv){const il=lines.map((ln,i)=>({invoice_id:inv.id,description:ln.d,quantity:1,unit_price:ln.t,total:ln.t,sort_order:i}));await SB.from('invoice_lines').insert(il)}
  await SB.from('jobs').update({status:'completed',completed_at:new Date().toISOString(),signature_data:sig}).eq('id',id)
  for(const[eid,st]of Object.entries(extR))await SB.from('extinguisher_results').insert({job_id:id,extinguisher_id:eid,status:st})

  showInv({num:inv?.invoice_number||'—',nm:l.name||'',addr:[l.address,l.city].filter(Boolean).join(', '),lines,total:sub})
  await load()
}

function showInv(d){
  let h=`<div class="inv-p"><h2>Invoice ${d.num}</h2><div class="co">Stephens Advanced · Fire Protection</div><div class="dt">${new Date().toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'})}</div><div class="to"><strong>${d.nm}</strong>${d.addr}</div>`
  d.lines.forEach(l=>h+=`<div class="inv-ln"><div class="d">${l.d}</div><div class="a">${fmt(l.t)}</div></div>`)
  h+=`<div class="inv-tot"><div>Total</div><div>${fmt(d.total)}</div></div><div class="inv-acts"><button class="inv-close" onclick="$('invOv').classList.remove('open');$('jobOv').classList.remove('open');rDash()">Done</button><button class="inv-send" onclick="toast('Invoice sent');setTimeout(()=>{$('invOv').classList.remove('open');$('jobOv').classList.remove('open');rDash()},600)">Send to Customer</button></div></div>`
  $('invOv').innerHTML=h;$('invOv').classList.add('open')
}

// ═══ NEW JOB ═══
let nSt={loc:null,mk:false}

function openNew(){nSt={loc:null,mk:false};rNew();$('newOv').classList.add('open')}

function rNew(){
  let h=`<div class="ov-hdr"><button class="ov-back" onclick="$('newOv').classList.remove('open')">‹</button><div class="ov-title">New Job</div></div><div class="ov-body">`

  h+=`<div class="fg"><div class="fg-l">Customer</div>`
  if(nSt.loc){
    h+=`<div style="background:var(--c1);border:1.5px solid rgba(16,185,129,.2);border-radius:var(--r);padding:12px;display:flex;justify-content:space-between;align-items:center"><div><div style="font-size:14px;font-weight:700;color:var(--ok)">${nSt.loc.name}</div><div style="font-size:11px;color:var(--g1);margin-top:2px">${[nSt.loc.address,nSt.loc.city].filter(Boolean).join(', ')||''}</div></div><button style="font-size:11px;color:var(--g1)" onclick="nSt.loc=null;rNew()">Change</button></div>`
  }else if(!nSt.mk){
    h+=`<div class="ac"><input id="nq" placeholder="Type customer name..." oninput="nSrch(this.value)" onfocus="nSrch(this.value)"><div class="ac-dd" id="nDd"></div></div>`
  }else{
    h+=`<div class="inl"><div class="inl-hdr"><span>New Customer</span><button onclick="nSt.mk=false;rNew()">Cancel</button></div><input id="nn" placeholder="Business name"><input id="na" placeholder="Address"><div class="r3"><input id="nc" placeholder="City"><input id="ns" placeholder="ST" value="TX"><input id="nz" placeholder="Zip"></div><div class="r2"><input id="nco" placeholder="Contact"><input id="np" placeholder="Phone"></div></div>`
  }
  h+=`</div>`

  h+=`<div class="fg"><div class="fg-l">Date & Time</div><div class="fg-row fg-row2"><input type="date" id="ndt" value="${new Date(Date.now()+86400000).toISOString().split('T')[0]}"><input type="time" id="ntm" value="09:00"></div></div>`

  h+=`<div class="fg"><div class="fg-l">Type</div><div class="tgl" id="nTy">`
  ;[['inspection','Inspection'],['emergency','Emergency'],['misc','Misc']].forEach(([k,v])=>h+=`<button data-k="${k}" ${k==='inspection'?'class="on"':''} onclick="document.querySelectorAll('#nTy button').forEach(b=>b.classList.remove('on'));this.classList.add('on')">${v}</button>`)
  h+=`</div></div>`

  h+=`<div class="fg"><div class="fg-l">Scope</div><div class="tgl" id="nSc">`
  ;[['extinguishers','Extinguishers'],['suppression','Suppression'],['elights','E-Lights'],['hydro','Hydro']].forEach(([k,v])=>h+=`<button data-k="${k}" ${(k==='extinguishers'||k==='suppression')?'class="gn"':''} onclick="this.classList.toggle('gn')">${v}</button>`)
  h+=`</div></div>`

  h+=`<div class="fg"><div class="fg-l">Notes</div><textarea id="nnt" placeholder="Optional notes..."></textarea></div>`
  h+=`<button class="btn-p" onclick="saveNew()">Create Job</button>`
  h+=`</div>`;$('newOv').innerHTML=h
}

function nSrch(q){
  const dd=$('nDd');if(!dd)return;if(q.length<1){dd.classList.remove('vis');return}
  const f=D.locs.filter(l=>l.name.toLowerCase().includes(q.toLowerCase())||(l.city||'').toLowerCase().includes(q.toLowerCase()))
  const canMk=q.length>=2&&!f.some(l=>l.name.toLowerCase()===q.toLowerCase())
  let h='';f.forEach(l=>h+=`<div class="ac-it" onclick="nSt.loc={id:'${l.id}',name:'${esc(l.name)}',address:'${esc(l.address)}',city:'${esc(l.city)}',ba:'${l.billing_account_id||''}'};rNew()"><div class="ac-n">${l.name}</div><div class="ac-d">${[l.address,l.city].filter(Boolean).join(', ')}</div></div>`)
  if(canMk)h+=`<div class="ac-it ac-new" onclick="nSt.mk=true;rNew();setTimeout(()=>{const e=$('nn');if(e)e.value='${esc(q)}'},30)"><div class="ac-n">+ Create "${q}"</div><div class="ac-d">Add new customer</div></div>`
  dd.innerHTML=h;dd.classList.add('vis')
}

async function saveNew(){
  let lid=nSt.loc?.id,ba=nSt.loc?.ba||null
  if(nSt.mk){
    const nm=$('nn')?.value?.trim();if(!nm){toast('Enter business name');return}
    const city=$('nc')?.value?.trim()||''
    const{data,error}=await SB.from('locations').insert({name:nm,address:$('na')?.value?.trim()||null,city:city||null,state:$('ns')?.value?.trim()||'TX',zip:$('nz')?.value?.trim()||null,contact_name:$('nco')?.value?.trim()||null,contact_phone:$('np')?.value?.trim()||null,is_brycer_jurisdiction:city.toLowerCase().includes('fort worth'),brycer_ahj_name:city.toLowerCase().includes('fort worth')?'Fort Worth Fire Department':null}).select().single()
    if(error){toast('Error');console.error(error);return};lid=data.id
  }
  if(!lid){toast('Select a customer');return}
  const ty=document.querySelector('#nTy button.on')?.dataset.k||'inspection'
  const sc=Array.from(document.querySelectorAll('#nSc button.gn')).map(b=>b.dataset.k)
  const{error}=await SB.from('jobs').insert({location_id:lid,billing_account_id:ba,type:ty,scope:sc.length?sc:['extinguishers','suppression'],scheduled_date:$('ndt')?.value,scheduled_time:$('ntm')?.value,status:'scheduled',notes:$('nnt')?.value?.trim()||null})
  if(error){toast('Error creating job');console.error(error);return}
  toast('Job created');$('newOv').classList.remove('open');await load();rDash()
}

// ═══ CUSTOMERS ═══
function rCust(){
  let h=`<div class="sec" style="margin-top:8px"><div class="sec-t">Clients · ${D.locs.length}</div></div><input class="srch" placeholder="Search..." oninput="fC(this.value)"><div id="cL">${cH(D.locs)}</div>`
  $('custC').innerHTML=h
}
function cH(ls){if(!ls.length)return`<div class="ey"><div class="ey-i">👤</div><div class="ey-t">No clients yet.</div></div>`;return ls.map(l=>`<div class="cc"><div class="cc-nm">${l.name}</div><div class="cc-addr">${[l.address,l.city].filter(Boolean).join(', ')||'No address'}</div><div class="cc-meta"><span><b>${l.extinguishers?.length||0}</b> ext</span><span><b>${l.suppression_systems?.length||0}</b> sys</span>${l.emergency_lights?.[0]?.fixture_count?`<span><b>${l.emergency_lights[0].fixture_count}</b> lights</span>`:''}${l.billing_account?`<span>→ <b>${l.billing_account.name}</b></span>`:''}${l.is_brycer_jurisdiction?'<span class="cc-bry">BRYCER</span>':''}</div></div>`).join('')}
function fC(q){$('cL').innerHTML=cH(D.locs.filter(l=>l.name.toLowerCase().includes(q.toLowerCase())||(l.city||'').toLowerCase().includes(q.toLowerCase())||(l.address||'').toLowerCase().includes(q.toLowerCase())))}

// ═══ MONEY ═══
function rMoney(){
  const pd=D.invs.filter(i=>i.status==='paid').reduce((s,i)=>s+(+i.total),0),ow=D.invs.filter(i=>i.status!=='paid'&&i.status!=='void').reduce((s,i)=>s+(+i.total),0)
  let h=`<div class="stats stats-2"><div class="st"><div class="st-n g">${fmt(pd)}</div><div class="st-l">Collected</div></div><div class="st"><div class="st-n r">${fmt(ow)}</div><div class="st-l">Outstanding</div></div></div><div class="sec"><div class="sec-t">Invoices</div></div>`
  if(!D.invs.length)h+=`<div class="ey"><div class="ey-i">💰</div><div class="ey-t">No invoices yet.</div></div>`
  else D.invs.forEach(i=>{const d=new Date(i.date).toLocaleDateString('en-US',{month:'short',day:'numeric'}),bc=i.status==='paid'?'b-paid':i.status==='sent'?'b-sent':i.status==='overdue'?'b-over':'b-draft'
    h+=`<div class="ic"><div class="ic-r1"><div class="ic-num">${i.invoice_number||'—'}</div><span class="badge ${bc}">${i.status}</span></div><div class="ic-dt">${d}</div><div class="ic-amt">${fmt(+i.total)}</div></div>`})
  $('moneyC').innerHTML=h
}

// ═══ INIT ═══
load().then(()=>{rDash()})
</script>
