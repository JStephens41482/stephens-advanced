<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0d0f14">
<title>Stephens Advanced</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--bg:#0d0f14;--c1:#151820;--c2:#1c1f2a;--c3:#252937;--b1:#2a2f3e;--b2:#353b4d;--w:#f0f1f4;--w2:#c8ccd6;--g1:#7c8497;--g2:#555d72;--g3:#3d4456;--fire:#f05a28;--fires:rgba(240,90,40,.08);--ok:#10b981;--oks:rgba(16,185,129,.08);--warn:#f59e0b;--warns:rgba(245,158,11,.08);--bad:#ef4444;--bads:rgba(239,68,68,.08);--info:#6366f1;--infos:rgba(99,102,241,.08);--r:12px;--rs:8px}
html,body{height:100%;overflow:hidden;overscroll-behavior:none}
body{font-family:'Inter',system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--w);font-size:14px;line-height:1.45;-webkit-font-smoothing:antialiased}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,select,textarea{font-family:inherit;color:var(--w);background:var(--c1);border:1.5px solid var(--b1);border-radius:var(--rs);padding:11px 13px;font-size:14px;outline:none;width:100%;transition:border-color .15s}
input:focus,select:focus,textarea:focus{border-color:var(--fire)}
input::placeholder,textarea::placeholder{color:var(--g2)}
textarea{resize:none;min-height:60px}
select{-webkit-appearance:none;appearance:none}
::-webkit-scrollbar{width:0;height:0}
#app{display:flex;flex-direction:column;height:100dvh}
.hdr{padding:max(env(safe-area-inset-top),10px) 16px 10px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;border-bottom:1px solid var(--b1);background:var(--bg)}
.hdr-logo{display:flex;align-items:center;gap:8px;font-size:17px;font-weight:900;letter-spacing:-.4px}
.hdr-logo span{color:var(--fire)}
.hdr-date{font-size:11px;color:var(--g1);font-weight:600}
.nav{display:flex;border-top:1px solid var(--b1);background:var(--c1);padding:4px 0 max(env(safe-area-inset-bottom),20px);flex-shrink:0}
.nav button{flex:1;display:flex;flex-direction:column;align-items:center;gap:1px;padding:8px 0;color:var(--g2);transition:color .15s}
.nav button.on{color:var(--fire)}
.ni{font-size:20px;line-height:1}
.nt{font-size:9px;font-weight:700;letter-spacing:.6px;text-transform:uppercase;margin-top:2px}
.vw{display:none;flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
.vw.on{display:block}
.vw-pad{padding:12px 16px 140px}
.stats{display:grid;gap:8px;margin-bottom:16px}
.s3{grid-template-columns:repeat(3,1fr)}.s2{grid-template-columns:repeat(2,1fr)}
.st{background:var(--c1);border:1px solid var(--b1);border-radius:var(--r);padding:14px 8px;text-align:center}
.sn{font-size:22px;font-weight:800;line-height:1;font-variant-numeric:tabular-nums}
.sn.o{color:var(--fire)}.sn.g{color:var(--ok)}.sn.y{color:var(--warn)}.sn.r{color:var(--bad)}.sn.i{color:var(--info)}
.sl{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:1.2px;color:var(--g1);margin-top:5px}
.sec{margin:20px 0 10px;display:flex;align-items:center;justify-content:space-between}
.sec-t{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:1.8px;color:var(--g2)}
.sec-a{font-size:13px;font-weight:700;color:var(--fire)}
.trk{background:var(--c1);border:1px solid var(--b1);border-radius:var(--r);padding:14px;margin-bottom:16px}
.trk-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.trk-t{font-size:14px;font-weight:700}
.pill{font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:.6px;padding:4px 12px;border-radius:20px}
.pok{background:var(--oks);color:var(--ok)}.pchk{background:var(--warns);color:var(--warn)}
.chips{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px}
.chip{display:inline-flex;align-items:center;gap:5px;background:var(--c2);border:1px solid var(--b1);border-radius:var(--rs);padding:7px 11px;font-size:12px;font-weight:500}
.chip b{font-weight:800;color:var(--fire);font-variant-numeric:tabular-nums}
.trk-btn{width:100%;padding:12px;border-radius:var(--rs);font-size:13px;font-weight:800;letter-spacing:.3px;transition:all .15s}
.trk-go{background:var(--fire);color:#fff}.trk-ok{background:var(--ok);color:#fff}
.jc{background:var(--c1);border:1px solid var(--b1);border-radius:var(--r);padding:14px 14px 14px 18px;margin-bottom:8px;position:relative;overflow:hidden;cursor:pointer;transition:border-color .12s}
.jc:active{border-color:var(--fire)}
.jc::after{content:'';position:absolute;left:0;top:0;bottom:0;width:3.5px;border-radius:0 2px 2px 0}
.jc.jbl::after{background:var(--info)}.jc.jgn::after{background:var(--ok)}.jc.jrd::after{background:var(--bad)}.jc.jgy::after{background:var(--g3)}
.jc-r1{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:4px}
.jc-nm{font-size:15px;font-weight:700;line-height:1.25;flex:1;margin-right:8px}
.jc-tm{font-size:11px;font-weight:600;color:var(--g1);white-space:nowrap}
.jc-addr{font-size:11px;color:var(--g1);margin-bottom:8px}
.jc-tags{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:8px}
.tg{font-size:8.5px;font-weight:800;text-transform:uppercase;letter-spacing:.7px;padding:3.5px 8px;border-radius:4px}
.ts{background:var(--fires);color:var(--fire)}.te{background:var(--oks);color:var(--ok)}.tl{background:var(--warns);color:var(--warn)}.th{background:var(--infos);color:var(--info)}.to2{background:var(--bads);color:var(--bad)}.tb{background:rgba(168,85,247,.08);color:#a78bfa}
.jc-val{font-size:15px;font-weight:800;color:var(--ok);font-variant-numeric:tabular-nums;margin-bottom:10px}
.jc-btns{display:flex;gap:8px}
.jb{flex:1;padding:12px 8px;border-radius:var(--rs);font-size:12px;font-weight:800;text-transform:uppercase;letter-spacing:.4px;min-height:44px;display:flex;align-items:center;justify-content:center;transition:opacity .1s}
.jb:active{opacity:.7}
.jb-n{background:var(--c2);border:1px solid var(--b1);color:var(--w2)}
.jb-g{background:var(--fire);color:#fff}
.cc{background:var(--c1);border:1px solid var(--b1);border-radius:var(--r);padding:14px;margin-bottom:8px;cursor:pointer;transition:border-color .12s;display:flex;align-items:center;gap:12px}
.cc:active{border-color:var(--fire)}
.cc-l{flex:1;min-width:0}
.cc-nm{font-size:15px;font-weight:700}
.cc-addr{font-size:11px;color:var(--g1);margin-top:3px}
.cc-meta{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px;font-size:11px;color:var(--g1)}
.cc-meta b{color:var(--w2);font-weight:700}
.cc-bry{color:var(--warn);font-weight:700}
.cc-arr{font-size:22px;color:var(--g2);flex-shrink:0}
.ic{background:var(--c1);border:1px solid var(--b1);border-radius:var(--r);padding:14px;margin-bottom:8px;cursor:pointer;transition:border-color .12s}
.ic:active{border-color:var(--fire)}
.ic-r1{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:4px}
.ic-nm{font-size:14px;font-weight:700}
.ic-sub{font-size:11px;color:var(--g1);margin-top:2px}
.ic-amt{font-size:18px;font-weight:800;margin-top:4px;font-variant-numeric:tabular-nums}
.badge{font-size:8.5px;font-weight:800;text-transform:uppercase;letter-spacing:.6px;padding:3.5px 10px;border-radius:20px}
.bpaid{background:var(--oks);color:var(--ok)}.bsent{background:var(--infos);color:var(--info)}.bover{background:var(--bads);color:var(--bad)}.bdraft{background:rgba(124,132,151,.08);color:var(--g1)}.brec{background:rgba(124,132,151,.08);color:var(--g1)}.bfact{background:rgba(99,102,241,.15);color:var(--info)}
.srch{margin-bottom:12px}
.ey{text-align:center;padding:60px 24px;color:var(--g2)}
.ey-i{font-size:44px;margin-bottom:12px;opacity:.2}
.ey-t{font-size:13px;line-height:1.6}
.fab{position:fixed;bottom:78px;right:16px;width:54px;height:54px;border-radius:16px;background:var(--fire);color:#fff;font-size:28px;font-weight:300;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 24px rgba(240,90,40,.3);z-index:80;transition:transform .1s}
.fab:active{transform:scale(.9)}
.ov{display:none;position:fixed;inset:0;z-index:100;background:var(--bg);flex-direction:column;transform:translateX(100%);transition:transform .22s cubic-bezier(.4,0,.2,1)}
.ov.open{display:flex;transform:translateX(0)}
.ov-hdr{display:flex;align-items:center;gap:4px;padding:max(env(safe-area-inset-top),10px) 16px 10px;border-bottom:1px solid var(--b1);flex-shrink:0;background:var(--bg)}
.ov-back{font-size:26px;color:var(--fire);line-height:1;padding:4px 8px 4px 0;min-width:44px;min-height:44px;display:flex;align-items:center}
.ov-title{font-size:17px;font-weight:700;flex:1}
.ov-act{font-size:13px;font-weight:700;color:var(--fire);padding:8px 0;min-height:44px;display:flex;align-items:center}
.ov-body{flex:1;overflow-y:auto;padding:16px 16px 160px;-webkit-overflow-scrolling:touch}
.ov-foot{position:fixed;bottom:0;left:0;right:0;padding:12px 16px max(env(safe-area-inset-bottom),20px);background:var(--c1);border-top:1px solid var(--b1);z-index:101}
.ds{margin-bottom:20px}
.ds-t{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:1.8px;color:var(--g2);margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid var(--b1)}
.ds-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid rgba(42,47,62,.6);gap:12px}
.ds-row:last-child{border-bottom:none}
.ds-lbl{font-size:11px;color:var(--g1);flex-shrink:0}
.ds-val{font-size:13px;font-weight:600;color:var(--w);text-align:right;flex:1;word-break:break-word}
.ds-info{font-size:13px;color:var(--g1);line-height:1.6}
.eq{background:var(--c1);border:1px solid var(--b1);border-radius:10px;padding:12px;margin-bottom:6px}
.eq-r1{display:flex;justify-content:space-between;align-items:flex-start}
.eq-nm{font-size:13px;font-weight:700}
.eq-sub{font-size:11px;color:var(--g1);margin-top:2px;line-height:1.4}
.eq-pr{font-size:14px;font-weight:800;color:var(--ok);font-variant-numeric:tabular-nums;white-space:nowrap}
.sb-row{display:flex;flex-wrap:wrap;gap:5px;margin-top:8px}
.sb{padding:10px 12px;border-radius:var(--rs);font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.4px;border:1.5px solid var(--b1);background:var(--c2);color:var(--g2);transition:all .1s;min-height:44px;display:flex;align-items:center}
.sb:active{transform:scale(.95)}
.sb.sp{background:var(--oks);color:var(--ok);border-color:var(--ok)}.sb.ss{background:var(--warns);color:var(--warn);border-color:var(--warn)}.sb.sr{background:var(--fires);color:var(--fire);border-color:var(--fire)}.sb.sc2{background:var(--bads);color:var(--bad);border-color:var(--bad)}.sb.sx{background:rgba(124,132,151,.1);color:var(--g1);border-color:var(--g2)}
.sig-wrap{background:#fff;border-radius:var(--r);height:140px;position:relative;touch-action:none}
.sig-wrap canvas{width:100%;height:100%;border-radius:var(--r);display:block}
.sig-ph{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:#b0b0b0;font-size:13px;font-weight:500;pointer-events:none}
.sig-clr{position:absolute;top:7px;right:7px;background:rgba(0,0,0,.4);color:#fff;border-radius:6px;padding:6px 12px;font-size:10px;font-weight:700;min-height:36px;display:flex;align-items:center}
.btn-p{width:100%;padding:16px;border-radius:var(--r);background:var(--fire);color:#fff;font-size:15px;font-weight:800;letter-spacing:.2px;transition:all .15s;min-height:52px;display:flex;align-items:center;justify-content:center;gap:8px}
.btn-p:active{transform:scale(.98);opacity:.9}
.btn-p.loading{opacity:.6;pointer-events:none}
.btn-ok{width:100%;padding:14px;border-radius:var(--r);background:var(--ok);color:#fff;font-size:14px;font-weight:800;min-height:50px;display:flex;align-items:center;justify-content:center;gap:8px;transition:opacity .15s}
.btn-ok:active{opacity:.7}
.btn-dim{width:100%;padding:14px;border-radius:var(--r);background:var(--c2);color:var(--g1);font-size:14px;font-weight:700;border:1px solid var(--b1);margin-top:10px;min-height:48px;display:flex;align-items:center;justify-content:center;gap:6px;transition:opacity .1s}
.btn-dim:active{opacity:.7}
.fg{margin-bottom:14px}
.fg-l{display:block;font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:1.2px;color:var(--g2);margin-bottom:6px}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.row3{display:grid;grid-template-columns:2fr 1fr 1fr;gap:6px}
.tgl{display:flex;flex-wrap:wrap;gap:6px}
.tgl button{padding:10px 15px;border-radius:var(--rs);font-size:12px;font-weight:700;border:1.5px solid var(--b1);background:var(--c1);color:var(--g2);transition:all .1s;min-height:44px}
.tgl button:active{transform:scale(.96)}
.tgl button.on{border-color:var(--fire);background:var(--fires);color:var(--fire)}
.tgl button.gn{border-color:var(--ok);background:var(--oks);color:var(--ok)}
.ac{position:relative}
.ac-dd{position:absolute;left:0;right:0;top:100%;margin-top:4px;background:var(--c2);border:1px solid var(--b1);border-radius:var(--r);max-height:240px;overflow-y:auto;z-index:20;box-shadow:0 12px 40px rgba(0,0,0,.5);display:none}
.ac-dd.vis{display:block}
.ac-it{padding:13px 14px;border-bottom:1px solid var(--b1);min-height:48px;display:flex;flex-direction:column;justify-content:center}
.ac-it:last-child{border-bottom:none}
.ac-it:active{background:var(--c3)}
.ac-n{font-size:14px;font-weight:600}
.ac-d{font-size:11px;color:var(--g1);margin-top:2px}
.ac-new{background:var(--fires)}
.ac-new .ac-n{color:var(--fire);font-weight:700}
.inl{background:var(--c1);border:1.5px solid rgba(240,90,40,.2);border-radius:var(--r);padding:14px;margin-top:6px}
.inl-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.inl-hdr span{font-size:10px;font-weight:800;color:var(--fire);text-transform:uppercase;letter-spacing:1.2px}
.inl-hdr button{font-size:11px;color:var(--g1);padding:4px 8px;min-height:36px}
.inl input{margin-bottom:8px;background:var(--c2);font-size:13px;padding:10px 12px}
.inv-ov{display:none;position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.92);overflow-y:auto;padding:16px}
.inv-ov.open{display:block}
.inv-p{background:#fff;color:#111;border-radius:16px;padding:28px 22px;max-width:440px;margin:20px auto}
.inv-p h2{font-size:20px;font-weight:900}
.inv-p .co{font-size:11px;color:#888;margin-bottom:16px}
.inv-p .dt{font-size:12px;color:#999;margin-bottom:4px}
.inv-p .to{font-size:14px;padding-bottom:12px;border-bottom:1px solid #eee;margin-bottom:10px}
.inv-p .to strong{display:block;font-size:15px;font-weight:700}
.inv-ln{display:flex;justify-content:space-between;padding:8px 0;font-size:13px;border-bottom:1px solid #f5f5f5}
.inv-ln .d{flex:1;padding-right:8px;line-height:1.4}.inv-ln .a{font-weight:700;white-space:nowrap;font-variant-numeric:tabular-nums}
.inv-tot{display:flex;justify-content:space-between;margin-top:14px;padding-top:14px;border-top:2.5px solid #111;font-size:20px;font-weight:900}
.inv-acts{display:flex;gap:8px;margin-top:20px}
.inv-acts button{flex:1;padding:14px;border-radius:var(--r);font-size:14px;font-weight:700;min-height:50px}
.inv-close{background:#f0f0f0;color:#333}
.inv-fwd{background:var(--fire);color:#fff}
.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%) translateY(12px);background:var(--ok);color:#fff;padding:11px 28px;border-radius:30px;font-size:13px;font-weight:700;z-index:400;opacity:0;transition:all .2s;pointer-events:none;white-space:nowrap;max-width:90vw;text-align:center}
.toast.vis{opacity:1;transform:translateX(-50%) translateY(0)}
.mode-card{background:var(--c1);border:1.5px solid var(--b1);border-radius:var(--r);padding:18px;margin-bottom:10px;cursor:pointer;display:flex;align-items:center;gap:14px;min-height:72px}
.mode-card:active{border-color:var(--fire)}
.mode-icon{font-size:28px;flex-shrink:0}
.mode-title{font-size:15px;font-weight:800;color:var(--w);margin-bottom:3px}
.mode-desc{font-size:12px;color:var(--g1);line-height:1.4}
.photo-drop{border:2px dashed var(--b2);border-radius:var(--r);padding:40px 20px;text-align:center;cursor:pointer;margin-bottom:16px}
.photo-drop:active{border-color:var(--fire)}
.photo-prev{width:100%;border-radius:var(--r);margin-bottom:16px;max-height:280px;object-fit:contain;display:none;background:var(--c2)}
.ai-box{background:var(--c2);border:1.5px solid var(--info);border-radius:var(--r);padding:14px;margin-bottom:16px}
.ai-lbl{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:1.5px;color:var(--info);margin-bottom:6px}
.ai-txt{font-size:13px;color:var(--g1);line-height:1.6}
.spin{display:inline-block;width:16px;height:16px;border:2px solid var(--b2);border-top-color:var(--fire);border-radius:50%;animation:sp .7s linear infinite;vertical-align:middle;margin-right:6px}
@keyframes sp{to{transform:rotate(360deg)}}
.li-row{display:flex;gap:6px;margin-bottom:8px;align-items:center}
.li-row input{flex:1;min-height:44px}
.li-qty{width:58px!important;flex:none!important}
.li-price{width:88px!important;flex:none!important}
.li-del{background:var(--c2);border:1px solid var(--b1);border-radius:var(--rs);color:var(--g1);padding:0 12px;font-size:16px;flex-shrink:0;min-height:44px;display:flex;align-items:center}
.qa{display:flex;gap:8px;margin:14px 0}
.qa-btn{flex:1;padding:11px 8px;border-radius:var(--rs);font-size:12px;font-weight:700;border:1px solid var(--b1);background:var(--c2);color:var(--w2);min-height:44px;display:flex;align-items:center;justify-content:center;gap:5px;transition:opacity .1s}
.qa-btn:active{opacity:.7}
.qa-btn.pri{background:var(--fire);border-color:var(--fire);color:#fff}
.qa-btn.ok2{background:var(--ok);border-color:var(--ok);color:#fff}
.err{color:var(--bad);font-size:12px;margin-top:8px;text-align:center}
.del-btn{font-size:13px;font-weight:700;color:var(--bad);padding:8px 0;min-height:44px;display:flex;align-items:center}
.del-confirm{background:var(--bads);border:1.5px solid var(--bad);border-radius:var(--r);padding:14px;margin-bottom:16px;display:none}
.del-confirm.vis{display:block}
.del-confirm-msg{font-size:13px;font-weight:600;color:var(--bad);margin-bottom:12px;line-height:1.4}
.del-confirm-btns{display:flex;gap:8px}
.del-yes{flex:1;padding:12px;border-radius:var(--rs);background:var(--bad);color:#fff;font-size:13px;font-weight:800;min-height:44px;display:flex;align-items:center;justify-content:center}
.del-no{flex:1;padding:12px;border-radius:var(--rs);background:var(--c2);color:var(--g1);font-size:13px;font-weight:700;border:1px solid var(--b1);min-height:44px;display:flex;align-items:center;justify-content:center}
.del-eq{padding:6px 10px;border-radius:var(--rs);background:var(--bads);color:var(--bad);font-size:11px;font-weight:800;border:1px solid var(--bad);min-height:36px;display:flex;align-items:center}
</style>
</head>
<body>
<div id="app">

// ═══ ROUTING ENGINE ═══
// City proximity order from Euless base (lat/lng approximations for DFW)
const CITY_COORDS={
  'euless':{lat:32.837,lng:-97.082},'bedford':{lat:32.844,lng:-97.143},
  'hurst':{lat:32.823,lng:-97.188},'colleyville':{lat:32.900,lng:-97.150},
  'grapevine':{lat:32.934,lng:-97.078},'irving':{lat:32.814,lng:-96.949},
  'grand prairie':{lat:32.746,lng:-96.994},'arlington':{lat:32.735,lng:-97.108},
  'mansfield':{lat:32.563,lng:-97.141},'fort worth':{lat:32.755,lng:-97.333},
  'dallas':{lat:32.779,lng:-96.800},'garland':{lat:32.912,lng:-96.638},
  'mesquite':{lat:32.767,lng:-96.599},'carrollton':{lat:32.954,lng:-96.890},
  'lewisville':{lat:33.046,lng:-96.994},'denton':{lat:33.215,lng:-97.133},
  'plano':{lat:33.020,lng:-96.699},'frisco':{lat:33.150,lng:-96.824},
  'mckinney':{lat:33.197,lng:-96.640},'allen':{lat:33.103,lng:-96.671},
  'richardson':{lat:32.948,lng:-96.730},'sachse':{lat:32.970,lng:-96.578},
  'wylie':{lat:33.015,lng:-96.539},'melissa':{lat:33.284,lng:-96.571},
  'weatherford':{lat:32.760,lng:-97.797},'glen rose':{lat:32.233,lng:-97.757},
  'cleburne':{lat:32.350,lng:-97.386},'burleson':{lat:32.542,lng:-97.321}
}
const BASE={lat:32.837,lng:-97.082} // Euless

function cityCoords(city){
  if(!city)return BASE
  const k=city.toLowerCase().trim()
  return CITY_COORDS[k]||BASE
}

function distBetween(a,b){
  const R=3959,dLat=(b.lat-a.lat)*Math.PI/180,dLng=(b.lng-a.lng)*Math.PI/180
  const x=Math.sin(dLat/2)**2+Math.cos(a.lat*Math.PI/180)*Math.cos(b.lat*Math.PI/180)*Math.sin(dLng/2)**2
  return R*2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x))
}

function routeJobs(jobs){
  // nearest-neighbor from base
  let remaining=[...jobs],route=[],cur=BASE
  while(remaining.length){
    let best=null,bestD=Infinity,bestI=0
    remaining.forEach((j,i)=>{
      const c=cityCoords(j.location?.city)
      const d=distBetween(cur,c)
      if(d<bestD){bestD=d;best=j;bestI=i}
    })
    route.push({job:best,dist:bestD})
    cur=cityCoords(best.location?.city)
    remaining.splice(bestI,1)
  }
  return route
}

  const up=all.filter(j=>j.status==='scheduled'&&j.scheduled_date>=t)
  const done=all.filter(j=>j.status==='completed').slice(0,20)
  let h=`<div class="sec" style="margin-top:8px"><div class="sec-t">Jobs</div></div>`
  if(ov.length){h+=`<div class="sec"><div class="sec-t" style="color:var(--bad)">Overdue · ${ov.length}</div></div>`;ov.forEach(j=>h+=jCard(j,true))}

function buildJobLines(j){
  const l=j.location||{},rc=D.rc,sc=j.scope||[]
  const lines=[]
  // suppression
  if(sc.includes('suppression'))for(const s of(l.suppression_systems||[])){
    let bv=rc.suppression_standard||250
    if(s.category==='captiveaire_tank')bv=rc.suppression_captiveaire_tank||450
    if(s.category==='captiveaire_core')bv=rc.suppression_captiveaire_core||650
    const p=bv+((s.tank_count-1)*(rc.suppression_additional_tank||50))
    lines.push({desc:`${s.system_type} Semi-Annual (${s.tank_count}T)`,qty:1,price:p})
    if(s.fusible_link_count)lines.push({desc:`Fusible Links`,qty:s.fusible_link_count,price:rc.fusible_link||25})
    if(s.nozzle_count)lines.push({desc:`Blow-Off Caps`,qty:s.nozzle_count,price:rc.metal_blowoff_cap||25})
  }
  // extinguishers
  if(sc.includes('extinguishers')&&l.extinguishers?.length){
    lines.push({desc:`Extinguisher Inspection`,qty:l.extinguishers.length,price:rc.extinguisher_inspection||20})
  }
  // elights
  if(sc.includes('elights')&&l.emergency_lights?.[0]?.fixture_count){
    const fc=l.emergency_lights[0].fixture_count
    lines.push({desc:`E-Light Annual Test`,qty:fc,price:rc.emergency_light||20})
  }
  // fallback — nothing auto-populated, start with blank
  return lines.length?lines:[{desc:'',qty:1,price:0}]
}

function renderJobLines(){
  const wrap=$('wo-lines');if(!wrap)return
  wrap.innerHTML=jobLines.map((l2,i)=>`
    <div class="li-row" data-jli="${i}">
      <input placeholder="Description" value="${esc(l2.desc||'')}" oninput="jlEdit(${i},'desc',this.value)" style="flex:2">
      <input class="li-qty" type="number" value="${l2.qty||1}" min="0.5" step="0.5" oninput="jlEdit(${i},'qty',this.value)">
      <input class="li-price" type="number" value="${+(l2.price||0)}" step="0.01" oninput="jlEdit(${i},'price',this.value)">
      <button class="li-del" onclick="jlDel(${i})">✕</button>
    </div>`).join('')
  updateWoTotal()
}

function jlEdit(i,field,val){
  if(!jobLines[i])return
  if(field==='desc')jobLines[i].desc=val
  else if(field==='qty')jobLines[i].qty=parseFloat(val)||1
  else if(field==='price')jobLines[i].price=parseFloat(val)||0
  updateWoTotal()
}

function jlDel(i){
  jobLines.splice(i,1)
  renderJobLines()
}

function updateWoTotal(){
  const total=jobLines.reduce((s,l2)=>s+(+(l2.qty||1))*(+(l2.price||0)),0)
  const el=$('wo-total');if(el)el.textContent=fmtD(total)
}

function addPartLine(sel){
  const v=sel.value;if(!v)return
  sel.value='' // reset dropdown
  if(v==='CUSTOM'){
    jobLines.push({desc:'',qty:1,price:0,id:'jl'+Date.now()})
    renderJobLines()
    // focus last description field
    setTimeout(()=>{const inputs=$('wo-lines')?.querySelectorAll('input[placeholder="Description"]');if(inputs?.length)inputs[inputs.length-1].focus()},50)
    return
  }
  const parts=v.split('|')
  const desc=parts[0]||'',qty=parseFloat(parts[1])||1,price=parseFloat(parts[2])||0
  // check if same item already exists — increment qty instead
  const existing=jobLines.find(l2=>l2.desc===desc)
  if(existing){existing.qty=(+existing.qty||1)+1;renderJobLines();return}
  jobLines.push({desc,qty,price,id:'jl'+Date.now()})
  renderJobLines()
}

async function compJ(id){
  setLoad('compBtn',true)
  const j=D.jobs.find(x=>x.id===id);if(!j)return
  const l=j.location||{}
  const sc=j.scope||[]

  // GATE: suppression jobs require a report before invoice can be generated
  if(sc.includes('suppression')&&l.suppression_systems?.length){
    const{data:rpts}=await SB.from('reports').select('id').eq('job_id',id).limit(1)
    if(!rpts||!rpts.length){
      setLoad('compBtn',false,'✓ Complete Job — Generate Invoice')
      const syss2=l.suppression_systems
      const hasCA=syss2.some(s=>{const t=(s.system_type||'').toLowerCase();return t.includes('fm-200')||t.includes('fm200')||t.includes('novec')||t.includes('co2')||t.includes('clean agent')||t.includes('halon')||t.includes('inergen')||t.includes('sapphire')})
      const sysId=syss2[0].id
      toast('Fill out the suppression report first',false)
      setTimeout(()=>{hasCA?openCleanAgentReport(id,sysId):openSuppReport(id,sysId)},300)
      return
    }
  }

  // read lines from jobLines state
  const lines=jobLines.filter(l2=>(l2.desc||'').trim()).map(l2=>({
    description:l2.desc.trim(),
    quantity:+(l2.qty)||1,
    unit_price:+(l2.price)||0,
    total:(+(l2.qty)||1)*(+(l2.price)||0)
  }))
  if(!lines.length){toast('Add at least one line item',false);setLoad('compBtn',false,'✓ Complete Job — Generate Invoice');return}

  const sub=lines.reduce((s,l2)=>s+l2.total,0)
  const notes=($('job-notes')?.value||jobNotes||'').trim()
  const sig=$('sigC')?.toDataURL()||null

  const invNum='INV-'+Date.now().toString().slice(-6)
  const{data:inv,error}=await SB.from('invoices').insert({
    job_id:id,location_id:l.id,billing_account_id:l.billing_account_id,
    invoice_number:invNum,subtotal:sub,total:sub,status:'draft',date:td(),
    notes:notes||null
  }).select().single()
  if(error){toast('Error generating invoice',false);setLoad('compBtn',false,'✓ Complete Job — Generate Invoice');return}

  if(inv&&lines.length)await SB.from('invoice_lines').insert(lines.map((ln,i2)=>({invoice_id:inv.id,...ln,sort_order:i2})))

  await SB.from('jobs').update({
    status:'completed',
    completed_at:new Date().toISOString(),
    signature_data:sig,
    notes:notes||null
  }).eq('id',id)

  // save extinguisher results
  for(const[eid,st] of Object.entries(extR)){
    try{await SB.from('extinguisher_results').insert({job_id:id,extinguisher_id:eid,status:st})}catch(e){}
  }

  await load()
  pop()
  showInv({num:inv?.invoice_number||'—',nm:l.name||'',addr:[l.address,l.city].filter(Boolean).join(', '),lines,total:sub,ro:false,iid:inv?.id,locId:l.id,jobId:id,scope:j.scope||[],syss:l.suppression_systems||[]})
}

function setSt(btn,eid,st){
  extR[eid]=st
  btn.parentElement.querySelectorAll('.sb').forEach(b=>b.className='sb')
  const map={pass:'sp',swap:'ss',replace:'sr',condemn:'sc2',remove:'sx'}
  btn.classList.add(map[st]||'')
}

let sigCtx=null,sigOn=false
function initSig(){
  const c=$('sigC');if(!c)return
  const r=c.parentElement.getBoundingClientRect();c.width=r.width;c.height=r.height
  sigCtx=c.getContext('2d');sigCtx.strokeStyle='#222';sigCtx.lineWidth=2.5;sigCtx.lineCap='round';sigCtx.lineJoin='round'
  const sp=e=>{e.preventDefault();sigOn=true;if($('sigPh'))$('sigPh').style.display='none';const p=gp(e);sigCtx.beginPath();sigCtx.moveTo(p.x,p.y)}
  const sm=e=>{if(!sigOn)return;e.preventDefault();const p=gp(e);sigCtx.lineTo(p.x,p.y);sigCtx.stroke()}
  const se=()=>{sigOn=false}
  c.addEventListener('touchstart',sp,{passive:false});c.addEventListener('touchmove',sm,{passive:false});c.addEventListener('touchend',se)
  c.addEventListener('mousedown',sp);c.addEventListener('mousemove',sm);c.addEventListener('mouseup',se)
}
function gp(e){const c=$('sigC'),r=c.getBoundingClientRect(),t=e.touches?e.touches[0]:e;return{x:t.clientX-r.left,y:t.clientY-r.top}}
function clrSig(){if(sigCtx){const c=$('sigC');sigCtx.clearRect(0,0,c.width,c.height)}if($('sigPh'))$('sigPh').style.display=''}

function renderInvLines(locked){
  const wrap=$('inv-det-lines');if(!wrap)return
  if(!invLines.length){wrap.innerHTML=`<div style="color:var(--g2);font-size:12px;padding:8px 0">No line items</div>`;return}
  wrap.innerHTML=invLines.map((l2,i)=>locked
    ?`<div class="ds-row"><div class="ds-lbl" style="flex:1;font-size:12px;color:var(--w2)">${esc(l2.desc)}${l2.qty>1?' ×'+l2.qty:''}</div><div class="ds-val" style="font-variant-numeric:tabular-nums;flex-shrink:0">${fmtD(l2.qty*l2.price)}</div></div>`
    :`<div class="li-row" data-ili="${i}">
      <input placeholder="Description" value="${esc(l2.desc||'')}" oninput="ilEdit(${i},'desc',this.value)" style="flex:2">
      <input class="li-qty" type="number" value="${l2.qty||1}" min="0.5" step="0.5" oninput="ilEdit(${i},'qty',this.value)">
      <input class="li-price" type="number" value="${+(l2.price||0)}" step="0.01" oninput="ilEdit(${i},'price',this.value)">
      <button class="li-del" onclick="ilDel(${i})">✕</button>
    </div>`
  ).join('')
  if(!locked){
    const t=invLines.reduce((s,l2)=>s+(+(l2.qty||1))*(+(l2.price||0)),0)
    wrap.innerHTML+=`<div class="ds-row" style="padding-top:10px;border-top:1.5px solid var(--b1)"><div class="ds-lbl" style="font-weight:800;color:var(--w)">Total</div><div class="ds-val" style="font-size:17px;font-weight:800;color:var(--fire)" id="inv-lines-total">${fmtD(t)}</div></div>`
  }
}

function ilEdit(i,field,val){
  if(!invLines[i])return
  if(field==='desc')invLines[i].desc=val
  else if(field==='qty')invLines[i].qty=parseFloat(val)||1
  else if(field==='price')invLines[i].price=parseFloat(val)||0
  // update totals
  const t=invLines.reduce((s,l2)=>s+(+(l2.qty||1))*(+(l2.price||0)),0)
  const el=$('inv-lines-total');if(el)el.textContent=fmtD(t)
  const el2=$('inv-det-total-sm');if(el2)el2.textContent=fmtD(t)
}

function ilDel(i){
  invLines.splice(i,1)
  renderInvLines(false)
}

function addInvLine(sel,invId){
  const v=sel.value;if(!v)return
  sel.value=''
  if(v==='CUSTOM'){
    invLines.push({desc:'',qty:1,price:0})
    renderInvLines(false)
    setTimeout(()=>{const inputs=$('inv-det-lines')?.querySelectorAll('input[placeholder="Description"]');if(inputs?.length)inputs[inputs.length-1].focus()},50)
    return
  }
  const parts=v.split('|')
  const desc=parts[0]||'',qty=parseFloat(parts[1])||1,price=parseFloat(parts[2])||0
  const existing=invLines.find(l2=>l2.desc===desc)
  if(existing){existing.qty=(+existing.qty||1)+1;renderInvLines(false);return}
  invLines.push({desc,qty,price})
  renderInvLines(false)
}

async function saveInvLines(invId){
  const btn=$('inv-save-lines-btn');if(btn){btn.textContent='Saving...';btn.disabled=true}
  const lines=invLines.filter(l2=>(l2.desc||'').trim())
  const newTotal=lines.reduce((s,l2)=>s+(+(l2.qty||1))*(+(l2.price||0)),0)
  try{
    // delete existing lines and reinsert
    await SB.from('invoice_lines').delete().eq('invoice_id',invId)
    if(lines.length)await SB.from('invoice_lines').insert(lines.map((l2,i)=>({
      invoice_id:invId,
      description:l2.desc.trim(),
      quantity:+(l2.qty)||1,

let mazonSigCtx=null,mazonSigOn=false
function initMazonSig(){
  const c=$('mazonSigC');if(!c)return
  const r=c.parentElement.getBoundingClientRect();c.width=r.width;c.height=r.height
  mazonSigCtx=c.getContext('2d');mazonSigCtx.strokeStyle='#222';mazonSigCtx.lineWidth=2.5;mazonSigCtx.lineCap='round';mazonSigCtx.lineJoin='round'
  const sp=e=>{e.preventDefault();mazonSigOn=true;if($('mazonSigPh'))$('mazonSigPh').style.display='none';const p=gp2(e);mazonSigCtx.beginPath();mazonSigCtx.moveTo(p.x,p.y)}
  const sm=e=>{if(!mazonSigOn)return;e.preventDefault();const p=gp2(e);mazonSigCtx.lineTo(p.x,p.y);mazonSigCtx.stroke()}
  const se=()=>{mazonSigOn=false}
  c.addEventListener('touchstart',sp,{passive:false});c.addEventListener('touchmove',sm,{passive:false});c.addEventListener('touchend',se)
  c.addEventListener('mousedown',sp);c.addEventListener('mousemove',sm);c.addEventListener('mouseup',se)
}
function gp2(e){const c=$('mazonSigC'),r=c.getBoundingClientRect(),t=e.touches?e.touches[0]:e;return{x:t.clientX-r.left,y:t.clientY-r.top}}
function clrMazonSig(){if(mazonSigCtx){const c=$('mazonSigC');mazonSigCtx.clearRect(0,0,c.width,c.height)}if($('mazonSigPh'))$('mazonSigPh').style.display=''}

function handlePhoto(ev){
  const file=ev.target.files[0];if(!file)return
  const reader=new FileReader()
  reader.onload=e=>{
    const prev=$('photoPrev');if(prev){prev.src=e.target.result;prev.style.display='block'}
    const st=$('aiStatus');if(st)st.style.display='block'
    $('camInput').value=''
    const img=new Image()
    img.onload=async()=>{
      const canvas=document.createElement('canvas')
      const max=1600;let w=img.width,h2=img.height
      if(w>max||h2>max){if(w>h2){h2=Math.round(h2*max/w);w=max}else{w=Math.round(w*max/h2);h2=max}}
      canvas.width=w;canvas.height=h2
      canvas.getContext('2d').drawImage(img,0,0,w,h2)
      await runPhotoAI(canvas.toDataURL('image/jpeg',0.85).split(',')[1],'image/jpeg')
    }
    img.src=e.target.result
  }
  reader.readAsDataURL(file)
}

      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        model:'claude-sonnet-4-6',max_tokens:2000,
        messages:[{role:'user',content:[
          {type:'image',source:{type:'base64',media_type:mtype,data:b64}},
          {type:'text',text:`You are the AI assistant for Stephens Advanced LLC, a fire suppression contractor in DFW Texas. Extract ALL invoice and job details from this image. Scan the ENTIRE image top to bottom.

RULES:
- LINE ITEMS: Only items with a dollar amount written next to them. No price = notes field only.
- Copy dollar amounts EXACTLY as written. Never recalculate or change math.
- Copy customer name, address, phone, email exactly as written.
- SUB TOTAL and TOTAL at the bottom are most important — copy exactly.
- Note payment method if visible (check, cash, card, PAID).
- Include work order number and date if visible.

Known customers: ${JSON.stringify(locList)}

Return ONLY valid JSON, no markdown:
{"customer_name":"","matched_location_id":null,"is_new_customer":true,"new_customer":{"name":"","address":"","city":"","state":"TX","zip":"","contact_name":"","contact_phone":"","email":""},"service_date":null,"work_order_number":"","service_type":"","line_items":[{"description":"","quantity":1,"unit_price":0,"total_as_written":""}],"subtotal_as_written":"","total_as_written":"","payment_method":"","notes":"","confidence":"high/medium/low"}`}

    const tx=$('aiTxt');if(tx)tx.textContent='Could not read photo — try again or build manually.'

    if(error){toast('Error saving customer',false);setLoad('aiSaveBtn',false,'Save Invoice');return}

  }
  const lines=[]

  if(!lines.length){toast('Add at least one line item',false);setLoad('aiSaveBtn',false,'Save Invoice');return}
  const total=lines.reduce((s,l2)=>s+l2.total,0)
  const invNum='INV-'+Date.now().toString().slice(-6)
  const{data:inv,error}=await SB.from('invoices').insert({
    location_id:finalLocId,invoice_number:invNum,date:$('ai-date')?.value||td(),
    due_date:ro?null:($('ai-due')?.value||null),status:ro?'record':'sent',subtotal:total,total,
    notes:$('ai-notes')?.value?.trim()||null
  }).select().single()
  if(error){toast('Error saving invoice',false);setLoad('aiSaveBtn',false,'Save Invoice');return}
  await SB.from('invoice_lines').insert(lines.map((l2,i)=>({invoice_id:inv.id,description:l2.description,quantity:l2.quantity,unit_price:l2.unit_price,total:l2.total,sort_order:i})))

  showInv({num:invNum,nm:loc.name,addr:[loc.address,loc.city].filter(Boolean).join(', '),lines,total,ro,iid:inv.id,locId:finalLocId})
}

async function sendInvoiceEmail(invId,toEmail,custName,invNum,btn){
  // use whatever is in the editable field if present
  const emailField=$('inv-email-to')
  const to=emailField?emailField.value.trim():toEmail
  if(!to){
    const st=$('inv-email-status');if(st){st.textContent='No email address — enter one above.';st.style.color='var(--bad)'}
    return
  }
  if(btn){btn.innerHTML='<span class="spin"></span> Sending...';btn.style.pointerEvents='none'}
  const st=$('inv-email-status');if(st){st.textContent='Sending...';st.style.color='#888'}

  // fetch full invoice data — reload from DB to ensure fresh state
  const{data:invFresh}=await SB.from('invoices').select('*').eq('id',invId).single()
  const inv=invFresh||D.invs.find(x=>x.id===invId)||{}
  const{data:lines}=await SB.from('invoice_lines').select('*').eq('invoice_id',invId).order('sort_order')
  const ls=lines||[]
  const total=ls.reduce((s,l)=>s+(+l.total||0),0)||+inv.total||0
  const loc=D.locs.find(x=>x.id===inv.location_id)||{}

  const html=buildInvoiceEmailHtml({
    invNum:inv.invoice_number||invNum,
    custName:custName||loc.name||'',
    addr:[loc.address,loc.city,loc.state,loc.zip].filter(Boolean).join(', '),
    date:inv.date?new Date(inv.date).toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'}):'',
    dueDate:inv.due_date?new Date(inv.due_date).toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'}):'',
    lines:ls,
    total
  })

  try{
    const res=await fetch('/api/send-email',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        to,
        subject:`Invoice ${inv.invoice_number||invNum} — Stephens Advanced LLC`,
        html,
        invoiceNumber:inv.invoice_number||invNum,
        customerName:custName||loc.name||''
      })
    })
    const data=await res.json()
    if(data.success){
      // update invoice status to sent + record email
      await SB.from('invoices').update({status:'sent'}).eq('id',invId)
      await load()
      if(st){st.textContent='✓ Email sent to '+to;st.style.color='var(--ok)'}
      if(btn){btn.innerHTML='✓ Sent';btn.style.background='var(--ok)'}
      toast('Invoice emailed ✓')
    }else{
      throw new Error(data.error||'Send failed')
    }
  }catch(err){
    if(st){st.textContent='Error: '+err.message;st.style.color='var(--bad)'}
    if(btn){btn.innerHTML='✉️ Send Email';btn.style.pointerEvents=''}
    toast('Email failed — check credentials',false)
    console.error(err)
  }
}

function addToCalendar({title,date,time,addr,notes}){
  const fmtDT=(d,t)=>(d+'T'+t+':00').replace(/-|:/g,'')
  const endHr=(parseInt((time||'09').split(':')[0])+2).toString().padStart(2,'0')
  const endTime=endHr+':'+(time||'09:00').split(':')[1]
  const ics=[
    'BEGIN:VCALENDAR',
    'VERSION:2.0',
    'PRODID:-//Stephens Advanced//App//EN',
    'BEGIN:VEVENT',
    'DTSTART:'+fmtDT(date,time),
    'DTEND:'+fmtDT(date,endTime),
    'SUMMARY:'+title,
    addr?'LOCATION:'+addr:'',
    notes?'DESCRIPTION:'+notes.replace(/\n/g,'\\n'):'',
    'END:VEVENT',
    'END:VCALENDAR'
  ].filter(Boolean).join('\r\n')
  const blob=new Blob([ics],{type:'text/calendar;charset=utf-8'})
  const url=URL.createObjectURL(blob)
  const a=document.createElement('a');a.href=url;a.download='stephens-job.ics';a.click()
  setTimeout(()=>URL.revokeObjectURL(url),5000)
}

    date:inv.date?new Date(inv.date).toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'}):'',
    dueDate:inv.due_date?new Date(inv.due_date).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}):'',
    lines:ls,total
  })
  try{
    const res=await fetch('/api/send-email',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({to,subject:`Invoice ${inv.invoice_number||invNum} — Stephens Advanced LLC`,html,invoiceNumber:inv.invoice_number||invNum,customerName:custName||loc.name||''})
    })
    const data=await res.json()
    if(data.success){
      await SB.from('invoices').update({status:'sent'}).eq('id',invId)
      await load()
      if(st){st.textContent='✓ Sent to '+to;st.style.color='var(--ok)'}
      if(btn){btn.innerHTML='✓ Sent';btn.style.background='var(--ok)'}
      toast('Invoice emailed ✓')
    }else{throw new Error(data.error||'Send failed')}
  }catch(err){
    if(st){st.textContent='Error: '+err.message;st.style.color='var(--bad)'}
    if(btn){btn.innerHTML='✉️ Send';btn.style.pointerEvents=''}
    toast('Email failed',false)
  }
}

async function delCust(id){
  // cascade: extinguisher_results, suppression_results, invoice_lines, invoices, jobs, extinguishers, suppression_systems, emergency_lights, then location
  const jobIds=D.jobs.filter(j=>j.location_id===id||j.location?.id===id).map(j=>j.id)
  const invIds=D.invs.filter(i=>i.location_id===id).map(i=>i.id)
  if(invIds.length)await SB.from('invoice_lines').delete().in('invoice_id',invIds)
  if(invIds.length)await SB.from('invoices').delete().in('id',invIds)
  if(jobIds.length){try{await SB.from('extinguisher_results').delete().in('job_id',jobIds)}catch(e){}}
  if(jobIds.length)await SB.from('jobs').delete().in('id',jobIds)
  try{await SB.from('extinguishers').delete().eq('location_id',id)}catch(e){}
  try{await SB.from('suppression_systems').delete().eq('location_id',id)}catch(e){}
  try{await SB.from('emergency_lights').delete().eq('location_id',id)}catch(e){}
  const{error}=await SB.from('locations').delete().eq('id',id)
  if(error){toast('Error deleting client',false);return}
  await load();toast('Client deleted')
  popAll();rCust()
}

function showJobList(filter){

  let jobs=[]

  if(filter==='today'){jobs=D.jobs.filter(j=>j.scheduled_date===t);title='Today\'s Jobs'}
  else if(filter==='overdue'){jobs=D.jobs.filter(j=>j.status==='scheduled'&&j.scheduled_date<t);title='Overdue Jobs'}

  else jobs.forEach(j=>h+=jCard(j,filter==='overdue'))
  h+=`</div>`
  push(h)
}

// ═══ MONEY FILTER ═══
function filterInvs(filter){
  const now=new Date()
  const monthStart=new Date(now.getFullYear(),now.getMonth(),1).toISOString().split('T')[0]
  const monthEnd=new Date(now.getFullYear(),now.getMonth()+1,0).toISOString().split('T')[0]
  let invs=[]
  let title=''
  if(filter==='paid'){
    invs=D.invs.filter(i=>i.status==='paid'&&i.date>=monthStart&&i.date<=monthEnd)
    title='Collected This Month'
  }else{
    invs=D.invs.filter(i=>!['paid','void','record','factored'].includes(i.status))
    title='Outstanding Invoices'
  }
  const total=invs.reduce((s,i)=>s+(+i.total),0)
  let h=`<div class="ov-hdr"><button class="ov-back" onclick="pop()">‹</button><div class="ov-title">${title}</div></div><div class="ov-body">`
  h+=`<div style="background:var(--c1);border:1px solid var(--b1);border-radius:var(--r);padding:14px;margin-bottom:16px;text-align:center"><div style="font-size:28px;font-weight:900;color:${filter==='paid'?'var(--ok)':'var(--bad)'}">${fmt(total)}</div><div style="font-size:11px;color:var(--g1);margin-top:4px">${invs.length} invoice${invs.length!==1?'s':''}</div></div>`
  if(!invs.length)h+=`<div class="ey"><div class="ey-i">💰</div><div class="ey-t">No invoices here.</div></div>`
  else h+=iHtml(invs)
  h+=`</div>`
  push(h)
}

let rptSigCtx={}
function initRptSig(key,canvasId,phId){
  const c=$(canvasId);if(!c)return
  const r=c.parentElement.getBoundingClientRect();c.width=r.width;c.height=r.height
  const ctx=c.getContext('2d');ctx.strokeStyle='#222';ctx.lineWidth=2.5;ctx.lineCap='round';ctx.lineJoin='round'
  rptSigCtx[key]=ctx
  let on=false
  const sp=e=>{e.preventDefault();on=true;if($(phId))$(phId).style.display='none';const p=gpC(e,c);ctx.beginPath();ctx.moveTo(p.x,p.y)}
  const sm=e=>{if(!on)return;e.preventDefault();const p=gpC(e,c);ctx.lineTo(p.x,p.y);ctx.stroke()}
  const se=()=>{on=false}
  c.addEventListener('touchstart',sp,{passive:false});c.addEventListener('touchmove',sm,{passive:false});c.addEventListener('touchend',se)
  c.addEventListener('mousedown',sp);c.addEventListener('mousemove',sm);c.addEventListener('mouseup',se)
}

function gpC(e,c){const r=c.getBoundingClientRect(),t=e.touches?e.touches[0]:e;return{x:t.clientX-r.left,y:t.clientY-r.top}}

function clrRptSig(key){
  const canvasId=key==='tech'?'rptTechSig':'rptOwnerSig'
  const phId=key==='tech'?'rptTechSigPh':'rptOwnerSigPh'
  const c=$(canvasId)
  if(c&&rptSigCtx[key])rptSigCtx[key].clearRect(0,0,c.width,c.height)
  if($(phId))$(phId).style.display=''
}

function calcCaNet(i){
  const c=window._caCyls[i]
  const t=parseFloat(c.tare||0),g=parseFloat(c.gross||0)
  const net=g>0&&t>0?+(g-t).toFixed(1):null
  c.actual=net!==null?net:''
  const el=$('ca-net-'+i)
  if(el){el.textContent=net!==null?net+' lb':'—';el.style.color=net!==null&&net>0?'var(--ok)':'var(--warn)'}
}

  const data={
    checks:window._caCheckState||{},
    serviceType:window._caServiceType||'semi',
    agentType:$('ca-agent-type')?.value||'',
    mfg:$('ca-mfg')?.value||'',model:$('ca-model')?.value||'',
    serial:$('ca-serial')?.value||'',area:$('ca-area')?.value||'',
    concentration:$('ca-conc')?.value||'',panel:$('ca-panel')?.value||'',
    cylinders:window._caCyls||[],
    techName:$('ca-tech-name')?.value||'',
    permit:$('ca-permit')?.value||'',
    ownerName:$('ca-owner-name')?.value||'',
    deficiencies:$('ca-deficiencies')?.value||''
  }
  const j=D.jobs.find(x=>x.id===jobId)||{}
  try{
    await SB.from('reports').upsert({job_id:jobId,location_id:j.location_id||j.location?.id,report_type:'clean_agent',report_data:data},{onConflict:'job_id'})
  }catch(e){console.error('ca report save:',e)}
  pop()
}
