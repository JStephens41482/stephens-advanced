<!DOCTYPE html>
<html lang="en">
<head>
<meta name="theme-color" content="#0d0f14"><link rel="apple-touch-icon" sizes="180x180" href="/icon-180.png"><link rel="apple-touch-icon" sizes="167x167" href="/icon-167.png"><link rel="apple-touch-icon" sizes="152x152" href="/icon-152.png"><link rel="apple-touch-icon" sizes="120x120" href="/icon-120.png"><link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png"><link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png"><link rel="manifest" href="/manifest.json"><meta name="apple-mobile-web-app-title" content="Stephens Advanced">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<meta name="theme-color" content="#0A0A10">
<title>Stephens Advanced — Customer Portal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --fire:#f05a28;--fire-2:#c94f14;
  --ok:#4ADE80;--warn:#f59e0b;--bad:#ef4444;
  --bg:#0A0A10;--surface:#14141E;--surface-2:#1A1A2A;--surface-3:#232334;
  --border:rgba(255,255,255,.08);--border-2:rgba(255,255,255,.06);--border-strong:rgba(255,255,255,.14);
  --text:#E8E8EE;--text-2:#B8B8C4;--muted:#9A9AA8;--muted-2:#6A6A78;
  --r:4px;--rs:3px;
  --font-sans:'Inter',system-ui,sans-serif;
  --font-display:'Fraunces',Georgia,serif;
  --font-mono:'JetBrains Mono',ui-monospace,Menlo,monospace;
}
body{font-family:var(--font-sans);background:var(--bg);color:var(--text);font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased}
.wrap{max-width:640px;margin:0 auto;padding:0 16px 80px}
.hdr{background:var(--surface);border-bottom:1px solid var(--border);padding:20px 16px;margin-bottom:24px}
.hdr-inner{max-width:640px;margin:0 auto;display:flex;align-items:center;gap:12px}
.logo{display:flex;align-items:center;gap:10px;font-family:var(--font-display);font-weight:500;font-size:18px;letter-spacing:-.02em;color:var(--text)}
.logo span{color:var(--fire)}
.logo-mark{width:22px;height:22px;border:2px solid var(--fire);border-radius:3px;position:relative;flex-shrink:0}
.logo-mark::after{content:'';position:absolute;inset:3px;background:var(--fire);border-radius:1px}
.logo-tag{margin-left:auto;font-family:var(--font-mono);font-size:10px;color:var(--muted);letter-spacing:.12em;text-transform:uppercase}
.cust-name{font-size:12px;color:var(--muted);margin-top:2px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:20px;margin-bottom:16px}
.card-t{font-family:var(--font-mono);font-size:10px;font-weight:500;text-transform:uppercase;letter-spacing:.12em;color:var(--muted);margin-bottom:12px}
.welcome{background:linear-gradient(135deg,var(--fire),var(--fire-2));border-radius:var(--r);padding:24px;margin-bottom:20px;color:#fff}
.welcome h1{font-family:var(--font-display);font-size:26px;font-weight:500;letter-spacing:-.02em;margin-bottom:4px}
.welcome p{font-size:13px;opacity:.9;line-height:1.5}
.stat-row{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:20px}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:16px;text-align:center}
.stat-n{font-family:var(--font-display);font-size:28px;font-weight:500;letter-spacing:-.02em;color:var(--text)}
.stat-l{font-family:var(--font-mono);font-size:10px;font-weight:500;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);margin-top:4px}
.loc{border-bottom:1px solid var(--border-2);padding:14px 0}
.loc:last-child{border-bottom:none}
.loc-nm{font-size:15px;font-weight:600;color:var(--text)}
.loc-addr{font-size:12px;color:var(--muted);margin-top:2px}
.loc-eq{display:flex;gap:8px;margin-top:8px;flex-wrap:wrap}
.eq-tag{font-family:var(--font-mono);font-size:10px;font-weight:500;padding:4px 10px;border-radius:2px;background:var(--surface-2);color:var(--text-2);border:1px solid var(--border-2);letter-spacing:.06em;text-transform:uppercase}
.inv-row{display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1px solid var(--border-2)}
.inv-row:last-child{border-bottom:none}
.inv-num{font-family:var(--font-mono);font-size:13px;font-weight:500;color:var(--text)}
.inv-date{font-size:11px;color:var(--muted)}
.inv-amt{font-family:var(--font-display);font-size:17px;font-weight:500}
.badge{font-family:var(--font-mono);font-size:9.5px;font-weight:500;text-transform:uppercase;letter-spacing:.08em;padding:3px 9px;border-radius:2px}
.b-paid{background:rgba(74,222,128,.1);color:#4ADE80;border:1px solid rgba(74,222,128,.25)}
.b-sent{background:rgba(96,165,250,.1);color:#60A5FA;border:1px solid rgba(96,165,250,.25)}
.b-draft{background:rgba(154,154,168,.1);color:var(--muted);border:1px solid var(--border)}
.b-over{background:rgba(239,68,68,.1);color:#EF4444;border:1px solid rgba(239,68,68,.25)}
.b-unpaid{background:rgba(245,158,11,.1);color:#F59E0B;border:1px solid rgba(245,158,11,.25)}
.b-partial{background:rgba(245,158,11,.1);color:#F59E0B;border:1px solid rgba(245,158,11,.25)}
.b-void{background:rgba(154,154,168,.08);color:var(--muted-2);border:1px solid var(--border-2)}
.job-row{padding:12px 0;border-bottom:1px solid var(--border-2)}
.job-row:last-child{border-bottom:none}
.job-date{font-size:14px;font-weight:600;color:var(--text)}
.job-scope{font-size:11px;color:var(--muted);margin-top:2px}
.eq-item{padding:10px 0;border-bottom:1px solid var(--border-2);display:flex;justify-content:space-between;align-items:center}
.eq-item:last-child{border-bottom:none}
.eq-name{font-size:13px;font-weight:500;color:var(--text)}
.eq-detail{font-size:11px;color:var(--muted)}
.req-form{margin-top:12px}
.req-form input,.req-form textarea,.req-form select{width:100%;padding:12px;border:1px solid var(--border);border-radius:var(--rs);font-size:14px;font-family:inherit;margin-bottom:10px;background:var(--surface-2);color:var(--text)}
.req-form input:focus,.req-form textarea:focus,.req-form select:focus{border-color:var(--fire);outline:none;background:var(--surface)}
.req-form input::placeholder,.req-form textarea::placeholder{color:var(--muted-2)}
.req-form textarea{min-height:80px;resize:none}
.req-form label{display:block;font-family:var(--font-mono);font-size:10px;font-weight:500;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);margin-bottom:6px}
.btn{width:100%;padding:14px;border-radius:var(--rs);background:var(--fire);color:#fff;font-size:14px;font-weight:600;letter-spacing:.01em;border:none;cursor:pointer;min-height:50px;transition:background .12s}
.btn:hover{background:var(--fire-2)}
.btn:active{opacity:.9}
.btn-dim{width:100%;padding:12px;border-radius:var(--rs);background:var(--surface-2);color:var(--text-2);font-size:13px;font-weight:500;border:1px solid var(--border);cursor:pointer;margin-top:8px}
.btn-dim:hover{background:var(--surface-3)}
.footer{text-align:center;padding:28px 16px 40px;font-size:11.5px;color:var(--muted);line-height:1.7}
.footer a{color:var(--fire);text-decoration:none}
.footer-trust{display:flex;justify-content:center;align-items:center;gap:18px;flex-wrap:wrap;margin-bottom:10px;font-family:var(--font-mono);font-size:10.5px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted)}
.footer-trust-dot{width:6px;height:6px;border-radius:50%;background:var(--ok);box-shadow:0 0 0 3px rgba(74,222,128,.15);display:inline-block}
.footer-trust-phone{color:var(--text-2)}
.empty{text-align:center;padding:40px;color:var(--muted-2);font-size:13px}
.tab-bar{display:flex;gap:0;margin-bottom:16px;border-bottom:1px solid var(--border);padding:0}
.tab{padding:10px 16px;border-radius:0;font-size:12px;font-weight:600;letter-spacing:.01em;color:var(--muted);cursor:pointer;white-space:nowrap;border:none;background:none;border-bottom:2px solid transparent;margin-bottom:-1px}
.tab.on{color:var(--text);border-bottom-color:var(--fire)}
.tab:hover:not(.on){color:var(--text-2)}
.note{background:rgba(240,90,40,.06);border:1px solid rgba(240,90,40,.25);border-radius:var(--rs);padding:14px;margin-bottom:16px;font-size:12.5px;color:var(--text-2);line-height:1.6}
.loading{text-align:center;padding:80px;color:var(--muted);font-size:14px}
@media(max-width:480px){
  .stat-row{grid-template-columns:1fr 1fr 1fr}.stat-n{font-size:20px}
  .wrap{padding:0 10px 80px}
  .card{padding:14px}
  .welcome{padding:18px}
  .welcome h1{font-size:18px}
  .tab{font-size:10px;padding:8px 4px;letter-spacing:0}
  .inv-row{flex-wrap:wrap;gap:4px}
  .inv-amt{font-size:14px}
  .eq-item{flex-direction:column;align-items:flex-start;gap:2px}
  .info{flex-direction:column;gap:8px}
}
</style>
</head>
<body>
<div class="hdr">
  <div class="hdr-inner">
    <a href="/" style="display:flex;align-items:center;gap:12px;text-decoration:none">
    <img src="/icon-120.png" width="32" height="32" alt="Stephens Advanced" style="border-radius:6px">
    <div>
      <div class="logo">Stephens <span>Advanced</span></div>
      <div class="cust-name" id="portalCustName">Customer Portal</div>
    </div>
    </a>
  </div>
</div>

<div class="wrap" id="portalContent">
  <div class="loading" id="portalLoading">
    <div style="font-size:32px;margin-bottom:12px;opacity:.3">🔒</div>
    Loading your portal...
  </div>
</div>

<div class="footer">
  <div class="footer-trust">
    <span><span class="footer-trust-dot"></span> Encrypted · no password needed</span>
    <span>Need help? <a href="tel:2149944799" class="footer-trust-phone">(214) 994-4799</a></span>
  </div>
  Stephens Advanced LLC · Fire Suppression &amp; Safety · Euless, TX
</div>

<script>
const SB=supabase.createClient('https://motjasdokoxwiodwzyps.supabase.co','eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1vdGphc2Rva294d2lvZHd6eXBzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMzNDI2NTcsImV4cCI6MjA4ODkxODY1N30.IMf0plnDRhVgts9LjJr219Tax4J175iuWN1u6ZKTZ-I',{auth:{persistSession:false,autoRefreshToken:false,detectSessionInUrl:false}})

const esc=s=>(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')
const fmt=n=>'$'+Math.round(n||0).toLocaleString()
function fmtDate(d,opts){if(!d)return'';try{const s=String(d).split('T')[0];return new Date(s+'T12:00:00').toLocaleDateString('en-US',opts||{month:'short',day:'numeric',year:'numeric'})}catch(e){return String(d).split('T')[0]}}
let _portalData={}
let _activeTab='overview'

async function initPortal(){
  const params=new URLSearchParams(window.location.search)
  const token=params.get('t')
  if(!token){showPortalLanding();return}

  // validate token
  const{data:tk,error}=await SB.from('portal_tokens').select('*').eq('token',token).eq('is_active',true).single()
  if(error||!tk){showError('This portal link is invalid or has been deactivated. Contact Stephens Advanced at (214) 994-4799.');return}

  // update last accessed
  await SB.from('portal_tokens').update({last_accessed_at:new Date().toISOString()}).eq('id',tk.id)

  // load data scoped to this billing account or location
  const locId=tk.location_id
  const baId=tk.billing_account_id

  // get locations for this token
  let locs=[]
  if(baId){
    const{data}=await SB.from('locations').select('*,extinguishers(id,type,size,location_in_building),suppression_systems(id,system_type,tank_count,nozzle_count,fusible_link_count),emergency_lights(id,fixture_count)').eq('billing_account_id',baId)
    locs=data||[]
  }
  if(locId&&!locs.length){
    const{data}=await SB.from('locations').select('*,extinguishers(id,type,size,location_in_building),suppression_systems(id,system_type,tank_count,nozzle_count,fusible_link_count),emergency_lights(id,fixture_count)').eq('id',locId)
    locs=data||[]
  }
  if(!locs.length){showError('No locations found for this account.');return}

  const locIds=locs.map(l=>l.id)

  // fetch jobs, invoices, and line items
  const[jobsRes,invsRes,reportsRes]=await Promise.all([
    SB.from('jobs').select('*').in('location_id',locIds).order('scheduled_date',{ascending:false}),
    SB.from('invoices').select('*').in('location_id',locIds).order('date',{ascending:false}),
    SB.from('reports').select('id,report_type,report_data,created_at,job_id').in('location_id',locIds).order('created_at',{ascending:false})
  ])

  const jobs=jobsRes.data||[]
  const invs=invsRes.data||[]
  const reports=reportsRes.data||[]

  // fetch all line items for these invoices to derive equipment
  let allLines=[]
  if(invs.length){
    const invIds=invs.map(i=>i.id)
    const{data:lines}=await SB.from('invoice_lines').select('*,invoice:invoices(location_id)').in('invoice_id',invIds)
    allLines=lines||[]
  }
  const upcoming=jobs.filter(j=>j.status==='scheduled'&&j.scheduled_date>=new Date().toISOString().split('T')[0])
  const completed=jobs.filter(j=>j.status==='completed')
  const totalOwed=invs.filter(i=>!['paid','void','record'].includes(i.status)).reduce((s,i)=>s+(+i.total||0),0)

  _portalData={locs,jobs,invs,reports,upcoming,completed,totalOwed,locIds,token:tk,allLines}

  document.getElementById('portalCustName').textContent=locs[0]?.name||(locs.length+' locations')
  renderPortal()
}

function renderPortal(){
  const{locs,jobs,invs,reports,upcoming,completed,totalOwed}=_portalData
  const content=document.getElementById('portalContent')

  const custName=locs[0]?.name||(locs.length+' locations')
  let h=`<div class="welcome">
    <h1>Welcome, ${esc(custName)}</h1>
    <p>View your equipment, invoices, inspection reports, and upcoming service. Everything in one place.</p>
  </div>

  <div class="stat-row">
    <div class="stat" style="cursor:pointer" onclick="switchTab('equipment')"><div class="stat-n">${locs.length}</div><div class="stat-l">Location${locs.length!==1?'s':''}</div></div>
    <div class="stat" style="cursor:pointer" onclick="switchTab('history')"><div class="stat-n">${completed.length}</div><div class="stat-l">Services</div></div>
    <div class="stat" style="cursor:pointer" onclick="switchTab('invoices')"><div class="stat-n" style="color:${upcoming.length?'var(--ok)':'var(--fire)'}">${upcoming.length}</div><div class="stat-l">Upcoming</div></div>
  </div>

  <div class="tab-bar">
    <button class="tab${_activeTab==='overview'?' on':''}" onclick="switchTab('overview')">Overview</button>
    <button class="tab${_activeTab==='equipment'?' on':''}" onclick="switchTab('equipment')">Equipment</button>
    <button class="tab${_activeTab==='invoices'?' on':''}" onclick="switchTab('invoices')">Invoices</button>
    <button class="tab${_activeTab==='history'?' on':''}" onclick="switchTab('history')">History</button>
    <button class="tab${_activeTab==='request'?' on':''}" onclick="switchTab('request')">Request</button>
  </div>

  <div id="portalTab"></div>`

  content.innerHTML=h
  renderTab()
}

function switchTab(tab){
  _activeTab=tab
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('on'))
  document.querySelector(`.tab[onclick="switchTab('${tab}')"]`)?.classList.add('on')
  renderTab()
}

function renderTab(){
  const{locs,jobs,invs,reports,upcoming,completed,totalOwed}=_portalData
  const wrap=document.getElementById('portalTab')
  let h=''

  if(_activeTab==='overview'){
    // service due alerts
    const now=new Date(),today=now.toISOString().split('T')[0]
    const overdueEquip=[]
    locs.forEach(l=>{
      // check suppression systems — semi-annual (6 months)
      if(l.suppression_systems?.length){
        const lastSuppJob=jobs.filter(j=>j.location_id===l.id&&j.status==='completed'&&j.scope?.includes('suppression')).sort((a,b)=>(b.completed_at||'').localeCompare(a.completed_at||''))[0]
        if(lastSuppJob?.completed_at){
          const lastDt=new Date(lastSuppJob.completed_at)
          const dueDate=new Date(lastDt);dueDate.setMonth(dueDate.getMonth()+6)
          if(dueDate<=now)overdueEquip.push({loc:l.name,item:'Kitchen Hood / Suppression',due:dueDate.toLocaleDateString('en-US',{month:'short',year:'numeric'}),urgent:true})
          else{const daysTil=Math.round((dueDate-now)/(1000*60*60*24));if(daysTil<=30)overdueEquip.push({loc:l.name,item:'Kitchen Hood / Suppression',due:dueDate.toLocaleDateString('en-US',{month:'short',year:'numeric'}),urgent:false})}
        }
      }
      // check extinguishers — annual
      if(l.extinguishers?.length){
        const lastExtJob=jobs.filter(j=>j.location_id===l.id&&j.status==='completed'&&j.scope?.includes('extinguishers')).sort((a,b)=>(b.completed_at||'').localeCompare(a.completed_at||''))[0]
        if(lastExtJob?.completed_at){
          const lastDt=new Date(lastExtJob.completed_at)
          const dueDate=new Date(lastDt);dueDate.setFullYear(dueDate.getFullYear()+1)
          if(dueDate<=now)overdueEquip.push({loc:l.name,item:'Fire Extinguishers (Annual)',due:dueDate.toLocaleDateString('en-US',{month:'short',year:'numeric'}),urgent:true})
          else{const daysTil=Math.round((dueDate-now)/(1000*60*60*24));if(daysTil<=30)overdueEquip.push({loc:l.name,item:'Fire Extinguishers (Annual)',due:dueDate.toLocaleDateString('en-US',{month:'short',year:'numeric'}),urgent:false})}
        }
      }
    })
    if(overdueEquip.length){
      h+=`<div class="card" style="border-color:${overdueEquip.some(e=>e.urgent)?'var(--bad)':'var(--warn)'};border-width:2px">
        <div class="card-t" style="color:${overdueEquip.some(e=>e.urgent)?'var(--bad)':'var(--warn)'}">⚠️ Service Due</div>`
      overdueEquip.forEach(e=>{
        const eLocId=locs.find(l=>l.name===e.loc)?.id||''
        h+=`<div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid #f5f5f5;cursor:pointer" onclick="openLocation('${eLocId}')">
          <div><div style="font-size:13px;font-weight:700">${esc(e.item)}</div><div style="font-size:11px;color:#888">${esc(e.loc)}</div></div>
          <span style="font-size:11px;font-weight:800;padding:4px 10px;border-radius:12px;background:${e.urgent?'#fee2e2':'#fef3c7'};color:${e.urgent?'#dc2626':'#92400e'}">${e.urgent?'Overdue':'Due '+e.due}</span>
        </div>`
      })
      h+=`<button onclick="switchTab('request')" style="width:100%;padding:10px;border-radius:var(--rs);background:var(--fire);color:#fff;font-size:13px;font-weight:700;border:none;cursor:pointer;margin-top:12px">Request Service Now</button></div>`
    }

    // outstanding balance with Pay Now
    if(totalOwed>0){
      const unpaidInvs=invs.filter(i=>!['paid','void','record'].includes(i.status))
      h+=`<div class="card" style="border-color:#fed7aa;border-width:2px">
        <div class="card-t" style="color:var(--warn)">Outstanding Balance</div>
        <div style="font-size:28px;font-weight:900;color:var(--fire)">${fmt(totalOwed)}</div>
        <div style="background:#fef3c7;border:1px solid #f59e0b;border-radius:8px;padding:10px;margin:12px 0 8px;text-align:center">
          <div style="font-size:13px;font-weight:800;color:#92400e">💰 A 10% discount is applied when payment is received within 24 hours of service completion.</div>
        </div>
        <div style="margin-top:8px">`
      if(unpaidInvs.length===1){
        const ui=unpaidInvs[0],loc=locs.find(l=>l.id===ui.location_id)||{}
        h+=`<button onclick="portalPayNow('${ui.id}','${esc(ui.invoice_number||'')}','${esc(loc.name||'')}',${+ui.total||0},this)" style="width:100%;padding:14px;border-radius:var(--r);background:var(--fire);color:#fff;font-size:15px;font-weight:800;border:none;cursor:pointer;min-height:50px">💳 Pay Now — ${fmt(+ui.total)}</button>`
      }else{
        h+=`<button onclick="switchTab('invoices')" style="width:100%;padding:14px;border-radius:var(--r);background:var(--fire);color:#fff;font-size:15px;font-weight:800;border:none;cursor:pointer;min-height:50px">💳 Pay Now — ${unpaidInvs.length} invoices</button>`
      }
      h+=`<div style="font-size:11px;color:#999;margin-top:6px;text-align:center">Secure payment via Square · Card, Apple Pay, or Google Pay</div>
        </div>
      </div>`
    }

    // upcoming services
    if(upcoming.length){
      h+=`<div class="card"><div class="card-t">Upcoming Services</div>`
      upcoming.forEach(j=>{
        const loc=locs.find(l=>l.id===j.location_id)
        const dt=fmtDate(j.scheduled_date,{weekday:'long',month:'long',day:'numeric',year:'numeric'})
        h+=`<div class="job-row" style="cursor:pointer" onclick="openLocation('${j.location_id}')">
          <div style="display:flex;justify-content:space-between;align-items:center">
            <div>
              <div class="job-date">${dt}</div>
              <div class="job-scope">${esc(loc?.name||'')} · ${(j.scope||[]).join(', ')}${j.scheduled_time?' · '+j.scheduled_time.slice(0,5):''}</div>
            </div>
            <span style="color:#ccc;font-size:16px">›</span>
          </div>
        </div>`
      })
      h+=`</div>`
    }

    // locations — tappable cards
    h+=`<div class="card"><div class="card-t">Your Locations</div>`
    locs.forEach(l=>{
      const extCount=l.extinguishers?.length||0
      const sysCount=l.suppression_systems?.length||0
      const lightCount=l.emergency_lights?.[0]?.fixture_count||0
      const locInvs=invs.filter(i=>i.location_id===l.id)
      const locUnpaid=locInvs.filter(i=>!['paid','void','record'].includes(i.status)).reduce((s,i)=>s+(+i.total||0),0)
      h+=`<div class="loc" style="cursor:pointer;padding:14px;margin:0 -20px;border-radius:8px;transition:background .15s" onclick="openLocation('${l.id}')" onmouseenter="this.style.background='#f5f6f8'" onmouseleave="this.style.background=''">
        <div style="display:flex;justify-content:space-between;align-items:center">
          <div class="loc-nm">${esc(l.name)}</div>
          <span style="font-size:18px;color:#ccc">›</span>
        </div>
        <div class="loc-addr">${esc([l.address,l.city,l.state,l.zip].filter(Boolean).join(', '))}</div>
        <div class="loc-eq">
          ${extCount?`<span class="eq-tag">${extCount} Ext</span>`:''}
          ${sysCount?`<span class="eq-tag">${sysCount} System${sysCount!==1?'s':''}</span>`:''}
          ${lightCount?`<span class="eq-tag">${lightCount} Lights</span>`:''}
          ${locInvs.length?`<span class="eq-tag">${locInvs.length} Invoice${locInvs.length!==1?'s':''}</span>`:''}
          ${locUnpaid>0?`<span class="eq-tag" style="background:#fee2e2;color:#dc2626">${fmt(locUnpaid)} owed</span>`:''}
        </div>
      </div>`
    })
    h+=`</div>`
  }

  if(_activeTab==='equipment'){
    const al=_portalData.allLines||[]
    // derive equipment from invoice line items per location
    let totalSys=0,totalExt=0,totalLights=0

    locs.forEach(l=>{
      // get line items for this location's invoices
      const locInvIds=invs.filter(i=>i.location_id===l.id).map(i=>i.id)
      const locLines=al.filter(ln=>locInvIds.includes(ln.invoice_id))

      // count systems from line items
      let sysList=[],extCount=0,lightCount=0
      locLines.forEach(ln=>{
        const d=(ln.description||'').toLowerCase()
        if(d.match(/semi.?annual|suppression|kitchen|ansul|pyro|buckeye|kidde|captive|clean.?agent|fm.?200|paint.?booth|dry.?chem/)){
          sysList.push(ln.description)
        }
        if(d.match(/extinguisher/)){
          extCount+=+(ln.quantity||0)
        }
        if(d.match(/e.?light|emergency.?light/)){
          lightCount+=+(ln.quantity||0)
        }
      })
      // also include equipment from DB tables
      if(l.suppression_systems?.length){
        l.suppression_systems.forEach(s=>{
          if(!sysList.some(x=>x.toLowerCase().includes((s.system_type||'').toLowerCase().split(' ')[0]))){
            sysList.push(s.system_type)
          }
        })
      }
      if(l.extinguishers?.length&&!extCount)extCount=l.extinguishers.length
      if(l.emergency_lights?.[0]?.fixture_count&&!lightCount)lightCount=l.emergency_lights[0].fixture_count

      // deduplicate systems
      const uniqueSys=[...new Set(sysList)]
      totalSys+=uniqueSys.length
      totalExt+=extCount
      totalLights+=lightCount

      h+=`<div class="card" style="cursor:pointer" onclick="openLocation('${l.id}')"><div class="card-t" style="display:flex;justify-content:space-between;align-items:center">${esc(l.name)}<span style="color:#ccc;font-size:14px">›</span></div>
        <div class="loc-addr" style="margin-bottom:12px">${esc([l.address,l.city].filter(Boolean).join(', '))}</div>`
      if(l.suppression_systems?.length){
        h+=`<div style="font-size:10px;font-weight:800;color:#999;text-transform:uppercase;letter-spacing:1px;margin:4px 0 6px">Suppression Systems · ${l.suppression_systems.length}</div>`
        l.suppression_systems.forEach(s=>{
          h+=`<div class="eq-item"><div><div class="eq-name">🔥 ${esc(s.system_type)}</div><div class="eq-detail">${s.tank_count} tank${s.tank_count!==1?'s':''} · ${s.nozzle_count} nozzle${s.nozzle_count!==1?'s':''} · ${s.fusible_link_count} link${s.fusible_link_count!==1?'s':''}</div></div></div>`
        })
      }else if(uniqueSys.length){
        h+=`<div style="font-size:10px;font-weight:800;color:#999;text-transform:uppercase;letter-spacing:1px;margin:4px 0 6px">Suppression Systems · ${uniqueSys.length}</div>`
        uniqueSys.forEach(s=>{
          h+=`<div class="eq-item"><div class="eq-name">🔥 ${esc(s)}</div></div>`
        })
      }
      if(l.extinguishers?.length){
        h+=`<div style="font-size:10px;font-weight:800;color:#999;text-transform:uppercase;letter-spacing:1px;margin:12px 0 6px">Fire Extinguishers · ${l.extinguishers.length}</div>`
        l.extinguishers.forEach(e=>{
          h+=`<div class="eq-item"><div><div class="eq-name">🧯 ${esc(e.type||'Extinguisher')} ${esc(e.size||'')}</div><div class="eq-detail">${esc(e.location_in_building||'Location not specified')}</div></div></div>`
        })
      }else if(extCount){
        h+=`<div style="font-size:10px;font-weight:800;color:#999;text-transform:uppercase;letter-spacing:1px;margin:12px 0 6px">Fire Extinguishers</div>
          <div class="eq-item"><div class="eq-name">🧯 ${extCount} unit${extCount!==1?'s':''} on file</div></div>`
      }
      if(lightCount){
        h+=`<div style="font-size:10px;font-weight:800;color:#999;text-transform:uppercase;letter-spacing:1px;margin:12px 0 6px">Emergency Lighting</div>
          <div class="eq-item"><div class="eq-name">💡 ${lightCount} fixture${lightCount!==1?'s':''}</div></div>`
      }
      if(!uniqueSys.length&&!extCount&&!lightCount){
        h+=`<div class="empty">No equipment on file</div>`
      }
      h+=`</div>`
    })

    // totals bar at top
    if(locs.length>1||totalSys||totalExt){
      const totalsHtml=`<div class="card" style="border-left:4px solid var(--fire)">
        <div class="card-t">Equipment Totals — All Locations</div>
        <div style="display:flex;gap:16px;flex-wrap:wrap">
          ${totalSys?`<div><div style="font-size:24px;font-weight:900;color:var(--fire)">${totalSys}</div><div style="font-size:10px;font-weight:700;color:#999;text-transform:uppercase">System${totalSys!==1?'s':''}</div></div>`:''}
          ${totalExt?`<div><div style="font-size:24px;font-weight:900;color:var(--fire)">${totalExt}</div><div style="font-size:10px;font-weight:700;color:#999;text-transform:uppercase">Extinguisher${totalExt!==1?'s':''}</div></div>`:''}
          ${totalLights?`<div><div style="font-size:24px;font-weight:900;color:var(--fire)">${totalLights}</div><div style="font-size:10px;font-weight:700;color:#999;text-transform:uppercase">Light Fixture${totalLights!==1?'s':''}</div></div>`:''}
        </div>
      </div>`
      h=totalsHtml+h
    }
  }

  if(_activeTab==='invoices'){
    if(!invs.length){h+=`<div class="card"><div class="empty">No invoices on file</div></div>`}
    else{
      h+=`<div class="card"><div class="card-t">All Invoices</div>`
      invs.forEach(i=>{
        const loc=locs.find(l=>l.id===i.location_id)
        const bc=i.status==='paid'?'b-paid':i.status==='sent'?'b-sent':i.status==='overdue'?'b-over':'b-draft'
        h+=`<div style="border-bottom:1px solid #f0f0f0">
          <div class="inv-row" style="cursor:pointer" onclick="toggleInvDetail('inv-detail-${i.id}')">
            <div>
              <div class="inv-num">${esc(i.invoice_number||'—')}${loc?' · '+esc(loc.name):''}</div>
              <div class="inv-date">${fmtDate(i.date,{month:'long',day:'numeric',year:'numeric'})}</div>
            </div>
            <div style="text-align:right;display:flex;align-items:center;gap:8px">
              <div><div class="inv-amt" style="color:${i.status==='paid'?'var(--ok)':'var(--fire)'}">${fmt(+i.total)}</div><span class="badge ${bc}">${i.status}</span></div>
              <span style="color:#ccc">›</span>
            </div>
          </div>
          <div id="inv-detail-${i.id}" style="display:none;padding:0 0 12px">
            <div id="inv-lines-${i.id}" style="padding:0 4px;font-size:12px;color:#888">Loading...</div>
          </div>
        </div>`
      })
      h+=`</div>`
    }
  }

  if(_activeTab==='history'){
    // show invoices grouped by location — tap to expand
    if(!invs.length){h+=`<div class="card"><div class="empty">No service history yet</div></div>`}
    else{
      locs.forEach(l=>{
        const li=invs.filter(i=>i.location_id===l.id)
        if(!li.length)return
        h+=`<div class="card"><div class="card-t" style="display:flex;justify-content:space-between;align-items:center">${esc(l.name)}<span style="cursor:pointer;font-size:11px;color:var(--fire);font-weight:700;text-transform:none;letter-spacing:0" onclick="openLocation('${l.id}')">View Location ›</span></div>`
        li.forEach(i=>{
          const dt=fmtDate(i.date)
          const bc=i.status==='paid'?'b-paid':i.status==='sent'?'b-sent':'b-draft'
          h+=`<div style="border-bottom:1px solid #f0f0f0">
            <div class="inv-row" style="cursor:pointer" onclick="toggleInvDetail('inv-detail-${i.id}')">
              <div><div class="inv-num">${esc(i.invoice_number||'—')}</div><div class="inv-date">${dt}</div></div>
              <div style="text-align:right;display:flex;align-items:center;gap:8px">
                <div><div class="inv-amt">${fmt(+i.total)}</div><span class="badge ${bc}">${i.status}</span></div>
                <span style="color:#ccc">›</span>
              </div>
            </div>
            <div id="inv-detail-${i.id}" style="display:none;padding:0 0 12px">
              <div id="inv-lines-${i.id}" style="padding:0 4px;font-size:12px;color:#888">Loading...</div>
            </div>
          </div>`
        })
        h+=`</div>`
      })
    }
  }

  if(_activeTab==='request'){
    h+=`<div class="card">
      <div class="card-t">Request Service</div>
      <div class="note">
        We understand schedules change. If you need your inspection moved up or want to schedule additional service, let us know below. We'll get back to you within one business day.
      </div>
      <div class="req-form">
        <select id="req-loc">
          ${locs.map(l=>`<option value="${l.id}">${esc(l.name)}</option>`).join('')}
        </select>
        <select id="req-type">
          <option>Move up existing service</option>
          <option>Schedule new inspection</option>
          <option>Emergency service needed</option>
          <option>Question about my account</option>
          <option>Other</option>
        </select>
        <input type="date" id="req-date" placeholder="Preferred date">
        <textarea id="req-notes" placeholder="Tell us what you need..."></textarea>
        <button class="btn" id="reqBtn" onclick="submitRequest()">Submit Request</button>
        <div id="req-status" style="text-align:center;margin-top:8px;font-size:13px;min-height:20px"></div>
      </div>
    </div>

    <div class="card">
      <div class="card-t">Documents</div>
      <div style="display:flex;gap:10px;margin-bottom:16px">
        <a href="/w9.pdf" target="_blank" style="flex:1;padding:12px;border-radius:8px;background:#f8f9fb;border:1px solid #e8eaed;text-align:center;text-decoration:none;font-size:13px;font-weight:700;color:#1a1a2e">📄 W-9</a>
        <a href="/coi.pdf" target="_blank" style="flex:1;padding:12px;border-radius:8px;background:#f8f9fb;border:1px solid #e8eaed;text-align:center;text-decoration:none;font-size:13px;font-weight:700;color:#1a1a2e">📋 COI</a>
      </div>
    </div>
    <div class="card">
      <div class="card-t">Contact Us</div>
      <div style="font-size:14px;line-height:2">
        <strong>Jon Stephens</strong><br>
        📞 <a href="tel:2149944799" style="color:var(--fire);text-decoration:none">(214) 994-4799</a>
      </div>
    </div>`
  }

  wrap.innerHTML=h
}

function openLocation(locId){
  const{locs,jobs,invs,reports}=_portalData
  const l=locs.find(x=>x.id===locId);if(!l)return
  const locJobs=jobs.filter(j=>j.location_id===locId)
  const locInvs=invs.filter(i=>i.location_id===locId)
  const locReports=reports.filter(r=>{const j=jobs.find(j2=>j2.id===r.job_id);return j&&j.location_id===locId})
  const unpaid=locInvs.filter(i=>!['paid','void','record'].includes(i.status))
  const paid=locInvs.filter(i=>i.status==='paid')

  let h=`<button onclick="switchTab('overview')" style="background:none;border:none;color:var(--fire);font-size:14px;font-weight:700;cursor:pointer;padding:0 0 16px;display:flex;align-items:center;gap:4px">‹ Back to Locations</button>`

  // Location header
  h+=`<div class="card" style="border-left:4px solid var(--fire)">
    <div style="font-size:18px;font-weight:900;color:#1a1a2e">${esc(l.name)}</div>
    <div style="font-size:13px;color:#888;margin-top:4px">${esc([l.address,l.city,l.state,l.zip].filter(Boolean).join(', '))}</div>
    ${l.contact_name?`<div style="font-size:12px;color:#888;margin-top:8px">${esc(l.contact_name)}${l.contact_phone?' · <a href="tel:'+l.contact_phone+'" style="color:var(--fire);text-decoration:none">'+l.contact_phone+'</a>':''}</div>`:''}
  </div>`

  // Equipment
  h+=`<div class="card"><div class="card-t">Equipment on File</div>`
  if(l.suppression_systems?.length){
    l.suppression_systems.forEach(s=>{
      h+=`<div class="eq-item"><div><div class="eq-name">🔥 ${esc(s.system_type)}</div><div class="eq-detail">${s.tank_count} tank${s.tank_count!==1?'s':''} · ${s.nozzle_count} nozzles · ${s.fusible_link_count} links</div></div></div>`
    })
  }
  if(l.extinguishers?.length){
    l.extinguishers.forEach(e=>{
      h+=`<div class="eq-item"><div><div class="eq-name">🧯 ${esc(e.type)} ${esc(e.size||'')}</div><div class="eq-detail">${esc(e.location_in_building||'')}</div></div></div>`
    })
  }
  if(l.emergency_lights?.[0]?.fixture_count){
    h+=`<div class="eq-item"><div class="eq-name">💡 ${l.emergency_lights[0].fixture_count} Emergency Light Fixtures</div></div>`
  }
  if(!l.suppression_systems?.length&&!l.extinguishers?.length){
    h+=`<div class="empty">No equipment on file yet</div>`
  }
  h+=`</div>`

  // ALL invoices — tappable to expand and show reports
  if(locInvs.length){
    h+=`<div class="card"><div class="card-t">Invoices · ${locInvs.length}</div>`
    locInvs.forEach(i=>{
      const dt=fmtDate(i.date)
      const bc=i.status==='paid'?'b-paid':i.status==='sent'?'b-sent':i.status==='overdue'?'b-over':'b-draft'
      const paidInfo=i.status==='paid'?(i.payment_method?' · Paid by '+i.payment_method:''):''
      h+=`<div style="border-bottom:1px solid #f0f0f0">
        <div class="inv-row" style="cursor:pointer" onclick="toggleInvDetail('inv-detail-${i.id}')">
          <div>
            <div class="inv-num">${esc(i.invoice_number||'—')}</div>
            <div class="inv-date">${dt}${paidInfo}</div>
          </div>
          <div style="text-align:right;display:flex;align-items:center;gap:8px">
            <div><div class="inv-amt" style="color:${i.status==='paid'?'var(--ok)':'var(--fire)'}">${fmt(+i.total)}</div><span class="badge ${bc}">${i.status}</span></div>
            <span style="font-size:16px;color:#ccc">›</span>
          </div>
        </div>
        <div id="inv-detail-${i.id}" style="display:none;padding:0 0 12px">
          <div id="inv-lines-${i.id}" style="padding:0 4px;font-size:12px;color:#888">Loading...</div>
        </div>
      </div>`
    })
    h+=`</div>`
  }else{
    h+=`<div class="card"><div class="empty">No invoices yet</div></div>`
  }

  // Last service summary
  const lastCompleted=locJobs.filter(j=>j.status==='completed').sort((a,b)=>(b.completed_at||'').localeCompare(a.completed_at||''))[0]
  if(lastCompleted){
    const dt=fmtDate(lastCompleted.completed_at||lastCompleted.scheduled_date)
    h+=`<div class="card"><div class="card-t">Last Service</div>
      <div style="font-size:14px;font-weight:700">${dt}</div>
      <div style="font-size:12px;color:#888;margin-top:2px">${(lastCompleted.scope||[]).join(', ')}</div>
    </div>`
  }

  // Upcoming services at this location
  const upcomingHere=locJobs.filter(j=>j.status==='scheduled'&&j.scheduled_date>=new Date().toISOString().split('T')[0])
  if(upcomingHere.length){
    h+=`<div class="card"><div class="card-t">Upcoming Services</div>`
    upcomingHere.forEach(j=>{
      const dt=fmtDate(j.scheduled_date,{weekday:'short',month:'short',day:'numeric',year:'numeric'})
      h+=`<div class="job-row">
        <div class="job-date">${dt}</div>
        <div class="job-scope">${(j.scope||[]).join(', ')}${j.scheduled_time?' · '+j.scheduled_time.slice(0,5):''}</div>
      </div>`
    })
    h+=`</div>`
  }

  document.getElementById('portalTab').innerHTML=h
}

async function toggleInvDetail(elId){
  const el=document.getElementById(elId);if(!el)return
  if(el.style.display==='block'){el.style.display='none';return}
  el.style.display='block'

  const invId=elId.replace('inv-detail-','')
  const linesWrap=document.getElementById('inv-lines-'+invId)
  if(!linesWrap)return

  // fetch line items
  const{data:lines}=await SB.from('invoice_lines').select('*').eq('invoice_id',invId).order('sort_order')
  const inv=_portalData.invs.find(i=>i.id===invId)||{}

  let ih=''
  if(lines?.length){
    ih+=`<table style="width:100%;font-size:13px;border-collapse:collapse;margin-bottom:12px">`
    ih+=`<tr style="border-bottom:1px solid #eee"><th style="text-align:left;padding:6px 0;font-size:10px;color:#999;font-weight:700">DESCRIPTION</th><th style="text-align:center;padding:6px 0;font-size:10px;color:#999;font-weight:700;width:40px">QTY</th><th style="text-align:right;padding:6px 0;font-size:10px;color:#999;font-weight:700;width:70px">PRICE</th><th style="text-align:right;padding:6px 0;font-size:10px;color:#999;font-weight:700;width:70px">TOTAL</th></tr>`
    lines.forEach(l=>{
      ih+=`<tr style="border-bottom:1px solid #f5f5f5"><td style="padding:6px 0;color:#444">${esc(l.description)}</td><td style="text-align:center;color:#888">${l.quantity}</td><td style="text-align:right;color:#888">$${(+l.unit_price).toFixed(2)}</td><td style="text-align:right;font-weight:700;color:#333">$${(+l.total).toFixed(2)}</td></tr>`
    })
    const total=lines.reduce((s,l)=>s+(+l.total||0),0)
    ih+=`<tr><td colspan="3" style="padding:8px 0;font-weight:800;color:#1a1a2e">Total</td><td style="text-align:right;padding:8px 0;font-weight:900;font-size:16px;color:var(--fire)">$${total.toFixed(2)}</td></tr></table>`
  }

  // Print Invoice PDF button
  if(lines?.length){
    const loc=_portalData.locs.find(l=>l.id===inv.location_id)||{}
    ih+=`<button onclick="printInvoice('${invId}')" style="width:100%;padding:10px;border-radius:var(--rs);background:#f3f4f6;color:#555;font-size:13px;font-weight:700;border:none;cursor:pointer;margin-bottom:12px">🖨 Print Invoice PDF</button>`
  }

  // fetch reports for this invoice's job
  if(inv.job_id){
    const{data:rpts}=await SB.from('reports').select('id,report_type,report_data,created_at').eq('job_id',inv.job_id).order('created_at')
    // show ALL reports (no deduplication)
    const unique=rpts||[]
    if(unique.length){
      ih+=`<div style="font-size:10px;font-weight:800;color:#999;text-transform:uppercase;letter-spacing:1px;margin:8px 0">Reports</div>`
      unique.forEach(r=>{
        const icon=r.report_type==='extinguisher'?'🧯':r.report_type==='dry_chemical'?'🏭':r.report_type==='clean_agent'?'💨':'🔥'
        const name=r.report_type==='extinguisher'?'Extinguisher Report':r.report_type==='dry_chemical'?'Dry Chemical Report':r.report_type==='clean_agent'?'Clean Agent Report':'Kitchen Hood Report'
        const dt=r.created_at?new Date(r.created_at).toLocaleDateString('en-US',{month:'short',day:'numeric'}):''
        ih+=`<div style="display:flex;align-items:center;gap:8px;padding:10px 0;border-bottom:1px solid #f5f5f5">
          <span>${icon}</span>
          <span style="font-size:13px;font-weight:600;color:#333;flex:1">${name}</span>
          <span style="font-size:11px;color:#999">${dt}</span>
          <button onclick="viewReport('${r.id}')" style="font-size:11px;font-weight:700;color:var(--fire);background:none;border:1px solid var(--fire);border-radius:6px;padding:5px 10px;cursor:pointer">View / Print</button>
        </div>`
      })
    }
  }

  // fetch customer-uploaded documents (vendor POs, work orders, photos)
  const{data:atts}=await SB.from('invoice_attachments').select('id,file_name,file_path,file_type,file_size,label,uploaded_at').eq('invoice_id',invId).order('uploaded_at')
  if(atts&&atts.length){
    ih+=`<div style="font-size:10px;font-weight:800;color:#999;text-transform:uppercase;letter-spacing:1px;margin:12px 0 8px">Documents · ${atts.length}</div>`
    atts.forEach(a=>{
      const icon=(a.file_type||'').startsWith('image/')?'🖼️':'📄'
      const labelName=a.label==='work_order'?'Work Order':a.label==='po'?'Purchase Order':a.label==='compliance'?'Compliance':a.label==='photo'?'Photo':'Document'
      const sizeKb=a.file_size?Math.round(a.file_size/1024)+' KB':''
      const dt=a.uploaded_at?new Date(a.uploaded_at).toLocaleDateString('en-US',{month:'short',day:'numeric'}):''
      ih+=`<div style="display:flex;align-items:center;gap:8px;padding:10px 0;border-bottom:1px solid #f5f5f5">

async function portalPayNow(invId,invNum,custName,amount,btn){
  btn.textContent='Creating payment link...';btn.disabled=true
  try{
    const res=await fetch('/api/create-payment-link',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({invoiceNumber:invNum,customerName:custName,amount:amount,invoiceId:invId})
    })
    const data=await res.json()
    if(data.success&&data.paymentLink){
      window.location.href=data.paymentLink
    }else{
      console.error('Square error:',data)
      btn.textContent='Error: '+(data.error||'unknown')+' — call (214) 994-4799';btn.style.background='var(--bad)';btn.style.fontSize='11px'
    }
  }catch(e){
    console.error('pay error:',e)
    btn.textContent='Network error — call (214) 994-4799';btn.style.background='var(--bad)'
  }
}

    btn.textContent='Look Up Invoice →';btn.disabled=false
  }catch(e){
    result.innerHTML='<div style="color:#888;font-size:13px">Invoice not found. Double check the number or call <a href="tel:2149944799" style="color:var(--fire)">(214) 994-4799</a></div>'
    btn.textContent='Look Up Invoice →';btn.disabled=false
  }
}

async function portalInvPay(invId,invNum,amount,btn){
  btn.textContent='Creating payment link...';btn.disabled=true
  try{
    const res=await fetch('/api/create-payment-link',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({invoiceNumber:invNum,customerName:'Customer',amount:amount,invoiceId:invId})
    })
    const data=await res.json()
    if(data.success&&data.paymentLink){
      window.location.href=data.paymentLink
    }else{
      btn.textContent='Error — call (214) 994-4799';btn.style.background='var(--bad)';btn.style.fontSize='12px'
    }
  }catch(e){
    btn.textContent='Error — call (214) 994-4799';btn.style.background='var(--bad)'
  }
}

// Landing-page tab switch (sign-in ↔ pay-an-invoice)
function plSwitchTab(which){
  const si=document.getElementById('pl-pane-signin'),inv=document.getElementById('pl-pane-invoice')
  const tsi=document.getElementById('pl-tab-signin'),tinv=document.getElementById('pl-tab-invoice')
  if(!si||!inv)return
  if(which==='invoice'){
    si.style.display='none';inv.style.display=''
    tsi.classList.remove('on');tsi.setAttribute('aria-selected','false')
    tinv.classList.add('on');tinv.setAttribute('aria-selected','true')
    const i=document.getElementById('inv-lookup');if(i)setTimeout(()=>i.focus(),60)
  }else{
    si.style.display='';inv.style.display='none'
    tsi.classList.add('on');tsi.setAttribute('aria-selected','true')
    tinv.classList.remove('on');tinv.setAttribute('aria-selected','false')
    const i=document.getElementById('pl-phone');if(i)setTimeout(()=>i.focus(),60)
  }
}

initPortal()

// ═══ RIKER PORTAL CHAT WIDGET ═══
// Sends to /api/riker with context=portal + the portal_token for auth.
const RIKER_PORTAL_SESSION='riker_portal_session'
let _rkOpen=false,_rkMsgs=[],_rkLast=0,_rkBusy=false

function rkToggle(){
  _rkOpen=!_rkOpen
  const p=document.getElementById('rkPanel')
  if(!p)return
  p.classList.toggle('open',_rkOpen)
  if(_rkOpen){
    if(!_rkMsgs.length){
      const nm=(_portalData?.locs?.[0]?.contact_name||'').split(' ')[0]||'there'
      _rkMsgs.push({role:'assistant',content:`Hi ${nm}, I'm Riker. How can I help? You can ask about invoices, equipment, or request service.`})
      rkRender()
    }
    setTimeout(()=>{const i=document.getElementById('rkInput');if(i)i.focus()},120)
  }
}

function rkRender(){
  const el=document.getElementById('rkMsgs');if(!el)return
  el.innerHTML=_rkMsgs.map(m=>{
    const isUser=m.role==='user'
    return`<div style="display:flex;justify-content:${isUser?'flex-end':'flex-start'};margin-bottom:8px">
      <div style="max-width:82%;padding:10px 13px;border-radius:${isUser?'16px 16px 4px 16px':'16px 16px 16px 4px'};background:${isUser?'#f05a28':'#eef2f6'};color:${isUser?'#fff':'#1a1a2e'};font-size:13.5px;line-height:1.45;word-wrap:break-word;white-space:pre-wrap">${rkEsc(m.content)}</div>
    </div>`
  }).join('')
  el.scrollTop=el.scrollHeight
}
function rkEsc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function rkKey(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();rkSend()}}

async function rkSend(){
  if(_rkBusy)return
  const input=document.getElementById('rkInput')
  const msg=input?.value?.trim()
  if(!msg)return
  const now=Date.now();if(now-_rkLast<1200)return
  _rkLast=now;input.value=''
  _rkMsgs.push({role:'user',content:msg});rkRender()
  _rkBusy=true
  const typ=document.getElementById('rkTyping');if(typ)typ.style.display='flex'
  const sessionId=sessionStorage.getItem(RIKER_PORTAL_SESSION)||null
  const portalToken=_portalData?.token?.token
  try{
    const res=await fetch('/api/riker',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        context:'portal',
        session_id:sessionId,
        message:msg,
        auth:{portal_token:portalToken}
      })
    })
    const data=await res.json()
    if(data.session_id)sessionStorage.setItem(RIKER_PORTAL_SESSION,data.session_id)
    if(data.reply)_rkMsgs.push({role:'assistant',content:data.reply})
    else if(data.error)_rkMsgs.push({role:'assistant',content:'Sorry, something went wrong. Call (214) 994-4799.'})
  }catch(e){
    _rkMsgs.push({role:'assistant',content:"I'm having trouble connecting. Call (214) 994-4799."})
  }finally{
    _rkBusy=false
    if(typ)typ.style.display='none'
    rkRender()
  }
}

// Inject chat widget markup + styles only when portal loads successfully
function rkMount(){
  if(!_portalData?.token?.token)return  // only for authenticated portal sessions
  const style=document.createElement('style')
  style.textContent=`
  #rkBtn{position:fixed;bottom:20px;right:20px;width:56px;height:56px;border-radius:50%;background:linear-gradient(135deg,#f05a28,#d44a1a);border:none;color:#fff;cursor:pointer;z-index:5000;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 16px rgba(240,90,40,.35);transition:transform .18s}
  #rkBtn:hover{transform:translateY(-2px) scale(1.05)}
  #rkPanel{position:fixed;bottom:86px;right:20px;width:360px;max-width:calc(100vw - 40px);height:520px;max-height:calc(100vh - 120px);background:#fff;border:1px solid #e0e3e8;border-radius:14px;z-index:5001;box-shadow:0 16px 48px rgba(0,0,0,.18);opacity:0;transform:translateY(10px) scale(.97);pointer-events:none;transition:opacity .2s,transform .2s;overflow:hidden;display:flex;flex-direction:column}
  #rkPanel.open{opacity:1;transform:translateY(0) scale(1);pointer-events:auto}
  .rkh{display:flex;align-items:center;gap:10px;padding:14px 16px;border-bottom:1px solid #eef1f4;background:linear-gradient(135deg,rgba(240,90,40,.06),transparent);flex-shrink:0}
  .rkh-i{width:34px;height:34px;border-radius:50%;background:rgba(240,90,40,.12);color:#f05a28;display:flex;align-items:center;justify-content:center}
  .rkh-t{font-size:14px;font-weight:800;color:#1a1a2e}
  .rkh-s{font-size:11px;color:#888;margin-top:1px}
  .rkh-x{margin-left:auto;background:none;border:none;color:#888;font-size:18px;cursor:pointer;padding:4px 8px}
  .rkh-x:hover{color:#1a1a2e}
  #rkMsgs{flex:1;overflow-y:auto;padding:14px 14px 4px;background:#fff}
  #rkTyping{display:none;align-items:center;gap:4px;padding:4px 20px 8px}
  #rkTyping span{width:6px;height:6px;border-radius:50%;background:#f05a28;opacity:.6;animation:rkDot 1.2s infinite}
  #rkTyping span:nth-child(2){animation-delay:.15s}
  #rkTyping span:nth-child(3){animation-delay:.3s}
  @keyframes rkDot{0%,60%,100%{transform:translateY(0);opacity:.4}30%{transform:translateY(-4px);opacity:1}}
  .rkin{display:flex;gap:8px;padding:10px 12px;border-top:1px solid #eef1f4;background:#fafbfc;align-items:flex-end}
  .rkin textarea{flex:1;background:#fff;border:1px solid #dfe3e8;border-radius:10px;color:#1a1a2e;font-size:13.5px;padding:9px 11px;resize:none;font-family:inherit;line-height:1.35;max-height:90px;outline:none}
  .rkin textarea:focus{border-color:#f05a28}
  .rkin button{width:38px;height:38px;border-radius:10px;background:#f05a28;border:none;color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
  .rkin button:hover{background:#d44a1a}
  @media(max-width:480px){
    #rkPanel{width:calc(100vw - 16px);right:8px;bottom:76px;height:calc(100vh - 90px)}
    #rkBtn{right:12px;bottom:12px;width:52px;height:52px}
  }`
  document.head.appendChild(style)

  const btn=document.createElement('button')
  btn.id='rkBtn';btn.setAttribute('onclick','rkToggle()');btn.setAttribute('aria-label','Chat with Riker')
  btn.innerHTML='<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>'
  document.body.appendChild(btn)

  const panel=document.createElement('div')
  panel.id='rkPanel'
  panel.innerHTML=`
    <div class="rkh">
      <div class="rkh-i"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg></div>
      <div><div class="rkh-t">Riker</div><div class="rkh-s">Stephens Advanced</div></div>
      <button class="rkh-x" onclick="rkToggle()" aria-label="Close">✕</button>
    </div>
    <div id="rkMsgs"></div>
    <div id="rkTyping"><span></span><span></span><span></span></div>
    <div class="rkin">
      <textarea id="rkInput" placeholder="Ask about your account, request service…" rows="1" onkeydown="rkKey(event)"></textarea>
      <button onclick="rkSend()" aria-label="Send"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M22 2L11 13"/><path d="M22 2l-7 20-4-9-9-4 20-7z"/></svg></button>
    </div>`
  document.body.appendChild(panel)
}

// Hook into initPortal's success path — poll briefly for _portalData.token
const _rkMountInterval=setInterval(()=>{
  if(_portalData?.token?.token){
    clearInterval(_rkMountInterval)
    rkMount()
  }
},300)
setTimeout(()=>clearInterval(_rkMountInterval),8000)
</script>
