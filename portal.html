<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<meta name="theme-color" content="#ffffff">
<title>Stephens Advanced — Customer Portal</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--fire:#f05a28;--ok:#10b981;--warn:#f59e0b;--bad:#ef4444;--r:12px;--rs:8px}
body{font-family:'Inter',system-ui,sans-serif;background:#f8f9fb;color:#1a1a2e;font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased}
.wrap{max-width:640px;margin:0 auto;padding:0 16px 80px}
.hdr{background:#fff;border-bottom:1px solid #e8eaed;padding:20px 16px;margin-bottom:24px}
.hdr-inner{max-width:640px;margin:0 auto;display:flex;align-items:center;gap:12px}
.logo{display:flex;align-items:center;gap:8px;font-size:18px;font-weight:900;letter-spacing:-.5px;color:#1a1a2e}
.logo span{color:var(--fire)}
.cust-name{font-size:12px;color:#888;margin-top:2px}
.card{background:#fff;border:1px solid #e8eaed;border-radius:var(--r);padding:20px;margin-bottom:16px;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.card-t{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:1.5px;color:#999;margin-bottom:12px}
.welcome{background:linear-gradient(135deg,var(--fire),#d44a1a);border-radius:var(--r);padding:24px;margin-bottom:20px;color:#fff}
.welcome h1{font-size:22px;font-weight:900;margin-bottom:4px}
.welcome p{font-size:13px;opacity:.85;line-height:1.5}
.stat-row{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:20px}
.stat{background:#fff;border:1px solid #e8eaed;border-radius:var(--r);padding:16px;text-align:center}
.stat-n{font-size:24px;font-weight:900;color:var(--fire)}
.stat-l{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:#999;margin-top:4px}
.loc{border-bottom:1px solid #f0f0f0;padding:14px 0}
.loc:last-child{border-bottom:none}
.loc-nm{font-size:15px;font-weight:700}
.loc-addr{font-size:12px;color:#888;margin-top:2px}
.loc-eq{display:flex;gap:8px;margin-top:8px;flex-wrap:wrap}
.eq-tag{font-size:10px;font-weight:700;padding:4px 10px;border-radius:20px;background:#f0f4f8;color:#555}
.inv-row{display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1px solid #f0f0f0}
.inv-row:last-child{border-bottom:none}
.inv-num{font-size:13px;font-weight:700}
.inv-date{font-size:11px;color:#888}
.inv-amt{font-size:16px;font-weight:800}
.badge{font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:.5px;padding:3px 10px;border-radius:20px}
.b-paid{background:#d1fae5;color:#059669}
.b-sent{background:#e0e7ff;color:#4f46e5}
.b-draft{background:#f3f4f6;color:#6b7280}
.b-over{background:#fee2e2;color:#dc2626}
.job-row{padding:12px 0;border-bottom:1px solid #f0f0f0}
.job-row:last-child{border-bottom:none}
.job-date{font-size:14px;font-weight:700}
.job-scope{font-size:11px;color:#888;margin-top:2px}
.eq-item{padding:10px 0;border-bottom:1px solid #f0f0f0;display:flex;justify-content:space-between;align-items:center}
.eq-item:last-child{border-bottom:none}
.eq-name{font-size:13px;font-weight:600}
.eq-detail{font-size:11px;color:#888}
.req-form{margin-top:12px}
.req-form input,.req-form textarea,.req-form select{width:100%;padding:12px;border:1.5px solid #e0e0e0;border-radius:var(--rs);font-size:14px;font-family:inherit;margin-bottom:10px;background:#fff;color:#1a1a2e}
.req-form input:focus,.req-form textarea:focus{border-color:var(--fire);outline:none}
.req-form textarea{min-height:80px;resize:none}
.btn{width:100%;padding:14px;border-radius:var(--r);background:var(--fire);color:#fff;font-size:15px;font-weight:800;border:none;cursor:pointer;min-height:50px}
.btn:active{opacity:.9}
.btn-dim{width:100%;padding:12px;border-radius:var(--r);background:#f3f4f6;color:#555;font-size:13px;font-weight:700;border:none;cursor:pointer;margin-top:8px}
.footer{text-align:center;padding:32px 16px;font-size:11px;color:#bbb}
.footer a{color:var(--fire);text-decoration:none}
.empty{text-align:center;padding:40px;color:#ccc;font-size:13px}
.tab-bar{display:flex;gap:4px;margin-bottom:16px;background:#fff;border:1px solid #e8eaed;border-radius:var(--r);padding:4px;overflow-x:auto}
.tab{flex:1;padding:10px 8px;border-radius:var(--rs);font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;text-align:center;color:#888;cursor:pointer;white-space:nowrap;border:none;background:none}
.tab.on{background:var(--fire);color:#fff}
.note{background:#fffbf5;border:1px solid #fed7aa;border-radius:var(--rs);padding:14px;margin-bottom:16px;font-size:12px;color:#92400e;line-height:1.6}
.loading{text-align:center;padding:80px;color:#999;font-size:14px}
@media(max-width:480px){
  .stat-row{grid-template-columns:1fr 1fr 1fr}.stat-n{font-size:20px}
  .wrap{padding:0 10px 80px}
  .card{padding:14px}
  .welcome{padding:18px}
  .welcome h1{font-size:18px}
  .tab{font-size:10px;padding:8px 4px;letter-spacing:0}
  .inv-row{flex-wrap:wrap;gap:4px}
  .inv-amt{font-size:14px}
  .eq-item{flex-direction:column;align-items:flex-start;gap:2px}
  .info{flex-direction:column;gap:8px}
}
</style>
</head>
<body>
<div class="hdr">
  <div class="hdr-inner">
    <svg width="28" height="32" viewBox="0 0 32 38" fill="none"><path d="M16 2C16 2 6 10 6 20C6 26 10 30 16 30C22 30 26 26 26 20C26 10 16 2 16 2Z" fill="#f05a28"/><path d="M16 8C16 8 10 14 10 20C10 23 12 25 14 26C13 23 14 20 16 18C18 20 19 23 18 26C20 25 22 23 22 20C22 14 16 8 16 8Z" fill="#ff7847"/><ellipse cx="16" cy="30" rx="5" ry="6" fill="#3498db"/><ellipse cx="16" cy="29" rx="3" ry="3.5" fill="#5dade2"/></svg>
    <div>
      <div class="logo">Stephens <span>Advanced</span></div>
      <div class="cust-name" id="portalCustName">Customer Portal</div>
    </div>
  </div>
</div>

<div class="wrap" id="portalContent">
  <div class="loading" id="portalLoading">
    <div style="font-size:32px;margin-bottom:12px;opacity:.3">🔒</div>
    Loading your portal...
  </div>
</div>

<div class="footer">
  Stephens Advanced LLC · Fire Suppression & Safety<br>
  <a href="tel:2149944799">(214) 994-4799</a>
</div>

<script>
const SB=supabase.createClient('https://motjasdokoxwiodwzyps.supabase.co','eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1vdGphc2Rva294d2lvZHd6eXBzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMzNDI2NTcsImV4cCI6MjA4ODkxODY1N30.IMf0plnDRhVgts9LjJr219Tax4J175iuWN1u6ZKTZ-I',{auth:{persistSession:false,autoRefreshToken:false,detectSessionInUrl:false}})

const esc=s=>(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')
const fmt=n=>'$'+Math.round(n||0).toLocaleString()
function fmtDate(d,opts){if(!d)return'';try{const s=String(d).split('T')[0];return new Date(s+'T12:00:00').toLocaleDateString('en-US',opts||{month:'short',day:'numeric',year:'numeric'})}catch(e){return String(d).split('T')[0]}}
let _portalData={}
let _activeTab='overview'

async function initPortal(){
  const params=new URLSearchParams(window.location.search)
  const token=params.get('t')
  if(!token){showPortalLanding();return}

  // validate token
  const{data:tk,error}=await SB.from('portal_tokens').select('*').eq('token',token).eq('is_active',true).single()
  if(error||!tk){showError('This portal link is invalid or has been deactivated. Contact Stephens Advanced at (214) 994-4799.');return}

  // update last accessed
  await SB.from('portal_tokens').update({last_accessed_at:new Date().toISOString()}).eq('id',tk.id)

  // load data scoped to this billing account or location
  const locId=tk.location_id
  const baId=tk.billing_account_id

  // get locations for this token
  let locs=[]
  if(baId){
    const{data}=await SB.from('locations').select('*,extinguishers(id,type,size,location_in_building),suppression_systems(id,system_type,tank_count,nozzle_count,fusible_link_count),emergency_lights(id,fixture_count)').eq('billing_account_id',baId)
    locs=data||[]
  }
  if(locId&&!locs.length){
    const{data}=await SB.from('locations').select('*,extinguishers(id,type,size,location_in_building),suppression_systems(id,system_type,tank_count,nozzle_count,fusible_link_count),emergency_lights(id,fixture_count)').eq('id',locId)
    locs=data||[]
  }
  if(!locs.length){showError('No locations found for this account.');return}

  const locIds=locs.map(l=>l.id)

  // fetch jobs, invoices, and line items
  const[jobsRes,invsRes,reportsRes]=await Promise.all([
    SB.from('jobs').select('*').in('location_id',locIds).order('scheduled_date',{ascending:false}),
    SB.from('invoices').select('*').in('location_id',locIds).order('date',{ascending:false}),
    SB.from('reports').select('id,report_type,report_data,created_at,job_id').in('location_id',locIds).order('created_at',{ascending:false})
  ])

  const jobs=jobsRes.data||[]
  const invs=invsRes.data||[]
  const reports=reportsRes.data||[]

  // fetch all line items for these invoices to derive equipment
  let allLines=[]
  if(invs.length){
    const invIds=invs.map(i=>i.id)
    const{data:lines}=await SB.from('invoice_lines').select('*,invoice:invoices(location_id)').in('invoice_id',invIds)
    allLines=lines||[]
  }
  const upcoming=jobs.filter(j=>j.status==='scheduled'&&j.scheduled_date>=new Date().toISOString().split('T')[0])
  const completed=jobs.filter(j=>j.status==='completed')
  const totalOwed=invs.filter(i=>!['paid','void','record'].includes(i.status)).reduce((s,i)=>s+(+i.total||0),0)

  _portalData={locs,jobs,invs,reports,upcoming,completed,totalOwed,locIds,token:tk,allLines}

  document.getElementById('portalCustName').textContent=locs[0]?.name||(locs.length+' locations')
  renderPortal()
}

function renderPortal(){
  const{locs,jobs,invs,reports,upcoming,completed,totalOwed}=_portalData
  const content=document.getElementById('portalContent')

  const custName=locs[0]?.name||(locs.length+' locations')
  let h=`<div class="welcome">
    <h1>Welcome, ${esc(custName)}</h1>
    <p>View your equipment, invoices, inspection reports, and upcoming service. Everything in one place.</p>
  </div>

  <div class="stat-row">
    <div class="stat" style="cursor:pointer" onclick="switchTab('equipment')"><div class="stat-n">${locs.length}</div><div class="stat-l">Location${locs.length!==1?'s':''}</div></div>
    <div class="stat" style="cursor:pointer" onclick="switchTab('history')"><div class="stat-n">${completed.length}</div><div class="stat-l">Services</div></div>
    <div class="stat" style="cursor:pointer" onclick="switchTab('invoices')"><div class="stat-n" style="color:${upcoming.length?'var(--ok)':'var(--fire)'}">${upcoming.length}</div><div class="stat-l">Upcoming</div></div>
  </div>

  <div class="tab-bar">
    <button class="tab${_activeTab==='overview'?' on':''}" onclick="switchTab('overview')">Overview</button>
    <button class="tab${_activeTab==='equipment'?' on':''}" onclick="switchTab('equipment')">Equipment</button>
    <button class="tab${_activeTab==='invoices'?' on':''}" onclick="switchTab('invoices')">Invoices</button>
    <button class="tab${_activeTab==='history'?' on':''}" onclick="switchTab('history')">History</button>
    <button class="tab${_activeTab==='request'?' on':''}" onclick="switchTab('request')">Request</button>
  </div>

  <div id="portalTab"></div>`

  content.innerHTML=h
  renderTab()
}

function switchTab(tab){
  _activeTab=tab
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('on'))
  document.querySelector(`.tab[onclick="switchTab('${tab}')"]`)?.classList.add('on')
  renderTab()
}

function renderTab(){
  const{locs,jobs,invs,reports,upcoming,completed,totalOwed}=_portalData
  const wrap=document.getElementById('portalTab')
  let h=''

  if(_activeTab==='overview'){
    // service due alerts
    const now=new Date(),today=now.toISOString().split('T')[0]
    const overdueEquip=[]
    locs.forEach(l=>{
      // check suppression systems — semi-annual (6 months)
      if(l.suppression_systems?.length){
        const lastSuppJob=jobs.filter(j=>j.location_id===l.id&&j.status==='completed'&&j.scope?.includes('suppression')).sort((a,b)=>(b.completed_at||'').localeCompare(a.completed_at||''))[0]
        if(lastSuppJob?.completed_at){
          const lastDt=new Date(lastSuppJob.completed_at)
          const dueDate=new Date(lastDt);dueDate.setMonth(dueDate.getMonth()+6)
          if(dueDate<=now)overdueEquip.push({loc:l.name,item:'Kitchen Hood / Suppression',due:dueDate.toLocaleDateString('en-US',{month:'short',year:'numeric'}),urgent:true})
          else{const daysTil=Math.round((dueDate-now)/(1000*60*60*24));if(daysTil<=30)overdueEquip.push({loc:l.name,item:'Kitchen Hood / Suppression',due:dueDate.toLocaleDateString('en-US',{month:'short',year:'numeric'}),urgent:false})}
        }
      }
      // check extinguishers — annual
      if(l.extinguishers?.length){
        const lastExtJob=jobs.filter(j=>j.location_id===l.id&&j.status==='completed'&&j.scope?.includes('extinguishers')).sort((a,b)=>(b.completed_at||'').localeCompare(a.completed_at||''))[0]
        if(lastExtJob?.completed_at){
          const lastDt=new Date(lastExtJob.completed_at)
          const dueDate=new Date(lastDt);dueDate.setFullYear(dueDate.getFullYear()+1)
          if(dueDate<=now)overdueEquip.push({loc:l.name,item:'Fire Extinguishers (Annual)',due:dueDate.toLocaleDateString('en-US',{month:'short',year:'numeric'}),urgent:true})
          else{const daysTil=Math.round((dueDate-now)/(1000*60*60*24));if(daysTil<=30)overdueEquip.push({loc:l.name,item:'Fire Extinguishers (Annual)',due:dueDate.toLocaleDateString('en-US',{month:'short',year:'numeric'}),urgent:false})}
        }
      }
    })
    if(overdueEquip.length){
      h+=`<div class="card" style="border-color:${overdueEquip.some(e=>e.urgent)?'var(--bad)':'var(--warn)'};border-width:2px">
        <div class="card-t" style="color:${overdueEquip.some(e=>e.urgent)?'var(--bad)':'var(--warn)'}">⚠️ Service Due</div>`
      overdueEquip.forEach(e=>{
        const eLocId=locs.find(l=>l.name===e.loc)?.id||''
        h+=`<div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid #f5f5f5;cursor:pointer" onclick="openLocation('${eLocId}')">
          <div><div style="font-size:13px;font-weight:700">${esc(e.item)}</div><div style="font-size:11px;color:#888">${esc(e.loc)}</div></div>
          <span style="font-size:11px;font-weight:800;padding:4px 10px;border-radius:12px;background:${e.urgent?'#fee2e2':'#fef3c7'};color:${e.urgent?'#dc2626':'#92400e'}">${e.urgent?'Overdue':'Due '+e.due}</span>
        </div>`
      })
      h+=`<button onclick="switchTab('request')" style="width:100%;padding:10px;border-radius:var(--rs);background:var(--fire);color:#fff;font-size:13px;font-weight:700;border:none;cursor:pointer;margin-top:12px">Request Service Now</button></div>`
    }

    // outstanding balance with Pay Now
    if(totalOwed>0){
      const unpaidInvs=invs.filter(i=>!['paid','void','record'].includes(i.status))
      h+=`<div class="card" style="border-color:#fed7aa;border-width:2px">
        <div class="card-t" style="color:var(--warn)">Outstanding Balance</div>
        <div style="font-size:28px;font-weight:900;color:var(--fire)">${fmt(totalOwed)}</div>
        <div style="margin-top:12px">`
      if(unpaidInvs.length===1){
        const ui=unpaidInvs[0],loc=locs.find(l=>l.id===ui.location_id)||{}
        h+=`<button onclick="portalPayNow('${ui.id}','${esc(ui.invoice_number||'')}','${esc(loc.name||'')}',${+ui.total||0},this)" style="width:100%;padding:14px;border-radius:var(--r);background:var(--fire);color:#fff;font-size:15px;font-weight:800;border:none;cursor:pointer;min-height:50px">💳 Pay Now — ${fmt(+ui.total)}</button>`
      }else{
        h+=`<button onclick="switchTab('invoices')" style="width:100%;padding:14px;border-radius:var(--r);background:var(--fire);color:#fff;font-size:15px;font-weight:800;border:none;cursor:pointer;min-height:50px">💳 Pay Now — ${unpaidInvs.length} invoices</button>`
      }
      h+=`<div style="font-size:11px;color:#999;margin-top:6px;text-align:center">Secure payment via Square · Card, Apple Pay, or Google Pay</div>
        </div>
      </div>`
    }

    // upcoming services
    if(upcoming.length){
      h+=`<div class="card"><div class="card-t">Upcoming Services</div>`
      upcoming.forEach(j=>{
        const loc=locs.find(l=>l.id===j.location_id)
        const dt=fmtDate(j.scheduled_date,{weekday:'long',month:'long',day:'numeric',year:'numeric'})
        h+=`<div class="job-row" style="cursor:pointer" onclick="openLocation('${j.location_id}')">
          <div style="display:flex;justify-content:space-between;align-items:center">
            <div>
              <div class="job-date">${dt}</div>
              <div class="job-scope">${esc(loc?.name||'')} · ${(j.scope||[]).join(', ')}${j.scheduled_time?' · '+j.scheduled_time.slice(0,5):''}</div>
            </div>
            <span style="color:#ccc;font-size:16px">›</span>
          </div>
        </div>`
      })
      h+=`</div>`
    }

    // locations — tappable cards
    h+=`<div class="card"><div class="card-t">Your Locations</div>`
    locs.forEach(l=>{
      const extCount=l.extinguishers?.length||0
      const sysCount=l.suppression_systems?.length||0
      const lightCount=l.emergency_lights?.[0]?.fixture_count||0
      const locInvs=invs.filter(i=>i.location_id===l.id)
      const locUnpaid=locInvs.filter(i=>!['paid','void','record'].includes(i.status)).reduce((s,i)=>s+(+i.total||0),0)
      h+=`<div class="loc" style="cursor:pointer;padding:14px;margin:0 -20px;border-radius:8px;transition:background .15s" onclick="openLocation('${l.id}')" onmouseenter="this.style.background='#f5f6f8'" onmouseleave="this.style.background=''">
        <div style="display:flex;justify-content:space-between;align-items:center">
          <div class="loc-nm">${esc(l.name)}</div>
          <span style="font-size:18px;color:#ccc">›</span>
        </div>
        <div class="loc-addr">${esc([l.address,l.city,l.state,l.zip].filter(Boolean).join(', '))}</div>
        <div class="loc-eq">
          ${extCount?`<span class="eq-tag">${extCount} Ext</span>`:''}
          ${sysCount?`<span class="eq-tag">${sysCount} System${sysCount!==1?'s':''}</span>`:''}
          ${lightCount?`<span class="eq-tag">${lightCount} Lights</span>`:''}
          ${locInvs.length?`<span class="eq-tag">${locInvs.length} Invoice${locInvs.length!==1?'s':''}</span>`:''}
          ${locUnpaid>0?`<span class="eq-tag" style="background:#fee2e2;color:#dc2626">${fmt(locUnpaid)} owed</span>`:''}
        </div>
      </div>`
    })
    h+=`</div>`
  }

  if(_activeTab==='equipment'){
    const al=_portalData.allLines||[]
    // derive equipment from invoice line items per location
    let totalSys=0,totalExt=0,totalLights=0

    locs.forEach(l=>{
      // get line items for this location's invoices
      const locInvIds=invs.filter(i=>i.location_id===l.id).map(i=>i.id)
      const locLines=al.filter(ln=>locInvIds.includes(ln.invoice_id))

      // count systems from line items
      let sysList=[],extCount=0,lightCount=0
      locLines.forEach(ln=>{
        const d=(ln.description||'').toLowerCase()
        if(d.match(/semi.?annual|suppression|kitchen|ansul|pyro|buckeye|kidde|captive|clean.?agent|fm.?200|paint.?booth|dry.?chem/)){
          sysList.push(ln.description)
        }
        if(d.match(/extinguisher/)){
          extCount+=+(ln.quantity||0)
        }
        if(d.match(/e.?light|emergency.?light/)){
          lightCount+=+(ln.quantity||0)
        }
      })
      // also include equipment from DB tables
      if(l.suppression_systems?.length){
        l.suppression_systems.forEach(s=>{
          if(!sysList.some(x=>x.toLowerCase().includes((s.system_type||'').toLowerCase().split(' ')[0]))){
            sysList.push(s.system_type)
          }
        })
      }
      if(l.extinguishers?.length&&!extCount)extCount=l.extinguishers.length
      if(l.emergency_lights?.[0]?.fixture_count&&!lightCount)lightCount=l.emergency_lights[0].fixture_count

      // deduplicate systems
      const uniqueSys=[...new Set(sysList)]
      totalSys+=uniqueSys.length
      totalExt+=extCount
      totalLights+=lightCount

      h+=`<div class="card" style="cursor:pointer" onclick="openLocation('${l.id}')"><div class="card-t" style="display:flex;justify-content:space-between;align-items:center">${esc(l.name)}<span style="color:#ccc;font-size:14px">›</span></div>
        <div class="loc-addr" style="margin-bottom:12px">${esc([l.address,l.city].filter(Boolean).join(', '))}</div>`
      if(l.suppression_systems?.length){
        h+=`<div style="font-size:10px;font-weight:800;color:#999;text-transform:uppercase;letter-spacing:1px;margin:4px 0 6px">Suppression Systems · ${l.suppression_systems.length}</div>`
        l.suppression_systems.forEach(s=>{

function openLocation(locId){
  const{locs,jobs,invs,reports}=_portalData
  const l=locs.find(x=>x.id===locId);if(!l)return
  const locJobs=jobs.filter(j=>j.location_id===locId)
  const locInvs=invs.filter(i=>i.location_id===locId)
  const locReports=reports.filter(r=>{const j=jobs.find(j2=>j2.id===r.job_id);return j&&j.location_id===locId})
  const unpaid=locInvs.filter(i=>!['paid','void','record'].includes(i.status))
  const paid=locInvs.filter(i=>i.status==='paid')

  let h=`<button onclick="switchTab('overview')" style="background:none;border:none;color:var(--fire);font-size:14px;font-weight:700;cursor:pointer;padding:0 0 16px;display:flex;align-items:center;gap:4px">‹ Back to Locations</button>`

  // Location header
  h+=`<div class="card" style="border-left:4px solid var(--fire)">
    <div style="font-size:18px;font-weight:900;color:#1a1a2e">${esc(l.name)}</div>
    <div style="font-size:13px;color:#888;margin-top:4px">${esc([l.address,l.city,l.state,l.zip].filter(Boolean).join(', '))}</div>
    ${l.contact_name?`<div style="font-size:12px;color:#888;margin-top:8px">${esc(l.contact_name)}${l.contact_phone?' · <a href="tel:'+l.contact_phone+'" style="color:var(--fire);text-decoration:none">'+l.contact_phone+'</a>':''}</div>`:''}
  </div>`

  // Equipment
  h+=`<div class="card"><div class="card-t">Equipment on File</div>`
  if(l.suppression_systems?.length){
    l.suppression_systems.forEach(s=>{
      h+=`<div class="eq-item"><div><div class="eq-name">🔥 ${esc(s.system_type)}</div><div class="eq-detail">${s.tank_count} tank${s.tank_count!==1?'s':''} · ${s.nozzle_count} nozzles · ${s.fusible_link_count} links</div></div></div>`
    })
  }
  if(l.extinguishers?.length){
    l.extinguishers.forEach(e=>{
      h+=`<div class="eq-item"><div><div class="eq-name">🧯 ${esc(e.type)} ${esc(e.size||'')}</div><div class="eq-detail">${esc(e.location_in_building||'')}</div></div></div>`
    })
  }
  if(l.emergency_lights?.[0]?.fixture_count){
    h+=`<div class="eq-item"><div class="eq-name">💡 ${l.emergency_lights[0].fixture_count} Emergency Light Fixtures</div></div>`
  }
  if(!l.suppression_systems?.length&&!l.extinguishers?.length){
    h+=`<div class="empty">No equipment on file yet</div>`
  }
  h+=`</div>`

  // ALL invoices — tappable to expand and show reports
  if(locInvs.length){
    h+=`<div class="card"><div class="card-t">Invoices · ${locInvs.length}</div>`
    locInvs.forEach(i=>{
      const dt=fmtDate(i.date)
      const bc=i.status==='paid'?'b-paid':i.status==='sent'?'b-sent':i.status==='overdue'?'b-over':'b-draft'
      const paidInfo=i.status==='paid'?(i.payment_method?' · Paid by '+i.payment_method:''):''
      h+=`<div style="border-bottom:1px solid #f0f0f0">
        <div class="inv-row" style="cursor:pointer" onclick="toggleInvDetail('inv-detail-${i.id}')">
          <div>
            <div class="inv-num">${esc(i.invoice_number||'—')}</div>
            <div class="inv-date">${dt}${paidInfo}</div>
          </div>
          <div style="text-align:right;display:flex;align-items:center;gap:8px">
            <div><div class="inv-amt" style="color:${i.status==='paid'?'var(--ok)':'var(--fire)'}">${fmt(+i.total)}</div><span class="badge ${bc}">${i.status}</span></div>
            <span style="font-size:16px;color:#ccc">›</span>
          </div>
        </div>
        <div id="inv-detail-${i.id}" style="display:none;padding:0 0 12px">
          <div id="inv-lines-${i.id}" style="padding:0 4px;font-size:12px;color:#888">Loading...</div>
        </div>
      </div>`
    })
    h+=`</div>`
  }else{
    h+=`<div class="card"><div class="empty">No invoices yet</div></div>`
  }

  // Last service summary
  const lastCompleted=locJobs.filter(j=>j.status==='completed').sort((a,b)=>(b.completed_at||'').localeCompare(a.completed_at||''))[0]
  if(lastCompleted){
    const dt=fmtDate(lastCompleted.completed_at||lastCompleted.scheduled_date)
    h+=`<div class="card"><div class="card-t">Last Service</div>
      <div style="font-size:14px;font-weight:700">${dt}</div>
      <div style="font-size:12px;color:#888;margin-top:2px">${(lastCompleted.scope||[]).join(', ')}</div>
    </div>`
  }

  // Upcoming services at this location
  const upcomingHere=locJobs.filter(j=>j.status==='scheduled'&&j.scheduled_date>=new Date().toISOString().split('T')[0])
  if(upcomingHere.length){
    h+=`<div class="card"><div class="card-t">Upcoming Services</div>`
    upcomingHere.forEach(j=>{
      const dt=fmtDate(j.scheduled_date,{weekday:'short',month:'short',day:'numeric',year:'numeric'})
      h+=`<div class="job-row">
        <div class="job-date">${dt}</div>
        <div class="job-scope">${(j.scope||[]).join(', ')}${j.scheduled_time?' · '+j.scheduled_time.slice(0,5):''}</div>
      </div>`
    })
    h+=`</div>`
  }

  document.getElementById('portalTab').innerHTML=h
}

async function toggleInvDetail(elId){
  const el=document.getElementById(elId);if(!el)return
  if(el.style.display==='block'){el.style.display='none';return}
  el.style.display='block'

  const invId=elId.replace('inv-detail-','')
  const linesWrap=document.getElementById('inv-lines-'+invId)
  if(!linesWrap)return

  // fetch line items
  const{data:lines}=await SB.from('invoice_lines').select('*').eq('invoice_id',invId).order('sort_order')
  const inv=_portalData.invs.find(i=>i.id===invId)||{}

  let ih=''
  if(lines?.length){
    ih+=`<table style="width:100%;font-size:13px;border-collapse:collapse;margin-bottom:12px">`
    ih+=`<tr style="border-bottom:1px solid #eee"><th style="text-align:left;padding:6px 0;font-size:10px;color:#999;font-weight:700">DESCRIPTION</th><th style="text-align:center;padding:6px 0;font-size:10px;color:#999;font-weight:700;width:40px">QTY</th><th style="text-align:right;padding:6px 0;font-size:10px;color:#999;font-weight:700;width:70px">PRICE</th><th style="text-align:right;padding:6px 0;font-size:10px;color:#999;font-weight:700;width:70px">TOTAL</th></tr>`
    lines.forEach(l=>{
      ih+=`<tr style="border-bottom:1px solid #f5f5f5"><td style="padding:6px 0;color:#444">${esc(l.description)}</td><td style="text-align:center;color:#888">${l.quantity}</td><td style="text-align:right;color:#888">$${(+l.unit_price).toFixed(2)}</td><td style="text-align:right;font-weight:700;color:#333">$${(+l.total).toFixed(2)}</td></tr>`
    })
    const total=lines.reduce((s,l)=>s+(+l.total||0),0)
    ih+=`<tr><td colspan="3" style="padding:8px 0;font-weight:800;color:#1a1a2e">Total</td><td style="text-align:right;padding:8px 0;font-weight:900;font-size:16px;color:var(--fire)">$${total.toFixed(2)}</td></tr></table>`
  }

  // Print Invoice PDF button
  if(lines?.length){
    const loc=_portalData.locs.find(l=>l.id===inv.location_id)||{}
    ih+=`<button onclick="printInvoice('${invId}')" style="width:100%;padding:10px;border-radius:var(--rs);background:#f3f4f6;color:#555;font-size:13px;font-weight:700;border:none;cursor:pointer;margin-bottom:12px">🖨 Print Invoice PDF</button>`
  }

  // fetch reports for this invoice's job
  if(inv.job_id){
    const{data:rpts}=await SB.from('reports').select('id,report_type,report_data,created_at').eq('job_id',inv.job_id).order('created_at')
    // show ALL reports (no deduplication)
    const unique=rpts||[]
    if(unique.length){
      ih+=`<div style="font-size:10px;font-weight:800;color:#999;text-transform:uppercase;letter-spacing:1px;margin:8px 0">Reports</div>`
      unique.forEach(r=>{
        const icon=r.report_type==='extinguisher'?'🧯':r.report_type==='dry_chemical'?'🏭':r.report_type==='clean_agent'?'💨':'🔥'
        const name=r.report_type==='extinguisher'?'Extinguisher Report':r.report_type==='dry_chemical'?'Dry Chemical Report':r.report_type==='clean_agent'?'Clean Agent Report':'Kitchen Hood Report'
        const dt=r.created_at?new Date(r.created_at).toLocaleDateString('en-US',{month:'short',day:'numeric'}):''
        ih+=`<div style="display:flex;align-items:center;gap:8px;padding:10px 0;border-bottom:1px solid #f5f5f5">
          <span>${icon}</span>
          <span style="font-size:13px;font-weight:600;color:#333;flex:1">${name}</span>
          <span style="font-size:11px;color:#999">${dt}</span>
          <button onclick="viewReport('${r.id}')" style="font-size:11px;font-weight:700;color:var(--fire);background:none;border:1px solid var(--fire);border-radius:6px;padding:5px 10px;cursor:pointer">View / Print</button>
        </div>`
      })
    }
  }

  // Pay Now button for unpaid invoices
  if(inv.status&&!['paid','void','record'].includes(inv.status)){
    const total=lines?.reduce((s,l)=>s+(+l.total||0),0)||+inv.total||0
    const loc=_portalData.locs.find(l=>l.id===inv.location_id)||{}
    ih+=`<div style="margin-top:12px;text-align:center" id="pay-wrap-${invId}">
      <button onclick="portalPayNow('${invId}','${esc(inv.invoice_number||'')}','${esc(loc.name||'')}',${total},this)" style="width:100%;padding:14px;border-radius:var(--r);background:var(--fire);color:#fff;font-size:15px;font-weight:800;border:none;cursor:pointer;min-height:50px">💳 Pay Now — ${fmt(total)}</button>
      <div style="font-size:11px;color:#999;margin-top:6px">Secure payment via Square · Card, Apple Pay, or Google Pay</div>
    </div>`
  }

  if(!ih)ih=`<div style="font-size:12px;color:#ccc;padding:8px 0">No details available</div>`
  linesWrap.innerHTML=ih
}

  </style></head><body>
  <div class="print-bar"><button class="print-btn" onclick="window.print()">🖨 Print / Save PDF</button></div>`

  html+=`<h1>Stephens Advanced LLC</h1><h2>${rpt.report_type==='extinguisher'?'Extinguisher Inspection Report':rpt.report_type==='dry_chemical'?'Dry Chemical Report':rpt.report_type==='clean_agent'?'Clean Agent Report':'Kitchen Hood Suppression Report'}</h2>`

  html+=`<div class="section"><div class="section-t">Customer</div>

    <div class="row"><div><div class="lbl">Address</div><div class="val">${[loc.address,loc.city,loc.state,loc.zip].filter(Boolean).join(', ')}</div></div></div>

  if(rpt.report_type==='extinguisher'&&rd.units?.length){
    const flagged=rd.units.filter(u=>u.flagged||u.condition==='fail')
    html+=`<div class="section"><div class="section-t">Extinguishers · ${rd.units.length}${flagged.length?' · <span style="color:#ef4444">'+flagged.length+' flagged</span>':''}</div>
      <table><tr><th>#</th><th>Type / Size</th><th>Brand</th><th>Serial</th><th>Location</th><th>Mfg</th><th>Status</th><th>6yr Int.</th><th>Hydro</th><th>Notes</th></tr>`
    rd.units.forEach((u,i)=>{
      const isFlagged=u.flagged||u.condition==='fail'
      html+=`<tr style="${isFlagged?'background:#fef2f2':''}">

      flagged.forEach((u,i)=>{
        const num=rd.units.indexOf(u)+1
        html+=`<div style="padding:6px 0;border-bottom:1px solid #fee2e2;font-size:12px">
          <strong style="color:#ef4444">#${num} ${u.type||''} ${u.size||''}</strong>${u.serial?' · <span style="font-family:monospace">'+u.serial+'</span>':''}${u.location?' · '+u.location:''}
          <div style="color:#dc2626;margin-top:2px">${u.flagNote||u.notes||'Issue detected'}</div>
        </div>`
      })
      html+=`</div>`
    }
  }

  if(rpt.report_type==='kitchen_suppression'||rpt.report_type==='dry_chemical'||rpt.report_type==='clean_agent'){
    html+=`<div class="section"><div class="section-t">System Info</div>
      <div class="row"><div><div class="lbl">Manufacturer</div><div class="val">${rd.mfg||''}</div></div><div><div class="lbl">Model</div><div class="val">${rd.model||''}</div></div></div>
      <div class="row"><div><div class="lbl">Serial</div><div class="val">${rd.serial||''}</div></div><div><div class="lbl">Cylinder</div><div class="val">${rd.cyl||''}</div></div></div>
    </div>`
    // checks
    const checks=rd.checks||{}
    const checkKeys=Object.keys(checks).filter(k=>checks[k])
    if(checkKeys.length){
      html+=`<div class="section"><div class="section-t">Inspection Checklist · ${checkKeys.length} items</div>
        <div style="font-size:12px;color:#10b981;font-weight:700">All items checked: ${checkKeys.filter(k=>checks[k]==='yes').length} Yes / ${checkKeys.filter(k=>checks[k]==='no').length} No</div>
      </div>`
    }
    if(rd.deficiencies){
      html+=`<div class="section"><div class="section-t">Deficiencies</div><div style="font-size:13px">${rd.deficiencies}</div></div>`
    }
  }

  html+=`<div class="sig-row">
    <div class="sig"><div class="sig-line">${rd.techSig?'<img src="'+rd.techSig+'" style="max-height:28px">':''}</div><div class="sig-label">Service Technician: ${rd.techName||'Jon Stephens'}</div></div>
    <div class="sig"><div class="sig-line"></div><div class="sig-label">Owner / Manager: ${rd.ownerName||''}</div></div>
  </div>`
  html+=`<div style="margin-top:20px;text-align:center;font-size:10px;color:#ccc">Stephens Advanced LLC · (214) 994-4799</div>`
  html+=`</body></html>`

  const w=window.open('','_blank')
  if(w){w.document.write(html);w.document.close()}
}

async function printInvoice(invId){

  const ls=lines||[]
  const total=ls.reduce((s,l)=>s+(+l.total||0),0)||+inv.total||0
  const a=[loc.address,loc.city,loc.state,loc.zip].filter(Boolean).join(', ')
  const dt=inv.date?new Date(inv.date+'T12:00:00').toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'}):''

    .print-bar{text-align:right;margin-bottom:12px}
    .print-btn{padding:10px 20px;border-radius:8px;background:#f05a28;color:#fff;font-size:13px;font-weight:700;border:none;cursor:pointer}

  </style></head><body>
  <div class="print-bar"><button class="print-btn" onclick="window.print()">🖨 Print / Save PDF</button></div>
  <h1>Stephens Advanced LLC</h1>
  <h2>Invoice ${esc(inv.invoice_number||'')}</h2>
  <div class="info">
    <div><strong>${esc(loc.name||'')}</strong><br>${esc(a)}<br>${loc.contact_name?esc(loc.contact_name)+'<br>':''}${loc.contact_phone||''}</div>
    <div style="text-align:right"><strong>Date:</strong> ${dt}<br><strong>Status:</strong> <span class="badge ${inv.status==='paid'?'b-paid':inv.status==='sent'?'b-sent':'b-draft'}">${inv.status}</span>${inv.payment_method?'<br><strong>Paid by:</strong> '+inv.payment_method:''}</div>
  </div>
  <table><tr><th>Description</th><th style="text-align:center;width:50px">Qty</th><th style="text-align:right;width:80px">Price</th><th style="text-align:right;width:80px">Total</th></tr>`
  ls.forEach(l=>{
    html+=`<tr><td>${esc(l.description)}</td><td style="text-align:center">${l.quantity}</td><td style="text-align:right">$${(+l.unit_price).toFixed(2)}</td><td style="text-align:right">$${(+l.total).toFixed(2)}</td></tr>`
  })
  html+=`<tr class="total-row"><td colspan="3">Total</td><td style="text-align:right;color:#f05a28">$${total.toFixed(2)}</td></tr></table>
  <div style="text-align:center;margin-top:24px;font-size:10px;color:#bbb">Stephens Advanced LLC · Fire Suppression & Safety · (214) 994-4799</div>
  </body></html>`

  const w=window.open('','_blank')
  if(w){w.document.write(html);w.document.close()}

async function portalPayNow(invId,invNum,custName,amount,btn){
  btn.textContent='Creating payment link...';btn.disabled=true
  try{
    const res=await fetch('/api/create-payment-link',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({invoiceNumber:invNum,customerName:custName,amount:amount,invoiceId:invId})
    })
    const data=await res.json()
    if(data.success&&data.paymentLink){
      window.location.href=data.paymentLink
    }else{
      console.error('Square error:',data)
      btn.textContent='Error: '+(data.error||'unknown')+' — call (214) 994-4799';btn.style.background='var(--bad)';btn.style.fontSize='11px'
    }
  }catch(e){
    console.error('pay error:',e)
    btn.textContent='Network error — call (214) 994-4799';btn.style.background='var(--bad)'
  }
}

async function submitRequest(){
  const btn=document.getElementById('reqBtn')
  const st=document.getElementById('req-status')
  btn.textContent='Sending...';btn.disabled=true

  const locId=document.getElementById('req-loc')?.value
  const type=document.getElementById('req-type')?.value
  const date=document.getElementById('req-date')?.value
  const notes=document.getElementById('req-notes')?.value?.trim()
  const loc=_portalData.locs.find(l=>l.id===locId)||{}

  // save request
  try{
    await SB.from('service_requests').insert({
      location_id:locId,
      billing_account_id:_portalData.token.billing_account_id||null,
      requested_date:date||null,
      reason:type+(notes?' — '+notes:''),
      status:'pending'
    })
  }catch(e){console.error(e)}

  // email notification to Jon
  try{
    await fetch('/api/send-email',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        to:'jonathan@stephensadvanced.com',
        subject:'Service Request — '+loc.name,
        html:`<div style="font-family:Arial,sans-serif;max-width:500px;margin:20px auto;padding:20px">
          <h2 style="color:#f05a28;margin-bottom:16px">Customer Service Request</h2>
          <p><strong>Customer:</strong> ${loc.name||'Unknown'}</p>
          <p><strong>Location:</strong> ${[loc.address,loc.city].filter(Boolean).join(', ')}</p>
          <p><strong>Type:</strong> ${type}</p>
          ${date?`<p><strong>Preferred Date:</strong> ${new Date(date+'T12:00:00').toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric',year:'numeric'})}</p>`:''}
          ${notes?`<p><strong>Notes:</strong> ${notes}</p>`:''}
          <hr style="margin:20px 0;border:none;border-top:1px solid #eee">
          <p style="font-size:12px;color:#888">Submitted via Customer Portal</p>
        </div>`
      })
    })
  }catch(e){console.error(e)}

  st.textContent='✓ Request submitted — we\'ll be in touch!'
  st.style.color='#059669'
  btn.textContent='Submitted ✓'
  btn.style.background='#059669'
}

async function portalPhoneLookup(){
  const phone=document.getElementById('pl-phone')?.value?.trim()
  if(!phone){document.getElementById('pl-status').textContent='Enter your phone number';return}
  const btn=document.getElementById('pl-btn')
  const st=document.getElementById('pl-status')
  btn.textContent='Sending...';btn.disabled=true;st.textContent=''
  try{
    const res=await fetch('/api/portal-lookup',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({phone})})
    const data=await res.json()
    if(data.success){
      st.style.color='#059669'
      st.textContent='Check your texts — we just sent your portal link'
      btn.textContent='Sent ✓';btn.style.background='#059669'
    }else{
      st.style.color='#888'
      st.textContent="We couldn't find that number. Give us a call at (214) 994-4799 and we'll get you set up."
      btn.textContent='Send Me My Link →';btn.disabled=false
    }
  }catch(e){
    st.style.color='var(--bad)'
    st.textContent='Something went wrong. Call (214) 994-4799'
    btn.textContent='Send Me My Link →';btn.disabled=false
  }
}

async function portalInvLookup(){
  const raw=document.getElementById('inv-lookup')?.value?.trim()
  if(!raw){return}
  const btn=document.getElementById('inv-btn')
  const result=document.getElementById('inv-result')
  btn.textContent='Looking up...';btn.disabled=true;result.innerHTML=''

  const num=raw.replace(/^INV-/i,'').trim()
  const searchNum='INV-'+num

  try{
    const{data:inv}=await SB.from('invoices').select('id,invoice_number,total,status,date,location_id').or(`invoice_number.eq.${searchNum},invoice_number.ilike.%${num}%`).limit(1).single()

    if(!inv){
      result.innerHTML='<div style="color:#888;font-size:13px">Invoice not found. Double check the number or call <a href="tel:2149944799" style="color:var(--fire)">(214) 994-4799</a></div>'
      btn.textContent='Look Up Invoice →';btn.disabled=false
      return
    }

    if(['paid','void'].includes(inv.status)){
      result.innerHTML='<div style="color:#059669;font-size:13px;font-weight:600">This invoice has been paid. Enter your phone number above to access your full portal.</div>'
      btn.textContent='Look Up Invoice →';btn.disabled=false
      return
    }

    const dt=inv.date?new Date(inv.date+'T12:00:00').toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'}):''
    const total=+(inv.total)||0
    result.innerHTML=`
      <div style="border:1px solid #e8eaed;border-radius:var(--r);padding:16px;margin-top:4px">
        <div style="font-size:16px;font-weight:900;color:#1a1a2e">${esc(inv.invoice_number||'')}</div>
        <div style="font-size:12px;color:#888;margin-top:2px">${dt}</div>
        <div style="font-size:24px;font-weight:900;color:var(--fire);margin:12px 0">${fmt(total)}</div>
        <button id="inv-pay-btn" onclick="portalInvPay('${inv.id}','${esc(inv.invoice_number||'')}',${total},this)" style="width:100%;padding:14px;border-radius:var(--r);background:var(--fire);color:#fff;font-size:15px;font-weight:800;border:none;cursor:pointer;min-height:50px">💳 Pay $${total.toFixed(2)} →</button>
        <div style="font-size:11px;color:#999;margin-top:6px;text-align:center">Secure payment powered by Square</div>
      </div>`
    btn.textContent='Look Up Invoice →';btn.disabled=false
  }catch(e){
    result.innerHTML='<div style="color:#888;font-size:13px">Invoice not found. Double check the number or call <a href="tel:2149944799" style="color:var(--fire)">(214) 994-4799</a></div>'
    btn.textContent='Look Up Invoice →';btn.disabled=false
  }
}

async function portalInvPay(invId,invNum,amount,btn){

}
