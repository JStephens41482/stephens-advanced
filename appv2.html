<!--
  SUPABASE SQL — run this if brycer_queue table does not exist:

  create table brycer_queue (
    id uuid default gen_random_uuid() primary key,
    job_id uuid references jobs(id),
    location_id uuid references locations(id),
    location_name text,
    system_type text,
    job_date date,
    report_generated boolean default false,
    submitted boolean default false,
    submitted_date date,
    created_at timestamptz default now()
  );
  alter table brycer_queue enable row level security;
  create policy "allow all" on brycer_queue for all using (true) with check (true);

  -- Techs table
  create table techs (
    id uuid default gen_random_uuid() primary key,
    name text not null,
    phone text,
    email text,
    license_number text,
    color text default '#f05a28',
    active boolean default true,
    created_at timestamptz default now()
  );
  alter table techs enable row level security;
  create policy "allow all" on techs for all using (true) with check (true);

  -- Add assigned_to column to jobs
  alter table jobs add column if not exists assigned_to uuid references techs(id);

  -- Add service date tracking to extinguishers
  alter table extinguishers add column if not exists last_internal text;
  alter table extinguishers add column if not exists last_hydro text;

  -- Portal tokens
  create table portal_tokens (
    id uuid default gen_random_uuid() primary key,
    token text unique not null,
    location_id uuid references locations(id),
    billing_account_id uuid,
    is_active boolean default true,
    last_accessed_at timestamptz,
    created_at timestamptz default now()
  );
  alter table portal_tokens enable row level security;
  create policy "allow all" on portal_tokens for all using (true) with check (true);

  -- Service requests from portal
  create table service_requests (
    id uuid default gen_random_uuid() primary key,
    location_id uuid references locations(id),
    billing_account_id uuid,
    job_id uuid,
    requested_date date,
    reason text,
    status text default 'pending',
    created_at timestamptz default now()
  );
  alter table service_requests enable row level security;
  create policy "allow all" on service_requests for all using (true) with check (true);

  -- ═══ INVOICE DOCUMENT ATTACHMENTS (Mission: mission-briefing-invoice-attachments) ═══
  -- Run these in Supabase if not already applied:

  -- 1. po_number column on invoices (if Commander Data's deploy hasn't run yet)
  alter table invoices add column if not exists po_number text;

  -- 2. invoice_attachments table
  create table if not exists invoice_attachments (
    id uuid primary key default gen_random_uuid(),
    invoice_id uuid not null references invoices(id) on delete cascade,
    file_name text not null,
    file_path text not null,
    file_type text not null,
    file_size integer,
    label text check (label in ('work_order','po','compliance','photo','other')),
    uploaded_at timestamptz not null default now()
  );
  create index if not exists idx_invoice_attachments_invoice_id on invoice_attachments(invoice_id);
  alter table invoice_attachments enable row level security;
  create policy "allow all" on invoice_attachments for all using (true) with check (true);

  -- 3. Storage bucket: create 'invoice-attachments' bucket in Supabase Storage dashboard
  --    - Public: false
  --    - File size limit: 10MB
  --    - Allowed MIME: image/jpeg, image/png, image/heic, application/pdf
  --    Storage bucket policies (run in SQL editor):
  --    insert into storage.buckets (id, name, public, file_size_limit, allowed_mime_types)
  --    values ('invoice-attachments','invoice-attachments',false,10485760,
  --      array['image/jpeg','image/png','image/heic','application/pdf'])
  --    on conflict (id) do nothing;
  --    create policy "allow all on invoice-attachments" on storage.objects for all
  --      using (bucket_id='invoice-attachments') with check (bucket_id='invoice-attachments');
-->

const OVS=['ov1','ov2','ov3','ov4']
let stk=[]
const _popTimers={}

let _lastPush=0
function push(html,opts={}){
  // debounce rapid pushes (prevents 16 overlays from multi-tap)
  if(Date.now()-_lastPush<300)return
  _lastPush=Date.now()
  let slot=OVS.find(o=>!stk.includes(o))||OVS[OVS.length-1]
  // cancel any pending cleanup timer for this slot
  if(_popTimers[slot]){clearTimeout(_popTimers[slot]);delete _popTimers[slot]}
  const el=document.getElementById(slot)
  el.innerHTML=html
  el.style.display='flex'
  if(opts.jobId)el.dataset.jobId=opts.jobId; else delete el.dataset.jobId
  requestAnimationFrame(()=>el.classList.add('open'))
  stk.push(slot)
  return slot
}

let _autoSaving=false,_manualSaving=false
function pop(){
  if(!stk.length)return
  // auto-save job data (notes + lines) before closing
  if(window._activeJobId&&_jobDataDirty)autoSaveJobData()
  // auto-save any open report before closing (skip if manual save triggered this pop)
  if(!_autoSaving&&!_manualSaving){_autoSaving=true;_autoSaveOpenReport();_autoSaving=false}
  const id=stk.pop()
  const el=document.getElementById(id)
  el.classList.remove('open')
  delete el.dataset.jobId
  _popTimers[id]=setTimeout(()=>{el.style.display='none';el.innerHTML='';delete _popTimers[id]},250)
}

async function autoSaveJobData(){
  const jid=window._activeJobId;if(!jid)return
  const notes=($('job-notes')?.value||jobNotes||'').trim()
  const lines=jobLines.filter(l=>(l.desc||'').trim()).map(l=>({desc:l.desc,qty:+(l.qty||1),price:+(l.price||0)}))
  try{
    await SB.from('jobs').update({notes:notes||null,work_order_lines:lines.length?lines:null}).eq('id',jid)
    _jobDataDirty=false;_lastAutoSave=Date.now()
    const ind=$('autoSaveInd');if(ind)ind.textContent='Saved ✓'
  }catch(e){
    console.error('auto-save job:',e)
    const ind=$('autoSaveInd');if(ind)ind.textContent='Save failed'
  }
}

function markJobDirty(){
  _jobDataDirty=true

  // Trim the startup payload so the app stays fast as the DB grows.
  // - Jobs: active OR scheduled in the last 30d OR tied to an unpaid invoice
  // - Calendar events: last 7 days + future

  const jobCutoff=new Date(Date.now()-30*86400000).toISOString().split('T')[0]
  const calCutoff=new Date(Date.now()-7*86400000).toISOString()

  // Step 1: pull job IDs of unpaid invoices so we can include those jobs even
  // if they're old/completed. "Unpaid" = status not in (paid, void, record).

// ═══ ON-DEMAND LOCATION DETAIL (Phase 1 lazy-load) ═══
// The main load() uses a slim locations projection (no child table arrays).
// Screens that need the full picture — extinguishers, suppression systems,
// emergency lights — call this to hydrate a specific location on demand and
// merge it back into D.locs so subsequent D.locs.find() calls see the detail.
async function ensureLocationDetail(locId){
  if(!locId)return null
  const idx=D.locs.findIndex(l=>l.id===locId)
  const cached=idx>=0?D.locs[idx]:null
  // Detailed if extinguishers/suppression_systems are real arrays of row objects
  // (slim projection uses ext_count/sys_count/el_info aliases instead)
  if(cached&&Array.isArray(cached.extinguishers)&&Array.isArray(cached.suppression_systems))return cached
  try{
    const{data,error}=await SB.from('locations')
      .select('*,extinguishers(id,type,size,serial_number,location_in_building,manufacture_date,last_internal,last_hydro),suppression_systems(id,system_type,category,tank_count,nozzle_count,fusible_link_count),emergency_lights(id,fixture_count),billing_account:billing_accounts(*)')
      .eq('id',locId).single()
    if(error||!data)return cached
    // Preserve slim count aliases so client list cards keep rendering
    if(cached){
      data.ext_count=cached.ext_count||[{count:(data.extinguishers||[]).length}]
      data.sys_count=cached.sys_count||[{count:(data.suppression_systems||[]).length}]
      data.el_info=cached.el_info||data.emergency_lights||[]
    }
    if(idx>=0)D.locs[idx]=data
    else D.locs.push(data)
    return data
  }catch(e){console.error('ensureLocationDetail:',e);return cached}
}

// ═══ CALENDAR EVENT EXPANSION ═══
const DAY_MAP={sun:0,mon:1,tue:2,wed:3,thu:4,fri:5,sat:6}

function expandRecurring(events, rangeStart, rangeEnd){
  const rs=new Date(rangeStart),re=new Date(rangeEnd)
  const results=[]
  for(const ev of (events||[])){
    if(!ev.recurring){
      const st=new Date(ev.start_time)
      if(st>=rs&&st<=re)results.push({...ev,_expanded:false})
      continue
    }
    const rule=ev.recurrence_rule||{}
    const until=rule.until?new Date(rule.until+'T23:59:59'):re
    const effEnd=until<re?until:re
    const baseStart=new Date(ev.start_time)
    const baseEnd=new Date(ev.end_time)
    const durMs=baseEnd-baseStart

    if(rule.freq==='weekly'&&rule.days){
      const targetDays=rule.days.map(d=>DAY_MAP[d]).filter(d=>d!==undefined)
      let cur=new Date(rs)
      cur.setHours(0,0,0,0)
      while(cur<=effEnd){
        if(targetDays.includes(cur.getDay())){
          const oStart=new Date(cur)
          oStart.setHours(baseStart.getHours(),baseStart.getMinutes(),baseStart.getSeconds())
          if(oStart>=rs&&oStart<=effEnd){
            const oEnd=new Date(oStart.getTime()+durMs)
            results.push({...ev,start_time:oStart.toISOString(),end_time:oEnd.toISOString(),_expanded:true,_parent_id:ev.id})
          }
        }
        cur.setDate(cur.getDate()+1)
      }
    }else if(rule.freq==='monthly'&&rule.day_of_month){
      let cur=new Date(rs.getFullYear(),rs.getMonth(),1)
      while(cur<=effEnd){
        const dom=rule.day_of_month
        const dim=new Date(cur.getFullYear(),cur.getMonth()+1,0).getDate()
        if(dom<=dim){
          const oStart=new Date(cur.getFullYear(),cur.getMonth(),dom,baseStart.getHours(),baseStart.getMinutes())
          if(oStart>=rs&&oStart<=effEnd){
            const oEnd=new Date(oStart.getTime()+durMs)
            results.push({...ev,start_time:oStart.toISOString(),end_time:oEnd.toISOString(),_expanded:true,_parent_id:ev.id})
          }
        }
        cur.setMonth(cur.getMonth()+1)
      }
    }
  }
  return results
}

function eventsForDate(ds){
  const dayStart=new Date(ds+'T00:00:00')
  const dayEnd=new Date(ds+'T23:59:59')
  return expandRecurring(D.calEvents||[],dayStart,dayEnd)
}

function getAvailableSlots(dateString){
  const dayEvents=eventsForDate(dateString)
  const dayJobs=D.jobs.filter(j=>j.scheduled_date===dateString&&j.status!=='cancelled'&&j.status!=='completed')
  const busy=[]
  for(const ev of dayEvents){
    const sh=new Date(ev.start_time).getHours(),sm=new Date(ev.start_time).getMinutes()
    const eh=new Date(ev.end_time).getHours(),em=new Date(ev.end_time).getMinutes()
    busy.push({start:sh*60+sm,end:eh*60+em})
  }
  for(const j of dayJobs){
    const t=j.scheduled_time||'09:00'
    const[h,m]=t.split(':').map(Number)
    const startMin=h*60+m
    busy.push({start:startMin,end:startMin+90}) // 1.5hr per job
  }
  busy.sort((a,b)=>a.start-b.start)
  const workStart=7*60,workEnd=18*60
  const slots=[]
  let cursor=workStart
  for(const b of busy){
    if(b.start>cursor&&b.start>workStart){
      const s=Math.max(cursor,workStart),e=Math.min(b.start,workEnd)
      if(e-s>=30)slots.push({start:minToTime(s),end:minToTime(e)})
    }
    cursor=Math.max(cursor,b.end)
  }
  if(cursor<workEnd)slots.push({start:minToTime(cursor),end:minToTime(workEnd)})
  return slots
}
function minToTime(m){return(Math.floor(m/60)+'').padStart(2,'0')+':'+(m%60+'').padStart(2,'0')}

async function syncJobToCalendar(jobId,locationId,date,time){
  const loc=D.locs?.find(l=>l.id===locationId)||{}
  const t2=time||'09:00'

  const endDt=new Date(startDt.getTime()+2*60*60*1000) // 2 hours
  const addr=[loc.address,loc.city,loc.state||'TX',loc.zip].filter(Boolean).join(', ')
  // Internal calendar event
  await SB.from('calendar_events').insert({
    title:loc.name||'Job',event_type:'job',
    start_time:startDt.toISOString(),end_time:endDt.toISOString(),
    location_id:locationId,job_id:jobId,
    location_text:addr,color:'#3b82f6'
  })
  // Google Calendar sync
  try{
    const j=D.jobs?.find(x=>x.id===jobId)||{}
    const scope=(j.scope||[]).join(', ')||'inspection'
    const eqSummary=[]
    if(loc.suppression_systems?.length)eqSummary.push(loc.suppression_systems.length+' system'+(loc.suppression_systems.length>1?'s':''))
    if(loc.extinguishers?.length)eqSummary.push(loc.extinguishers.length+' extinguisher'+(loc.extinguishers.length>1?'s':''))
    const res=await fetch('/api/calendar-sync',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        action:'create',job_id:jobId,
        summary:(loc.name||'Job')+' — '+scope,
        location:addr,
        start_time:startDt.toISOString(),
        end_time:endDt.toISOString(),
        description:scope+(eqSummary.length?'. '+eqSummary.join(', '):'')+(j.notes?'. Notes: '+j.notes:'')
      })
    })
    const data=await res.json()
    if(data.success&&data.eventId){
      await SB.from('jobs').update({gcal_event_id:data.eventId}).eq('id',jobId)
    }
  }catch(e){console.error('gcal sync:',e)}
}

async function generateNotifications(){
  const t=td(),now=new Date()
  const existing=[]
  try{
    const{data}=await SB.from('notifications').select('notification_type,entity_type,entity_id,created_at').eq('is_dismissed',false).gte('created_at',new Date(now.getTime()-24*60*60*1000).toISOString())
    existing.push(...(data||[]))
  }catch(e){}
  function isDupe(type,eType,eId){return existing.some(e=>e.notification_type===type&&e.entity_type===eType&&e.entity_id===eId)}
  const batch=[]

  // 1. Equipment due — extinguisher annual inspections overdue
  for(const loc of D.locs){
    const exts=loc.extinguishers||[]
    let overdueCount=0
    exts.forEach(e=>{
      const nfpa=window.NFPA10?.[e.type]||{hydro:12,internal:6}
      // check if annual inspection likely overdue (simplified: any ext without a completed job in last 13 months)
      const locJobs=D.jobs.filter(j=>j.location_id===loc.id&&j.status==='completed'&&j.scope?.includes('extinguishers'))
      const lastInsp=locJobs.sort((a,b)=>b.completed_at?.localeCompare(a.completed_at))[0]
      if(!lastInsp||new Date(lastInsp.completed_at)<new Date(now.getTime()-13*30*24*60*60*1000))overdueCount++
    })
    if(overdueCount>0&&!isDupe('equipment_due','location',loc.id)){
      const daysSince=overdueCount
      const priority=daysSince>5?'urgent':daysSince>2?'high':'normal'
      batch.push({notification_type:'equipment_due',priority,title:'Equipment inspection due',body:`${loc.name}: ${overdueCount} extinguisher${overdueCount>1?'s':''} may need annual inspection`,entity_type:'location',entity_id:loc.id})
    }
  }

  // 2. Invoice aging — 30/60/90 day
  const unpaid=D.invs.filter(i=>!['paid','void','record','factored'].includes(i.status))
  for(const inv of unpaid){
    const invDate=new Date(inv.date)
    const days=Math.floor((now-invDate)/(1000*60*60*24))
    const loc=D.locs.find(l=>l.id===inv.location_id)
    if(days>=90&&!isDupe('invoice_90','invoice',inv.id)){
      batch.push({notification_type:'invoice_90',priority:'urgent',title:'Collection risk — 90+ days',body:`${loc?.name||'?'} ${inv.invoice_number} $${(+inv.total).toFixed(2)} (${days} days)`,entity_type:'invoice',entity_id:inv.id})
    }else if(days>=60&&!isDupe('invoice_60','invoice',inv.id)){
      batch.push({notification_type:'invoice_60',priority:'high',title:'Invoice aging — 60+ days',body:`${loc?.name||'?'} ${inv.invoice_number} $${(+inv.total).toFixed(2)}`,entity_type:'invoice',entity_id:inv.id})
    }else if(days>=30&&!isDupe('invoice_30','invoice',inv.id)){
      batch.push({notification_type:'invoice_30',priority:'normal',title:'Invoice aging — 30+ days',body:`${loc?.name||'?'} ${inv.invoice_number} $${(+inv.total).toFixed(2)}`,entity_type:'invoice',entity_id:inv.id})
    }
  }

  // 3. Brycer overdue — unsubmitted > 3 days
  for(const bq of(D.brycerQueue||[])){
    const created=new Date(bq.created_at)
    const days=Math.floor((now-created)/(1000*60*60*24))
    if(days>=3&&!isDupe('brycer_overdue','brycer',bq.id)){
      batch.push({notification_type:'brycer_overdue',priority:'urgent',title:'Brycer submission overdue',body:`${bq.location_name||'Unknown'} — ${days} days in queue`,entity_type:'brycer',entity_id:bq.id})
    }
  }

  // 4. Job reminders — today's scheduled jobs
  const todayJobs=D.jobs.filter(j=>j.status==='scheduled'&&j.scheduled_date===t)
  if(todayJobs.length&&!isDupe('daily_summary','system',null)){
    batch.push({notification_type:'daily_summary',priority:'normal',title:`${todayJobs.length} job${todayJobs.length>1?'s':''} scheduled today`,body:todayJobs.map(j=>(j.location?.name||'?')+' @ '+(j.scheduled_time||'TBD')).join(', '),entity_type:'system',entity_id:null})
  }

  if(batch.length){
    try{await SB.from('notifications').insert(batch)}catch(e){console.error('notif gen:',e)}
    await load()
    updateNotifBadge()
  }
}

async function uploadDocument(blob, filename, docType, entityType, entityId, metadata={}){
  const path=`${docType}/${entityId}/${Date.now()}-${filename}`
  const{data,error}=await SB.storage.from('sa-documents').upload(path,blob,{contentType:blob.type})

  const l=D.locs?.find(x=>x.id===(j.location_id||j.location?.id))||j.location||{},rc=new Proxy({},{get:(_,key)=>getRate(key)}),sc=j.scope||[];let t=0

// swipe-to-delete handler
function initSwipe(el,onDelete){
  let sx=0,sy=0,swiping=false,moved=false
  const inner=el.querySelector('.swipe-inner')
  if(!inner)return
  el.addEventListener('touchstart',e=>{
    if(e.target.closest('.swipe-del'))return
    sx=e.touches[0].clientX;sy=e.touches[0].clientY;swiping=true;moved=false
  },{passive:true})
  el.addEventListener('touchmove',e=>{
    if(!swiping)return
    const dx=e.touches[0].clientX-sx,dy=Math.abs(e.touches[0].clientY-sy)
    if(dy>30){swiping=false;inner.style.transform='';return}
    if(dx<-10){moved=true;inner.style.transition='none';inner.style.transform=`translateX(${Math.max(dx,-70)}px)`}
  },{passive:true})
  el.addEventListener('touchend',e=>{
    if(e.target.closest('.swipe-del'))return
    swiping=false;inner.style.transition='transform .2s ease'
    if(!moved){inner.style.transform='';return}
    const dx=e.changedTouches[0].clientX-sx
    if(dx<-45){
      inner.style.transform='translateX(-70px)'
    }else{inner.style.transform=''}
    moved=false
  },{passive:true})
  // delete button click
  const delBtn=el.querySelector('.swipe-del')
  if(delBtn)delBtn.addEventListener('click',()=>{
    el.style.transition='all .2s';el.style.maxHeight=el.offsetHeight+'px'
    requestAnimationFrame(()=>{el.style.maxHeight='0';el.style.opacity='0';el.style.marginBottom='0';el.style.padding='0'})
    setTimeout(()=>{el.remove();onDelete()},250)
  })
}

const BASE={lat:32.837,lng:-97.082}

function cityCoords(city){
  if(!city)return BASE
  return CITY_COORDS[city.toLowerCase().trim()]||BASE
}
function distBetween(a,b){
  const R=3959,dLat=(b.lat-a.lat)*Math.PI/180,dLng=(b.lng-a.lng)*Math.PI/180
  const x=Math.sin(dLat/2)**2+Math.cos(a.lat*Math.PI/180)*Math.cos(b.lat*Math.PI/180)*Math.sin(dLng/2)**2
  return R*2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x))
}
function locAddr(l){return[l.address,l.city,l.state||'TX',l.zip].filter(Boolean).join(', ')}

// ─── Google Maps API with session cache ───
async function cachedMapsCall(action,params){
  const cacheKey='maps_'+JSON.stringify({action,params})
  try{const c=sessionStorage.getItem(cacheKey);if(c){const{data,ts}=JSON.parse(c);if(Date.now()-ts<15*60*1000)return data}}catch(e){}
  const res=await fetch('/api/maps',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({action,params})})
  const data=await res.json()
  try{sessionStorage.setItem(cacheKey,JSON.stringify({data,ts:Date.now()}))}catch(e){}
  return data
}

// ─── Fallback routing (Haversine) ───
function _fallbackRouteJobs(jobs){
  let remaining=[...jobs],route=[],cur=BASE
  while(remaining.length){
    let best=null,bestD=Infinity,bestI=0
    remaining.forEach((j,i)=>{const c=cityCoords(j.location?.city);const d=distBetween(cur,c);if(d<bestD){bestD=d;best=j;bestI=i}})
    route.push({job:best,dist:Math.round(bestD),duration:Math.round(bestD*2.2),durationText:Math.round(bestD*2.2)+' min'})
    cur=cityCoords(best.location?.city)
    remaining.splice(bestI,1)
  }
  return route
}
function _fallbackTravelCharge(loc){
  if(!loc)return{charge:0,desc:'',miles:0}
  const dest=cityCoords(loc.city)
  const driveMi=Math.round(distBetween(BASE,dest)*1.25)
  if(driveMi<=50)return{charge:0,desc:'',miles:driveMi}
  const excessMi=driveMi-50,rtMi=excessMi*2,rtHrs=rtMi/55
  return{charge:Math.round(rtHrs*250+rtMi*0.67),desc:`Travel — ${excessMi} mi over 50-mi radius, ${rtHrs.toFixed(1)} hrs RT`,miles:driveMi}
}

// ─── Google Maps routing ───
async function routeJobs(jobs){
  // filter out test jobs and jobs with no real address
  jobs=jobs.filter(j=>{const n=(j.location?.name||'').toUpperCase();const a=locAddr(j.location||{});return!n.includes('TEST')&&a.match(/\d/)})
  const stops=jobs.map(j=>{const l=j.location||{};return{job:j,address:locAddr(l)}}).filter(s=>s.address.length>5)
  if(!stops.length)return _fallbackRouteJobs(jobs)
  if(stops.length===1){
    try{
      const data=await cachedMapsCall('distance_matrix',{origins:[BASE_ADDR],destinations:[stops[0].address]})
      const el=data.rows?.[0]?.elements?.[0]
      if(el?.status==='OK')return[{job:stops[0].job,address:stops[0].address,dist:Math.round(el.distance.value/1609.34),duration:Math.round(el.duration.value/60),durationText:el.duration.text}]
    }catch(e){}
    return _fallbackRouteJobs(jobs)
  }
  try{
    const allAddr=stops.map(s=>s.address)
    const data=await cachedMapsCall('directions',{origin:BASE_ADDR,destination:allAddr[allAddr.length-1],waypoints:allAddr.slice(0,-1)})
    if(data.status==='OK'&&data.routes?.[0]){
      const route=data.routes[0],order=route.waypoint_order||[],legs=route.legs||[]
      const optimized=[]
      if(order.length){
        // legs[0] = origin→first waypoint, legs[1] = first→second, etc.
        // order[i] maps waypoint index to stop index
        const reordered=[...order.map(idx=>stops[idx]),stops[stops.length-1]]
        reordered.forEach((s,i)=>optimized.push({job:s.job,address:s.address,dist:Math.round((legs[i]?.distance?.value||0)/1609.34),duration:Math.round((legs[i]?.duration?.value||0)/60),durationText:legs[i]?.duration?.text||''}))
      }else{
        // no optimization — legs map 1:1 with stops
        stops.forEach((s,i)=>optimized.push({job:s.job,address:s.address,dist:Math.round((legs[i]?.distance?.value||0)/1609.34),duration:Math.round((legs[i]?.duration?.value||0)/60),durationText:legs[i]?.duration?.text||''}))
      }
      return optimized
    }
  }catch(e){console.error('Google route error:',e)}
  return _fallbackRouteJobs(jobs)
}

async function calcTravelCharge(loc){
  if(!loc)return{charge:0,desc:'',miles:0}
  const addr=locAddr(loc)
  if(addr.length<5)return _fallbackTravelCharge(loc)
  try{
    const data=await cachedMapsCall('distance_matrix',{origins:[BASE_ADDR],destinations:[addr]})
    if(data.status==='OK'&&data.rows?.[0]?.elements?.[0]?.status==='OK'){
      const el=data.rows[0].elements[0],driveMi=Math.round(el.distance.value/1609.34)
      if(driveMi<=50)return{charge:0,desc:'',miles:driveMi}
      const excessMi=driveMi-50,rtMi=excessMi*2,rtHrs=rtMi/55
      return{charge:Math.round(rtHrs*250+rtMi*0.67),desc:`Travel — ${driveMi} mi drive, ${excessMi} mi over 50-mi radius, ${rtHrs.toFixed(1)} hrs RT`,miles:driveMi,duration:Math.round(el.duration.value/60)}
    }
  }catch(e){console.error('Distance calc error:',e)}
  return _fallbackTravelCharge(loc)
}

// ─── Address Autocomplete ───
function initAddressAutocomplete(inputId,onSelect){
  const input=document.getElementById(inputId);if(!input)return
  let debounce=null
  const dropdown=document.createElement('div')
  dropdown.style.cssText='position:absolute;left:0;right:0;top:100%;background:var(--c1);border:1px solid var(--b1);border-radius:0 0 var(--rs) var(--rs);z-index:999;display:none;max-height:200px;overflow-y:auto'
  input.parentElement.style.position='relative'
  input.parentElement.appendChild(dropdown)
  input.addEventListener('input',()=>{
    clearTimeout(debounce);const val=input.value.trim()
    if(val.length<3){dropdown.style.display='none';return}
    debounce=setTimeout(async()=>{
      try{
        const res=await fetch('/api/maps',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({action:'autocomplete',params:{input:val}})})
        const data=await res.json()
        if(data.predictions?.length){
          dropdown.innerHTML=data.predictions.map(p=>`<div style="padding:10px 12px;font-size:13px;color:var(--w);cursor:pointer;border-bottom:1px solid var(--b1)" onmouseover="this.style.background='var(--c2)'" onmouseout="this.style.background=''" data-pid="${p.place_id}" onclick="selectAutocomplete('${inputId}','${p.place_id}')">${p.description}</div>`).join('')
          dropdown.style.display='block'
        }else dropdown.style.display='none'
      }catch(e){dropdown.style.display='none'}
    },300)
  })
  document.addEventListener('click',e=>{if(e.target!==input&&!dropdown.contains(e.target))dropdown.style.display='none'})
  window._autocompleteCallbacks=window._autocompleteCallbacks||{}
  window._autocompleteCallbacks[inputId]=onSelect
}

async function selectAutocomplete(inputId,placeId){
  try{
    const res=await fetch('/api/maps',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({action:'place_details',params:{place_id:placeId}})})

    if(data.result){

      const get=type=>components.find(c=>c.types.includes(type))
      const parsed={address:[get('street_number')?.long_name,get('route')?.long_name].filter(Boolean).join(' '),city:get('locality')?.long_name||get('sublocality')?.long_name||'',state:get('administrative_area_level_1')?.short_name||'TX',zip:get('postal_code')?.long_name||'',formatted:data.result.formatted_address||'',lat:data.result.geometry?.location?.lat,lng:data.result.geometry?.location?.lng}

    }
  }catch(e){console.error('Place details error:',e)}

  const thisMonth=now.getMonth()

  // helper: group by period
  function groupBy(arr,keyFn){const g={};arr.forEach(x=>{const k=keyFn(x);if(!g[k])g[k]=[];g[k].push(x)});return g}
  function weekOf(d){const dt=new Date(d+'T12:00:00');const jan1=new Date(dt.getFullYear(),0,1);return Math.ceil(((dt-jan1)/86400000+jan1.getDay()+1)/7)}

  const jobsByYear=groupBy(jobs.filter(j=>j.scheduled_date),j=>j.scheduled_date.slice(0,4))

  h+=`</div>`

  // MONTHLY (current year)
  h+=`<div class="ds"><div class="ds-t">Monthly — ${thisYear}</div>`
  const monthNames=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec']
  months.forEach(key=>{
    const mInvs=invsByMonth[key]||[]
    const mJobs=jobsByMonth[key]||[]
    const rev=mInvs.filter(i=>i.status==='paid').reduce((s,i)=>s+(+i.total||0),0)
    const billed=mInvs.reduce((s,i)=>s+(+i.total||0),0)
    const mi=parseInt(key.split('-')[1])-1
    h+=`<div class="ds-row">
      <div class="ds-lbl" style="min-width:50px;font-weight:700">${monthNames[mi]}</div>
      <div style="flex:1;display:flex;gap:10px;justify-content:flex-end;font-size:12px">
        <span style="color:var(--g1)">${mJobs.length} jobs</span>
        <span style="color:var(--w2)">${fmt(billed)} billed</span>
        <span style="color:var(--ok);font-weight:700">${fmt(rev)} collected</span>
      </div>
    </div>`
  })
  h+=`</div>`

  // YEARLY
  h+=`<div class="ds"><div class="ds-t">Yearly Summary</div>`
  years.forEach(yr=>{
    const yInvs=invsByYear[yr]||[]
    const yJobs=jobsByYear[yr]||[]
    const rev=yInvs.filter(i=>i.status==='paid').reduce((s,i)=>s+(+i.total||0),0)
    const billed=yInvs.reduce((s,i)=>s+(+i.total||0),0)
    const clients=new Set(yJobs.map(j=>j.location_id)).size
    h+=`<div style="background:var(--c1);border:1px solid var(--b1);border-radius:var(--rs);padding:14px;margin-bottom:8px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
        <span style="font-size:18px;font-weight:900">${yr}</span>
        <span style="font-size:18px;font-weight:900;color:var(--ok)">${fmt(rev)}</span>
      </div>
      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;font-size:11px">
        <div><div style="color:var(--g1)">Jobs</div><div style="font-weight:800;font-size:14px">${yJobs.length}</div></div>
        <div><div style="color:var(--g1)">Billed</div><div style="font-weight:800;font-size:14px">${fmt(billed)}</div></div>
        <div><div style="color:var(--g1)">Clients</div><div style="font-weight:800;font-size:14px">${clients}</div></div>
      </div>
    </div>`
  })
  h+=`</div>`

  // TOP CLIENTS
  h+=`<div class="ds"><div class="ds-t">Top Clients by Revenue</div>`
  topClients.forEach((c,i)=>{
    h+=`<div class="ds-row">
      <div class="ds-lbl" style="flex:1"><span style="color:var(--fire);font-weight:800;margin-right:6px">${i+1}.</span>${esc(c.name)}${c.city?' <span style="color:var(--g2)">'+esc(c.city)+'</span>':''}</div>
      <div class="ds-val" style="color:var(--ok);font-weight:800">${fmt(c.rev)}</div>
    </div>`
  })
  h+=`</div>`

  // RECURRING REVENUE INDICATOR
  const recurringClients=new Set()
  const jobsByLoc=groupBy(jobs.filter(j=>j.status==='completed'),j=>j.location_id)
  Object.entries(jobsByLoc).forEach(([lid,jbs])=>{if(jbs.length>=2)recurringClients.add(lid)})
  const recurringPct=totalClients?(recurringClients.size/totalClients*100).toFixed(0):0

  h+=`<div class="ds"><div class="ds-t">Buyer Metrics</div>
    <div class="ds-row"><div class="ds-lbl">Recurring Clients (2+ jobs)</div><div class="ds-val">${recurringClients.size} (${recurringPct}%)</div></div>
    <div class="ds-row"><div class="ds-lbl">Avg Revenue per Client</div><div class="ds-val">${fmt(activeClients?totalRev/activeClients:0)}</div></div>
    <div class="ds-row"><div class="ds-lbl">Equipment Under Management</div><div class="ds-val">${totalExt+totalSys} units</div></div>
    <div class="ds-row"><div class="ds-lbl">Service Locations</div><div class="ds-val">${totalClients}</div></div>
    <div class="ds-row"><div class="ds-lbl">Compliance Jurisdictions</div><div class="ds-val">${brycerLocs} Brycer</div></div>
  </div>`

  // RATE CARD & PRICING RULES
  h+=`<div class="ds"><div class="ds-t">Rate Card</div>`
  const currentRates=D.currentRates||[]
  const oldRatesP=SB.from('rate_card_history').select('*').not('expired_date','is',null).order('key')
  oldRatesP.then(({data:oldRates})=>{
    const el=$('rate-comparison');if(!el)return
    const old=(oldRates||[])
    let rh=''
    currentRates.forEach(r=>{
      const prev=old.find(o=>o.key===r.key)
      const diff=prev?((+r.price-(+prev.price))/(+prev.price)*100).toFixed(0):null
      rh+=`<div class="ds-row">
        <div class="ds-lbl" style="flex:1">${r.key.replace(/_/g,' ')}</div>
        ${prev?`<div style="font-size:10px;color:var(--g2);text-decoration:line-through;margin-right:8px">$${(+prev.price).toFixed(2)}</div>`:''}
        <div class="ds-val" style="color:var(--ok)">$${(+r.price).toFixed(2)}</div>
        ${diff?`<div style="font-size:9px;font-weight:800;color:var(--fire);margin-left:4px">+${diff}%</div>`:''}
      </div>`
    })
    el.innerHTML=rh||'<div style="color:var(--g2);padding:4px 0">No versioned rates</div>'
  })
  h+=`<div id="rate-comparison" style="font-size:12px;color:var(--g2);padding:4px 0">Loading...</div>`
  const rules=D.pricingRules||[]
  if(rules.length){
    h+=`<div style="margin-top:8px;font-size:11px;font-weight:700;color:var(--g1)">Active Pricing Rules</div>`
    rules.forEach(r=>{
      h+=`<div class="ds-row"><div class="ds-lbl" style="flex:1">${esc(r.description||r.rule_type)}</div><div class="ds-val" style="color:var(--info)">${r.percentage}%</div></div>`
    })
  }
  h+=`</div>`

  // ACTIVITY LOG
  h+=`<div class="ds"><div class="ds-t" style="display:flex;justify-content:space-between;align-items:center">
    <span>Activity Log</span>
    <select id="audit-filter" onchange="filterAuditLog()" style="font-size:11px;padding:4px 8px;border-radius:var(--rs);background:var(--c2);border:1px solid var(--b1);color:var(--w)">
      <option value="">All</option>
      <option value="job">Jobs</option>
      <option value="invoice">Invoices</option>
      <option value="location">Clients</option>
      <option value="contact">Contacts</option>
    </select>
  </div><div id="audit-log-list" style="font-size:12px;color:var(--g2);padding:4px 0">Loading...</div></div>`
  setTimeout(async()=>{
    const el=$('audit-log-list');if(!el)return
    try{
      const{data}=await SB.from('audit_log').select('*').order('created_at',{ascending:false}).limit(50)
      window._auditData=data||[]
      renderAuditLog(data||[])
    }catch(e){el.innerHTML='Could not load audit log'}
  },100)

  // PRINT BUTTONS
  h+=`<div class="ds"><div class="ds-t">Print / Export</div>
    <button class="trk-btn trk-go" style="margin-bottom:8px;font-size:13px" onclick="printFullReport()">📄 Print Full Business Report</button>
    <button class="trk-btn" style="margin-bottom:8px;background:var(--c2);border:1.5px solid var(--b1);color:var(--w2);font-size:12px" onclick="printSection('monthly')">📄 Monthly Revenue Report — ${thisYear}</button>
    <button class="trk-btn" style="margin-bottom:8px;background:var(--c2);border:1.5px solid var(--b1);color:var(--w2);font-size:12px" onclick="printSection('ar')">📄 Accounts Receivable Report</button>
    <button class="trk-btn" style="margin-bottom:8px;background:var(--c2);border:1.5px solid var(--b1);color:var(--w2);font-size:12px" onclick="printSection('clients')">📄 Client List</button>
    <button class="trk-btn" style="margin-bottom:8px;background:var(--c2);border:1.5px solid var(--b1);color:var(--w2);font-size:12px" onclick="printSection('equipment')">📄 Equipment Inventory</button>
  </div>`

  // stash data for print functions
  window._rptData={invs,jobs,locs,totalRev,totalOutstanding,totalJobs,completedJobs,activeClients,totalClients,avgJobValue,aging,weeks,months,invsByMonth,jobsByMonth,years,invsByYear,jobsByYear,topClients,recurringClients,recurringPct,totalExt,totalSys,totalLights,brycerLocs,thisYear,monthNames}

  h+=`</div>`
  push(h)
}

function renderAuditLog(entries){
  const el=$('audit-log-list');if(!el)return
  if(!entries.length){el.innerHTML='<div style="color:var(--g2);padding:8px 0">No activity yet</div>';return}
  const icons={jon:'👤',ai_chat:'🤖',customer_portal:'🌐',system:'⚙️'}
  el.innerHTML=entries.map(e=>{
    const dt=new Date(e.created_at)
    const ts=dt.toLocaleDateString('en-US',{month:'short',day:'numeric'})+' '+dt.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'})
    const icon=icons[e.actor]||'📝'
    return`<div style="display:flex;gap:8px;padding:8px 0;border-bottom:1px solid var(--b1);align-items:flex-start;cursor:pointer" onclick="navigateAudit('${e.entity_type}','${e.entity_id||''}')">
      <span style="font-size:14px;flex-shrink:0">${icon}</span>
      <div style="flex:1;min-width:0">
        <div style="font-size:12px;font-weight:600;color:var(--w)">${esc(e.summary||e.action)}</div>
        <div style="font-size:10px;color:var(--g2);margin-top:2px">${ts} · ${e.entity_type} · ${e.actor}</div>
      </div>
    </div>`
  }).join('')
}

function filterAuditLog(){
  const f=$('audit-filter')?.value||''
  const all=window._auditData||[]
  renderAuditLog(f?all.filter(e=>e.entity_type===f):all)
}

function navigateAudit(type,id){
  if(!id)return
  if(type==='job')openJob(id)
  else if(type==='location')openCust(id)
  else if(type==='invoice')openInvDetail(id)
}

function printFullReport(){
  const d=window._rptData;if(!d)return
  const html=buildPrintReport('full',d)
  const w=window.open('','_blank');if(w){w.document.write(html);w.document.close()}
}

function printSection(type){
  const d=window._rptData;if(!d)return
  const html=buildPrintReport(type,d)
  const w=window.open('','_blank');if(w){w.document.write(html);w.document.close()}
}

function buildPrintReport(type,d){
  const today=new Date().toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'})
  let body=''

  if(type==='full'||type==='monthly'){
    body+=`<h2>Revenue Report — ${d.thisYear}</h2>
    <table><tr><th>Month</th><th style="text-align:right">Jobs</th><th style="text-align:right">Billed</th><th style="text-align:right">Collected</th></tr>`
    let totalBilled=0,totalCollected=0,totalJobsYr=0
    d.months.forEach(key=>{
      const mInvs=d.invsByMonth[key]||[]
      const mJobs=d.jobsByMonth[key]||[]
      const rev=mInvs.filter(i=>i.status==='paid').reduce((s,i)=>s+(+i.total||0),0)
      const billed=mInvs.reduce((s,i)=>s+(+i.total||0),0)
      totalBilled+=billed;totalCollected+=rev;totalJobsYr+=mJobs.length
      const mi=parseInt(key.split('-')[1])-1
      body+=`<tr><td>${d.monthNames[mi]} ${d.thisYear}</td><td style="text-align:right">${mJobs.length}</td><td style="text-align:right">$${billed.toFixed(2)}</td><td style="text-align:right">$${rev.toFixed(2)}</td></tr>`
    })
    body+=`<tr style="font-weight:900;border-top:2px solid #000"><td>TOTAL</td><td style="text-align:right">${totalJobsYr}</td><td style="text-align:right">$${totalBilled.toFixed(2)}</td><td style="text-align:right">$${totalCollected.toFixed(2)}</td></tr></table>`
  }

  if(type==='full'){
    body+=`<div style="page-break-before:always"></div>`
    body+=`<h2>Yearly Summary</h2><table><tr><th>Year</th><th style="text-align:right">Jobs</th><th style="text-align:right">Revenue</th><th style="text-align:right">Clients</th></tr>`
    d.years.forEach(yr=>{
      const yInvs=d.invsByYear[yr]||[]
      const yJobs=d.jobsByYear[yr]||[]
      const rev=yInvs.filter(i=>i.status==='paid').reduce((s,i)=>s+(+i.total||0),0)
      const clients=new Set(yJobs.map(j=>j.location_id)).size
      body+=`<tr><td>${yr}</td><td style="text-align:right">${yJobs.length}</td><td style="text-align:right">$${rev.toFixed(2)}</td><td style="text-align:right">${clients}</td></tr>`
    })
    body+=`</table>`
  }

  if(type==='full'||type==='ar'){
    if(type==='full')body+=`<div style="page-break-before:always"></div>`
    body+=`<h2>Accounts Receivable Aging</h2>
    <table><tr><th>Period</th><th style="text-align:right">Amount</th></tr>
    <tr><td>Current (0-30 days)</td><td style="text-align:right">$${d.aging.current.toFixed(2)}</td></tr>
    <tr><td>31-60 days</td><td style="text-align:right">$${d.aging.d30.toFixed(2)}</td></tr>
    <tr><td>61-90 days</td><td style="text-align:right">$${d.aging.d60.toFixed(2)}</td></tr>
    <tr><td>90+ days</td><td style="text-align:right">$${d.aging.over90.toFixed(2)}</td></tr>
    <tr style="font-weight:900;border-top:2px solid #000"><td>TOTAL</td><td style="text-align:right">$${(d.aging.current+d.aging.d30+d.aging.d60+d.aging.over90).toFixed(2)}</td></tr></table>`
    // unpaid invoice detail
    const unpaid=d.invs.filter(i=>!['paid','void','record'].includes(i.status)&&i.date).sort((a,b)=>a.date.localeCompare(b.date))
    if(unpaid.length){
      body+=`<h3>Unpaid Invoice Detail</h3><table><tr><th>Invoice</th><th>Customer</th><th>Date</th><th style="text-align:right">Amount</th><th style="text-align:right">Days</th></tr>`
      unpaid.forEach(i=>{
        const loc=d.locs.find(l=>l.id===i.location_id)
        const days=Math.round((new Date()-new Date(i.date+'T12:00:00'))/86400000)
        body+=`<tr><td>${i.invoice_number||'—'}</td><td>${loc?.name||'Unknown'}</td><td>${i.date}</td><td style="text-align:right">$${(+i.total).toFixed(2)}</td><td style="text-align:right">${days}</td></tr>`
      })
      body+=`</table>`
    }
  }

  if(type==='full'||type==='clients'){
    if(type==='full')body+=`<div style="page-break-before:always"></div>`
    body+=`<h2>Client List — ${d.totalClients} Locations</h2>
    <table><tr><th>Client</th><th>City</th><th>Ext</th><th>Systems</th><th>Brycer</th><th style="text-align:right">Revenue</th></tr>`
    d.locs.sort((a,b)=>(a.name||'').localeCompare(b.name||'')).forEach(l=>{
      const rev=d.invs.filter(i=>i.status==='paid'&&i.location_id===l.id).reduce((s,i)=>s+(+i.total||0),0)
      body+=`<tr><td>${l.name||''}</td><td>${l.city||''}</td><td style="text-align:center">${l.extinguishers?.length||0}</td><td style="text-align:center">${l.suppression_systems?.length||0}</td><td style="text-align:center">${l.is_brycer_jurisdiction?'Yes':''}</td><td style="text-align:right">$${rev.toFixed(2)}</td></tr>`
    })
    body+=`</table>`
  }

  if(type==='full'||type==='equipment'){
    if(type==='full')body+=`<div style="page-break-before:always"></div>`
    body+=`<h2>Equipment Inventory</h2>`
    d.locs.filter(l=>(l.extinguishers?.length||0)+(l.suppression_systems?.length||0)>0).sort((a,b)=>(a.name||'').localeCompare(b.name||'')).forEach(l=>{
      body+=`<h3>${l.name||'Unknown'}${l.city?' — '+l.city:''}</h3>`
      if(l.suppression_systems?.length){
        body+=`<table><tr><th>Suppression System</th><th>Tanks</th><th>Nozzles</th><th>Links</th></tr>`
        l.suppression_systems.forEach(s=>{
          body+=`<tr><td>${s.system_type||'—'}</td><td style="text-align:center">${s.tank_count}</td><td style="text-align:center">${s.nozzle_count}</td><td style="text-align:center">${s.fusible_link_count}</td></tr>`
        })
        body+=`</table>`
      }
      if(l.extinguishers?.length){
        body+=`<table><tr><th>Extinguisher</th><th>Size</th><th>Location</th><th>Mfg Date</th></tr>`
        l.extinguishers.forEach(e=>{
          body+=`<tr><td>${e.type||''}</td><td>${e.size||''}</td><td>${e.location_in_building||''}</td><td>${e.manufacture_date||''}</td></tr>`
        })
        body+=`</table>`
      }
    })
  }

  if(type==='full'){
    body+=`<div style="page-break-before:always"></div>`
    body+=`<h2>Business Valuation Metrics</h2>
    <table>
    <tr><td>Total Revenue (All Time)</td><td style="text-align:right;font-weight:700">$${d.totalRev.toFixed(2)}</td></tr>
    <tr><td>Average Job Value</td><td style="text-align:right">$${d.avgJobValue.toFixed(2)}</td></tr>
    <tr><td>Active Clients (12 months)</td><td style="text-align:right">${d.activeClients}</td></tr>
    <tr><td>Total Service Locations</td><td style="text-align:right">${d.totalClients}</td></tr>
    <tr><td>Recurring Clients (2+ jobs)</td><td style="text-align:right">${d.recurringClients.size} (${d.recurringPct}%)</td></tr>
    <tr><td>Equipment Under Management</td><td style="text-align:right">${d.totalExt+d.totalSys} units</td></tr>
    <tr><td>Avg Revenue per Client</td><td style="text-align:right">$${(d.activeClients?d.totalRev/d.activeClients:0).toFixed(2)}</td></tr>
    <tr><td>Compliance Jurisdictions</td><td style="text-align:right">${d.brycerLocs} (Brycer/Fort Worth)</td></tr>
    <tr><td>Total Jobs Completed</td><td style="text-align:right">${d.completedJobs}</td></tr>
    <tr><td>Outstanding Receivables</td><td style="text-align:right">$${d.totalOutstanding.toFixed(2)}</td></tr>
    </table>`
  }

  return`<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Stephens Advanced — ${type==='full'?'Business Report':type==='monthly'?'Monthly Revenue':type==='ar'?'AR Aging':type==='clients'?'Client List':'Equipment Inventory'}</title>
<meta name="theme-color" content="#0d0f14"><link rel="apple-touch-icon" sizes="180x180" href="/icon-180.png"><link rel="apple-touch-icon" sizes="167x167" href="/icon-167.png"><link rel="apple-touch-icon" sizes="152x152" href="/icon-152.png"><link rel="apple-touch-icon" sizes="120x120" href="/icon-120.png"><link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png"><link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png"><link rel="manifest" href="/manifest.json"><meta name="apple-mobile-web-app-title" content="Stephens Advanced">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Arial,sans-serif;font-size:10pt;color:#000;padding:24px;max-width:800px;margin:0 auto}
h1{font-size:20pt;margin-bottom:4px}
h2{font-size:14pt;margin:20px 0 8px;padding-bottom:4px;border-bottom:2px solid #000}
h3{font-size:11pt;margin:14px 0 6px;color:#333}
table{width:100%;border-collapse:collapse;margin-bottom:16px;font-size:9pt}
th{text-align:left;padding:6px 8px;border-bottom:2px solid #333;font-size:8pt;text-transform:uppercase;letter-spacing:.5px;color:#666}
td{padding:5px 8px;border-bottom:1px solid #ddd}
.hdr{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:20px;padding-bottom:12px;border-bottom:3px solid #f05a28}
.co{font-size:22pt;font-weight:900;letter-spacing:-1px}
.co span{color:#f05a28}

</style></head><body>
<div class="hdr">
  <div><div class="co">Stephens <span>Advanced</span> LLC</div><div class="sub">Fire Suppression & Safety · (214) 994-4799 · jonathan@stephensadvanced.com</div></div>
  <div class="date">Generated ${today}</div>
</div>
${body}
<script>window.print()<\/script>
</body></html>`
}

function rTechs(){
  const techs=D.techs||[]
  const activeTechs=techs.filter(t=>t.active)
  const inactiveTechs=techs.filter(t=>!t.active)
  const t=td()

  let h=`<div class="sec" style="margin-top:8px"><div class="sec-t">Technicians · ${activeTechs.length}</div><button class="sec-a" onclick="openAddTech()">+ Add</button></div>`

  if(!activeTechs.length){
    h+=`<div class="ey"><div class="ey-i">👥</div><div class="ey-t">No technicians yet. Tap + Add to create one.<br><br><span style="font-size:12px;color:var(--g2)">Add yourself first — Jon Stephens</span></div></div>`
  }else{
    activeTechs.forEach(tk=>{
      const techJobs=D.jobs.filter(j=>j.assigned_to===tk.id)
      const todayJobs=techJobs.filter(j=>j.scheduled_date===t)
      const completedJobs=techJobs.filter(j=>j.status==='completed')
      const techRev=D.invs.filter(i=>i.status==='paid'&&techJobs.some(j=>j.id===i.job_id)).reduce((s,i)=>s+(+i.total||0),0)
      h+=`<div class="cc" onclick="openTechDetail('${tk.id}')">
        <div style="width:40px;height:40px;border-radius:50%;background:${tk.color||'var(--fire)'};display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:900;color:#fff;flex-shrink:0">${(tk.name||'?')[0].toUpperCase()}</div>
        <div class="cc-l">
          <div class="cc-nm">${esc(tk.name)}</div>
          <div class="cc-meta">
            <span><b>${todayJobs.length}</b> today</span>
            <span><b>${completedJobs.length}</b> completed</span>
            <span style="color:var(--ok);font-weight:700">${fmt(techRev)}</span>
          </div>
          ${tk.license_number?`<div style="font-size:10px;color:var(--g2);margin-top:2px">${esc(tk.license_number)}</div>`:''}
        </div><div class="cc-arr">›</div>
      </div>`
    })

function showStatDrill(type){
  const t=td()
  let title='',jobs=[]
  if(type==='today'){
    title='Today\'s Jobs'
    jobs=D.jobs.filter(j=>j.scheduled_date===t)
  }else if(type==='estimated'){
    // this week
    const wEnd=new Date();wEnd.setDate(wEnd.getDate()+7)
    const wEndStr=wEnd.toISOString().split('T')[0]
    title='This Week\'s Jobs'
    jobs=D.jobs.filter(j=>j.status==='scheduled'&&j.scheduled_date>=t&&j.scheduled_date<=wEndStr)
  }else if(type==='overdue'){
    title='Overdue Jobs'
    jobs=D.jobs.filter(j=>j.status==='scheduled'&&j.scheduled_date<t)
  }
  if(!jobs.length){toast('No jobs in this category');return}
  let h=`<div class="ov-hdr">
    <button class="ov-back" onclick="pop()">‹</button>
    <div class="ov-title">${title} · ${jobs.length}</div>
  </div><div class="ov-body">`
  jobs.forEach(j=>h+=jCard(j,type==='overdue'))
  h+=`</div>`
  push(h)
}

function filterMoney(type){
  const now=new Date()
  const monthStart=new Date(now.getFullYear(),now.getMonth(),1).toISOString().split('T')[0]
  const monthEnd=new Date(now.getFullYear(),now.getMonth()+1,0).toISOString().split('T')[0]
  let title='',invs=[]
  if(type==='paid'){
    title='Collected This Month'
    invs=D.invs.filter(i=>i.status==='paid'&&i.date>=monthStart&&i.date<=monthEnd)
  }else if(type==='unpaid'){
    title='Unpaid'
    invs=D.invs.filter(i=>['draft','sent'].includes(i.status))
  }else if(type==='outstanding'){
    title='Outstanding (All)'
    invs=D.invs.filter(i=>!['paid','void','record','factored'].includes(i.status))
  }else{
    title='Outstanding'
    invs=D.invs.filter(i=>!['paid','void','record'].includes(i.status))
  }
  const total=invs.reduce((s,i)=>s+(+i.total),0)
  let h=`<div class="ov-hdr">
    <button class="ov-back" onclick="pop()">‹</button>
    <div class="ov-title">${title}</div>
    <div class="ov-act" style="color:var(--ok);font-size:14px;font-weight:800">${fmt(total)}</div>
  </div><div class="ov-body">`
  if(!invs.length){h+=`<div class="ey"><div class="ey-i">💰</div><div class="ey-t">No invoices in this category.</div></div>`}
  else invs.forEach(i=>{
    const loc=D.locs.find(l=>l.id===i.location_id)
    const bc=i.status==='paid'?'bpaid':i.status==='sent'?'bsent':i.status==='overdue'?'bover':'bdraft'
    h+=`<div class="ic" onclick="openInvDetail('${i.id}')">
      <div class="ic-r1"><div><div class="ic-nm">${esc(loc?.name||'Unknown')}</div><div class="ic-sub">${i.invoice_number||'—'}</div></div><span class="badge ${bc}">${i.status}</span></div>
      <div class="ic-sub">${i.date?new Date(i.date).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}):''}</div>
      <div class="ic-amt">${fmt(+i.total)}</div>
    </div>`
  })
  h+=`</div>`
  push(h)
}

function rJobsCal(){
  const now=new Date()
  if(!_calYear){_calYear=now.getFullYear();_calMonth=now.getMonth()}
  const t=td()
  const monthNames=['January','February','March','April','May','June','July','August','September','October','November','December']
  const dayNames=['Sun','Mon','Tue','Wed','Thu','Fri','Sat']
  const firstDay=new Date(_calYear,_calMonth,1).getDay()
  const daysInMonth=new Date(_calYear,_calMonth+1,0).getDate()
  const all=D.jobs.filter(j=>j.status!=='cancelled')

  let h=`<div style="display:flex;align-items:center;justify-content:space-between;margin:8px 0 12px">
    <button style="font-size:22px;color:var(--fire);padding:8px 12px;background:none;border:none;cursor:pointer;min-height:44px" onclick="_calMonth--;if(_calMonth<0){_calMonth=11;_calYear--}rJobsCal()">‹</button>
    <div style="text-align:center">
      <div style="font-size:17px;font-weight:800">${monthNames[_calMonth]} ${_calYear}</div>
      <button style="font-size:10px;color:var(--info);font-weight:700;background:none;border:none;cursor:pointer;margin-top:2px" onclick="_calYear=${now.getFullYear()};_calMonth=${now.getMonth()};rJobsCal()">Today</button>
    </div>
    <button style="font-size:22px;color:var(--fire);padding:8px 12px;background:none;border:none;cursor:pointer;min-height:44px" onclick="_calMonth++;if(_calMonth>11){_calMonth=0;_calYear++}rJobsCal()">›</button>
  </div>
  <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:1px;margin-bottom:4px">`
  dayNames.forEach(d=>h+=`<div style="text-align:center;font-size:9px;font-weight:800;color:var(--g2);padding:4px;text-transform:uppercase;letter-spacing:.5px">${d}</div>`)
  h+=`</div><div style="display:grid;grid-template-columns:repeat(7,1fr);gap:1px">`

  // empty cells before first day
  for(let i=0;i<firstDay;i++)h+=`<div style="min-height:52px;background:var(--c1);border-radius:4px"></div>`

  // expand calendar events for the visible month
  const monthStart=new Date(_calYear,_calMonth,1)
  const monthEnd=new Date(_calYear,_calMonth+1,0,23,59,59)
  const monthEvents=expandRecurring(D.calEvents||[],monthStart,monthEnd)

  for(let d=1;d<=daysInMonth;d++){
    const ds=`${_calYear}-${(_calMonth+1).toString().padStart(2,'0')}-${d.toString().padStart(2,'0')}`
    const dayJobs=all.filter(j=>j.scheduled_date===ds)
    const dayEvts=monthEvents.filter(e=>{const ed=new Date(e.start_time).toISOString().split('T')[0];return ed===ds&&e.event_type!=='job'})
    const isToday=ds===t
    const scheduled=dayJobs.filter(j=>j.status==='scheduled'&&j.scheduled_date>=t)
    const overdue=dayJobs.filter(j=>j.status==='scheduled'&&j.scheduled_date<t)
    const completed=dayJobs.filter(j=>j.status==='completed')
    const hasItems=dayJobs.length||dayEvts.length

    h+=`<div style="min-height:52px;background:${isToday?'var(--fires)':'var(--c1)'};border-radius:4px;padding:4px;cursor:pointer;border:${isToday?'1.5px solid var(--fire)':'1px solid var(--b1)'};position:relative;overflow:hidden" onclick="openCalDay('${ds}')">
      <div style="font-size:12px;font-weight:${isToday?'900':'600'};color:${isToday?'var(--fire)':'var(--w)'};margin-bottom:2px">${d}</div>`
    if(hasItems){
      h+=`<div style="display:flex;gap:2px;flex-wrap:wrap">`
      if(overdue.length)h+=`<div style="width:6px;height:6px;border-radius:50%;background:var(--bad)"></div>`.repeat(Math.min(overdue.length,3))
      if(scheduled.length)h+=`<div style="width:6px;height:6px;border-radius:50%;background:var(--info)"></div>`.repeat(Math.min(scheduled.length,3))
      if(completed.length)h+=`<div style="width:6px;height:6px;border-radius:50%;background:var(--g3)"></div>`.repeat(Math.min(completed.length,3))
      // calendar event dots by type
      const william=dayEvts.filter(e=>e.event_type==='william')
      const personal=dayEvts.filter(e=>e.event_type==='personal')
      const billing=dayEvts.filter(e=>e.event_type==='recurring_billing')
      if(william.length)h+=`<div style="width:6px;height:6px;border-radius:50%;background:#6366f1"></div>`.repeat(Math.min(william.length,2))
      if(personal.length)h+=`<div style="width:6px;height:6px;border-radius:50%;background:#10b981"></div>`.repeat(Math.min(personal.length,1))
      if(billing.length)h+=`<div style="width:4px;height:4px;border-radius:50%;background:#ef4444"></div>`.repeat(Math.min(billing.length,2))
      h+=`</div>`
    }
    h+=`</div>`
  }

  // fill remaining cells
  const totalCells=firstDay+daysInMonth
  const remaining=totalCells%7?7-totalCells%7:0
  for(let i=0;i<remaining;i++)h+=`<div style="min-height:52px;background:var(--c1);border-radius:4px;opacity:.3"></div>`

  h+=`</div>`

  // overdue summary below calendar
  const ovAll=all.filter(j=>j.status==='scheduled'&&j.scheduled_date<t)
  if(ovAll.length){
    h+=`<div style="background:var(--bads);border:1.5px solid var(--bad);border-radius:var(--r);padding:10px 14px;margin-top:12px;cursor:pointer" onclick="openCalDay('overdue')">
      <span style="font-size:12px;font-weight:800;color:var(--bad)">${ovAll.length} Overdue Job${ovAll.length>1?'s':''}</span>
    </div>`
  }

  const jc=$('calContent')||$('jobsContent')||$('jobsC');jc.innerHTML=h
}

function openCalDay(ds){
  const t=td()
  let dayJobs,dayEvts=[],title
  if(ds==='overdue'){
    dayJobs=D.jobs.filter(j=>j.status==='scheduled'&&j.scheduled_date<t)
    title='Overdue Jobs'
  }else{
    dayJobs=D.jobs.filter(j=>j.scheduled_date===ds&&j.status!=='cancelled')
    dayEvts=eventsForDate(ds).filter(e=>e.event_type!=='job')
    const dt=new Date(ds+'T12:00:00')
    title=dt.toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'})
  }

  // time slots from 7am to 6pm
  const slots=[]
  for(let hr=7;hr<=18;hr++){
    const hStr=hr.toString().padStart(2,'0')+':00'
    const label=hr>12?(hr-12)+' PM':(hr===12?'12 PM':hr+' AM')
    const slotJobs=dayJobs.filter(j=>{
      const jh=parseInt((j.scheduled_time||'09:00').split(':')[0])
      return jh===hr
    })
    const slotEvts=dayEvts.filter(e=>{
      const sh=new Date(e.start_time).getHours()
      return sh===hr
    })
    slots.push({hr,hStr,label,jobs:slotJobs,events:slotEvts})
  }
  const unslotted=dayJobs.filter(j=>{
    const jh=parseInt((j.scheduled_time||'99').split(':')[0])
    return jh<7||jh>18||isNaN(jh)
  })

  let h=`<div class="ov-hdr"><button class="ov-back" onclick="pop()">‹</button><div class="ov-title">${title}</div>
    ${ds!=='overdue'?`<button class="ov-act" onclick="pop();schedFromCal('${ds}')">+ Add</button>`:''}
  </div><div class="ov-body">`

  // available slots summary
  if(ds!=='overdue'){
    const avail=getAvailableSlots(ds)
    if(avail.length){
      h+=`<div style="font-size:10px;color:var(--g2);margin-bottom:8px;font-weight:600">Open: ${avail.map(s=>s.start+'-'+s.end).join(', ')}</div>`
    }
  }

  if(!dayJobs.length&&!dayEvts.length&&ds!=='overdue'){
    h+=`<div style="text-align:center;padding:40px;color:var(--g2)">
      <div style="font-size:32px;margin-bottom:8px;opacity:.3">📅</div>
      <div style="font-size:14px;margin-bottom:16px">No jobs on this day</div>
      <button class="btn-p" style="max-width:240px;margin:0 auto" onclick="pop();schedFromCal('${ds}')">Schedule a Job Here</button>
    </div>`
  }else{
    if(unslotted.length){
      h+=`<div style="margin-bottom:12px">`
      unslotted.forEach(j=>h+=jCard(j,ds!=='overdue'&&j.scheduled_date<t))
      h+=`</div>`
    }
    slots.forEach(s=>{
      const hasContent=s.jobs.length||s.events.length
      if(!hasContent&&ds==='overdue')return
      h+=`<div style="display:flex;gap:8px;min-height:48px;margin-bottom:2px">
        <div style="width:52px;font-size:11px;font-weight:600;color:var(--g2);padding-top:6px;flex-shrink:0;text-align:right">${s.label}</div>
        <div style="flex:1;border-left:1px solid var(--b1);padding-left:8px;min-height:48px${!hasContent?';cursor:pointer':''}"${!hasContent&&ds!=='overdue'?` onclick="pop();schedFromCal('${ds}','${s.hStr}')"`:''}>`
      // calendar events for this slot
      s.events.forEach(e=>{
        const st=new Date(e.start_time),et=new Date(e.end_time)
        const timeStr=st.getHours().toString().padStart(2,'0')+':'+st.getMinutes().toString().padStart(2,'0')+' - '+et.getHours().toString().padStart(2,'0')+':'+et.getMinutes().toString().padStart(2,'0')
        const typeBadge={william:'👦 William',personal:'🟢 Personal',recurring_billing:'💰 Bill Due'}[e.event_type]||e.event_type
        h+=`<div style="background:${e.color||'#6366f1'}15;border:1px solid ${e.color||'#6366f1'}40;border-radius:var(--rs);padding:10px;margin-bottom:4px;border-left:3px solid ${e.color||'#6366f1'}">
          <div style="display:flex;justify-content:space-between;align-items:center">
            <div style="font-size:13px;font-weight:700;color:${e.color||'#6366f1'}">${esc(e.title)}</div>
            <span style="font-size:9px;font-weight:800;padding:2px 6px;border-radius:3px;background:${e.color||'#6366f1'}20;color:${e.color||'#6366f1'}">${typeBadge}</span>
          </div>
          <div style="font-size:11px;color:var(--g1);margin-top:2px">${timeStr}</div>
        </div>`
      })
      // jobs for this slot
      if(s.jobs.length){
        s.jobs.forEach(j=>{
          const l=D.locs?.find(x=>x.id===(j.location_id||j.location?.id))||j.location||{}
          const sc=j.scope||[]
          h+=`<div style="background:var(--c1);border:1px solid var(--b1);border-radius:var(--rs);padding:10px;margin-bottom:4px;cursor:pointer;border-left:3px solid ${j.status==='completed'?'var(--g3)':j.scheduled_date<t?'var(--bad)':'var(--info)'}" onclick="openJob('${j.id}')">
            <div style="font-size:13px;font-weight:700">${esc(l.name||'Unknown')}</div>
            <div style="font-size:11px;color:var(--g1);margin-top:2px"><span style="cursor:pointer;color:var(--info);text-decoration:underline;text-decoration-color:rgba(99,102,241,.3)" onclick="event.stopPropagation();reschedJob('${j.id}')">${(j.scheduled_time||'').slice(0,5)||'No time'}</span> · ${sc.join(', ')}</div>
          </div>`
        })
      }
      h+=`</div></div>`
    })
  }

  h+=`</div>`
  push(h);setTimeout(initSwipes,50)
}

function rJobsList(q){
  const t=td(),now=new Date(),curMonth=now.getFullYear()+'-'+(now.getMonth()+1).toString().padStart(2,'0')
  const all=D.jobs.filter(j=>j.status!=='cancelled')
  // hide completed jobs AND jobs that already have an invoice (they're done)
  const invoicedJobIds=new Set(D.invs.filter(i=>i.job_id).map(i=>i.job_id))
  const visible=all.filter(j=>j.status!=='completed'&&!invoicedJobIds.has(j.id)&&(!j.scheduled_date||j.scheduled_date.slice(0,7)<=curMonth))
  let filtered=visible
  if(q){
    const ql=q.toLowerCase()
    // search across ALL non-cancelled jobs (including completed + invoiced) so customers can find past work
    filtered=all.filter(j=>{
      const l=D.locs?.find(x=>x.id===(j.location_id||j.location?.id))||j.location||{}
      return(l.name||'').toLowerCase().includes(ql)||(l.address||'').toLowerCase().includes(ql)||(l.city||'').toLowerCase().includes(ql)||(j.scheduled_date||'').includes(ql)
    })
  }
  const ov=filtered.filter(j=>j.status==='scheduled'&&j.scheduled_date<t)
  const up=filtered.filter(j=>j.status==='scheduled'&&j.scheduled_date>=t)
  const done=q?filtered.filter(j=>j.status==='completed'||invoicedJobIds.has(j.id)).sort((a,b)=>(b.scheduled_date||'').localeCompare(a.scheduled_date||'')):[]
  const active=filtered
  if($('jobs-list')){
    let h2=''
    if(ov.length){h2+=`<div class="sec"><div class="sec-t" style="color:var(--bad)">Overdue · ${ov.length}</div></div>`;ov.forEach(j=>h2+=jCard(j,true))}
    if(up.length){h2+=`<div class="sec"><div class="sec-t">Scheduled · ${up.length}</div></div>`;up.forEach(j=>h2+=jCard(j))}
    if(done.length){h2+=`<div class="sec"><div class="sec-t" style="color:var(--mu)">Completed · ${done.length}</div></div>`;done.forEach(j=>h2+=jCard(j))}
    if(!active.length&&q)h2+=`<div class="ey"><div class="ey-t">No jobs matching "${esc(q)}"</div></div>`
    $('jobs-list').innerHTML=h2
    return
  }
  let h=`<div style="display:flex;justify-content:space-between;align-items:center;margin:8px 0 12px">
    <div class="sec-t">Jobs · ${active.length}</div>
  </div>
  <input class="srch" placeholder="Search customer, city, date, or completed jobs..." oninput="rJobsList(this.value)">`
  h+=`<div id="jobs-list">`
  if(ov.length){h+=`<div class="sec"><div class="sec-t" style="color:var(--bad)">Overdue · ${ov.length}</div></div>`;ov.forEach(j=>h+=jCard(j,true))}
  if(up.length){h+=`<div class="sec"><div class="sec-t">Scheduled · ${up.length}</div></div>`;up.forEach(j=>h+=jCard(j))}
  if(done.length){h+=`<div class="sec"><div class="sec-t" style="color:var(--mu)">Completed · ${done.length}</div></div>`;done.forEach(j=>h+=jCard(j))}
  if(!active.length)h+=`<div class="ey"><div class="ey-i">📋</div><div class="ey-t">No jobs yet. Tap + to create one.</div></div>`
  h+=`</div>`
  const jc=$('jobsContent')||$('jobsC');jc.innerHTML=h;setTimeout(initSwipes,50)
}

// JOB WORK ORDER — live editable invoice during the job
let jobLines=[] // [{desc,qty,price,id}]
let jobNotes=''
let jobPhotos=[] // [{b64,caption}]
let invLines=[] // for editing existing invoices in openInvDetail

function buildJobLines(j){
  const l=D.locs.find(x=>x.id===(j.location_id||j.location?.id))||j.location||{},sc=j.scope||[]
  // Use versioned rates (getRate falls back to D.rc if no rate_card_history)
  const rc=new Proxy({},{get:(_,key)=>getRate(key)})
  const lines=[]
  // suppression
  if(sc.includes('suppression'))for(const s of(l.suppression_systems||[])){
    let bv=rc.suppression_standard||250
    if(s.category==='captiveaire_tank')bv=rc.suppression_captiveaire_tank||450
    if(s.category==='captiveaire_core')bv=rc.suppression_captiveaire_core||650
    lines.push({desc:`${s.system_type} Semi-Annual`,qty:1,price:bv})
    if(s.tank_count>1)lines.push({desc:`Additional Tank Fee`,qty:s.tank_count-1,price:rc.suppression_additional_tank||50})
    if(s.fusible_link_count)lines.push({desc:`Fusible Links`,qty:s.fusible_link_count,price:rc.fusible_link||25})
  }
  // extinguishers
  if(sc.includes('extinguishers')&&l.extinguishers?.length){
    lines.push({desc:`Extinguisher Inspection`,qty:l.extinguishers.length,price:rc.extinguisher_inspection||20})
    // check for due internals and hydros based on NFPA 10 intervals
    const now=new Date()
    let internalDueCount=0,hydroDueCount=0
    const hydroByType={}
    l.extinguishers.forEach(e=>{
      const nfpa=NFPA10?.[e.type]||{hydro:12,internal:6}
      // 6-year internal check
      if(nfpa.internal){
        const base=e.last_internal?new Date(e.last_internal+'-01'):e.manufacture_date?new Date(e.manufacture_date+'-01'):null
        if(base){const due=new Date(base);due.setFullYear(due.getFullYear()+nfpa.internal);if(due<=now)internalDueCount++}
      }
      // hydro check
      const hBase=e.last_hydro?new Date(e.last_hydro+'-01'):e.manufacture_date?new Date(e.manufacture_date+'-01'):null
      if(hBase){const due=new Date(hBase);due.setFullYear(due.getFullYear()+nfpa.hydro);if(due<=now){
        const key=`Hydrostatic Test ${e.type}`;hydroByType[key]=(hydroByType[key]||0)+1
      }}
    })
    if(internalDueCount)lines.push({desc:`Dry Chem Internal Inspection (6-yr due)`,qty:internalDueCount,price:68})
    Object.entries(hydroByType).forEach(([desc,qty])=>{
      const hPrice=desc.includes('Class K')?275:desc.includes('CO2')?72:desc.includes('Water')?57:68
      lines.push({desc:`${desc} (hydro due)`,qty,price:hPrice})
    })
  }
  // elights
  if(sc.includes('elights')&&l.emergency_lights?.[0]?.fixture_count){
    const fc=l.emergency_lights[0].fixture_count
    lines.push({desc:`E-Light Annual Test`,qty:fc,price:rc.emergency_light||20})
  }
  // fallback — nothing auto-populated, start with blank
  return lines.length?lines:[{desc:'',qty:1,price:0}]
}

          <div class="ic-r1"><div class="ic-nm">${icon} ${label}${loc2?' — '+esc(loc2):''}</div><span class="badge bpaid">Saved</span></div>
          <div class="ic-sub">${date2}</div>
        </div>`
      })
      rh+=`</div>`
      wrap.innerHTML=rh
    },100)
    // Job photos
    if(j.photos&&j.photos.length){
      h+=`<div class="ds"><div class="ds-t">Job Photos · ${j.photos.length}</div>
        <div style="display:flex;flex-wrap:wrap;gap:6px">
          ${j.photos.map(p=>`<img src="${p}" style="width:80px;height:80px;object-fit:cover;border-radius:6px;border:1px solid var(--b1);cursor:pointer" onclick="window.open('${p}','_blank')">`).join('')}
        </div>

    }
    // Customer signature
    if(j.signature_data){
      h+=`<div class="ds"><div class="ds-t">Customer Signature</div>
        <img src="${j.signature_data}" style="max-width:100%;max-height:120px;background:#fff;border-radius:6px;padding:6px">
      </div>`
    }
    if(j.notes)h+=`<div class="ds"><div class="ds-t">Notes</div><div class="ds-info">${esc(j.notes)}</div></div>`
  }

  h+=`</div>`

  if(isActive){
    // checklist flags above Complete button — reactive to line item changes
    h+=`<div id="job-checklist-${j.id}" style="padding:12px 0"></div>`
    window._activeJobId=j.id
    window._activeJobLoc=l
    _jobDataDirty=false
    startJobAutoSave()
    setTimeout(()=>updateJobChecklist(),150)

    h+=`<div style="padding:0 0 max(env(safe-area-inset-bottom),12px)">
      <label style="display:flex;align-items:center;gap:10px;padding:12px 14px;background:var(--c1);border:1px solid var(--b1);border-radius:var(--rs);margin-bottom:8px;cursor:pointer;font-size:13px;color:var(--w)">
        <input type="checkbox" id="pay-at-service" style="width:20px;height:20px;accent-color:var(--fire)">
        <div><div style="font-weight:700">Customer paying now?</div><div style="font-size:11px;color:var(--g1)">10% prompt-pay discount applied if paid within 24 hours</div></div>
      </label>
      <button class="btn-p" id="compBtn" style="background:var(--g3);color:var(--g1)" onclick="compJ('${j.id}')">✓ Complete Job — Generate Invoice</button>
    </div>`
  }else{
    h+=`<div style="padding:12px 0"><button class="btn-dim" onclick="pop()">← Back</button></div>`
  }

  push(h,{jobId:id})
  if(isActive){
    setTimeout(()=>{renderJobLines();initSig()},80)
  }
}

async function handleExtPaste(ev,jobId){
  ev.preventDefault()
  const items=ev.clipboardData?.items||[]
  const imageFiles=[]
  for(const item of items){
    if(item.type.startsWith('image/')){
      const file=item.getAsFile()
      if(file)imageFiles.push(file)
    }
  }
  if(!imageFiles.length){toast('No image in clipboard — copy an image first',false);return}
  // fake an event object for pasteExtReport
  const fakeEv={target:{files:imageFiles,value:''}}
  await pasteExtReport(fakeEv,jobId)
  // clear the contenteditable div of any pasted content
  const zone=$('extPasteZone-'+jobId)
  if(zone){const preview=$('extReportPreview-'+jobId);zone.innerHTML='';if(preview)zone.appendChild(preview)}
}

async function pasteExtReport(ev,jobId){
  const files=Array.from(ev.target.files);if(!files.length)return
  toast('Uploading report...')
  const photos=[]
  for(const file of files.slice(0,10)){
    const b64=await resizePhoto(file,1400,0.85)
    photos.push(b64)
    // upload to storage
    try{const blob=dataURItoBlob(b64);await uploadDocument(blob,'ext-report-'+Date.now()+'.jpg','report_pdf','job',jobId,{source:'ext_report_paste'})}catch(e){}
  }
  // save to job record
  await SB.from('jobs').update({ext_report_photos:photos}).eq('id',jobId)
  // also save as a report record so it shows in portal/email
  const locId=D.jobs.find(j=>j.id===jobId)?.location_id
  try{
    const{data:ex}=await SB.from('reports').select('id').eq('job_id',jobId).eq('report_type','extinguisher').limit(1)
    const rptData={pastedPhotos:photos,savedAt:new Date().toISOString()}
    if(ex?.length){await SB.from('reports').update({report_data:rptData}).eq('id',ex[0].id)}
    else{await SB.from('reports').insert({job_id:jobId,location_id:locId,report_type:'extinguisher',report_data:rptData})}
  }catch(e){console.error('save ext report:',e)}
  await load()
  toast(photos.length+' page'+(photos.length>1?'s':'')+' uploaded ✓')
  // refresh preview
  const preview=$('extReportPreview-'+jobId)
  if(preview)preview.innerHTML=photos.map(p=>'<img src="'+p+'" style="width:100%;max-height:200px;object-fit:contain;border-radius:8px;margin-bottom:6px;border:1px solid var(--b1)">').join('')
  ev.target.value=''
}

function handleJobPhoto(ev){
  const file=ev.target.files[0];if(!file)return
  const reader=new FileReader()
  reader.onload=e=>{
    const img=new Image()
    img.onload=()=>{
      const canvas=document.createElement('canvas')
      const max=1200;let w=img.width,h=img.height
      if(w>max||h>max){if(w>h){h=Math.round(h*max/w);w=max}else{w=Math.round(w*max/h);h=max}}
      canvas.width=w;canvas.height=h;canvas.getContext('2d').drawImage(img,0,0,w,h)
      const b64=canvas.toDataURL('image/jpeg',0.8)
      jobPhotos.push({b64,caption:''})
      renderJobPhotos()
      // upload to storage
      try{
        const blob=dataURItoBlob(b64)
        const jid=window._activeJobId
        if(jid)uploadDocument(blob,'job-photo-'+Date.now()+'.jpg','photo','job',jid,{source:'tech_notes'})
      }catch(e){console.error('photo upload:',e)}
      // save to job record
      saveJobPhotos()
    }
    img.src=e.target.result
  }
  reader.readAsDataURL(file)
  ev.target.value=''
}

function dataURItoBlob(dataURI){
  const split=dataURI.split(','),mime=split[0].match(/:(.*?);/)[1]
  const b=atob(split[1]),arr=new Uint8Array(b.length)
  for(let i=0;i<b.length;i++)arr[i]=b.charCodeAt(i)
  return new Blob([arr],{type:mime})
}

// reactive checklist — scans jobLines descriptions to determine required reports
async function updateJobChecklist(){
  const jid=window._activeJobId;if(!jid)return
  const loc=window._activeJobLoc||{}
  const wrap=$('job-checklist-'+jid);if(!wrap)return

  // scan line items AND location equipment to determine required reports
  const descs=jobLines.map(l2=>(l2.desc||'').toLowerCase()).join(' ')
  const hasExtLines=descs.match(/extinguisher/)
  const hasSuppLines=descs.match(/semi.?annual|suppression|kitchen|ansul|pyro.?chem|buckeye|kidde|clean.?agent|clean agent|fm.?200|novec|dry.?chem|dry chemical|paint|booth/)
  const hasAnyLines=jobLines.some(l2=>(l2.desc||'').trim())

  // fetch saved reports
  const{data:savedRpts}=await SB.from('reports').select('id,report_type,report_data').eq('job_id',jid)
  const rpts=savedRpts||[]

  let flags=[]

  // Invoice flag
  flags.push({label:'Build Invoice',done:hasAnyLines,action:null})

  // Extinguisher report — removed from checklist (use photo paste on job card instead)

  // Suppression reports — driven by actual systems on file, one flag per system
  if(hasSuppLines){
    // determine report type from LINE ITEMS first (most accurate), then fall back to system type
    const hasDCLine=descs.match(/dry.?chem|dry chemical|paint|booth/)
    const hasCALine=descs.match(/clean.?agent|clean agent|fm.?200|novec/)
    const hasKitchenLine=descs.match(/semi.?annual|suppression|kitchen|ansul|pyro.?chem|buckeye|kidde|captive/)&&!hasDCLine&&!hasCALine
    const allSyss=loc.suppression_systems||[]
    const sysId=allSyss[0]?.id||''
    const escapedSysId=(sysId).replace(/'/g,"\\'")

    if(hasDCLine){
      const done=rpts.some(r=>r.report_type==='dry_chemical')
      flags.push({label:'Dry Chem / Paint Booth Report',done,action:`openDryChemReport('${jid}','${escapedSysId}')`})
    }
    if(hasCALine){
      const done=rpts.some(r=>r.report_type==='clean_agent')
      flags.push({label:'Clean Agent Report',done,action:`openCleanAgentReport('${jid}','${escapedSysId}')`})
    }
    if(hasKitchenLine||(!hasDCLine&&!hasCALine)){
      // check systems on file for kitchen hood types, or default to kitchen hood
      const kitchenSyss=allSyss.filter(s=>{const t=(s.system_type||'').toLowerCase();return!t.match(/paint|booth|dry.?chem|fm.?200|novec|clean.?agent|halon/)})
      if(kitchenSyss.length||(!hasDCLine&&!hasCALine)){
        kitchenSyss.forEach(sys=>{
          const eid=(sys.id||'').replace(/'/g,"\\'")
          const done=rpts.some(r=>r.report_type==='kitchen_suppression')
          const sysName=(sys.system_type||'').split('(')[0].trim()
          flags.push({label:'Kitchen Hood Report'+(kitchenSyss.length>1?' — '+sysName:''),done,action:`openSuppReport('${jid}','${eid}')`})
        })
        if(!kitchenSyss.length&&!hasDCLine&&!hasCALine){
          const done=rpts.some(r=>r.report_type==='kitchen_suppression')
          flags.push({label:'Kitchen Hood Report',done,action:`openSuppReport('${jid}','')`})
        }
      }
    }
  }

  // render flags
  let fh=''
  // store flags globally so click handlers can access them
  window._jobFlags=flags

  flags.forEach((f,fi)=>{
    const color=f.done?'var(--ok)':'var(--g2)'
    const icon=f.done?'✓':'○'
    fh+=`<div data-flag="${fi}" style="display:flex;align-items:center;gap:10px;padding:10px 12px;margin-bottom:4px;border-radius:var(--rs);background:${f.done?'rgba(16,185,129,.08)':'var(--c2)'};border:1px solid ${f.done?'var(--ok)':'var(--b1)'};cursor:${f.action?'pointer':'default'};min-height:44px">
      <span style="font-size:16px;font-weight:800;color:${color};width:20px;text-align:center">${icon}</span>
      <span style="font-size:12px;font-weight:700;color:${f.done?'var(--ok)':'var(--w)'};flex:1">${f.label}</span>
      ${f.done?'<span style="font-size:9px;font-weight:800;color:var(--ok);text-transform:uppercase">Done</span>':(f.action?'<span style="font-size:9px;font-weight:700;color:var(--fire);text-transform:uppercase">Tap to fill →</span>':'')}
    </div>`
  })

  const allDone=flags.every(f=>f.done)
  const compBtn=$('compBtn')
  if(compBtn){
    compBtn.style.background=allDone?'var(--ok)':'var(--g3)'
    compBtn.style.color=allDone?'#fff':'var(--g1)'
  }
  wrap.innerHTML=fh
  // attach click handlers via addEventListener (more reliable than onclick attr)
  wrap.querySelectorAll('[data-flag]').forEach(el=>{
    const fi=parseInt(el.dataset.flag)
    const f=flags[fi]
    if(f&&f.action){
      el.addEventListener('click',async()=>{try{await eval(f.action)}catch(e){console.error('flag click:',e);toast('Error: '+e.message,false)}})
    }
  })
}
