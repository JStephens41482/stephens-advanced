async function sendInvEmail(invId){
  // Bug #1/#2 fix: if launched from the post-completion invOv modal, close it
  // and push the invoice detail screen first so Back from Review lands on the
  // invoice, not on the Jobs list.
  const _invOv=$('invOv')
  if(_invOv&&_invOv.classList.contains('open')){
    _invOv.classList.remove('open')
    await openInvDetail(invId)
  }
  const inv=D.invs.find(x=>x.id===invId)||{}
  const loc=D.locs.find(x=>x.id===inv.location_id)||{}
  const ba=loc.billing_account_id?D.bas.find(b=>b.id===loc.billing_account_id):null
  // ONLY use email from THIS location — never from a stale form field for a different location
  const locContacts=contactsForEntity('location',inv.location_id).filter(c=>c.email)
  const fieldEmail=$('det-email-to')?.value?.trim()||$('inv-email-to')?.value?.trim()||''
  // verify the field email belongs to this location — reject stale emails from other invoices
  const locEmails=[loc.contact_email,ba?.email,...locContacts.map(c=>c.email)].filter(Boolean).map(e=>e.toLowerCase())
  const manualTo=fieldEmail&&(locEmails.includes(fieldEmail.toLowerCase())||!locEmails.length)?fieldEmail:''
  if(locContacts.length>1||locContacts.length===1&&manualTo){
    // show contact picker
    const primary=locContacts.find(c=>c.is_primary)||locContacts[0]
    let ph=`<div class="ov-hdr"><button class="ov-back" onclick="pop()">‹</button><div class="ov-title">Send To</div></div><div class="ov-body">
      <div style="font-size:12px;color:var(--g2);margin-bottom:12px">Choose who receives Invoice ${inv.invoice_number||''}</div>`
    locContacts.forEach(c=>{
      ph+=`<div style="background:var(--c1);border:1px solid var(--b1);border-radius:var(--rs);padding:12px;margin-bottom:8px;cursor:pointer;display:flex;align-items:center;gap:10px" onclick="pop();_showEmailPreview('${invId}','${esc(c.email)}','${esc(loc.name)}','${esc(inv.invoice_number||'')}')">
        ${c.is_primary?'<span style="font-size:14px">⭐</span>':'<span style="width:14px"></span>'}
        <div><div style="font-size:13px;font-weight:700">${esc(c.name)}</div>
        <div style="font-size:11px;color:var(--g1)">${esc(c.email)}${c.role?' · '+c.role:''}</div></div>
      </div>`
    })
    if(manualTo&&!locContacts.find(c=>c.email===manualTo)){
      ph+=`<div style="background:var(--c1);border:1px solid var(--b1);border-radius:var(--rs);padding:12px;margin-bottom:8px;cursor:pointer" onclick="pop();_showEmailPreview('${invId}','${esc(manualTo)}','${esc(loc.name)}','${esc(inv.invoice_number||'')}')">
        <div style="font-size:13px;font-weight:700">Custom: ${esc(manualTo)}</div>
      </div>`
    }
    ph+=`</div>`
    push(ph)
    return
  }
  const to=manualTo||locContacts[0]?.email||loc.contact_email||ba?.email||''
  if(!to){toast('No email — enter one in the email field',false);return}
  await _showEmailPreview(invId,to,loc.name||'',inv.invoice_number||'')
}

async function sendInvoiceEmail(invId,toEmail,custName,invNum,btn){
  // Show email preview overlay — user reviews everything then taps Send
  const emailField=$('inv-email-to')
  const to=emailField?emailField.value.trim():toEmail
  if(!to){
    const st=$('inv-email-status');if(st){st.textContent='No email address — enter one above.';st.style.color='var(--bad)'}
    return
  }
  if(btn){btn.innerHTML='<span class="spin"></span>';btn.style.pointerEvents='none'}
  await _showEmailPreview(invId,to,custName,invNum)
  if(btn){btn.innerHTML='✉️ Send Email';btn.style.pointerEvents=''}
}

async function _showEmailPreview(invId,to,custName,invNum){
  const{data:invFresh}=await SB.from('invoices').select('*').eq('id',invId).single()
  const inv=invFresh||D.invs.find(x=>x.id===invId)||{}
  const{data:lines}=await SB.from('invoice_lines').select('*').eq('invoice_id',invId).is('deleted_at',null).order('sort_order')
  const ls=lines||[]
  const total=ls.reduce((s,l)=>s+(+l.total||0),0)||+inv.total||0
  const loc=D.locs.find(x=>x.id===inv.location_id)||{}
  const subj=`${inv.status==='paid'?'PAID — ':''}Invoice ${inv.invoice_number||invNum} — Stephens Advanced LLC`

  // fetch all reports for this job
  let rpts=[]
  if(inv.job_id){
    const{data:r}=await SB.from('reports').select('id,report_type,report_data,created_at').eq('job_id',inv.job_id).order('created_at')
    rpts=r||[]
  }

  let h=`<div class="ov-hdr"><button class="ov-back" onclick="pop()">‹</button><div class="ov-title">Review Before Sending</div></div><div class="ov-body" style="padding:16px">`
  h+=`<div style="background:var(--c2);border-radius:var(--r);padding:16px;margin-bottom:16px">
    <div style="font-size:11px;color:var(--g1);margin-bottom:4px">TO</div>
    <div style="font-size:15px;font-weight:700;color:var(--w);margin-bottom:12px">${esc(to)}</div>
    <div style="font-size:11px;color:var(--g1);margin-bottom:4px">SUBJECT</div>
    <div style="font-size:14px;font-weight:600;color:var(--w)">${esc(subj)}</div>
  </div>`
  h+=`<div style="background:var(--c2);border-radius:var(--r);padding:16px;margin-bottom:16px">
    <div style="font-size:11px;color:var(--g1);margin-bottom:8px">INVOICE</div>
    <div style="font-size:16px;font-weight:800;color:var(--fire);margin-bottom:4px">${esc(inv.invoice_number||'')}</div>
    <div style="font-size:13px;color:var(--w);margin-bottom:12px">${esc(custName||loc.name||'')}</div>`
  if(ls.length){
    h+=`<table style="width:100%;font-size:12px;color:var(--w);border-collapse:collapse">`
    ls.forEach(l=>{
      h+=`<tr><td style="padding:6px 0;border-bottom:1px solid var(--b1)">${esc(l.description)}</td>
        <td style="padding:6px 0;border-bottom:1px solid var(--b1);text-align:right;white-space:nowrap">${l.quantity} × $${(+l.unit_price).toFixed(2)}</td>
        <td style="padding:6px 0;border-bottom:1px solid var(--b1);text-align:right;font-weight:700;white-space:nowrap">$${(+l.total).toFixed(2)}</td></tr>`
    })
    h+=`<tr><td colspan="2" style="padding:8px 0;font-weight:800;font-size:14px">TOTAL</td>
      <td style="padding:8px 0;text-align:right;font-weight:900;font-size:16px;color:var(--fire)">$${total.toFixed(2)}</td></tr></table>`
  }
  h+=`</div>`

  // show attached reports
  if(rpts.length){
    h+=`<div style="background:var(--c2);border-radius:var(--r);padding:16px;margin-bottom:16px">
      <div style="font-size:11px;color:var(--g1);margin-bottom:8px">PDF ATTACHMENTS · ${rpts.length}</div>`
    rpts.forEach(r=>{
      const icon=r.report_type==='extinguisher'?'🧯':r.report_type==='dry_chemical'?'🏭':r.report_type==='clean_agent'?'💨':'🔥'
      const name=r.report_type==='extinguisher'?'Extinguisher Report':r.report_type==='dry_chemical'?'Dry Chemical / Paint Booth Report':r.report_type==='clean_agent'?'Clean Agent Report':'Kitchen Hood Report'
      const sysLoc=r.report_data?.sysLocation||''
      h+=`<div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--b1)">
        <span style="font-size:18px">${icon}</span>
        <div style="flex:1"><div style="font-size:13px;font-weight:700;color:var(--w)">${name}</div>
          ${sysLoc?`<div style="font-size:11px;color:var(--g1)">${esc(sysLoc)}</div>`:''}</div>
        <span style="font-size:11px;font-weight:700;color:var(--ok)">PDF</span>
      </div>`
    })
    h+=`</div>`
  }else{
    h+=`<div style="font-size:11px;color:var(--g1);padding:8px 0;text-align:center">No reports to attach.</div>`
  }

  // ═══ DOCUMENTS (vendor work orders, POs, photos, etc.) ═══
  const atts=await loadInvoiceAttachments(invId)
  h+=`<div style="background:var(--c2);border-radius:var(--r);padding:16px;margin-bottom:16px" id="review-docs-section">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
      <div style="font-size:11px;color:var(--g1)">DOCUMENTS<span id="review-docs-count">${atts.length?` · ${atts.length}`:''}</span></div>
      <div style="display:flex;gap:6px">
        <button onclick="triggerInvAttachCamera('${invId}',()=>rerenderReviewDocs('${invId}'))" style="font-size:11px;font-weight:700;color:var(--fire);background:rgba(240,90,40,.08);border:1px solid var(--fire);padding:6px 10px;border-radius:8px;cursor:pointer">📷 Photo</button>
        <button onclick="triggerInvAttachUpload('${invId}',()=>rerenderReviewDocs('${invId}'))" style="font-size:11px;font-weight:700;color:var(--w2);background:var(--c1);border:1px solid var(--b1);padding:6px 10px;border-radius:8px;cursor:pointer">+ Upload</button>
      </div>
    </div>
    <div id="review-docs-list">${renderAttachmentList(atts,invId,'review')}</div>
  </div>`

  // customer signature
  h+=`<div style="border:1.5px solid var(--b1);border-radius:var(--r);padding:14px;margin-bottom:16px;background:var(--c2)">
    <div style="font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:1px;color:var(--g1);margin-bottom:8px">Customer Signature</div>
    <div class="sig-wrap" id="cust-send-sig-wrap"><canvas id="custSendSig"></canvas><div class="sig-ph" id="custSendSigPh">Customer signs here</div><button class="sig-clr" onclick="clrCustSendSig()">Clear</button></div>
    <div style="font-size:10px;color:var(--g2);margin-top:6px;text-align:center">Customer signs once for invoice and all reports</div>
  </div>`

  // store data for the send action
  window._pendingEmail={invId,to,custName:custName||loc.name||'',invNum:inv.invoice_number||invNum,inv,ls,total,loc,rpts,atts}

  const totalAttachCount=rpts.length+atts.length
  const sendLabel=totalAttachCount?'✉️ Send Invoice + '+totalAttachCount+' Attachment'+(totalAttachCount>1?'s':''):'✉️ Send Invoice'
  h+=`<button id="confirmSendBtn" onclick="_confirmSendEmail()" style="width:100%;padding:16px;border-radius:var(--r);background:var(--fire);color:#fff;font-size:16px;font-weight:800;border:none;cursor:pointer;min-height:54px;margin-bottom:8px">${sendLabel}</button>`
  h+=`<div id="confirmSendStatus" style="text-align:center;font-size:12px;color:var(--g1);min-height:16px;margin-bottom:8px"></div>`
  h+=`<button class="btn-dim" onclick="pop()">← Back</button>`
  h+=`</div>`
  push(h)
  // use the same proven initRptSig that works on report forms
  setTimeout(()=>initRptSig('custsend','custSendSig','custSendSigPh'),500)
}

async function _confirmSendEmail(){
  const d=window._pendingEmail;if(!d)return
  const btn=$('confirmSendBtn');if(btn){btn.innerHTML='<span class="spin"></span> Sending...';btn.style.pointerEvents='none'}
  const st=$('confirmSendStatus')

  // capture customer signature — white bg + dark ink (same as tech sig)
  let custSigData=''
  const custSigCanvas=$('custSendSig')
  if(custSigCanvas&&custSigCanvas.width>0){
    try{
      const w=custSigCanvas.width,h=custSigCanvas.height
      const tmp=document.createElement('canvas');tmp.width=w;tmp.height=h
      const tctx=tmp.getContext('2d');tctx.fillStyle='#ffffff';tctx.fillRect(0,0,w,h);tctx.drawImage(custSigCanvas,0,0)
      custSigData=tmp.toDataURL('image/jpeg',0.7)||''
    }catch(e){console.error('sig capture:',e)}
  }
  if(custSigData&&custSigData.length>100&&d.inv.job_id){
    try{await SB.from('jobs').update({signature_data:custSigData}).eq('id',d.inv.job_id)}catch(e){console.error('save cust sig:',e)}
  }

  // generate portal link
  let portalUrl=''
  try{const pTk=await getOrCreatePortalToken(d.inv.location_id,d.loc.billing_account_id||null);if(pTk)portalUrl='https://stephensadvanced.com/portal?t='+pTk}catch(e){}

  // generate Square payment link
  let payUrl=''
  if(st){st.textContent='Creating payment link...';st.style.color='var(--g1)'}
  try{
    const payRes=await fetch('/api/create-payment-link',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({invoiceNumber:d.invNum,customerName:d.custName,amount:d.total,invoiceId:d.invId,customerEmail:d.to})
    })
    const payData=await payRes.json()
    if(payData.success&&payData.paymentLink)payUrl=payData.paymentLink
  }catch(e){console.error('payment link:',e)}

  // fetch customer-uploaded documents so they can be listed in the email body
  let docsMeta=[]
  try{docsMeta=await loadInvoiceAttachments(d.invId)}catch(e){console.error('load docs:',e)}

  // Already-paid invoices (cash / check / card / card_on_file collected during
  // the kiosk handoff) get a different email — green PAID banner, no Pay Now
  // button, "thanks for your business" message instead of "to pay by check..."
  const isPaid = d.inv.status === 'paid'
  let html=buildInvoiceEmailHtml({
    invNum:d.invNum,custName:d.custName,
    addr:[d.loc.address,d.loc.city,d.loc.state,d.loc.zip].filter(Boolean).join(', '),
    // Format dates in UTC so a YYYY-MM-DD invoice date doesn't shift to the
    // previous day when rendered in CDT (UTC-5). Without timeZone:'UTC' a row
    // dated '2026-04-26 00:00:00+00' formats to "April 25, 2026" locally.
    date:d.inv.date?new Date(d.inv.date).toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric',timeZone:'UTC'}):'',
    dueDate:d.inv.due_date?new Date(d.inv.due_date).toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric',timeZone:'UTC'}):'',
    lines:d.ls,total:d.total,portalUrl,payUrl,
    poNumber:d.inv.po_number||'',
    docs:docsMeta,rpts:d.rpts,
    paid:isPaid,
    paidAt:d.inv.paid_at,
    paymentMethod:d.inv.payment_method,
    paymentNote:d.inv.payment_note
  })

  // append job photos to email if any exist
  const job2=D.jobs.find(j2=>j2.id===d.inv.job_id)
  if(job2?.photos?.length){
    let photoHtml='<div style="margin-top:20px;padding-top:16px;border-top:1px solid #eee"><div style="font-size:12px;font-weight:800;text-transform:uppercase;letter-spacing:1px;color:#999;margin-bottom:12px">Site Photos</div>'
    job2.photos.forEach(p=>{photoHtml+=`<img src="${p}" style="max-width:100%;border-radius:8px;margin-bottom:8px;border:1px solid #eee">`})
    photoHtml+='</div>'
    html=html.replace('<!--PHOTOS_AND_DISCOUNT_INJECT_HERE-->',photoHtml+'<!--PHOTOS_AND_DISCOUNT_INJECT_HERE-->')
  }

  // append prompt-pay discount notice to every invoice email
  const hasDiscountLine=(d.ls||[]).some(l=>(l.description||'').toLowerCase().includes('discount'))
  if(!hasDiscountLine){
    const discountHtml=`<div style="margin-top:16px;padding:14px 18px;background:#fef3c7;border:1px solid #f59e0b;border-radius:8px;text-align:center">
      <div style="font-size:14px;font-weight:800;color:#92400e">💰 10% Prompt Pay Discount</div>
      <div style="font-size:12px;color:#a16207;margin-top:4px">A 10% discount is applied when payment is received within 24 hours of service completion. Use the Pay Now button above.</div>
    </div>`
    html=html.replace('<!--PHOTOS_AND_DISCOUNT_INJECT_HERE-->',discountHtml+'<!--PHOTOS_AND_DISCOUNT_INJECT_HERE-->')
  }

  // build report PDF attachments — convert HTML to real PDFs
  let attachments=[]
  if(st){st.textContent='Generating PDFs...';st.style.color='var(--g1)'}
  for(let ri=0;ri<d.rpts.length;ri++){
    const rpt=d.rpts[ri]
    let rHtml=''
    const rd=rpt.report_data||{}
    if(rpt.report_type==='extinguisher'&&rd.units){rHtml=buildExtReportHtml(rd,d.loc,custSigData)}
    else if(rpt.report_type==='kitchen_suppression'){rHtml=buildKitchenReportFromData(rd,d.loc,d.inv,custSigData)}
    else if(rpt.report_type==='dry_chemical'){rHtml=buildDryChemReportFromData(rd,d.loc,d.inv,custSigData)}
    else if(rpt.report_type==='clean_agent'){rHtml=buildCleanAgentReportFromData(rd,d.loc,d.inv,custSigData)}
    if(!rHtml)continue
    const sysLoc=rpt.report_data?.sysLocation||''
    const rType=rpt.report_type==='extinguisher'?'Extinguisher-Report':rpt.report_type==='clean_agent'?'Clean-Agent-Report':rpt.report_type==='dry_chemical'?'Dry-Chemical-Report':'Suppression-Report'
    const suffix=d.rpts.length>1?'-'+(sysLoc||ri+1):''
    try{
      // render full HTML doc in hidden iframe — force white background
      const iframe=document.createElement('iframe')
      iframe.style.cssText='position:absolute;left:-9999px;top:0;width:580px;height:1056px;border:none;background:#fff'
      document.body.appendChild(iframe)
      const idoc=iframe.contentDocument||iframe.contentWindow.document
      // strip scripts, force white bg and black text on all elements
      let cleanHtml=rHtml.replace(/<script[\s\S]*?<\/script>/gi,'')
      cleanHtml=cleanHtml.replace('</head>','<style>*{color-scheme:light!important}html,body{background:#fff!important;color:#222!important}@media(prefers-color-scheme:dark){html,body{background:#fff!important;color:#222!important}}</style></head>')
      idoc.open();idoc.write(cleanHtml);idoc.close()
      // wait for content + fonts to render
      await new Promise(r=>setTimeout(r,500))
      const pdfBlob=await html2pdf().set({margin:[0.5,0.5,0.5,0.5],filename:'report.pdf',image:{type:'jpeg',quality:0.98},html2canvas:{scale:2,useCORS:true,windowWidth:580,backgroundColor:'#ffffff'},jsPDF:{unit:'in',format:'letter',orientation:'portrait'}}).from(idoc.body).outputPdf('blob')
      document.body.removeChild(iframe)
      // Store PDF permanently — DO NOT modify the PDF generation above this line
      try{await uploadDocument(pdfBlob,'Stephens-Advanced-'+rType+suffix+'.pdf','report_pdf','job',d.inv.job_id,{report_type:rpt.report_type,invoice_id:d.inv.id})}catch(e){console.error('doc upload:',e)}
      const buf=await pdfBlob.arrayBuffer()
      const b64=btoa(new Uint8Array(buf).reduce((s,b)=>s+String.fromCharCode(b),''))
      attachments.push({filename:'Stephens-Advanced-'+rType+suffix+'.pdf',content:b64})
    }catch(e){console.error('PDF gen error:',e)}
  }

  // generate invoice PDF and prepend to attachments
  if(st){st.textContent='Generating invoice PDF...';st.style.color='var(--g1)'}
  try{
    const invPdfHtml=buildInvoicePdfHtml({
      invNum:d.invNum,custName:d.custName,
      addr:[d.loc.address,d.loc.city,d.loc.state,d.loc.zip].filter(Boolean).join(', '),
      date:d.inv.date?new Date(d.inv.date).toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'}):'',
      dueDate:d.inv.due_date?new Date(d.inv.due_date).toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'}):'',
      lines:d.ls,total:d.total,poNumber:d.inv.po_number||''
    })
    // Render in a visible (off-frame, hidden behind app) DIV on the main page,
    // not an iframe. html2canvas reliably captures DOM rendered in the main
    // document; an iframe approach was producing blank canvases. Capture the
    // INNER content div (not the wrap) so the line items + letterhead actually
    // get walked.
    const invStyleMatch=invPdfHtml.match(/<style>([\s\S]*?)<\/style>/)
    const invBodyMatch=invPdfHtml.match(/<body[^>]*>([\s\S]*?)<\/body>/)
    const invWrap=document.createElement('div')
    invWrap.style.cssText='position:fixed;left:0;top:0;width:660px;background:#fff;color:#222;z-index:-9999;visibility:hidden'
    invWrap.innerHTML=(invStyleMatch?'<style>'+invStyleMatch[1]+'</style>':'')+(invBodyMatch?invBodyMatch[1]:invPdfHtml)
    document.body.appendChild(invWrap)
    await new Promise(r=>setTimeout(r,400))
    const invInner=invWrap.querySelector('div')
    const invBlob=await html2pdf().set({margin:[0.4,0.4,0.4,0.4],filename:'invoice.pdf',image:{type:'jpeg',quality:0.98},html2canvas:{scale:2,backgroundColor:'#ffffff'},jsPDF:{unit:'in',format:'letter',orientation:'portrait'}}).from(invInner).outputPdf('blob')
    document.body.removeChild(invWrap)
    const invBuf=await invBlob.arrayBuffer()
    const invB64=btoa(new Uint8Array(invBuf).reduce((s,b)=>s+String.fromCharCode(b),''))
    attachments.unshift({filename:'Stephens-Advanced-Invoice-'+d.invNum+'.pdf',content:invB64})
  }catch(e){console.error('Invoice PDF gen error:',e)}

  // attach customer-uploaded documents (vendor POs, work orders, photos)
  if(docsMeta.length&&st){st.textContent='Attaching '+docsMeta.length+' document'+(docsMeta.length>1?'s':'')+'...';st.style.color='var(--g1)'}
  for(const a of docsMeta){
    try{
      const{data:blob,error:dlErr}=await SB.storage.from(INV_ATTACH_BUCKET).download(a.file_path)
      if(dlErr||!blob){console.error('doc download:',dlErr);continue}
      const buf=await blob.arrayBuffer()
      const b64=btoa(new Uint8Array(buf).reduce((s,b)=>s+String.fromCharCode(b),''))
      // sanitize filename for email attachment
      const safeName=(a.file_name||'attachment').replace(/[^\w.\-]+/g,'_')
      attachments.push({filename:safeName,content:b64})
    }catch(e){console.error('doc attach:',e)}
  }

  // HARD CONFIRM — show exactly who gets this email
  if(!confirm('SEND EMAIL TO:\n\n'+d.to+'\n\nInvoice '+d.invNum+' for '+d.custName+'\n\nAre you sure?')){
    if(st)st.textContent='Cancelled';if(btn){btn.innerHTML='✉️ Send Email';btn.style.pointerEvents=''}
    return
  }

  if(st){st.textContent='Sending to '+d.to+'...';st.style.color='var(--g1)'}

  try{
    const res=await fetch('/api/send-email',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({to:d.to,subject:`${isPaid?'PAID — ':''}Invoice ${d.invNum} — Stephens Advanced LLC`,html,invoiceNumber:d.invNum,customerName:d.custName,attachments})
    })
    const data=await res.json()
    if(data.success){
      // Don't downgrade settled invoices (paid/void/record/factored) to "sent" when resending a copy.
      // The email body already renders correctly via isPaid; the DB just needs to keep the original status.
      const settledStatuses=['paid','void','record','factored']
      const updPayload=settledStatuses.includes(d.inv?.status)?{sent_at:new Date().toISOString()}:{status:'sent',sent_at:new Date().toISOString()}
      await SB.from('invoices').update(updPayload).eq('id',d.invId)
      audit('sent','invoice',d.invId,'jon',{to:d.to},'Invoice '+d.invNum+' sent to '+d.to)
      await load()
      // Bug #6 fix: refresh the status badge on any invoice detail overlay
      // currently in the stack so it no longer shows stale "DRAFT" text.
      try{
        OVS.forEach(slotId=>{
          const el=document.getElementById(slotId)
          if(!el||el.dataset.invId!==d.invId)return
          el.querySelectorAll('.badge').forEach(b=>{
            if(b.classList.contains('bdraft')){
              b.classList.remove('bdraft');b.classList.add('bsent');b.textContent='sent'
            }
          })
        })
      }catch(e){console.error('badge refresh:',e)}
      if(st){st.innerHTML='✓ Sent to '+esc(d.to);st.style.color='var(--ok)'}
      if(btn){
        btn.innerHTML='✓ Sent';btn.style.background='var(--ok)';btn.style.pointerEvents='none'
        // Bug #7 fix: clear next-step buttons after sending
        const btnRow=document.createElement('div')
        btnRow.style.cssText='display:flex;flex-direction:column;gap:8px;margin-top:12px'
        // Primary: return to the (now fresh) invoice detail
        const backBtn=document.createElement('button')
        backBtn.style.cssText='width:100%;padding:16px;border-radius:var(--r);background:var(--info);color:#fff;font-size:15px;font-weight:800;border:none;cursor:pointer;min-height:54px'
        backBtn.textContent='← Back to Invoice'
        backBtn.onclick=()=>pop()
        btnRow.appendChild(backBtn)
        // Secondary: close out the job entirely and return to calendar
        if(d.inv.job_id){
          const doneBtn=document.createElement('button')
          doneBtn.style.cssText='width:100%;padding:14px;border-radius:var(--r);background:var(--ok);color:#fff;font-size:14px;font-weight:800;border:none;cursor:pointer;min-height:48px'
          doneBtn.textContent='✓ Close Job & Return to Calendar'
          doneBtn.onclick=async()=>{
            doneBtn.textContent='Closing...';doneBtn.disabled=true
            await SB.from('jobs').update({status:'completed',completed_at:new Date().toISOString()}).eq('id',d.inv.job_id)
            try{await SB.from('calendar_events').update({color:'#9ca3af'}).eq('job_id',d.inv.job_id)}catch(e){}
            audit('completed','job',d.inv.job_id,'jon',{status:'completed'},'Job completed after invoice sent')
            await load()
            toast('Job closed out ✓')
            popAll()
            rCal()
          }
          btnRow.appendChild(doneBtn)
        }
        btn.parentElement.appendChild(btnRow)
      }
      toast('Invoice emailed with '+attachments.length+' attachment'+(attachments.length!==1?'s':''))
    }else{throw new Error(data.error||'Send failed')}
  }catch(err){
    if(st){st.textContent='Error: '+err.message;st.style.color='var(--bad)'}
    if(btn){btn.innerHTML='✉️ Retry Send';btn.style.pointerEvents=''}
    toast('Send failed',false)
  }
}

async function startCustomerKiosk(invId){
  const{data:invFresh}=await SB.from('invoices').select('*').eq('id',invId).single()
  const inv=invFresh||D.invs.find(x=>x.id===invId)||{}
  if(!inv.id){toast('Invoice not found',false);return}
  const{data:lines}=await SB.from('invoice_lines').select('*').eq('invoice_id',invId).is('deleted_at',null).order('sort_order')
  const ls=lines||[]
  const total=ls.reduce((s,l)=>s+(+l.total||0),0)||+inv.total||0
  const loc=D.locs.find(x=>x.id===inv.location_id)||{}
  let ba=null
  if(loc.billing_account_id){
    ba=(D.bas||[]).find(b=>b.id===loc.billing_account_id)
    if(!ba){const{data:baRow}=await SB.from('billing_accounts').select('*').eq('id',loc.billing_account_id).maybeSingle();ba=baRow||null}
  }
  let rpts=[]
  if(inv.job_id){
    const{data:r}=await SB.from('reports').select('id,report_type,report_data,created_at').eq('job_id',inv.job_id).order('created_at')
    rpts=r||[]
  }
  const atts=await loadInvoiceAttachments(invId)
  window._kiosk={invId,inv,ls,total,loc,ba,rpts,atts,custName:loc.name||ba?.name||'',invNum:inv.invoice_number||'',sigData:'',step:1}
  kioskRenderStep1()
}

function _kioskShell(title,body,step,totalSteps){
  const dots=Array.from({length:totalSteps},(_,i)=>`<div style="width:8px;height:8px;border-radius:50%;background:${i<step?'var(--fire)':'rgba(255,255,255,.15)'}"></div>`).join('')
  return`<div class="ov-hdr" style="background:linear-gradient(135deg,var(--c2),var(--c1));border-bottom:1px solid var(--b1)">
    <button class="ov-back" onclick="if(confirm('Exit customer hand-off?'))pop()">✕</button>
    <div class="ov-title" style="flex:1;text-align:center">${esc(title)}</div>
    <div style="display:flex;gap:5px;padding-right:8px">${dots}</div>
  </div>
  <div class="ov-body" style="padding:20px 18px 24px">${body}</div>`
}

function kioskGotoStep4(){
  const d=window._kiosk;if(!d)return
  const cv=$('kioskSig')
  if(cv&&cv.width>0){
    try{
      const w=cv.width,h=cv.height
      const tmp=document.createElement('canvas');tmp.width=w;tmp.height=h
      const tctx=tmp.getContext('2d');tctx.fillStyle='#ffffff';tctx.fillRect(0,0,w,h);tctx.drawImage(cv,0,0)
      d.sigData=tmp.toDataURL('image/jpeg',0.7)||''

  }
  if(!d.sigData||d.sigData.length<200){toast('Please sign to continue',false);return}

  const brand=esc(d.ba?.card_brand||'Card')

async function kioskSaveSignatureToJob(){
  const d=window._kiosk;if(!d||!d.sigData||!d.inv.job_id)return
  try{await SB.from('jobs').update({signature_data:d.sigData}).eq('id',d.inv.job_id)}catch(e){console.error('kiosk sig save:',e)}
}

async function kioskPayCardOnFile(){
  const d=window._kiosk;if(!d)return
  await kioskSaveSignatureToJob()
  kioskShowLoading('Charging card…')
  try{
    const res=await fetch('/api/square',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({action:'charge_card',customerId:d.ba.square_customer_id,cardId:d.ba.square_card_id,amount:d.total,invoiceId:d.invId,invoiceNumber:d.invNum})
    })
    const j=await res.json()
    if(!j.success)throw new Error(j.error||'Charge failed')
    await SB.from('invoices').update({status:'paid',payment_method:'card',paid_at:new Date().toISOString(),payment_note:'Card on file — charged at kiosk'}).eq('id',d.invId)
    audit('paid','invoice',d.invId,'jon',{method:'card_on_file'},'Paid at kiosk via card on file')
    await kioskEmailInvoice(true)
    kioskShowThankYou('paid','Paid with '+(d.ba.card_brand||'card')+' ····'+(d.ba.card_last4||''))
  }catch(e){
    console.error('kiosk charge:',e)
    kioskShowError('Charge failed: '+e.message,()=>kioskGotoStep4())
  }
}

async function kioskPayNewCard(){
  const d=window._kiosk;if(!d)return
  await kioskSaveSignatureToJob()
  kioskShowLoading('Building secure payment link…')
  try{
    let customerId=d.ba?.square_customer_id||null
    if(!customerId){
      const cr=await fetch('/api/square',{method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({action:'create_or_find',name:d.custName,email:d.loc.contact_email||d.ba?.email||'',phone:d.loc.contact_phone||d.ba?.phone||'',locationId:d.loc.id})
      })
      const cj=await cr.json();if(cj.success)customerId=cj.customerId
    }
    const res=await fetch('/api/square',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({action:'checkout_and_save_card',customerId,amount:d.total,invoiceNumber:d.invNum,customerName:d.custName,invoiceId:d.invId,email:d.loc.contact_email||d.ba?.email||''})
    })
    const j=await res.json()
    if(!j.success||!j.paymentLink)throw new Error(j.error||'Could not build link')
    window.open(j.paymentLink,'_blank')
    await kioskEmailInvoice(false)
    kioskShowThankYou('link','Payment link opened — finish up in the browser tab, we also emailed it for your records.')
  }catch(e){
    console.error('kiosk new card:',e)
    kioskShowError('Could not create payment link: '+e.message,()=>kioskGotoStep4())
  }
}

async function kioskPayOffline(method){
  const d=window._kiosk;if(!d)return
  await kioskSaveSignatureToJob()
  let note='',status=null
  if(method==='check'){
    const num=prompt('Check number (optional):')||''
    status='paid';note='Check'+(num?' #'+num.trim():'')+' — collected at kiosk'
  }else if(method==='cash'){
    if(!confirm('Mark paid in full — cash?'))return
    status='paid';note='Cash — collected at kiosk'
  }else{
    note='Customer chose pay-later at kiosk'
  }
  kioskShowLoading('Saving…')
  try{
    const upd=status?{status:'paid',payment_method:method,paid_at:new Date().toISOString(),payment_note:note}:{payment_note:note}
    await SB.from('invoices').update(upd).eq('id',d.invId)
    audit(status?'paid':'updated','invoice',d.invId,'jon',{method},note)
    await kioskEmailInvoice(status==='paid')
    const msg=method==='check'?'Marked paid — '+note:method==='cash'?'Marked paid — cash':'Invoice emailed — payment due by due date'
    kioskShowThankYou(status||'pending',msg)
  }catch(e){
    console.error('kiosk offline:',e)
    kioskShowError('Save failed: '+e.message,()=>kioskGotoStep4())
  }
}

// _buildEmailContext — assemble a kiosk-shaped 'd' object from an invoice id.
// Used by paths that need to send an invoice email autonomously but don't
// have window._kiosk set up (billContractedFromJob, etc).
async function _buildEmailContext(invId){
  let inv=D.invs.find(i=>i.id===invId)
  if(!inv){
    const{data:freshInv}=await SB.from('invoices').select('*').eq('id',invId).maybeSingle()
    inv=freshInv
  }
  if(!inv)return null
  const loc=D.locs.find(l=>l.id===inv.location_id)||{}
  const ba=loc.billing_account_id?D.bas.find(b=>b.id===loc.billing_account_id):null
  const{data:lines}=await SB.from('invoice_lines').select('*').eq('invoice_id',invId).is('deleted_at',null).order('sort_order')
  const ls=(lines||[]).map(l=>({description:l.description,quantity:+(l.quantity||1),unit_price:+(l.unit_price||0),total:+(l.total||0)}))
  let rpts=[]
  if(inv.job_id){
    const{data:r}=await SB.from('reports').select('id,report_type,report_data,created_at,job_id').eq('job_id',inv.job_id).order('created_at')
    rpts=r||[]
  }
  let atts=[]
  try{ atts=await loadInvoiceAttachments(invId) }catch(e){}
  return{
    invId,
    invNum:inv.invoice_number,
    custName:loc.name||ba?.name||'Customer',
    total:+inv.total||0,
    loc,ba,inv,ls,rpts,atts
  }
}

async function kioskEmailInvoice(paid,invIdOverride){
  // Two ways in:
  //   - autonomous (preferred when caller has invId): pass invIdOverride
  //     and we build the d shape from the invoice + location chain via
  //     _buildEmailContext. Used by billContractedFromJob, _kioskFinalize.
  //   - legacy customer-handoff flow (startCustomerKiosk): use window._kiosk
  //     populated up front. NOTE: openKiosk uses kioskState, not window._kiosk
  //     — only startCustomerKiosk sets window._kiosk. Pass invIdOverride
  //     from openKiosk-side callers.
  // Returns {sent:true} on success, or {sent:false, reason:'...'} on
  // any silent-fail path so autonomous callers can detect lying-toast.
  let d
  if(invIdOverride){
    d=await _buildEmailContext(invIdOverride)
    if(!d) return {sent:false, reason:'invoice context not found'}
  }else{
    d=window._kiosk
    if(!d) return {sent:false, reason:'no window._kiosk context'}
  }
  const to=d.loc.contact_email||d.ba?.email||''
  if(!to) return {sent:false, reason:'no email on file'}
  // Re-fetch d.inv so paid_at, payment_method, payment_note reflect any
  // writes that happened in the kiosk flow (card-on-file charge, offline
  // pay). Without this, the email body's PAID banner shows stale values.
  try{
    const{data:freshInv}=await SB.from('invoices').select('*').eq('id',d.invId).maybeSingle()
    if(freshInv)d.inv=freshInv
  }catch(e){console.warn('[kioskEmailInvoice] re-fetch failed:',e.message)}
  try{
    let portalUrl='',payUrl=''
    try{const pTk=await getOrCreatePortalToken(d.loc.id,d.loc.billing_account_id||null);if(pTk)portalUrl='https://stephensadvanced.com/portal?t='+pTk}catch(e){}
    if(!paid){
      try{
        const payRes=await fetch('/api/create-payment-link',{method:'POST',headers:{'Content-Type':'application/json'},
          body:JSON.stringify({invoiceNumber:d.invNum,customerName:d.custName,amount:d.total,invoiceId:d.invId,customerEmail:to})})
        const pj=await payRes.json();if(pj.success&&pj.paymentLink)payUrl=pj.paymentLink
      }catch(e){}
    }
    let html=buildInvoiceEmailHtml({
      invNum:d.invNum,custName:d.custName,
      addr:[d.loc.address,d.loc.city,d.loc.state,d.loc.zip].filter(Boolean).join(', '),
      // Format dates as UTC so a YYYY-MM-DD value doesn't slide back a day in CDT
      date:d.inv.date?new Date(d.inv.date).toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric',timeZone:'UTC'}):'',
      dueDate:d.inv.due_date?new Date(d.inv.due_date).toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric',timeZone:'UTC'}):'',
      lines:d.ls,total:d.total,portalUrl,payUrl:paid?'':payUrl,
      poNumber:d.inv.po_number||'',docs:d.atts,rpts:d.rpts,
      // Pass paid-status fields so the email body shows the green PAID banner
      // and skips the orange "Pay Now" CTA when the kiosk just collected payment.
      // Without these, customer just paid in person but their email body still
      // says "Pay Now" → they may double-pay online.
      paid,
      paidAt:d.inv.paid_at,
      paymentMethod:d.inv.payment_method,
      paymentNote:d.inv.payment_note
    })
    // Inject site photos (if any) into the email body — this used to only
    // happen in the _confirmSendEmail preview-send path; the kiosk-side path
    // skipped it. Now both paths see the same body shape.
    try{
      const job2=d.inv.job_id?D.jobs.find(j2=>j2.id===d.inv.job_id):null
      if(job2?.photos?.length){
        let photoHtml='<div style="margin-top:20px;padding-top:16px;border-top:1px solid #eee"><div style="font-size:12px;font-weight:800;text-transform:uppercase;letter-spacing:1px;color:#999;margin-bottom:12px">Site Photos</div>'
        job2.photos.forEach(p=>{photoHtml+=`<img src="${p}" style="max-width:100%;border-radius:8px;margin-bottom:8px;border:1px solid #eee">`})
        photoHtml+='</div>'
        html=html.replace('<!--PHOTOS_AND_DISCOUNT_INJECT_HERE-->',photoHtml+'<!--PHOTOS_AND_DISCOUNT_INJECT_HERE-->')
      }
    }catch(photoErr){console.warn('[kioskEmailInvoice] photo inject failed:',photoErr.message)}
    // Inject 10% prompt-pay discount banner for unpaid invoices ONLY (paid
    // invoices don't need the incentive). Uses the same marker as photos.
    try{
      if(!paid){
        const hasDiscountLine=(d.ls||[]).some(l=>(l.description||'').toLowerCase().includes('discount'))
        if(!hasDiscountLine){
          const discountHtml=`<div style="margin-top:16px;padding:14px 18px;background:#fef3c7;border:1px solid #f59e0b;border-radius:8px;text-align:center">
            <div style="font-size:14px;font-weight:800;color:#92400e">💰 10% Prompt Pay Discount</div>
            <div style="font-size:12px;color:#a16207;margin-top:4px">A 10% discount is applied when payment is received within 24 hours of service completion. Use the Pay Now button above.</div>
          </div>`
          html=html.replace('<!--PHOTOS_AND_DISCOUNT_INJECT_HERE-->',discountHtml+'<!--PHOTOS_AND_DISCOUNT_INJECT_HERE-->')
        }
      }
    }catch(discountErr){console.warn('[kioskEmailInvoice] discount inject failed:',discountErr.message)}
    // Build the invoice PDF — prefer Mazon-stamped version if present, otherwise
    // generate fresh from the same buildInvoicePdfHtml the Money-tab flow uses.
    const attachments=[]
    try{
      const {data:invRow}=await SB.from('invoices').select('mazon_stamped_pdf_url').eq('id',d.invId).maybeSingle()
      const stampedUrl=invRow?.mazon_stamped_pdf_url
      if(stampedUrl){
        const r=await fetch(stampedUrl)
        if(r.ok){
          const buf=await r.arrayBuffer()
          const b64=btoa(new Uint8Array(buf).reduce((s,b)=>s+String.fromCharCode(b),''))
          attachments.push({filename:'Stephens-Advanced-Invoice-'+d.invNum+'-Mazon.pdf',content:b64})
        }
      }
      if(!attachments.length){
        const invPdfHtml=buildInvoicePdfHtml({
          invNum:d.invNum,custName:d.custName,
          addr:[d.loc.address,d.loc.city,d.loc.state,d.loc.zip].filter(Boolean).join(', '),
          // UTC formatting so a YYYY-MM-DD date doesn't slide back a day in CDT
          date:d.inv.date?new Date(d.inv.date).toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric',timeZone:'UTC'}):'',
          dueDate:d.inv.due_date?new Date(d.inv.due_date).toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric',timeZone:'UTC'}):'',
          lines:d.ls,total:d.total,poNumber:d.inv.po_number||''
        })
        // Same DOM-render pattern as the Money-tab path (iframe approach
        // captures blank canvas; visible DIV + from(inner) actually works).
        const invStyleMatch=invPdfHtml.match(/<style>([\s\S]*?)<\/style>/)
        const invBodyMatch=invPdfHtml.match(/<body[^>]*>([\s\S]*?)<\/body>/)
        const invWrap=document.createElement('div')
        invWrap.style.cssText='position:fixed;left:0;top:0;width:660px;background:#fff;color:#222;z-index:-9999;visibility:hidden'
        invWrap.innerHTML=(invStyleMatch?'<style>'+invStyleMatch[1]+'</style>':'')+(invBodyMatch?invBodyMatch[1]:invPdfHtml)
        document.body.appendChild(invWrap)
        await new Promise(r=>setTimeout(r,400))
        const invInner=invWrap.querySelector('div')
        const invBlob=await html2pdf().set({margin:[0.4,0.4,0.4,0.4],filename:'invoice.pdf',image:{type:'jpeg',quality:0.98},html2canvas:{scale:2,backgroundColor:'#ffffff'},jsPDF:{unit:'in',format:'letter',orientation:'portrait'}}).from(invInner).outputPdf('blob')
        document.body.removeChild(invWrap)
        const invBuf=await invBlob.arrayBuffer()
        const invB64=btoa(new Uint8Array(invBuf).reduce((s,b)=>s+String.fromCharCode(b),''))
        attachments.push({filename:'Stephens-Advanced-Invoice-'+d.invNum+'.pdf',content:invB64})
      }
    }catch(e){console.error('kiosk PDF gen:',e)}
    const sendRes=await fetch('/api/send-email',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({to,subject:`${paid?'Receipt':'Invoice'} ${d.invNum} — Stephens Advanced LLC`,html,invoiceNumber:d.invNum,customerName:d.custName,attachments})
    })
    if(!sendRes.ok){
      const txt=await sendRes.text().catch(()=>'')
      console.error('kiosk email send failed:',sendRes.status,txt)
      return {sent:false, reason:'email API '+sendRes.status}
    }
    return {sent:true, to}
  }catch(e){
    console.error('kiosk email:',e)
    return {sent:false, reason:e.message||'send failed'}
  }
}

async function kioskFinish(){
  const d=window._kiosk;if(!d){pop();return}
  // close job if paid and job exists
  try{
    const{data:fresh}=await SB.from('invoices').select('status').eq('id',d.invId).maybeSingle()
    if(fresh?.status==='paid'&&d.inv.job_id){
      await SB.from('jobs').update({status:'completed',completed_at:new Date().toISOString()}).eq('id',d.inv.job_id)
      try{await SB.from('calendar_events').update({color:'#9ca3af'}).eq('job_id',d.inv.job_id)}catch(e){}
    }
  }catch(e){console.error('kiosk finish:',e)}
  await load()
  window._kiosk=null
  pop()
}

async function getOrCreatePortalToken(locId,baId){
  // check for existing token
  const col=baId?'billing_account_id':'location_id'
  const val=baId||locId
  if(!val)return null
  const{data:existing}=await SB.from('portal_tokens').select('token').eq(col,val).eq('is_active',true).limit(1)
  if(existing?.[0])return existing[0].token
  // generate new token
  const arr=new Uint8Array(16);crypto.getRandomValues(arr)
  const token=Array.from(arr,b=>b.toString(16).padStart(2,'0')).join('')
  await SB.from('portal_tokens').insert({token,location_id:locId||null,billing_account_id:baId||null})
  return token
}

// ═══ CONTRACTS ═══
async function createAndSendContract(locId){
  const l=D.locs.find(x=>x.id===locId);if(!l)return
  const ba=l.billing_account_id?D.bas.find(b=>b.id===l.billing_account_id):null
  const email=l.contact_email||(ba?ba.email:null)
  if(!email){alert('No email on file for this location. Add a contact email first.');return}
  try{
    const{data:c,error}=await SB.from('contracts').insert({
      location_id:locId,
      billing_account_id:l.billing_account_id||null,
      type:'recurring',
      frequency:'semi-annual',
      services_included:['suppression','extinguishers'],
      status:'draft',
      language:l.preferred_language||'en'
    }).select().single()
    if(error)throw error
    D.contracts=(D.contracts||[]);D.contracts.push(c)
    await sendContractEmail(c.id)
  }catch(e){console.error('createAndSendContract:',e);alert('Error: '+e.message)}
}

// ═══ SEND FOR SIGNATURE — for jobs completed without an on-site signer ═══
async function sendSignatureRequest(jobId){
  const j=D.jobs.find(x=>x.id===jobId);if(!j){toast('Job not found',false);return}
  const l=D.locs.find(x=>x.id===j.location_id)||{}
  const ba=l.billing_account_id?D.bas.find(b=>b.id===l.billing_account_id):null
  const email=l.contact_email||ba?.email||''
  const phone=l.contact_phone||ba?.phone||''
  if(!email&&!phone){toast('No customer email or phone on file. Add one to the location first.',false);return}
  const channels=[]
  if(email)channels.push('email ('+email+')')
  if(phone)channels.push('text ('+phone+')')
  if(!confirm(`Send signing link to ${l.name||'this customer'}?\n\nDelivering via: ${channels.join(' + ')}\n\nThe link is unique to this job and expires in 14 days.`))return
  const btn=event?.target?.closest('button')
  if(btn){btn.disabled=true;btn.innerHTML='<span class="spin"></span> Sending...'}
  try{
    const res=await fetch('/api/send-signature-request',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({job_id:jobId})
    })
    const data=await res.json()
    if(!res.ok)throw new Error(data.error||'Send failed')
    audit('signature_request_sent','job',jobId,'jon',{email,phone},'Signing link sent to '+(email||phone))
    const sentVia=[]
    if(data.email?.sent)sentVia.push('email')
    if(data.sms?.sent)sentVia.push('text')
    toast('Signing link sent via '+sentVia.join(' + ')+' ✓')
    pop();openJob(jobId)
  }catch(e){
    console.error('sendSignatureRequest:',e)
    toast('Error: '+e.message,false)
    if(btn){btn.disabled=false;btn.innerHTML='📲 Send for signature'}
  }
}

async function sendContractEmail(contractId){
  try{
    const res=await fetch('/api/send-contract',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({contractId})})
    const data=await res.json()
    if(!res.ok)throw new Error(data.error||'Send failed')
    const idx=(D.contracts||[]).findIndex(c=>c.id===contractId)
    if(idx>=0){D.contracts[idx].status='sent';D.contracts[idx].sent_at=new Date().toISOString()}
    alert('Contract sent!')
    pop();
  }catch(e){console.error('sendContractEmail:',e);alert('Error sending contract: '+e.message)}
}

async function resendContractEmail(contractId){
  if(!confirm('Resend contract email?'))return
  await sendContractEmail(contractId)
}

function openSchedJob(preLocIdOrOpts,preScope){
  // Accept either the legacy (preLocId, preScope) signature or an opts
  // object: openSchedJob({asQuote:true, preLocId, preScope}).
  let opts = {}
  if (preLocIdOrOpts && typeof preLocIdOrOpts === 'object') {
    opts = preLocIdOrOpts
  } else {
    opts = { preLocId: preLocIdOrOpts, preScope: preScope }
  }
  window._asQuote = !!opts.asQuote
  if(opts.preLocId){
    const pl=D.locs.find(x=>x.id===opts.preLocId)
    if(pl)nSt={loc:{id:pl.id,name:pl.name,address:pl.address||'',city:pl.city||'',ba:pl.billing_account_id||''},mk:false}
    window._preScope=opts.preScope||null
  }else{window._preScope=opts.preScope||null}
  rNewJob()
}

  const dd=$('nDd');if(!dd)return;if(q.length<1){dd.classList.remove('vis');return}

  const f=D.locs.filter(l=>(l.name||'').toLowerCase().includes(ql)||(l.city||'').toLowerCase().includes(ql)||(l.address||'').toLowerCase().includes(ql)||(l.contact_name||'').toLowerCase().includes(ql))
  const canMk=q.length>=2&&!f.some(l=>(l.name||'').toLowerCase()===q.toLowerCase())
  let h=''
  f.forEach(l=>{
    window._nSrchLocs=window._nSrchLocs||{}

    h+=`<div class="ac-it" onclick="selectSchedLoc('${l.id}')"><div class="ac-n">${esc(l.name)}</div><div class="ac-d">${esc([l.address,l.city].filter(Boolean).join(', '))}</div></div>`

async function saveJob(){
  const isQuote=!!window._asQuote
  const ctaLabel=isQuote?'Build Quote':'Create Job'
  setLoad('saveJobBtn',true)
  let lid=nSt.loc?.id,ba=nSt.loc?.ba||null
  if(nSt.mk){
    const nm=$('nn')?.value?.trim();if(!nm){toast('Enter business name',false);setLoad('saveJobBtn',false,ctaLabel);return}
    const city=$('nc2')?.value?.trim()||''
    const{data,error}=await SB.from('locations').insert({name:nm,address:$('na')?.value?.trim()||null,city:city||null,state:$('ns2')?.value?.trim()||'TX',zip:$('nz2')?.value?.trim()||null,contact_name:$('nco2')?.value?.trim()||null,contact_phone:$('np2')?.value?.trim()||null,is_brycer_jurisdiction:_isBrycerCity(city),brycer_ahj_name:_isBrycerCity(city)?(city||'').trim()+' Fire Department':null}).select().single()
    if(error){toast('Error creating customer',false);setLoad('saveJobBtn',false,ctaLabel);return}
    lid=data.id
  }
  if(!lid){toast('Select a customer',false);setLoad('saveJobBtn',false,ctaLabel);return}
  const ty=document.querySelector('#nTy button.on')?.dataset.k||'inspection'
  const sc=Array.from(document.querySelectorAll('#nSc button.gn')).map(b=>b.dataset.k)
  // capture form values BEFORE popAll destroys the DOM
  // Quote: date+time are optional. Real job: keep the existing default.
  const jobDateRaw=$('ndt')?.value||''
  const jobTimeRaw=$('ntm')?.value||''
  const jobDate=isQuote?(jobDateRaw||null):(jobDateRaw||new Date(Date.now()+86400000).toISOString().split('T')[0])
  const jobTime=isQuote?(jobTimeRaw||null):(jobTimeRaw||'09:00')
  const validUntil=isQuote?($('nqval')?.value||null):null
  const jobNoteTxt=$('nnt')?.value?.trim()||''
  const assignTo=$('nAssign')?.value||null
  // double-booking check — only when actually scheduling (skip for quotes)
  if(!isQuote && jobDate && jobTime){
    const conflicts=D.jobs.filter(j2=>j2.scheduled_date===jobDate&&j2.scheduled_time===jobTime&&j2.status==='scheduled')
    if(conflicts.length){
      const cNames=conflicts.map(j2=>{const cl=D.locs?.find(x=>x.id===j2.location_id);return cl?.name||'Unknown'}).join(', ')
      if(!confirm(`Warning: ${conflicts.length} job${conflicts.length>1?'s':''} already scheduled at ${jobTime} on ${jobDate} (${cNames}). Schedule anyway?`)){
        setLoad('saveJobBtn',false,ctaLabel);return
      }
    }
  }
  // auto-detect scope from location equipment if not manually set
  let finalScope=sc
  if(!finalScope.length){
    const loc2=D.locs.find(x=>x.id===lid)||{}
    finalScope=[]
    if(loc2.suppression_systems?.length)finalScope.push('suppression')
    if(loc2.extinguishers?.length)finalScope.push('extinguishers')
    if(loc2.emergency_lights?.[0]?.fixture_count)finalScope.push('elights')
    if(!finalScope.length)finalScope=['extinguishers','suppression']
  }
  const insertRow={
    location_id:lid, billing_account_id:ba, type:ty, scope:finalScope,
    scheduled_date:jobDate, scheduled_time:jobTime,
    status: isQuote ? 'quote' : 'scheduled',
    notes:jobNoteTxt||null, assigned_to:assignTo||null,
    quote_valid_until: validUntil
  }
  const{data:newJob,error}=await SB.from('jobs').insert(insertRow).select().single()
  if(error){toast('Error creating '+(isQuote?'quote':'job'),false);setLoad('saveJobBtn',false,ctaLabel);return}
  // calendar sync — only for actual scheduled jobs, not quotes
  if(!isQuote && newJob?.id && jobDate && jobTime){
    try{await syncJobToCalendar(newJob.id,lid,jobDate,jobTime)}catch(e){console.error('cal sync:',e)}
  }
  if(newJob?.id)audit('created',isQuote?'quote':'job',newJob.id,'jon',{scheduled_date:jobDate,scheduled_time:jobTime,scope:finalScope,quote:isQuote},(isQuote?'Quote built for ':'Job created for ')+(D.locs.find(x=>x.id===lid)?.name||'?'))
  await load();toast(isQuote?'Quote built ✓ — open it to send for signature':'Job created ✓')
  nSt={loc:null,mk:false};window._preCalDate=null;window._preCalTime=null;window._asQuote=false
  popAll()
  rCal()
  if(newJob?.id)setTimeout(()=>openJob(newJob.id),100)
}

function addToCalendar({title,date,time,addr,notes}){
  const fmtDT=(d,t)=>(d+'T'+t+':00').replace(/-|:/g,'')
  const endHr=(parseInt((time||'09').split(':')[0])+2).toString().padStart(2,'0')
  const endTime=endHr+':'+(time||'09:00').split(':')[1]
  const ics=[
    'BEGIN:VCALENDAR',
    'VERSION:2.0',
    'PRODID:-//Stephens Advanced//App//EN',
    'BEGIN:VEVENT',
    'DTSTART:'+fmtDT(date,time),
    'DTEND:'+fmtDT(date,endTime),
    'SUMMARY:'+title,
    addr?'LOCATION:'+addr:'',
    notes?'DESCRIPTION:'+notes.replace(/\n/g,'\\n'):'',
    'END:VEVENT',
    'END:VCALENDAR'
  ].filter(Boolean).join('\r\n')
  const blob=new Blob([ics],{type:'text/calendar;charset=utf-8'})
  const url=URL.createObjectURL(blob)
  const a=document.createElement('a');a.href=url;a.download='stephens-job.ics';a.click()
  setTimeout(()=>URL.revokeObjectURL(url),5000)
}

// ═══ INVOICE DOCUMENT ATTACHMENTS ═══
// Upload path convention: invoice-attachments/{invoice_id}/{uuid}.{ext}
// Max 2048px on longest edge for images, JPEG 80% quality before upload.
// PDFs uploaded as-is. HEIC converted to JPEG by the canvas step (mobile Safari decodes HEIC natively when drawn).

const INV_ATTACH_BUCKET='invoice-attachments'
const INV_ATTACH_MAX_BYTES=10*1024*1024 // 10 MB
const INV_ATTACH_LABELS=[
  {v:'work_order',l:'Work Order'},
  {v:'po',l:'Purchase Order'},
  {v:'compliance',l:'Compliance'},
  {v:'photo',l:'Photo'},
  {v:'other',l:'Other'}
]

function _attachUuid(){
  const arr=new Uint8Array(16);crypto.getRandomValues(arr)
  return Array.from(arr,b=>b.toString(16).padStart(2,'0')).join('')
}

function _attachExt(type,name){
  if(type==='application/pdf')return 'pdf'
  if(type==='image/png')return 'png'
  if(type==='image/heic')return 'jpg' // converted
  if(name){const m=name.match(/\.([a-z0-9]+)$/i);if(m)return m[1].toLowerCase()}
  return 'jpg'
}

// compress an image File to JPEG blob, max 2048px longest edge, quality 0.8
async function _compressImage(file){
  return new Promise((resolve,reject)=>{
    const reader=new FileReader()
    reader.onload=e=>{
      const img=new Image()
      img.onload=()=>{
        const max=2048
        let w=img.width,h=img.height
        if(w>max||h>max){
          if(w>h){h=Math.round(h*(max/w));w=max}
          else{w=Math.round(w*(max/h));h=max}
        }
        const canvas=document.createElement('canvas')
        canvas.width=w;canvas.height=h
        canvas.getContext('2d').drawImage(img,0,0,w,h)
        canvas.toBlob(b=>b?resolve(b):reject(new Error('compress failed')),'image/jpeg',0.8)
      }
      img.onerror=()=>reject(new Error('image load failed'))
      img.src=e.target.result
    }
    reader.onerror=()=>reject(new Error('file read failed'))
    reader.readAsDataURL(file)
  })
}

async function uploadInvoiceAttachment(invoiceId,file,label){
  if(!invoiceId||!file)return{error:'Missing invoice or file'}
  const isImg=(file.type||'').startsWith('image/')
  const isPdf=file.type==='application/pdf'
  if(!isImg&&!isPdf)return{error:'Unsupported file type'}
  let uploadBlob=file
  let uploadType=file.type||(isPdf?'application/pdf':'image/jpeg')
  if(isImg){
    try{uploadBlob=await _compressImage(file);uploadType='image/jpeg'}
    catch(e){console.error('compress:',e);uploadBlob=file}
  }
  if(uploadBlob.size>INV_ATTACH_MAX_BYTES)return{error:'File exceeds 10MB'}
  const ext=_attachExt(uploadType,file.name||'')
  const path=`${invoiceId}/${_attachUuid()}.${ext}`
  const{error:upErr}=await SB.storage.from(INV_ATTACH_BUCKET).upload(path,uploadBlob,{contentType:uploadType,upsert:false})
  if(upErr){console.error('storage upload:',upErr);return{error:upErr.message||'Upload failed'}}
  const{data:row,error:dbErr}=await SB.from('invoice_attachments').insert({
    invoice_id:invoiceId,
    file_name:file.name||`attachment.${ext}`,
    file_path:path,
    file_type:uploadType,
    file_size:uploadBlob.size,
    label:label||null
  }).select().single()
  if(dbErr){
    console.error('attachment db insert:',dbErr)
    try{await SB.storage.from(INV_ATTACH_BUCKET).remove([path])}catch(e){}
    return{error:dbErr.message||'Database insert failed'}
  }
  return{data:row}
}

async function delCust(id){

  // Soft-delete only — nothing is permanently removed. Full snapshot goes to
  // deleted_records, then deleted_at is stamped on the location row.
  // Child records (jobs, invoices, equipment) are preserved as history.
  try{
    const{data:loc,error:fetchErr}=await SB.from('locations').select('*').eq('id',id).maybeSingle()
    if(fetchErr||!loc){toast('Could not fetch location: '+(fetchErr?.message||'not found'),false);return}

    await SB.from('deleted_records').insert({
      table_name:'locations',record_id:id,record_data:loc,
      deleted_by:'jon',reason:'Deleted via app UI',context:'app'
    })
    // Soft-delete
    const{error}=await SB.from('locations').update({deleted_at:new Date().toISOString()}).eq('id',id)
    if(error){toast('Error: '+error.message,false);return}
  }catch(e){toast('Delete failed: '+e.message,false);return}
  audit('deleted','location',id,'jon',null,'Client soft-deleted — record preserved in trash')
  await load();toast('Client deleted')
  popAll();rCust()
}

      flagged:u.flagged||u.condition==='fail',flagNote:u.flagNote||'',
      serial:u.serial||'',manufacturer:u.manufacturer||'',
      barcodeRaw:u.barcodeRaw||'',photo:u.photoB64||u.photo||''
    }))
  }else{
    _extUnits=[]
  }

  _extView='list';_extActiveId=null;_extSearchText=''
  renderExtSession()
}

function renderExtSession(){
  const units=_extUnits

  if(_extView==='detail'&&_extActive()){
    renderExtDetail();return
  }
  if(_extView==='flags'){

  // ─── LIST VIEW ───
  const filtered=_extSearchText?units.filter(u=>(u.serial||'').toLowerCase().includes(_extSearchText)||(u.manufacturer||'').toLowerCase().includes(_extSearchText)||(u.type||'').toLowerCase().includes(_extSearchText)||(u.flagNote||'').toLowerCase().includes(_extSearchText)||String(u.number).includes(_extSearchText)):units

      ${u.photo?`<img src="${u.photo}" style="width:44px;height:44px;object-fit:cover;border-radius:6px;flex-shrink:0">`:`<div style="width:44px;height:44px;border-radius:6px;background:var(--c2);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;color:var(--g2)">🧯</div>`}

function _newExtUnit(){
  const num=_extUnits.length+1
  return{id:'ext-'+Date.now()+'-'+num,number:num,type:'ABC Dry Chemical',size:'10lb',location:'',mfgDate:'',lastInternal:'',lastHydro:'',condition:'pass',notes:'',flagged:false,flagNote:'',serial:'',manufacturer:'',barcodeRaw:'',barcodes:[],photoLocation:'',photoLabel:'',photoMaint:'',photo:''}
}

function extAddAndSnap(){
  const u=_newExtUnit()
  _extUnits.push(u)
  _extActiveId=u.id
  // go straight to scanner — one photo, immediate read
  extShowScanner(u.id)
}

function extAddManual(){
  const u=_newExtUnit()
  _extUnits.push(u)
  _extActiveId=u.id;_extView='detail';renderExtSession()
}

function extShowScanner(unitId){
  _extActiveId=unitId
  const u=_extUnits.find(x=>x.id===unitId)||{}
  const h=`<div class="ov-hdr">
    <button class="ov-back" onclick="pop();_extView='list';renderExtSession()">‹</button>
    <div class="ov-title">Scan #${u.number||_extUnits.length}</div>
  </div><div class="ov-body" style="text-align:center;padding-top:24px">
    <div style="font-size:14px;color:var(--g1);margin-bottom:20px">Take a photo of the front label</div>
    <div id="extScanStatus" style="min-height:60px;margin-bottom:16px"></div>
    <label style="display:inline-block;padding:18px 40px;background:var(--fire);color:#fff;font-size:18px;font-weight:900;border-radius:var(--r);cursor:pointer">📷 Scan
      <input type="file" accept="image/*" capture="environment" style="position:absolute;opacity:0;width:0;height:0" onchange="handleExtScan(event)">
    </label>
    <div style="margin-top:24px">
      <button class="btn-dim" onclick="pop();_extActiveId='${unitId}';_extView='detail';renderExtSession()">Skip — Enter Manually</button>
    </div>
  </div>`
  push(h)

async function handleExtScan(ev){
  const file=ev.target.files[0];if(!file)return
  const statusEl=$('extScanStatus')
  if(statusEl)statusEl.innerHTML='<div style="color:var(--fire);font-weight:700">Processing...</div>'

  let b64
  try{b64=await resizePhoto(file,1000,0.8)}catch(e){toast('Photo failed',false);return}

  const u=_extUnits.find(x=>x.id===_extActiveId)
  if(!u){toast('Error',false);return}

  try{
    const res=await fetch('/api/claude',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:1024,
        messages:[{role:'user',content:[
          {type:'image',source:{type:'base64',media_type:'image/jpeg',data:b64.split(',')[1]}},
          {type:'text',text:`Read this fire extinguisher front label carefully. Return ONLY valid JSON:
{"type":"ABC Dry Chemical|BC Dry Chemical|CO2|Class K|Water|Halon|Halotron|Class D|Purple K|Clean Agent",
"size":"read the capacity — e.g. 5lb, 10lb, 20lb, 6 Liter, 2.5gal",
"brand":"Amerex, Badger, Buckeye, Kidde, Ansul, First Alert, Strike First — read from label",
"serial":"serial number — look for S/N, SER, or a long alphanumeric code on the label",
"upc":"if you can see a UPC barcode, read the 12-13 digit number under it",
"mfgDate":"YYYY-MM — CRITICAL: look for manufacture date. It may be: (1) stamped on the metal body/collar near the bottom, (2) printed on the label as 'MFG DATE' or 'DOM', (3) encoded in military format like JAN25=2025-01 or 03/2020=2020-03, (4) a date code stamped into the bottom ring. Convert to YYYY-MM format.",
"condition":"pass or fail — fail if: gauge in red, missing pin, damaged hose, dented, corroded, expired tag",
"notes":"describe any visible damage or issues",
"model":"model number — look for part number or model designation on label"}`}
        ]}]
      })
    })
    const data=await res.json()
    console.log('Claude response:',JSON.stringify(data).slice(0,500))
    if(data.error){toast('AI error: '+(data.error?.message||data.error),false);pop();_extView='detail';renderExtSession();return}
    const txt=data.content?.[0]?.text||''
    console.log('AI text:',txt)
    if(!txt){toast('AI returned empty — try again',false);pop();_extView='detail';renderExtSession();return}
    let p;try{p=JSON.parse(txt.replace(/```json|```/g,'').trim())}catch(parseErr){console.error('JSON parse fail:',txt);p={}}

    if(p.type)u.type=p.type;if(p.size)u.size=p.size;if(p.brand)u.manufacturer=p.brand
    if(p.serial)u.serial=p.serial;if(p.mfgDate)u.mfgDate=p.mfgDate;if(p.model)u.model=p.model
    if(p.condition)u.condition=p.condition;if(p.condition==='fail')u.flagged=true
    if(p.notes)u.notes=p.notes;if(p.upc)u.barcodeRaw=p.upc

    // UPC lookup
    if(p.upc&&p.upc.length>=10){
      try{
        const lr=await fetch('/api/upc-lookup',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({barcode:p.upc,format:'upc_a'})})
        const prod=await lr.json()
        if(prod.success){
          if(prod.brand&&!u.manufacturer)u.manufacturer=prod.brand
          if(prod.type&&u.type==='ABC Dry Chemical')u.type=prod.type
          if(prod.size&&!u.size)u.size=prod.size
        }
      }catch(e){}
    }

    if(!u.manufacturer){const mfr=guessManufacturer(u.serial||u.barcodeRaw||'');if(mfr)u.manufacturer=mfr}

    // show result in scanner overlay before advancing
    if(statusEl)statusEl.innerHTML=`<div style="background:var(--c1);border:1px solid var(--ok);border-radius:var(--rs);padding:14px;text-align:left">
      <div style="font-size:16px;font-weight:800;color:var(--ok);margin-bottom:4px">✓ ${esc(u.type)} ${esc(u.size)}</div>

      ${u.condition==='fail'?'<div style="font-size:12px;color:var(--bad);font-weight:700;margin-top:4px">⚠ FLAGGED — '+esc(u.notes||'issue detected')+'</div>':''}
    </div>`

    toast(`#${u.number} ${u.type} ${u.size}`)
  }catch(e){
    console.error('scan error:',e)
    if(statusEl)statusEl.innerHTML='<div style="color:var(--bad);font-weight:700">Read failed — check detail to enter manually</div>'
  }

  ev.target.value=''

  // auto-save immediately after scan
  debouncedExtSave()

  // auto-advance after 1.5s — scan next or go to detail
  setTimeout(()=>{
    pop() // close scanner
    _extView='detail';renderExtSession()
  },1500)
}

function resizePhoto(file,maxPx,quality){
  return new Promise(resolve=>{
    const reader=new FileReader()
    reader.onload=e=>{
      const img=new Image()
      img.onload=()=>{
        const canvas=document.createElement('canvas')
        let w=img.width,h=img.height
        if(w>maxPx||h>maxPx){if(w>h){h=Math.round(h*maxPx/w);w=maxPx}else{w=Math.round(w*maxPx/h);h=maxPx}}
        canvas.width=w;canvas.height=h;canvas.getContext('2d').drawImage(img,0,0,w,h)
        resolve(canvas.toDataURL('image/jpeg',quality||0.8))
      }
      img.src=e.target.result
    }
    reader.readAsDataURL(file)
  })
}

  try{
    const{data:ex}=await SB.from('reports').select('id').eq('job_id',jobId).eq('report_type','extinguisher').limit(1)

    const upd={};if(u.lastInternal)upd.last_internal=u.lastInternal;if(u.lastHydro)upd.last_hydro=u.lastHydro
    if(Object.keys(upd).length){try{await SB.from('extinguishers').update(upd).eq('id',u.id)}catch(e){}}
  }

  await load()
  if(!silent){toast('Extinguisher report saved — '+_extUnits.length+' units');pop()}
  updateJobChecklist()
}

// ═══ MONEY FILTER ═══
function filterInvs(filter){
  const now=new Date()
  const monthStart=new Date(now.getFullYear(),now.getMonth(),1).toISOString().split('T')[0]
  const monthEnd=new Date(now.getFullYear(),now.getMonth()+1,0).toISOString().split('T')[0]
  let invs=[]
  let title=''
  if(filter==='paid'){
    invs=D.invs.filter(i=>i.status==='paid'&&i.date>=monthStart&&i.date<=monthEnd)
    title='Collected This Month'
  }else{
    invs=D.invs.filter(i=>!['paid','void','record','factored'].includes(i.status))
    title='Outstanding Invoices'
  }
  const total=invs.reduce((s,i)=>s+(+i.total),0)
  let h=`<div class="ov-hdr"><button class="ov-back" onclick="pop()">‹</button><div class="ov-title">${title}</div></div><div class="ov-body">`
  h+=`<div style="background:var(--c1);border:1px solid var(--b1);border-radius:var(--r);padding:14px;margin-bottom:16px;text-align:center"><div style="font-size:28px;font-weight:900;color:${filter==='paid'?'var(--ok)':'var(--bad)'}">${fmt(total)}</div><div style="font-size:11px;color:var(--g1);margin-top:4px">${invs.length} invoice${invs.length!==1?'s':''}</div></div>`
  if(!invs.length)h+=`<div class="ey"><div class="ey-i">💰</div><div class="ey-t">No invoices here.</div></div>`
  else h+=iHtml(invs)
  h+=`</div>`
  push(h)
}

async function saveDryChemReport(jobId,sysId,silent){
  const btn=silent?null:document.querySelector('[onclick*="saveDryChemReport"]');if(btn){btn.textContent='Saving...';btn.style.opacity='.5';btn.style.pointerEvents='none'}
  const data={
    checks:{...(window._dcCheckState||{})},
    timeIn:$('dc-timein')?.value||'',timeOut:$('dc-timeout')?.value||'',
    sysType:$('dc-sys-type')?.value||'',agent:$('dc-agent')?.value||'',
    cylCount:$('dc-cyls')?.value||'1',nozzleCount:$('dc-nozzles')?.value||'0',
    lastHydro:$('dc-hydro')?.value||'',area:$('dc-area')?.value||'',
    deficiencies:$('dc-deficiencies')?.value||'',
    techName:$('dc-tech')?.value||_myName(),permit:$('dc-permit')?.value||_myLicense(),
    ownerName:$('dc-owner-name')?.value||''
  }
  const j=D.jobs.find(x=>x.id===jobId)||{}
  const locId=j.location_id||j.location?.id
  if(!locId){if(!silent)toast('Error: no location',false);return}
  let saveOk=false
  try{
    const{data:existing}=await SB.from('reports').select('id').eq('job_id',jobId).eq('report_type','dry_chemical').limit(1)
    if(existing?.length){
      const{error}=await SB.from('reports').update({report_data:data}).eq('id',existing[0].id)
      if(error){if(!silent)toast('Save error: '+error.message,false)}else saveOk=true
    }else{
      const{error}=await SB.from('reports').insert({job_id:jobId,location_id:locId,report_type:'dry_chemical',report_data:data})
      if(error){if(!silent)toast('Save error: '+error.message,false)}else saveOk=true
    }
  }catch(e){console.error('dc report save:',e);if(!silent)toast('Save failed',false)}
  if(!saveOk){if(btn){btn.textContent='Save Report';btn.style.opacity='';btn.style.pointerEvents=''}return}
  await load()
  if(silent)return
  toast('Report saved ✓')
  _manualSaving=true;pop();_manualSaving=false
  setTimeout(()=>updateJobChecklist(),200)
}

</div>`

function updateRptModels(){
  const mfg=$('rpt-mfg')?.value||''
  const sel=$('rpt-model');if(sel){
    const models=SUPP_MODELS[mfg]||[]
    const cur=sel.value
    sel.innerHTML=`<option value="">— Select —</option>`+models.map(m=>`<option value="${m}"${m===cur?' selected':''}>${m}</option>`).join('')+`<option value="Other">Other</option>`
  }
  const cylSel=$('rpt-cyl');if(cylSel){
    const tanks=SUPP_TANKS[mfg]||SUPP_TANKS._default
    const curCyl=cylSel.value
    let opts=`<option value="">— Select —</option>`+tanks.map(t=>`<option value="${t}"${t===curCyl?' selected':''}>${t}</option>`).join('')
    // preserve current value if not in the standard list
    if(curCyl&&!tanks.includes(curCyl))opts+=`<option value="${curCyl}" selected>${curCyl}</option>`
    opts+=`<option value="Other">Other</option>`
    cylSel.innerHTML=opts
  }
}

let _rptExtraTanks=[]
function addRptTank(){
  _rptExtraTanks.push('')
  renderRptTanks()
  // also add $50 fee to job lines
  const existing=jobLines.find(l=>l.desc==='Additional Tank Fee')
  if(existing){existing.qty=_rptExtraTanks.length;renderJobLines()}
  else{jobLines.push({desc:'Additional Tank Fee',qty:_rptExtraTanks.length,price:50,id:'jl'+Date.now()});renderJobLines()}
  updateWoTotal();updateJobChecklist()
}
function removeRptTank(idx){
  _rptExtraTanks.splice(idx,1)
  renderRptTanks()
  const existing=jobLines.find(l=>l.desc==='Additional Tank Fee')
  if(existing){if(_rptExtraTanks.length===0){jobLines=jobLines.filter(l=>l.desc!=='Additional Tank Fee')}else{existing.qty=_rptExtraTanks.length}}
  renderJobLines();updateWoTotal();updateJobChecklist()
}
function renderRptTanks(){
  const wrap=$('rpt-extra-tanks');if(!wrap)return
  const mfg=$('rpt-mfg')?.value||''
  const sizes=[''].concat(SUPP_TANKS[mfg]||SUPP_TANKS._default).concat(['Other'])

let rptSigCtx={}
function initRptSig(key,canvasId,phId){
  const c=$(canvasId);if(!c)return
  const r=c.parentElement.getBoundingClientRect();c.width=r.width;c.height=r.height
  const ctx=c.getContext('2d');ctx.strokeStyle='#222';ctx.lineWidth=2.5;ctx.lineCap='round';ctx.lineJoin='round'
  rptSigCtx[key]=ctx
  let on=false
  const sp=e=>{e.preventDefault();on=true;if($(phId))$(phId).style.display='none';const p=gpC(e,c);ctx.beginPath();ctx.moveTo(p.x,p.y)}
  const sm=e=>{if(!on)return;e.preventDefault();const p=gpC(e,c);ctx.lineTo(p.x,p.y);ctx.stroke()}
  const se=()=>{on=false}
  c.addEventListener('touchstart',sp,{passive:false});c.addEventListener('touchmove',sm,{passive:false});c.addEventListener('touchend',se)
  c.addEventListener('mousedown',sp);c.addEventListener('mousemove',sm);c.addEventListener('mouseup',se)
}

function gpC(e,c){const r=c.getBoundingClientRect(),t=e.touches?e.touches[0]:e;return{x:t.clientX-r.left,y:t.clientY-r.top}}

function clrRptSig(key){
  const canvasId=key==='tech'?'rptTechSig':'rptOwnerSig'
  const phId=key==='tech'?'rptTechSigPh':'rptOwnerSigPh'
  const c=$(canvasId)
  if(c&&rptSigCtx[key])rptSigCtx[key].clearRect(0,0,c.width,c.height)
  if($(phId))$(phId).style.display=''
}

function clrCustSendSig(){

  c.getContext('2d').clearRect(0,0,c.width,c.height)

let _applianceImages=[]
async function handleAppliancePhotos(ev){
  const files=Array.from(ev.target.files);if(!files.length)return
  const wrap=$('appliance-photos');if(wrap)wrap.innerHTML=''
  _applianceImages=[]
  const st=$('appliance-ai-status');if(st)st.style.display='block'

  for(const file of files.slice(0,3)){
    // upload photo to storage in background
    try{uploadDocument(file,file.name,'photo','general','00000000-0000-0000-0000-000000000000',{source:'appliance_photo'})}catch(e){}
    const reader=new FileReader()
    const b64=await new Promise(r=>{reader.onload=e=>r(e.target.result);reader.readAsDataURL(file)})
    if(wrap){
      const img=document.createElement('img')
      img.src=b64;img.style.cssText='width:80px;height:60px;object-fit:cover;border-radius:6px;border:1px solid var(--b1)'
      wrap.appendChild(img)
    }
    // resize for AI
    const imgEl=new Image()
    const resized=await new Promise(r=>{
      imgEl.onload=()=>{
        const canvas=document.createElement('canvas')
        const max=1200;let w=imgEl.width,h=imgEl.height
        if(w>max||h>max){if(w>h){h=Math.round(h*max/w);w=max}else{w=Math.round(w*max/h);h=max}}
        canvas.width=w;canvas.height=h;canvas.getContext('2d').drawImage(imgEl,0,0,w,h)
        r(canvas.toDataURL('image/jpeg',0.8).split(',')[1])
      };imgEl.src=b64
    })
    _applianceImages.push(resized)
  }
  $('applianceInput').value=''
  // send to AI
  try{
    const content=_applianceImages.map(b=>({type:'image',source:{type:'base64',media_type:'image/jpeg',data:b}}))
    content.push({type:'text',text:'You are looking at commercial cooking appliances in a kitchen. List every appliance you see from LEFT to RIGHT, one per line. Include type (fryer, grill, range, oven, broiler, steamer, etc.) and any visible brand names. Be specific. Return ONLY the list, no other text.'})
    const res=await fetch('/api/claude',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:1000,messages:[{role:'user',content}]})
    })
    const data=await res.json()
    const txt=data.content?.[0]?.text||''
    const ta=$('rpt-appliances')
    if(ta){ta.value=ta.value?(ta.value+'\n'+txt):txt}
    toast('Appliances identified')
  }catch(e){console.error('appliance AI:',e);toast('Could not read photos',false)}
  if(st)st.style.display='none'
}

    extraTanks:[..._rptExtraTanks]
  }
  // only include sig if it's small enough (skip huge data URLs that blow up JSONB)
  if(techSigData&&techSigData.length<50000)formData.techSig=techSigData
  // skip storing reportHtml in DB — it's huge and can be regenerated from formData
  // reportHtml will be generated at send time from the saved form data

  const j=D.jobs.find(x=>x.id===jobId)||{}
  const locId=j.location_id||j.location?.id
  if(!locId){toast('Error: no location linked to this job',false);console.error('No locId for job',jobId,j);if(btn){btn.textContent='✓ Save Report';btn.style.opacity='';btn.style.pointerEvents=''}return}

    const{data:existing}=await SB.from('reports').select('id').eq('job_id',jobId).eq('report_type','kitchen_suppression').limit(1)

    }else{

function calcCaNet(i){
  const c=window._caCyls[i]
  const t=parseFloat(c.tare||0),g=parseFloat(c.gross||0)
  const net=g>0&&t>0?+(g-t).toFixed(1):null
  c.actual=net!==null?net:''
  const el=$('ca-net-'+i)
  if(el){el.textContent=net!==null?net+' lb':'—';el.style.color=net!==null&&net>0?'var(--ok)':'var(--warn)'}
}

function toggleCaCylOk(i){

function setCaCheck(i,val){

function _applyCaCheckVisual(i){

function toggleCaType(t){

function clrCaSig(key){

async function saveCleanAgentReport(jobId,sysId,silent){
  const btn=silent?null:($('caRptSaveBtn2')||$('caRptSaveBtn'));if(btn){btn.textContent='Saving...';btn.style.opacity='.5';btn.style.pointerEvents='none'}
  let techSig=''
  try{const c=$('caTechSig');if(c){const ctx=c.getContext('2d');const px=ctx.getImageData(0,0,c.width,c.height).data;let has=false;for(let i2=3;i2<px.length;i2+=4){if(px[i2]>0){has=true;break}};if(has)techSig=c.toDataURL('image/jpeg',0.5)}}catch(e){}
  const data={
    checks:{...(window._caCheckState||{})},
    serviceType:window._caServiceType||'semi',
    agentType:$('ca-agent-type')?.value||'',
    mfg:$('ca-mfg')?.value||'',model:$('ca-model')?.value||'',
    serial:$('ca-serial')?.value||'',area:$('ca-area')?.value||'',
    concentration:$('ca-conc')?.value||'',panel:$('ca-panel')?.value||'',
    cylinders:(window._caCyls||[]).map(c=>({...c})),
    techName:$('ca-tech-name')?.value||_myName(),
    permit:$('ca-permit')?.value||_myLicense(),
    ownerName:$('ca-owner-name')?.value||'',
    deficiencies:$('ca-deficiencies')?.value||'',
    techSig,
    timein:$('ca-timein')?.value||'',timeout:$('ca-timeout')?.value||''
  }
  const j=D.jobs.find(x=>x.id===jobId)||{}
  const locId2=j.location_id||j.location?.id
  if(!locId2){if(!silent)toast('Error: no location',false);if(btn){btn.textContent='✓ Save Report';btn.style.opacity='';btn.style.pointerEvents=''}return}
  let saveOk=false
  try{
    const{data:caExist}=await SB.from('reports').select('id').eq('job_id',jobId).eq('report_type','clean_agent').limit(1)
    if(caExist?.length){
      const{error}=await SB.from('reports').update({report_data:data}).eq('id',caExist[0].id)
      if(error){if(!silent)toast('Save error: '+error.message,false)}else saveOk=true
    }else{
      const{error}=await SB.from('reports').insert({job_id:jobId,location_id:locId2,report_type:'clean_agent',report_data:data})
      if(error){if(!silent)toast('Save error: '+error.message,false)}else saveOk=true
    }
  }catch(e){console.error('ca report save:',e);if(!silent)toast('Save failed',false)}
  if(!saveOk){if(btn){btn.textContent='✓ Save Report';btn.style.opacity='';btn.style.pointerEvents=''}return}
  await load()
  if(silent)return
  toast('Report saved ✓')
  _manualSaving=true;pop();_manualSaving=false
  setTimeout(()=>updateJobChecklist(),200)
}

let _chatMsgs=[]
let _chatOpen=false

function openChat(){
  _chatOpen=true
  $('chatOv').classList.add('open')
  if(!_chatMsgs.length){
    _chatMsgs.push({role:'assistant',content:"Hey Jon. I can do things in the app for you — just tell me what you need.\n\n• \"Add a client called Dave's Hot Chicken in McKinney\"\n• \"Schedule a job at Primo Brothers for next Tuesday at 9\"\n• \"Look up Look Cinemas\"\n• \"Add a to-do: order fusible links\"\n• \"Mark invoice INV-649577 as paid by check\"\n• \"Show me my overdue jobs\"\n• \"Text 469-324-6503 saying I'm running late\""})
    renderChat()
  }
  setTimeout(()=>$('chatInput')?.focus(),100)
