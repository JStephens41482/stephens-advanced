              ${c.phone?`<a href="tel:${c.phone}" style="font-size:11px;color:var(--fire)" onclick="event.stopPropagation()">📞 ${c.phone}</a>`:''}
              ${c.email?`<a href="mailto:${esc(c.email)}" style="font-size:11px;color:var(--fire)" onclick="event.stopPropagation()">✉ ${esc(c.email)}</a>`:''}
            </div>
          </div>
        </div>
      </div>`
    })
  }else{
    // fallback to legacy location fields
    if(l.contact_name)h+=`<div style="padding:10px 0;font-size:12px;color:var(--g1)">Legacy: ${esc(l.contact_name)}${l.contact_phone?' · '+l.contact_phone:''}${l.contact_email?' · '+esc(l.contact_email):''}</div>`
    else h+=`<div style="padding:10px 0;font-size:12px;color:var(--g2)">No contacts yet</div>`
  }
  h+=`</div>`

  // Documents — fetch inline (small payload, ≤20 rows) so the loader doesn't
  // race against the push(h) DOM mount and get stuck at "Loading...".
  const locJobIds=D.jobs.filter(j=>j.location_id===id||j.location?.id===id).map(j=>j.id)
  let docsHtml='<div style="color:var(--g2);padding:4px 0">No documents yet</div>'
  try{
    let docs=[]
    if(locJobIds.length){
      const{data}=await SB.from('documents').select('*').eq('entity_type','job').in('entity_id',locJobIds).order('created_at',{ascending:false}).limit(20)
      docs=data||[]
    }
    if(docs.length){
      const icons={report_pdf:'📄',photo:'📸',invoice_pdf:'🧾'}
      docsHtml=docs.map(d=>{
        const dt=new Date(d.created_at).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})
        const icon=icons[d.doc_type]||'📎'
        const size=d.file_size_bytes?(Math.round(d.file_size_bytes/1024)+'KB'):''
        return`<div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--b1)">
          <span style="font-size:16px">${icon}</span>
          <div style="flex:1;min-width:0">
            <div style="font-size:12px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(d.filename)}</div>
            <div style="font-size:10px;color:var(--g2)">${dt} · ${size}${d.metadata?.report_type?' · '+d.metadata.report_type:''}</div>
          </div>
          <a href="${d.storage_url}" target="_blank" style="font-size:11px;color:var(--fire);font-weight:700;text-decoration:none;white-space:nowrap" onclick="event.stopPropagation()">View ↗</a>
        </div>`
      }).join('')
    }
  }catch(e){docsHtml='<div style="color:var(--g2)">Could not load documents</div>';console.error('docs:',e)}
  h+=`<div class="ds"><div class="ds-t">Documents</div><div style="font-size:12px;padding:4px 0">${docsHtml}</div></div>`

  // Parent company & sibling locations (ba was hoisted above the contract section)
  const siblings=ba?D.locs.filter(x=>x.billing_account_id===ba.id&&x.id!==l.id):[]

  h+=`<div class="ds"><div class="ds-t" style="display:flex;justify-content:space-between;align-items:center">
    <span>Locations${ba?' · '+esc(ba.name):''}</span>
    <div style="display:flex;gap:6px">
      ${!ba?`<button style="font-size:11px;font-weight:700;color:var(--info);background:none;border:none;cursor:pointer" onclick="assignToParent('${l.id}')">Assign to Parent Co.</button>`:''}
      <button style="font-size:11px;font-weight:700;color:var(--fire);background:none;border:none;cursor:pointer" onclick="addSiblingLocation('${l.id}','${ba?.id||''}')">+ Add Location</button>
    </div>
  </div>`

  // current location
  h+=`<div style="padding:10px 0;border-bottom:1px solid var(--b1);display:flex;align-items:center;gap:8px">
    <div style="width:6px;height:6px;border-radius:50%;background:var(--fire);flex-shrink:0"></div>
    <div style="flex:1"><div style="font-size:13px;font-weight:700;color:var(--fire)">${esc(l.name)}</div>
      <div style="font-size:11px;color:var(--g1)">${esc([l.address,l.city].filter(Boolean).join(', '))}</div></div>
    <span style="font-size:9px;font-weight:800;color:var(--fire);text-transform:uppercase">Current</span>
  </div>`

  // sibling locations
  siblings.forEach(s=>{
    h+=`<div style="padding:10px 0;border-bottom:1px solid var(--b1);display:flex;align-items:center;gap:8px;cursor:pointer" onclick="pop();setTimeout(()=>openCust('${s.id}'),100)">
      <div style="width:6px;height:6px;border-radius:50%;background:var(--g3);flex-shrink:0"></div>
      <div style="flex:1"><div style="font-size:13px;font-weight:700;color:var(--w)">${esc(s.name)}</div>
        <div style="font-size:11px;color:var(--g1)">${esc([s.address,s.city].filter(Boolean).join(', '))}</div></div>
      <span style="font-size:14px;color:var(--g3)">›</span>
    </div>`
  })

  if(!siblings.length&&!ba){
    h+=`<div style="padding:10px 0;font-size:12px;color:var(--g2)">Single location. Tap "Assign to Parent Co." to link to a multi-location account, or "+ Add Location" to add another site.</div>`
  }
  h+=`</div>`

  // Equipment at this site — derived read-only summary (from inspection reports + billed invoice lines).
  // NOT manually manipulated. Kept in sync with what we've actually inspected or billed for.
  h+=`<div class="ds"><div class="ds-t">Equipment at this site</div>
    <div id="loc-eq-derived" style="font-size:12px;color:var(--g2)">Analyzing reports & billing…</div>
  </div>`

  if(locJobs.length){
    h+=`<div class="ds" id="cust-jobs-section"><div class="ds-t">Job History · ${locJobs.length}</div>`
    // Sort newest first by whichever date we have
    const sortedJobs=[...locJobs].sort((a,b)=>{
      const da=a.completed_at||a.scheduled_date||a.created_at||''
      const db=b.completed_at||b.scheduled_date||b.created_at||''
      return db.localeCompare(da)
    })
    sortedJobs.slice(0,15).forEach(j=>{
      const statC={scheduled:'var(--info)',active:'var(--ok)',completed:'var(--g1)'}[j.status]||'var(--g1)'
      const jInv=D.invs.find(i=>i.job_id===j.id)
      const d=j.completed_at?String(j.completed_at).slice(0,10):(j.scheduled_date||(jInv?.date?String(jInv.date).slice(0,10):'No date'))
      h+=`<div class="ic" onclick="openJob('${j.id}')"><div class="ic-r1"><div class="ic-nm">${d}</div><span style="font-size:10px;font-weight:800;text-transform:uppercase;color:${statC}">${j.status}</span></div><div class="ic-sub">${(j.scope||[]).join(' · ')}${jInv?' · '+fmt(+jInv.total):''}</div>${jInv?`<div style="margin-top:6px" onclick="event.stopPropagation()"><button style="font-size:11px;font-weight:700;padding:6px 14px;border-radius:var(--rs);background:var(--info);color:#fff;border:none;cursor:pointer" onclick="sendInvEmail('${jInv.id}')">✉️ Resend Invoice + Reports</button></div>`:''}</div>`
    })
    h+=`</div>`
  }

  // Invoices are shown inline within Job History — completed jobs open the unified view
  h+=`</div>`
  push(h)
  renderDerivedEquipment(l.id)
}

// DERIVED EQUIPMENT SUMMARY
// Replaces the old manually-maintained extinguishers / suppression_systems /
// emergency_lights tables in the customer view. Truth-source is (a) what we
// found during inspections (reports.report_data) and (b) what the customer
// was billed for (invoice_lines). Read-only — if a count is wrong, edit the
// invoice or re-inspect; don't fight the data.
// ═══════════════════════════════════════════════════════════════
async function renderDerivedEquipment(locId){
  const el=$('loc-eq-derived');if(!el)return
  try{
    const summary=await deriveLocEquipment(locId)
    el.outerHTML=buildDerivedEquipmentHtml(summary,locId)
  }catch(e){
    console.error('derive equipment:',e)
    el.textContent='Could not build equipment summary.'
  }
}

async function deriveLocEquipment(locId){
  const locJobs=D.jobs.filter(j=>j.location_id===locId)
  const jobIds=locJobs.map(j=>j.id)
  let reports=[]
  if(jobIds.length){
    const{data:r}=await SB.from('reports').select('id,report_type,report_data,created_at,job_id').in('job_id',jobIds).order('created_at',{ascending:false})
    reports=r||[]
  }
  const locInvs=D.invs.filter(i=>i.location_id===locId).map(i=>i.id)
  let lines=[]
  if(locInvs.length){
    const{data:ll}=await SB.from('invoice_lines').select('description,quantity,invoice_id').in('invoice_id',locInvs).is('deleted_at',null)
    lines=ll||[]
  }

  // SUPPRESSION / CLEAN-AGENT / DRY-CHEM SYSTEMS — unique types seen in reports
  const systems=new Map()
  reports.forEach(r=>{
    const t=r.report_type;if(t!=='kitchen_suppression'&&t!=='dry_chemical'&&t!=='clean_agent')return
    const sd=r.report_data||{}
    const name=(sd.system_type||sd.sysType||sd.systemType||sd.sysLocation||(t==='kitchen_suppression'?'Kitchen Hood Suppression':t==='dry_chemical'?'Dry Chemical':'Clean Agent')).toString().trim()
    const key=(t+'|'+name).toLowerCase()
    if(!systems.has(key)){
      systems.set(key,{name,type:t,lastReport:r.created_at,tankCount:+(sd.tankCount||sd.tank_count)||null,nozzleCount:+(sd.nozzleCount||sd.nozzle_count)||null,fusibleLinks:+(sd.fusibleLinkCount||sd.fusible_link_count)||null})
    }
  })
  // also infer system presence from suppression-ish billing lines that never became a report
  const suppKw=/semi.?annual|suppression|kitchen hood|ansul|pyro.?chem|range guard|captive.?aire/i
  const caKw=/clean.?agent|fm.?200|fm200|novec|halon|inergen|co2 (system|flooding)/i
  const dcKw=/dry.?chem|paint.?booth|spray.?booth/i
  lines.forEach(ln=>{
    const d=(ln.description||'').trim();if(!d)return
    if(caKw.test(d)){const k='clean_agent|'+d.toLowerCase();if(!systems.has(k))systems.set(k,{name:d,type:'clean_agent',source:'billed'})}
    else if(dcKw.test(d)){const k='dry_chemical|'+d.toLowerCase();if(!systems.has(k))systems.set(k,{name:d,type:'dry_chemical',source:'billed'})}
    else if(suppKw.test(d)){const k='kitchen_suppression|'+d.toLowerCase();if(!systems.has(k))systems.set(k,{name:d,type:'kitchen_suppression',source:'billed'})}
  })

  // EXTINGUISHERS — prefer report unit count, else sum qty across invoices tagged "extinguisher"
  let extCount=0, extSource='', extReport=null
  for(const r of reports){if(r.report_type==='extinguisher'){extReport=r;break}}
  if(extReport?.report_data?.units?.length){
    extCount=extReport.report_data.units.length
    extSource='From inspection report · '+new Date(extReport.created_at).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})
  }else{
    const extLines=lines.filter(l=>/extinguisher/i.test(l.description||''))
    let totQty=0;extLines.forEach(l=>{totQty+=Math.max(+l.quantity||0,1)})
    extCount=totQty
    if(extLines.length)extSource='Based on '+extLines.length+' billed line'+(extLines.length>1?'s':'')+' across '+new Set(extLines.map(l=>l.invoice_id)).size+' invoice'+(new Set(extLines.map(l=>l.invoice_id)).size>1?'s':'')
  }

  // EMERGENCY LIGHTS — report first, else invoice lines
  let lightCount=0, lightSource=''
  const lightReport=reports.find(r=>{const sd=r.report_data||{};return +(sd.emergency_lights||sd.lightCount||sd.emergencyLightCount)>0})
  if(lightReport){
    const sd=lightReport.report_data||{}
    lightCount=+(sd.emergency_lights||sd.lightCount||sd.emergencyLightCount)||0
    lightSource='From inspection report · '+new Date(lightReport.created_at).toLocaleDateString('en-US',{month:'short',year:'numeric'})
  }else{
    const lightLines=lines.filter(l=>/emergency.?light|exit.?sign|e-?light|e light/i.test(l.description||''))
    let totQ=0;lightLines.forEach(l=>{totQ+=Math.max(+l.quantity||0,1)})
    lightCount=totQ
    if(lightLines.length)lightSource='Based on '+lightLines.length+' billed line'+(lightLines.length>1?'s':'')
  }

  return {
    systems:Array.from(systems.values()),
    extinguishers:{count:extCount,source:extSource},
    emergency_lights:{count:lightCount,source:lightSource},
    reportCount:reports.length,
    invoiceLineCount:lines.length
  }
}

function buildDerivedEquipmentHtml(s,locId){
  const hasAny=s.systems.length||s.extinguishers.count||s.emergency_lights.count
  if(!hasAny){
    return`<div class="ds"><div class="ds-t">Equipment at this site</div>
      <div class="ds-info" style="font-size:12px;color:var(--g2);line-height:1.55">
        No equipment found yet. Inventory is computed automatically once this location has an inspection report or billed line items.
      </div>
    </div>`
  }
  const icon=t=>t==='kitchen_suppression'?'🔥':t==='dry_chemical'?'🏭':t==='clean_agent'?'💨':'🧯'
  const typeLabel=t=>t==='kitchen_suppression'?'Kitchen Hood Suppression':t==='dry_chemical'?'Dry Chemical / Paint Booth':t==='clean_agent'?'Clean Agent':t
  let h=`<div class="ds"><div class="ds-t" style="display:flex;justify-content:space-between;align-items:center">
    <span>Equipment at this site</span>
    <span style="font-size:9px;font-weight:800;color:var(--g2);letter-spacing:.5px">DERIVED</span>
  </div>
  <div style="font-size:11px;color:var(--g2);line-height:1.55;margin-bottom:10px;padding-bottom:10px;border-bottom:1px solid var(--b1)">
    Computed from ${s.reportCount} inspection report${s.reportCount!==1?'s':''} + ${s.invoiceLineCount} billed line${s.invoiceLineCount!==1?'s':''}. If a count looks off, fix it at the source (invoice or report) — it's not edited here.
  </div>`

  if(s.systems.length){
    s.systems.forEach(sys=>{
      const sub=[typeLabel(sys.type)]
      if(sys.tankCount)sub.push(sys.tankCount+'T')
      if(sys.nozzleCount)sub.push(sys.nozzleCount+' nozzles')
      if(sys.fusibleLinks)sub.push(sys.fusibleLinks+' links')
      if(sys.lastReport)sub.push('last inspected '+new Date(sys.lastReport).toLocaleDateString('en-US',{month:'short',year:'numeric'}))
      else if(sys.source==='billed')sub.push('from billing — not yet inspected')
      h+=`<div style="display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--b1)">
        <span style="font-size:22px">${icon(sys.type)}</span>
        <div style="flex:1"><div style="font-size:13px;font-weight:700;color:var(--w)">${esc(sys.name)}</div>
          <div style="font-size:10px;color:var(--g1)">${sub.join(' · ')}</div></div>
      </div>`
    })
  }

  if(s.extinguishers.count){
    h+=`<div style="display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--b1)">
      <span style="font-size:22px">🧯</span>
      <div style="flex:1"><div style="font-size:13px;font-weight:700;color:var(--w)">Portable Extinguishers · ${s.extinguishers.count}</div>
        ${s.extinguishers.source?`<div style="font-size:10px;color:var(--g1)">${esc(s.extinguishers.source)}</div>`:''}
      </div>
    </div>`
  }

  if(s.emergency_lights.count){
    h+=`<div style="display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--b1)">
      <span style="font-size:22px">💡</span>
      <div style="flex:1"><div style="font-size:13px;font-weight:700;color:var(--w)">Emergency Lights / Exit Signs · ${s.emergency_lights.count}</div>
        ${s.emergency_lights.source?`<div style="font-size:10px;color:var(--g1)">${esc(s.emergency_lights.source)}</div>`:''}
      </div>
    </div>`
  }

  h+=`</div>`
  return h
}

function assignToParent(locId){
  const l=D.locs.find(x=>x.id===locId);if(!l)return
  const others=D.locs.filter(x=>x.id!==locId).sort((a,b)=>(a.name||'').localeCompare(b.name||''))

  let h=`<div class="ov-hdr"><button class="ov-back" onclick="pop()">‹</button><div class="ov-title">Assign to Parent Co.</div></div><div class="ov-body">
    <div style="font-size:13px;color:var(--w2);margin-bottom:16px">Link <strong>${esc(l.name)}</strong> to another client as a sibling location.</div>
    <input class="srch" placeholder="Search clients..." oninput="filterParentList(this.value,'${locId}')" style="margin-bottom:12px">
    <div id="parent-list">`

  others.forEach(o=>{
    const siblings=o.billing_account_id?D.locs.filter(x=>x.billing_account_id===o.billing_account_id).length:0
    h+=`<div class="parent-pick" style="padding:12px 0;border-bottom:1px solid var(--b1);cursor:pointer;display:flex;justify-content:space-between;align-items:center" data-name="${esc(o.name?.toLowerCase()||'')}" onclick="linkToClient('${locId}','${o.id}')">
      <div><div style="font-size:14px;font-weight:700;color:var(--w)">${esc(o.name)}</div>
        <div style="font-size:11px;color:var(--g1)">${esc([o.address,o.city].filter(Boolean).join(', '))}${siblings>1?' · '+siblings+' locations':''}</div></div>
      <span style="color:var(--fire);font-size:12px;font-weight:700">Link</span>
    </div>`
  })

  h+=`</div>
  <div class="ds" style="margin-top:20px"><div class="ds-t">Or Create New Parent Company</div>
    <div class="fg"><label class="fg-l">Company Name</label><input id="new-parent-name" placeholder="e.g. ABC Restaurant Group"></div>
    <div class="fg"><label class="fg-l">Contact Name</label><input id="new-parent-contact" placeholder="Main contact"></div>
    <div class="fg"><label class="fg-l">Phone</label><input id="new-parent-phone" placeholder="Phone"></div>
    <div class="fg"><label class="fg-l">Email</label><input id="new-parent-email" placeholder="Email"></div>
    <button class="btn-p" onclick="createAndAssignParent('${locId}')">Create & Assign</button>
  </div></div>`
  push(h)
}

function filterParentList(q,locId){
  const items=document.querySelectorAll('.parent-pick')
  const ql=q.toLowerCase()
  items.forEach(el=>{el.style.display=el.dataset.name.includes(ql)?'':'none'})
}

async function linkToClient(locId,targetLocId){
  const target=D.locs.find(x=>x.id===targetLocId)
  if(!target)return
  let baId=target.billing_account_id
  // if target doesn't have a billing account, create one
  if(!baId){
    const{data:ba}=await SB.from('billing_accounts').insert({
      name:target.name,contact_name:target.contact_name||null,
      phone:target.contact_phone||null,email:target.contact_email||null
    }).select().single()
    if(ba){
      baId=ba.id
      await SB.from('locations').update({billing_account_id:ba.id}).eq('id',targetLocId)
    }
  }
  if(baId){
    await SB.from('locations').update({billing_account_id:baId}).eq('id',locId)
    await load();toast('Locations linked')
    pop();pop();openCust(locId)
  }
}

async function doAssignParent(locId,baId){
  await SB.from('locations').update({billing_account_id:baId}).eq('id',locId)
  await load();toast('Assigned to parent company')
  pop();pop();openCust(locId)
}

async function createAndAssignParent(locId){
  const name=$('new-parent-name')?.value?.trim()
  if(!name){toast('Enter company name',false);return}
  const{data:ba,error}=await SB.from('billing_accounts').insert({
    name,contact_name:$('new-parent-contact')?.value?.trim()||null,
    phone:$('new-parent-phone')?.value?.trim()||null,
    email:$('new-parent-email')?.value?.trim()||null
  }).select().single()
  if(error){toast('Error: '+error.message,false);return}
  await SB.from('locations').update({billing_account_id:ba.id}).eq('id',locId)
  await load();toast('Parent company created & assigned')
  pop();pop();openCust(locId)
}

function addSiblingLocation(locId,baId){
  const l=D.locs.find(x=>x.id===locId)
  const parentName=baId?D.bas.find(b=>b.id===baId)?.name:l?.name

async function saveSiblingLocation(origLocId,baId){
  const name=$('sib-name')?.value?.trim()
  if(!name){toast('Enter location name',false);return}
  const city=$('sib-city')?.value?.trim()||''
  // if no billing account yet, create one from the original location
  let finalBaId=baId
  if(!finalBaId){
    const origLoc=D.locs.find(x=>x.id===origLocId)
    const{data:ba}=await SB.from('billing_accounts').insert({
      name:origLoc?.name||name,contact_name:origLoc?.contact_name||null,
      phone:origLoc?.contact_phone||null,email:origLoc?.contact_email||null
    }).select().single()
    if(ba){
      finalBaId=ba.id
      await SB.from('locations').update({billing_account_id:ba.id}).eq('id',origLocId)
    }
  }
  const{data:newLoc,error}=await SB.from('locations').insert({
    name,address:$('sib-addr')?.value?.trim()||null,city:city,
    state:$('sib-state')?.value?.trim()||'TX',zip:$('sib-zip')?.value?.trim()||null,
    contact_name:$('sib-contact')?.value?.trim()||null,
    contact_phone:$('sib-phone')?.value?.trim()||null,
    contact_email:$('sib-email')?.value?.trim()||null,
    billing_account_id:finalBaId||null,
    is_brycer_jurisdiction:_isBrycerCity(city),
    brycer_ahj_name:_isBrycerCity(city)?(city||'').trim()+' Fire Department':null
  }).select().single()

async function saveContact(locId){
  const name=$('ctName')?.value?.trim()
  if(!name){toast('Name is required',false);return}
  const role=$('ctRole')?.value||null
  const phone=$('ctPhone')?.value?.trim()||null
  const email=$('ctEmail')?.value?.trim()||null
  const isPrimary=$('ctPrimary')?.checked||false
  setLoad('saveCtBtn',true)
  const{data:contact,error}=await SB.from('contacts').insert({name,role,phone,email,is_primary:isPrimary}).select().single()
  if(error){toast('Error saving contact',false);setLoad('saveCtBtn',false,'Save Contact');return}
  await SB.from('contact_links').insert({contact_id:contact.id,entity_type:'location',entity_id:locId,relationship:role||'contact'})
  // if marked primary, unmark others
  if(isPrimary){
    const others=contactsForEntity('location',locId).filter(c=>c.id!==contact.id&&c.is_primary)
    for(const o of others)await SB.from('contacts').update({is_primary:false}).eq('id',o.id)
  }
  await load()
  setLoad('saveCtBtn',false,'Save Contact')
  audit('created','contact',contact.id,'jon',{name,role},'Contact added: '+name)
  pop()
  toast('Contact added')
  openCust(locId)
}

        <div style="flex:2;font-size:12px;color:${isTravel?'var(--warn)':'var(--w2)'}">${isTravel?'🚗 ':''}${esc(l2.desc)}</div>

      <div style="width:70px;font-size:8px;font-weight:800;color:var(--g2);text-transform:uppercase;text-align:right">Total</div>
      <div style="width:28px"></div>
    </div>`
    h+=invLines.map((l2,i)=>{
      const isTravel=(l2.desc||'').startsWith('Travel —')
      const lineTotal=((+(l2.qty||1))*(+(l2.price||0))).toFixed(2)
      return`<div class="li-row" data-ili="${i}" style="display:flex;gap:4px;align-items:center;margin-bottom:4px${isTravel?';border-left:3px solid var(--warn);padding-left:8px':''}">
        <input class="li-qty" type="number" value="${l2.qty||1}" min="0.5" step="0.5" oninput="ilEdit(${i},'qty',this.value)" style="width:44px;text-align:center">
        <input placeholder="Description" value="${esc(l2.desc||'')}" oninput="ilEdit(${i},'desc',this.value)" style="flex:2${isTravel?';color:var(--warn)':''}">
        <input class="li-price" type="number" value="${+(l2.price||0)}" step="0.01" oninput="ilEdit(${i},'price',this.value)" style="width:70px">
        <div style="width:70px;text-align:right;font-size:12px;font-weight:700;color:var(--ok);font-variant-numeric:tabular-nums" id="il-total-${i}">$${lineTotal}</div>

function ilEdit(i,field,val){
  if(!invLines[i])return
  if(field==='desc')invLines[i].desc=val
  else if(field==='qty'){const q=parseFloat(val);invLines[i].qty=Number.isFinite(q)?q:1}
  else if(field==='price'){const p=parseFloat(val);invLines[i].price=Number.isFinite(p)?p:0}
  // update line total
  const lt=$('il-total-'+i);if(lt)lt.textContent='$'+((+(invLines[i].qty||1))*(+(invLines[i].price||0))).toFixed(2)
  // update totals
  const t=invLines.reduce((s,l2)=>s+(+(l2.qty||1))*(+(l2.price||0)),0)
  const el=$('inv-lines-total');if(el)el.textContent=fmtD(t)
  const el2=$('inv-det-total-sm');if(el2)el2.textContent=fmtD(t)
  const el3=$('inv-det-total');if(el3)el3.textContent=fmtD(t)
}

function ilDel(i){
  invLines.splice(i,1)
  renderInvLines(false)
}

function addInvLine(sel,invId){
  const v=sel.value;if(!v)return
  if(sel.tagName)sel.value=''
  if(v==='CUSTOM'){
    invLines.push({desc:'',qty:1,price:0})
    renderInvLines(false)
    setTimeout(()=>{const inputs=$('inv-det-lines')?.querySelectorAll('input[placeholder="Description"]');if(inputs?.length)inputs[inputs.length-1].focus()},50)
    return
  }
  const parts=v.split('|')
  const desc=parts[0]||'',qty=parseFloat(parts[1])||1,price=parseFloat(parts[2])||0
  const nd=norm(desc)
  const existing=invLines.find(l2=>norm(l2.desc)===nd)
  if(existing){existing.qty=(+existing.qty||1)+1;renderInvLines(false);return}
  invLines.push({desc,qty,price})
  renderInvLines(false)
}

async function saveInvLines(invId){
  const btn=$('inv-save-lines-btn');if(btn){btn.textContent='Saving...';btn.disabled=true}
  const lines=invLines.filter(l2=>(l2.desc||'').trim())
  // Match compJ semantics: subtotal = sum of non-discount lines (positive total),
  // total = sum of all lines (after discounts). Overwriting both with the same
  // raw qty*price collapses the split that drives Mazon factoring math.
  const subtotal=lines.reduce((s,l2)=>{const t=(+(l2.qty)||1)*(+(l2.price)||0);return s+(t>0?t:0)},0)
  const total=lines.reduce((s,l2)=>s+(+(l2.qty)||1)*(+(l2.price)||0),0)
  try{
    // trash existing lines (snapshot to deleted_records + flip deleted_at) then reinsert fresh
    await trash('invoice_lines',{invoice_id:invId},'Invoice lines replaced via edit','jon','app')
    if(lines.length)await SB.from('invoice_lines').insert(lines.map((l2,i)=>({
      invoice_id:invId,
      description:l2.desc.trim(),
      quantity:+(l2.qty)||1,
      unit_price:+(l2.price)||0,
      total:(+(l2.qty)||1)*(+(l2.price)||0),
      sort_order:i
    })))
    await SB.from('invoices').update({subtotal,total}).eq('id',invId)
    // save any custom items for future reuse
    for(const l2 of lines)await saveCustomItem(l2.desc.trim(),+(l2.price)||0)
    await load()
    toast('Invoice updated ✓')
    const el=$('inv-det-total');if(el)el.textContent=fmtD(total)
  }catch(e){toast('Save failed',false);console.error(e)}
  if(btn){btn.textContent='💾 Save Changes';btn.disabled=false}
}

async function chargeCardOnFile(invId){
  // Defense-in-depth owner gate. The button is hidden via CSS for non-
  // owners, but a forged onclick / Riker client-hint / future code path
  // could still reach this function. Refuse here too.
  if(!_isOwner()){toast('Owner only — ask Jon to charge the card',false);return}
  const inv=D.invs.find(i=>i.id===invId)||{}
  const loc=D.locs.find(l=>l.id===inv.location_id)||{}
  const total=+(inv.total)||0
  if(!total){toast('No amount',false);return}

  toast('Checking card on file...')

  // find or create Square customer
  try{
    const custRes=await fetch('/api/square',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({action:'create_or_find',name:loc.contact_name||loc.name,email:loc.contact_email||'',phone:loc.contact_phone||'',locationId:loc.id})
    })
    const custData=await custRes.json()
    if(!custData.success){toast('Could not find customer',false);return}

    // save square_customer_id to location
    if(custData.customerId&&!loc.square_customer_id){
      await SB.from('locations').update({square_customer_id:custData.customerId}).eq('id',loc.id)
    }

    if(custData.cards?.length){
      // has a card on file — charge it
      const card=custData.cards[0]
      const last4=card.last_4||'****'
      const brand=card.card_brand||'Card'
      if(!confirm(`Charge ${brand} ending in ${last4} for $${total.toFixed(2)}?`))return

      toast('Charging card...')
      const chargeRes=await fetch('/api/square',{method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({action:'charge_card',customerId:custData.customerId,cardId:card.id,amount:total,invoiceId:invId,invoiceNumber:inv.invoice_number})
      })
      const chargeData=await chargeRes.json()
      if(chargeData.success){
        await load()
        toast('Charged $'+total.toFixed(2)+' ✓')
        pop();openInvDetail(invId)
      }else{
        toast('Charge failed: '+(chargeData.error||'Unknown error'),false)
      }
    }else{
      // no card on file — send checkout link that saves card
      toast('No card on file — creating payment link...')
      const linkRes=await fetch('/api/square',{method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({action:'checkout_and_save_card',customerId:custData.customerId,amount:total,invoiceNumber:inv.invoice_number,customerName:loc.name,invoiceId:invId,email:loc.contact_email})
      })
      const linkData=await linkRes.json()
      if(linkData.success&&linkData.paymentLink){
        toast('Payment link sent — card will be saved for next time')
        window.open(linkData.paymentLink)
      }else{
        toast('Could not create payment link',false)
      }
    }
  }catch(e){console.error('card on file:',e);toast('Error: '+e.message,false)}
}

function collectPayment(id,method){
  if(method==='undecided'){
    toast('Invoice left unpaid')
    pop();openInvDetail(id)
    return
  }
  if(method==='check'){
    const num=prompt('Enter check number:')
    if(!num)return
    markPaid(id,'check',`Check #${num.trim()}`)
    return
  }
  if(method==='cash'){
    if(!confirm('Cash — mark as paid in full?'))return
    markPaid(id,'cash','Cash — paid in full')
    return
  }
  if(method==='card'){
    if(!confirm('Card — mark as paid in full?'))return
    markPaid(id,'card','Card — paid in full')
    return
  }
  markPaid(id,method)
}
async function markPaid(id,method,note){
  const upd={status:'paid',payment_method:method,paid_at:new Date().toISOString()}
  if(note)upd.payment_note=note
  const{error}=await SB.from('invoices').update(upd).eq('id',id)
  if(error){toast('Error',false);return}
  audit('paid','invoice',id,'jon',{method,note},'Invoice marked paid ('+method+')')
  await load();toast('Marked as paid ✓')
  pop();openInvDetail(id)
}

async function markUnpaid(id){
  if(!confirm('Mark this invoice as unpaid?'))return
  const{error}=await SB.from('invoices').update({status:'draft',payment_method:null,payment_note:null,paid_at:null}).eq('id',id)
  if(error){toast('Error',false);return}
  await load();toast('Marked as unpaid')
  pop();openInvDetail(id)
}

// ═══════════════════════════════════════════════════════════════
// KIOSK MODE — "Hand the phone to the customer" flow
// Tech taps Hand-to-Customer on a job that's done; phone enters
// kiosk mode locked to one job. Customer reviews, signs, picks
// payment method, then PIN unlocks back to a tech summary panel
// where the tech confirms physical collection.
//
// State machine:
//   intro → missing_info → view_invoice → view_reports → payment_method
//   → contract (conditional) → sign_invoice → done_handback → pin_exit
//   → tech_summary
//
// PIN is a hardcoded constant — change KIOSK_EXIT_PIN to your number.
// In v2 we move it to the techs table per-tech.
// ═══════════════════════════════════════════════════════════════

const KIOSK_EXIT_PIN = '1799'  // last 4 of (214) 994-4799 — change here

let kioskState = null  // { jobId, sessionId, step, choices, missingFields, contractNeeded }

function _kioskUuid(){
  return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g,c=>{
    const r=Math.random()*16|0,v=c==='x'?r:(r&0x3|0x8);return v.toString(16)
  })
}

function _kioskMissingFields(loc, ba){
  // Required fields are gates — if the customer leaves them blank, the kiosk
  // will not advance. These are the things Jon needs for follow-up texts,
  // emailed invoices, and showing up next time. Other fields (DBA, secondary
  // contact) stay optional.
  const ask = []
  if(!loc?.contact_email)              ask.push({key:'contact_email',     label:'Best email for invoices?',           type:'email',  target:'location'})
  if(!loc?.contact_phone)              ask.push({key:'contact_phone',     label:'Best phone number for service updates?', type:'tel', target:'location'})
  if(!loc?.address)                    ask.push({key:'address',           label:'Street address of this location?',    type:'text',   target:'location'})
  if(!loc?.contact_name)               ask.push({key:'contact_name',      label:'Who at this location should we ask for?', type:'text', target:'location'})
  if(!ba?.legal_name && !loc?.name)    ask.push({key:'legal_name',        label:'Legal business name (for invoicing)?',type:'text',   target:'billing'})
  if(!ba?.dba)                         ask.push({key:'dba',               label:'Doing-business-as name (if different)?',type:'text', target:'billing', optional:true})
  return ask
}

function _kioskHasSignedContract(baId, locId){
  // Match by EITHER billing_account_id (parent-level contract) OR
  // location_id (location-only contract — customers with no parent BA).
  // Previously only matched by baId, so location-only customers
  // re-signed the agreement on every kiosk handoff.
  return (D.contracts||[]).some(c => {
    if(!(c.signed && c.status==='active')) return false
    if(baId && c.billing_account_id===baId) return true
    if(locId && c.location_id===locId) return true
    return false
  })
}

// Bill-me-later is only an option if the billing account is set up for it —
// either a billing arrangement on file (auto-charge / billed-invoice election)
// OR a saved card we can charge later. Otherwise the customer must pay now.
function _kioskCanBillLater(ba){
  if(!ba) return false
  if(ba.billing_election === 'auto_charge' || ba.billing_election === 'billed_invoice') return true
  if(ba.card_on_file) return true
  return false
}

async function openKiosk(jobId){
  // Multi-tech: the kiosk hands the customer a payment screen — by the
  // time they're picking card vs check, money is about to move. That's
  // owner-only on principle even though the tech is the one tapping
  // "Hand to Customer". An employee can complete a job via "Send for
  // Signature" or "Send Invoice (Contracted)" instead.
  if(!_isOwner()){toast('Owner only — only the owner can run the in-person kiosk',false);return}
  await load()
  const j = D.jobs.find(x=>x.id===jobId); if(!j){toast('Job not found');return}
  if(j.status==='completed'){toast('Job already completed');return}
  const l = D.locs.find(x=>x.id===(j.location_id||j.location?.id))||j.location||{}
  const ba = D.bas.find(x=>x.id===j.billing_account_id)||{}

  // The kiosk needs an invoice to display. If one doesn't exist yet, generate it.
  // SOURCE OF TRUTH for line items is jobs.work_order_lines JSONB on the job
  // itself — NOT the global jobLines (which only reflects whichever job openJob
  // was called with last). Using the global led to wrong invoices when openKiosk
  // was triggered before openJob populated jobLines for the current job.
  let inv = D.invs.find(i=>i.job_id===jobId)
  if(!inv){
    let rawLines = []
    if(j.work_order_lines && j.work_order_lines.length){
      rawLines = j.work_order_lines
    } else if(typeof buildJobLines==='function'){
      // Fallback: derive from location equipment + rate card
      rawLines = buildJobLines(j)
    }
    const lines = rawLines
      .map(l2=>({
        description:((l2.desc||l2.description)||'').trim(),
        quantity:+(l2.qty||l2.quantity)||1,
        unit_price:+(l2.price||l2.unit_price)||0,
      }))
      .filter(l2=>l2.description)
      .map(l2=>({...l2, total:l2.quantity*l2.unit_price}))
    if(!lines.length){toast('Add at least one line item before handing off',false);return}
    const travel = await calcTravelCharge(l)
    if(travel && travel.charge>0) lines.push({description:travel.desc,quantity:1,unit_price:travel.charge,total:travel.charge})
    const sub = lines.reduce((s,l2)=>s+l2.total,0)
    const invNum = 'INV-'+Date.now().toString().slice(-6)
    const{data:newInv,error} = await SB.from('invoices').insert({
      job_id:jobId, location_id:l.id, billing_account_id:l.billing_account_id,
      invoice_number:invNum, subtotal:sub, total:sub, status:'draft', date:td(),
      notes:(j.notes||'').trim()||null
    }).select().single()
    if(error){toast('Could not generate invoice: '+error.message,false);return}
    if(newInv && lines.length) await SB.from('invoice_lines').insert(lines.map((ln,i2)=>({invoice_id:newInv.id,...ln,sort_order:i2})))
    inv = newInv
    await load()
  }

  const sessionId = _kioskUuid()
  await SB.from('jobs').update({kiosk_session_id:sessionId}).eq('id',jobId)

  kioskState = {
    jobId, sessionId, loc:l, ba, j,
    step: 'intro',
    missingFields: _kioskMissingFields(l, ba),
    contractNeeded: !_kioskHasSignedContract(j.billing_account_id, l.id),
    choices: { paymentMethod:null, customerInfo:{}, signatureData:null, contractSignature:null }
  }

  push(_kioskRender(), {full:true})
  const slot = stk[stk.length-1]
  const el = document.getElementById(slot)
  if(el){ el.classList.add('kiosk-locked'); el.dataset.kiosk='1' }
  document.body.classList.add('kiosk-mode')
}

function _kioskRefresh(){
  const slot = stk[stk.length-1]
  const el = document.getElementById(slot)
  if(el) el.innerHTML = _kioskRender()
  setTimeout(()=>{
    if(document.getElementById('ki_contract_sig')) _kioskAttachSig('ki_contract_sig')
    if(document.getElementById('ki_inv_sig'))      _kioskAttachSig('ki_inv_sig')
    // Card form needs SDK init + attach. Only do it if the form container exists
    // AND we haven't already attached for this kiosk session (Square SDK errors
    // if you try to attach twice to the same container).
    if(document.getElementById('ki_card_container') && !_kioskSqInstance?.attached) _kioskInitCardForm()
  }, 30)
}

function _kioskStepNum(){
  const order = ['intro','missing_info','view_invoice','view_reports','payment_method','card_choice','card_capture','contract','sign_invoice','done_handback']
  const k = kioskState
  const reportCount = (D.reports||[]).filter(r=>r.job_id===k.j.id).length
  const requiredMissing = (k.missingFields||[]).filter(f=>!f.optional).length
  const isCard = k.choices.paymentMethod === 'card'
  const cardSdkAvailable = !!k.choices.cardSdkAvailable
  let visible = order.filter(s=>{
    if(s==='missing_info' && requiredMissing===0) return false
    if(s==='view_reports' && reportCount===0) return false
    if(s==='card_choice' && (!isCard || !cardSdkAvailable)) return false
    if(s==='card_capture' && (!isCard || !cardSdkAvailable)) return false
    if(s==='contract' && !k.contractNeeded) return false
    return true
  })
  const idx = visible.indexOf(k.step)
  return idx>=0 ? `Step ${idx+1} of ${visible.length}` : ''
}

function _kioskGoto(step){
  // If we're LEAVING card_capture, destroy the Square SDK card instance.
  // Otherwise re-render destroys the #ki_card_container DOM but the SDK
  // keeps internal state pointing at it — next re-entry skips init at the
  // !_kioskSqInstance?.attached guard and the customer sees an empty
  // card form they can't interact with. (Watcher caught this — the
  // helper existed but the user-cancel path didn't call it.)
  if(kioskState?.step === 'card_capture' && step !== 'card_capture'){
    _kioskDestroySdk().catch(()=>{})
  }
  kioskState.step = step
  _kioskRefresh()
}

function _kioskNext(){
  // PIN was removed 2026-04-28 — Jon got stuck on a PIN keypad mid-job at a
  // real customer. Customer hands back → tech taps Done → straight to summary.
  // The PIN was security theater (customer was inside the full app already).
  const flow = ['intro','missing_info','view_invoice','view_reports','payment_method','card_choice','card_capture','contract','sign_invoice','done_handback','tech_summary']
  const k = kioskState
  const reportCount = (D.reports||[]).filter(r=>r.job_id===k.j.id).length
  const requiredMissing = (k.missingFields||[]).filter(f=>!f.optional).length
  const isCard = k.choices.paymentMethod === 'card'
  // If Square SDK isn't configured for this deployment, skip card_choice +
  // card_capture and let the tech-summary instruct Jon to charge via the
  // Square app on his phone.
  const cardSdkAvailable = !!k.choices.cardSdkAvailable
  let i = flow.indexOf(k.step) + 1
  while(i < flow.length){
    const s = flow[i]
    if(s==='missing_info' && requiredMissing===0){ i++; continue }
    if(s==='view_reports' && reportCount===0){ i++; continue }
    if(s==='card_choice' && (!isCard || !cardSdkAvailable)){ i++; continue }
    if(s==='card_capture' && (!isCard || !cardSdkAvailable)){ i++; continue }
    if(s==='contract' && !k.contractNeeded){ i++; continue }
    k.step = s; _kioskRefresh(); return
  }
}

function _kioskRender(){
  const k = kioskState, j = k.j, l = k.loc, ba = k.ba
  const inv = D.invs.find(i=>i.job_id===j.id)
  const reports = (D.reports||[]).filter(r=>r.job_id===j.id)
  const total = inv?.total ?? est(j) ?? 0

  const stepLabel = _kioskStepNum()
  const hdr = `<div style="position:sticky;top:0;background:var(--c1);border-bottom:1px solid var(--b1);padding:14px 18px;display:flex;justify-content:space-between;align-items:center;z-index:10">
    <div style="font-size:11px;font-weight:800;letter-spacing:1.2px;text-transform:uppercase;color:var(--g2)">${stepLabel}</div>
    <div style="font-size:11px;color:var(--g3)">🔒 KIOSK</div>
  </div>`

  if(k.step==='intro') return hdr + `<div class="ov-body" style="padding:32px 24px;text-align:center">
    <div style="font-size:48px;margin-bottom:16px">👋</div>
    <h2 style="margin:0 0 12px;font-size:22px">Welcome.</h2>
    <p style="font-size:15px;color:var(--g1);max-width:340px;margin:0 auto 28px;line-height:1.5">
      We just finished work at <b>${esc(l.name||'your location')}</b>. The tech is going to hand you this phone for a minute so you can review what was done, choose how you'd like to pay, and sign off.
    </p>
    <p style="font-size:13px;color:var(--g2);margin-bottom:32px">Total today: <b style="color:var(--ok);font-size:18px">${fmt(total)}</b></p>
    <button onclick="_kioskNext()" style="width:100%;max-width:320px;padding:18px;border-radius:var(--r);background:var(--fire);color:#fff;border:none;font-size:16px;font-weight:800;cursor:pointer">Get Started →</button>
  </div>`

  if(k.step==='missing_info'){
    // Required fields gate the Continue button. Optional fields don't.
    const required = k.missingFields.filter(f=>!f.optional)
    const requiredFilled = required.every(f => (k.choices.customerInfo[f.key]||'').trim())
    const inputs = k.missingFields.map((f,i)=>`
      <div style="margin-bottom:16px">
        <label style="display:block;font-size:13px;font-weight:700;margin-bottom:6px;color:var(--g1)">
          ${esc(f.label)}${f.optional?' <span style="color:var(--g3);font-weight:400">(optional)</span>':' <span style="color:var(--bad);font-weight:700">*</span>'}
        </label>
        <input id="ki_${f.key}" type="${f.type}" value="${esc(k.choices.customerInfo[f.key]||'')}"
          oninput="kioskState.choices.customerInfo['${f.key}']=this.value;_kioskUpdateMissingInfoButton()"
          style="width:100%;min-height:52px;font-size:16px;padding:12px;border:1px solid var(--b1);border-radius:var(--r);background:var(--c2);color:var(--w)">
      </div>`).join('')
    const btnEnabled = requiredFilled
    return hdr + `<div class="ov-body" style="padding:24px">
      <h3 style="margin:0 0 8px;font-size:18px">A few quick questions</h3>
      <p style="color:var(--g2);font-size:13px;margin:0 0 4px">We're missing a few details. The starred items are required so we can send invoices, schedule next time, and reach you.</p>
      <p style="color:var(--g3);font-size:11px;margin:0 0 20px">If you have an accounts payable contact or different billing details, tell the tech directly so they can record it.</p>
      ${inputs}
      <button id="ki_missing_continue" onclick="_kioskSaveMissingThenNext()" ${btnEnabled?'':'disabled'}
        style="width:100%;padding:16px;border-radius:var(--r);background:${btnEnabled?'var(--fire)':'var(--c2)'};color:${btnEnabled?'#fff':'var(--g3)'};border:none;font-size:15px;font-weight:800;cursor:${btnEnabled?'pointer':'not-allowed'};margin-top:12px">Save & Continue →</button>
    </div>`
  }

  if(k.step==='view_invoice') return hdr + `<div class="ov-body" style="padding:24px;text-align:center">
    <h3 style="margin:0 0 8px">Your invoice</h3>
    <p style="color:var(--g2);font-size:13px;margin:0 0 20px">Here's exactly what we did and what it costs. Tap to review the full invoice.</p>
    <button onclick="${inv?`openInvDetail('${inv.id}')`:`toast('No invoice yet')`}"
      style="width:100%;max-width:340px;padding:18px;border-radius:var(--r);background:var(--c2);color:var(--w);border:1.5px solid var(--info);font-size:14px;font-weight:700;cursor:pointer;margin-bottom:12px">
      📄 Open Invoice — ${fmt(total)}
    </button>
    <div style="margin:20px 0;font-size:13px;color:var(--g2)">When you're done reviewing, tap Continue.</div>
    <button onclick="_kioskNext()" style="width:100%;max-width:340px;padding:16px;border-radius:var(--r);background:var(--fire);color:#fff;border:none;font-size:15px;font-weight:800;cursor:pointer">Continue →</button>
  </div>`

  if(k.step==='view_reports'){
    const rptList = reports.length
      ? reports.map(r=>`<div style="display:block;width:100%;max-width:340px;margin:0 auto 10px;padding:14px;border-radius:var(--r);background:var(--c2);color:var(--w);border:1px solid var(--b1);font-size:13px;font-weight:600;text-align:left">📋 ${esc(r.report_type||'Report')}${r.brycer_template?' · '+esc(r.brycer_template):''}</div>`).join('')
      : `<p style="color:var(--g2);font-size:13px">No inspection reports for this visit.</p>`
    return hdr + `<div class="ov-body" style="padding:24px;text-align:center">
      <h3 style="margin:0 0 8px">Inspection reports</h3>
      <p style="color:var(--g2);font-size:13px;margin:0 0 20px">${reports.length?'These reports will be emailed to you with your invoice.':'Nothing to review here — continue when ready.'}</p>
      ${rptList}
      <button onclick="_kioskNext()" style="width:100%;max-width:340px;padding:16px;border-radius:var(--r);background:var(--fire);color:#fff;border:none;font-size:15px;font-weight:800;cursor:pointer;margin-top:12px">Continue →</button>
    </div>`
  }

  if(k.step==='payment_method'){
    // Policy: if the customer is holding the phone, they pay right now.
    // Cash / Check / Card. No "bill me later" escape — that's what a
    // service contract is for. If they want recurring billing without
    // paying every visit, they sign a contract beforehand and Jon uses
    // the "Bill — Contracted" path back on his side instead of handing
    // over the phone at all.
    return hdr + `<div class="ov-body" style="padding:24px;text-align:center">
      <h3 style="margin:0 0 8px">How would you like to pay?</h3>
      <p style="color:var(--g2);font-size:13px;margin:0 0 24px">Choose one. Total: <b style="color:var(--ok)">${fmt(total)}</b></p>
      <div style="display:flex;flex-direction:column;gap:10px;max-width:340px;margin:0 auto">
        <button onclick="_kioskPickPayment('check')"  style="padding:18px;border-radius:var(--r);background:var(--c2);color:var(--w);border:1.5px solid var(--ok);font-size:15px;font-weight:800;cursor:pointer">✓ Pay by Check</button>
        <button onclick="_kioskPickPayment('cash')"   style="padding:18px;border-radius:var(--r);background:var(--c2);color:var(--w);border:1.5px solid var(--ok);font-size:15px;font-weight:800;cursor:pointer">💵 Pay with Cash</button>
        <button onclick="_kioskPickPayment('card')"   style="padding:18px;border-radius:var(--r);background:var(--c2);color:var(--w);border:1.5px solid var(--info);font-size:15px;font-weight:800;cursor:pointer">💳 Pay by Card</button>
      </div>
      <p style="color:var(--g3);font-size:11px;margin-top:18px;max-width:340px;margin-left:auto;margin-right:auto;line-height:1.5">Want to skip paying every visit? Ask the tech about our service agreement — sign once, billed afterwards, no checkout step.</p>
    </div>`
  }

  if(k.step==='card_choice') return hdr + `<div class="ov-body" style="padding:24px;text-align:center">
    <h3 style="margin:0 0 8px">Save card on file?</h3>
    <p style="color:var(--g2);font-size:13px;margin:0 auto 24px;max-width:340px">If you save it, future inspections can be auto-billed without a signature each time. Either way, you'll pay <b style="color:var(--ok)">${fmt(total)}</b> right now.</p>
    <div style="display:flex;flex-direction:column;gap:10px;max-width:340px;margin:0 auto">
      <button onclick="_kioskPickCardSave(true)"  style="padding:18px;border-radius:var(--r);background:var(--c2);color:var(--w);border:1.5px solid var(--ok);font-size:15px;font-weight:800;cursor:pointer">✓ Yes — save it for next time</button>
      <button onclick="_kioskPickCardSave(false)" style="padding:18px;border-radius:var(--r);background:var(--c2);color:var(--g1);border:1px solid var(--b1);font-size:14px;font-weight:700;cursor:pointer">Just this time, don't save</button>
    </div>
  </div>`

  if(k.step==='card_capture'){
    const status = k.choices.cardStatus  // 'idle' | 'submitting' | 'error' | 'paid'
    const errMsg = k.choices.cardError
    const last4 = k.choices.cardLast4
    if(status==='paid'){
      return hdr + `<div class="ov-body" style="padding:32px 24px;text-align:center">
        <div style="font-size:48px;margin-bottom:12px">✓</div>
        <h3 style="margin:0 0 8px">Card charged</h3>
        <p style="color:var(--g1);font-size:14px;margin:0 0 8px">${fmt(total)} on card ending ${esc(last4||'????')}</p>
        ${k.choices.cardSavedOnFile?'<p style="color:var(--ok);font-size:12px;margin:8px 0 24px">✓ Saved for future bills</p>':'<p style="color:var(--g2);font-size:12px;margin:8px 0 24px">One-time charge — not saved</p>'}
        <button onclick="_kioskNext()" style="width:100%;max-width:320px;padding:16px;border-radius:var(--r);background:var(--fire);color:#fff;border:none;font-size:15px;font-weight:800;cursor:pointer">Continue →</button>
      </div>`
    }
    return hdr + `<div class="ov-body" style="padding:24px">
      <h3 style="margin:0 0 8px;text-align:center">Enter card details</h3>
      <p style="color:var(--g2);font-size:13px;margin:0 auto 16px;max-width:340px;text-align:center">Total: <b style="color:var(--ok)">${fmt(total)}</b>${k.choices.cardSaveOnFile?' · Card will be saved for future bills':' · One-time charge'}</p>
      <div id="ki_card_container" style="background:#fff;border-radius:8px;padding:16px;min-height:90px;max-width:380px;margin:0 auto"></div>
      <div id="ki_card_loading" style="text-align:center;color:var(--g2);font-size:13px;margin-top:12px">Loading secure card form…</div>
      ${errMsg?`<div style="background:rgba(239,68,68,.1);border:1px solid var(--bad);color:var(--bad);padding:10px 14px;border-radius:6px;margin:12px auto;max-width:380px;font-size:13px">${esc(errMsg)}</div>`:''}
      <button id="ki_pay_btn" onclick="_kioskSubmitCardPayment()" disabled
        style="width:100%;max-width:380px;display:block;margin:16px auto 0;padding:16px;border-radius:var(--r);background:var(--g3);color:var(--g1);border:none;font-size:15px;font-weight:800;cursor:not-allowed">
        ${status==='submitting'?'Processing…':'Pay '+fmt(total)}
      </button>
      <div style="text-align:center;margin-top:14px"><button onclick="_kioskGoto('payment_method')" style="background:none;border:none;color:var(--g2);font-size:12px;text-decoration:underline;cursor:pointer">← Choose a different payment method</button></div>
    </div>`
  }


  if(k.step==='contract'){
    const sigUi = k.choices.contractSignature
      ? `<div style="text-align:center;margin:16px 0"><img src="${k.choices.contractSignature}" style="max-width:300px;border:1px solid var(--b1);background:#fff;border-radius:8px"><div style="font-size:12px;color:var(--ok);margin-top:6px">✓ Signed</div></div>`
      : `<div style="background:var(--c2);border:1px dashed var(--g3);border-radius:8px;padding:14px;margin:16px 0;text-align:center">
          <canvas id="ki_contract_sig" width="320" height="120" style="background:#fff;border-radius:6px;touch-action:none;cursor:crosshair"></canvas>
          <div style="display:flex;gap:8px;justify-content:center;margin-top:10px">
            <button onclick="_kioskClearSig('ki_contract_sig')" style="padding:8px 14px;font-size:12px;border-radius:6px;background:var(--c1);border:1px solid var(--b1);color:var(--g1);cursor:pointer">Clear</button>
            <button onclick="_kioskCaptureSig('ki_contract_sig','contractSignature')" style="padding:8px 14px;font-size:12px;border-radius:6px;background:var(--fire);color:#fff;border:none;cursor:pointer;font-weight:700">Use signature</button>
          </div>
        </div>`
    return hdr + `<div class="ov-body" style="padding:24px">
      <h3 style="margin:0 0 6px">Service Agreement</h3>
      <p style="color:var(--g2);font-size:13px;margin:0 0 14px">A one-time agreement covering future visits — so you don't have to sign every time.</p>
      <div style="background:var(--c2);border:1px solid var(--b1);border-radius:var(--r);padding:14px;max-height:240px;overflow-y:auto;font-size:12px;line-height:1.5;color:var(--g1);margin-bottom:8px">
        <p><b>Stephens Advanced LLC — Service Agreement</b></p>
        <p>The undersigned (<b>${esc(l.name||ba.name||'Customer')}</b>) acknowledges and agrees to the following terms covering all services, parts, and equipment furnished by Stephens Advanced LLC, including any future visits at this location:</p>
        <ol style="margin:8px 0 8px 18px;padding:0">
          <li style="margin-bottom:6px">The purchaser agrees that the title to each item of merchandise of this purchase shall remain property of Stephens Advanced LLC until full payment as shown here and above.</li>
          <li style="margin-bottom:6px">If full payment is not made as stated above, Stephens Advanced LLC reserves the right to take possession of each item of merchandise of this purchase, and the purchaser shall forfeit all rights thereto and interest therein.</li>
          <li style="margin-bottom:6px">All monies therefore paid by the purchaser shall be retained by Stephens Advanced LLC as rental for use of said merchandise and as liquidated damages.</li>
          <li style="margin-bottom:6px">For any collections fees necessary to enforce payment hereon shall be borne by the purchaser, and balances over 30 days old will be charged the maximum interest allowed by state law.</li>
          <li style="margin-bottom:6px">Stephens Advanced LLC is authorized to perform all regularly-scheduled inspections, system services, and routine maintenance required by NFPA, state, and local code — including but not limited to: hydrostatic testing, six-year teardowns, recharges, fusible-link replacement, nozzle cleaning, internal inspections, and any other routine work the equipment standard calls for. These items will be billed at our published rate card.</li>
          <li>For any unexpected repairs, replacements, or additional work above <b>$100</b> at a single visit, Stephens Advanced LLC will notify the customer beforehand and obtain approval before proceeding.</li>
        </ol>
      </div>
      ${sigUi}
      <button onclick="_kioskNext()" ${k.choices.contractSignature?'':'disabled'}
        style="width:100%;padding:16px;border-radius:var(--r);background:${k.choices.contractSignature?'var(--fire)':'var(--c2)'};color:${k.choices.contractSignature?'#fff':'var(--g3)'};border:none;font-size:15px;font-weight:800;cursor:${k.choices.contractSignature?'pointer':'not-allowed'};margin-top:12px">Agree & Continue →</button>
    </div>`
  }

  if(k.step==='sign_invoice'){
    const sigUi = k.choices.signatureData
      ? `<div style="text-align:center;margin:16px 0"><img src="${k.choices.signatureData}" style="max-width:300px;border:1px solid var(--b1);background:#fff;border-radius:8px"><div style="font-size:12px;color:var(--ok);margin-top:6px">✓ Signed</div></div>`
      : `<div style="background:var(--c2);border:1px dashed var(--g3);border-radius:8px;padding:14px;margin:16px 0;text-align:center">
          <canvas id="ki_inv_sig" width="320" height="120" style="background:#fff;border-radius:6px;touch-action:none;cursor:crosshair"></canvas>
          <div style="display:flex;gap:8px;justify-content:center;margin-top:10px">
            <button onclick="_kioskClearSig('ki_inv_sig')" style="padding:8px 14px;font-size:12px;border-radius:6px;background:var(--c1);border:1px solid var(--b1);color:var(--g1);cursor:pointer">Clear</button>
            <button onclick="_kioskCaptureSig('ki_inv_sig','signatureData')" style="padding:8px 14px;font-size:12px;border-radius:6px;background:var(--fire);color:#fff;border:none;cursor:pointer;font-weight:700">Use signature</button>
          </div>
        </div>`
    return hdr + `<div class="ov-body" style="padding:24px">
      <h3 style="margin:0 0 6px">Sign for today's work</h3>
      <p style="color:var(--g2);font-size:13px;margin:0 0 6px">Confirms the work was completed and your invoice is correct.</p>
      <div style="font-size:13px;margin:8px 0;color:var(--g1)">Total: <b style="color:var(--ok)">${fmt(total)}</b> · Paying by: <b>${esc(k.choices.paymentMethod||'(not set)')}</b></div>
      ${sigUi}
      <button onclick="_kioskNext()" ${k.choices.signatureData?'':'disabled'}
        style="width:100%;padding:16px;border-radius:var(--r);background:${k.choices.signatureData?'var(--fire)':'var(--c2)'};color:${k.choices.signatureData?'#fff':'var(--g3)'};border:none;font-size:15px;font-weight:800;cursor:${k.choices.signatureData?'pointer':'not-allowed'};margin-top:12px">Done →</button>
    </div>`
  }

  if(k.step==='done_handback') return hdr + `<div class="ov-body" style="padding:32px 24px;text-align:center">
    <div style="font-size:64px;margin-bottom:18px">✓</div>
    <h2 style="margin:0 0 12px;font-size:22px">All set, thank you.</h2>
    <p style="font-size:15px;color:var(--g1);max-width:340px;margin:0 auto 28px;line-height:1.5">Please hand the phone back to your tech.</p>
    <button onclick="_kioskGoto('tech_summary')" style="width:100%;max-width:320px;padding:18px;border-radius:var(--r);background:var(--fire);color:#fff;border:none;font-size:15px;font-weight:800;cursor:pointer">Tech: Tap here</button>
  </div>`

  if(k.step==='tech_summary'){
    const pm = k.choices.paymentMethod
    const cardPaid = pm==='card' && k.choices.cardStatus==='paid'
    const cardManual = pm==='card' && !cardPaid  // SDK not configured OR not yet run
    const collectMsg =
      pm==='cash'    ? '💵 Collect cash from the customer.' :
      pm==='check'   ? '✓ Get the check from the customer.' :
      pm==='invoice' ? '📧 No money to collect — bill them later.' :
      cardPaid       ? `✅ Card already charged ${fmt(total)} (last4 ${esc(k.choices.cardLast4||'????')}). Tap below to close.` :
      cardManual     ? `💳 Open Square app and charge ${fmt(total)}. When the charge clears, tap the button below.` :
      '— pick one with the customer first'
    const confirmBtn =
      pm==='cash'    ? `<button onclick="_kioskFinalize('cash')"    style="width:100%;padding:18px;border-radius:var(--r);background:var(--ok);color:#fff;border:none;font-size:16px;font-weight:800;cursor:pointer;margin-bottom:8px">💵 Got Cash</button>` :
      pm==='check'   ? `<button onclick="_kioskFinalize('check')"   style="width:100%;padding:18px;border-radius:var(--r);background:var(--ok);color:#fff;border:none;font-size:16px;font-weight:800;cursor:pointer;margin-bottom:8px">✓ Got Check #____</button>` :
      pm==='invoice' ? `<button onclick="_kioskFinalize('invoice')" style="width:100%;padding:18px;border-radius:var(--r);background:var(--fire);color:#fff;border:none;font-size:16px;font-weight:800;cursor:pointer;margin-bottom:8px">📧 Send Invoice & Reports</button>` :
      cardPaid       ? `<button onclick="_kioskFinalize('card')"    style="width:100%;padding:18px;border-radius:var(--r);background:var(--ok);color:#fff;border:none;font-size:16px;font-weight:800;cursor:pointer;margin-bottom:8px">✅ Close Job</button>` :
      cardManual     ? `<button onclick="_kioskFinalize('card_manual')" style="width:100%;padding:18px;border-radius:var(--r);background:var(--ok);color:#fff;border:none;font-size:16px;font-weight:800;cursor:pointer;margin-bottom:8px">💳 Got Card (charged via Square app)</button>` :
      ''
    return hdr + `<div class="ov-body" style="padding:24px">
      <h3 style="margin:0 0 16px">Customer is done — your turn</h3>
      <div style="background:var(--c2);border:1px solid var(--b1);border-radius:var(--r);padding:14px;margin-bottom:14px">
        <div style="font-size:11px;font-weight:800;letter-spacing:1.2px;text-transform:uppercase;color:var(--g2);margin-bottom:8px">Customer chose</div>
        <div style="font-size:16px;font-weight:800;color:var(--w);margin-bottom:6px">${pm? (pm==='invoice'?'Bill me later':pm.toUpperCase()) : '(no choice yet)'}${cardPaid&&k.choices.cardSavedOnFile?' · Saved on file':''}</div>
        <div style="font-size:13px;color:var(--g1)">Total: <b style="color:var(--ok)">${fmt(total)}</b></div>
      </div>
      <div style="background:var(--infos);border:1px solid var(--info);border-radius:var(--r);padding:12px;margin-bottom:14px;font-size:14px;color:var(--w)">
        ${collectMsg}
      </div>
      ${k.contractNeeded?`<div style="font-size:12px;color:var(--ok);margin-bottom:8px">✓ Service Agreement signed</div>`:''}
      <div style="font-size:12px;color:var(--ok);margin-bottom:14px">✓ Invoice signed by customer</div>
      ${confirmBtn}
      ${(!k.contractNeeded && !D.contracts?.find(c=>c.location_id===k.loc.id&&c.status!=='cancelled'&&c.signed))?`
      <div style="background:rgba(16,185,129,.08);border:1.5px solid var(--ok);border-radius:var(--r);padding:14px;margin:14px 0;color:var(--w)">
        <div style="display:flex;align-items:center;gap:8px;font-size:14px;font-weight:800;color:var(--ok);margin-bottom:6px">🤝 Last checkout?</div>
        <div style="font-size:12px;color:var(--w2);line-height:1.5;margin-bottom:12px">Get them on a service agreement — sign once, billed automatically after future visits. No more checkout dance every time.</div>
        <button onclick="openServiceAgreementSign('${k.loc.id}','kiosk_upsell')" style="width:100%;padding:13px;border-radius:var(--rs);background:var(--ok);color:#fff;border:none;font-size:13px;font-weight:800;cursor:pointer">📝 Sign Agreement Now</button>
      </div>`:''}
      <button onclick="_kioskCancel()" style="width:100%;padding:12px;border-radius:var(--r);background:var(--c2);color:var(--g2);border:1px solid var(--b1);font-size:12px;cursor:pointer">Exit without finalizing</button>
    </div>`
  }

  return hdr + `<div class="ov-body" style="padding:24px">Unknown step: ${esc(k.step)}</div>`
}

// Live-enable the Save & Continue button as required fields fill in.
// Avoids _kioskRefresh() (which would blow away input focus mid-typing).
function _kioskUpdateMissingInfoButton(){
  const k = kioskState; if(!k || k.step!=='missing_info') return
  const required = (k.missingFields||[]).filter(f=>!f.optional)
  const ok = required.every(f => (k.choices.customerInfo[f.key]||'').trim())
  const btn = document.getElementById('ki_missing_continue'); if(!btn) return
  btn.disabled = !ok
  btn.style.background = ok ? 'var(--fire)' : 'var(--c2)'
  btn.style.color = ok ? '#fff' : 'var(--g3)'
  btn.style.cursor = ok ? 'pointer' : 'not-allowed'
}

async function _kioskSaveMissingThenNext(){
  const k = kioskState
  const locUpd = {}, baUpd = {}
  k.missingFields.forEach(f=>{
    const v = k.choices.customerInfo[f.key]
    if(!v) return
    if(f.target==='location') locUpd[f.key] = v
    if(f.target==='billing')  baUpd[f.key]  = v
  })
  if(Object.keys(locUpd).length){
    await SB.from('locations').update(locUpd).eq('id', k.loc.id)
    // Mirror into k.loc immediately so the BA-insert below sees fresh
    // contact_email/contact_phone if the customer just typed them in
    // (target='location' fields). Without this the new BA was getting
    // email:null even when the customer supplied one.
    Object.assign(k.loc, locUpd)
  }
  if(Object.keys(baUpd).length){
    if(k.j.billing_account_id){
      // Has parent BA — write into it.
      const{error:upErr} = await SB.from('billing_accounts').update(baUpd).eq('id', k.j.billing_account_id)
      if(upErr){
        toast('Could not save billing info: '+upErr.message, false)
        return  // don't advance — the customer's data was lost
      }
    }else{
      // No parent BA — create one on the fly so legal_name / dba aren't lost.
      // PostgREST returns errors as `{error}` not as throws — destructure
      // and check explicitly. (The try/catch alone only catches network
      // throws and would silently advance on FK / RLS / schema failures.)
      const{data:newBa, error:baErr} = await SB.from('billing_accounts').insert({
        ...baUpd,
        name: baUpd.legal_name || k.loc.name || 'Customer',
        email: k.loc.contact_email || null,
        phone: k.loc.contact_phone || null
      }).select('id').single()
      if(baErr || !newBa?.id){
        console.error('[kiosk] BA on-fly create failed:', baErr?.message)
        toast('Could not create billing account: '+(baErr?.message||'unknown'), false)
        return  // don't advance — would silently drop the data otherwise
      }
      // Link the new BA back to this location AND the job
      const{error:linkLocErr} = await SB.from('locations').update({billing_account_id: newBa.id}).eq('id', k.loc.id)
      const{error:linkJobErr} = await SB.from('jobs').update({billing_account_id: newBa.id}).eq('id', k.jobId)
      if(linkLocErr || linkJobErr){
        console.warn('[kiosk] BA link warnings:', linkLocErr?.message, linkJobErr?.message)
        // Soft-warn but advance — the BA exists, the link can be re-stitched later.
      }
      k.j.billing_account_id = newBa.id
      k.loc.billing_account_id = newBa.id
    }
  }
  _kioskNext()
}

async function _kioskPickPayment(method){
  kioskState.choices.paymentMethod = method
  if(method==='card'){
    kioskState.choices.cardStatus = 'idle'
    kioskState.choices.cardError = null
    kioskState.choices.cardLast4 = null
    kioskState.choices.cardSavedOnFile = false
    // Check whether Square SDK is configured for this deployment. If yes, the
    // customer enters card directly via Web Payments SDK (cardChoice → cardCapture).
    // If no, we skip those steps; tech-summary will instruct Jon to charge via
    // the Square app on his phone after handback. Either way, customer continues
    // to contract / sign — we still get a signature.
    try {
      const r = await fetch('/api/square-config')
      kioskState.choices.cardSdkAvailable = r.ok
    } catch { kioskState.choices.cardSdkAvailable = false }

  _kioskNext()

// Customer chose Save-on-file? — goes to card_capture either way; flag stored.
