<!--
  SUPABASE SQL — run this if brycer_queue table does not exist:

  create table brycer_queue (
    id uuid default gen_random_uuid() primary key,
    job_id uuid references jobs(id),
    location_id uuid references locations(id),
    location_name text,
    system_type text,
    job_date date,
    report_generated boolean default false,
    submitted boolean default false,
    submitted_date date,
    created_at timestamptz default now()
  );
  alter table brycer_queue enable row level security;
  create policy "allow all" on brycer_queue for all using (true) with check (true);

  -- Techs table
  create table techs (
    id uuid default gen_random_uuid() primary key,
    name text not null,
    phone text,
    email text,
    license_number text,
    color text default '#f05a28',
    active boolean default true,
    created_at timestamptz default now()
  );
  alter table techs enable row level security;
  create policy "allow all" on techs for all using (true) with check (true);

  -- Add assigned_to column to jobs
  alter table jobs add column if not exists assigned_to uuid references techs(id);

  -- Add service date tracking to extinguishers
  alter table extinguishers add column if not exists last_internal text;
  alter table extinguishers add column if not exists last_hydro text;

  -- Portal tokens
  create table portal_tokens (
    id uuid default gen_random_uuid() primary key,
    token text unique not null,
    location_id uuid references locations(id),
    billing_account_id uuid,
    is_active boolean default true,
    last_accessed_at timestamptz,
    created_at timestamptz default now()
  );
  alter table portal_tokens enable row level security;
  create policy "allow all" on portal_tokens for all using (true) with check (true);

  -- Service requests from portal
  create table service_requests (
    id uuid default gen_random_uuid() primary key,
    location_id uuid references locations(id),
    billing_account_id uuid,
    job_id uuid,
    requested_date date,
    reason text,
    status text default 'pending',
    created_at timestamptz default now()
  );
  alter table service_requests enable row level security;
  create policy "allow all" on service_requests for all using (true) with check (true);

  -- ═══ INVOICE DOCUMENT ATTACHMENTS (Mission: mission-briefing-invoice-attachments) ═══
  -- Run these in Supabase if not already applied:

  -- 1. po_number column on invoices (if Commander Data's deploy hasn't run yet)
  alter table invoices add column if not exists po_number text;

  -- 2. invoice_attachments table
  create table if not exists invoice_attachments (
    id uuid primary key default gen_random_uuid(),
    invoice_id uuid not null references invoices(id) on delete cascade,
    file_name text not null,
    file_path text not null,
    file_type text not null,
    file_size integer,
    label text check (label in ('work_order','po','compliance','photo','other')),
    uploaded_at timestamptz not null default now()
  );
  create index if not exists idx_invoice_attachments_invoice_id on invoice_attachments(invoice_id);
  alter table invoice_attachments enable row level security;
  create policy "allow all" on invoice_attachments for all using (true) with check (true);

  -- 3. Storage bucket: create 'invoice-attachments' bucket in Supabase Storage dashboard
  --    - Public: false
  --    - File size limit: 10MB
  --    - Allowed MIME: image/jpeg, image/png, image/heic, application/pdf
  --    Storage bucket policies (run in SQL editor):
  --    insert into storage.buckets (id, name, public, file_size_limit, allowed_mime_types)
  --    values ('invoice-attachments','invoice-attachments',false,10485760,
  --      array['image/jpeg','image/png','image/heic','application/pdf'])
  --    on conflict (id) do nothing;
  --    create policy "allow all on invoice-attachments" on storage.objects for all
  --      using (bucket_id='invoice-attachments') with check (bucket_id='invoice-attachments');
-->

async function authVerify(){

  const code=(document.getElementById('authCode')?.value||'').replace(/\D/g,'')
  if(!/^\d{6}$/.test(code)){_authErr('Enter the 6-digit code');return}
  _authBtn('authVerifyBtn',false);_authErr('')
  try{
    const r=await fetch('/api/auth-sms?action=verify',{method:'POST',headers:{'Content-Type':'application/json'},credentials:'same-origin',body:JSON.stringify({phone,code})})
    const d=await r.json().catch(()=>({}))
    if(!r.ok||!d.ok){_authErr(d.error||'Code incorrect');_authBtn('authVerifyBtn',true);const el=document.getElementById('authCode');if(el){el.value='';el.focus()};return}
    // verify only returns {ok, phone, tech_id} — re-hit check to get the
    // full tech row in one shot so window._me is populated for the first
    // render. (Avoids a double round-trip later.)
    try{
      const cr=await fetch('/api/auth-sms?action=check',{credentials:'same-origin'})
      const cd=await cr.json().catch(()=>({}))
      if(cd?.ok)window._me={phone:cd.phone,tech:cd.tech||null}
    }catch(_){}
    _unlocked=true
    document.getElementById('lockScreen').style.display='none'
    document.getElementById('app').style.display='flex'
    startApp()
  }catch(e){_authErr('Connection error');_authBtn('authVerifyBtn',true)}
}

function authBack(){

  _authBtn('authRequestBtn',true)

}

}

// NAV STACK
const OVS=['ov1','ov2','ov3','ov4']
let stk=[]
const _popTimers={}

let _lastPush=0
function push(html,opts={}){
  // debounce rapid pushes (prevents 16 overlays from multi-tap)
  if(Date.now()-_lastPush<300)return
  _lastPush=Date.now()
  let slot=OVS.find(o=>!stk.includes(o))||OVS[OVS.length-1]
  // cancel any pending cleanup timer for this slot
  if(_popTimers[slot]){clearTimeout(_popTimers[slot]);delete _popTimers[slot]}
  const el=document.getElementById(slot)
  el.innerHTML=html
  el.style.display='flex'
  if(opts.jobId)el.dataset.jobId=opts.jobId; else delete el.dataset.jobId
  requestAnimationFrame(()=>el.classList.add('open'))
  stk.push(slot)
  return slot
}

let _autoSaving=false,_manualSaving=false
function pop(){
  if(!stk.length)return
  // auto-save job data (notes + lines) before closing
  if(window._activeJobId&&_jobDataDirty)autoSaveJobData()
  // auto-save any open report before closing (skip if manual save triggered this pop)
  if(!_autoSaving&&!_manualSaving){_autoSaving=true;_autoSaveOpenReport();_autoSaving=false}
  const id=stk.pop()
  const el=document.getElementById(id)
  el.classList.remove('open')
  delete el.dataset.jobId
  _popTimers[id]=setTimeout(()=>{el.style.display='none';el.innerHTML='';delete _popTimers[id]},250)
}

function _autoSaveOpenReport(){
  // detect which report form is open by checking for specific elements
  const rptSaveBtn=$('rptSaveBtn2')||$('rptSaveBtn')
  const dcSaveBtn=document.querySelector('[onclick*="saveDryChemReport"]')
  const caSaveBtn=$('caRptSaveBtn2')||$('caRptSaveBtn')
  const extShell=$('ext-edit-shell')

  if(rptSaveBtn&&$('rpt-mfg')){
    // kitchen suppression report is open — fire save silently
    const jid=rptSaveBtn.getAttribute('onclick')?.match(/'([^']+)'/)?.[1]
    const sid=rptSaveBtn.getAttribute('onclick')?.match(/'([^']+)',\s*'([^']*)'/)
    if(jid){saveSuppReport(jid,sid?.[2]||'',true).catch(e=>console.error('auto-save supp:',e))}
    return
  }
  if(dcSaveBtn&&$('dc-sys-type')){
    // dry chem report is open — extract jobId/sysId from onclick
    const dcOnclick=dcSaveBtn.getAttribute('onclick')||''
    const dcMatch=dcOnclick.match(/saveDryChemReport\('([^']+)','([^']*)'\)/)
    if(dcMatch){saveDryChemReport(dcMatch[1],dcMatch[2],true).catch(e=>console.error('auto-save dc:',e))}
    return
  }
  if(caSaveBtn&&$('ca-agent-type')){
    // clean agent report is open
    const onclick=caSaveBtn.getAttribute('onclick')||''
    const match=onclick.match(/saveCleanAgentReport\('([^']+)','([^']*)'\)/)
    if(match){saveCleanAgentReport(match[1],match[2],true).catch(e=>console.error('auto-save ca:',e))}
    return
  }
  if(extShell&&window._extJobId){
    // extinguisher report is open
    finishExtReport(window._extJobId,true).catch(e=>console.error('auto-save ext:',e))
    return
  }
}

  // - Jobs: active OR scheduled in the last 30d OR tied to an unpaid invoice

  const calCutoff=new Date(Date.now()-7*86400000).toISOString()

  // Step 1: pull job IDs of unpaid invoices so we can include those jobs even
  // if they're old/completed. "Unpaid" = status not in (paid, void, record).

    const{data:up}=await SB.from('invoices').select('job_id').not('status','in','("paid","void","record")').not('job_id','is',null).is('deleted_at',null)
    unpaidJobIds=Array.from(new Set((up||[]).map(x=>x.job_id).filter(Boolean)))
  }catch(e){console.error('unpaid job ids:',e)}

  // Step 2: build the main jobs query with the OR filter.
  // Trim heavy/unused columns from the dashboard load: signature_data (large
  // base64), photos (array of base64), ext_report_photos (jsonb of photos),
  // and reduce the embedded location to id/name/city/address — full location
  // detail is loaded separately and looked up via D.locs.find().
  let jobsQuery=SB.from('jobs').select('id,job_number,location_id,billing_account_id,contract_id,type,scope,status,scheduled_date,scheduled_time,route_order,started_at,completed_at,technician,assigned_to,customer_notified_at,customer_arrived_at,travel_distance,travel_charge,estimated_value,notes,work_order_lines,gcal_event_id,sm8_job_number,sm8_amount,sm8_description,estimated_duration_hours,departure_alert_sent_at,confirmed_at,confirmed_by,confirmation_method,tentative,invoice_built,quote_sent_at,quote_approved_at,quote_approved_by,quote_valid_until,created_at,updated_at,deleted_at,location:locations(id,name,city,address)').is('deleted_at',null).order('updated_at',{ascending:false})
  // Include quotes (no scheduled_date) and unpaid-invoice-attached jobs
  // alongside the recent / active scope filter.
  const orParts=[`status.neq.completed`,`scheduled_date.gte.${jobCutoff}`,`status.eq.quote`]
  if(unpaidJobIds.length)orParts.push(`id.in.(${unpaidJobIds.join(',')})`)
  jobsQuery=jobsQuery.or(orParts.join(','))

  const[j,l,i,b,r,ci,td2,mz,bq,tk,sr,pt,ce,ct,cl2,rch,pr,nf,cn,jLast,iLast,pSig,exp,bills2,cb]=await Promise.all([
    jobsQuery,
    // Locations: explicit columns only. PR #9 derives equipment from invoice
    // lines (see post-load shadowing below) so no nested equipment selects.
    // Billing account nested: only fields actually read on cards/dialogs.
    SB.from('locations').select('id,name,address,city,state,zip,contact_name,contact_phone,contact_email,billing_account_id,is_brycer_jurisdiction,brycer_ahj_name,travel_charge_exempt,sms_opt_in,latitude,longitude,distance_from_base,notes,secondary_contact,secondary_phone,deleted_at,billing_account:billing_accounts(id,name,contact_name,email,phone,mazon_approved,address,city,state,zip)').is('deleted_at',null).order('name'),
    SB.from('invoices').select('*,invoice_lines(*)').is('deleted_at',null).order('date',{ascending:false}).limit(100),
    SB.from('billing_accounts').select('*').order('name'),
    SB.from('rate_card').select('key,price'),
    SB.from('custom_items').select('description,unit_price').order('description'),
    SB.from('todos').select('*').eq('done',false).is('deleted_at',null).order('created_at'),
    SB.from('mazon_queue').select('*').order('created_at',{ascending:false}),
    SB.from('brycer_queue').select('*').eq('submitted',false).order('created_at'),
    SB.from('techs').select('*').order('name'),
    SB.from('service_requests').select('*').eq('status','pending').order('created_at',{ascending:false}),
    SB.from('portal_tokens').select('*').order('created_at',{ascending:false}),
    SB.from('calendar_events').select('*').gte('start_time',calCutoff).order('start_time'),
    SB.from('contacts').select('*').order('name'),
    SB.from('contact_links').select('*,contact:contacts(*)').order('created_at'),
    SB.from('rate_card_history').select('*').is('expired_date',null).order('key'),
    SB.from('pricing_rules').select('*').eq('active',true),
    SB.from('notifications').select('*').eq('is_read',false).eq('is_dismissed',false).order('created_at',{ascending:false}).limit(50),
    SB.from('contracts').select('*').order('created_at',{ascending:false}),
    // Aggregate last-service per location across ALL completed jobs (the main
    // jobs query above is filtered to recent/active, so the customer list
    // would otherwise show "No service yet" for older completed customers).
    SB.from('jobs').select('location_id,completed_at').eq('status','completed').not('completed_at','is',null).is('deleted_at',null).order('completed_at',{ascending:false}),
    SB.from('invoices').select('location_id,date').is('deleted_at',null).order('date',{ascending:false}),
    // Pending signatures: completed jobs in the last 14 days with no
    // signature_data captured. signature_data isn't in the main jobs query
    // payload (it's a heavy column), so we ask the DB directly.
    SB.from('jobs').select('id,job_number,location_id,completed_at,scope').eq('status','completed')
      .gte('completed_at',new Date(Date.now()-14*86400000).toISOString())
      .is('signature_data',null).is('deleted_at',null).order('completed_at',{ascending:false}).limit(50),
    // Expenses (Costs tab). Owner-only — non-owner techs (Bobby etc.)

    // browser memory. Multi-tech gate, not just UI gating.

      ? SB.from('expenses').select('*').is('deleted_at',null)

    // Bills (Books / Profit First) — owner-only, same gate as expenses.

    // this filter the wire payload grows unbounded as bills accumulate.

      ? SB.from('bills').select('*').is('deleted_at',null).eq('paid',false).order('due_date',{ascending:true})
      : Promise.resolve({data: []}),
    // Cash buckets — always loaded for owners (5 rows, tiny).
    (window._me?.tech?.is_owner !== false)
      ? SB.from('cash_buckets').select('*').order('display_order')
      : Promise.resolve({data: []})
  ])
  if(j.error)console.error('jobs error:',j.error)
  if(l.error)console.error('locations error:',l.error)
  if(i.error)console.error('invoices error:',i.error)
  if(r.error)console.error('rate_card error:',r.error)

  if(cl2.error)console.error('contact_links error:',cl2.error)
  if(rch.error)console.error('rate_card_history error:',rch.error)
  if(pr.error)console.error('pricing_rules error:',pr.error)
  if(nf.error)console.error('notifications error:',nf.error)
  if(cn.error)console.error('contracts error:',cn.error)
  console.log('loaded:',j.data?.length,'jobs,',l.data?.length,'locs,',i.data?.length,'invs,',td2.data?.length,'todos')
  // Derive equipment from billing history. No manually-maintained equipment
  // table — quantities come from the most recent invoice that billed each
  // scope. est() / trkLoad() / showItemsNeeded() / buildJobLines() all read
  // l.extinguishers / l.suppression_systems / l.emergency_lights, so we
  // shadow those arrays from invoice_lines once, here.
  const invsRaw=i.data||[]
  // Strip soft-deleted embedded lines (PostgREST embeds ignore parent filters)
  invsRaw.forEach(inv=>{
    if(Array.isArray(inv.invoice_lines))inv.invoice_lines=inv.invoice_lines.filter(ln=>!ln.deleted_at)
  })
  ;(l.data||[]).forEach(loc=>{
    const locInvs=invsRaw.filter(inv=>inv.location_id===loc.id)
      .sort((a,b)=>(b.date||'').localeCompare(a.date||''))

    // Suppression systems — one per distinct "<name> Semi-Annual" line.

    locInvs.forEach(inv=>{
      const lines=inv.invoice_lines||[]
      lines.filter(ln=>/semi-annual/i.test(ln.description||'')).forEach(ln=>{

  })
  D.jobs=j.data||[];D.locs=l.data||[];D.invs=i.data||[];D.bas=b.data||[]
  const rc={};(r.data||[]).forEach(x=>rc[x.key]=+x.price);D.rc=rc

  // Build {location_id: 'YYYY-MM-DD'} map of latest service across ALL history

// ═══ AUTO-REFRESH AFTER MUTATIONS ═══
// Without this, after a delete/edit you'd return to a stale list until you
// closed and reopened the app. The wrapper marks any successful Supabase
// insert/update/upsert/delete as "dirty"; pop() then refreshes load() and
// re-renders the visible tab. load() clears the flag so explicit handler
// refreshes don't double-load.
;(function installAutoRefresh(){
  let dirty=false,refreshing=false
  // Wrap SB.from() to detect mutations
  const _origFrom=SB.from.bind(SB)
  SB.from=function(table){
    const builder=_origFrom(table)
    for(const m of ['insert','update','upsert','delete']){
      const orig=builder[m]
      if(typeof orig!=='function')continue
      builder[m]=function(...args){
        const q=orig.apply(this,args)
        if(q&&typeof q.then==='function'){
          const _then=q.then.bind(q)
          q.then=function(onFulfilled,onRejected){
            return _then(r=>{ if(r&&!r.error)dirty=true; return onFulfilled?onFulfilled(r):r },onRejected)
          }
        }
        return q
      }
    }
    return builder
  }
  // Wrap load() to clear the flag (so explicit handler refreshes aren't doubled)
  const _origLoad=load
  window.load=async function(...args){
    const r=await _origLoad.apply(this,args)
    dirty=false
    return r
  }
  // Wrap pop() to auto-refresh + re-render visible tab when dirty
  const _origPop=pop
  window.pop=function(...args){
    const r=_origPop.apply(this,args)
    if(dirty&&!refreshing){
      refreshing=true
      ;(async()=>{
        try{
          await window.load()
          const tab=document.querySelector('.nav button.on')?.dataset?.v
          const RERENDER={vJobs:'rJobs',vCust:'rCust',vMoney:'rMoney',vCal:'rCal',vTechs:'rTechs'}
          const fn=window[RERENDER[tab]]
          if(typeof fn==='function')fn()
        }catch(e){console.error('auto-refresh:',e)}
        finally{refreshing=false}
      })()
    }
    return r
  }
})()

// Returns 'red' | 'blue' | 'yellow' | 'green' | 'gray'. Use with the
// .badge-*, .card-*, .dot-*, .stat-* classes. Orange is brand-only.
function statusColor(status,context){
  const s=(status||'').toString().toLowerCase().trim()
  const map={
    // jobs
    scheduled:'blue',en_route:'blue',in_progress:'blue',active:'blue',
    completed:'green',invoiced:'green',
    overdue:'red',cancelled:'gray',
    // invoices
    draft:'gray',sent:'blue',unpaid:'yellow',
    paid:'green',partial:'yellow',record:'gray',void:'gray',factored:'yellow',
    // equipment / extinguisher
    pass:'green',good:'green',fail:'red',condemn:'red',
    replace:'red',swap:'yellow',remove_unnecessary:'yellow',remove:'yellow',
    needs_service:'yellow',expired:'red',not_inspected:'gray',
    // checklist
    'n/a':'gray',flag:'yellow',
    // brycer / compliance
    submitted:'green',pending:'yellow',failed:'red',not_required:'gray',
    // square / payment
    refunded:'yellow',processing:'blue'
  }
  return map[s]||'gray'
}

// ═══ ON-DEMAND LOCATION DETAIL ═══
// The dashboard load() pulls only recent/active jobs and the 100 most-recent
// invoices to keep startup fast — so a customer's older completed history is
// missing from D.jobs / D.invs. When the user opens a customer detail, we
// fetch the full per-customer history here and merge it into the caches so
// existing filter-by-location_id render code shows everything.
// Equipment arrays are still derived from invoice_lines (PR #9) — once the
// invoices are merged in, equipment surfaces correctly too.
async function ensureLocationDetail(locId){
  if(!locId)return null
  const loc=D.locs.find(l=>l.id===locId)
  if(!loc)return null
  try{
    const[jq,iq]=await Promise.all([
      SB.from('jobs').select('id,job_number,location_id,billing_account_id,contract_id,type,scope,status,scheduled_date,scheduled_time,route_order,started_at,completed_at,technician,assigned_to,customer_notified_at,customer_arrived_at,travel_distance,travel_charge,estimated_value,notes,work_order_lines,gcal_event_id,sm8_job_number,sm8_amount,sm8_description,estimated_duration_hours,departure_alert_sent_at,confirmed_at,confirmed_by,confirmation_method,tentative,invoice_built,created_at,updated_at,deleted_at,location:locations(id,name,city,address)').eq('location_id',locId).is('deleted_at',null).order('completed_at',{ascending:false,nullsFirst:false}),
      SB.from('invoices').select('*,invoice_lines(*)').eq('location_id',locId).is('deleted_at',null).order('date',{ascending:false})
    ])
    const jobs=jq.data||[]
    const invs=iq.data||[]
    invs.forEach(inv=>{ if(Array.isArray(inv.invoice_lines))inv.invoice_lines=inv.invoice_lines.filter(ln=>!ln.deleted_at) })
    // Merge into D.jobs / D.invs, replacing any existing entries by id
    const jobIds=new Set(jobs.map(j=>j.id))
    D.jobs=(D.jobs||[]).filter(j=>!jobIds.has(j.id)).concat(jobs)
    const invIds=new Set(invs.map(i=>i.id))
    D.invs=(D.invs||[]).filter(i=>!invIds.has(i.id)).concat(invs)
    // Re-derive equipment for this loc from its now-complete invoice line history
    // (mirrors the shadow logic at the end of load()).
    const locInvs=D.invs.filter(inv=>inv.location_id===locId).sort((a,b)=>(b.date||'').localeCompare(a.date||''))
    const extLn=locInvs.flatMap(inv=>inv.invoice_lines||[]).find(ln=>/extinguisher inspection/i.test(ln.description||''))
    const extQty=extLn?Math.max(0,Math.round(+extLn.quantity||0)):0
    loc.extinguishers=Array.from({length:extQty},()=>({type:'ABC'}))
    const seenSys=new Set(),sysList=[]
    locInvs.forEach(inv=>{
      const lns=inv.invoice_lines||[]
      lns.filter(ln=>/semi-annual/i.test(ln.description||'')).forEach(ln=>{
        const nm=(ln.description||'').replace(/\s*semi-annual\s*/i,'').trim()||'Suppression System'
        const k=nm.toLowerCase()
        if(seenSys.has(k))return
        seenSys.add(k)
        const tankLn=lns.find(x=>/additional tank/i.test(x.description||''))
        const linkLn=lns.find(x=>/fusible link/i.test(x.description||''))
        const capLn=lns.find(x=>/blow.?off cap|nozzle cap/i.test(x.description||''))
        const lc=/captiveaire.*tank/i.test(nm)?'captiveaire_tank':/captiveaire.*core/i.test(nm)?'captiveaire_core':'standard'
        sysList.push({system_type:nm,category:lc,tank_count:1+(tankLn?+tankLn.quantity||0:0),fusible_link_count:linkLn?+linkLn.quantity||0:0,nozzle_count:capLn?+capLn.quantity||0:0})
      })
    })
    loc.suppression_systems=sysList
    const elLn=locInvs.flatMap(inv=>inv.invoice_lines||[]).find(ln=>/e.?light annual|emergency.?light/i.test(ln.description||''))
    const elQty=elLn?Math.max(0,Math.round(+elLn.quantity||0)):0
    loc.emergency_lights=elQty?[{fixture_count:elQty}]:[]
  }catch(e){console.error('ensureLocationDetail:',e)}
  return loc
}

// Format YYYY-MM-DD into "January 31st, 2027" (with ordinal suffix).
// Used by the openJob status pill so dates read like a human wrote them.
function fmtFullDate(ymd){
  if(!ymd) return ''
  const m=String(ymd).match(/^(\d{4})-(\d{2})-(\d{2})/)
  if(!m) return ymd
  const y=+m[1], mo=+m[2]-1, d=+m[3]
  const months=['January','February','March','April','May','June','July','August','September','October','November','December']
  const ord=(n)=>{const s=['th','st','nd','rd'],v=n%100;return n+(s[(v-20)%10]||s[v]||s[0])}
  return `${months[mo]} ${ord(d)}, ${y}`
}

// Format HH:MM:SS or HH:MM as "9:00 AM" / "1:30 PM"
function fmtTime12(hms){
  if(!hms) return ''
  const m=String(hms).match(/^(\d{1,2}):(\d{2})/)
  if(!m) return hms
  let h=+m[1]; const mn=m[2]
  const ap=h>=12?'PM':'AM'
  h=h%12; if(h===0)h=12
  return `${h}:${mn} ${ap}`
}

// ═══ CALENDAR EVENT EXPANSION ═══
const DAY_MAP={sun:0,mon:1,tue:2,wed:3,thu:4,fri:5,sat:6}

function expandRecurring(events, rangeStart, rangeEnd){
  const rs=new Date(rangeStart),re=new Date(rangeEnd)
  const results=[]
  for(const ev of (events||[])){
    if(!ev.recurring){
      const st=new Date(ev.start_time)
      if(st>=rs&&st<=re)results.push({...ev,_expanded:false})
      continue
    }
    const rule=ev.recurrence_rule||{}
    const until=rule.until?new Date(rule.until+'T23:59:59'):re
    const effEnd=until<re?until:re
    const baseStart=new Date(ev.start_time)
    const baseEnd=new Date(ev.end_time)
    const durMs=baseEnd-baseStart

    if(rule.freq==='weekly'&&rule.days){
      const targetDays=rule.days.map(d=>DAY_MAP[d]).filter(d=>d!==undefined)
      let cur=new Date(rs)
      cur.setHours(0,0,0,0)
      while(cur<=effEnd){
        if(targetDays.includes(cur.getDay())){
          const oStart=new Date(cur)
          oStart.setHours(baseStart.getHours(),baseStart.getMinutes(),baseStart.getSeconds())
          if(oStart>=rs&&oStart<=effEnd){
            const oEnd=new Date(oStart.getTime()+durMs)
            results.push({...ev,start_time:oStart.toISOString(),end_time:oEnd.toISOString(),_expanded:true,_parent_id:ev.id})
          }
        }
        cur.setDate(cur.getDate()+1)
      }
    }else if(rule.freq==='monthly'&&rule.day_of_month){
      let cur=new Date(rs.getFullYear(),rs.getMonth(),1)
      while(cur<=effEnd){
        const dom=rule.day_of_month
        const dim=new Date(cur.getFullYear(),cur.getMonth()+1,0).getDate()
        if(dom<=dim){
          const oStart=new Date(cur.getFullYear(),cur.getMonth(),dom,baseStart.getHours(),baseStart.getMinutes())
          if(oStart>=rs&&oStart<=effEnd){
            const oEnd=new Date(oStart.getTime()+durMs)
            results.push({...ev,start_time:oStart.toISOString(),end_time:oEnd.toISOString(),_expanded:true,_parent_id:ev.id})
          }
        }
        cur.setMonth(cur.getMonth()+1)
      }
    }
  }
  return results
}

function eventsForDate(ds){
  const dayStart=new Date(ds+'T00:00:00')
  const dayEnd=new Date(ds+'T23:59:59')
  return expandRecurring(D.calEvents||[],dayStart,dayEnd)
}

function getAvailableSlots(dateString){
  const dayEvents=eventsForDate(dateString)
  const dayJobs=D.jobs.filter(j=>j.scheduled_date===dateString&&j.status!=='cancelled'&&j.status!=='completed')
  const busy=[]
  for(const ev of dayEvents){
    const sh=new Date(ev.start_time).getHours(),sm=new Date(ev.start_time).getMinutes()
    const eh=new Date(ev.end_time).getHours(),em=new Date(ev.end_time).getMinutes()
    busy.push({start:sh*60+sm,end:eh*60+em})
  }
  for(const j of dayJobs){
    const t=j.scheduled_time||'09:00'
    const[h,m]=t.split(':').map(Number)
    const startMin=h*60+m
    busy.push({start:startMin,end:startMin+90}) // 1.5hr per job
  }
  busy.sort((a,b)=>a.start-b.start)
  const workStart=7*60,workEnd=18*60
  const slots=[]
  let cursor=workStart
  for(const b of busy){
    if(b.start>cursor&&b.start>workStart){
      const s=Math.max(cursor,workStart),e=Math.min(b.start,workEnd)
      if(e-s>=30)slots.push({start:minToTime(s),end:minToTime(e)})
    }
    cursor=Math.max(cursor,b.end)
  }
  if(cursor<workEnd)slots.push({start:minToTime(cursor),end:minToTime(workEnd)})
  return slots
}
function minToTime(m){return(Math.floor(m/60)+'').padStart(2,'0')+':'+(m%60+'').padStart(2,'0')}

async function generateNotifications(){
  const t=td(),now=new Date()
  const existing=[]
  try{
    const{data}=await SB.from('notifications').select('notification_type,entity_type,entity_id,created_at').eq('is_dismissed',false).gte('created_at',new Date(now.getTime()-24*60*60*1000).toISOString())
    existing.push(...(data||[]))
  }catch(e){}
  function isDupe(type,eType,eId){return existing.some(e=>e.notification_type===type&&e.entity_type===eType&&e.entity_id===eId)}
  const batch=[]

  // 1. Equipment due — extinguisher annual inspections overdue
  for(const loc of D.locs){
    const exts=loc.extinguishers||[]
    let overdueCount=0
    exts.forEach(e=>{
      const nfpa=window.NFPA10?.[e.type]||{hydro:12,internal:6}
      // check if annual inspection likely overdue (simplified: any ext without a completed job in last 13 months)
      const locJobs=D.jobs.filter(j=>j.location_id===loc.id&&j.status==='completed'&&j.scope?.includes('extinguishers'))
      const lastInsp=locJobs.sort((a,b)=>b.completed_at?.localeCompare(a.completed_at))[0]
      if(!lastInsp||new Date(lastInsp.completed_at)<new Date(now.getTime()-13*30*24*60*60*1000))overdueCount++
    })
    if(overdueCount>0&&!isDupe('equipment_due','location',loc.id)){
      const daysSince=overdueCount
      const priority=daysSince>5?'urgent':daysSince>2?'high':'normal'
      batch.push({notification_type:'equipment_due',priority,title:'Equipment inspection due',body:`${loc.name}: ${overdueCount} extinguisher${overdueCount>1?'s':''} may need annual inspection`,entity_type:'location',entity_id:loc.id})
    }
  }

  // 2. Invoice aging — 30/60/90 day
  const unpaid=D.invs.filter(i=>!['paid','void','record','factored'].includes(i.status))
  for(const inv of unpaid){
    const invDate=new Date(inv.date)
    const days=Math.floor((now-invDate)/(1000*60*60*24))
    const loc=D.locs.find(l=>l.id===inv.location_id)
    if(days>=90&&!isDupe('invoice_90','invoice',inv.id)){
      batch.push({notification_type:'invoice_90',priority:'urgent',title:'Collection risk — 90+ days',body:`${loc?.name||'?'} ${inv.invoice_number} $${(+inv.total).toFixed(2)} (${days} days)`,entity_type:'invoice',entity_id:inv.id})
    }else if(days>=60&&!isDupe('invoice_60','invoice',inv.id)){
      batch.push({notification_type:'invoice_60',priority:'high',title:'Invoice aging — 60+ days',body:`${loc?.name||'?'} ${inv.invoice_number} $${(+inv.total).toFixed(2)}`,entity_type:'invoice',entity_id:inv.id})
    }else if(days>=30&&!isDupe('invoice_30','invoice',inv.id)){
      batch.push({notification_type:'invoice_30',priority:'normal',title:'Invoice aging — 30+ days',body:`${loc?.name||'?'} ${inv.invoice_number} $${(+inv.total).toFixed(2)}`,entity_type:'invoice',entity_id:inv.id})
    }
  }

  // 3. Brycer overdue — unsubmitted > 3 days
  for(const bq of(D.brycerQueue||[])){
    const created=new Date(bq.created_at)
    const days=Math.floor((now-created)/(1000*60*60*24))
    if(days>=3&&!isDupe('brycer_overdue','brycer',bq.id)){
      batch.push({notification_type:'brycer_overdue',priority:'urgent',title:'Brycer submission overdue',body:`${bq.location_name||'Unknown'} — ${days} days in queue`,entity_type:'brycer',entity_id:bq.id})
    }
  }

  // 4. Job reminders — today's scheduled jobs
  const todayJobs=D.jobs.filter(j=>j.status==='scheduled'&&j.scheduled_date===t)
  if(todayJobs.length&&!isDupe('daily_summary','system',null)){
    batch.push({notification_type:'daily_summary',priority:'normal',title:`${todayJobs.length} job${todayJobs.length>1?'s':''} scheduled today`,body:todayJobs.map(j=>(j.location?.name||'?')+' @ '+(j.scheduled_time||'TBD')).join(', '),entity_type:'system',entity_id:null})
  }

  if(batch.length){
    try{await SB.from('notifications').insert(batch)}catch(e){console.error('notif gen:',e)}
    await load()
    updateNotifBadge()
  }
}

// ═══ TRASH / SOFT-DELETE ═══
// Every "delete" must land here first. Writes a full snapshot to deleted_records,
// then flips the row's deleted_at. NOTHING is ever physically removed.
//   table:    supabase table name
//   filter:   {col:val} or {col:[vals]} — rows to trash
//   reason:   required — why this is being deleted
//   actor:    defaults to 'jon'
//   context:  defaults to 'app'
async function trash(table,filter,reason,actor,context){
  try{
    // 1. Fetch full rows
    let q=SB.from(table).select('*')
    for(const k of Object.keys(filter||{})){
      const v=filter[k]
      q=Array.isArray(v)?q.in(k,v):q.eq(k,v)
    }
    const{data:rows,error:fetchErr}=await q
    if(fetchErr){console.error('trash fetch:',table,fetchErr);return{error:fetchErr.message}}
    if(!rows||!rows.length)return{ok:true,count:0}
    // 2. Snapshot each row into deleted_records
    const snaps=rows.map(r=>({
      table_name:table,
      record_id:String(r.id||r.uuid||Object.values(filter).flat().join('|')),
      record_data:r,
      deleted_by:actor||'jon',
      reason:reason||'Deleted via app UI',
      context:context||'app'
    }))
    const{error:insErr}=await SB.from('deleted_records').insert(snaps)
    if(insErr)console.error('trash snap:',table,insErr)
    // 3. Flip deleted_at (soft-delete). Target rows only — we already filtered above.
    const ids=rows.map(r=>r.id).filter(Boolean)
    if(ids.length){
      const{error:updErr}=await SB.from(table).update({deleted_at:new Date().toISOString()}).in('id',ids)
      if(updErr){console.error('trash update:',table,updErr);return{error:updErr.message}}
    }
    return{ok:true,count:rows.length}

async function uploadDocument(blob, filename, docType, entityType, entityId, metadata={}){
  const path=`${docType}/${entityId}/${Date.now()}-${filename}`
  const{data,error}=await SB.storage.from('sa-documents').upload(path,blob,{contentType:blob.type})
  if(error)throw error
  const{data:{publicUrl}}=SB.storage.from('sa-documents').getPublicUrl(path)
  await SB.from('documents').insert({
    doc_type:docType,filename,storage_path:path,storage_url:publicUrl,

    entity_type:entityType,entity_id:entityId,
    uploaded_by:'system',metadata
  })
  return publicUrl
}

const fmt=n=>'$'+(+n||0).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2})

const unesc=s=>(s||'').replace(/&#39;/g,"'").replace(/&quot;/g,'"').replace(/&amp;/g,'&')

function cart(s){const t=s.system_type||'';if(t.includes('R-102')||t.includes('Piranha'))return s.tank_count>1?'LT-30':'LT-10';if(t.includes('Pyro')||t.includes('Knight'))return '16g CO2';if(t.includes('Buck'))return 'Buckeye N2';if(t.includes('Kidde'))return 'Kidde XV N2';return 'Cart'}

function est(j){
  const l=D.locs?.find(x=>x.id===(j.location_id||j.location?.id))||j.location||{},rc=new Proxy({},{get:(_,key)=>getRate(key)}),sc=j.scope||[];let t=0
  if(sc.includes('extinguishers'))t+=(l.extinguishers?.length||0)*(rc.extinguisher_inspection||20)
  if(sc.includes('suppression'))for(const s of(l.suppression_systems||[])){
    let b=rc.suppression_standard||250
    if(s.category==='captiveaire_tank')b=rc.suppression_captiveaire_tank||450
    if(s.category==='captiveaire_core')b=rc.suppression_captiveaire_core||650
    t+=b+((s.tank_count-1)*(rc.suppression_additional_tank||50))+(s.fusible_link_count||0)*(rc.fusible_link||25)+(s.nozzle_count||0)*(rc.metal_blowoff_cap||25)
  }
  if(sc.includes('elights'))t+=(l.emergency_lights?.[0]?.fixture_count||0)*(rc.emergency_light||20)
  return t
}

function trkLoad(jobs){
  let tg=0,lk=0,cp=0,ct=[]
  jobs.forEach(j=>{const l=D.locs?.find(x=>x.id===(j.location_id||j.location?.id))||j.location||{},sc=j.scope||[]
    if(sc.includes('extinguishers'))tg+=l.extinguishers?.length||0
    if(sc.includes('suppression'))for(const s of(l.suppression_systems||[])){lk+=s.fusible_link_count||0;cp+=s.nozzle_count||0;ct.push(cart(s))}
  })
  return{tg,lk,cp,ct}
}

// swipe-to-delete handler
function initSwipe(el,onDelete){
  let sx=0,sy=0,swiping=false,moved=false
  const inner=el.querySelector('.swipe-inner')
  if(!inner)return
  el.addEventListener('touchstart',e=>{
    if(e.target.closest('.swipe-del'))return
    sx=e.touches[0].clientX;sy=e.touches[0].clientY;swiping=true;moved=false
  },{passive:true})
  el.addEventListener('touchmove',e=>{
    if(!swiping)return
    const dx=e.touches[0].clientX-sx,dy=Math.abs(e.touches[0].clientY-sy)
    if(dy>30){swiping=false;inner.style.transform='';return}
    if(dx<-10){moved=true;inner.style.transition='none';inner.style.transform=`translateX(${Math.max(dx,-70)}px)`}
  },{passive:true})
  el.addEventListener('touchend',e=>{
    if(e.target.closest('.swipe-del'))return
    swiping=false;inner.style.transition='transform .2s ease'
    if(!moved){inner.style.transform='';return}
    const dx=e.changedTouches[0].clientX-sx
    if(dx<-45){
      inner.style.transform='translateX(-70px)'
    }else{inner.style.transform=''}
    moved=false
  },{passive:true})
  // delete button click
  const delBtn=el.querySelector('.swipe-del')
  if(delBtn)delBtn.addEventListener('click',()=>{
    el.style.transition='all .2s';el.style.maxHeight=el.offsetHeight+'px'
    requestAnimationFrame(()=>{el.style.maxHeight='0';el.style.opacity='0';el.style.marginBottom='0';el.style.padding='0'})
    setTimeout(()=>{el.remove();onDelete()},250)
  })
}

  'cleburne':{lat:32.350,lng:-97.386},'burleson':{lat:32.542,lng:-97.321}
}
const BASE={lat:32.837,lng:-97.082}
const BASE_ADDR='3801 Alder Trail, Euless, TX 76040'

function cityCoords(city){
  if(!city)return BASE
  return CITY_COORDS[city.toLowerCase().trim()]||BASE
}
function distBetween(a,b){
  const R=3959,dLat=(b.lat-a.lat)*Math.PI/180,dLng=(b.lng-a.lng)*Math.PI/180
  const x=Math.sin(dLat/2)**2+Math.cos(a.lat*Math.PI/180)*Math.cos(b.lat*Math.PI/180)*Math.sin(dLng/2)**2
  return R*2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x))
}
function locAddr(l){return[l.address,l.city,l.state||'TX',l.zip].filter(Boolean).join(', ')}

// ─── Google Maps API with session cache ───
async function cachedMapsCall(action,params){
  const cacheKey='maps_'+JSON.stringify({action,params})
  try{const c=sessionStorage.getItem(cacheKey);if(c){const{data,ts}=JSON.parse(c);if(Date.now()-ts<15*60*1000)return data}}catch(e){}
  const res=await fetch('/api/maps',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({action,params})})
  const data=await res.json()
  try{sessionStorage.setItem(cacheKey,JSON.stringify({data,ts:Date.now()}))}catch(e){}
  return data
}

// ─── Fallback routing (Haversine) ───
function _fallbackRouteJobs(jobs){
  let remaining=[...jobs],route=[],cur=BASE
  while(remaining.length){
    let best=null,bestD=Infinity,bestI=0
    remaining.forEach((j,i)=>{const c=cityCoords(j.location?.city);const d=distBetween(cur,c);if(d<bestD){bestD=d;best=j;bestI=i}})
    route.push({job:best,dist:Math.round(bestD),duration:Math.round(bestD*2.2),durationText:Math.round(bestD*2.2)+' min'})
    cur=cityCoords(best.location?.city)
    remaining.splice(bestI,1)
  }
  return route
}
function _fallbackTravelCharge(loc){
  if(!loc)return{charge:0,desc:'',miles:0}
  const dest=cityCoords(loc.city)
  const driveMi=Math.round(distBetween(BASE,dest)*1.25)
  if(driveMi<=50)return{charge:0,desc:'',miles:driveMi}
  const excessMi=driveMi-50,rtMi=excessMi*2,rtHrs=rtMi/55
  return{charge:Math.round(rtHrs*250+rtMi*0.67),desc:`Travel — ${excessMi} mi over 50-mi radius, ${rtHrs.toFixed(1)} hrs RT`,miles:driveMi}
}

// ─── Google Maps routing ───
async function routeJobs(jobs){
  // filter out test jobs and jobs with no real address
  jobs=jobs.filter(j=>{const n=(j.location?.name||'').toUpperCase();const a=locAddr(j.location||{});return!n.includes('TEST')&&a.match(/\d/)})
  const stops=jobs.map(j=>{const l=j.location||{};return{job:j,address:locAddr(l)}}).filter(s=>s.address.length>5)
  if(!stops.length)return _fallbackRouteJobs(jobs)
  if(stops.length===1){
    try{
      const data=await cachedMapsCall('distance_matrix',{origins:[BASE_ADDR],destinations:[stops[0].address]})
      const el=data.rows?.[0]?.elements?.[0]
      if(el?.status==='OK')return[{job:stops[0].job,address:stops[0].address,dist:Math.round(el.distance.value/1609.34),duration:Math.round(el.duration.value/60),durationText:el.duration.text}]
    }catch(e){}
    return _fallbackRouteJobs(jobs)
  }
  try{
    const allAddr=stops.map(s=>s.address)
    const data=await cachedMapsCall('directions',{origin:BASE_ADDR,destination:allAddr[allAddr.length-1],waypoints:allAddr.slice(0,-1)})
    if(data.status==='OK'&&data.routes?.[0]){
      const route=data.routes[0],order=route.waypoint_order||[],legs=route.legs||[]
      const optimized=[]
      if(order.length){
        // legs[0] = origin→first waypoint, legs[1] = first→second, etc.
        // order[i] maps waypoint index to stop index
        const reordered=[...order.map(idx=>stops[idx]),stops[stops.length-1]]
        reordered.forEach((s,i)=>optimized.push({job:s.job,address:s.address,dist:Math.round((legs[i]?.distance?.value||0)/1609.34),duration:Math.round((legs[i]?.duration?.value||0)/60),durationText:legs[i]?.duration?.text||''}))
      }else{
        // no optimization — legs map 1:1 with stops
        stops.forEach((s,i)=>optimized.push({job:s.job,address:s.address,dist:Math.round((legs[i]?.distance?.value||0)/1609.34),duration:Math.round((legs[i]?.duration?.value||0)/60),durationText:legs[i]?.duration?.text||''}))
      }
      return optimized
    }
  }catch(e){console.error('Google route error:',e)}
  return _fallbackRouteJobs(jobs)
}

async function calcTravelCharge(loc){
  if(!loc)return{charge:0,desc:'',miles:0}
  const addr=locAddr(loc)
  if(addr.length<5)return _fallbackTravelCharge(loc)
  try{
    const data=await cachedMapsCall('distance_matrix',{origins:[BASE_ADDR],destinations:[addr]})
    if(data.status==='OK'&&data.rows?.[0]?.elements?.[0]?.status==='OK'){
      const el=data.rows[0].elements[0],driveMi=Math.round(el.distance.value/1609.34)
      if(driveMi<=50)return{charge:0,desc:'',miles:driveMi}
      const excessMi=driveMi-50,rtMi=excessMi*2,rtHrs=rtMi/55
      return{charge:Math.round(rtHrs*250+rtMi*0.67),desc:`Travel — ${driveMi} mi drive, ${excessMi} mi over 50-mi radius, ${rtHrs.toFixed(1)} hrs RT`,miles:driveMi,duration:Math.round(el.duration.value/60)}
    }
  }catch(e){console.error('Distance calc error:',e)}
  return _fallbackTravelCharge(loc)
}

  function weekOf(d){const dt=new Date(d+'T12:00:00');const jan1=new Date(dt.getFullYear(),0,1);return Math.ceil(((dt-jan1)/86400000+jan1.getDay()+1)/7)}

  const thisMonthJobs=jobs.filter(j=>j.scheduled_date&&j.scheduled_date.startsWith(thisYear+'-'+(thisMonth+1).toString().padStart(2,'0'))).length
  const lastMonthKey=thisMonth===0?(thisYear-1)+'-12':thisYear+'-'+thisMonth.toString().padStart(2,'0')
  const lastMonthJobs=jobs.filter(j=>j.scheduled_date&&j.scheduled_date.startsWith(lastMonthKey)).length
  const jobsDelta=thisMonthJobs-lastMonthJobs
  const avgJobPrior=(()=>{const pj=jobs.filter(j=>j.status==='completed'&&j.scheduled_date&&j.scheduled_date.startsWith((thisYear-1)+''));const pi=invs.filter(i=>i.status==='paid'&&i.date&&i.date.startsWith((thisYear-1)+''));return pj.length?pi.reduce((s,i)=>s+(+i.total||0),0)/pj.length:0})()
  const avgDelta=avgJobPrior?Math.round((avgJobValue-avgJobPrior)/avgJobPrior*100):null
  function deltaPill(v,isPct=true,isMoney=false){
    if(v===null||v===undefined)return''
    const pos=v>0,sign=pos?'+':'',c=pos?'var(--status-green)':v<0?'var(--status-red)':'var(--g1)'
    const txt=isMoney?sign+fmt(Math.abs(v)):(isPct?sign+v+'%':sign+v)
    return`<span style="font-family:'JetBrains Mono',ui-monospace,monospace;font-size:11px;font-weight:700;color:${c};margin-top:6px;display:inline-block">${txt}${isPct?' YTD':''}</span>`
  }
  h+=`<div style="margin:4px 0 18px">
    <div style="font-family:'Fraunces',Georgia,serif;font-size:22px;font-weight:500;letter-spacing:-.3px">Business snapshot</div>
    <div style="font-size:11px;color:var(--g1);font-family:'JetBrains Mono',ui-monospace,monospace;letter-spacing:.1em;text-transform:uppercase;margin-top:3px">FY ${thisYear} · As of ${now.toLocaleDateString('en-US',{month:'short',day:'numeric'})}</div>
  </div>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px">
    <div style="background:var(--c1);border:1px solid var(--b1);border-radius:var(--r);padding:16px 14px">
      <div style="font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:1.2px;color:var(--g1);margin-bottom:8px">Revenue YTD</div>
      <div style="font-family:'Fraunces',Georgia,serif;font-size:26px;font-weight:500;color:var(--w);font-variant-numeric:tabular-nums;letter-spacing:-.3px;line-height:1">${fmt(ytdRev)}</div>
      ${deltaPill(revDeltaPct)}
    </div>
    <div style="background:var(--c1);border:1px solid var(--b1);border-radius:var(--r);padding:16px 14px">
      <div style="font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:1.2px;color:var(--g1);margin-bottom:8px">Outstanding</div>
      <div style="font-family:'Fraunces',Georgia,serif;font-size:26px;font-weight:500;color:${totalOutstanding>0?'var(--status-yellow)':'var(--w)'};font-variant-numeric:tabular-nums;letter-spacing:-.3px;line-height:1">${fmt(totalOutstanding)}</div>
      <div style="font-family:'JetBrains Mono',ui-monospace,monospace;font-size:11px;color:var(--g1);margin-top:6px">${unpaid.length} open inv</div>
    </div>
    <div style="background:var(--c1);border:1px solid var(--b1);border-radius:var(--r);padding:16px 14px">
      <div style="font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:1.2px;color:var(--g1);margin-bottom:8px">Jobs this month</div>
      <div style="font-family:'Fraunces',Georgia,serif;font-size:26px;font-weight:500;color:var(--w);font-variant-numeric:tabular-nums;letter-spacing:-.3px;line-height:1">${thisMonthJobs}</div>
      ${deltaPill(jobsDelta,false)}
    </div>
    <div style="background:var(--c1);border:1px solid var(--b1);border-radius:var(--r);padding:16px 14px">
      <div style="font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:1.2px;color:var(--g1);margin-bottom:8px">Avg job value</div>
      <div style="font-family:'Fraunces',Georgia,serif;font-size:26px;font-weight:500;color:var(--w);font-variant-numeric:tabular-nums;letter-spacing:-.3px;line-height:1">${fmt(avgJobValue)}</div>
      ${deltaPill(avgDelta)}
    </div>
  </div>`

  // BUSINESS SNAPSHOT
  h+=`<div class="ds"><div class="ds-t">Business Snapshot</div>
    <div class="ds-row"><div class="ds-lbl">Active Clients (12mo)</div><div class="ds-val">${activeClients}</div></div>
    <div class="ds-row"><div class="ds-lbl">Total Clients</div><div class="ds-val">${totalClients}</div></div>
    <div class="ds-row"><div class="ds-lbl">Completed Jobs</div><div class="ds-val">${completedJobs}</div></div>
    <div class="ds-row"><div class="ds-lbl">Completion Rate</div><div class="ds-val">${totalJobs?(completedJobs/totalJobs*100).toFixed(0)+'%':'—'}</div></div>
    <div class="ds-row"><div class="ds-lbl">Extinguishers Managed</div><div class="ds-val">${totalExt}</div></div>
    <div class="ds-row"><div class="ds-lbl">Suppression Systems</div><div class="ds-val">${totalSys}</div></div>
    <div class="ds-row"><div class="ds-lbl">E-Light Fixtures</div><div class="ds-val">${totalLights}</div></div>
    <div class="ds-row"><div class="ds-lbl">Brycer Locations</div><div class="ds-val">${brycerLocs}</div></div>
  </div>`

  // AR AGING — anomaly card + stacked bar
  const arTotal=aging.current+aging.d30+aging.d60+aging.over90
  const over60=aging.d60+aging.over90
  const over60Pct=arTotal?over60/arTotal:0
  h+=`<div class="ds"><div class="ds-t">Accounts Receivable Aging</div>`
  if(arTotal>0&&over60Pct>=0.5){
    const pctRound=Math.round(over60Pct*100)
    h+=`<div style="background:var(--bads);border-left:3px solid var(--bad);border-radius:var(--rs);padding:12px 14px;margin-bottom:12px">
      <div style="font-size:12px;font-weight:800;color:var(--bad);letter-spacing:.3px">⚠ Collection anomaly</div>
      <div style="font-size:12px;color:var(--w2);margin-top:4px;line-height:1.5">${pctRound}% of receivables are 60+ days old (${fmt(over60)}). Review collections.</div>
    </div>`
  }
  if(arTotal>0){
    const pc=n=>(n/arTotal*100).toFixed(1)+'%'
    h+=`<div style="margin-bottom:12px">
      <div style="display:flex;height:10px;border-radius:4px;overflow:hidden;background:var(--c2);margin-bottom:8px">
        ${aging.current?`<div style="width:${pc(aging.current)};background:var(--status-green)" title="Current: ${fmt(aging.current)}"></div>`:''}
        ${aging.d30?`<div style="width:${pc(aging.d30)};background:var(--status-yellow)" title="31-60: ${fmt(aging.d30)}"></div>`:''}
        ${aging.d60?`<div style="width:${pc(aging.d60)};background:#F59E0B" title="61-90: ${fmt(aging.d60)}"></div>`:''}
        ${aging.over90?`<div style="width:${pc(aging.over90)};background:var(--status-red)" title="90+: ${fmt(aging.over90)}"></div>`:''}
      </div>
      <div style="display:flex;justify-content:space-between;font-family:'JetBrains Mono',ui-monospace,monospace;font-size:9px;color:var(--g1);letter-spacing:.05em">
        <span>0</span><span>30</span><span>60</span><span>90</span><span>90+</span>
      </div>
    </div>`
  }
  h+=`
    <div class="ds-row"><div class="ds-lbl"><span class="status-dot dot-green"></span> Current (0-30d)</div><div class="ds-val" style="color:var(--status-green);font-variant-numeric:tabular-nums">${fmt(aging.current)}</div></div>
    <div class="ds-row"><div class="ds-lbl"><span class="status-dot dot-yellow"></span> 31-60 days</div><div class="ds-val" style="color:var(--status-yellow);font-variant-numeric:tabular-nums">${fmt(aging.d30)}</div></div>
    <div class="ds-row"><div class="ds-lbl"><span class="status-dot" style="background:#F59E0B"></span> 61-90 days</div><div class="ds-val" style="color:#F59E0B;font-variant-numeric:tabular-nums">${fmt(aging.d60)}</div></div>
    <div class="ds-row"><div class="ds-lbl"><span class="status-dot dot-red"></span> 90+ days</div><div class="ds-val" style="color:var(--status-red);font-variant-numeric:tabular-nums">${fmt(aging.over90)}</div></div>
    <div class="ds-row" style="border-top:2px solid var(--b1)"><div class="ds-lbl" style="font-weight:800;color:var(--w)">Total Outstanding</div><div class="ds-val" style="font-weight:800;color:var(--status-yellow);font-variant-numeric:tabular-nums">${fmt(arTotal)}</div></div>
  </div>`

  // WEEKLY (last 8 weeks)
  h+=`<div class="ds"><div class="ds-t">Weekly Breakdown</div>`
  weeks.forEach(w=>{
    const rev=w.invs.filter(i=>i.status==='paid').reduce((s,i)=>s+(+i.total||0),0)
    const billed=w.invs.reduce((s,i)=>s+(+i.total||0),0)
    h+=`<div class="ds-row">
      <div class="ds-lbl" style="min-width:120px">${w.label}</div>
      <div style="flex:1;display:flex;gap:12px;justify-content:flex-end;font-size:12px">
        <span style="color:var(--g1)">${w.jobs.length} jobs</span>
        <span style="color:var(--ok);font-weight:700">${fmt(rev)}</span>
      </div>
    </div>`
  })
  h+=`</div>`

  // MONTHLY (current year) — collected/billed progress bar leads
  h+=`<div class="ds"><div class="ds-t">Monthly — ${thisYear}</div>`
  const monthNames=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec']
  months.forEach(key=>{
    const mInvs=invsByMonth[key]||[]
    const mJobs=jobsByMonth[key]||[]
    const rev=mInvs.filter(i=>i.status==='paid').reduce((s,i)=>s+(+i.total||0),0)
    const billed=mInvs.reduce((s,i)=>s+(+i.total||0),0)
    const mi=parseInt(key.split('-')[1])-1
    const pct=billed?Math.min(1,rev/billed):0
    const pctStr=billed?Math.round(pct*100)+'%':'—'
    const barColor=pct>=0.8?'var(--status-green)':pct>=0.6?'var(--warn)':'var(--status-red)'
    h+=`<div style="padding:10px 0;border-bottom:1px solid rgba(42,47,62,.6)">
      <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:6px">
        <div style="font-weight:700;font-size:13px;color:var(--w)">${monthNames[mi]}</div>
        <div style="font-family:'JetBrains Mono',ui-monospace,monospace;font-size:11px;color:var(--g1);letter-spacing:.05em">${mJobs.length} job${mJobs.length===1?'':'s'} · ${pctStr} collected</div>
      </div>
      <div style="display:flex;height:6px;border-radius:3px;overflow:hidden;background:var(--c2);margin-bottom:6px">
        ${billed?`<div style="width:${(pct*100).toFixed(1)}%;background:${barColor};transition:width .2s"></div>`:''}
      </div>
      <div style="display:flex;justify-content:space-between;font-size:11px;font-variant-numeric:tabular-nums">
        <span style="color:var(--g1)">Billed ${fmt(billed)}</span>
        <span style="color:var(--ok);font-weight:700">${fmt(rev)}</span>
      </div>
    </div>`
  })
  h+=`</div>`

  // YEARLY
  h+=`<div class="ds"><div class="ds-t">Yearly Summary</div>`
  years.forEach(yr=>{
    const yInvs=invsByYear[yr]||[]
    const yJobs=jobsByYear[yr]||[]
    const rev=yInvs.filter(i=>i.status==='paid').reduce((s,i)=>s+(+i.total||0),0)
    const billed=yInvs.reduce((s,i)=>s+(+i.total||0),0)
    const clients=new Set(yJobs.map(j=>j.location_id)).size
    h+=`<div style="background:var(--c1);border:1px solid var(--b1);border-radius:var(--rs);padding:14px;margin-bottom:8px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
        <span style="font-size:18px;font-weight:900">${yr}</span>
        <span style="font-size:18px;font-weight:900;color:var(--ok)">${fmt(rev)}</span>
      </div>
      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;font-size:11px">
        <div><div style="color:var(--g1)">Jobs</div><div style="font-weight:800;font-size:14px">${yJobs.length}</div></div>
        <div><div style="color:var(--g1)">Billed</div><div style="font-weight:800;font-size:14px">${fmt(billed)}</div></div>
        <div><div style="color:var(--g1)">Clients</div><div style="font-weight:800;font-size:14px">${clients}</div></div>
      </div>
    </div>`
  })
  h+=`</div>`

  // TOP CLIENTS
  h+=`<div class="ds"><div class="ds-t">Top Clients by Revenue</div>`
  topClients.forEach((c,i)=>{
    h+=`<div class="ds-row">
      <div class="ds-lbl" style="flex:1"><span style="color:var(--fire);font-weight:800;margin-right:6px">${i+1}.</span>${esc(c.name)}${c.city?' <span style="color:var(--g2)">'+esc(c.city)+'</span>':''}</div>
      <div class="ds-val" style="color:var(--ok);font-weight:800">${fmt(c.rev)}</div>
    </div>`
  })
  h+=`</div>`

  // RECURRING REVENUE INDICATOR
  const recurringClients=new Set()
  const jobsByLoc=groupBy(jobs.filter(j=>j.status==='completed'),j=>j.location_id)
  Object.entries(jobsByLoc).forEach(([lid,jbs])=>{if(jbs.length>=2)recurringClients.add(lid)})
  const recurringPct=totalClients?(recurringClients.size/totalClients*100).toFixed(0):0

  h+=`<div class="ds"><div class="ds-t">Buyer Metrics</div>
    <div class="ds-row"><div class="ds-lbl">Recurring Clients (2+ jobs)</div><div class="ds-val">${recurringClients.size} (${recurringPct}%)</div></div>
    <div class="ds-row"><div class="ds-lbl">Avg Revenue per Client</div><div class="ds-val">${fmt(activeClients?totalRev/activeClients:0)}</div></div>
    <div class="ds-row"><div class="ds-lbl">Equipment Under Management</div><div class="ds-val">${totalExt+totalSys} units</div></div>
    <div class="ds-row"><div class="ds-lbl">Service Locations</div><div class="ds-val">${totalClients}</div></div>
    <div class="ds-row"><div class="ds-lbl">Compliance Jurisdictions</div><div class="ds-val">${brycerLocs} Brycer</div></div>
  </div>`

  // RATE CARD & PRICING RULES
  h+=`<div class="ds"><div class="ds-t">Rate Card</div>`
  const currentRates=D.currentRates||[]
  const oldRatesP=SB.from('rate_card_history').select('*').not('expired_date','is',null).order('key')
  oldRatesP.then(({data:oldRates})=>{
    const el=$('rate-comparison');if(!el)return
    const old=(oldRates||[])
    let rh=''
    currentRates.forEach(r=>{
      const prev=old.find(o=>o.key===r.key)
      const diff=prev?((+r.price-(+prev.price))/(+prev.price)*100).toFixed(0):null
      rh+=`<div class="ds-row">
        <div class="ds-lbl" style="flex:1">${r.key.replace(/_/g,' ')}</div>
        ${prev?`<div style="font-size:10px;color:var(--g2);text-decoration:line-through;margin-right:8px">$${(+prev.price).toFixed(2)}</div>`:''}
        <div class="ds-val" style="color:var(--ok)">$${(+r.price).toFixed(2)}</div>
        ${diff?`<div style="font-size:9px;font-weight:800;color:var(--fire);margin-left:4px">+${diff}%</div>`:''}
      </div>`
    })
    el.innerHTML=rh||'<div style="color:var(--g2);padding:4px 0">No versioned rates</div>'
  })
  h+=`<div id="rate-comparison" style="font-size:12px;color:var(--g2);padding:4px 0">Loading...</div>`
  const rules=D.pricingRules||[]
  if(rules.length){
    h+=`<div style="margin-top:8px;font-size:11px;font-weight:700;color:var(--g1)">Active Pricing Rules</div>`
    rules.forEach(r=>{
      h+=`<div class="ds-row"><div class="ds-lbl" style="flex:1">${esc(r.description||r.rule_type)}</div><div class="ds-val" style="color:var(--info)">${r.percentage}%</div></div>`
    })
  }
  h+=`</div>`

  // ACTIVITY LOG
  h+=`<div class="ds"><div class="ds-t" style="display:flex;justify-content:space-between;align-items:center">
    <span>Activity Log</span>
    <select id="audit-filter" onchange="filterAuditLog()" style="font-size:11px;padding:4px 8px;border-radius:var(--rs);background:var(--c2);border:1px solid var(--b1);color:var(--w)">
      <option value="">All</option>
      <option value="job">Jobs</option>
      <option value="invoice">Invoices</option>
      <option value="location">Clients</option>
      <option value="contact">Contacts</option>
    </select>
  </div><div id="audit-log-list" style="font-size:12px;color:var(--g2);padding:4px 0">Loading...</div></div>`
  setTimeout(async()=>{
    const el=$('audit-log-list');if(!el)return
    try{
      const{data}=await SB.from('audit_log').select('*').order('created_at',{ascending:false}).limit(50)
      window._auditData=data||[]
      renderAuditLog(data||[])
    }catch(e){el.innerHTML='Could not load audit log'}
  },100)

  // PRINT BUTTONS
  h+=`<div class="ds"><div class="ds-t">Print / Export</div>
    <button class="trk-btn trk-go" style="margin-bottom:8px;font-size:13px" onclick="printFullReport()">📄 Print Full Business Report</button>
    <button class="trk-btn" style="margin-bottom:8px;background:var(--c2);border:1.5px solid var(--b1);color:var(--w2);font-size:12px" onclick="printSection('monthly')">📄 Monthly Revenue Report — ${thisYear}</button>
    <button class="trk-btn" style="margin-bottom:8px;background:var(--c2);border:1.5px solid var(--b1);color:var(--w2);font-size:12px" onclick="printSection('ar')">📄 Accounts Receivable Report</button>
    <button class="trk-btn" style="margin-bottom:8px;background:var(--c2);border:1.5px solid var(--b1);color:var(--w2);font-size:12px" onclick="printSection('clients')">📄 Client List</button>
    <button class="trk-btn" style="margin-bottom:8px;background:var(--c2);border:1.5px solid var(--b1);color:var(--w2);font-size:12px" onclick="printSection('equipment')">📄 Equipment Inventory</button>
  </div>`

  // stash data for print functions
  window._rptData={invs,jobs,locs,totalRev,totalOutstanding,totalJobs,completedJobs,activeClients,totalClients,avgJobValue,aging,weeks,months,invsByMonth,jobsByMonth,years,invsByYear,jobsByYear,topClients,recurringClients,recurringPct,totalExt,totalSys,totalLights,brycerLocs,thisYear,monthNames}

  h+=`</div>`
  push(h)
}

function renderAuditLog(entries){
  const el=$('audit-log-list');if(!el)return
  if(!entries.length){el.innerHTML='<div style="color:var(--g2);padding:8px 0">No activity yet</div>';return}
  const icons={jon:'👤',ai_chat:'🤖',customer_portal:'🌐',system:'⚙️'}
  el.innerHTML=entries.map(e=>{
    const dt=new Date(e.created_at)
    const ts=dt.toLocaleDateString('en-US',{month:'short',day:'numeric'})+' '+dt.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'})
    const icon=icons[e.actor]||'📝'
    return`<div style="display:flex;gap:8px;padding:8px 0;border-bottom:1px solid var(--b1);align-items:flex-start;cursor:pointer" onclick="navigateAudit('${e.entity_type}','${e.entity_id||''}')">
      <span style="font-size:14px;flex-shrink:0">${icon}</span>
      <div style="flex:1;min-width:0">
        <div style="font-size:12px;font-weight:600;color:var(--w)">${esc(e.summary||e.action)}</div>
        <div style="font-size:10px;color:var(--g2);margin-top:2px">${ts} · ${e.entity_type} · ${e.actor}</div>
      </div>
    </div>`
  }).join('')
}

function filterAuditLog(){
  const f=$('audit-filter')?.value||''
  const all=window._auditData||[]
  renderAuditLog(f?all.filter(e=>e.entity_type===f):all)
}

function navigateAudit(type,id){
  if(!id)return
  if(type==='job')openJob(id)
  else if(type==='location')openCust(id)
  else if(type==='invoice')openInvDetail(id)
}

function printFullReport(){
  const d=window._rptData;if(!d)return
  const html=buildPrintReport('full',d)
  const w=window.open('','_blank');if(w){w.document.write(html);w.document.close()}
}

function printSection(type){
  const d=window._rptData;if(!d)return
  const html=buildPrintReport(type,d)
  const w=window.open('','_blank');if(w){w.document.write(html);w.document.close()}
}

function buildPrintReport(type,d){
  const today=new Date().toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'})
  let body=''

  if(type==='full'||type==='monthly'){
    body+=`<h2>Revenue Report — ${d.thisYear}</h2>
    <table><tr><th>Month</th><th style="text-align:right">Jobs</th><th style="text-align:right">Billed</th><th style="text-align:right">Collected</th></tr>`
    let totalBilled=0,totalCollected=0,totalJobsYr=0
    d.months.forEach(key=>{
      const mInvs=d.invsByMonth[key]||[]
      const mJobs=d.jobsByMonth[key]||[]
      const rev=mInvs.filter(i=>i.status==='paid').reduce((s,i)=>s+(+i.total||0),0)
      const billed=mInvs.reduce((s,i)=>s+(+i.total||0),0)
      totalBilled+=billed;totalCollected+=rev;totalJobsYr+=mJobs.length
      const mi=parseInt(key.split('-')[1])-1
      body+=`<tr><td>${d.monthNames[mi]} ${d.thisYear}</td><td style="text-align:right">${mJobs.length}</td><td style="text-align:right">$${billed.toFixed(2)}</td><td style="text-align:right">$${rev.toFixed(2)}</td></tr>`
    })
    body+=`<tr style="font-weight:900;border-top:2px solid #000"><td>TOTAL</td><td style="text-align:right">${totalJobsYr}</td><td style="text-align:right">$${totalBilled.toFixed(2)}</td><td style="text-align:right">$${totalCollected.toFixed(2)}</td></tr></table>`
  }

  if(type==='full'){
    body+=`<div style="page-break-before:always"></div>`
    body+=`<h2>Yearly Summary</h2><table><tr><th>Year</th><th style="text-align:right">Jobs</th><th style="text-align:right">Revenue</th><th style="text-align:right">Clients</th></tr>`
    d.years.forEach(yr=>{
      const yInvs=d.invsByYear[yr]||[]
      const yJobs=d.jobsByYear[yr]||[]
      const rev=yInvs.filter(i=>i.status==='paid').reduce((s,i)=>s+(+i.total||0),0)
      const clients=new Set(yJobs.map(j=>j.location_id)).size
      body+=`<tr><td>${yr}</td><td style="text-align:right">${yJobs.length}</td><td style="text-align:right">$${rev.toFixed(2)}</td><td style="text-align:right">${clients}</td></tr>`
    })
    body+=`</table>`
  }

  if(type==='full'||type==='ar'){
    if(type==='full')body+=`<div style="page-break-before:always"></div>`
    body+=`<h2>Accounts Receivable Aging</h2>
    <table><tr><th>Period</th><th style="text-align:right">Amount</th></tr>
    <tr><td>Current (0-30 days)</td><td style="text-align:right">$${d.aging.current.toFixed(2)}</td></tr>
    <tr><td>31-60 days</td><td style="text-align:right">$${d.aging.d30.toFixed(2)}</td></tr>
    <tr><td>61-90 days</td><td style="text-align:right">$${d.aging.d60.toFixed(2)}</td></tr>
    <tr><td>90+ days</td><td style="text-align:right">$${d.aging.over90.toFixed(2)}</td></tr>
    <tr style="font-weight:900;border-top:2px solid #000"><td>TOTAL</td><td style="text-align:right">$${(d.aging.current+d.aging.d30+d.aging.d60+d.aging.over90).toFixed(2)}</td></tr></table>`
    // unpaid invoice detail
    const unpaid=d.invs.filter(i=>!['paid','void','record'].includes(i.status)&&i.date).sort((a,b)=>a.date.localeCompare(b.date))
    if(unpaid.length){
      body+=`<h3>Unpaid Invoice Detail</h3><table><tr><th>Invoice</th><th>Customer</th><th>Date</th><th style="text-align:right">Amount</th><th style="text-align:right">Days</th></tr>`
      unpaid.forEach(i=>{
        const loc=d.locs.find(l=>l.id===i.location_id)
        const days=Math.round((new Date()-new Date(i.date+'T12:00:00'))/86400000)
        body+=`<tr><td>${i.invoice_number||'—'}</td><td>${loc?.name||'Unknown'}</td><td>${i.date}</td><td style="text-align:right">$${(+i.total).toFixed(2)}</td><td style="text-align:right">${days}</td></tr>`
      })
      body+=`</table>`
    }
  }

  if(type==='full'||type==='clients'){
    if(type==='full')body+=`<div style="page-break-before:always"></div>`
    body+=`<h2>Client List — ${d.totalClients} Locations</h2>
    <table><tr><th>Client</th><th>City</th><th>Ext</th><th>Systems</th><th>Brycer</th><th style="text-align:right">Revenue</th></tr>`
    d.locs.sort((a,b)=>(a.name||'').localeCompare(b.name||'')).forEach(l=>{
      const rev=d.invs.filter(i=>i.status==='paid'&&i.location_id===l.id).reduce((s,i)=>s+(+i.total||0),0)
      body+=`<tr><td>${l.name||''}</td><td>${l.city||''}</td><td style="text-align:center">${l.extinguishers?.length||0}</td><td style="text-align:center">${l.suppression_systems?.length||0}</td><td style="text-align:center">${l.is_brycer_jurisdiction?'Yes':''}</td><td style="text-align:right">$${rev.toFixed(2)}</td></tr>`
    })
    body+=`</table>`
  }

  if(type==='full'||type==='equipment'){
    if(type==='full')body+=`<div style="page-break-before:always"></div>`
    body+=`<h2>Equipment Inventory</h2>`
    d.locs.filter(l=>(l.extinguishers?.length||0)+(l.suppression_systems?.length||0)>0).sort((a,b)=>(a.name||'').localeCompare(b.name||'')).forEach(l=>{
      body+=`<h3>${l.name||'Unknown'}${l.city?' — '+l.city:''}</h3>`
      if(l.suppression_systems?.length){
        body+=`<table><tr><th>Suppression System</th><th>Tanks</th><th>Nozzles</th><th>Links</th></tr>`
        l.suppression_systems.forEach(s=>{
          body+=`<tr><td>${s.system_type||'—'}</td><td style="text-align:center">${s.tank_count}</td><td style="text-align:center">${s.nozzle_count}</td><td style="text-align:center">${s.fusible_link_count}</td></tr>`
        })
        body+=`</table>`
      }
      if(l.extinguishers?.length){
        body+=`<table><tr><th>Extinguisher</th><th>Size</th><th>Location</th><th>Mfg Date</th></tr>`
        l.extinguishers.forEach(e=>{
          body+=`<tr><td>${e.type||''}</td><td>${e.size||''}</td><td>${e.location_in_building||''}</td><td>${e.manufacture_date||''}</td></tr>`
        })
        body+=`</table>`
      }
    })
  }

  if(type==='full'){
    body+=`<div style="page-break-before:always"></div>`
    body+=`<h2>Business Valuation Metrics</h2>
    <table>
    <tr><td>Total Revenue (All Time)</td><td style="text-align:right;font-weight:700">$${d.totalRev.toFixed(2)}</td></tr>
    <tr><td>Average Job Value</td><td style="text-align:right">$${d.avgJobValue.toFixed(2)}</td></tr>
    <tr><td>Active Clients (12 months)</td><td style="text-align:right">${d.activeClients}</td></tr>
    <tr><td>Total Service Locations</td><td style="text-align:right">${d.totalClients}</td></tr>
    <tr><td>Recurring Clients (2+ jobs)</td><td style="text-align:right">${d.recurringClients.size} (${d.recurringPct}%)</td></tr>
    <tr><td>Equipment Under Management</td><td style="text-align:right">${d.totalExt+d.totalSys} units</td></tr>
    <tr><td>Avg Revenue per Client</td><td style="text-align:right">$${(d.activeClients?d.totalRev/d.activeClients:0).toFixed(2)}</td></tr>
    <tr><td>Compliance Jurisdictions</td><td style="text-align:right">${d.brycerLocs} (Brycer/Fort Worth)</td></tr>
    <tr><td>Total Jobs Completed</td><td style="text-align:right">${d.completedJobs}</td></tr>
    <tr><td>Outstanding Receivables</td><td style="text-align:right">$${d.totalOutstanding.toFixed(2)}</td></tr>
    </table>`
  }

  return`<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Stephens Advanced — ${type==='full'?'Business Report':type==='monthly'?'Monthly Revenue':type==='ar'?'AR Aging':type==='clients'?'Client List':'Equipment Inventory'}</title>
<meta name="theme-color" content="#0d0f14"><link rel="apple-touch-icon" sizes="180x180" href="/icon-180.png"><link rel="apple-touch-icon" sizes="167x167" href="/icon-167.png"><link rel="apple-touch-icon" sizes="152x152" href="/icon-152.png"><link rel="apple-touch-icon" sizes="120x120" href="/icon-120.png"><link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png"><link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png"><link rel="manifest" href="/manifest.json"><meta name="apple-mobile-web-app-title" content="Stephens Advanced">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Arial,sans-serif;font-size:10pt;color:#000;padding:24px;max-width:800px;margin:0 auto}
h1{font-size:20pt;margin-bottom:4px}
h2{font-size:14pt;margin:20px 0 8px;padding-bottom:4px;border-bottom:2px solid #000}
h3{font-size:11pt;margin:14px 0 6px;color:#333}

.hdr{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:20px;padding-bottom:12px;border-bottom:3px solid #f05a28}

.co span{color:#f05a28}

</style></head><body>
<div class="hdr">
  <div><div class="co">Stephens <span>Advanced</span> LLC</div><div class="sub">Fire Suppression & Safety · (214) 994-4799 · jonathan@stephensadvanced.com</div></div>
  <div class="date">Generated ${today}</div>
</div>
${body}
<script>window.print()<\/script>
</body></html>`
}

function rTechs(){
  const techs=D.techs||[]
  const activeTechs=techs.filter(t=>t.active)
  const inactiveTechs=techs.filter(t=>!t.active)
  const t=td()

  let h=`<div class="sec" style="margin-top:8px"><div class="sec-t">Technicians · ${activeTechs.length}</div><button class="sec-a" onclick="openAddTech()">+ Add</button></div>`

  if(!activeTechs.length){
    h+=`<div class="ey"><div class="ey-i">👥</div><div class="ey-t">No technicians yet. Tap + Add to create one.<br><br><span style="font-size:12px;color:var(--g2)">Add yourself first — Jon Stephens</span></div></div>`
  }else{
    activeTechs.forEach(tk=>{
      const techJobs=D.jobs.filter(j=>j.assigned_to===tk.id)
      const todayJobs=techJobs.filter(j=>j.scheduled_date===t)
      const completedJobs=techJobs.filter(j=>j.status==='completed')
      const techRev=D.invs.filter(i=>i.status==='paid'&&techJobs.some(j=>j.id===i.job_id)).reduce((s,i)=>s+(+i.total||0),0)
      h+=`<div class="cc" onclick="openTechDetail('${tk.id}')">

        <div class="cc-l">
          <div class="cc-nm">${esc(tk.name)}</div>
          <div class="cc-meta">
            <span><b>${todayJobs.length}</b> today</span>
            <span><b>${completedJobs.length}</b> completed</span>
            <span style="color:var(--ok);font-weight:700">${fmt(techRev)}</span>
          </div>
          ${tk.license_number?`<div style="font-size:10px;color:var(--g2);margin-top:2px">${esc(tk.license_number)}</div>`:''}
        </div><div class="cc-arr">›</div>
      </div>`
    })
  }

  // unassigned jobs
  const unassigned=D.jobs.filter(j=>!j.assigned_to&&j.status==='scheduled')
  if(unassigned.length){
    h+=`<div style="background:var(--warns);border:1.5px solid var(--warn);border-radius:var(--r);padding:12px;margin-top:12px">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <div><div style="font-size:12px;font-weight:800;color:var(--warn)">${unassigned.length} Unassigned Job${unassigned.length>1?'s':''}</div>
        <div style="font-size:11px;color:var(--w2);margin-top:4px">Not assigned to a technician yet.</div></div>
        <button style="padding:8px 14px;border-radius:var(--rs);background:var(--warn);color:#000;font-size:11px;font-weight:800;border:none;cursor:pointer;white-space:nowrap" onclick="bulkAssignToMe()">Assign All to Me</button>
      </div>
    </div>`
  }

  if(inactiveTechs.length){
    h+=`<div class="sec"><div class="sec-t" style="color:var(--g2)">Inactive</div></div>`
    inactiveTechs.forEach(tk=>{
      h+=`<div class="cc" style="opacity:.5" onclick="openTechDetail('${tk.id}')">
        <div style="width:40px;height:40px;border-radius:50%;background:var(--g3);display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:900;color:var(--g1);flex-shrink:0">${(tk.name||'?')[0].toUpperCase()}</div>
        <div class="cc-l"><div class="cc-nm">${esc(tk.name)}</div><div style="font-size:11px;color:var(--g2)">Inactive</div></div><div class="cc-arr">›</div>
      </div>`
    })
  }
  $('techsC').innerHTML=h
}

// COSTS / BILLS — owner-only expense tracker
