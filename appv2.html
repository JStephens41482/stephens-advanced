// ── Square Web Payments SDK helpers ─────────────────────────────────
//
// Lazy-loaded so non-card paths don't pull the SDK. Square's web SDK is small
// (~30KB) and lives at https://web.squarecdn.com/v1/square.js (production) or
// https://sandbox.web.squarecdn.com/v1/square.js (sandbox).
//
// CONFIG REQUIRED IN VERCEL:
//   NEXT_PUBLIC_SQUARE_APP_ID         — your Square Application ID
//   NEXT_PUBLIC_SQUARE_LOCATION_ID    — your Square Location ID
//   SQUARE_SANDBOX                    — 'true' to use sandbox SDK
//
// We expose these to the client via a tiny global object set by a separate
// inline script tag. Until that's wired, fall back to placeholder values
// that produce a clear error rather than a silent failure.
// Fetched lazily from /api/square-config on first card_capture render.
let _SQUARE_CFG = null
let _kioskSqInstance = null  // { payments, card, attached:bool }

async function _kioskFetchSquareConfig(){
  if(_SQUARE_CFG) return _SQUARE_CFG
  const r = await fetch('/api/square-config')
  if(!r.ok){
    const d = await r.json().catch(()=>({}))
    throw new Error(d.error || ('Square config not available (HTTP '+r.status+')'))
  }
  _SQUARE_CFG = await r.json()
  return _SQUARE_CFG
}

async function _kioskLoadSquareSdk(sandbox){
  if(window.Square) return window.Square
  const src = sandbox
    ? 'https://sandbox.web.squarecdn.com/v1/square.js'
    : 'https://web.squarecdn.com/v1/square.js'
  await new Promise((resolve, reject)=>{
    const s = document.createElement('script')
    s.src = src
    s.onload = resolve
    s.onerror = ()=>reject(new Error('Could not load Square Web Payments SDK'))
    document.head.appendChild(s)
  })
  return window.Square
}

async function _kioskInitCardForm(){
  const k = kioskState
  if(!k || k.step !== 'card_capture') return
  try {
    const cfg = await _kioskFetchSquareConfig()
    const Sq = await _kioskLoadSquareSdk(cfg.sandbox)
    const payments = Sq.payments(cfg.appId, cfg.locationId)
    const card = await payments.card()
    const container = document.getElementById('ki_card_container')
    if(!container) return  // step left before init finished
    await card.attach('#ki_card_container')
    _kioskSqInstance = { payments, card, attached: true }
    const loadingEl = document.getElementById('ki_card_loading')
    if(loadingEl) loadingEl.style.display = 'none'
    const btn = document.getElementById('ki_pay_btn')
    if(btn){ btn.disabled = false; btn.style.background = 'var(--info)'; btn.style.color = '#fff'; btn.style.cursor = 'pointer' }
  } catch(e) {
    console.error('Square init error:', e)
    kioskState.choices.cardError = 'Card form failed to load: ' + e.message
    _kioskRefresh()
  }
}

async function _kioskSubmitCardPayment(){
  const k = kioskState
  if(!_kioskSqInstance?.card){ toast('Card form not ready'); return }
  const inv = D.invs.find(i=>i.job_id===k.j.id)
  if(!inv){ toast('No invoice on file'); return }
  k.choices.cardStatus = 'submitting'
  k.choices.cardError = null
  _kioskRefresh()
  try {
    const result = await _kioskSqInstance.card.tokenize()
    if(result.status !== 'OK'){
      const err = (result.errors||[]).map(e=>e.message).join('; ') || 'Card validation failed'
      throw new Error(err)
    }
    const nonce = result.token

    // Two server roundtrips when saving on file: customer-create then save-card.
    // Then a single charge. When NOT saving, just one charge call with the nonce.
    if(k.choices.cardSaveOnFile){
      // 1. ensure Square customer
      let customerId = k.ba?.square_customer_id
      if(!customerId){
        const r = await fetch('/api/square', {
          method:'POST', headers:{'Content-Type':'application/json'},
          body: JSON.stringify({
            action:'create_or_find',
            name: k.loc.contact_name || k.loc.name || k.ba?.name || 'Customer',
            email: k.loc.contact_email || k.choices.customerInfo?.contact_email,
            phone: k.loc.contact_phone || k.choices.customerInfo?.contact_phone,
            billingAccountId: k.j.billing_account_id
          })
        })
        const d = await r.json()
        if(!r.ok || !d.success) throw new Error(d.error || 'Could not create Square customer')
        customerId = d.customerId
      }
      // 2. save card
      const sr = await fetch('/api/square', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ action:'save_card_with_nonce', customerId, nonce, billingAccountId: k.j.billing_account_id })
      })
      const sd = await sr.json()
      if(!sr.ok || !sd.success) throw new Error(sd.error || 'Save card failed')
      // 3. charge the saved card
      const cr = await fetch('/api/square', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ action:'charge_card', customerId, cardId: sd.cardId, amount: inv.total, invoiceId: inv.id, invoiceNumber: inv.invoice_number })
      })
      const cd = await cr.json()
      if(!cr.ok || !cd.success) throw new Error(cd.error || 'Charge failed')
      k.choices.cardStatus = 'paid'
      k.choices.cardLast4 = sd.last4
    } else {
      // One-time charge with nonce, no save
      const r = await fetch('/api/square', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({
          action:'charge_with_nonce',
          nonce, amount: inv.total,
          invoiceId: inv.id, invoiceNumber: inv.invoice_number,
          customerName: k.loc.name || k.ba?.name || 'Customer'
        })
      })
      const d = await r.json()
      if(!r.ok || !d.success) throw new Error(d.error || 'Charge failed')
      k.choices.cardStatus = 'paid'
      k.choices.cardLast4 = d.last4 || '????'
    }
    await load()  // pull updated invoice status
    _kioskRefresh()
  } catch(e) {
    console.error('Card submit error:', e)
    k.choices.cardStatus = 'error'
    k.choices.cardError = e.message
    // Re-render destroys the card-form DOM. Reset the SDK instance so
    // _kioskInitCardForm rebuilds the form for retry. MUST call .destroy()
    // first — otherwise Square keeps internal state pointing at the now-
    // gone DOM element, and the next attach() throws "card form already
    // attached" or silently refuses input.
    await _kioskDestroySdk()
    _kioskRefresh()
  }
}

// Cleanly tear down the Square Web Payments SDK card instance. Always call
// this BEFORE re-rendering or teardown — never just `_kioskSqInstance=null`,
// because that leaves the SDK with internal state pointing at a now-gone
// DOM element, soft-locking the next card_capture re-entry.
async function _kioskDestroySdk(){
  if(_kioskSqInstance?.card){
    try{ await _kioskSqInstance.card.destroy() }
    catch(e){ console.warn('[kiosk] Square card.destroy() failed:', e.message) }
  }
  _kioskSqInstance = null
}

function _kioskAttachSig(canvasId){
  const c = document.getElementById(canvasId); if(!c||c.dataset.attached) return
  c.dataset.attached='1'
  const ctx = c.getContext('2d'); ctx.lineWidth=2; ctx.lineCap='round'; ctx.strokeStyle='#000'
  let drawing=false, last=null
  const pos=(e)=>{ const r=c.getBoundingClientRect(); const t=e.touches?.[0]||e; return [t.clientX-r.left, t.clientY-r.top] }
  const start=(e)=>{ drawing=true; last=pos(e); e.preventDefault() }
  const move=(e)=>{ if(!drawing)return; const [x,y]=pos(e); ctx.beginPath(); ctx.moveTo(...last); ctx.lineTo(x,y); ctx.stroke(); last=[x,y]; e.preventDefault() }
  const end=()=>{ drawing=false }
  c.addEventListener('mousedown',start); c.addEventListener('mousemove',move); window.addEventListener('mouseup',end)
  c.addEventListener('touchstart',start); c.addEventListener('touchmove',move); c.addEventListener('touchend',end)
}
function _kioskClearSig(canvasId){
  const c=document.getElementById(canvasId); if(!c)return
  c.getContext('2d').clearRect(0,0,c.width,c.height)
  // Reset attached flag so a fresh signature can be captured after a clear
  delete c.dataset.attached
  _kioskAttachSig(canvasId)
}
function _kioskCaptureSig(canvasId, target){
  const c=document.getElementById(canvasId); if(!c)return
  const ctx=c.getContext('2d'); const data=ctx.getImageData(0,0,c.width,c.height).data
  // BUG FIX: the previous check counted pixels where R<200, but a fresh
  // canvas has all RGBA = (0,0,0,0) → R=0 always counts as "dark", so
  // the "did you sign?" gate NEVER fired and blank canvases passed.
  // Customer-signed contracts and invoices may be blank PNGs in DB.
  // Correct check: count pixels with non-zero ALPHA (anything actually
  // drawn). A real signature on a 320x120 canvas = ~thousands of inked
  // pixels; the 200-pixel floor catches a stray accidental tap.
  let inked=0; for(let i=0;i<data.length;i+=4){ if(data[i+3]>0) inked++ }
  if(inked<200){ toast('Please sign first'); return }
  kioskState.choices[target] = c.toDataURL('image/png')
  _kioskRefresh()
}

function _kioskPinPress(d){
  const cur = kioskState.choices._pin || ''
  if(cur.length>=4)return
  kioskState.choices._pin = cur + d
  _kioskRefresh()
  if(kioskState.choices._pin.length===4){
    if(kioskState.choices._pin === KIOSK_EXIT_PIN){
      kioskState.choices._pin = ''
      _kioskGoto('tech_summary')
    } else {
      toast('Wrong PIN')
      kioskState.choices._pin = ''
      setTimeout(_kioskRefresh, 500)
    }
  }
}
function _kioskPinBack(){
  kioskState.choices._pin = (kioskState.choices._pin||'').slice(0,-1); _kioskRefresh()
}

async function _kioskFinalize(method){
  const k = kioskState
  let checkNum = null
  if(method==='check'){
    checkNum = prompt('Enter check number:')
    if(!checkNum)return
  }
  const nowIso = new Date().toISOString()

  // Bug P fix: payment_received_at marks PHYSICAL receipt of money. For
  // bill-me ('invoice'), nothing was received yet — leave it NULL until the
  // customer actually pays.
  const jobUpd = {
    signature_data: k.choices.signatureData,
    kiosk_session_id: null,
    status: 'completed',
    completed_at: nowIso
  }
  if(method==='cash' || method==='check' || method==='card' || method==='card_manual'){
    // All physical-receipt methods stamp payment_received_at. Bill-me does not.
    jobUpd.payment_received_at = nowIso
  }
  await SB.from('jobs').update(jobUpd).eq('id', k.jobId)

  // Stamp the invoice — ONLY if our finalize is responsible for it.
  //   - cash/check  → mark paid here (tech just confirmed receipt)
  //   - invoice     → mark sent (bill-me)
  //   - card        → /api/square already marked it paid during card_capture; skip
  //   - card_manual → tech ran the charge in the Square app on his phone,
  //                   the Supabase invoice still needs to reflect that
  const inv = D.invs.find(i=>i.job_id===k.jobId)
  if(inv && method!=='card'){
    let invUpd
    if(method==='invoice'){
      invUpd = { status:'sent', sent_at: nowIso }
    } else if(method==='card_manual'){
      invUpd = { status:'paid', payment_method:'card', paid_at: nowIso, payment_note:'Square card · charged via Square app' }
    } else {
      invUpd = { status:'paid', payment_method: method, paid_at: nowIso, payment_note: method==='check'?`Check #${checkNum}`:'Cash — paid in full' }
    }
    await SB.from('invoices').update(invUpd).eq('id', inv.id)
  }

  if(k.contractNeeded && k.choices.contractSignature){
    await SB.from('contracts').insert({
      location_id: k.loc.id,
      billing_account_id: k.j.billing_account_id,
      type:'recurring', status:'active',
      signed: true, signed_at: nowIso,
      signature_data: k.choices.contractSignature,
      signer_name: k.loc.contact_name || k.loc.name || 'Customer',
      notes:'Captured via in-person kiosk handoff'
    })
  }

  // _kioskFinalize is invoked from the openKiosk → kioskState flow, NOT
  // the startCustomerKiosk → window._kiosk flow. So kioskEmailInvoice
  // CANNOT use its window._kiosk path here (window._kiosk is null) —
  // we MUST pass the invoice id so it builds context autonomously via
  // _buildEmailContext. Earlier corrective patch missed this; the result
  // was zero emails sent for cash/check/card_manual finalize, instead
  // of the broken-preview-but-already-sent state. With invId, the
  // autonomous path runs and a proper PAID receipt goes out.
  if(inv && k.loc.contact_email && (method==='cash'||method==='check'||method==='card_manual')){
    try { await kioskEmailInvoice(true, inv.id) } catch(e){ console.error('kiosk receipt send:', e) }
  }

  await load()
  _kioskTeardown()
  toast(method==='invoice' ? 'Invoice sent ✓' : method==='card_manual' ? 'Card payment recorded ✓' : 'Payment recorded ✓')
}

// SHARED KIOSK TEARDOWN — called by both _kioskFinalize and _kioskCancel.
// Aggressively wipes every piece of per-job/kiosk state so the app is
// genuinely ready for the next customer. Lock-up after kiosk was caused by
// stale globals (_activeJobId, jobLines, jobNotes, jobPhotos, extR) and
// the auto-save interval continuing to fire against the just-completed job.
function _kioskTeardown(){
  popAll()
  OVS.forEach(s=>{const el=document.getElementById(s);if(el){el.classList.remove('kiosk-locked','open');delete el.dataset.kiosk;el.style.display='none'}})
  document.body.classList.remove('kiosk-mode')
  kioskState = null
  // fire-and-forget destroy — teardown is sync but SDK destroy can be
  // async; we don't need to await since we're already nulling the ref.
  _kioskDestroySdk().catch(()=>{})
  // Per-job state — without this the next openJob can collide with the
  // just-finished kiosk's autosave / extinguisher results / photo list.
  window._activeJobId = null
  window._activeJobLoc = null
  _jobDataDirty = false
  if(_autoSaveTimer){ clearInterval(_autoSaveTimer); _autoSaveTimer = null }
  jobLines = []
  jobNotes = ''
  jobPhotos = []
  extR = {}
  // Re-render whichever tab Jon's currently looking at so the just-completed
  // job moves out of the SCHEDULED list immediately.
  const activeBtn = document.querySelector('.nav button.on')
  const v = activeBtn?.dataset?.v
  if(v==='vJobs' && typeof rJobs==='function') rJobs()
  else if(v==='vCal' && typeof rCal==='function') rCal()
  else if(v==='vMoney' && typeof rMoney==='function') rMoney()
  else if(v==='vCust' && typeof rCust==='function') rCust()
}

async function _kioskCancel(){
  if(!confirm('Exit without finalizing? Customer signatures will be saved but no payment will be recorded.'))return
  const k = kioskState
  const upd = { kiosk_session_id: null }
  if(k.choices.signatureData) upd.signature_data = k.choices.signatureData
  await SB.from('jobs').update(upd).eq('id', k.jobId)
  await load()
  _kioskTeardown()
  toast('Exited kiosk — job left open')
}

        <li style="margin-bottom:6px">If full payment is not made as stated above, Stephens Advanced LLC reserves the right to take possession of each item of merchandise of this purchase, and the purchaser shall forfeit all rights thereto and interest therein.</li>
        <li style="margin-bottom:6px">All monies therefore paid by the purchaser shall be retained by Stephens Advanced LLC as rental for use of said merchandise and as liquidated damages.</li>

function _attachSACanvas(){
  const canvas = document.getElementById('sa_sig')
  if(!canvas) return
  const ctx = canvas.getContext('2d')
  ctx.lineWidth = 2.5
  ctx.lineCap = 'round'
  ctx.strokeStyle = '#000'
  let drawing = false, lastX = 0, lastY = 0
  const getPos = (e) => {
    const r = canvas.getBoundingClientRect()
    const t = e.touches?.[0] || e
    return { x: (t.clientX - r.left) * (canvas.width/r.width), y: (t.clientY - r.top) * (canvas.height/r.height) }
  }
  const start = (e) => { e.preventDefault(); drawing = true; const p = getPos(e); lastX = p.x; lastY = p.y }
  const move = (e) => { if(!drawing) return; e.preventDefault(); const p = getPos(e); ctx.beginPath(); ctx.moveTo(lastX, lastY); ctx.lineTo(p.x, p.y); ctx.stroke(); lastX = p.x; lastY = p.y }
  const end = () => { drawing = false }
  canvas.addEventListener('mousedown', start)
  canvas.addEventListener('mousemove', move)
  canvas.addEventListener('mouseup', end)
  canvas.addEventListener('mouseleave', end)
  canvas.addEventListener('touchstart', start, { passive: false })
  canvas.addEventListener('touchmove', move, { passive: false })
  canvas.addEventListener('touchend', end)
}

function _clearSACanvas(){
  const canvas = document.getElementById('sa_sig')
  if(canvas) canvas.getContext('2d').clearRect(0, 0, canvas.width, canvas.height)
}

async function _saveServiceAgreement(locId, source){
  const canvas = document.getElementById('sa_sig')
  if(!canvas){ toast('Signature canvas not found',false); return }
  // Use the corrected empty-sig check: count pixels with non-zero alpha
  // (the kiosk's old check counted transparent pixels as "dark" because R=0)
  const ctx = canvas.getContext('2d')
  const data = ctx.getImageData(0, 0, canvas.width, canvas.height).data
  let nonEmpty = 0
  for(let i = 0; i < data.length; i += 4){ if(data[i+3] > 0) nonEmpty++ }
  if(nonEmpty < 200){ toast('Please sign before saving',false); return }
  const sigData = canvas.toDataURL('image/png')
  const l = D.locs.find(x=>x.id===locId)
  if(!l){ toast('Location not found',false); return }
  try{
    const{ data:c, error } = await SB.from('contracts').insert({
      location_id: locId,
      billing_account_id: l.billing_account_id || null,
      type: 'recurring',
      frequency: 'semi-annual',
      services_included: ['suppression','extinguishers','elights'],
      status: 'active',
      signed: true,
      signed_at: new Date().toISOString(),
      signature_data: sigData,
      signer_name: l.contact_name || l.name || 'Customer',
      notes: 'Signed in-person via standalone agreement flow. Source: ' + source,
      language: l.preferred_language || 'en'
    }).select().single()
    if(error) throw error
    audit('contract_signed','location',locId,'jon',{contract_id:c.id,source},'Service agreement signed in-person — '+(l.name||'?'))
    await load()
    pop()
    toast('Service agreement signed ✓ Future visits will auto-bill.')
  }catch(e){
    console.error('save service agreement:',e)
    toast('Could not save agreement: '+(e.message||'unknown'), false)
  }
}

// Entry point — invoked from invoice detail "Mazon" button.
// Customer can be either a billing_account (multi-location parent) OR the
// location itself (single-shot customer entered straight on the location).
// Both paths converge on the same assignment screen.
async function openMazonFlow(invId,custName,total){
  const inv=D.invs.find(x=>x.id===invId)||{}
  const loc=D.locs.find(x=>x.id===inv.location_id)||null
  let baId=inv.billing_account_id||loc?.billing_account_id||null
  const ba=baId?((D.bas||[]).find(b=>b.id===baId)||await fetchBa(baId)):null

  // Normalise into a `party` object the rest of the flow uses.
  //   scope:   'billing_account' or 'location'
  //   id:      ba.id or loc.id
  //   name / phone / mazon_approved: same-shape fields
  let party
  if(ba){
    party={scope:'billing_account',id:ba.id,name:ba.name||'',phone:ba.phone||'',mazon_approved:!!ba.mazon_approved}
  }else if(loc){
    party={scope:'location',id:loc.id,name:loc.name||loc.contact_name||custName||'',phone:loc.contact_phone||'',mazon_approved:!!loc.mazon_approved}
  }else{
    pushMazonBlock('Could not load customer info for this invoice.',null)
    return
  }

  // Rule 1: phone required
  if(!party.phone||!party.phone.trim()){
    const action=party.scope==='billing_account'?{type:'edit_ba',baId:party.id}:{type:'edit_loc',locId:party.id}
    const where=party.scope==='billing_account'?'billing account':'location contact'
    pushMazonBlock(`Mazon requires a customer phone number. Add one to the ${where} before queueing this invoice.`,action)
    return
  }

  // Rule 2: mazon_approved required
  if(!party.mazon_approved){
    pushMazonBlock('This customer is not yet approved by Mazon. New customers take 1–2 business days for Mazon to credit-check. Mark them Approved only after Mazon confirms.',{type:'approve',scope:party.scope,id:party.id,invId,custName,total})
    return
  }

  // All checks passed — show assignment screen
  renderMazonAssignment(invId,custName,total,party)
}

async function fetchBa(id){
  const{data}=await SB.from('billing_accounts').select('*').eq('id',id).maybeSingle()
  return data||null
}

function pushMazonBlock(msg,action){
  let ctas=''
  if(action?.type==='edit_ba'){
    ctas=`<button class="btn-p" style="margin-top:12px" onclick="pop();openBa('${action.baId}')">Open billing account →</button>`
  }else if(action?.type==='edit_loc'){
    ctas=`<button class="btn-p" style="margin-top:12px" onclick="pop();openLoc('${action.locId}')">Open location →</button>`
  }else if(action?.type==='approve'){
    ctas=`<button class="btn-p" style="margin-top:12px;background:var(--info)" onclick="confirmMazonApproval('${action.scope}','${action.id}','${esc(action.invId)}','${esc(action.custName)}',${action.total})">I have Mazon's approval</button>
         <button class="btn-s" style="margin-top:8px" onclick="pop()">Cancel</button>`
  }else{
    ctas=`<button class="btn-s" style="margin-top:12px" onclick="pop()">Close</button>`
  }
  const h=`<div class="ov-hdr"><button class="ov-back" onclick="pop()">‹</button><div class="ov-title">Mazon — Blocked</div></div>
  <div class="ov-body">
    <div style="background:rgba(231,76,60,.08);border:1.5px solid var(--bad);border-radius:var(--r);padding:16px;margin-bottom:12px">
      <div style="font-size:13px;font-weight:800;color:var(--bad);margin-bottom:6px">Cannot queue for Mazon</div>
      <div style="font-size:13px;line-height:1.55">${esc(msg)}</div>
    </div>
    ${ctas}
  </div>`
  push(h)
}

async function confirmMazonApproval(scope,id,invId,custName,total){
  if(!confirm('Confirm: Mazon has approved this customer for factoring?'))return
  const tbl=scope==='location'?'locations':'billing_accounts'
  const{error}=await SB.from(tbl).update({
    mazon_approved:true,mazon_approved_at:new Date().toISOString()
  }).eq('id',id)
  if(error){toast('Failed to save approval',false);return}
  audit('mazon_approved',scope==='location'?'location':'billing_account',id,'jon',null,'Jon confirmed Mazon approval')
  await load()
  pop()
  // Continue into assignment flow
  openMazonFlow(invId,custName,total)
}

let mazonSigCtx=null,mazonSigOn=false,mazonHasInk=false
function initMazonSig(){
  const c=$('mazonSigC');if(!c)return
  const r=c.parentElement.getBoundingClientRect();c.width=r.width;c.height=r.height
  mazonSigCtx=c.getContext('2d');mazonSigCtx.strokeStyle='#222';mazonSigCtx.lineWidth=2.5;mazonSigCtx.lineCap='round';mazonSigCtx.lineJoin='round'
  mazonHasInk=false
  const sp=e=>{e.preventDefault();mazonSigOn=true;mazonHasInk=true;if($('mazonSigPh'))$('mazonSigPh').style.display='none';const p=gp2(e);mazonSigCtx.beginPath();mazonSigCtx.moveTo(p.x,p.y);updateMazonSubmitEnabled()}
  const sm=e=>{if(!mazonSigOn)return;e.preventDefault();const p=gp2(e);mazonSigCtx.lineTo(p.x,p.y);mazonSigCtx.stroke()}
  const se=()=>{mazonSigOn=false}
  c.addEventListener('touchstart',sp,{passive:false});c.addEventListener('touchmove',sm,{passive:false});c.addEventListener('touchend',se)
  c.addEventListener('mousedown',sp);c.addEventListener('mousemove',sm);c.addEventListener('mouseup',se)
}
function gp2(e){const c=$('mazonSigC'),r=c.getBoundingClientRect(),t=e.touches?e.touches[0]:e;return{x:t.clientX-r.left,y:t.clientY-r.top}}
function clrMazonSig(){if(mazonSigCtx){const c=$('mazonSigC');mazonSigCtx.clearRect(0,0,c.width,c.height)}if($('mazonSigPh'))$('mazonSigPh').style.display='';mazonHasInk=false;updateMazonSubmitEnabled()}
function updateMazonSubmitEnabled(){
  const btn=$('mazonSubmitBtn');if(!btn)return
  const name=($('mazon-name')?.value||'').trim()
  btn.disabled=!(mazonHasInk&&name.length>0)
}

                  <b>If payment by regular mail:</b><br>
                  Mazon Associates, Inc.<br>
                  P.O. Box 166858<br>
                  Irving, TX 75016-6858<br>
                  972-554-6967, Fax 972-554-0951
                </td>
                <td style="width:50%;vertical-align:top;padding:12px 14px;background:#fff;border:1px solid #ddd;border-left:none;font-size:13px;line-height:1.55">
                  <b>If payment by electronic transfer:</b><br>
                  Bank: Frost Bank<br>
                  ABA No: 114000093<br>
                  Beneficiary: Mazon Associates, Inc.<br>
                  Account No: 980003506
                </td>
              </tr>
            </table>
            <p style="font-size:13px;color:#555">Questions about payment: call Mazon at 972-554-6967.<br>
            Questions about service: reply to this email or call (214) 994-4799.</p>
            <p>— Jonathan Stephens<br>Stephens Advanced LLC</p>
          </div>`,
          invoiceNumber:invNum,
          attachments:pdfB64?[{filename:`invoice_${invNum||invId}.pdf`,content:pdfB64}]:undefined
        })})

    }catch(e){console.error('customer email:',e)}

// ═══ MAZON QUEUE VIEW ═══
async function openMazonQueue(){
  const[{data:queue},{data:schedules}]=await Promise.all([
    SB.from('mazon_queue').select('*').order('created_at',{ascending:true}),
    SB.from('mazon_schedules').select('*').order('schedule_number',{ascending:false})
  ])
  const items=queue||[]
  const pending=items.filter(x=>x.status==='pending')
  const submitted=items.filter(x=>x.status==='submitted')
  const funded=items.filter(x=>x.status==='funded')
  const rejected=items.filter(x=>x.status==='rejected')
  const pendingTotal=pending.reduce((s,x)=>s+(+x.amount||0),0)
  const threshold=MAZON_CONST.BATCH_THRESHOLD
  const meetsThreshold=pendingTotal>=threshold
  const shortfall=Math.max(0,threshold-pendingTotal)

  let h=`<div class="ov-hdr">
    <button class="ov-back" onclick="pop()">‹</button>
    <div class="ov-title">Mazon Queue</div>
  </div><div class="ov-body">
  <div style="background:var(--infos);border:1.5px solid var(--info);border-radius:var(--r);padding:14px;margin-bottom:16px">
    <div style="font-size:13px;font-weight:700;color:var(--info)">${esc(MAZON_CONST.LEGAL_NAME)} · Client #${MAZON_CONST.CLIENT_NUMBER}</div>
    <div style="font-size:12px;color:var(--g1);margin-top:4px">Submit by ${MAZON_CONST.SAME_DAY_CUTOFF} Friday for same-day funding</div>
  </div>`

  // ─── Pending section ───
  h+=`<div class="sec"><div class="sec-t" style="color:${meetsThreshold?'var(--ok)':'var(--warn)'}">Pending · ${pending.length} invoice${pending.length===1?'':'s'} · ${fmt(pendingTotal)}</div></div>`

  if(pending.length){
    pending.forEach(q=>{
      h+=`<div class="ic" style="margin-bottom:8px" id="mq-${q.id}">
        <div class="ic-r1">
          <div class="ic-nm">${esc(q.customer_name||'')}</div>
          <span class="badge bsent">${esc(q.invoice_number||'—')}</span>
        </div>
        <div class="ic-sub">${esc(q.location_address||'')}</div>
        <div style="display:flex;justify-content:space-between;align-items:center;margin-top:6px">
          <div style="font-size:11px;color:var(--g1)">Service: ${q.date_of_service||'—'}</div>
          <div style="font-size:15px;font-weight:800">${fmt(+q.amount||0)}</div>
        </div>
        <div style="display:flex;gap:6px;margin-top:8px;font-size:11px">
          ${q.signature_url?`<a href="${q.signature_url}" target="_blank" style="color:var(--info);text-decoration:none">View signature</a>`:''}
          ${q.invoice_id?`<a href="#" onclick="openMazonInvoicePdf('${q.id}');return false" style="color:var(--info);text-decoration:none">View stamped PDF</a>`:''}
          <button class="owner-only" style="color:var(--bad);background:none;padding:0;border:none;font-size:11px;cursor:pointer;margin-left:auto" onclick="voidMazonQueue('${q.id}')">Void</button>
        </div>
      </div>`
    })

    // Threshold + submit button
    if(meetsThreshold){
      h+=`<button class="btn-p owner-only" id="mazonReviewBtn" style="margin-top:12px;background:var(--ok)" onclick="openMazonReview()">Submit Batch to Mazon — ${fmt(pendingTotal)}</button>`
    }else{
      h+=`<div style="margin-top:12px;padding:12px;background:var(--c2);border:1px dashed var(--b1);border-radius:var(--rs);text-align:center">
        <button class="btn-p" style="background:var(--g2);opacity:.5;cursor:not-allowed" disabled>Submit Batch to Mazon</button>
        <div style="font-size:12px;color:var(--g1);margin-top:8px">Need ${fmt(shortfall)} more to reach ${fmt(threshold)} threshold</div>
      </div>`
    }
  }else{
    h+=`<div class="ey" style="padding:24px"><div class="ey-t">No pending invoices.<br>Add invoices via the Mazon payment option on an invoice.</div></div>`
  }

  // ─── Submitted, grouped by schedule ───
  const submittedByScheduleMap=new Map()
  for(const q of submitted.concat(funded).concat(rejected)){
    const k=q.schedule_id||'ungrouped'
    if(!submittedByScheduleMap.has(k))submittedByScheduleMap.set(k,[])
    submittedByScheduleMap.get(k).push(q)
  }

  if(submittedByScheduleMap.size){
    h+=`<div class="sec" style="margin-top:24px"><div class="sec-t">Submitted Schedules</div></div>`
    const sortedSchedIds=Array.from(submittedByScheduleMap.keys()).sort((a,b)=>{
      const sa=(schedules||[]).find(s=>s.id===a)
      const sb=(schedules||[]).find(s=>s.id===b)
      return (sb?.schedule_number||0)-(sa?.schedule_number||0)
    })
    for(const sid of sortedSchedIds){
      const rows=submittedByScheduleMap.get(sid)
      const sched=(schedules||[]).find(s=>s.id===sid)
      const schedNum=sched?.schedule_number||'?'
      const schedDate=sched?.submitted_at?new Date(sched.submitted_at).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}):''
      const schedTotal=rows.reduce((s,x)=>s+(+x.amount||0),0)
      const allFunded=rows.every(r=>r.status==='funded')
      h+=`<div style="background:var(--c2);border:1px solid var(--b1);border-radius:var(--r);padding:12px;margin-bottom:10px">
        <div style="display:flex;justify-content:space-between;align-items:center">
          <div>
            <div style="font-weight:800;font-size:14px">Schedule #${schedNum}</div>
            <div style="font-size:11px;color:var(--g1)">${schedDate} · ${rows.length} invoice${rows.length===1?'':'s'} · ${fmt(schedTotal)}</div>
          </div>
          ${!allFunded&&rows.some(r=>r.status==='submitted')?`<button class="btn-s" style="font-size:11px;padding:6px 10px" onclick="markScheduleFunded('${sid}')">Mark all funded</button>`:''}
        </div>`
      rows.forEach(q=>{
        const statusBadge=q.status==='funded'?'<span class="badge bpaid">FUNDED</span>':q.status==='rejected'?'<span class="badge bover">REJECTED</span>':'<span class="badge bsent">SUBMITTED</span>'
        const amt=q.funded_amount!=null?q.funded_amount:q.amount
        h+=`<div style="padding:8px 0;border-top:1px solid var(--b1);display:flex;justify-content:space-between;align-items:center;font-size:12.5px">
          <div>
            <div style="font-weight:700">${esc(q.customer_name||'')} · ${esc(q.invoice_number||'—')}</div>
            ${q.status==='rejected'&&q.rejected_reason?`<div style="font-size:11px;color:var(--bad);margin-top:2px">${esc(q.rejected_reason)}</div>`:''}
          </div>
          <div style="display:flex;align-items:center;gap:8px">
            ${statusBadge}
            <div style="font-weight:800">${fmt(+amt||0)}</div>
          </div>
        </div>
        ${q.status==='submitted'?`<div style="padding:6px 0 0;display:flex;gap:8px;font-size:11px">

// ═══ REVIEW MODAL ═══
async function openMazonReview(){
  if(!_isOwner()){toast('Owner only — only the owner can submit Mazon batches',false);return}
  const{data:pending}=await SB.from('mazon_queue').select('*').eq('status','pending').order('created_at',{ascending:true})
  if(!pending?.length){toast('No pending invoices',false);return}
  const{data:maxSched}=await SB.from('mazon_schedules').select('schedule_number').order('schedule_number',{ascending:false}).limit(1).maybeSingle()
  const nextNum=(maxSched?.schedule_number||0)+1
  window._mazonReview={items:pending.map(p=>({id:p.id,checked:true,amount:+p.amount||0,customer:p.customer_name,invoice:p.invoice_number,date:p.date_of_service}))}
  renderMazonReview(nextNum)
}

function renderMazonReview(nextNum){
  const items=window._mazonReview?.items||[]
  const selected=items.filter(i=>i.checked)
  const total=selected.reduce((s,i)=>s+(+i.amount||0),0)

  let h=`<div class="ov-hdr">
    <button class="ov-back" onclick="pop()">‹</button>
    <div class="ov-title">Review Schedule #${nextNum}</div>
  </div><div class="ov-body">
  <div style="background:var(--infos);border:1.5px solid var(--info);border-radius:var(--r);padding:12px;margin-bottom:14px;font-size:12px">
    Review each invoice. Uncheck to hold for next batch.
  </div>`

  items.forEach((it,idx)=>{
    h+=`<label style="display:flex;align-items:center;gap:10px;padding:10px;border:1px solid var(--b1);border-radius:var(--rs);margin-bottom:8px;cursor:pointer">
      <input type="checkbox" ${it.checked?'checked':''} onchange="toggleMazonReviewItem(${idx},this.checked,${nextNum})" style="width:20px;height:20px;accent-color:var(--info)">
      <div style="flex:1">
        <div style="font-weight:700;font-size:13px">${esc(it.customer)} · ${esc(it.invoice||'—')}</div>
        <div style="font-size:11px;color:var(--g1)">Service ${it.date||'—'}</div>
      </div>
      <div style="font-weight:800">${fmt(+it.amount||0)}</div>
    </label>`
  })

  h+=`<div style="margin-top:14px;padding:14px;background:var(--c2);border:1px solid var(--b1);border-radius:var(--r);display:flex;justify-content:space-between;font-weight:800">
    <span>Selected total · ${selected.length} invoice${selected.length===1?'':'s'}</span>
    <span>${fmt(total)}</span>
  </div>
  <button class="btn-p" id="mazonSubmitBatchBtn" style="margin-top:14px;background:${selected.length?'var(--info)':'var(--g2)'}" ${selected.length?'':'disabled'} onclick="submitMazonBatch()">Send to Mazon</button>
  <button class="btn-s" style="margin-top:8px" onclick="pop()">Cancel</button>
  </div>`

  const existing=document.querySelector('.ov.active.ov-review')
  if(existing){existing.innerHTML=h}
  else{push(h);const last=document.querySelector('.ov.active');if(last)last.classList.add('ov-review')}
}

function toggleMazonReviewItem(idx,checked,nextNum){
  if(!window._mazonReview?.items?.[idx])return
  window._mazonReview.items[idx].checked=checked
  renderMazonReview(nextNum)
}

async function submitMazonBatch(){
  const items=window._mazonReview?.items||[]
  const selected=items.filter(i=>i.checked)
  if(!selected.length)return
  const btn=$('mazonSubmitBatchBtn')
  if(btn){btn.innerHTML='<span class="spin"></span> Sending to Mazon…';btn.disabled=true}
  try{
    const res=await fetch('/api/mazon/submit-batch',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({queue_ids:selected.map(i=>i.id)})
    })
    const data=await res.json()
    if(!res.ok){toast('Submission failed: '+(data.error||res.status),false);if(btn){btn.innerHTML='Send to Mazon';btn.disabled=false};return}
    window._mazonReview=null
    toast(`Schedule #${data.schedule_number} sent — ${data.count} invoice${data.count===1?'':'s'} · ${fmt(data.total)}`)
    await load();popAll();rMoney();openMazonQueue()
  }catch(e){
    console.error('submitMazonBatch:',e)
    toast('Network error — try again',false)
    if(btn){btn.innerHTML='Send to Mazon';btn.disabled=false}
  }
}

// ═══ FUNDED / REJECTED ACTIONS ═══
async function markMazonFunded(qId){
  const{data:qr}=await SB.from('mazon_queue').select('*').eq('id',qId).single()
  if(!qr)return
  const promptAmt=prompt('Funded amount? (may be less than $'+(+qr.amount).toFixed(2)+' if Mazon took fees)',(+qr.amount).toFixed(2))
  if(promptAmt===null)return
  const amt=parseFloat(promptAmt)
  if(isNaN(amt)||amt<=0){toast('Invalid amount',false);return}
  const nowIso=new Date().toISOString()
  await SB.from('mazon_queue').update({status:'funded',funded_at:nowIso,funded_amount:amt,updated_at:nowIso}).eq('id',qId)
  await SB.from('invoices').update({status:'paid',paid_at:nowIso,payment_method:'mazon',updated_at:nowIso}).eq('id',qr.invoice_id)
  await SB.from('mazon_audit_log').insert({actor:'jon',entity_type:'queue',entity_id:qId,old_status:'submitted',new_status:'funded',reason:'Mazon funded',metadata:{funded_amount:amt}})
  audit('paid','invoice',qr.invoice_id,'jon',{amount:amt,method:'mazon'},'Mazon funded — '+qr.customer_name)
  await load();pop();openMazonQueue()
}

async function markScheduleFunded(schedId){
  if(!confirm('Mark all invoices in this schedule as funded at face value?'))return
  const{data:rows}=await SB.from('mazon_queue').select('id,amount,invoice_id,customer_name').eq('schedule_id',schedId).eq('status','submitted')
  if(!rows?.length){toast('No submitted rows in schedule',false);return}
  const nowIso=new Date().toISOString()
  for(const r of rows){
    const amt=+r.amount||0
    await SB.from('mazon_queue').update({status:'funded',funded_at:nowIso,funded_amount:amt,updated_at:nowIso}).eq('id',r.id)
    await SB.from('invoices').update({status:'paid',paid_at:nowIso,payment_method:'mazon',updated_at:nowIso}).eq('id',r.invoice_id)
    await SB.from('mazon_audit_log').insert({actor:'jon',entity_type:'queue',entity_id:r.id,old_status:'submitted',new_status:'funded',reason:'Bulk mark funded (schedule)'})
    audit('paid','invoice',r.invoice_id,'jon',{amount:amt,method:'mazon'},'Mazon funded (bulk) — '+r.customer_name)
  }
  await SB.from('mazon_schedules').update({status:'funded'}).eq('id',schedId)
  await load();pop();openMazonQueue()
}

async function markMazonRejected(qId){
  const reason=prompt('Reason Mazon rejected?')
  if(!reason)return
  const{data:qr}=await SB.from('mazon_queue').select('invoice_id,customer_name').eq('id',qId).single()
  await SB.from('mazon_queue').update({status:'rejected',rejected_reason:reason,updated_at:new Date().toISOString()}).eq('id',qId)
  if(qr?.invoice_id){
    // Revert invoice to unpaid so Jon can collect another way
    await SB.from('invoices').update({status:'sent',updated_at:new Date().toISOString()}).eq('id',qr.invoice_id)
  }
  await SB.from('mazon_audit_log').insert({actor:'jon',entity_type:'queue',entity_id:qId,old_status:'submitted',new_status:'rejected',reason})
  await load();pop();openMazonQueue()
}

function cHtml(ls){
  if(!ls.length)return`<div class="ey"><div class="ey-i">👤</div><div class="ey-t">No clients yet. Tap + Add to create one.</div></div>`
  // Derived stats — no manual equipment table to read. Count each location's
  // completed jobs and open invoices; show the last service date.
  return ls.map(l=>{
    const jobs=(D.jobs||[]).filter(j=>(j.location_id||j.location?.id)===l.id)
    const done=jobs.filter(j=>j.status==='completed')
    // Prefer the pre-aggregated last-service map (covers full history); fall
    // back to the in-memory jobs list when missing.
    const last=(D.lastService&&D.lastService[l.id])||done.map(j=>j.completed_at||j.scheduled_date).filter(Boolean).sort().pop()
    const unpaid=(D.invs||[]).filter(i=>i.location_id===l.id&&!['paid','void','record'].includes(i.status))
    const unpaidTot=unpaid.reduce((s,i)=>s+(+i.total||0),0)
    const scopes=new Set()
    done.forEach(j=>(j.scope||[]).forEach(s=>scopes.add(s)))
    const scopeBadges=[...scopes].slice(0,3).map(s=>`<span class="cc-tag">${esc(s)}</span>`).join('')
    return `<div class="cc" onclick="openCust('${l.id}')">
      <div class="cc-l">
        <div class="cc-nm">${esc(l.name)}</div>
        <div class="cc-addr">${esc([l.address,l.city].filter(Boolean).join(', '))||'No address'}</div>
        <div class="cc-meta">
          ${last?`<span>Last svc <b>${last.slice(0,10)}</b></span>`:'<span style="color:#888">No service yet</span>'}
          ${scopeBadges}
          ${unpaid.length?`<span class="cc-owe"><b>${fmtD(unpaidTot)}</b> owed</span>`:''}
          ${l.is_brycer_jurisdiction?'<span class="cc-bry">BRYCER</span>':''}
        </div>
      </div><div class="cc-arr">›</div>
    </div>`
  }).join('')
}

    <div class="st" style="cursor:pointer" onclick="filterMoney('outstanding')"><div class="sn y">${fmt(ow)}</div><div class="sl">Outstanding ›</div></div>
    <div class="st" style="cursor:pointer" onclick="openMazonQueue()"><div class="sn i">${fmt(mzPending.length?mzTotal:factoredTotal)}</div><div class="sl">${mzPending.length?'Mazon Queue · '+mzPending.length+' ›':'Mazon ›'}</div></div>

function iHtml(invs){
  if(!invs.length)return`<div class="ey"><div class="ey-i">💰</div><div class="ey-t">No invoices yet.</div></div>`
  return invs.map(i=>{
    const loc=D.locs.find(l=>l.id===i.location_id)
    const bc=i.status==='paid'?'bpaid':i.status==='sent'?'bsent':i.status==='overdue'?'bover':i.status==='record'?'brec':i.status==='factored'?'bfact':'bdraft'
    return`<div class="swipe-wrap" data-swipe-inv="${i.id}">
      <div class="swipe-del" onclick="event.stopPropagation()">Delete</div>
      <div class="swipe-inner ic" onclick="openInvDetail('${i.id}')" style="margin-bottom:0">
        <div class="ic-r1"><div><div class="ic-nm">${esc(loc?.name||'Unknown')}</div><div class="ic-sub">${i.invoice_number||'—'}</div></div><span class="badge ${bc}">${i.status}</span></div>
        <div class="ic-sub">${i.date?new Date(i.date).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}):''}</div>
        <div class="ic-amt">${fmt(+i.total)}</div>
      </div>
    </div>`
  }).join('')
}
function initSwipes(){
  document.querySelectorAll('.swipe-wrap[data-swipe-inv]').forEach(el=>{
    initSwipe(el,async()=>{
      const id=el.dataset.swipeInv
      const inv=D.invs.find(i=>i.id===id)
      if(!confirm('Delete invoice '+(inv?.invoice_number||'')+' ($'+(+(inv?.total||0)).toFixed(2)+')?'))return
      // Delegate to delInvoice so attachments cascade, storage is cleaned, and
      // the audit log gets written (was missing on the swipe path).
      await delInvoice(id)
    })
  })
  document.querySelectorAll('.swipe-wrap[data-swipe-job]').forEach(el=>{
    initSwipe(el,async()=>{
      const id=el.dataset.swipeJob
      const job=D.jobs.find(j=>j.id===id)
      const loc=D.locs.find(l=>l.id===job?.location_id)
      if(!confirm('Delete job for '+(loc?.name||'this location')+'? This also deletes all invoices and reports for this job.'))return
      const{data:invs2}=await SB.from('invoices').select('id').eq('job_id',id).is('deleted_at',null)
      const invIds2=(invs2||[]).map(x=>x.id)
      if(invIds2.length)await trash('invoice_lines',{invoice_id:invIds2},'Job deleted (swipe) — cascade','jon','app')
      if(invIds2.length)await trash('invoices',{id:invIds2},'Job deleted (swipe) — cascade','jon','app')
      await trash('reports',{job_id:id},'Job deleted (swipe) — cascade','jon','app')
      await trash('extinguisher_results',{job_id:id},'Job deleted (swipe) — cascade','jon','app')
      deleteJobGcalEvent(id)
      await trash('jobs',{id},'Job deleted (swipe)','jon','app')
      audit('deleted','job',id,'jon',null,'Job deleted (swipe) — soft-delete to trash')
      await load();toast('Job deleted');rJobs()
    })
  })
  document.querySelectorAll('.swipe-wrap[data-swipe-contact]').forEach(el=>{
    initSwipe(el,async()=>{
      const cid=el.dataset.swipeContact
      const locId=el.dataset.contactLoc
      // Schema is `contacts` + `contact_links`. Soft-delete the link, not the
      // contact itself (contact may be linked to other entities).
      const{error}=await SB.from('contact_links').update({deleted_at:new Date().toISOString()}).eq('contact_id',cid).eq('entity_id',locId)
      if(error){toast('Error removing: '+error.message,false);return}
      await load();toast('Contact removed');openCust(locId)
    })
  })
}
function fI(q){
  const ql=q.toLowerCase()
  $('iL').innerHTML=iHtml(D.invs.filter(i=>{const loc=D.locs.find(l=>l.id===i.location_id);return(loc?.name||'').toLowerCase().includes(ql)||(i.invoice_number||'').toLowerCase().includes(ql)}))
}

  const canMk=q.length>=2&&!matches.some(l=>(l.name||'').toLowerCase()===ql)

function handlePhoto(ev){
  const file=ev.target.files[0];if(!file)return
  // upload photo to storage in background
  try{uploadDocument(file,file.name,'photo','general','00000000-0000-0000-0000-000000000000',{source:'camera'})}catch(e){console.error('photo upload:',e)}
  const reader=new FileReader()
  reader.onload=e=>{
    const prev=$('photoPrev');if(prev){prev.src=e.target.result;prev.style.display='block'}
    const st=$('aiStatus');if(st)st.style.display='block'
    $('camInput').value=''
    const img=new Image()
    img.onload=async()=>{
      const canvas=document.createElement('canvas')
      const max=1600;let w=img.width,h2=img.height
      if(w>max||h2>max){if(w>h2){h2=Math.round(h2*max/w);w=max}else{w=Math.round(w*max/h2);h2=max}}
      canvas.width=w;canvas.height=h2
      canvas.getContext('2d').drawImage(img,0,0,w,h2)
      await runPhotoAI(canvas.toDataURL('image/jpeg',0.85).split(',')[1],'image/jpeg')
    }
    img.src=e.target.result
  }
  reader.readAsDataURL(file)
}

async function runPhotoAI(b64,mtype){
  const locList=D.locs.map(l=>({id:l.id,name:l.name,city:l.city||''}))
  try{
    const res=await fetch('/api/claude',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        model:'claude-sonnet-4-6',max_tokens:2000,
        messages:[{role:'user',content:[
          {type:'image',source:{type:'base64',media_type:mtype,data:b64}},
          {type:'text',text:`You are the AI assistant for Stephens Advanced LLC, a fire suppression contractor in DFW Texas. Extract ALL invoice and job details from this image. Scan the ENTIRE image top to bottom.

RULES:
- LINE ITEMS: Only items with a dollar amount written next to them. No price = notes field only.
- Copy dollar amounts EXACTLY as written. Never recalculate or change math.
- Copy customer name, address, phone, email exactly as written.
- SUB TOTAL and TOTAL at the bottom are most important — copy exactly.
- Note payment method if visible (check, cash, card, PAID).
- Include work order number and date if visible.
- SERVICE DATE IS CRITICAL: Look for ANY date on the document — handwritten dates, printed dates, invoice dates, "Date:" fields, date stamps. If multiple dates exist, use the SERVICE DATE or DATE OF SERVICE. If only one date exists, use that. The date MUST be extracted accurately in YYYY-MM-DD format. This date determines when the next service is due. IMPORTANT: Dates may be in military/Julian format like "30MAR26", "30 MAR 2026", "15JAN25", "01DEC2025", or DD-MMM-YY. Convert these correctly — "30MAR26" means 2026-03-30, "15JAN25" means 2025-01-15. Also handle DD/MM/YYYY (European) vs MM/DD/YYYY (US) — assume US format unless clearly European.

Known customers: ${JSON.stringify(locList)}

Return ONLY valid JSON, no markdown:
{"customer_name":"","matched_location_id":null,"is_new_customer":true,"new_customer":{"name":"","address":"","city":"","state":"TX","zip":"","contact_name":"","contact_phone":"","email":""},"service_date":null,"work_order_number":"","service_type":"","has_suppression":false,"has_extinguishers":false,"line_items":[{"description":"","quantity":1,"unit_price":0,"total_as_written":""}],"subtotal_as_written":"","total_as_written":"","payment_method":"","notes":"","confidence":"high/medium/low"}

IMPORTANT: Set has_suppression=true if ANY line item mentions suppression, hood, Ansul, kitchen, clean agent, FM-200, halon, novec, semi-annual inspection of systems, fusible link, nozzle, blow-off cap, or similar fire suppression system work. Set has_extinguishers=true if ANY line item mentions extinguisher, fire ext, tag, inspection tag, hydro test, or similar portable extinguisher work. service_date MUST be in YYYY-MM-DD format if found.`}
        ]}]
      })
    })
    const data=await res.json()
    const txt=data.content?.[0]?.text||''
    let p;try{p=JSON.parse(txt.replace(/```json|```/g,'').trim())}catch{throw new Error('parse')}
    const st=$('aiStatus');if(st)st.style.display='none'

    // duplicate check — look for existing invoice with same customer + date + total
    const dupFound=await _checkDuplicate(p)
    if(dupFound){
      const ar=$('aiResult')||$('recResult')
      if(ar){
        ar.innerHTML=`<div style="background:var(--warns);border:2px solid var(--warn);border-radius:var(--r);padding:20px;text-align:center;margin-top:16px">
          <div style="font-size:28px;margin-bottom:8px">&#9888;</div>
          <div style="font-size:16px;font-weight:800;color:var(--warn);margin-bottom:8px">Already Logged</div>

async function _checkDuplicate(p){
  try{
    const custName=(p.customer_name||'').toLowerCase().trim()
    const woNum=(p.work_order_number||'').trim()
    const svcDate=p.service_date||''
    const totalStr=(p.total_as_written||'').replace(/[^0-9.]/g,'')
    const total=parseFloat(totalStr)||0

    // check by work order number first (most reliable)
    if(woNum){
      const match=D.invs.find(i=>{
        const notes=(i.notes||'').toLowerCase()
        return notes.includes(woNum.toLowerCase())
      })
      if(match){
        const loc=D.locs.find(l=>l.id===match.location_id)
        return{locName:loc?.name||'',invNum:match.invoice_number||'',date:match.date||'',total:fmt(+match.total)}
      }
    }

    // check by customer name + date + approximate total
    if(custName&&svcDate){
      for(const inv of D.invs){
        const loc=D.locs.find(l=>l.id===inv.location_id)
        const locName=(loc?.name||'').toLowerCase()
        if(!locName.includes(custName)&&!custName.includes(locName))continue
        // check if date is close (same month)
        const invDate=inv.date||''
        if(invDate.slice(0,7)===svcDate.slice(0,7)){
          // check if total is close (within 10%)
          const invTotal=+(inv.total||0)
          if(total>0&&invTotal>0&&Math.abs(invTotal-total)/total<0.1){
            return{locName:loc?.name||'',invNum:inv.invoice_number||'',date:invDate,total:fmt(invTotal)}
          }
        }
      }
    }

    // check by customer name + total (no date)
    if(custName&&total>0){
      for(const inv of D.invs){
        const loc=D.locs.find(l=>l.id===inv.location_id)
        const locName=(loc?.name||'').toLowerCase()
        if(!locName.includes(custName)&&!custName.includes(locName))continue
        const invTotal=+(inv.total||0)
        if(Math.abs(invTotal-total)<1){
          return{locName:loc?.name||'',invNum:inv.invoice_number||'',date:inv.date||'',total:fmt(invTotal)}
        }
      }
    }
  }catch(e){console.error('dup check:',e)}
  return null
}

// franchise detection — find existing customers that share a name prefix
function detectFranchise(name){
  if(!name||name.length<3)return[]
  const words=name.trim().split(/\s+/)
  // try progressively shorter prefixes: "Look Cinemas" from "Look Cinemas Arlington"
  const matches=[]
  for(let len=words.length-1;len>=1;len--){
    const prefix=words.slice(0,len).join(' ').toLowerCase()
    if(prefix.length<3)continue
    const found=D.locs.filter(l=>(l.name||'').toLowerCase().startsWith(prefix))
    if(found.length){
      return found.map(l=>({id:l.id,name:l.name,city:l.city||'',prefix:words.slice(0,len).join(' ')}))
    }
  }
  return[]
}

// Resolve _parentBillingId ('ba-<id>' | 'loc-<id>' | null) to a real billing_account_id.
// If the user picked a sibling location that has no billing_account, promote it: create
// a billing_accounts row from that location's data and link the location to it.
async function _resolveParentBillingToBaId(){
  const ref=_parentBillingId
  if(!ref)return null
  if(ref.startsWith('ba-'))return ref.slice(3)
  if(ref.startsWith('loc-')){
    const siblingId=ref.slice(4)
    const sibling=D.locs.find(x=>x.id===siblingId)
    if(!sibling)return null
    if(sibling.billing_account_id)return sibling.billing_account_id
    // promote sibling to its own billing_account
    const{data:ba,error}=await SB.from('billing_accounts').insert({
      name:sibling.name,contact_name:sibling.contact_name||null,
      phone:sibling.contact_phone||null,email:sibling.contact_email||null,
      address:sibling.address||null,city:sibling.city||null,
      state:sibling.state||null,zip:sibling.zip||null
    }).select().single()
    if(error||!ba){console.error('promote sibling BA:',error);return null}
    await SB.from('locations').update({billing_account_id:ba.id}).eq('id',siblingId)
    return ba.id
  }
  return null
}

  const svcDate=dateVal?new Date(dateVal+'T12:00:00'):null
  const alert=$('rec-due-alert')
  const btn=$('recSaveBtn')
  _recData={hasSup,hasExt,isDue:false,dueType:'',monthsAgo:0}

  if(!svcDate||isNaN(svcDate)||!alert){if(alert)alert.innerHTML='';if(btn)btn.textContent='Record Old Job';return}
  const now=new Date()
  const monthsAgo=Math.round((now-svcDate)/(1000*60*60*24*30.44))
  _recData.monthsAgo=monthsAgo
  const supDue=hasSup&&monthsAgo>=6
  const extDue=hasExt&&!hasSup&&monthsAgo>=12

  if(supDue){
    _recData.isDue=true;_recData.dueType='suppression'
    alert.innerHTML=`<div style="background:var(--bads);border:2px solid var(--bad);border-radius:var(--r);padding:14px;margin-bottom:14px">
      <div style="font-size:13px;font-weight:800;color:var(--bad);margin-bottom:4px">REINSPECTION DUE — Suppression</div>
      <div style="font-size:12px;color:var(--w2)">Last service ${monthsAgo} months ago. Semi-annual (6 mo) required.</div>
    </div>`
    if(btn)btn.textContent='Record Old Job + Schedule Reinspection'
  }else if(extDue){
    _recData.isDue=true;_recData.dueType='extinguishers'
    alert.innerHTML=`<div style="background:var(--warns);border:2px solid var(--warn);border-radius:var(--r);padding:14px;margin-bottom:14px">
      <div style="font-size:13px;font-weight:800;color:var(--warn);margin-bottom:4px">REINSPECTION DUE — Extinguishers</div>
      <div style="font-size:12px;color:var(--w2)">Last service ${monthsAgo} months ago. Annual (12 mo) required.</div>
    </div>`
    if(btn)btn.textContent='Record Old Job + Schedule Reinspection'
  }else{
    const nextMonths=hasSup?6-monthsAgo:hasExt?12-monthsAgo:null
    if(nextMonths!==null&&nextMonths>0){
      alert.innerHTML=`<div style="background:var(--oks);border:2px solid var(--ok);border-radius:var(--r);padding:12px;margin-bottom:14px">
        <div style="font-size:12px;font-weight:700;color:var(--ok)">Not yet due — ~${nextMonths} month${nextMonths!==1?'s':''} until next inspection</div>
      </div>`
    }else{alert.innerHTML=''}
    if(btn)btn.textContent='Record Old Job'
  }
}

async function saveRecordInvoice(){
  const btn=$('recSaveBtn');if(btn){btn.innerHTML='<span class="spin"></span> Saving...';btn.disabled=true}
  const resetBtn=()=>{if(btn){btn.textContent=_recData.isDue?'Record Old Job + Schedule Reinspection':'Record Old Job';btn.disabled=false}}
  const locId=$('rec-loc')?.value
  let finalLocId=locId
  if(!locId){
    const nm=$('ai-nc-name')?.value?.trim()
    if(!nm){toast('Select a customer',false);resetBtn();return}
    const city=$('ai-nc-city')?.value?.trim()||''
    const baId2=await _resolveParentBillingToBaId()
    const{data:newLoc,error}=await SB.from('locations').insert({
      name:nm,address:$('ai-nc-addr')?.value?.trim()||null,city:city||null,
      state:$('ai-nc-st')?.value?.trim()||'TX',zip:$('ai-nc-zip')?.value?.trim()||null,
      contact_name:$('ai-nc-contact')?.value?.trim()||null,contact_phone:$('ai-nc-phone')?.value?.trim()||null,
      contact_email:$('ai-nc-email')?.value?.trim()||null,
      billing_account_id:baId2||null
    }).select().single()
    if(error){toast('Error saving customer',false);resetBtn();return}
    _parentBillingId=null
    finalLocId=newLoc.id;await load()
  }
  const lines=[]
  for(let i=0;i<_aiN;i++){
    const d=($('ald'+i)?.value||'').trim();if(!d)continue
    const q=parseFloat($('alq'+i)?.value)||1
    const up=parseFloat($('alup'+i)?.value)||parseFloat($('alp'+i)?.value)||0
    const lt=parseFloat($('alp'+i)?.value)||(q*up)
    lines.push({description:d,quantity:q,unit_price:up,total:lt})
  }
  if(!lines.length){toast('Add at least one line item',false);resetBtn();return}
  const total=lines.reduce((s,l2)=>s+l2.total,0)
  const invNum='INV-'+Date.now().toString().slice(-6)
  const isPaid=_recPayMethod&&_recPayMethod!=='unpaid'
  const payNote=_recPayMethod==='old_system'?'Old system file — paid':_recPayMethod==='check'?'Check #'+($('rec-check-num')?.value?.trim()||'?'):_recPayMethod==='cash'?'Cash — paid in full':_recPayMethod==='card'?'Card — paid in full':null
  const{data:inv,error}=await SB.from('invoices').insert({
    location_id:finalLocId,invoice_number:invNum,date:$('rec-date')?.value||td(),
    due_date:null,status:isPaid?'paid':'record',subtotal:total,total,
    notes:$('ai-notes')?.value?.trim()||null,
    ...(isPaid?{payment_method:_recPayMethod,payment_note:payNote,paid_at:new Date().toISOString()}:{})
  }).select().single()
  if(error){toast('Error saving',false);resetBtn();return}
  await SB.from('invoice_lines').insert(lines.map((l2,i)=>({invoice_id:inv.id,description:l2.description,quantity:l2.quantity,unit_price:l2.unit_price,total:l2.total,sort_order:i})))

  // always auto-schedule next service based on service date and scope
  let scheduledMsg=''
  if(finalLocId){
    const scopeBtns=$('rec-scope')?.querySelectorAll('button.ts')||[]
    const scopes=Array.from(scopeBtns).map(b=>b.dataset.k)
    const hasSup2=scopes.includes('suppression')
    const hasExt2=scopes.includes('extinguishers')
    const svcDateStr=$('rec-date')?.value||td()
    const svcDt=new Date(svcDateStr+'T12:00:00')
    // calculate next service: suppression=6 months from service date, ext-only=12 months
    const intervalMonths=hasSup2?6:hasExt2?12:0
    if(intervalMonths){
      const nextDate=new Date(svcDt)
      nextDate.setMonth(nextDate.getMonth()+intervalMonths)
      // if next date is in the past, schedule from today instead
      if(nextDate<=new Date()){nextDate.setTime(Date.now());nextDate.setDate(nextDate.getDate()+7)}
      const nds=nextDate.toISOString().split('T')[0]
      // check if a job already exists for this location near this date (within 30 days)
      const nearbyJobs=D.jobs.filter(j2=>j2.location_id===finalLocId&&j2.status==='scheduled'&&Math.abs(new Date(j2.scheduled_date+'T12:00:00')-nextDate)<30*86400000)
      if(!nearbyJobs.length){
        try{
          await SB.from('jobs').insert({
            location_id:finalLocId,type:'inspection',scope:scopes.length?scopes:['extinguishers','suppression'],
            scheduled_date:nds,scheduled_time:'09:00',status:'scheduled',
            notes:'Next service — from recorded work order ('+svcDateStr+')'
          })
          scheduledMsg=' + next service '+new Date(nds+'T12:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})
        }catch(e){console.error('auto-schedule:',e)}
      }else{
        scheduledMsg=' (service already scheduled)'
      }
    }
  }

  await load();_recordMode=false;popAll()
  toast('Recorded'+scheduledMsg)
  openInvDetail(inv.id)
}

function updateAiTotal(){
  let total=0
  for(let i=0;i<_aiN;i++){
    const q=parseFloat($('alq'+i)?.value)||1
    const up=parseFloat($('alup'+i)?.value)||0
    const lt=q*up
    const tp=$('alp'+i);if(tp)tp.value=lt.toFixed(2)
    total+=lt
  }
  const el=$('ai-running-total');if(el)el.textContent=fmtD(total)
}
function updateAiTotalFromLine(idx){
  const q=parseFloat($('alq'+idx)?.value)||1
  const lt=parseFloat($('alp'+idx)?.value)||0
  const up=$('alup'+idx);if(up&&q>0)up.value=(lt/q).toFixed(2)
  let total=0
  for(let i=0;i<_aiN;i++){total+=parseFloat($('alp'+i)?.value)||0}
  const el=$('ai-running-total');if(el)el.textContent=fmtD(total)
}

function updateRecTotal(){

  const el=$('rec-running-total');if(el)el.textContent=fmtD(total)
}

function updateRecTotalFromLine(idx){
  // user edited the line total directly — back-calc unit price
  const q=parseFloat($('alq'+idx)?.value)||1
  const lt=parseFloat($('alp'+idx)?.value)||0

  let total=0
  for(let i=0;i<_aiN;i++){total+=parseFloat($('alp'+i)?.value)||0}
  const el=$('rec-running-total');if(el)el.textContent=fmtD(total)
}
