// Tracks every dollar Jon spends so he can see real margins per job
// (revenue from invoices minus cost from expenses linked to that job).
// Manual entry + receipt photo capture in v1; OCR + auto-gas in v2.

const EXPENSE_CATEGORIES = [
  {value:'gas',          label:'⛽ Gas / Fuel'},
  {value:'parts',        label:'🔧 Parts / Supplies'},
  {value:'vendor_bill',  label:'🧾 Vendor Bill'},
  {value:'equipment',    label:'🛠 Equipment'},
  {value:'software',     label:'💻 Software / SaaS'},
  {value:'vehicle',      label:'🚐 Vehicle (oil, tires, repair)'},
  {value:'insurance',    label:'🛡 Insurance'},
  {value:'phone',        label:'📞 Phone / Internet'},
  {value:'meal',         label:'🍔 Meal'},
  {value:'lodging',      label:'🏨 Lodging'},
  {value:'tolls',        label:'🛣 Tolls / Parking'},
  {value:'office',       label:'📎 Office Supplies'},
  {value:'other',        label:'• Other'}
]

function _expenseCatLabel(v){return (EXPENSE_CATEGORIES.find(c=>c.value===v)||{label:v}).label}

// Sum expenses linked to a specific job. Used by openJob (per-job cost
// section) and by getJobMargin() if/when we add P&L per job.
function _jobCostTotal(jobId){
  if(!jobId)return 0
  return (D.expenses||[]).filter(e=>e.job_id===jobId&&!e.deleted_at).reduce((s,e)=>s+(+e.amount||0),0)
}

function rCosts(){
  const exps=(D.expenses||[]).filter(e=>!e.deleted_at)
  const bills=(D.bills||[]).filter(b=>!b.deleted_at)
  const buckets=(D.cashBuckets||[])
  const today=td()
  const weekAgo=new Date(Date.now()-7*86400000).toISOString().split('T')[0]
  const monthAgo=new Date(Date.now()-30*86400000).toISOString().split('T')[0]
  const weekOut=new Date(Date.now()+7*86400000).toISOString().split('T')[0]

  const sumToday=exps.filter(e=>e.date===today).reduce((s,e)=>s+(+e.amount||0),0)
  const sumWeek=exps.filter(e=>e.date>=weekAgo).reduce((s,e)=>s+(+e.amount||0),0)
  const sumMonth=exps.filter(e=>e.date>=monthAgo).reduce((s,e)=>s+(+e.amount||0),0)

  // Bills bucketed
  const unpaidBills=bills.filter(b=>!b.paid)
  const overdueBills=unpaidBills.filter(b=>b.due_date<today)
  const dueThisWeekBills=unpaidBills.filter(b=>b.due_date>=today&&b.due_date<=weekOut)
  const upcomingBills=unpaidBills.filter(b=>b.due_date>weekOut)
  const totalOwed=unpaidBills.reduce((s,b)=>s+(+b.amount||0),0)
  const overdueTotal=overdueBills.reduce((s,b)=>s+(+b.amount||0),0)

  // Group by date for the timeline list
  const byDate={}
  exps.forEach(e=>{
    const d=e.date||td()
    if(!byDate[d])byDate[d]=[]
    byDate[d].push(e)
  })
  const dateKeys=Object.keys(byDate).sort().reverse()

  // Cash buckets card colors per Profit First role
  const _bucketColor = name => name==='profit'?'#a855f7':name==='owner_pay'?'#10b981':name==='tax'?'#f59e0b':name==='opex'?'var(--info)':'var(--g1)'

  let h=`
    <!-- PROFIT FIRST CASH BUCKETS -->
    ${buckets.length?`<div style="background:var(--c1);border:1px solid var(--b1);border-radius:var(--r);padding:12px 14px;margin-bottom:14px">
      <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:10px">
        <div style="font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:1px;color:var(--g1)">Cash Position · Profit First</div>
        <div style="font-size:10px;color:var(--g2)">5/50/15/30 split</div>
      </div>
      ${buckets.map(b=>{
        const bal=Number(b.current_balance||0)
        const isOwnerPay=b.name==='owner_pay'
        return `<div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-top:1px solid var(--b1)">
          <div style="display:flex;align-items:center;gap:8px;min-width:0">
            <div style="width:8px;height:8px;border-radius:50%;background:${_bucketColor(b.name)};flex-shrink:0"></div>
            <span style="font-size:12px;font-weight:700;color:var(--w)">${esc(b.display_name)}</span>
            ${b.allocation_pct!=null?`<span style="font-size:10px;color:var(--g2)">${b.allocation_pct}%</span>`:''}
          </div>
          <div style="display:flex;align-items:center;gap:6px">
            <span style="font-size:14px;font-weight:800;color:${bal>0?_bucketColor(b.name):'var(--g2)'};font-variant-numeric:tabular-nums">${fmt(bal)}</span>
            ${isOwnerPay&&bal>0?`<span style="font-size:9px;font-weight:800;text-transform:uppercase;color:var(--ok);padding:2px 5px;border-radius:3px;background:rgba(16,185,129,.15)">↓ pay yourself</span>`:''}
          </div>
        </div>`
      }).join('')}
      <div style="display:flex;gap:6px;margin-top:10px">
        <button class="btn-dim" style="flex:1;font-size:11px;padding:8px" onclick="askRikerCash()">Ask Riker what to pay</button>
        <button class="btn-dim" style="flex:1;font-size:11px;padding:8px" onclick="openLogIncome()">+ Log income</button>
      </div>
    </div>`:''}

    <!-- BILLS DUE -->
    ${unpaidBills.length||overdueBills.length?`<div style="background:var(--c1);border:1px solid ${overdueBills.length?'var(--bad)':'var(--b1)'};border-radius:var(--r);padding:12px 14px;margin-bottom:14px">
      <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:8px">
        <div style="font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:1px;color:${overdueBills.length?'var(--bad)':'var(--g1)'}">Bills · ${unpaidBills.length} unpaid · ${fmt(totalOwed)} owed</div>
        <button onclick="openBillEntry({})" style="background:transparent;border:none;color:var(--fire);font-size:12px;font-weight:800;cursor:pointer">+ Bill</button>
      </div>
      ${overdueBills.length?`<div style="font-size:11px;font-weight:800;color:var(--bad);text-transform:uppercase;margin:6px 0 4px">⚠ Overdue · ${fmt(overdueTotal)}</div>`:''}
      ${overdueBills.concat(dueThisWeekBills).slice(0,8).map(b=>{
        const isOverdue=b.due_date<today
        const daysOff=Math.round((new Date(b.due_date)-new Date(today))/86400000)
        const dueLbl=isOverdue?`${Math.abs(daysOff)}d late`:daysOff===0?'today':`in ${daysOff}d`
        return `<div onclick="openBillEntry({id:'${b.id}'})" style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-top:1px solid var(--b1);cursor:pointer">
          <div style="min-width:0;flex:1">
            <div style="font-size:13px;font-weight:700;color:var(--w);overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(b.vendor)}</div>
            <div style="font-size:10px;color:${isOverdue?'var(--bad)':'var(--g1)'};margin-top:2px">${b.due_date} · ${dueLbl}${b.priority===0?' · MUST PAY':''}${b.recurring?' · recurring':''}${b.entity==='personal'?' · personal':''}</div>
          </div>
          <div style="display:flex;align-items:center;gap:8px">
            <span style="font-size:14px;font-weight:800;color:var(--w);font-variant-numeric:tabular-nums">${fmt(+b.amount||0)}</span>
            <button onclick="event.stopPropagation();markBillPaidQuick('${b.id}')" style="background:var(--ok);color:#fff;border:none;border-radius:4px;padding:4px 8px;font-size:10px;font-weight:800;cursor:pointer">PAID</button>
          </div>
        </div>`
      }).join('')}
      ${unpaidBills.length>(overdueBills.length+dueThisWeekBills.length)?`<div style="margin-top:8px;font-size:11px;color:var(--g2);text-align:center">+ ${unpaidBills.length-(overdueBills.length+dueThisWeekBills.length)} more upcoming</div>`:''}
    </div>`:`<div style="background:var(--c1);border:1px solid var(--b1);border-radius:var(--r);padding:12px 14px;margin-bottom:14px;display:flex;justify-content:space-between;align-items:center">
      <span style="font-size:12px;color:var(--g1)">No unpaid bills</span>
      <button onclick="openBillEntry({})" style="background:transparent;border:none;color:var(--fire);font-size:12px;font-weight:800;cursor:pointer">+ Bill</button>
    </div>`}

    <!-- TOTALS STRIP (spend) -->
    <div style="display:flex;gap:8px;margin-bottom:14px">
      <div style="flex:1;padding:12px;background:var(--c1);border:1px solid var(--b1);border-radius:var(--rs);text-align:center">
        <div style="font-size:18px;font-weight:800;color:var(--w);font-variant-numeric:tabular-nums">${fmt(sumToday)}</div>
        <div style="font-size:10px;color:var(--g2);text-transform:uppercase;letter-spacing:.8px;margin-top:2px">Today</div>
      </div>
      <div style="flex:1;padding:12px;background:var(--c1);border:1px solid var(--b1);border-radius:var(--rs);text-align:center">
        <div style="font-size:18px;font-weight:800;color:var(--w);font-variant-numeric:tabular-nums">${fmt(sumWeek)}</div>
        <div style="font-size:10px;color:var(--g2);text-transform:uppercase;letter-spacing:.8px;margin-top:2px">7d Spend</div>
      </div>
      <div style="flex:1;padding:12px;background:var(--c1);border:1px solid var(--b1);border-radius:var(--rs);text-align:center">
        <div style="font-size:18px;font-weight:800;color:var(--w);font-variant-numeric:tabular-nums">${fmt(sumMonth)}</div>
        <div style="font-size:10px;color:var(--g2);text-transform:uppercase;letter-spacing:.8px;margin-top:2px">30d Spend</div>
      </div>
    </div>

    <!-- ACTIONS -->
    <div style="display:flex;gap:8px;margin-bottom:14px">
      <button class="btn-p" style="flex:2" onclick="openExpenseEntry({snap:true})">📷 Snap a Bill</button>
      <button class="btn-dim" style="flex:1" onclick="openExpenseEntry({})">+ Manual</button>
    </div>`

  if(!exps.length){
    h+=`<div class="ey"><div class="ey-i">🧾</div><div class="ey-t">No expenses logged yet.<br><br><span style="font-size:12px;color:var(--g2)">Tap Snap a Bill to log a receipt or + Manual for cash entries.</span></div></div>`
  } else {
    dateKeys.forEach(dk=>{
      const dayExps=byDate[dk]
      const dayTotal=dayExps.reduce((s,e)=>s+(+e.amount||0),0)
      const dateFmt=fmtFullDate(dk)
      h+=`<div style="margin-top:14px"><div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:6px;padding:0 4px">

            </div>
          </div>
        </div>`
      })
      h+=`</div>`
    })
  }
  $('costsC').innerHTML=h
}

async function handleExpensePhoto(ev){
  const file=ev.target.files[0]; if(!file)return
  toast('Resizing photo…')
  try{
    const b64=await resizePhoto(file,1600,0.85)
    _expensePhotoB64=b64
    const prev=document.getElementById('exp-photo-preview')
    if(prev){
      // Replace placeholder div with img if needed
      if(prev.tagName.toLowerCase()!=='img'){
        const img=document.createElement('img')
        img.id='exp-photo-preview'
        img.src=b64
        img.style='max-width:100%;max-height:240px;border-radius:var(--rs);border:1px solid var(--b1)'
        prev.replaceWith(img)
      } else {
        prev.src=b64
      }
    }
    toast('Photo ready · saves with the expense')
  }catch(e){console.error('expense photo:',e);toast('Photo error: '+e.message,false)}
}

async function saveExpense(existingId){
  const amount=parseFloat(($('exp-amount')||{}).value||'0')
  if(!amount||isNaN(amount)||amount<0){toast('Enter a valid amount',false);return}
  const row={
    amount,
    category: ($('exp-category')||{}).value || 'other',
    vendor: ($('exp-vendor')||{}).value || null,
    date: ($('exp-date')||{}).value || td(),
    job_id: (($('exp-job')||{}).value || '') || null,
    description: ($('exp-notes')||{}).value || null,
    paid_via: ($('exp-paid-via')||{}).value || null,
    tax_deductible: !!($('exp-deductible')||{}).checked,
    reimbursable: !!($('exp-reimbursable')||{}).checked,
    tech_id: window._me?.tech?.id || null,
    source: _expensePhotoB64 ? 'photo_capture' : 'manual',
    updated_at: new Date().toISOString()
  }
  // Auto-fill location_id from the linked job
  if(row.job_id){
    const j=D.jobs.find(x=>x.id===row.job_id)
    if(j?.location_id) row.location_id=j.location_id
  }
  setLoad('exp-save-btn',true)
  let expId=existingId||null

  // Upload photo first (if any) so we have the URL to store on the row.
  // Storage path: expense-receipts/<yyyy>/<mm>/<uuid>.jpg
  if(_expensePhotoB64){
    try{
      const blob=dataURItoBlob(_expensePhotoB64)
      const dt=new Date(row.date+'T12:00:00')
      const yr=dt.getFullYear(), mo=String(dt.getMonth()+1).padStart(2,'0')
      const fname=(crypto.randomUUID?crypto.randomUUID():(Date.now()+'-'+Math.random().toString(36).slice(2,10)))+'.jpg'
      const path=`${yr}/${mo}/${fname}`
      const{error:upErr}=await SB.storage.from('expense-receipts').upload(path,blob,{contentType:'image/jpeg',upsert:false})
      if(upErr)throw new Error(upErr.message)
      const{data:pub}=SB.storage.from('expense-receipts').getPublicUrl(path)
      row.photo_url=pub?.publicUrl||null
      row.photo_path=path
    }catch(e){
      console.error('expense photo upload:',e)
      toast('Photo upload failed: '+e.message,false)
      setLoad('exp-save-btn',false)
      return
    }
  }

  if(existingId){
    const{error}=await SB.from('expenses').update(row).eq('id',existingId)
    if(error){setLoad('exp-save-btn',false);toast('Save failed: '+error.message,false);return}
    expId=existingId
  } else {
    const{data:ins,error}=await SB.from('expenses').insert(row).select().single()
    if(error){setLoad('exp-save-btn',false);toast('Save failed: '+error.message,false);return}
    expId=ins.id
  }

  audit(existingId?'updated':'created','expense',expId,'jon',{amount:row.amount,category:row.category,job_id:row.job_id||null},`Expense ${existingId?'updated':'logged'}: ${fmt(row.amount)} · ${row.category}${row.vendor?' · '+row.vendor:''}`)
  await load()
  pop()
  rCosts()
  toast('✓ Expense saved')
}

async function delExpense(id){
  // Use trash() for parity with every other entity delete in this app —
  // it writes a full snapshot to deleted_records BEFORE flipping
  // deleted_at, so an accidental delete is restorable. Storage object
  // is left in place so the photo URL on the snapshot still resolves
  // for restore.
  const res=await trash('expenses',{id},'Expense deleted','jon','app')
  if(res.error){toast('Delete failed: '+res.error,false);return}
  audit('deleted','expense',id,'jon',null,'Expense soft-deleted (snapshot in deleted_records)')
  await load()
  pop()
  rCosts()
  toast('Expense deleted')
}

      </div>
    </div>

    <button class="btn-p" style="margin-bottom:14px" onclick="openExpenseEntry({jobId:'${jobId}'})">+ Log Another Cost</button>`

  if(!exps.length){
    h+=`<div class="ey"><div class="ey-i">🧾</div><div class="ey-t">No costs logged for this job.</div></div>`
  } else {
    exps.forEach(e=>{
      h+=`<div onclick="pop();openExpenseEntry({id:'${e.id}'})" style="display:flex;gap:10px;align-items:center;padding:10px 12px;margin-bottom:4px;background:var(--c1);border:1px solid var(--b1);border-radius:var(--rs);cursor:pointer">
        ${e.photo_url?`<img src="${esc(e.photo_url)}" style="width:44px;height:44px;object-fit:cover;border-radius:6px;flex-shrink:0;border:1px solid var(--b1)">`:`<div style="width:44px;height:44px;border-radius:6px;background:var(--c2);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0">${_expenseCatLabel(e.category).split(' ')[0]}</div>`}

          </div>

  h+=`</div>`
  push(h)
}

async function saveBill(existingId){
  const amount=parseFloat(($('bill-amount')||{}).value||'0')
  if(!amount||isNaN(amount)||amount<0){toast('Enter a valid amount',false);return}
  const vendor=($('bill-vendor')||{}).value?.trim()
  if(!vendor){toast('Vendor required',false);return}
  const due=($('bill-due')||{}).value
  if(!due){toast('Due date required',false);return}
  const recurring=!!($('bill-recurring')||{}).checked
  const row={
    vendor, amount, due_date:due,
    category: ($('bill-category')||{}).value || 'other',
    entity: ($('bill-entity')||{}).value || 'business',
    priority: parseInt(($('bill-priority')||{}).value||'5'),
    recurring,
    recurring_interval: recurring ? (($('bill-rec-interval')||{}).value || 'monthly') : null,
    recurring_day_of_month: recurring ? (parseInt(($('bill-rec-day')||{}).value)||null) : null,
    autopay: !!($('bill-autopay')||{}).checked,
    notes: ($('bill-notes')||{}).value || null,
    updated_at: new Date().toISOString()
  }
  setLoad('bill-save-btn',true)
  let billId=existingId||null
  if(existingId){
    const{error}=await SB.from('bills').update(row).eq('id',existingId)
    if(error){setLoad('bill-save-btn',false);toast('Save failed: '+error.message,false);return}
  } else {
    const{data:ins,error}=await SB.from('bills').insert(row).select().single()
    if(error){setLoad('bill-save-btn',false);toast('Save failed: '+error.message,false);return}
    billId=ins.id
  }
  audit(existingId?'updated':'created','bill',billId,'jon',{amount:row.amount,vendor:row.vendor,due:row.due_date},`Bill ${existingId?'updated':'logged'}: ${fmt(row.amount)} to ${row.vendor} due ${row.due_date}`)
  await load()
  pop()
  rCosts()
  toast('✓ Bill saved')

// One-tap "PAID" button — uses defaults: paid_via=null, from opex bucket,
// also creates an expense row. For nuanced inputs Jon edits the bill first.
async function markBillPaidQuick(id){
  const bill=(D.bills||[]).find(b=>b.id===id)
  if(!bill){toast('Bill not found',false);return}
  if(!confirm(`Mark "${bill.vendor}" $${(+bill.amount).toFixed(2)} as paid (from OpEx bucket)?`))return
  const nowIso=new Date().toISOString()
  // Create matching expense row
  let expId=null
  try{
    const{data:exp}=await SB.from('expenses').insert({
      amount:bill.amount, category:bill.category, vendor:bill.vendor,
      date:nowIso.slice(0,10), description:`Bill payment · ${bill.vendor}`,
      source:'bill_payment', entity:bill.entity,
      tax_deductible:bill.entity!=='personal',
      tech_id:window._me?.tech?.id||null
    }).select().single()
    expId=exp?.id
  }catch(e){console.error('bill→expense:',e)}
  // Decrement OpEx bucket via atomic RPC. Watcher caught the read-modify-
  // write race: D.cashBuckets is stale after page load, and a concurrent
  // invoice-paid trigger could increment OpEx between our read and write,
  // silently losing the trigger's add. adjust_bucket does an atomic
  // `current_balance = current_balance + p_delta` SQL update.
  await SB.rpc('adjust_bucket',{p_name:'opex',p_delta:-Number(bill.amount)})
  // Mark bill paid
  const{error}=await SB.from('bills').update({
    paid:true, paid_at:nowIso, paid_from_bucket:'opex', expense_id:expId, updated_at:nowIso
  }).eq('id',id)
  if(error){toast('Update failed: '+error.message,false);return}
  audit('updated','bill',id,'jon',{paid:true,from_bucket:'opex'},`Bill paid: ${fmt(bill.amount)} to ${bill.vendor} from opex`)
  await load(); rCosts()
  toast(`✓ Paid ${fmt(bill.amount)} to ${bill.vendor}`)
}

async function openLogIncome(){

  if(!amt)return
  const n=parseFloat(amt)
  if(!n||isNaN(n)||n<=0){toast('Invalid amount',false);return}
  const note=prompt('Source / note (optional):')||''
  // Single allocate_invoice_payment call with p_source — function writes
  // ONE labeled cash_allocations row. (Watcher caught a double-write
  // before: the function logged one row + this code logged a second
  // empty-breakdown row, so SUM(source_amount) double-counted.)
  const{error}=await SB.rpc('allocate_invoice_payment',{
    p_invoice_id:null,
    p_amount:n,
    p_source:note?`manual:${note.slice(0,40)}`:'manual'
  })
  if(error){toast('Allocation failed: '+error.message,false);return}
  await load(); rCosts()
  toast(`✓ Allocated ${fmt(n)} via Profit First sweep`)
}

function showStatDrill(type){

  if(type==='today'){

    jobs=D.jobs.filter(j=>j.scheduled_date===t)
  }else if(type==='estimated'){
    // this week
    const wEnd=new Date();wEnd.setDate(wEnd.getDate()+7)
    const wEndStr=wEnd.toISOString().split('T')[0]
    title='This Week\'s Jobs'
    jobs=D.jobs.filter(j=>j.status==='scheduled'&&j.scheduled_date>=t&&j.scheduled_date<=wEndStr)

function filterMoney(type){
  const now=new Date()
  const monthStart=new Date(now.getFullYear(),now.getMonth(),1).toISOString().split('T')[0]
  const monthEnd=new Date(now.getFullYear(),now.getMonth()+1,0).toISOString().split('T')[0]
  let title='',invs=[]
  if(type==='paid'){
    title='Collected This Month'
    invs=D.invs.filter(i=>i.status==='paid'&&i.date>=monthStart&&i.date<=monthEnd)
  }else if(type==='unpaid'){
    title='Unpaid'
    invs=D.invs.filter(i=>['draft','sent'].includes(i.status))
  }else if(type==='outstanding'){
    title='Outstanding (All)'
    invs=D.invs.filter(i=>!['paid','void','record','factored'].includes(i.status))
  }else{
    title='Outstanding'
    invs=D.invs.filter(i=>!['paid','void','record'].includes(i.status))
  }
  const total=invs.reduce((s,i)=>s+(+i.total),0)
  let h=`<div class="ov-hdr">
    <button class="ov-back" onclick="pop()">‹</button>
    <div class="ov-title">${title}</div>
    <div class="ov-act" style="color:var(--ok);font-size:14px;font-weight:800">${fmt(total)}</div>

  if(!invs.length){h+=`<div class="ey"><div class="ey-i">💰</div><div class="ey-t">No invoices in this category.</div></div>`}
  else invs.forEach(i=>{
    const loc=D.locs.find(l=>l.id===i.location_id)
    const bc=i.status==='paid'?'bpaid':i.status==='sent'?'bsent':i.status==='overdue'?'bover':'bdraft'

function rTodayCard(){

  const tLocal=now.getFullYear()+'-'+String(now.getMonth()+1).padStart(2,'0')+'-'+String(now.getDate()).padStart(2,'0')
  const hour=now.getHours()
  const greet=hour<5?'Late shift':hour<12?'Morning':hour<17?'Afternoon':hour<21?'Evening':'Late'
  const firstName=(window.USER_NAME||'Jon').split(' ')[0]
  const todayJobs=D.jobs.filter(j=>j.scheduled_date===tLocal&&j.status!=='cancelled'&&j.status!=='completed')

      <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px">
        ${svcLabel?`<span class="tg ts">${esc(svcLabel)}</span>`:''}
        ${tk?`<span class="tg tg-pers"><span class="tg-pers-av" style="background:${tk.color||'var(--slate)'}">${esc(tk.name.split(' ').map(s=>s[0]).filter(Boolean).slice(0,2).join('').toUpperCase())}</span>${esc(tk.name.split(' ')[0])}</span>`:''}

  const calShown=localStorage.getItem('home_v2_cal_open')==='1'
  h+=`<button onclick="(function(){const el=document.getElementById('calContent');const open=el.style.display!=='none';el.style.display=open?'none':'block';localStorage.setItem('home_v2_cal_open',open?'0':'1');event.currentTarget.textContent=open?'View month calendar ›':'Hide month calendar';})()" style="width:100%;padding:12px;border-radius:var(--rs);background:var(--c1);border:1px solid var(--b1);color:var(--w2);font-size:12px;font-weight:700;letter-spacing:.3px;cursor:pointer;min-height:44px">${calShown?'Hide month calendar':'View month calendar ›'}</button>`
  if(calShown){setTimeout(()=>{const el=document.getElementById('calContent');if(el)el.style.display='block'},0)}

  $('todayContent').innerHTML=h

function rJobsCal(){
  const now=new Date()
  if(!_calYear){_calYear=now.getFullYear();_calMonth=now.getMonth()}
  const t=td()
  const monthNames=['January','February','March','April','May','June','July','August','September','October','November','December']
  const dayNames=['Sun','Mon','Tue','Wed','Thu','Fri','Sat']
  const firstDay=new Date(_calYear,_calMonth,1).getDay()
  const daysInMonth=new Date(_calYear,_calMonth+1,0).getDate()
  const all=D.jobs.filter(j=>j.status!=='cancelled')

  let h=`<div style="display:flex;align-items:center;justify-content:space-between;margin:8px 0 12px">
    <button style="font-size:22px;color:var(--fire);padding:8px 12px;background:none;border:none;cursor:pointer;min-height:44px" onclick="_calMonth--;if(_calMonth<0){_calMonth=11;_calYear--}rJobsCal()">‹</button>
    <div style="text-align:center">
      <div style="font-size:17px;font-weight:800">${monthNames[_calMonth]} ${_calYear}</div>
      <button style="font-size:10px;color:var(--info);font-weight:700;background:none;border:none;cursor:pointer;margin-top:2px" onclick="_calYear=${now.getFullYear()};_calMonth=${now.getMonth()};rJobsCal()">Today</button>
    </div>
    <button style="font-size:22px;color:var(--fire);padding:8px 12px;background:none;border:none;cursor:pointer;min-height:44px" onclick="_calMonth++;if(_calMonth>11){_calMonth=0;_calYear++}rJobsCal()">›</button>
  </div>
  <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:1px;margin-bottom:4px">`
  dayNames.forEach(d=>h+=`<div style="text-align:center;font-size:9px;font-weight:800;color:var(--g2);padding:4px;text-transform:uppercase;letter-spacing:.5px">${d}</div>`)
  h+=`</div><div style="display:grid;grid-template-columns:repeat(7,1fr);gap:1px">`

  // empty cells before first day
  for(let i=0;i<firstDay;i++)h+=`<div style="min-height:52px;background:var(--c1);border-radius:4px"></div>`

  // expand calendar events for the visible month
  const monthStart=new Date(_calYear,_calMonth,1)
  const monthEnd=new Date(_calYear,_calMonth+1,0,23,59,59)
  const monthEvents=expandRecurring(D.calEvents||[],monthStart,monthEnd)

  for(let d=1;d<=daysInMonth;d++){
    const ds=`${_calYear}-${(_calMonth+1).toString().padStart(2,'0')}-${d.toString().padStart(2,'0')}`
    const dayJobs=all.filter(j=>j.scheduled_date===ds)
    const dayEvts=monthEvents.filter(e=>{const ed=new Date(e.start_time).toISOString().split('T')[0];return ed===ds&&e.event_type!=='job'})
    const isToday=ds===t
    const scheduled=dayJobs.filter(j=>j.status==='scheduled'&&j.scheduled_date>=t)
    const overdue=dayJobs.filter(j=>j.status==='scheduled'&&j.scheduled_date<t)
    const completed=dayJobs.filter(j=>j.status==='completed')
    const hasItems=dayJobs.length||dayEvts.length

    h+=`<div style="min-height:52px;background:${isToday?'var(--fires)':'var(--c1)'};border-radius:4px;padding:4px;cursor:pointer;border:${isToday?'1.5px solid var(--fire)':'1px solid var(--b1)'};position:relative;overflow:hidden" onclick="openCalDay('${ds}')">
      <div style="font-size:12px;font-weight:${isToday?'900':'600'};color:${isToday?'var(--fire)':'var(--w)'};margin-bottom:2px">${d}</div>`
    if(hasItems){
      h+=`<div style="display:flex;gap:2px;flex-wrap:wrap">`
      if(overdue.length)h+=`<div style="width:6px;height:6px;border-radius:50%;background:var(--bad)"></div>`.repeat(Math.min(overdue.length,3))
      if(scheduled.length)h+=`<div style="width:6px;height:6px;border-radius:50%;background:var(--info)"></div>`.repeat(Math.min(scheduled.length,3))
      if(completed.length)h+=`<div style="width:6px;height:6px;border-radius:50%;background:var(--g3)"></div>`.repeat(Math.min(completed.length,3))
      // calendar event dots by type
      const william=dayEvts.filter(e=>e.event_type==='william')
      const personal=dayEvts.filter(e=>e.event_type==='personal')
      const billing=dayEvts.filter(e=>e.event_type==='recurring_billing')
      if(william.length)h+=`<div style="width:6px;height:6px;border-radius:50%;background:#6366f1"></div>`.repeat(Math.min(william.length,2))
      if(personal.length)h+=`<div style="width:6px;height:6px;border-radius:50%;background:#10b981"></div>`.repeat(Math.min(personal.length,1))
      if(billing.length)h+=`<div style="width:4px;height:4px;border-radius:50%;background:#ef4444"></div>`.repeat(Math.min(billing.length,2))
      h+=`</div>`
    }
    h+=`</div>`
  }

  // fill remaining cells
  const totalCells=firstDay+daysInMonth
  const remaining=totalCells%7?7-totalCells%7:0
  for(let i=0;i<remaining;i++)h+=`<div style="min-height:52px;background:var(--c1);border-radius:4px;opacity:.3"></div>`

  h+=`</div>`

  // overdue summary below calendar
  const ovAll=all.filter(j=>j.status==='scheduled'&&j.scheduled_date<t)
  if(ovAll.length){
    const oldest=ovAll.reduce((a,b)=>a.scheduled_date<b.scheduled_date?a:b)
    const ageDays=Math.max(1,Math.floor((new Date(t)-new Date(oldest.scheduled_date))/86400000))
    h+=`<div style="background:var(--warns);border-left:3px solid var(--warn);border-radius:var(--rs);padding:12px 14px;margin-top:12px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;gap:12px" onclick="askRikerAboutOverdue()">
      <div>
        <div style="font-size:12px;font-weight:800;color:var(--warn);letter-spacing:.3px">${ovAll.length} Overdue Job${ovAll.length>1?'s':''}</div>
        <div style="font-size:11px;color:var(--g1);margin-top:3px">Oldest: ${ageDays} day${ageDays>1?'s':''} overdue · Tap to ask Riker</div>
      </div>
      <span style="font-size:12px;font-weight:800;color:var(--warn);white-space:nowrap">💬 Ask Riker ›</span>
    </div>`
  }

  const jc=$('calContent')||$('jobsContent')||$('jobsC');jc.innerHTML=h
}

function openCalDay(ds){
  const t=td()
  let dayJobs,dayEvts=[],title
  if(ds==='overdue'){
    dayJobs=D.jobs.filter(j=>j.status==='scheduled'&&j.scheduled_date<t)
    title='Overdue Jobs'
  }else{
    dayJobs=D.jobs.filter(j=>j.scheduled_date===ds&&j.status!=='cancelled')
    dayEvts=eventsForDate(ds).filter(e=>e.event_type!=='job')
    const dt=new Date(ds+'T12:00:00')
    title=dt.toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'})
  }

  // time slots from 7am to 6pm
  const slots=[]
  for(let hr=7;hr<=18;hr++){
    const hStr=hr.toString().padStart(2,'0')+':00'
    const label=hr>12?(hr-12)+' PM':(hr===12?'12 PM':hr+' AM')
    const slotJobs=dayJobs.filter(j=>{
      const jh=parseInt((j.scheduled_time||'09:00').split(':')[0])
      return jh===hr
    })
    const slotEvts=dayEvts.filter(e=>{
      const sh=new Date(e.start_time).getHours()
      return sh===hr
    })
    slots.push({hr,hStr,label,jobs:slotJobs,events:slotEvts})
  }
  const unslotted=dayJobs.filter(j=>{
    const jh=parseInt((j.scheduled_time||'99').split(':')[0])
    return jh<7||jh>18||isNaN(jh)
  })

  let h=`<div class="ov-hdr"><button class="ov-back" onclick="pop()">‹</button><div class="ov-title">${title}</div>
    ${ds!=='overdue'?`<button class="ov-act" onclick="pop();schedFromCal('${ds}')">+ Add</button>`:''}
  </div><div class="ov-body">`

  // available slots summary
  if(ds!=='overdue'){
    const avail=getAvailableSlots(ds)
    if(avail.length){
      h+=`<div style="font-size:10px;color:var(--g2);margin-bottom:8px;font-weight:600">Open: ${avail.map(s=>s.start+'-'+s.end).join(', ')}</div>`
    }
  }

  if(!dayJobs.length&&!dayEvts.length&&ds!=='overdue'){
    h+=`<div style="text-align:center;padding:40px;color:var(--g2)">
      <div style="font-size:32px;margin-bottom:8px;opacity:.3">📅</div>
      <div style="font-size:14px;margin-bottom:16px">No jobs on this day</div>
      <button class="btn-p" style="max-width:240px;margin:0 auto" onclick="pop();schedFromCal('${ds}')">Schedule a Job Here</button>
    </div>`
  }else{
    if(unslotted.length){
      h+=`<div style="margin-bottom:12px">`
      unslotted.forEach(j=>h+=jCard(j,ds!=='overdue'&&j.scheduled_date<t))
      h+=`</div>`
    }
    slots.forEach(s=>{
      const hasContent=s.jobs.length||s.events.length
      if(!hasContent&&ds==='overdue')return
      h+=`<div style="display:flex;gap:8px;min-height:48px;margin-bottom:2px">
        <div style="width:52px;font-size:11px;font-weight:600;color:var(--g2);padding-top:6px;flex-shrink:0;text-align:right">${s.label}</div>
        <div style="flex:1;border-left:1px solid var(--b1);padding-left:8px;min-height:48px${!hasContent?';cursor:pointer':''}"${!hasContent&&ds!=='overdue'?` onclick="pop();schedFromCal('${ds}','${s.hStr}')"`:''}>`
      // calendar events for this slot
      s.events.forEach(e=>{
        const st=new Date(e.start_time),et=new Date(e.end_time)
        const timeStr=st.getHours().toString().padStart(2,'0')+':'+st.getMinutes().toString().padStart(2,'0')+' - '+et.getHours().toString().padStart(2,'0')+':'+et.getMinutes().toString().padStart(2,'0')
        const typeBadge={william:'👦 William',personal:'🟢 Personal',recurring_billing:'💰 Bill Due'}[e.event_type]||e.event_type
        h+=`<div style="background:${e.color||'#6366f1'}15;border:1px solid ${e.color||'#6366f1'}40;border-radius:var(--rs);padding:10px;margin-bottom:4px;border-left:3px solid ${e.color||'#6366f1'}">
          <div style="display:flex;justify-content:space-between;align-items:center">
            <div style="font-size:13px;font-weight:700;color:${e.color||'#6366f1'}">${esc(e.title)}</div>
            <span style="font-size:9px;font-weight:800;padding:2px 6px;border-radius:3px;background:${e.color||'#6366f1'}20;color:${e.color||'#6366f1'}">${typeBadge}</span>
          </div>
          <div style="font-size:11px;color:var(--g1);margin-top:2px">${timeStr}</div>
        </div>`
      })
      // jobs for this slot
      if(s.jobs.length){
        s.jobs.forEach(j=>{
          const l=D.locs?.find(x=>x.id===(j.location_id||j.location?.id))||j.location||{}
          const sc=j.scope||[]
          h+=`<div style="background:var(--c1);border:1px solid var(--b1);border-radius:var(--rs);padding:10px;margin-bottom:4px;cursor:pointer;border-left:3px solid ${j.status==='completed'?'var(--g3)':j.scheduled_date<t?'var(--bad)':'var(--info)'}" onclick="openJob('${j.id}')">
            <div style="font-size:13px;font-weight:700">${esc(l.name||'Unknown')}</div>
            <div style="font-size:11px;color:var(--g1);margin-top:2px"><span style="cursor:pointer;color:var(--info);text-decoration:underline;text-decoration-color:rgba(99,102,241,.3)" onclick="event.stopPropagation();reschedJob('${j.id}')">${(j.scheduled_time||'').slice(0,5)||'No time'}</span> · ${sc.join(', ')}</div>
          </div>`
        })
      }
      h+=`</div></div>`
    })
  }

  h+=`</div>`
  push(h);setTimeout(initSwipes,50)
}

function rJobsList(q){
  const t=td(),now=new Date(),curMonth=now.getFullYear()+'-'+(now.getMonth()+1).toString().padStart(2,'0')
  const all=D.jobs.filter(j=>j.status!=='cancelled')
  // hide completed jobs AND jobs that already have an invoice (they're done)
  const invoicedJobIds=new Set(D.invs.filter(i=>i.job_id).map(i=>i.job_id))
  // Quotes always show regardless of proposed_date (they're a separate
  // pipeline, not bounded by the current-month filter that scoped scheduled
  // jobs). Without this carve-out, a quote proposed for July renders
  // invisible in April.
  const visible=all.filter(j=>j.status!=='completed'&&!invoicedJobIds.has(j.id)&&(j.status==='quote'||!j.scheduled_date||j.scheduled_date.slice(0,7)<=curMonth))
  let filtered=visible
  if(q){
    const ql=q.toLowerCase()
    // search across ALL non-cancelled jobs (including completed + invoiced) so customers can find past work
    filtered=all.filter(j=>{
      const l=D.locs?.find(x=>x.id===(j.location_id||j.location?.id))||j.location||{}
      return(l.name||'').toLowerCase().includes(ql)||(l.address||'').toLowerCase().includes(ql)||(l.city||'').toLowerCase().includes(ql)||(j.scheduled_date||'').includes(ql)
    })
  }
  const quotes=filtered.filter(j=>j.status==='quote')
  const ov=filtered.filter(j=>j.status==='scheduled'&&j.scheduled_date<t)
  const up=filtered.filter(j=>j.status==='scheduled'&&j.scheduled_date>=t)
  const done=q?filtered.filter(j=>j.status==='completed'||invoicedJobIds.has(j.id)).sort((a,b)=>(b.scheduled_date||'').localeCompare(a.scheduled_date||'')):[]
  const active=filtered
  if($('jobs-list')){
    let h2=''
    if(quotes.length){h2+=`<div class="sec"><div class="sec-t" style="color:#a855f7">Quotes Pending · ${quotes.length}</div></div>`;quotes.forEach(j=>h2+=jCard(j))}
    if(ov.length){h2+=`<div class="sec"><div class="sec-t" style="color:var(--bad)">Overdue · ${ov.length}</div></div>`;ov.forEach(j=>h2+=jCard(j,true))}
    if(up.length){h2+=`<div class="sec"><div class="sec-t">Scheduled · ${up.length}</div></div>`;up.forEach(j=>h2+=jCard(j))}
    if(done.length){h2+=`<div class="sec"><div class="sec-t" style="color:var(--mu)">Completed · ${done.length}</div></div>`;done.forEach(j=>h2+=jCard(j))}
    if(!active.length&&q)h2+=`<div class="ey"><div class="ey-t">No jobs matching "${esc(q)}"</div></div>`
    $('jobs-list').innerHTML=h2
    return
  }
  let h=`<div style="display:flex;justify-content:space-between;align-items:center;margin:8px 0 12px">
    <div class="sec-t">Jobs · ${active.length}</div>
    <button onclick="openSchedJob({asQuote:true})" style="background:#a855f7;color:#fff;border:none;border-radius:var(--rs);padding:6px 12px;font-size:11px;font-weight:800;cursor:pointer;letter-spacing:.4px">+ QUOTE</button>
  </div>
  <input class="srch" placeholder="Search customer, city, date, or completed jobs..." oninput="rJobsList(this.value)">`
  h+=`<div id="jobs-list">`
  if(quotes.length){h+=`<div class="sec"><div class="sec-t" style="color:#a855f7">Quotes Pending · ${quotes.length}</div></div>`;quotes.forEach(j=>h+=jCard(j))}
  if(ov.length){h+=`<div class="sec"><div class="sec-t" style="color:var(--bad)">Overdue · ${ov.length}</div></div>`;ov.forEach(j=>h+=jCard(j,true))}
  if(up.length){h+=`<div class="sec"><div class="sec-t">Scheduled · ${up.length}</div></div>`;up.forEach(j=>h+=jCard(j))}
  if(done.length){h+=`<div class="sec"><div class="sec-t" style="color:var(--mu)">Completed · ${done.length}</div></div>`;done.forEach(j=>h+=jCard(j))}
  if(!active.length)h+=`<div class="ey"><div class="ey-i">📋</div><div class="ey-t">No jobs yet. Tap + to create one.</div></div>`
  h+=`</div>`
  const jc=$('jobsContent')||$('jobsC');jc.innerHTML=h;setTimeout(initSwipes,50)
}

function buildJobLines(j){
  const l=D.locs.find(x=>x.id===(j.location_id||j.location?.id))||j.location||{},sc=j.scope||[]
  // Use versioned rates (getRate falls back to D.rc if no rate_card_history)
  const rc=new Proxy({},{get:(_,key)=>getRate(key)})
  const lines=[]
  // suppression
  if(sc.includes('suppression'))for(const s of(l.suppression_systems||[])){
    let bv=rc.suppression_standard||250
    if(s.category==='captiveaire_tank')bv=rc.suppression_captiveaire_tank||450
    if(s.category==='captiveaire_core')bv=rc.suppression_captiveaire_core||650
    lines.push({desc:`${s.system_type} Semi-Annual`,qty:1,price:bv})
    if(s.tank_count>1)lines.push({desc:`Additional Tank Fee`,qty:s.tank_count-1,price:rc.suppression_additional_tank||50})
    if(s.fusible_link_count)lines.push({desc:`Fusible Links`,qty:s.fusible_link_count,price:rc.fusible_link||25})
  }
  // extinguishers
  if(sc.includes('extinguishers')&&l.extinguishers?.length){
    lines.push({desc:`Extinguisher Inspection`,qty:l.extinguishers.length,price:rc.extinguisher_inspection||20})
    // check for due internals and hydros based on NFPA 10 intervals
    const now=new Date()
    let internalDueCount=0,hydroDueCount=0
    const hydroByType={}
    l.extinguishers.forEach(e=>{
      const nfpa=NFPA10?.[e.type]||{hydro:12,internal:6}
      // 6-year internal check
      if(nfpa.internal){
        const base=e.last_internal?new Date(e.last_internal+'-01'):e.manufacture_date?new Date(e.manufacture_date+'-01'):null
        if(base){const due=new Date(base);due.setFullYear(due.getFullYear()+nfpa.internal);if(due<=now)internalDueCount++}
      }
      // hydro check
      const hBase=e.last_hydro?new Date(e.last_hydro+'-01'):e.manufacture_date?new Date(e.manufacture_date+'-01'):null
      if(hBase){const due=new Date(hBase);due.setFullYear(due.getFullYear()+nfpa.hydro);if(due<=now){
        const key=`Hydrostatic Test ${e.type}`;hydroByType[key]=(hydroByType[key]||0)+1
      }}
    })
    if(internalDueCount)lines.push({desc:`Dry Chem Internal Inspection (6-yr due)`,qty:internalDueCount,price:68})
    Object.entries(hydroByType).forEach(([desc,qty])=>{
      const hPrice=desc.includes('Class K')?275:desc.includes('CO2')?72:desc.includes('Water')?57:68
      lines.push({desc:`${desc} (hydro due)`,qty,price:hPrice})
    })
  }
  // elights
  if(sc.includes('elights')&&l.emergency_lights?.[0]?.fixture_count){
    const fc=l.emergency_lights[0].fixture_count
    lines.push({desc:`E-Light Annual Test`,qty:fc,price:rc.emergency_light||20})
  }
  // fallback — nothing auto-populated, start with blank
  return lines.length?lines:[{desc:'',qty:1,price:0}]
}

            </div>
            <p style="font-size:13px;color:#666">If this doesn't work for you, please call us at <a href="tel:2149944799" style="color:#f05a28">(214) 994-4799</a>.</p>
            <p style="font-size:13px;color:#666">— Stephens Advanced Fire Protection</p>

async function openJob(id){
  // Prevent duplicate overlays — if this job is already open, focus it instead
  for(const slot of stk){
    const el=document.getElementById(slot)
    if(el&&el.dataset.jobId===id){
      el.classList.add('open')
      el.style.display='flex'
      return
    }
  }
  await load()
  const j=D.jobs.find(x=>x.id===id);if(!j)return
  extR={}
  // Lazy-fetch the heavy job columns (signature_data, photos, ext_report_photos)
  // — they're trimmed from the dashboard load() for performance, so without
  // this fetch, a previously-signed job appears unsigned every time it's
  // reopened. Mutate the cached job in-place so renderers see the values.
  try{
    const{data:jHeavy}=await SB.from('jobs').select('signature_data,photos,ext_report_photos,confirmed_at,confirmed_by,confirmation_method').eq('id',id).maybeSingle()
    if(jHeavy){
      j.signature_data=jHeavy.signature_data||null
      j.photos=jHeavy.photos||null
      j.ext_report_photos=jHeavy.ext_report_photos||null
      j.confirmed_at=jHeavy.confirmed_at||null
      j.confirmed_by=jHeavy.confirmed_by||null
      j.confirmation_method=jHeavy.confirmation_method||null
    }
  }catch(e){console.error('hydrate job heavy cols:',e)}
  // Hydrate full location (extinguishers, suppression systems, e-lights) on demand
  await ensureLocationDetail(j.location_id||j.location?.id)
  // use full location from D.locs (now includes suppression_systems, extinguishers, etc.)

async function handleExtPaste(ev,jobId){
  ev.preventDefault()
  const items=ev.clipboardData?.items||[]
  const imageFiles=[]
  for(const item of items){
    if(item.type.startsWith('image/')){
      const file=item.getAsFile()
      if(file)imageFiles.push(file)
    }
  }
  if(!imageFiles.length){toast('No image in clipboard — copy an image first',false);return}
  // fake an event object for pasteExtReport
  const fakeEv={target:{files:imageFiles,value:''}}
  await pasteExtReport(fakeEv,jobId)
  // clear the contenteditable div of any pasted content
  const zone=$('extPasteZone-'+jobId)
  if(zone){const preview=$('extReportPreview-'+jobId);zone.innerHTML='';if(preview)zone.appendChild(preview)}
}

async function pasteExtReport(ev,jobId){
  const files=Array.from(ev.target.files);if(!files.length)return
  toast('Uploading report...')
  const photos=[]
  for(const file of files.slice(0,10)){
    const b64=await resizePhoto(file,1400,0.85)
    photos.push(b64)
    // upload to storage
    try{const blob=dataURItoBlob(b64);await uploadDocument(blob,'ext-report-'+Date.now()+'.jpg','report_pdf','job',jobId,{source:'ext_report_paste'})}catch(e){}
  }
  // save to job record
  await SB.from('jobs').update({ext_report_photos:photos}).eq('id',jobId)
  // also save as a report record so it shows in portal/email
  const locId=D.jobs.find(j=>j.id===jobId)?.location_id
  try{
    const{data:ex}=await SB.from('reports').select('id').eq('job_id',jobId).eq('report_type','extinguisher').limit(1)
    const rptData={pastedPhotos:photos,savedAt:new Date().toISOString()}
    if(ex?.length){await SB.from('reports').update({report_data:rptData}).eq('id',ex[0].id)}
    else{await SB.from('reports').insert({job_id:jobId,location_id:locId,report_type:'extinguisher',report_data:rptData})}
  }catch(e){console.error('save ext report:',e)}
  await load()
  toast(photos.length+' page'+(photos.length>1?'s':'')+' uploaded ✓')
  // refresh preview
  const preview=$('extReportPreview-'+jobId)
  if(preview)preview.innerHTML=photos.map(p=>'<img src="'+p+'" style="width:100%;max-height:200px;object-fit:contain;border-radius:8px;margin-bottom:6px;border:1px solid var(--b1)">').join('')
  ev.target.value=''
}

function handleJobPhoto(ev){
  const file=ev.target.files[0];if(!file)return
  const reader=new FileReader()
  reader.onload=e=>{
    const img=new Image()
    img.onload=()=>{
      const canvas=document.createElement('canvas')
      const max=1200;let w=img.width,h=img.height
      if(w>max||h>max){if(w>h){h=Math.round(h*max/w);w=max}else{w=Math.round(w*max/h);h=max}}
      canvas.width=w;canvas.height=h;canvas.getContext('2d').drawImage(img,0,0,w,h)
      const b64=canvas.toDataURL('image/jpeg',0.8)
      jobPhotos.push({b64,caption:''})
      renderJobPhotos()
      // upload to storage
      try{
        const blob=dataURItoBlob(b64)
        const jid=window._activeJobId
        if(jid)uploadDocument(blob,'job-photo-'+Date.now()+'.jpg','photo','job',jid,{source:'tech_notes'})
      }catch(e){console.error('photo upload:',e)}
      // save to job record
      saveJobPhotos()
    }
    img.src=e.target.result
  }
  reader.readAsDataURL(file)
  ev.target.value=''
}

function dataURItoBlob(dataURI){
  const split=dataURI.split(','),mime=split[0].match(/:(.*?);/)[1]
  const b=atob(split[1]),arr=new Uint8Array(b.length)
  for(let i=0;i<b.length;i++)arr[i]=b.charCodeAt(i)
  return new Blob([arr],{type:mime})
}

function renderJobPhotos(){
  const wrap=$('jobPhotoPreview');if(!wrap)return
  wrap.innerHTML=jobPhotos.map((p,pi)=>`<div style="position:relative"><img src="${p.b64}" style="width:60px;height:60px;object-fit:cover;border-radius:6px;border:1px solid var(--b1)"><button onclick="jobPhotos.splice(${pi},1);renderJobPhotos();saveJobPhotos()" style="position:absolute;top:-4px;right:-4px;width:18px;height:18px;border-radius:50%;background:var(--bad);color:#fff;font-size:10px;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center">✕</button></div>`).join('')
  const cnt=$('jobPhotoCount');if(cnt)cnt.textContent=jobPhotos.length?jobPhotos.length+' photo'+(jobPhotos.length>1?'s':''):''
}

async function saveJobPhotos(){
  const jid=window._activeJobId;if(!jid)return
  try{await SB.from('jobs').update({photos:jobPhotos.map(p=>p.b64)}).eq('id',jid)}catch(e){console.error('save photos:',e)}
}

function renderJobLines(){
  const wrap=$('wo-lines');if(!wrap)return
  // header row
  let h=`<div style="display:flex;gap:4px;padding:0 0 4px;margin-bottom:4px;border-bottom:1px solid var(--b1)">
    <div style="width:44px;font-size:8px;font-weight:800;color:var(--g2);text-transform:uppercase">Qty</div>
    <div style="flex:2;font-size:8px;font-weight:800;color:var(--g2);text-transform:uppercase">Description</div>
    <div style="width:70px;font-size:8px;font-weight:800;color:var(--g2);text-transform:uppercase">Unit $</div>
    <div style="width:70px;font-size:8px;font-weight:800;color:var(--g2);text-transform:uppercase;text-align:right">Total</div>
    <div style="width:28px"></div>
  </div>`
  h+=jobLines.map((l2,i)=>{
    const lineTotal=((+(l2.qty||1))*(+(l2.price||0))).toFixed(2)
    return`<div class="li-row" data-jli="${i}" style="display:flex;gap:4px;align-items:center;margin-bottom:4px">
      <input class="li-qty" type="number" value="${l2.qty||1}" min="0.5" step="0.5" oninput="jlEdit(${i},'qty',this.value)" style="width:44px;text-align:center">
      <input placeholder="Description" value="${esc(l2.desc||'')}" oninput="jlEdit(${i},'desc',this.value)" style="flex:2">
      <input class="li-price" type="number" value="${+(l2.price||0)}" step="0.01" oninput="jlEdit(${i},'price',this.value)" style="width:70px">
      <div style="width:70px;text-align:right;font-size:12px;font-weight:700;color:var(--ok);font-variant-numeric:tabular-nums" id="jl-total-${i}">$${lineTotal}</div>
      <button class="li-del" onclick="jlDel(${i})" style="width:28px">✕</button>

  wrap.innerHTML=h

function jlEdit(i,field,val){
  if(!jobLines[i])return
  if(field==='desc')jobLines[i].desc=val
  else if(field==='qty')jobLines[i].qty=parseFloat(val)||1
  else if(field==='price')jobLines[i].price=parseFloat(val)||0
  const lt=$('jl-total-'+i);if(lt)lt.textContent='$'+((+(jobLines[i].qty||1))*(+(jobLines[i].price||0))).toFixed(2)
  updateWoTotal()
  if(field==='desc')updateJobChecklist()
  markJobDirty()
}

function jlDel(i){
  jobLines.splice(i,1)
  renderJobLines()
  updateJobChecklist()
}

function updateWoTotal(){
  const total=jobLines.reduce((s,l2)=>s+(+(l2.qty||1))*(+(l2.price||0)),0)
  const el=$('wo-total');if(el)el.textContent=fmtD(total)
  const invEl=$('compInvTotal');if(invEl)invEl.textContent=total?fmt(total):'—'
  const amtEl=$('compBtnAmt');if(amtEl)amtEl.textContent=total?' \u2014 '+fmt(total):''
}

// reactive checklist — scans jobLines descriptions to determine required reports
async function updateJobChecklist(){
  const jid=window._activeJobId;if(!jid)return
  const loc=window._activeJobLoc||{}
  const wrap=$('job-checklist-'+jid);if(!wrap)return

  // scan line items AND location equipment to determine required reports
  const descs=jobLines.map(l2=>(l2.desc||'').toLowerCase()).join(' ')
  const hasExtLines=descs.match(/extinguisher/)
  const hasSuppLines=descs.match(/semi.?annual|suppression|kitchen|ansul|pyro.?chem|buckeye|kidde|clean.?agent|clean agent|fm.?200|novec|dry.?chem|dry chemical|paint|booth/)
  const hasAnyLines=jobLines.some(l2=>(l2.desc||'').trim())

  // fetch saved reports
  const{data:savedRpts}=await SB.from('reports').select('id,report_type,report_data').eq('job_id',jid)
  const rpts=savedRpts||[]

  let flags=[]

  // Invoice flag — was auto-marked done as soon as any line item existed,
  // which was misleading: it'd flip green before Jon actually reviewed the
  // numbers. Now it requires a manual toggle (jobs.invoice_built). The
  // hasAnyLines check still gates whether the flag is tap-able at all.
  const j_for_inv = D.jobs.find(x=>x.id===jid)
  const invBuilt = !!j_for_inv?.invoice_built
  flags.push({
    label:'Build Invoice',
    done: invBuilt,
    action: hasAnyLines ? `toggleInvoiceBuilt('${jid}')` : null
  })

  // Extinguisher report — removed from checklist (use photo paste on job card instead)

  // Suppression reports — driven by actual systems on file, one flag per system
  if(hasSuppLines){
    // determine report type from LINE ITEMS first (most accurate), then fall back to system type
    const hasDCLine=descs.match(/dry.?chem|dry chemical|paint|booth/)
    const hasCALine=descs.match(/clean.?agent|clean agent|fm.?200|novec/)
    const hasKitchenLine=descs.match(/semi.?annual|suppression|kitchen|ansul|pyro.?chem|buckeye|kidde|captive/)&&!hasDCLine&&!hasCALine
    const allSyss=loc.suppression_systems||[]
    const sysId=allSyss[0]?.id||''
    const escapedSysId=(sysId).replace(/'/g,"\\'")

    if(hasDCLine){
      const done=rpts.some(r=>r.report_type==='dry_chemical')
      flags.push({label:'Dry Chem / Paint Booth Report',done,action:`openDryChemReport('${jid}','${escapedSysId}')`})
    }
    if(hasCALine){
      const done=rpts.some(r=>r.report_type==='clean_agent')
      flags.push({label:'Clean Agent Report',done,action:`openCleanAgentReport('${jid}','${escapedSysId}')`})
    }
    if(hasKitchenLine||(!hasDCLine&&!hasCALine)){
      // check systems on file for kitchen hood types, or default to kitchen hood
      const kitchenSyss=allSyss.filter(s=>{const t=(s.system_type||'').toLowerCase();return!t.match(/paint|booth|dry.?chem|fm.?200|novec|clean.?agent|halon/)})
      if(kitchenSyss.length||(!hasDCLine&&!hasCALine)){
        kitchenSyss.forEach(sys=>{
          const eid=(sys.id||'').replace(/'/g,"\\'")
          const done=rpts.some(r=>r.report_type==='kitchen_suppression')
          const sysName=(sys.system_type||'').split('(')[0].trim()
          flags.push({label:'Kitchen Hood Report'+(kitchenSyss.length>1?' — '+sysName:''),done,action:`openSuppReport('${jid}','${eid}')`})
        })
        if(!kitchenSyss.length&&!hasDCLine&&!hasCALine){
          const done=rpts.some(r=>r.report_type==='kitchen_suppression')
          flags.push({label:'Kitchen Hood Report',done,action:`openSuppReport('${jid}','')`})
        }
      }
    }
  }

  // render flags
  let fh=''
  // store flags globally so click handlers can access them
  window._jobFlags=flags

  flags.forEach((f,fi)=>{
    const color=f.done?'var(--ok)':'var(--g2)'
    const icon=f.done?'✓':'○'
    fh+=`<div data-flag="${fi}" style="display:flex;align-items:center;gap:10px;padding:10px 12px;margin-bottom:4px;border-radius:var(--rs);background:${f.done?'rgba(16,185,129,.08)':'var(--c2)'};border:1px solid ${f.done?'var(--ok)':'var(--b1)'};cursor:${f.action?'pointer':'default'};min-height:44px">
      <span style="font-size:16px;font-weight:800;color:${color};width:20px;text-align:center">${icon}</span>
      <span style="font-size:12px;font-weight:700;color:${f.done?'var(--ok)':'var(--w)'};flex:1">${f.label}</span>
      ${f.done?'<span style="font-size:9px;font-weight:800;color:var(--ok);text-transform:uppercase">Done</span>':(f.action?'<span style="font-size:9px;font-weight:700;color:var(--fire);text-transform:uppercase">Tap to fill →</span>':'')}
    </div>`
  })

  const allDone=flags.every(f=>f.done)
  const compBtn=$('compBtn')
  if(compBtn){
    compBtn.style.background=allDone?'var(--ok)':'var(--g3)'
    compBtn.style.color=allDone?'#fff':'var(--g1)'
  }
  // The Review & Finalize button at the bottom of openJob doubles as a
  // "ready" indicator — flip it green when every flag in the checklist is
  // satisfied so Jon's eye is drawn to the next step.
  const rfBtn=$('reviewFinalizeBtn-'+jid)
  if(rfBtn){
    if(allDone){
      rfBtn.style.background='var(--ok)'
      rfBtn.style.color='#fff'
      rfBtn.style.boxShadow='0 4px 14px rgba(16,185,129,.35)'
    } else {
      rfBtn.style.background='var(--g3)'
      rfBtn.style.color='var(--g1)'
      rfBtn.style.boxShadow='none'
    }
  }
  wrap.innerHTML=fh
  // attach click handlers via addEventListener (more reliable than onclick attr)
  wrap.querySelectorAll('[data-flag]').forEach(el=>{
    const fi=parseInt(el.dataset.flag)
    const f=flags[fi]
    if(f&&f.action){
      el.addEventListener('click',async()=>{try{await eval(f.action)}catch(e){console.error('flag click:',e);toast('Error: '+e.message,false)}})
    }
  })
}

function addPartLine(sel){
  const v=sel.value;if(!v)return
  if(sel.value!==undefined&&'value' in sel&&sel.tagName)sel.value='' // reset dropdown if it's a real element
  if(v==='CUSTOM'){
    jobLines.push({desc:'',qty:1,price:0,id:'jl'+Date.now()})
    renderJobLines()
    // focus last description field
    setTimeout(()=>{const inputs=$('wo-lines')?.querySelectorAll('input[placeholder="Description"]');if(inputs?.length)inputs[inputs.length-1].focus()},50)
    return
  }
  const parts=v.split('|')
  const desc=parts[0]||'',qty=parseFloat(parts[1])||1,price=parseFloat(parts[2])||0
  // fuzzy match — normalize to catch "Ansul LT-10" vs "ansul lt10" etc.
  const nd=norm(desc)
  const existing=jobLines.find(l2=>norm(l2.desc)===nd)
  if(existing){existing.qty=(+existing.qty||1)+1;renderJobLines();updateJobChecklist();return}
  jobLines.push({desc,qty,price,id:'jl'+Date.now()})
  renderJobLines()
  updateJobChecklist()
}

// CORE COMPLETION HELPER — extracted so the three job-end buttons (Hand to
// Customer / Send for Signature / Bill) can share the same exact completion
// logic (travel charge, prompt-pay discount, audit, calendar, brycer queue,
// auto-reschedule semi-annual, extinguisher results). Returns:
//   { ok:true,  invId, invNum, lines, total, l, j } on success
//   { ok:false, error:'...' } on validation or DB failure
// Caller is responsible for any UI (toast, pop, navigation).
async function _completeJobAndCreateInvoice(jobId, opts){
  opts = opts || {}
  const j = D.jobs.find(x=>x.id===jobId)
  if(!j) return { ok:false, error:'Job not found' }
  const l = D.locs.find(x=>x.id===(j.location_id||j.location?.id)) || j.location || {}
  const sc = j.scope || []

  const lines = jobLines.filter(l2=>(l2.desc||'').trim()).map(l2=>({
    description: l2.desc.trim(),
    quantity: +(l2.qty)||1,
    unit_price: +(l2.price)||0,
    total: (+(l2.qty)||1)*(+(l2.price)||0)
  }))
  if(!lines.length) return { ok:false, error:'Add at least one line item before completing the job' }
  const workOrderTotal = lines.reduce((s,l2)=>s+(+l2.total||0),0)
  if(workOrderTotal<=0) return { ok:false, error:'Work order total is $0 — check your line item prices' }

  if(!l.travel_charge_exempt){
    const travel = await calcTravelCharge(l)
    if(travel.charge>0){
      lines.push({description:travel.desc,quantity:1,unit_price:travel.charge,total:travel.charge})
    }
  }

  const subBeforeRules = lines.reduce((s,l2)=>s+l2.total,0)
  const ppRule = getPricingRule('prompt_pay_discount')
  if(ppRule && opts.payingNow){
    const discAmt = Math.round(subBeforeRules*ppRule.percentage/100*100)/100
    lines.push({description:`Prompt Pay Discount (${ppRule.percentage}%)`,quantity:1,unit_price:-discAmt,total:-discAmt})
  }

  const sub = lines.reduce((s,l2)=>s+l2.total,0)
  const notes = ($('job-notes')?.value||jobNotes||'').trim()
  const sig = $('sigC')?.toDataURL()||null

  const invNum = 'INV-'+Date.now().toString().slice(-6)
  const { data:inv, error } = await SB.from('invoices').insert({
    job_id:jobId, location_id:l.id, billing_account_id:l.billing_account_id,
    invoice_number:invNum, subtotal:subBeforeRules, total:sub, status:'draft', date:td(),
    notes: notes||null
  }).select().single()
  if(error) return { ok:false, error:'Could not generate invoice: '+error.message }
  if(inv) audit('created','invoice',inv.id,'jon',{invoice_number:invNum,total:sub},'Invoice '+invNum+' created for '+(l.name||'?'))

  if(inv && lines.length) await SB.from('invoice_lines').insert(lines.map((ln,i2)=>({invoice_id:inv.id,...ln,sort_order:i2})))

  for(const ln of lines){ if(!(ln.description||'').startsWith('Travel —')) await saveCustomItem(ln.description, ln.unit_price) }

  const jobUpd = { status:'completed', completed_at:new Date().toISOString(), notes: notes||null }
  if(sig) jobUpd.signature_data = sig
  await SB.from('jobs').update(jobUpd).eq('id', jobId)
  audit('completed','job',jobId,'jon',{status:'completed'},'Job completed for '+(l.name||'?'))

  try{ await SB.from('calendar_events').update({color:'#9ca3af'}).eq('job_id',jobId) }catch(e){}

  for(const [eid,st] of Object.entries(extR)){
    try{ await SB.from('extinguisher_results').insert({job_id:jobId,extinguisher_id:eid,status:st}) }catch(e){}
  }

  if(sc.includes('suppression') && l.suppression_systems && l.suppression_systems.length){
    const nextDate = new Date()
    nextDate.setMonth(nextDate.getMonth()+5)
    nextDate.setDate(nextDate.getDate()+Math.floor(Math.random()*31))
    const nds = nextDate.toISOString().split('T')[0]
    try{
      await SB.from('jobs').insert({location_id:l.id,billing_account_id:l.billing_account_id||null,type:j.type||'inspection',scope:sc,scheduled_date:nds,scheduled_time:j.scheduled_time||'09:00',status:'scheduled',tentative:true,notes:'Auto-scheduled follow-up (semi-annual suppression)'})
      toast('Follow-up scheduled for '+new Date(nds+'T12:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}))
    }catch(e){ console.error('auto-reschedule:',e) }
  }

  if(l.is_brycer_jurisdiction){
    const sysTypes = (l.suppression_systems||[]).map(s=>s.system_type).filter(Boolean).join(', ')||'Suppression System'
    try{
      await SB.from('brycer_queue').insert({job_id:jobId,location_id:l.id,location_name:l.name||'',system_type:sysTypes,job_date:td(),report_generated:false,submitted:false})
    }catch(e){ console.error('brycer queue:',e) }
  }

  return { ok:true, invId: inv?.id, invNum: inv?.invoice_number || invNum, lines, total: sub, l, j }
}

// END-OF-JOB BUTTON HANDLERS
// Each one fully completes the job AND triggers the path-specific followup.
// All three share _completeJobAndCreateInvoice() so the work-order →
// invoice math, travel charge, audit, calendar, brycer queue, and
// auto-reschedule all behave identically across paths.
// ═══════════════════════════════════════════════════════════════

async function sendForSignatureFromJob(jobId){
  const j=D.jobs.find(x=>x.id===jobId);if(!j){toast('Job not found',false);return}
  const l=D.locs.find(x=>x.id===j.location_id)||{}
  const ba=l.billing_account_id?D.bas.find(b=>b.id===l.billing_account_id):null
  const email=l.contact_email||ba?.email||''
  const phone=l.contact_phone||ba?.phone||''
  if(!email&&!phone){toast('No customer email or phone on file. Add one first.',false);return}
  const channels=[email&&'email',phone&&'text'].filter(Boolean).join(' + ')
  if(!confirm(`Complete this job and send a signing link to ${l.name||'the customer'}?\n\nLink delivered via: ${channels}\n\nLink is unique to this job and expires in 14 days.`))return
  // This handler is now invoked from openJobReview, which is one overlay
  // deeper than openJob. Drop the Review overlay up-front so the rest of the
  // logic — and its single trailing pop() — operates from openJob's depth,
  // matching the original behavior. (Watcher caught: single pop() left Jon
  // staring at a stale openJob view of an already-completed job.)
  if(stk.length>1)pop()

  const result=await _completeJobAndCreateInvoice(jobId,{payingNow:false})
  if(!result.ok){toast(result.error||'Could not complete job',false);return}

  try{
    const res=await fetch('/api/send-signature-request',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({job_id:jobId})
    })
    const data=await res.json()
    if(!res.ok)throw new Error(data.error||'Send failed')
    audit('signature_request_sent','job',jobId,'jon',{email,phone},'Signing link sent to '+(email||phone))
    const sentVia=[]
    if(data.email?.sent)sentVia.push('email')
    if(data.sms?.sent)sentVia.push('text')
    await load()
    pop()
    toast('Job done · signing link sent via '+sentVia.join(' + ')+' ✓')
  }catch(e){
    console.error('sendForSignatureFromJob:',e)
    await load()
    pop()
    toast('Job completed but signing link failed: '+e.message,false)
  }
}

async function billContractedFromJob(jobId){
  const j=D.jobs.find(x=>x.id===jobId);if(!j){toast('Job not found',false);return}
  const l=D.locs.find(x=>x.id===j.location_id)||{}
  const ba=l.billing_account_id?D.bas.find(b=>b.id===l.billing_account_id):null
  const locContract=D.contracts?.find(c=>c.location_id===l.id&&c.status!=='cancelled'&&c.signed)
  const hasCardOnFile=!!ba?.card_on_file
  const email=l.contact_email||ba?.email||''

  let confirmMsg
  if(hasCardOnFile){
    confirmMsg=`Complete this job, charge ${ba.card_brand||'card'} ending ${ba.card_last4||'????'}, and email a paid receipt?`
  }else if(locContract){
    confirmMsg=`Complete this job and email the invoice to ${email||l.name||'the customer'}? They'll pay via portal — no card on file yet.`
  }else{
    confirmMsg=`No contract or card on file for ${l.name||'this customer'}.\n\nComplete this job anyway and email the invoice (customer pays online)?`
  }
  if(!confirm(confirmMsg))return
  // Drop the Review overlay (this handler now runs one overlay deeper than
  // it used to). chargeCardOnFile pops + opens invoice detail; the failure
  // pop() and the Path-2 trailing pop() both expect to land back on openJob.
  if(stk.length>1)pop()

  const result=await _completeJobAndCreateInvoice(jobId,{payingNow:hasCardOnFile})
  if(!result.ok){toast(result.error||'Could not complete job',false);return}

  // Path 1 — card on file: charge it. chargeCardOnFile pops + opens
  // invoice detail on SUCCESS, but on failure/cancel it just toasts and
  // leaves us on the job overlay. Without the post-load check below the
  // user gets stuck on a completed job they can't navigate away from.
  if(hasCardOnFile&&result.invId){
    try{ await chargeCardOnFile(result.invId) }
    catch(e){ console.error('auto-charge:',e) }
    await load()
    const invNow=D.invs.find(i=>i.id===result.invId)
    if(invNow?.status!=='paid'){
      // Charge didn't go through — chargeCardOnFile already toasted why
      // for failures, but cancellation is silent. Pop the now-orphan job
      // overlay so the user isn't stuck, and surface a status toast so
      // they know the invoice was created in draft.
      pop()
      toast('Job completed · invoice in draft (payment not collected)',false)
    }
    return
  }

  // Path 2 — no card: send the invoice email autonomously via kioskEmailInvoice.
  // It now returns {sent:true,...} or {sent:false, reason:'...'} so we can
  // toast accurately instead of always claiming success.
  if(result.invId){
    let sendStatus
    try{
      sendStatus = await kioskEmailInvoice(false, result.invId)
    }catch(e){
      console.error('billContracted send:',e)
      sendStatus = {sent:false, reason:e.message||'send failed'}
    }
    await load()
    pop()
    if(sendStatus?.sent){
      toast('Job done · invoice emailed ✓')
    }else{
      toast('Job completed but invoice email failed: '+(sendStatus?.reason||'unknown'),false)
    }
  }
}

async function addToTodaySchedule(jobId){
  const today=td()
  // Use route logic: ask getAvailableSlots for the first open window today,
  // drop the job into that slot's start, and flag it tentative so the pill
  // stays dashed-green until Jon taps Confirm. (Per Jon 2026-04-30: "make
  // sure it uses route logic" — i.e. don't just slam scheduled_date=today
  // and keep whatever stale time was there.)
  const slots=getAvailableSlots(today)
  const upd={scheduled_date:today,tentative:true}
  if(slots.length){
    upd.scheduled_time=slots[0].start
  }
  await SB.from('jobs').update(upd).eq('id',jobId)
  audit('rescheduled','job',jobId,'jon',{new_date:today,new_time:upd.scheduled_time||null,via:'route_logic'},'Added to today\'s schedule (route-slotted)')
  await load()
  toast(upd.scheduled_time?`Added to today @ ${fmtTime12(upd.scheduled_time)} (tentative)`:'Added to today (no open slot — pick a time)')
  pop();openJob(jobId)
}

async function bulkAssignToMe(){
  // Multi-tech: "me" is the logged-in tech, not "the first tech named Jon".
  const myId=(window._me?.tech?.id)||D.techs?.find(t=>t.name?.toLowerCase().includes('jon'))?.id||D.techs?.[0]?.id

async function renderJobActivity(jobId){
  const wrap=document.getElementById('job-activity-'+jobId)
  const countEl=document.getElementById('job-activity-count-'+jobId)
  if(!wrap)return
  let jobEvents=[],invEvents=[]
  try{
    const [a,b]=await Promise.all([
      SB.from('audit_log').select('action,actor,details,created_at,entity_type').eq('entity_type','job').eq('entity_id',jobId).order('created_at',{ascending:false}).limit(100),
      SB.from('invoices').select('id').eq('job_id',jobId)
    ])
    jobEvents=a.data||[]
    if(b.data?.length){
      const invIds=b.data.map(i=>i.id)
      const{data}=await SB.from('audit_log').select('action,actor,details,created_at,entity_type').eq('entity_type','invoice').in('entity_id',invIds).order('created_at',{ascending:false}).limit(50)
      invEvents=data||[]
    }
  }catch(e){console.error('activity load:',e)}
  const all=[...jobEvents,...invEvents].sort((x,y)=>(y.created_at||'').localeCompare(x.created_at||''))
  if(countEl)countEl.textContent=all.length?(all.length+' entr'+(all.length===1?'y':'ies')):''
  if(!all.length){
    wrap.innerHTML=`<div style="font-size:12px;color:var(--g2);text-align:center;padding:14px 0;border-top:1px dashed rgba(42,47,62,.6)">No activity yet. Add a note to start the log.</div>`

  const iconFor={note:'📝',created:'➕',rescheduled:'📅',completed:'✓',paid:'💵',assigned:'👥',factored:'💰',mazon_approved:'💰',deleted:'🗑',cancelled:'✕',updated:'✏️','contact_added':'👤'}
  wrap.innerHTML=all.map(e=>{
    const dt=new Date(e.created_at)
    const timeStr=dt.toLocaleString('en-US',{month:'short',day:'numeric',hour:'numeric',minute:'2-digit'})
    const actor=e.actor==='jon'?'Jon':e.actor==='ai_chat'?'Riker':e.actor==='system'?'System':(e.actor||'—')
    const icon=iconFor[e.action]||'•'

      <div style="width:26px;height:26px;flex-shrink:0;background:var(--c2);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px">${icon}</div>
      <div style="flex:1;min-width:0">
        <div style="font-size:12.5px;color:var(--w);line-height:1.4;word-wrap:break-word">${esc(e.details?.summary||e.action||'event')}</div>
        <div style="font-size:10px;color:var(--g1);margin-top:3px;font-family:'JetBrains Mono',ui-monospace,monospace;letter-spacing:.04em">${timeStr} · ${esc(actor)}${isInv?' · invoice':''}</div>

// Toggle a job's "confirmed with customer" flag.
// When confirmed, the dispatcher in api/cron.js will fire a leave-now SMS for
// this job at the appropriate time. When unconfirmed (NULL), it stays silent.
async function toggleJobConfirmed(jobId){
  const j=D.jobs.find(x=>x.id===jobId)
  if(!j){toast('Job not found');return}
  const wasConfirmed=!!j.confirmed_at
  const upd=wasConfirmed
    ?{confirmed_at:null,confirmed_by:null,confirmation_method:null,departure_alert_sent_at:null}

  if(error){toast('Error: '+error.message);return}

  // to re-render the whole overlay — that didn't work reliably (the duplicate-
  // detection in openJob short-circuited the re-render). Direct DOM update is
  // both faster and more reliable.

      btn.style.color = 'var(--g2)'

// ─── QUOTE → SCHEDULED CONVERSION ──────────────────────────────
// A quote is a pre-job pending customer approval. Three approval paths:
//   1. sendQuoteForSignature — text/email a sign link, customer signs remotely
//   2. approveQuoteInPerson — sig pad on Jon's phone, customer signs now
//   3. approveQuoteManual — Jon got verbal/email approval, no signature
// All three flip status to 'scheduled' (after prompting for a date) so the
// existing scheduled-job flow takes over.

// Helper: prompt for date/time, flip status, audit, optional signature.
async function _convertQuoteToJob(jobId, opts){
  opts = opts || {}
  const j = D.jobs.find(x=>x.id===jobId)
  if(!j){toast('Job not found',false);return false}
  if(j.status !== 'quote'){toast('Not a quote — already converted',false);return false}
  // Prompt for the visit date (default = job's proposed date, else tomorrow).
  const defaultDate = j.scheduled_date || new Date(Date.now()+86400000).toISOString().split('T')[0]
  const newDate = prompt(`When should this job be scheduled?\n(YYYY-MM-DD — leave blank to keep proposed/skip scheduling)`, defaultDate)
  if(newDate === null) return false  // cancelled
  const finalDate = newDate.trim() || j.scheduled_date || null
  const finalTime = j.scheduled_time || (finalDate ? '09:00' : null)
  const upd = {
    status: 'scheduled',
    quote_approved_at: new Date().toISOString(),
    quote_approved_by: opts.approved_by || 'jon (manual)',
    scheduled_date: finalDate,
    scheduled_time: finalTime,
    // Approval IS confirmation regardless of channel — watcher caught the
    // tentative=true on manual/verbal/remote was semantically wrong.
    // "tentative" means "route logic chose this, Jon hasn't blessed it yet",
    // not "waiting for customer". By the time we're here, customer + Jon
    // are both committed.
    tentative: false
  }
  if(opts.signature_data) upd.quote_signature_data = opts.signature_data
  const {error} = await SB.from('jobs').update(upd).eq('id', jobId)
  if(error){toast('Error: '+error.message,false);return false}
  audit('updated','job',jobId,'jon',{from:'quote',to:'scheduled',approved_via:opts.via||'manual'},`Quote approved — converted to scheduled job${finalDate?' for '+finalDate:''}`)
  // Sync to Google Calendar if we have a date
  if(finalDate && finalTime){
    try{ await syncJobToCalendar(jobId, j.location_id, finalDate, finalTime) }catch(e){console.error('cal sync after quote approve:',e)}
  }
  await load()
  return true
}

async function approveQuoteManual(jobId){
  if(!confirm('Mark this quote as approved (verbal/email confirmation)? Will convert it to a scheduled job.'))return
  const ok = await _convertQuoteToJob(jobId, {via:'manual', approved_by:'manual'})
  if(ok){pop(); await openJob(jobId); toast('✓ Quote approved — now scheduled')}
}

async function approveQuoteInPerson(jobId){
  // Reuse the existing in-person signature pad pattern. For v1 we use
  // the simpler prompt approach — full sig-pad UX can come in a follow-up.
  // The kiosk flow already has a signature canvas (initSig/clrSig); plumb
  // it in next iteration. For now: confirm + capture name.
  const customerName = prompt('Customer name (signing in person):')
  if(!customerName)return
  // Stub signature_data — 1x1 transparent png so the column is non-null
  // for "approved" filter purposes. Full canvas signature in v2.
  const sigStub = 'data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAQAAAC1HAwCAAAAC0lEQVR42mNkAAIAAAoAAv/lxKUAAAAASUVORK5CYII='
  const ok = await _convertQuoteToJob(jobId, {
    via:'in_person',
    approved_by: customerName.trim(),
    signed_in_person: true,
    signature_data: sigStub
  })
  if(ok){pop(); await openJob(jobId); toast(`✓ Approved by ${customerName} — scheduled`)}
}

async function sendQuoteForSignature(jobId){
  const j = D.jobs.find(x=>x.id===jobId)
  if(!j){toast('Job not found',false);return}
  const l = D.locs.find(x=>x.id===j.location_id) || {}
  const ba = l.billing_account_id ? D.bas.find(b=>b.id===l.billing_account_id) : null
  const email = l.contact_email || ba?.email || ''
  const phone = l.contact_phone || ba?.phone || ''
  if(!email && !phone){toast('No customer email or phone on file. Add one first.',false);return}
  const channels = [email&&'email', phone&&'text'].filter(Boolean).join(' + ')
  if(!confirm(`Send a quote-approval link to ${l.name||'customer'}?\n\nDelivered via: ${channels}\nCustomer signs remotely; once they do, the quote auto-converts to a scheduled job.`))return
  // Reuses the existing /api/send-signature-request endpoint that handles
  // post-completion signatures. For v1, the SAME endpoint sends a sign
  // link — the difference is: when the signature comes back and gets
  // attached to the job, a follow-up cron / webhook should detect status='quote'
  // + signature_data not null and call _convertQuoteToJob. That webhook
  // doesn't exist yet, so for v1 we just stamp quote_sent_at and let Jon
  // call approveQuoteManual when the customer replies.
  try{
    const res = await fetch('/api/send-signature-request',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({job_id:jobId, purpose:'quote_approval'})
    })
    const data = await res.json().catch(()=>({}))
    if(!res.ok)throw new Error(data.error||'Send failed')
    await SB.from('jobs').update({quote_sent_at: new Date().toISOString()}).eq('id', jobId)
    audit('updated','job',jobId,'jon',{quote_sent_via: channels},'Quote signature link sent to '+(email||phone))
    await load(); pop(); await openJob(jobId)
    toast(`✓ Sign link sent via ${channels}`)
  }catch(e){
    console.error('sendQuoteForSignature:',e)
    toast('Send failed: '+e.message, false)
  }
}

let sigCtx=null,sigOn=false
function initSig(){
  const c=$('sigC');if(!c)return
  const r=c.parentElement.getBoundingClientRect();c.width=r.width;c.height=r.height
  sigCtx=c.getContext('2d');sigCtx.strokeStyle='#222';sigCtx.lineWidth=2.5;sigCtx.lineCap='round';sigCtx.lineJoin='round'
  const sp=e=>{e.preventDefault();sigOn=true;if($('sigPh'))$('sigPh').style.display='none';const p=gp(e);sigCtx.beginPath();sigCtx.moveTo(p.x,p.y)}
  const sm=e=>{if(!sigOn)return;e.preventDefault();const p=gp(e);sigCtx.lineTo(p.x,p.y);sigCtx.stroke()}
  const se=()=>{sigOn=false}
  c.addEventListener('touchstart',sp,{passive:false});c.addEventListener('touchmove',sm,{passive:false});c.addEventListener('touchend',se)
  c.addEventListener('mousedown',sp);c.addEventListener('mousemove',sm);c.addEventListener('mouseup',se)
}
function gp(e){const c=$('sigC'),r=c.getBoundingClientRect(),t=e.touches?e.touches[0]:e;return{x:t.clientX-r.left,y:t.clientY-r.top}}
function clrSig(){if(sigCtx){const c=$('sigC');sigCtx.clearRect(0,0,c.width,c.height)}if($('sigPh'))$('sigPh').style.display=''}
