// Upload path convention: invoice-attachments/{invoice_id}/{uuid}.{ext}
// Max 2048px on longest edge for images, JPEG 80% quality before upload.
// PDFs uploaded as-is. HEIC converted to JPEG by the canvas step (mobile Safari decodes HEIC natively when drawn).

const INV_ATTACH_BUCKET='invoice-attachments'
const INV_ATTACH_MAX_BYTES=10*1024*1024 // 10 MB
const INV_ATTACH_LABELS=[
  {v:'work_order',l:'Work Order'},
  {v:'po',l:'Purchase Order'},
  {v:'compliance',l:'Compliance'},
  {v:'photo',l:'Photo'},
  {v:'other',l:'Other'}
]

function _attachUuid(){
  const arr=new Uint8Array(16);crypto.getRandomValues(arr)
  return Array.from(arr,b=>b.toString(16).padStart(2,'0')).join('')
}

function _attachExt(type,name){
  if(type==='application/pdf')return 'pdf'
  if(type==='image/png')return 'png'
  if(type==='image/heic')return 'jpg' // converted
  if(name){const m=name.match(/\.([a-z0-9]+)$/i);if(m)return m[1].toLowerCase()}
  return 'jpg'
}

// compress an image File to JPEG blob, max 2048px longest edge, quality 0.8
async function _compressImage(file){
  return new Promise((resolve,reject)=>{
    const reader=new FileReader()
    reader.onload=e=>{
      const img=new Image()
      img.onload=()=>{
        const max=2048
        let w=img.width,h=img.height
        if(w>max||h>max){
          if(w>h){h=Math.round(h*(max/w));w=max}
          else{w=Math.round(w*(max/h));h=max}
        }
        const canvas=document.createElement('canvas')
        canvas.width=w;canvas.height=h
        canvas.getContext('2d').drawImage(img,0,0,w,h)
        canvas.toBlob(b=>b?resolve(b):reject(new Error('compress failed')),'image/jpeg',0.8)
      }
      img.onerror=()=>reject(new Error('image load failed'))
      img.src=e.target.result
    }
    reader.onerror=()=>reject(new Error('file read failed'))
    reader.readAsDataURL(file)
  })
}

async function uploadInvoiceAttachment(invoiceId,file,label){
  if(!invoiceId||!file)return{error:'Missing invoice or file'}
  const isImg=(file.type||'').startsWith('image/')
  const isPdf=file.type==='application/pdf'
  if(!isImg&&!isPdf)return{error:'Unsupported file type'}
  let uploadBlob=file
  let uploadType=file.type||(isPdf?'application/pdf':'image/jpeg')
  if(isImg){
    try{uploadBlob=await _compressImage(file);uploadType='image/jpeg'}
    catch(e){console.error('compress:',e);uploadBlob=file}
  }
  if(uploadBlob.size>INV_ATTACH_MAX_BYTES)return{error:'File exceeds 10MB'}
  const ext=_attachExt(uploadType,file.name||'')
  const path=`${invoiceId}/${_attachUuid()}.${ext}`
  const{error:upErr}=await SB.storage.from(INV_ATTACH_BUCKET).upload(path,uploadBlob,{contentType:uploadType,upsert:false})
  if(upErr){console.error('storage upload:',upErr);return{error:upErr.message||'Upload failed'}}
  const{data:row,error:dbErr}=await SB.from('invoice_attachments').insert({
    invoice_id:invoiceId,
    file_name:file.name||`attachment.${ext}`,
    file_path:path,
    file_type:uploadType,
    file_size:uploadBlob.size,
    label:label||null
  }).select().single()
  if(dbErr){
    console.error('attachment db insert:',dbErr)
    try{await SB.storage.from(INV_ATTACH_BUCKET).remove([path])}catch(e){}
    return{error:dbErr.message||'Database insert failed'}
  }
  return{data:row}
}

async function loadInvoiceAttachments(invoiceId){
  if(!invoiceId)return[]
  const{data,error}=await SB.from('invoice_attachments').select('*').eq('invoice_id',invoiceId).order('uploaded_at')
  if(error){console.error('load attachments:',error);return[]}
  return data||[]
}

async function invoiceAttachmentUrl(path,expiresIn){
  if(!path)return''
  const{data,error}=await SB.storage.from(INV_ATTACH_BUCKET).createSignedUrl(path,expiresIn||3600)
  if(error){console.error('signed url:',error);return''}
  return data?.signedUrl||''
}

async function deleteInvoiceAttachment(attachmentId){
  const{data:row}=await SB.from('invoice_attachments').select('id,file_path').eq('id',attachmentId).single()
  if(!row)return{error:'Not found'}
  try{await SB.storage.from(INV_ATTACH_BUCKET).remove([row.file_path])}catch(e){console.error('storage remove:',e)}
  const{error}=await SB.from('invoice_attachments').delete().eq('id',attachmentId)
  if(error)return{error:error.message}
  return{ok:true}
}

async function updateInvoiceAttachmentLabel(attachmentId,label){

function triggerInvAttachUpload(invoiceId,onDone){
  // create a hidden file input, trigger it, handle the upload
  const inp=document.createElement('input')
  inp.type='file'
  inp.accept='image/jpeg,image/png,image/heic,application/pdf'
  inp.style.display='none'
  inp.onchange=async e=>{
    const file=e.target.files?.[0]
    if(!file){document.body.removeChild(inp);return}
    toast('Uploading…')
    const res=await uploadInvoiceAttachment(invoiceId,file,null)
    document.body.removeChild(inp)
    if(res.error){toast('Upload failed: '+res.error,false);return}
    toast('Attachment added ✓')
    if(onDone)onDone(res.data)
  }
  document.body.appendChild(inp)
  inp.click()
}

function triggerInvAttachCamera(invoiceId,onDone){
  // mobile camera capture
  const inp=document.createElement('input')
  inp.type='file'
  inp.accept='image/*'
  inp.capture='environment'
  inp.style.display='none'
  inp.onchange=async e=>{
    const file=e.target.files?.[0]
    if(!file){document.body.removeChild(inp);return}
    toast('Uploading photo…')
    const res=await uploadInvoiceAttachment(invoiceId,file,'photo')
    document.body.removeChild(inp)
    if(res.error){toast('Upload failed: '+res.error,false);return}
    toast('Photo added ✓')
    if(onDone)onDone(res.data)

  document.body.appendChild(inp)
  inp.click()
}

function _attachIcon(type){
  if(!type)return '📄'
  if(type==='application/pdf')return '📄'
  if(type.startsWith('image/'))return '🖼️'
  return '📎'
}

function _attachLabelName(v){
  const f=INV_ATTACH_LABELS.find(x=>x.v===v)

async function delJob(id){
  // cascade: invoice_lines → invoices → reports → extinguisher_results → job
  try{
    const{data:invs}=await SB.from('invoices').select('id').eq('job_id',id)
    const invIds=(invs||[]).map(i=>i.id)
    if(invIds.length)await SB.from('invoice_lines').delete().in('invoice_id',invIds)
    if(invIds.length)await SB.from('invoices').delete().in('id',invIds)
    await SB.from('reports').delete().eq('job_id',id)
    await SB.from('extinguisher_results').delete().eq('job_id',id)
  }catch(e){console.error('delJob cascade:',e)}
  deleteJobGcalEvent(id)
  const{error}=await SB.from('jobs').delete().eq('id',id)
  if(error){toast('Error deleting job',false);return}
  audit('deleted','job',id,'jon',null,'Job deleted')
  await load();toast('Job deleted')
  popAll()
  rJobs();rJobs()
}

async function tripleDeleteClient(id, name){
  if(!confirm('Delete '+name+'? This removes ALL jobs, invoices, equipment, and reports for this client. This cannot be undone.'))return
  if(!confirm('SECOND CONFIRMATION: Are you absolutely sure you want to permanently delete '+name+' and all associated data?'))return
  const typed=prompt('FINAL CONFIRMATION: Type the client name exactly to delete: '+name)
  if(typed!==name){toast('Name did not match — deletion cancelled',false);return}
  await delCust(id)
}

async function delCust(id){
  // cascade everything referencing this location
  try{
    const jobIds=D.jobs.filter(j=>j.location_id===id||j.location?.id===id).map(j=>j.id)
    const invIds=D.invs.filter(i=>i.location_id===id).map(i=>i.id)
    // reports → reference job_id
    if(jobIds.length)try{await SB.from('reports').delete().in('job_id',jobIds)}catch(e){}
    // also reports by location_id
    try{await SB.from('reports').delete().eq('location_id',id)}catch(e){}
    // invoice lines → invoices
    if(invIds.length)try{await SB.from('invoice_lines').delete().in('invoice_id',invIds)}catch(e){}
    if(invIds.length)try{await SB.from('invoices').delete().in('id',invIds)}catch(e){}
    // extinguisher_results, suppression_results
    if(jobIds.length)try{await SB.from('extinguisher_results').delete().in('job_id',jobIds)}catch(e){}
    if(jobIds.length)try{await SB.from('suppression_results').delete().in('job_id',jobIds)}catch(e){}
    // brycer queue
    try{await SB.from('brycer_queue').delete().eq('location_id',id)}catch(e){}
    // portal tokens
    try{await SB.from('portal_tokens').delete().eq('location_id',id)}catch(e){}
    // service requests
    try{await SB.from('service_requests').delete().eq('location_id',id)}catch(e){}
    // jobs
    if(jobIds.length)try{await SB.from('jobs').delete().in('id',jobIds)}catch(e){}
    // equipment
    try{await SB.from('extinguishers').delete().eq('location_id',id)}catch(e){}
    try{await SB.from('suppression_systems').delete().eq('location_id',id)}catch(e){}
    try{await SB.from('emergency_lights').delete().eq('location_id',id)}catch(e){}
    // contracts
    try{await SB.from('contracts').delete().eq('location_id',id)}catch(e){}
    // finally the location
    const{error}=await SB.from('locations').delete().eq('id',id)
    if(error){toast('Error: '+error.message,false);return}
  }catch(e){toast('Delete failed: '+e.message,false);return}
  audit('deleted','location',id,'jon',null,'Client deleted')
  await load();toast('Client deleted')
  popAll();rCust()
}

async function openExtReport(jobId,editMode){
  const j=D.jobs.find(x=>x.id===jobId);if(!j)return
  const l=D.locs.find(x=>x.id===(j.location_id||j.location?.id))||j.location||{}
  _extJobId=jobId;_extLocId=l.id||j.location_id
  window._extJobId=jobId;window._extLoc=l

  // load previous report or build from extinguishers on file
  const{data:prevRpt}=await SB.from('reports').select('report_data').eq('job_id',jobId).eq('report_type','extinguisher').limit(1)
  const prev=prevRpt?.[0]?.report_data||{}
  const exts=l.extinguishers||[]

  if(prev.units?.length){
    _extUnits=prev.units.map((u,i)=>({
      id:u.id||('ext-'+Date.now()+'-'+i),number:i+1,
      type:u.type||'ABC Dry Chemical',size:u.size||'10lb',
      location:u.location||'',mfgDate:u.mfgDate||'',
      lastInternal:u.lastInternal||'',lastHydro:u.lastHydro||'',
      condition:u.condition||'pass',notes:u.notes||'',
      flagged:u.flagged||u.condition==='fail',flagNote:u.flagNote||'',
      serial:u.serial||'',manufacturer:u.manufacturer||'',
      barcodeRaw:u.barcodeRaw||'',photo:u.photoB64||u.photo||''
    }))
  }else if(exts.length){
    _extUnits=exts.map((e,i)=>({
      id:e.id,number:i+1,
      type:e.type||'ABC Dry Chemical',size:e.size||'10lb',
      location:e.location_in_building||'',mfgDate:e.manufacture_date||'',
      lastInternal:e.last_internal||'',lastHydro:e.last_hydro||'',
      condition:'pass',notes:'',flagged:false,flagNote:'',
      serial:e.serial_number||'',manufacturer:'',barcodeRaw:'',photo:''
    }))
  }else{
    _extUnits=[]
  }

  _extView='list';_extActiveId=null;_extSearchText=''
  renderExtSession()
}

async function handleExtScan(ev){
  const file=ev.target.files[0];if(!file)return
  const statusEl=$('extScanStatus')
  if(statusEl)statusEl.innerHTML='<div style="color:var(--fire);font-weight:700">Processing...</div>'

  let b64
  try{b64=await resizePhoto(file,1000,0.8)}catch(e){toast('Photo failed',false);return}

  const u=_extUnits.find(x=>x.id===_extActiveId)
  if(!u){toast('Error',false);return}
  u.photo=b64;u.photoLabel=b64

  if(statusEl)statusEl.innerHTML='<div style="color:var(--fire);font-weight:700"><span class="spin"></span> AI reading label & barcodes...</div>'

  try{
    const res=await fetch('/api/claude',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:1024,
        messages:[{role:'user',content:[
          {type:'image',source:{type:'base64',media_type:'image/jpeg',data:b64.split(',')[1]}},
          {type:'text',text:`Read this fire extinguisher front label carefully. Return ONLY valid JSON:
{"type":"ABC Dry Chemical|BC Dry Chemical|CO2|Class K|Water|Halon|Halotron|Class D|Purple K|Clean Agent",
"size":"read the capacity — e.g. 5lb, 10lb, 20lb, 6 Liter, 2.5gal",
"brand":"Amerex, Badger, Buckeye, Kidde, Ansul, First Alert, Strike First — read from label",
"serial":"serial number — look for S/N, SER, or a long alphanumeric code on the label",
"upc":"if you can see a UPC barcode, read the 12-13 digit number under it",
"mfgDate":"YYYY-MM — CRITICAL: look for manufacture date. It may be: (1) stamped on the metal body/collar near the bottom, (2) printed on the label as 'MFG DATE' or 'DOM', (3) encoded in military format like JAN25=2025-01 or 03/2020=2020-03, (4) a date code stamped into the bottom ring. Convert to YYYY-MM format.",
"condition":"pass or fail — fail if: gauge in red, missing pin, damaged hose, dented, corroded, expired tag",
"notes":"describe any visible damage or issues",
"model":"model number — look for part number or model designation on label"}`}
        ]}]
      })
    })
    const data=await res.json()
    console.log('Claude response:',JSON.stringify(data).slice(0,500))
    if(data.error){toast('AI error: '+(data.error?.message||data.error),false);pop();_extView='detail';renderExtSession();return}
    const txt=data.content?.[0]?.text||''
    console.log('AI text:',txt)
    if(!txt){toast('AI returned empty — try again',false);pop();_extView='detail';renderExtSession();return}
    let p;try{p=JSON.parse(txt.replace(/```json|```/g,'').trim())}catch(parseErr){console.error('JSON parse fail:',txt);p={}}

    if(p.type)u.type=p.type;if(p.size)u.size=p.size;if(p.brand)u.manufacturer=p.brand
    if(p.serial)u.serial=p.serial;if(p.mfgDate)u.mfgDate=p.mfgDate;if(p.model)u.model=p.model
    if(p.condition)u.condition=p.condition;if(p.condition==='fail')u.flagged=true
    if(p.notes)u.notes=p.notes;if(p.upc)u.barcodeRaw=p.upc

    // UPC lookup
    if(p.upc&&p.upc.length>=10){
      try{
        const lr=await fetch('/api/upc-lookup',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({barcode:p.upc,format:'upc_a'})})
        const prod=await lr.json()
        if(prod.success){
          if(prod.brand&&!u.manufacturer)u.manufacturer=prod.brand
          if(prod.type&&u.type==='ABC Dry Chemical')u.type=prod.type
          if(prod.size&&!u.size)u.size=prod.size
        }
      }catch(e){}
    }

    if(!u.manufacturer){const mfr=guessManufacturer(u.serial||u.barcodeRaw||'');if(mfr)u.manufacturer=mfr}

    // show result in scanner overlay before advancing
    if(statusEl)statusEl.innerHTML=`<div style="background:var(--c1);border:1px solid var(--ok);border-radius:var(--rs);padding:14px;text-align:left">
      <div style="font-size:16px;font-weight:800;color:var(--ok);margin-bottom:4px">✓ ${esc(u.type)} ${esc(u.size)}</div>
      ${u.manufacturer?`<div style="font-size:12px;color:var(--g1)">${esc(u.manufacturer)}${u.model?' · '+esc(u.model):''}</div>`:''}
      ${u.serial?`<div style="font-size:11px;color:var(--g2);font-family:monospace;margin-top:2px">${esc(u.serial)}</div>`:''}
      ${u.condition==='fail'?'<div style="font-size:12px;color:var(--bad);font-weight:700;margin-top:4px">⚠ FLAGGED — '+esc(u.notes||'issue detected')+'</div>':''}
    </div>`

    toast(`#${u.number} ${u.type} ${u.size}`)
  }catch(e){
    console.error('scan error:',e)
    if(statusEl)statusEl.innerHTML='<div style="color:var(--bad);font-weight:700">Read failed — check detail to enter manually</div>'
  }

  ev.target.value=''

  // auto-save immediately after scan
  debouncedExtSave()

  // auto-advance after 1.5s — scan next or go to detail
  setTimeout(()=>{
    pop() // close scanner
    _extView='detail';renderExtSession()
  },1500)
}

function resizePhoto(file,maxPx,quality){
  return new Promise(resolve=>{
    const reader=new FileReader()
    reader.onload=e=>{
      const img=new Image()
      img.onload=()=>{
        const canvas=document.createElement('canvas')
        let w=img.width,h=img.height
        if(w>maxPx||h>maxPx){if(w>h){h=Math.round(h*maxPx/w);w=maxPx}else{w=Math.round(w*maxPx/h);h=maxPx}}
        canvas.width=w;canvas.height=h;canvas.getContext('2d').drawImage(img,0,0,w,h)
        resolve(canvas.toDataURL('image/jpeg',quality||0.8))
      }
      img.src=e.target.result
    }
    reader.readAsDataURL(file)
  })
}

function suppAgentChanged(){
  const agent=$('supp-agent')?.value
  const brandWrap=$('supp-brand-wrap')
  const modelWrap=$('supp-model-wrap')
  const tankWrap=$('supp-tank-wrap')
  const customInput=$('supp-agent-custom')
  const priceNote=$('supp-price-note')

  if(agent==='_custom'){
    if(customInput)customInput.style.display='block'
    if(brandWrap)brandWrap.style.display='none'
    if(modelWrap)modelWrap.style.display='none'
    if(tankWrap)tankWrap.style.display='none'
    if(priceNote)priceNote.style.display='none'
    return
  }
  if(customInput)customInput.style.display='none'
  if(!agent||!SUPP_DATA[agent]){
    if(brandWrap)brandWrap.style.display='none'
    if(modelWrap)modelWrap.style.display='none'
    if(tankWrap)tankWrap.style.display='none'
    if(priceNote)priceNote.style.display='none'
    return
  }

  // show price note for Water+ / CORE
  if(agent==='Water+'){
    if(priceNote){priceNote.style.display='block';priceNote.textContent='Captive-Aire CORE — $650.00 per 6-month test & maintenance'}
  }else{if(priceNote)priceNote.style.display='none'}

  const brands=Object.keys(SUPP_DATA[agent])
  const sel=$('supp-brand')
  sel.innerHTML=`<option value="">-- Select Brand --</option>`+brands.map(b=>`<option value="${b}">${b}</option>`).join('')+`<option value="_custom">+ Add Brand...</option>`
  if(brandWrap)brandWrap.style.display='block'
  if(modelWrap)modelWrap.style.display='none'
  if(tankWrap)tankWrap.style.display='none'

  // auto-select if only one brand
  if(brands.length===1){sel.value=brands[0];suppBrandChanged()}
}

function suppBrandChanged(){
  const agent=$('supp-agent')?.value
  const brand=$('supp-brand')?.value
  const modelWrap=$('supp-model-wrap')
  const tankWrap=$('supp-tank-wrap')

  if(!brand||brand==='_custom'||!agent||!SUPP_DATA[agent]?.[brand]){
    if(modelWrap)modelWrap.style.display='none'
    if(tankWrap)tankWrap.style.display='none'
    return
  }

  const brandData=SUPP_DATA[agent][brand]
  const models=Object.keys(brandData.models)
  const sel=$('supp-model')
  const customM=$('supp-model-custom')
  if(customM)customM.style.display='none'
  sel.innerHTML=`<option value="">-- Select Model --</option>`+models.map(m=>`<option value="${m}">${m}</option>`).join('')+(brandData.addNew?`<option value="_custom">+ Add Model...</option>`:'')
  if(modelWrap)modelWrap.style.display='block'
  if(tankWrap)tankWrap.style.display='none'

  // auto-select if only one model
  if(models.length===1){sel.value=models[0];suppModelChanged()}
}

function suppModelChanged(){
  const agent=$('supp-agent')?.value
  const brand=$('supp-brand')?.value
  const model=$('supp-model')?.value
  const tankWrap=$('supp-tank-wrap')
  const customM=$('supp-model-custom')

  if(model==='_custom'){
    if(customM)customM.style.display='block'
    if(tankWrap)tankWrap.style.display='none'
    return
  }
  if(customM)customM.style.display='none'

  if(!model||!agent||!SUPP_DATA[agent]?.[brand]?.models?.[model]){
    if(tankWrap)tankWrap.style.display='none'
    return
  }

  const tanks=SUPP_DATA[agent][brand].models[model].tanks||[]
  const sel=$('supp-tank-size')
  sel.innerHTML=tanks.map(t=>`<option>${t}</option>`).join('')
  if(tankWrap)tankWrap.style.display=tanks.length?'block':'none'
}

async function saveSupp(locId){
  const b=$('saveSuppBtn');if(b){b.textContent='Saving...';b.style.opacity='.5';b.style.pointerEvents='none'}
  // build system_type from cascading selections
  let agent=$('supp-agent')?.value||''
  if(agent==='_custom')agent=$('supp-agent-custom')?.value?.trim()||'Custom'
  let brand=$('supp-brand')?.value||''
  if(brand==='_custom')brand=''
  let model=$('supp-model')?.value||''
  if(model==='_custom')model=$('supp-model-custom')?.value?.trim()||''
  const tankSize=$('supp-tank-size')?.value||''
  const sysType=[brand,model].filter(Boolean).join(' ')||agent||'Suppression System'
  // determine category for pricing
  let cat='standard'
  if(agent==='Water+'||brand==='Captive-Aire'&&model==='CORE System')cat='captiveaire_core'
  else if(brand==='Captive-Aire')cat='captiveaire_tank'
  const{error}=await SB.from('suppression_systems').insert({
    location_id:locId,
    system_type:sysType+(tankSize&&tankSize!=='Standard'&&tankSize!=='Various'?' ('+tankSize+')':''),
    category:cat,
    tank_count:parseInt($('supp-tanks')?.value)||1,
    nozzle_count:parseInt($('supp-nozzles')?.value)||0,
    fusible_link_count:parseInt($('supp-links')?.value)||0
  })
  if(error){if($('supp-err'))$('supp-err').textContent='Error: '+error.message;if(b){b.textContent='Save';b.style.opacity='';b.style.pointerEvents=''}return}
  await load();toast('Suppression system added')
  pop()
  const slot=stk[stk.length-1]
  if(slot){stk.pop();document.getElementById(slot).classList.remove('open');document.getElementById(slot).style.display='none';document.getElementById(slot).innerHTML=''}
  setTimeout(()=>openCust(locId),50)
}

// ═══ MONEY FILTER ═══
function filterInvs(filter){
  const now=new Date()
  const monthStart=new Date(now.getFullYear(),now.getMonth(),1).toISOString().split('T')[0]
  const monthEnd=new Date(now.getFullYear(),now.getMonth()+1,0).toISOString().split('T')[0]
  let invs=[]
  let title=''
  if(filter==='paid'){
    invs=D.invs.filter(i=>i.status==='paid'&&i.date>=monthStart&&i.date<=monthEnd)
    title='Collected This Month'
  }else{
    invs=D.invs.filter(i=>!['paid','void','record','factored'].includes(i.status))
    title='Outstanding Invoices'
  }
  const total=invs.reduce((s,i)=>s+(+i.total),0)
  let h=`<div class="ov-hdr"><button class="ov-back" onclick="pop()">‹</button><div class="ov-title">${title}</div></div><div class="ov-body">`
  h+=`<div style="background:var(--c1);border:1px solid var(--b1);border-radius:var(--r);padding:14px;margin-bottom:16px;text-align:center"><div style="font-size:28px;font-weight:900;color:${filter==='paid'?'var(--ok)':'var(--bad)'}">${fmt(total)}</div><div style="font-size:11px;color:var(--g1);margin-top:4px">${invs.length} invoice${invs.length!==1?'s':''}</div></div>`
  if(!invs.length)h+=`<div class="ey"><div class="ey-i">💰</div><div class="ey-t">No invoices here.</div></div>`
  else h+=iHtml(invs)
  h+=`</div>`
  push(h)
}

let rptSigCtx={}
function initRptSig(key,canvasId,phId){
  const c=$(canvasId);if(!c)return
  const r=c.parentElement.getBoundingClientRect();c.width=r.width;c.height=r.height
  const ctx=c.getContext('2d');ctx.strokeStyle='#222';ctx.lineWidth=2.5;ctx.lineCap='round';ctx.lineJoin='round'
  rptSigCtx[key]=ctx
  let on=false
  const sp=e=>{e.preventDefault();on=true;if($(phId))$(phId).style.display='none';const p=gpC(e,c);ctx.beginPath();ctx.moveTo(p.x,p.y)}
  const sm=e=>{if(!on)return;e.preventDefault();const p=gpC(e,c);ctx.lineTo(p.x,p.y);ctx.stroke()}
  const se=()=>{on=false}
  c.addEventListener('touchstart',sp,{passive:false});c.addEventListener('touchmove',sm,{passive:false});c.addEventListener('touchend',se)
  c.addEventListener('mousedown',sp);c.addEventListener('mousemove',sm);c.addEventListener('mouseup',se)
}

function gpC(e,c){const r=c.getBoundingClientRect(),t=e.touches?e.touches[0]:e;return{x:t.clientX-r.left,y:t.clientY-r.top}}

function clrRptSig(key){
  const canvasId=key==='tech'?'rptTechSig':'rptOwnerSig'
  const phId=key==='tech'?'rptTechSigPh':'rptOwnerSigPh'
  const c=$(canvasId)
  if(c&&rptSigCtx[key])rptSigCtx[key].clearRect(0,0,c.width,c.height)
  if($(phId))$(phId).style.display=''
}

function clrCustSendSig(){
  const c=$('custSendSig');if(!c)return
  c.getContext('2d').clearRect(0,0,c.width,c.height)
  const ph=$('custSendSigPh');if(ph)ph.style.display=''
}

let _applianceImages=[]
async function handleAppliancePhotos(ev){
  const files=Array.from(ev.target.files);if(!files.length)return
  const wrap=$('appliance-photos');if(wrap)wrap.innerHTML=''
  _applianceImages=[]
  const st=$('appliance-ai-status');if(st)st.style.display='block'

  for(const file of files.slice(0,3)){
    // upload photo to storage in background
    try{uploadDocument(file,file.name,'photo','general','00000000-0000-0000-0000-000000000000',{source:'appliance_photo'})}catch(e){}
    const reader=new FileReader()
    const b64=await new Promise(r=>{reader.onload=e=>r(e.target.result);reader.readAsDataURL(file)})
    if(wrap){
      const img=document.createElement('img')
      img.src=b64;img.style.cssText='width:80px;height:60px;object-fit:cover;border-radius:6px;border:1px solid var(--b1)'
      wrap.appendChild(img)
    }
    // resize for AI
    const imgEl=new Image()
    const resized=await new Promise(r=>{
      imgEl.onload=()=>{
        const canvas=document.createElement('canvas')
        const max=1200;let w=imgEl.width,h=imgEl.height
        if(w>max||h>max){if(w>h){h=Math.round(h*max/w);w=max}else{w=Math.round(w*max/h);h=max}}
        canvas.width=w;canvas.height=h;canvas.getContext('2d').drawImage(imgEl,0,0,w,h)
        r(canvas.toDataURL('image/jpeg',0.8).split(',')[1])
      };imgEl.src=b64
    })
    _applianceImages.push(resized)
  }
  $('applianceInput').value=''
  // send to AI
  try{
    const content=_applianceImages.map(b=>({type:'image',source:{type:'base64',media_type:'image/jpeg',data:b}}))
    content.push({type:'text',text:'You are looking at commercial cooking appliances in a kitchen. List every appliance you see from LEFT to RIGHT, one per line. Include type (fryer, grill, range, oven, broiler, steamer, etc.) and any visible brand names. Be specific. Return ONLY the list, no other text.'})
    const res=await fetch('/api/claude',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:1000,messages:[{role:'user',content}]})
    })
    const data=await res.json()
    const txt=data.content?.[0]?.text||''
    const ta=$('rpt-appliances')
    if(ta){ta.value=ta.value?(ta.value+'\n'+txt):txt}
    toast('Appliances identified')
  }catch(e){console.error('appliance AI:',e);toast('Could not read photos',false)}
  if(st)st.style.display='none'
}

    mfg:$('rpt-mfg')?.value||'',model:$('rpt-model')?.value||'',
    serial:$('rpt-serial')?.value||'',cyl:$('rpt-cyl')?.value||'',
    hydro:$('rpt-hydro')?.value||'',recharge:$('rpt-recharge')?.value||'',
    links:$('rpt-links')?.value||'',techName:$('rpt-tech-name')?.value||'Jon Stephens',
    permit:$('rpt-permit')?.value||'FEL-A-2593933',ownerName:$('rpt-owner-name')?.value||'',
    appliances:$('rpt-appliances')?.value||'',deficiencies:$('rpt-deficiencies')?.value||'',
    sysLocation:sysLocation,
    timein:$('rpt-timein')?.value||'',timeout:$('rpt-timeout')?.value||'',
    extraTanks:[..._rptExtraTanks]
  }
  // only include sig if it's small enough (skip huge data URLs that blow up JSONB)
  if(techSigData&&techSigData.length<50000)formData.techSig=techSigData
  // skip storing reportHtml in DB — it's huge and can be regenerated from formData
  // reportHtml will be generated at send time from the saved form data

  const j=D.jobs.find(x=>x.id===jobId)||{}
  const locId=j.location_id||j.location?.id
  if(!locId){toast('Error: no location linked to this job',false);console.error('No locId for job',jobId,j);if(btn){btn.textContent='✓ Save Report';btn.style.opacity='';btn.style.pointerEvents=''}return}

  let saveOk=false
  try{
    // simplified — always upsert by job_id + report_type, ignore sysId matching for now
    const{data:existing}=await SB.from('reports').select('id').eq('job_id',jobId).eq('report_type','kitchen_suppression').limit(1)
    if(existing?.length){
      const{error}=await SB.from('reports').update({report_data:{...formData,sysId:sysId||null}}).eq('id',existing[0].id)
      if(error){alert('SAVE ERROR: '+error.message);console.error(error)}else saveOk=true
    }else{
      const{error}=await SB.from('reports').insert({job_id:jobId,location_id:locId,report_type:'kitchen_suppression',report_data:{...formData,sysId:sysId||null}})
      if(error){alert('SAVE ERROR: '+error.message);console.error(error)}else saveOk=true
    }
  }catch(e){alert('SAVE CRASHED: '+e.message);console.error(e)}

  if(!saveOk){if(btn){btn.textContent='✓ Save Report';btn.style.opacity='';btn.style.pointerEvents=''}return}

  await load()
  if(silent)return // auto-save — don't pop or show prompts
  toast('Report saved ✓')
  _manualSaving=true;pop();_manualSaving=false
  setTimeout(()=>updateJobChecklist(),200)
  // always offer additional report — technician knows how many systems are on site
  showAdditionalReportOption(jobId,sysLocation)
}

<div style="display:flex;gap:20px;margin-top:10px;padding-top:10px;border-top:2px solid #1a1a2e">

  ${rptSigBlock(ownerSig,'Owner / Manager / Auth. Agent',$('rpt-owner-name')?.value||'')}
</div>`

  const html=rptShell('Kitchen Hood Suppression','Pre-Engineered System · Semi-Annual / Annual',content)

  const w=window.open('','_blank')

function calcCaNet(i){
  const c=window._caCyls[i]
  const t=parseFloat(c.tare||0),g=parseFloat(c.gross||0)
  const net=g>0&&t>0?+(g-t).toFixed(1):null
  c.actual=net!==null?net:''
  const el=$('ca-net-'+i)
  if(el){el.textContent=net!==null?net+' lb':'—';el.style.color=net!==null&&net>0?'var(--ok)':'var(--warn)'}
}

async function saveCleanAgentReport(jobId,sysId,silent){
  const btn=silent?null:($('caRptSaveBtn2')||$('caRptSaveBtn'));if(btn){btn.textContent='Saving...';btn.style.opacity='.5';btn.style.pointerEvents='none'}
  let techSig=''
  try{const c=$('caTechSig');if(c){const ctx=c.getContext('2d');const px=ctx.getImageData(0,0,c.width,c.height).data;let has=false;for(let i2=3;i2<px.length;i2+=4){if(px[i2]>0){has=true;break}};if(has)techSig=c.toDataURL('image/jpeg',0.5)}}catch(e){}
  const data={
    checks:{...(window._caCheckState||{})},
    serviceType:window._caServiceType||'semi',
    agentType:$('ca-agent-type')?.value||'',
    mfg:$('ca-mfg')?.value||'',model:$('ca-model')?.value||'',
    serial:$('ca-serial')?.value||'',area:$('ca-area')?.value||'',
    concentration:$('ca-conc')?.value||'',panel:$('ca-panel')?.value||'',
    cylinders:(window._caCyls||[]).map(c=>({...c})),
    techName:$('ca-tech-name')?.value||'Jon Stephens',
    permit:$('ca-permit')?.value||'FEL-A-2593933',
    ownerName:$('ca-owner-name')?.value||'',
    deficiencies:$('ca-deficiencies')?.value||'',
    techSig,
    timein:$('ca-timein')?.value||'',timeout:$('ca-timeout')?.value||''
  }
  const j=D.jobs.find(x=>x.id===jobId)||{}
  const locId2=j.location_id||j.location?.id
  if(!locId2){if(!silent)toast('Error: no location',false);if(btn){btn.textContent='✓ Save Report';btn.style.opacity='';btn.style.pointerEvents=''}return}
  let saveOk=false
  try{
    const{data:caExist}=await SB.from('reports').select('id').eq('job_id',jobId).eq('report_type','clean_agent').limit(1)
    if(caExist?.length){
      const{error}=await SB.from('reports').update({report_data:data}).eq('id',caExist[0].id)
      if(error){if(!silent)toast('Save error: '+error.message,false)}else saveOk=true
    }else{
      const{error}=await SB.from('reports').insert({job_id:jobId,location_id:locId2,report_type:'clean_agent',report_data:data})
      if(error){if(!silent)toast('Save error: '+error.message,false)}else saveOk=true
    }
  }catch(e){console.error('ca report save:',e);if(!silent)toast('Save failed',false)}
  if(!saveOk){if(btn){btn.textContent='✓ Save Report';btn.style.opacity='';btn.style.pointerEvents=''}return}
  await load()
  if(silent)return
  toast('Report saved ✓')
  _manualSaving=true;pop();_manualSaving=false
  setTimeout(()=>updateJobChecklist(),200)
}

let _chatMsgs=[]
let _chatOpen=false

function openChat(){
  _chatOpen=true
  $('chatOv').classList.add('open')
  if(!_chatMsgs.length){
    _chatMsgs.push({role:'assistant',content:"Hey Jon. I can do things in the app for you — just tell me what you need.\n\n• \"Add a client called Dave's Hot Chicken in McKinney\"\n• \"Schedule a job at Primo Brothers for next Tuesday at 9\"\n• \"Look up Look Cinemas\"\n• \"Add a to-do: order fusible links\"\n• \"Mark invoice INV-649577 as paid by check\"\n• \"Show me my overdue jobs\"\n• \"Text 469-324-6503 saying I'm running late\""})
    renderChat()
  }
  setTimeout(()=>$('chatInput')?.focus(),100)
}

function closeChat(){
  _chatOpen=false
  $('chatOv').classList.remove('open')
}

function renderChat(){
  const wrap=$('chatMsgs');if(!wrap)return
  wrap.innerHTML=_chatMsgs.map(m=>{
    const cls=m.role==='user'?'user':'ai'
    if(m.content==='_confirm_'){
      return`<div class="chat-msg ai"><div class="chat-bubble" style="padding:0;overflow:hidden">
        <div style="padding:10px 14px;font-size:13px;font-weight:600">Ready?</div>
        <div style="display:flex;border-top:1px solid var(--b1)">
          <button onclick="confirmChatActions(true)" style="flex:1;padding:12px;font-size:14px;font-weight:800;background:var(--ok);color:#fff;border:none;cursor:pointer;min-height:44px">Yes, do it</button>
          <button onclick="confirmChatActions(false)" style="flex:1;padding:12px;font-size:14px;font-weight:700;background:var(--c2);color:var(--g1);border:none;border-left:1px solid var(--b1);cursor:pointer;min-height:44px">Cancel</button>
        </div>
      </div></div>`
    }
    const content=(m.content||'').replace(/\n/g,'<br>').replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>').replace(/`(.+?)`/g,'<code style="background:var(--c3);padding:2px 5px;border-radius:4px;font-size:12px">$1</code>')
    return`<div class="chat-msg ${cls}"><div class="chat-bubble">${content}</div></div>`
  }).join('')
  wrap.scrollTop=wrap.scrollHeight
}

async function confirmChatActions(yes){
  // remove the confirm message
  _chatMsgs=_chatMsgs.filter(m=>m.content!=='_confirm_')
  if(!yes){
    window._pendingActions=null
    _chatMsgs.push({role:'assistant',content:'Cancelled.'})
    renderChat()
    return
  }
  const actions=window._pendingActions||[]
  window._pendingActions=null
  for(const act of actions){
    await execChatAction(act)
  }
  renderChat()
}

RATE CARD (current versioned rates): ${(D.currentRates||[]).map(r=>r.key+'=$'+((+r.price).toFixed(2))).join(', ')||Object.entries(D.rc||{}).map(([k,v])=>`${k}=$${v}`).join(', ')}

CONTACTS: ${(D.contactLinks||[]).slice(0,30).map(cl=>{const c=cl.contact;if(!c)return null;const eName=cl.entity_type==='location'?(D.locs.find(l=>l.id===cl.entity_id)?.name||'?'):(D.bas.find(b=>b.id===cl.entity_id)?.name||'?');return c.name+(c.role?' ('+c.role+')':'')+' at '+eName+(c.email?' <'+c.email+'>':'')}).filter(Boolean).join('; ')||'None'}

SCHEDULING — CALENDAR EVENTS (hard blocks — NEVER schedule jobs over these):
${(()=>{const todayStart=new Date(t+'T00:00:00'),weekEnd=new Date(new Date(todayStart).setDate(todayStart.getDate()+7));const wk=expandRecurring(D.calEvents||[],todayStart,weekEnd).filter(e=>e.event_type!=='job');return wk.map(e=>{const d=new Date(e.start_time);const day=d.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'});const st2=d.getHours().toString().padStart(2,'0')+':'+d.getMinutes().toString().padStart(2,'0');const et=new Date(e.end_time);const et2=et.getHours().toString().padStart(2,'0')+':'+et.getMinutes().toString().padStart(2,'0');return day+' '+st2+'-'+et2+' '+e.title+' ['+e.event_type+']'}).join('; ')||'None this week'})()}

AVAILABLE SLOTS TODAY: ${getAvailableSlots(t).map(s=>s.start+'-'+s.end).join(', ')||'No open slots'}

Base location: Euless, TX. Buffer 30 min between jobs for travel. Frisco/McKinney are 45+ min from Euless.
When scheduling, check calendar events for that date first. Never double-book over William or personal events.

AVAILABLE JOBS POOL (scheduled but not completed — available for routing):
${D.jobs.filter(j=>j.status==='scheduled').slice(0,50).map(j=>{const l=j.location||{};return l.name+' ('+(l.city||'?')+') '+j.scheduled_date+' '+(j.scheduled_time||'')+' [id:'+j.id+']'}).join('; ')}

When analyzing photos of extinguisher tags or suppression system tags, check dates and determine if service is due. If due, suggest creating a job using the suggest_job action type. Don't ask multiple questions — just propose the job and let Jon tap Yes or No.

TO TAKE AN ACTION, include a JSON block in your response wrapped in \`\`\`action tags:
\`\`\`action
{"type":"...", ...params}
\`\`\`

AVAILABLE ACTIONS:
- {"type":"add_client","name":"...","address":"...","city":"...","state":"TX","zip":"...","phone":"...","email":"...","contact":"..."} — creates a new client/location
- {"type":"schedule_job","location_id":"...","date":"YYYY-MM-DD","time":"HH:MM","scope":["extinguishers","suppression"],"notes":"..."} — schedules a job
- {"type":"add_todo","text":"..."} — adds to the to-do list
- {"type":"mark_paid","invoice_id":"...","method":"check|cash|card","note":"..."} — marks invoice paid
- {"type":"lookup_client","name":"..."} — returns full client details with equipment
- {"type":"lookup_invoice","invoice_number":"..."} — returns invoice details
- {"type":"open_screen","screen":"dashboard|jobs|clients|money|techs|reports"} — navigates to a screen
- {"type":"open_client","location_id":"..."} — opens a specific client
- {"type":"open_job","job_id":"..."} — opens a specific job
- {"type":"delete_job","job_id":"..."} — deletes a job (with confirmation)
- {"type":"add_extinguisher","location_id":"...","type":"ABC Dry Chemical","size":"5lb","location_in_building":"..."} — adds extinguisher to location
- {"type":"add_suppression","location_id":"...","system_type":"...","category":"standard","tank_count":1,"nozzle_count":0,"fusible_link_count":0} — adds suppression system
- {"type":"send_sms","to":"phone","body":"message"} — sends a text message
- {"type":"toast","message":"..."} — shows a notification
- {"type":"build_route","date":"YYYY-MM-DD","anchor_time":"HH:MM","anchor_location":"city","anchor_type":"arrive_by|depart_after","job_ids":["id1","id2"]} — builds optimized route for the given day, optionally anchored to a time/place constraint. If job_ids provided, uses those. If empty, AI picks best jobs from pool.
- {"type":"modify_route","add_job_ids":["id"],"remove_job_ids":["id"]} — adds or removes jobs from current active route
- {"type":"suggest_job","location_id":"...","reason":"..."} — AI detected equipment is due for service from a photo, suggests creating a job with single-tap confirmation
- {"type":"add_contact","name":"...","role":"Owner|Manager|Accounting|On-Site|Other","phone":"...","email":"...","location_id":"..."} — adds a contact to a location

IMPORTANT RULES:
1. ALWAYS describe what you're about to do BEFORE the action block. Example: "I'll add Dave's Hot Chicken as a new client in McKinney, TX." then the action block.
2. You can chain multiple actions in one response.
3. The user will see Yes/No buttons to confirm before anything executes.
4. Be concise. If you need more info to complete the request, ask — don't guess.
5. When looking up data, use lookup actions — don't just recite from the context above, because it may be truncated.`

  // build messages for API — keep last 10 exchanges for context
  const apiMsgs=[{role:'user',content:ctx},..._chatMsgs.slice(-20).map(m=>({role:m.role==='user'?'user':'assistant',content:m.content}))]
  // remove the system context from being shown — it's the first message
  apiMsgs[0]={role:'user',content:ctx+'\n\nUser question: '+msg}
  // simplify: just send the system context + conversation
  const sendMsgs=_chatMsgs.slice(-20).map(m=>({role:m.role==='user'?'user':'assistant',content:m.content}))
  // prepend system as first user message
  sendMsgs[0]={role:'user',content:ctx+'\n\n'+sendMsgs[0].content}

  try{
    const res=await fetch('/api/claude',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        model:'claude-sonnet-4-6',
        max_tokens:1500,
        system:'You are an action-taking assistant for a fire suppression field service app. Execute requests by returning action JSON blocks. Be concise.',
        messages:sendMsgs
      })
    })
    const data=await res.json()
    const reply=data.content?.[0]?.text||'Sorry, I couldn\'t process that. Try again.'
    // extract and execute action blocks
    const actionMatch=reply.match(/```action\s*([\s\S]*?)```/g)
    const cleanReply=reply.replace(/```action\s*[\s\S]*?```/g,'').trim()
    if(cleanReply)_chatMsgs.push({role:'assistant',content:cleanReply})
    if(actionMatch){
      const actions=[]
      for(const block of actionMatch){
        const json=block.replace(/```action\s*/,'').replace(/```/,'').trim()
        try{actions.push(JSON.parse(json))}catch(e){console.error('action parse:',e)}
      }
      if(actions.length){
        // split into lookups (execute immediately) and writes (need confirmation)
        const readTypes=['lookup_client','lookup_invoice','open_screen','open_client','open_job','toast']
        const reads=actions.filter(a=>readTypes.includes(a.type))
        const writes=actions.filter(a=>!readTypes.includes(a.type))
        // execute reads immediately
        for(const act of reads)await execChatAction(act)
        // queue writes for confirmation
        if(writes.length){
          window._pendingActions=writes
          _chatMsgs.push({role:'assistant',content:'_confirm_'})
        }
      }
    }
    if(!cleanReply&&!actionMatch)_chatMsgs.push({role:'assistant',content:'Done.'})
  }catch(e){
    console.error('chat error:',e)
    _chatMsgs.push({role:'assistant',content:'Connection error — check your internet and try again.'})
  }

  renderChat()
  if(btn)btn.disabled=false
}

async function execChatAction(act){
  const t=act.type
  try{
    if(t==='add_client'){
      const{data,error}=await SB.from('locations').insert({
        name:act.name,address:act.address||null,city:act.city||null,state:act.state||'TX',
        zip:act.zip||null,contact_name:act.contact||null,contact_phone:act.phone||null,
        contact_email:act.email||null
      }).select().single()
      if(error)throw error
      await load()
      audit('created','location',null,'ai_chat',{name:act.name},'AI added client: '+act.name)
      _chatMsgs.push({role:'assistant',content:`✓ Added client: **${act.name}**`})
    }
    else if(t==='schedule_job'){
      const{data:newJ2,error}=await SB.from('jobs').insert({
        location_id:act.location_id,scheduled_date:act.date,scheduled_time:act.time||'09:00',
        scope:act.scope||['extinguishers','suppression'],status:'scheduled',notes:act.notes||null,
        assigned_to:act.assigned_to||null
      }).select().single()
      if(error)throw error
      if(newJ2?.id)try{await syncJobToCalendar(newJ2.id,act.location_id,act.date,act.time||'09:00')}catch(e){}
      await load();rJobs();rJobs()
      const loc=D.locs.find(l=>l.id===act.location_id)
      if(newJ2)audit('created','job',newJ2.id,'ai_chat',{date:act.date,time:act.time},'AI scheduled job: '+(loc?.name||'?')+' on '+act.date)
      _chatMsgs.push({role:'assistant',content:`✓ Job scheduled: **${loc?.name||''}** on ${act.date} at ${act.time||'09:00'}`})
    }
    else if(t==='add_todo'){
      await SB.from('todos').insert({text:act.text,done:false})
      await load();rJobs()
      _chatMsgs.push({role:'assistant',content:`✓ Added to to-do: "${act.text}"`})
    }
    else if(t==='mark_paid'){
      await SB.from('invoices').update({status:'paid',payment_method:act.method||'cash',payment_note:act.note||null,paid_at:new Date().toISOString()}).eq('id',act.invoice_id)
      await load()
      audit('paid','invoice',act.invoice_id,'ai_chat',{method:act.method},'AI marked invoice paid')
      _chatMsgs.push({role:'assistant',content:`✓ Invoice marked as paid (${act.method||'cash'})`})
    }
    else if(t==='lookup_client'){
      const match=D.locs.find(l=>l.name.toLowerCase().includes((act.name||'').toLowerCase()))
      if(match){
        const jobs2=D.jobs.filter(j=>j.location_id===match.id)
        const invs2=D.invs.filter(i=>i.location_id===match.id)
        const owed=invs2.filter(i=>!['paid','void','record'].includes(i.status)).reduce((s,i)=>s+(+i.total||0),0)
        _chatMsgs.push({role:'assistant',content:`**${match.name}**\n${[match.address,match.city].filter(Boolean).join(', ')}\n${match.contact_name||''} ${match.contact_phone||''}\n${match.extinguishers?.length||0} extinguishers · ${match.suppression_systems?.length||0} systems\n${jobs2.length} jobs · ${invs2.length} invoices · ${owed?'$'+owed+' owed':'Paid up'}`})
      }else{_chatMsgs.push({role:'assistant',content:`No client found matching "${act.name}"`})}
    }
    else if(t==='lookup_invoice'){
      const inv=D.invs.find(i=>(i.invoice_number||'').toLowerCase().includes((act.invoice_number||'').toLowerCase()))
      if(inv){
        const loc=D.locs.find(l=>l.id===inv.location_id)
        _chatMsgs.push({role:'assistant',content:`**${inv.invoice_number}** — ${loc?.name||'?'}\nStatus: ${inv.status} · $${(+inv.total).toFixed(2)}\nDate: ${inv.date}${inv.paid_at?' · Paid '+inv.paid_at.split('T')[0]:''}`})
      }else{_chatMsgs.push({role:'assistant',content:`No invoice found matching "${act.invoice_number}"`})}
    }
    else if(t==='open_screen'){
      closeChat()
      const map={dashboard:'vJobs',jobs:'vJobs',clients:'vCust',money:'vMoney',techs:'vTechs'}
      const v=map[act.screen]
      if(v){const btn2=document.querySelector(`[data-v="${v}"]`);if(btn2)go(btn2)}
      if(act.screen==='reports')openReports()
    }
    else if(t==='open_client'){closeChat();openCust(act.location_id)}
    else if(t==='open_job'){closeChat();openJob(act.job_id)}
    else if(t==='delete_job'){
      if(confirm('Delete this job?')){
        await SB.from('jobs').delete().eq('id',act.job_id)
        await load();rJobs();rJobs()
        audit('deleted','job',act.job_id,'ai_chat',null,'AI deleted job')
        _chatMsgs.push({role:'assistant',content:'✓ Job deleted'})
      }else{_chatMsgs.push({role:'assistant',content:'Cancelled.'})}
    }
    else if(t==='add_extinguisher'){
      await SB.from('extinguishers').insert({location_id:act.location_id,type:act.type||'ABC Dry Chemical',size:act.size||null,location_in_building:act.location_in_building||null})
      await load()
      _chatMsgs.push({role:'assistant',content:`✓ Added ${act.type||'extinguisher'} ${act.size||''} to location`})
    }
    else if(t==='add_suppression'){
      await SB.from('suppression_systems').insert({location_id:act.location_id,system_type:act.system_type,category:act.category||'standard',tank_count:act.tank_count||1,nozzle_count:act.nozzle_count||0,fusible_link_count:act.fusible_link_count||0})
      await load()
      _chatMsgs.push({role:'assistant',content:`✓ Added ${act.system_type} to location`})
    }
    else if(t==='send_sms'){
      try{
        await fetch('/api/send-sms',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({to:act.to,body:act.body})})
        _chatMsgs.push({role:'assistant',content:`✓ Text sent to ${act.to}`})
      }catch(e){
        console.error('sms error:',e)
        _chatMsgs.push({role:'assistant',content:`⚠️ SMS failed: ${e.message}`})
      }
    }
    else if(t==='build_route'){
      const date=act.date||td()
      const pool = act.job_ids?.length ? D.jobs.filter(j=>act.job_ids.includes(j.id)) : D.jobs.filter(j=>j.status==='scheduled'&&j.scheduled_date<=date)
      if(!pool.length){_chatMsgs.push({role:'assistant',content:'No jobs available to route.'});return}
      const routed=await routeJobs(pool)
      window._activeRoute=routed
      const totalDist=routed.reduce((s,r)=>s+r.dist,0)
      let summary='**Route built: '+routed.length+' stops · ~'+Math.round(totalDist)+' miles**\n'
      routed.forEach((r,i)=>{const l=r.job.location||{};summary+=(i+1)+'. '+(l.name||'?')+' ('+(l.city||'?')+') — '+Math.round(r.dist)+' mi\n'})
      summary+='\nSay "open route" to see the full route view, or tell me to add/remove stops.'
      _chatMsgs.push({role:'assistant',content:summary})
      closeChat();openRouteView()
    }
    else if(t==='modify_route'){
      const current=window._activeRoute?.map(r=>r.job.id)||[]
      const adds=act.add_job_ids||[]
      const removes=act.remove_job_ids||[]
      const newIds=[...current.filter(id=>!removes.includes(id)),...adds]
      const pool=D.jobs.filter(j=>newIds.includes(j.id))
      if(!pool.length){_chatMsgs.push({role:'assistant',content:'No jobs left in route.'});return}
      const routed=await routeJobs(pool)
      window._activeRoute=routed
      _chatMsgs.push({role:'assistant',content:'Route updated: '+routed.length+' stops'})
      closeChat();openRouteView()
    }
    else if(t==='suggest_job'){
      const loc=D.locs.find(l=>l.id===act.location_id)
      const name=loc?.name||'this location'
      _chatMsgs.push({role:'assistant',content:'**Service suggested for '+name+'**\nReason: '+(act.reason||'Equipment may be due for service')+'\n\nSay "yes, schedule it" to create the job, or "no" to skip.'})
    }
    else if(t==='add_contact'){
      const{data:newCt}=await SB.from('contacts').insert({name:act.name,role:act.role||null,phone:act.phone||null,email:act.email||null,is_primary:false}).select().single()
      if(newCt&&act.location_id)await SB.from('contact_links').insert({contact_id:newCt.id,entity_type:'location',entity_id:act.location_id,relationship:act.role||'contact'})
      await load()
      if(newCt)audit('created','contact',newCt.id,'ai_chat',{name:act.name,role:act.role},'AI added contact: '+act.name)
      _chatMsgs.push({role:'assistant',content:`✓ Added contact: **${act.name}**${act.role?' ('+act.role+')':''}${act.location_id?' to '+(D.locs.find(l=>l.id===act.location_id)?.name||'location'):''}`})
    }
    else if(t==='toast'){toast(act.message)}
  }catch(e){
    console.error('action exec:',e)
    _chatMsgs.push({role:'assistant',content:`Error: ${e.message||'Action failed'}`})
  }
}

// STARTUP
function startApp(){
  load().then(()=>{
    // hide loading overlay
    const lo=document.getElementById('app-loading');if(lo)lo.style.display='none'
    rCal()
    updateNotifBadge()
    generateNotifications()
    setInterval(()=>{generateNotifications()},30*60*1000)
    if(!D.locs.length&&!D.jobs.length){
      setTimeout(()=>load().then(rCal),1200)
    }
  }).catch(err=>{
    const lo=document.getElementById('app-loading');if(lo)lo.style.display='none'
    document.getElementById('calC').innerHTML='<div style="padding:24px;color:#ef4444;font-size:13px;font-weight:600">Load error: '+err.message+'</div>'
    console.error('Startup load error:',err)
  })
}
// auto-start if already authenticated
if(_unlocked)startApp()
