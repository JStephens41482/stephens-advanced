function addPartLine(sel){
  const v=sel.value;if(!v)return
  if(sel.value!==undefined&&'value' in sel&&sel.tagName)sel.value='' // reset dropdown if it's a real element
  if(v==='CUSTOM'){
    jobLines.push({desc:'',qty:1,price:0,id:'jl'+Date.now()})
    renderJobLines()
    // focus last description field
    setTimeout(()=>{const inputs=$('wo-lines')?.querySelectorAll('input[placeholder="Description"]');if(inputs?.length)inputs[inputs.length-1].focus()},50)
    return
  }
  const parts=v.split('|')
  const desc=parts[0]||'',qty=parseFloat(parts[1])||1,price=parseFloat(parts[2])||0
  // fuzzy match — normalize to catch "Ansul LT-10" vs "ansul lt10" etc.
  const nd=norm(desc)
  const existing=jobLines.find(l2=>norm(l2.desc)===nd)
  if(existing){existing.qty=(+existing.qty||1)+1;renderJobLines();updateJobChecklist();return}
  jobLines.push({desc,qty,price,id:'jl'+Date.now()})
  renderJobLines()
  updateJobChecklist()
}

async function compJ(id){
  setLoad('compBtn',true)
  const j=D.jobs.find(x=>x.id===id);if(!j)return
  const l=D.locs.find(x=>x.id===(j.location_id||j.location?.id))||j.location||{}
  const sc=j.scope||[]

  // read lines from jobLines state
  const lines=jobLines.filter(l2=>(l2.desc||'').trim()).map(l2=>({
    description:l2.desc.trim(),
    quantity:+(l2.qty)||1,
    unit_price:+(l2.price)||0,
    total:(+(l2.qty)||1)*(+(l2.price)||0)
  }))
  if(!lines.length){toast('Add at least one line item before completing the job',false);setLoad('compBtn',false,'✓ Complete Job — Generate Invoice');const wo=$('wo-lines');if(wo){wo.style.transition='transform .15s';wo.style.transform='translateX(-6px)';setTimeout(()=>{wo.style.transform='translateX(6px)';setTimeout(()=>wo.style.transform='',150)},150)}return}
  const workOrderTotal=lines.reduce((s,l2)=>s+(+l2.total||0),0)
  if(workOrderTotal<=0){toast('Work order total is $0 — check your line item prices',false);setLoad('compBtn',false,'✓ Complete Job — Generate Invoice');return}

  // auto-add travel charge if over 50 miles
  const travel=await calcTravelCharge(l)
  if(travel.charge>0){
    lines.push({description:travel.desc,quantity:1,unit_price:travel.charge,total:travel.charge})
  }

  // Apply pricing rules
  const subBeforeRules=lines.reduce((s,l2)=>s+l2.total,0)
  const ppRule=getPricingRule('prompt_pay_discount')
  const factRule=getPricingRule('factoring_surcharge')
  // Prompt-pay discount: check if payment is being collected at time of service
  const payingNow=$('pay-at-service')?.checked
  if(ppRule&&payingNow){
    const discAmt=Math.round(subBeforeRules*ppRule.percentage/100*100)/100
    lines.push({description:`Prompt Pay Discount (${ppRule.percentage}%)`,quantity:1,unit_price:-discAmt,total:-discAmt})
  }

  const sub=lines.reduce((s,l2)=>s+l2.total,0)
  const notes=($('job-notes')?.value||jobNotes||'').trim()
  const sig=$('sigC')?.toDataURL()||null

  const invNum='INV-'+Date.now().toString().slice(-6)
  const{data:inv,error}=await SB.from('invoices').insert({
    job_id:id,location_id:l.id,billing_account_id:l.billing_account_id,
    invoice_number:invNum,subtotal:subBeforeRules,total:sub,status:'draft',date:td(),
    notes:notes||null
  }).select().single()
  if(error){toast('Error generating invoice',false);setLoad('compBtn',false,'✓ Complete Job — Generate Invoice');return}
  if(inv)audit('created','invoice',inv.id,'jon',{invoice_number:invNum,total:sub},'Invoice '+invNum+' created for '+(l.name||'?'))

  if(inv&&lines.length)await SB.from('invoice_lines').insert(lines.map((ln,i2)=>({invoice_id:inv.id,...ln,sort_order:i2})))

  // save any custom items for future reuse
  for(const ln of lines){if(!(ln.description||'').startsWith('Travel —'))await saveCustomItem(ln.description,ln.unit_price)}

  const jobUpd={status:'completed',completed_at:new Date().toISOString(),notes:notes||null}
  if(sig)jobUpd.signature_data=sig // only overwrite if sig exists (suppression report may have already saved owner sig)
  await SB.from('jobs').update(jobUpd).eq('id',id)
  audit('completed','job',id,'jon',{status:'completed'},'Job completed for '+(l.name||'?'))
  // mark calendar event as completed (gray)
  try{await SB.from('calendar_events').update({color:'#9ca3af'}).eq('job_id',id)}catch(e){}

  // save extinguisher results
  for(const[eid,st] of Object.entries(extR)){
    try{await SB.from('extinguisher_results').insert({job_id:id,extinguisher_id:eid,status:st})}catch(e){}
  }

  // auto-reschedule: if location has any suppression system, create follow-up job ~5.5 months out
  if(sc.includes('suppression')&&l.suppression_systems&&l.suppression_systems.length){
    const nextDate=new Date()
    nextDate.setMonth(nextDate.getMonth()+5)
    nextDate.setDate(nextDate.getDate()+Math.floor(Math.random()*31)) // 5–6 months window
    const nds=nextDate.toISOString().split('T')[0]
    try{
      await SB.from('jobs').insert({location_id:l.id,billing_account_id:l.billing_account_id||null,type:j.type||'inspection',scope:sc,scheduled_date:nds,scheduled_time:j.scheduled_time||'09:00',status:'scheduled',notes:'Auto-scheduled follow-up (semi-annual suppression)'})
      toast('Follow-up scheduled for '+new Date(nds+'T12:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}))
    }catch(e){console.error('auto-reschedule:',e)}
  }

  // auto-add to Brycer queue if Fort Worth jurisdiction
  if(l.is_brycer_jurisdiction){
    const sysTypes=(l.suppression_systems||[]).map(s=>s.system_type).filter(Boolean).join(', ')||'Suppression System'
    try{
      await SB.from('brycer_queue').insert({job_id:id,location_id:l.id,location_name:l.name||'',system_type:sysTypes,job_date:td(),report_generated:false,submitted:false})
    }catch(e){console.error('brycer queue:',e)}
  }

  await load()
  pop()
  showInv({num:inv?.invoice_number||'—',nm:l.name||'',addr:[l.address,l.city].filter(Boolean).join(', '),lines,total:sub,ro:false,iid:inv?.id,locId:l.id,jobId:id,scope:j.scope||[],syss:l.suppression_systems||[]})

  // AUTO-SEND DISABLED — nothing sends without explicit user tap on Send button
}

let sigCtx=null,sigOn=false
function initSig(){
  const c=$('sigC');if(!c)return
  const r=c.parentElement.getBoundingClientRect();c.width=r.width;c.height=r.height
  sigCtx=c.getContext('2d');sigCtx.strokeStyle='#222';sigCtx.lineWidth=2.5;sigCtx.lineCap='round';sigCtx.lineJoin='round'
  const sp=e=>{e.preventDefault();sigOn=true;if($('sigPh'))$('sigPh').style.display='none';const p=gp(e);sigCtx.beginPath();sigCtx.moveTo(p.x,p.y)}
  const sm=e=>{if(!sigOn)return;e.preventDefault();const p=gp(e);sigCtx.lineTo(p.x,p.y);sigCtx.stroke()}
  const se=()=>{sigOn=false}
  c.addEventListener('touchstart',sp,{passive:false});c.addEventListener('touchmove',sm,{passive:false});c.addEventListener('touchend',se)
  c.addEventListener('mousedown',sp);c.addEventListener('mousemove',sm);c.addEventListener('mouseup',se)
}
function gp(e){const c=$('sigC'),r=c.getBoundingClientRect(),t=e.touches?e.touches[0]:e;return{x:t.clientX-r.left,y:t.clientY-r.top}}
function clrSig(){if(sigCtx){const c=$('sigC');sigCtx.clearRect(0,0,c.width,c.height)}if($('sigPh'))$('sigPh').style.display=''}

async function linkToClient(locId,targetLocId){
  const target=D.locs.find(x=>x.id===targetLocId)
  if(!target)return
  let baId=target.billing_account_id
  // if target doesn't have a billing account, create one
  if(!baId){
    const{data:ba}=await SB.from('billing_accounts').insert({
      name:target.name,contact_name:target.contact_name||null,
      phone:target.contact_phone||null,email:target.contact_email||null
    }).select().single()
    if(ba){
      baId=ba.id
      await SB.from('locations').update({billing_account_id:ba.id}).eq('id',targetLocId)
    }
  }
  if(baId){
    await SB.from('locations').update({billing_account_id:baId}).eq('id',locId)
    await load();toast('Locations linked')
    pop();pop();openCust(locId)
  }
}

async function saveSiblingLocation(origLocId,baId){
  const name=$('sib-name')?.value?.trim()
  if(!name){toast('Enter location name',false);return}
  const city=$('sib-city')?.value?.trim()||''
  // if no billing account yet, create one from the original location
  let finalBaId=baId
  if(!finalBaId){
    const origLoc=D.locs.find(x=>x.id===origLocId)
    const{data:ba}=await SB.from('billing_accounts').insert({
      name:origLoc?.name||name,contact_name:origLoc?.contact_name||null,
      phone:origLoc?.contact_phone||null,email:origLoc?.contact_email||null
    }).select().single()
    if(ba){
      finalBaId=ba.id
      await SB.from('locations').update({billing_account_id:ba.id}).eq('id',origLocId)
    }
  }
  const{data:newLoc,error}=await SB.from('locations').insert({
    name,address:$('sib-addr')?.value?.trim()||null,city:city,
    state:$('sib-state')?.value?.trim()||'TX',zip:$('sib-zip')?.value?.trim()||null,
    contact_name:$('sib-contact')?.value?.trim()||null,
    contact_phone:$('sib-phone')?.value?.trim()||null,
    contact_email:$('sib-email')?.value?.trim()||null,
    billing_account_id:finalBaId||null,
    is_brycer_jurisdiction:_isBrycerCity(city),
    brycer_ahj_name:_isBrycerCity(city)?(city||'').trim()+' Fire Department':null
  }).select().single()
  if(error){toast('Error: '+error.message,false);return}
  await load();toast('Location added')
  pop();pop();if(newLoc)openCust(newLoc.id)
}

async function saveContact(locId){
  const name=$('ctName')?.value?.trim()
  if(!name){toast('Name is required',false);return}
  const role=$('ctRole')?.value||null
  const phone=$('ctPhone')?.value?.trim()||null
  const email=$('ctEmail')?.value?.trim()||null
  const isPrimary=$('ctPrimary')?.checked||false
  setLoad('saveCtBtn',true)
  const{data:contact,error}=await SB.from('contacts').insert({name,role,phone,email,is_primary:isPrimary}).select().single()
  if(error){toast('Error saving contact',false);setLoad('saveCtBtn',false,'Save Contact');return}
  await SB.from('contact_links').insert({contact_id:contact.id,entity_type:'location',entity_id:locId,relationship:role||'contact'})
  // if marked primary, unmark others
  if(isPrimary){
    const others=contactsForEntity('location',locId).filter(c=>c.id!==contact.id&&c.is_primary)
    for(const o of others)await SB.from('contacts').update({is_primary:false}).eq('id',o.id)
  }
  await load()
  setLoad('saveCtBtn',false,'Save Contact')
  audit('created','contact',contact.id,'jon',{name,role},'Contact added: '+name)
  pop()
  toast('Contact added')
  openCust(locId)
}

  let h=''
  if(locked){
    // read-only view with columns
    h+=`<div style="display:flex;gap:4px;padding:0 0 4px;margin-bottom:4px;border-bottom:1px solid var(--b1)">
      <div style="width:36px;font-size:8px;font-weight:800;color:var(--g2);text-transform:uppercase">Qty</div>
      <div style="flex:2;font-size:8px;font-weight:800;color:var(--g2);text-transform:uppercase">Description</div>
      <div style="width:60px;font-size:8px;font-weight:800;color:var(--g2);text-transform:uppercase">Unit $</div>
      <div style="width:65px;font-size:8px;font-weight:800;color:var(--g2);text-transform:uppercase;text-align:right">Total</div>
    </div>`
    h+=invLines.map(l2=>{
      const isTravel=(l2.desc||'').startsWith('Travel —')
      return`<div style="display:flex;gap:4px;align-items:center;padding:4px 0;border-bottom:1px solid var(--b1)">
        <div style="width:36px;font-size:12px;color:var(--w2);text-align:center">${l2.qty}</div>
        <div style="flex:2;font-size:12px;color:${isTravel?'var(--warn)':'var(--w2)'}">${isTravel?'🚗 ':''}${esc(l2.desc)}</div>
        <div style="width:60px;font-size:11px;color:var(--g1);font-variant-numeric:tabular-nums">$${(+(l2.price||0)).toFixed(2)}</div>
        <div style="width:65px;text-align:right;font-size:12px;font-weight:700;color:var(--ok);font-variant-numeric:tabular-nums">${fmtD(l2.qty*l2.price)}</div>
      </div>`

  }else{
    // editable view with columns
    h+=`<div style="display:flex;gap:4px;padding:0 0 4px;margin-bottom:4px;border-bottom:1px solid var(--b1)">
      <div style="width:44px;font-size:8px;font-weight:800;color:var(--g2);text-transform:uppercase">Qty</div>
      <div style="flex:2;font-size:8px;font-weight:800;color:var(--g2);text-transform:uppercase">Description</div>
      <div style="width:70px;font-size:8px;font-weight:800;color:var(--g2);text-transform:uppercase">Unit $</div>
      <div style="width:70px;font-size:8px;font-weight:800;color:var(--g2);text-transform:uppercase;text-align:right">Total</div>
      <div style="width:28px"></div>
    </div>`
    h+=invLines.map((l2,i)=>{
      const isTravel=(l2.desc||'').startsWith('Travel —')
      const lineTotal=((+(l2.qty||1))*(+(l2.price||0))).toFixed(2)
      return`<div class="li-row" data-ili="${i}" style="display:flex;gap:4px;align-items:center;margin-bottom:4px${isTravel?';border-left:3px solid var(--warn);padding-left:8px':''}">
        <input class="li-qty" type="number" value="${l2.qty||1}" min="0.5" step="0.5" oninput="ilEdit(${i},'qty',this.value)" style="width:44px;text-align:center">
        <input placeholder="Description" value="${esc(l2.desc||'')}" oninput="ilEdit(${i},'desc',this.value)" style="flex:2${isTravel?';color:var(--warn)':''}">
        <input class="li-price" type="number" value="${+(l2.price||0)}" step="0.01" oninput="ilEdit(${i},'price',this.value)" style="width:70px">
        <div style="width:70px;text-align:right;font-size:12px;font-weight:700;color:var(--ok);font-variant-numeric:tabular-nums" id="il-total-${i}">$${lineTotal}</div>

function ilEdit(i,field,val){
  if(!invLines[i])return
  if(field==='desc')invLines[i].desc=val
  else if(field==='qty')invLines[i].qty=parseFloat(val)||1
  else if(field==='price')invLines[i].price=parseFloat(val)||0
  // update line total
  const lt=$('il-total-'+i);if(lt)lt.textContent='$'+((+(invLines[i].qty||1))*(+(invLines[i].price||0))).toFixed(2)
  // update totals
  const t=invLines.reduce((s,l2)=>s+(+(l2.qty||1))*(+(l2.price||0)),0)
  const el=$('inv-lines-total');if(el)el.textContent=fmtD(t)
  const el2=$('inv-det-total-sm');if(el2)el2.textContent=fmtD(t)
  const el3=$('inv-det-total');if(el3)el3.textContent=fmtD(t)
}

function ilDel(i){
  invLines.splice(i,1)
  renderInvLines(false)
}

function addInvLine(sel,invId){
  const v=sel.value;if(!v)return
  if(sel.tagName)sel.value=''
  if(v==='CUSTOM'){
    invLines.push({desc:'',qty:1,price:0})
    renderInvLines(false)
    setTimeout(()=>{const inputs=$('inv-det-lines')?.querySelectorAll('input[placeholder="Description"]');if(inputs?.length)inputs[inputs.length-1].focus()},50)
    return
  }
  const parts=v.split('|')
  const desc=parts[0]||'',qty=parseFloat(parts[1])||1,price=parseFloat(parts[2])||0
  const nd=norm(desc)
  const existing=invLines.find(l2=>norm(l2.desc)===nd)
  if(existing){existing.qty=(+existing.qty||1)+1;renderInvLines(false);return}
  invLines.push({desc,qty,price})
  renderInvLines(false)
}

async function saveInvLines(invId){
  const btn=$('inv-save-lines-btn');if(btn){btn.textContent='Saving...';btn.disabled=true}
  const lines=invLines.filter(l2=>(l2.desc||'').trim())
  const newTotal=lines.reduce((s,l2)=>s+(+(l2.qty||1))*(+(l2.price||0)),0)
  try{
    // delete existing lines and reinsert
    await SB.from('invoice_lines').delete().eq('invoice_id',invId)
    if(lines.length)await SB.from('invoice_lines').insert(lines.map((l2,i)=>({
      invoice_id:invId,
      description:l2.desc.trim(),
      quantity:+(l2.qty)||1,
      unit_price:+(l2.price)||0,
      total:(+(l2.qty)||1)*(+(l2.price)||0),
      sort_order:i
    })))
    await SB.from('invoices').update({total:newTotal,subtotal:newTotal}).eq('id',invId)
    // save any custom items for future reuse
    for(const l2 of lines)await saveCustomItem(l2.desc.trim(),+(l2.price)||0)
    await load()
    toast('Invoice updated ✓')
    const el=$('inv-det-total');if(el)el.textContent=fmtD(newTotal)
  }catch(e){toast('Save failed',false);console.error(e)}
  if(btn){btn.textContent='💾 Save Changes';btn.disabled=false}
}

async function chargeCardOnFile(invId){
  const inv=D.invs.find(i=>i.id===invId)||{}
  const loc=D.locs.find(l=>l.id===inv.location_id)||{}
  const total=+(inv.total)||0
  if(!total){toast('No amount',false);return}

  toast('Checking card on file...')

  // find or create Square customer
  try{
    const custRes=await fetch('/api/square',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({action:'create_or_find',name:loc.contact_name||loc.name,email:loc.contact_email||'',phone:loc.contact_phone||'',locationId:loc.id})
    })
    const custData=await custRes.json()
    if(!custData.success){toast('Could not find customer',false);return}

    // save square_customer_id to location
    if(custData.customerId&&!loc.square_customer_id){
      await SB.from('locations').update({square_customer_id:custData.customerId}).eq('id',loc.id)
    }

    if(custData.cards?.length){
      // has a card on file — charge it
      const card=custData.cards[0]
      const last4=card.last_4||'****'
      const brand=card.card_brand||'Card'
      if(!confirm(`Charge ${brand} ending in ${last4} for $${total.toFixed(2)}?`))return

      toast('Charging card...')
      const chargeRes=await fetch('/api/square',{method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({action:'charge_card',customerId:custData.customerId,cardId:card.id,amount:total,invoiceId:invId,invoiceNumber:inv.invoice_number})
      })
      const chargeData=await chargeRes.json()
      if(chargeData.success){
        await load()
        toast('Charged $'+total.toFixed(2)+' ✓')
        pop();openInvDetail(invId)
      }else{
        toast('Charge failed: '+(chargeData.error||'Unknown error'),false)
      }
    }else{
      // no card on file — send checkout link that saves card
      toast('No card on file — creating payment link...')
      const linkRes=await fetch('/api/square',{method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({action:'checkout_and_save_card',customerId:custData.customerId,amount:total,invoiceNumber:inv.invoice_number,customerName:loc.name,invoiceId:invId,email:loc.contact_email})
      })
      const linkData=await linkRes.json()
      if(linkData.success&&linkData.paymentLink){
        toast('Payment link sent — card will be saved for next time')
        window.open(linkData.paymentLink)
      }else{
        toast('Could not create payment link',false)
      }
    }
  }catch(e){console.error('card on file:',e);toast('Error: '+e.message,false)}
}

function collectPayment(id,method){
  if(method==='undecided'){
    toast('Invoice left unpaid')
    pop();openInvDetail(id)
    return
  }
  if(method==='check'){
    const num=prompt('Enter check number:')
    if(!num)return
    markPaid(id,'check',`Check #${num.trim()}`)
    return
  }
  if(method==='cash'){
    if(!confirm('Cash — mark as paid in full?'))return
    markPaid(id,'cash','Cash — paid in full')
    return
  }
  if(method==='card'){
    if(!confirm('Card — mark as paid in full?'))return
    markPaid(id,'card','Card — paid in full')
    return
  }
  markPaid(id,method)
}
async function markPaid(id,method,note){
  const upd={status:'paid',payment_method:method,paid_at:new Date().toISOString()}
  if(note)upd.payment_note=note
  const{error}=await SB.from('invoices').update(upd).eq('id',id)
  if(error){toast('Error',false);return}
  audit('paid','invoice',id,'jon',{method,note},'Invoice marked paid ('+method+')')
  await load();toast('Marked as paid ✓')
  pop();openInvDetail(id)
}

async function markUnpaid(id){
  if(!confirm('Mark this invoice as unpaid?'))return
  const{error}=await SB.from('invoices').update({status:'draft',payment_method:null,payment_note:null,paid_at:null}).eq('id',id)
  if(error){toast('Error',false);return}
  await load();toast('Marked as unpaid')
  pop();openInvDetail(id)
}

let mazonSigCtx=null,mazonSigOn=false
function initMazonSig(){
  const c=$('mazonSigC');if(!c)return
  const r=c.parentElement.getBoundingClientRect();c.width=r.width;c.height=r.height
  mazonSigCtx=c.getContext('2d');mazonSigCtx.strokeStyle='#222';mazonSigCtx.lineWidth=2.5;mazonSigCtx.lineCap='round';mazonSigCtx.lineJoin='round'
  const sp=e=>{e.preventDefault();mazonSigOn=true;if($('mazonSigPh'))$('mazonSigPh').style.display='none';const p=gp2(e);mazonSigCtx.beginPath();mazonSigCtx.moveTo(p.x,p.y)}
  const sm=e=>{if(!mazonSigOn)return;e.preventDefault();const p=gp2(e);mazonSigCtx.lineTo(p.x,p.y);mazonSigCtx.stroke()}
  const se=()=>{mazonSigOn=false}
  c.addEventListener('touchstart',sp,{passive:false});c.addEventListener('touchmove',sm,{passive:false});c.addEventListener('touchend',se)
  c.addEventListener('mousedown',sp);c.addEventListener('mousemove',sm);c.addEventListener('mouseup',se)
}
function gp2(e){const c=$('mazonSigC'),r=c.getBoundingClientRect(),t=e.touches?e.touches[0]:e;return{x:t.clientX-r.left,y:t.clientY-r.top}}
function clrMazonSig(){if(mazonSigCtx){const c=$('mazonSigC');mazonSigCtx.clearRect(0,0,c.width,c.height)}if($('mazonSigPh'))$('mazonSigPh').style.display=''}

async function submitMazon(invId,custName,total){
  const sig=$('mazonSigC')?.toDataURL()||null
  const name=$('mazon-name')?.value?.trim()||''
  const b=$('mazonSubmitBtn');if(b){b.innerHTML='<span class="spin"></span> Adding to queue...';b.classList.add('loading')}

  // get invoice + location for address and service date
  const inv=D.invs.find(x=>x.id===invId)||{}
  const loc=D.locs.find(x=>x.id===inv.location_id)||{}
  const addr=[loc.address,loc.city,loc.state,loc.zip].filter(Boolean).join(', ')

  // apply factoring surcharge if pricing rule exists
  const factRule2=getPricingRule('factoring_surcharge')
  let factoredTotal=+total||0
  if(factRule2){
    const surcharge=Math.round(factoredTotal*factRule2.percentage/100*100)/100
    factoredTotal+=surcharge
    // add surcharge line item to invoice
    try{
      await SB.from('invoice_lines').insert({invoice_id:invId,description:`Processing Fee (${factRule2.percentage}%)`,quantity:1,unit_price:surcharge,total:surcharge,sort_order:999})
      await SB.from('invoices').update({total:factoredTotal}).eq('id',invId)
    }catch(e){console.error('factoring surcharge:',e)}
  }

  // save to mazon_queue
  const{error:qErr}=await SB.from('mazon_queue').insert({
    invoice_id:invId,customer_name:name||custName,amount:factoredTotal,
    location_address:addr,date_of_service:inv.date||td(),
    signature_data:sig,status:'pending',invoice_number:inv.invoice_number||''
  })
  if(qErr){toast('Error queuing',false);if(b){b.innerHTML='Submit to Mazon';b.classList.remove('loading')}return}

  // mark invoice as factored (not paid yet — pending Mazon submission)
  await SB.from('invoices').update({
    status:'factored',payment_method:'mazon',
    notes:'Mazon Factoring — Client #1410. Customer: '+(name||custName)+'. In queue for submission.'
  }).eq('id',invId)

  audit('factored','invoice',invId,'jon',{amount:factoredTotal},'Invoice factored to Mazon — '+(name||custName))
  await load()
  toast('Added to Mazon queue ✓')
  popAll()
  rMoney()
  go(document.querySelector('[data-v="vMoney"]'))
}

  const pending=items.filter(x=>x.status==='pending')
  const submitted=items.filter(x=>x.status==='submitted')
  const pendingTotal=pending.reduce((s,x)=>s+(+x.amount||0),0)

  let h=`<div class="ov-hdr">
    <button class="ov-back" onclick="pop()">‹</button>
    <div class="ov-title">Mazon Queue</div>
  </div><div class="ov-body">
  <div style="background:var(--infos);border:1.5px solid var(--info);border-radius:var(--r);padding:14px;margin-bottom:16px">
    <div style="font-size:13px;font-weight:700;color:var(--info)">Client #1410 · PIN 4182</div>
    <div style="font-size:12px;color:var(--g1);margin-top:4px">Submit to schedule@mazon.com by 10 AM Friday for same-day funding</div>
  </div>`

  if(pending.length){
    h+=`<div class="sec"><div class="sec-t" style="color:var(--warn)">Pending · ${pending.length} invoices · ${fmt(pendingTotal)}</div></div>`
    pending.forEach((q,i)=>{
      h+=`<div class="ic" style="margin-bottom:8px" id="mq-${q.id}">
        <div class="ic-r1">
          <div class="ic-nm">${esc(q.customer_name)}</div>
          <span class="badge bsent">${q.invoice_number||'—'}</span>
        </div>
        <div class="ic-sub">${esc(q.location_address||'')}</div>
        <div style="display:flex;justify-content:space-between;align-items:center;margin-top:6px">
          <div style="font-size:11px;color:var(--g1)">Service: ${q.date_of_service||'—'}</div>
          <div style="display:flex;align-items:center;gap:6px">
            <span style="font-size:11px;color:var(--g1)">$</span>
            <input type="number" value="${+q.amount||0}" style="width:80px;text-align:right;font-size:15px;font-weight:800;background:var(--c2);border:1px solid var(--b1);padding:6px 8px" id="mq-amt-${q.id}" onchange="updateMazonAmt('${q.id}',this.value)">
          </div>
        </div>
        <button style="margin-top:6px;font-size:11px;color:var(--bad);background:none;padding:4px 0" onclick="removeMazonQueue('${q.id}')">Remove from queue</button>
      </div>`
    })
    h+=`<button class="btn-p" id="mazonSendBtn" style="margin-top:12px;background:var(--info)" onclick="sendMazonSchedule()">✉️ Send ${pending.length} Invoice${pending.length>1?'s':''} to Mazon — ${fmt(pendingTotal)}</button>`
  }else{
    h+=`<div class="ey" style="padding:30px"><div class="ey-t">No pending invoices in queue.<br>Add invoices via the Mazon payment option.</div></div>`
  }

  if(submitted.length){
    h+=`<div class="sec"><div class="sec-t">Submitted</div></div>`
    submitted.forEach(q=>{
      h+=`<div class="ic" style="margin-bottom:8px;opacity:.6">
        <div class="ic-r1"><div class="ic-nm">${esc(q.customer_name)}</div><span class="badge bpaid">${q.invoice_number||'—'}</span></div>
        <div style="display:flex;justify-content:space-between;margin-top:4px">
          <div class="ic-sub">${esc(q.location_address||'')}</div>
          <div style="font-size:15px;font-weight:800;color:var(--ok)">${fmt(+q.amount)}</div>
        </div>
        <div style="font-size:10px;color:var(--g2);margin-top:4px">Submitted ${q.submitted_at?new Date(q.submitted_at).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}):''}</div>
      </div>`
    })
  }

  h+=`</div>`
  push(h)
}

async function updateMazonAmt(qId,val){
  await SB.from('mazon_queue').update({amount:+val||0}).eq('id',qId)
}

async function removeMazonQueue(qId){
  if(!confirm('Remove from Mazon queue?'))return
  // get the invoice_id to un-factor it
  const{data}=await SB.from('mazon_queue').select('invoice_id').eq('id',qId).single()
  await SB.from('mazon_queue').delete().eq('id',qId)
  if(data?.invoice_id){
    await SB.from('invoices').update({status:'draft',payment_method:null,notes:null}).eq('id',data.invoice_id)
  }
  await load();pop();openMazonQueue()
}

async function sendMazonSchedule(){
  const btn=$('mazonSendBtn');if(btn){btn.innerHTML='<span class="spin"></span> Sending to Mazon...';btn.disabled=true}
  // fetch current pending
  const{data:pending}=await SB.from('mazon_queue').select('*').eq('status','pending').order('created_at')
  if(!pending?.length){toast('No pending invoices',false);if(btn){btn.textContent='Send';btn.disabled=false};return}

  const totalAmt=pending.reduce((s,x)=>s+(+x.amount||0),0)
  const today=new Date().toLocaleDateString('en-US',{month:'2-digit',day:'2-digit',year:'numeric'})

  // build Mazon schedule email
  let scheduleHtml=`<div style="font-family:Arial,sans-serif;font-size:14px;color:#222;max-width:600px">
    <p>Good morning,</p>
    <p>Please find below the schedule submission for <b>Stephens Advanced LLC</b>.</p>

        <th style="text-align:right;padding:8px;border:1px solid #ddd;font-size:12px">Amount</th>
        <th style="text-align:center;padding:8px;border:1px solid #ddd;font-size:12px">Date of Service</th>
      </tr>`
  pending.forEach(q=>{
    scheduleHtml+=`<tr>
      <td style="padding:8px;border:1px solid #ddd">${esc(q.invoice_number||'—')}</td>
      <td style="padding:8px;border:1px solid #ddd">${esc(q.customer_name)}</td>
      <td style="padding:8px;border:1px solid #ddd;font-size:12px">${esc(q.location_address||'')}</td>
      <td style="padding:8px;border:1px solid #ddd;text-align:right;font-weight:bold">${fmt(+q.amount)}</td>
      <td style="padding:8px;border:1px solid #ddd;text-align:center">${q.date_of_service||'—'}</td>
    </tr>`
  })
  scheduleHtml+=`<tr style="background:#f0f0f0;font-weight:bold">
      <td colspan="3" style="padding:8px;border:1px solid #ddd;text-align:right">Total</td>
      <td style="padding:8px;border:1px solid #ddd;text-align:right">${fmt(totalAmt)}</td>
      <td style="padding:8px;border:1px solid #ddd"></td>
    </tr></table>
    <p>Thank you,<br><b>Jonathan Stephens</b><br>Stephens Advanced LLC<br>(214) 994-4799<br>jonathan@stephensadvanced.com</p>
  </div>`

  // Build plain-text body for email preview
  const mazonSubj='Stephens Advanced LLC — Schedule Submission — Client #1410 — '+today
  let mazonBody=`Client #: 1410\nPIN: 4182\nDate: ${today}\nNumber of Invoices: ${pending.length}\nTotal Amount: ${fmt(totalAmt)}\n\n`
  pending.forEach(q=>{
    mazonBody+=`${q.invoice_number||'—'} | ${q.customer_name} | ${q.location_address||''} | ${fmt(+q.amount)} | ${q.date_of_service||'—'}\n`
  })
  mazonBody+=`\nTotal: ${fmt(totalAmt)}\n\nThank you,\nJonathan Stephens\nStephens Advanced LLC\n(214) 994-4799\njonathan@stephensadvanced.com`

  window.open(`mailto:schedule@mazon.com?subject=${encodeURIComponent(mazonSubj)}&body=${encodeURIComponent(mazonBody)}`)
  toast('Mazon email opened for review')
  if(btn){btn.textContent='✉️ Send to Mazon';btn.disabled=false}
}

function cHtml(ls){
  if(!ls.length)return`<div class="ey"><div class="ey-i">👤</div><div class="ey-t">No clients yet. Tap + Add to create one.</div></div>`
  // Slim projection surfaces counts via ext_count[0].count / sys_count[0].count.
  // After ensureLocationDetail runs for a location, the real arrays are also present.
  const extN=l=>Array.isArray(l.extinguishers)?l.extinguishers.length:(l.ext_count?.[0]?.count||0)
  const sysN=l=>Array.isArray(l.suppression_systems)?l.suppression_systems.length:(l.sys_count?.[0]?.count||0)
  const elN=l=>{
    if(Array.isArray(l.emergency_lights)&&l.emergency_lights[0]?.fixture_count)return l.emergency_lights[0].fixture_count
    if(Array.isArray(l.el_info)&&l.el_info[0]?.fixture_count)return l.el_info[0].fixture_count
    return 0
  }
  return ls.map(l=>`<div class="cc" onclick="openCust('${l.id}')">
    <div class="cc-l">
      <div class="cc-nm">${esc(l.name)}</div>
      <div class="cc-addr">${esc([l.address,l.city].filter(Boolean).join(', '))||'No address'}</div>
      <div class="cc-meta">
        <span><b>${extN(l)}</b> ext</span>
        <span><b>${sysN(l)}</b> sys</span>
        ${elN(l)?`<span><b>${elN(l)}</b> lights</span>`:''}
        ${l.is_brycer_jurisdiction?'<span class="cc-bry">BRYCER</span>':''}
      </div>
    </div><div class="cc-arr">›</div>
  </div>`).join('')
}

// MONEY
function rMoney(){
  const pd=D.invs.filter(i=>i.status==='paid').reduce((s,i)=>s+(+i.total),0)
  const unpaid=D.invs.filter(i=>['draft','sent'].includes(i.status))
  const unpaidTotal=unpaid.reduce((s,i)=>s+(+i.total),0)
  const ow=D.invs.filter(i=>!['paid','void','record','factored'].includes(i.status)).reduce((s,i)=>s+(+i.total),0)
  const mzPending=(D.mazonQueue||[]).filter(x=>x.status==='pending')
  const mzTotal=mzPending.reduce((s,x)=>s+(+x.amount||0),0)
  const factored=D.invs.filter(i=>i.status==='factored')
  const factoredTotal=factored.reduce((s,i)=>s+(+i.total),0)
  $('moneyC').innerHTML=`<div class="stats" style="grid-template-columns:repeat(2,1fr);margin-bottom:12px">
    <div class="st" style="cursor:pointer" onclick="filterMoney('paid')"><div class="sn g">${fmt(pd)}</div><div class="sl">Collected ›</div></div>
    <div class="st" style="cursor:pointer" onclick="filterMoney('unpaid')"><div class="sn r">${fmt(unpaidTotal)}</div><div class="sl">Unpaid · ${unpaid.length} ›</div></div>
    <div class="st" style="cursor:pointer" onclick="filterMoney('outstanding')"><div class="sn y">${fmt(ow)}</div><div class="sl">Outstanding ›</div></div>
    <div class="st" style="cursor:pointer" onclick="openMazonQueue()"><div class="sn i">${fmt(mzPending.length?mzTotal:factoredTotal)}</div><div class="sl">${mzPending.length?'Mazon Queue · '+mzPending.length+' ›':'Mazon ›'}</div></div>
  </div>
  <div class="sec"><div class="sec-t">Invoices</div></div>
  <input class="srch" placeholder="Search by customer or invoice #..." oninput="fI(this.value)">
  <div id="iL">${iHtml(D.invs)}</div>`
  setTimeout(initSwipes,50)
}
function iHtml(invs){
  if(!invs.length)return`<div class="ey"><div class="ey-i">💰</div><div class="ey-t">No invoices yet.</div></div>`
  return invs.map(i=>{
    const loc=D.locs.find(l=>l.id===i.location_id)
    const bc=i.status==='paid'?'bpaid':i.status==='sent'?'bsent':i.status==='overdue'?'bover':i.status==='record'?'brec':i.status==='factored'?'bfact':'bdraft'
    return`<div class="swipe-wrap" data-swipe-inv="${i.id}">
      <div class="swipe-del" onclick="event.stopPropagation()">Delete</div>
      <div class="swipe-inner ic" onclick="openInvDetail('${i.id}')" style="margin-bottom:0">
        <div class="ic-r1"><div><div class="ic-nm">${esc(loc?.name||'Unknown')}</div><div class="ic-sub">${i.invoice_number||'—'}</div></div><span class="badge ${bc}">${i.status}</span></div>
        <div class="ic-sub">${i.date?new Date(i.date).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}):''}</div>
        <div class="ic-amt">${fmt(+i.total)}</div>
      </div>
    </div>`
  }).join('')
}
function initSwipes(){
  document.querySelectorAll('.swipe-wrap[data-swipe-inv]').forEach(el=>{
    initSwipe(el,async()=>{
      const id=el.dataset.swipeInv
      const inv=D.invs.find(i=>i.id===id)
      if(!confirm('Delete invoice '+(inv?.invoice_number||'')+' ($'+(+(inv?.total||0)).toFixed(2)+')?'))return
      await SB.from('invoice_lines').delete().eq('invoice_id',id)
      await SB.from('invoices').delete().eq('id',id)
      await load();toast('Invoice deleted');rMoney()
    })
  })
  document.querySelectorAll('.swipe-wrap[data-swipe-job]').forEach(el=>{
    initSwipe(el,async()=>{
      const id=el.dataset.swipeJob
      const job=D.jobs.find(j=>j.id===id)
      const loc=D.locs.find(l=>l.id===job?.location_id)
      if(!confirm('Delete job for '+(loc?.name||'this location')+'? This also deletes all invoices and reports for this job.'))return
      const{data:invs2}=await SB.from('invoices').select('id').eq('job_id',id)
      const invIds2=(invs2||[]).map(x=>x.id)
      if(invIds2.length)await SB.from('invoice_lines').delete().in('invoice_id',invIds2)
      if(invIds2.length)await SB.from('invoices').delete().in('id',invIds2)
      try{await SB.from('reports').delete().eq('job_id',id)}catch(e){}
      try{await SB.from('extinguisher_results').delete().eq('job_id',id)}catch(e){}
      deleteJobGcalEvent(id)
      await SB.from('jobs').delete().eq('id',id)
      audit('deleted','job',id,'jon',null,'Job deleted (swipe)')
      await load();toast('Job deleted');rJobs()
    })
  })
  document.querySelectorAll('.swipe-wrap[data-swipe-contact]').forEach(el=>{
    initSwipe(el,async()=>{
      const cid=el.dataset.swipeContact
      const locId=el.dataset.contactLoc
      await SB.from('contact_links').delete().eq('contact_id',cid).eq('entity_type','location').eq('entity_id',locId)
      // if contact has no other links, delete the contact too
      const{data:remaining}=await SB.from('contact_links').select('id').eq('contact_id',cid)
      if(!remaining?.length)await SB.from('contacts').delete().eq('id',cid)
      await load();toast('Contact removed');openCust(locId)
    })
  })
}
function fI(q){
  const ql=q.toLowerCase()
  $('iL').innerHTML=iHtml(D.invs.filter(i=>{const loc=D.locs.find(l=>l.id===i.location_id);return(loc?.name||'').toLowerCase().includes(ql)||(i.invoice_number||'').toLowerCase().includes(ql)}))
}

function handlePhoto(ev){
  const file=ev.target.files[0];if(!file)return
  // upload photo to storage in background
  try{uploadDocument(file,file.name,'photo','general','00000000-0000-0000-0000-000000000000',{source:'camera'})}catch(e){console.error('photo upload:',e)}
  const reader=new FileReader()
  reader.onload=e=>{
    const prev=$('photoPrev');if(prev){prev.src=e.target.result;prev.style.display='block'}
    const st=$('aiStatus');if(st)st.style.display='block'
    $('camInput').value=''
    const img=new Image()
    img.onload=async()=>{
      const canvas=document.createElement('canvas')
      const max=1600;let w=img.width,h2=img.height
      if(w>max||h2>max){if(w>h2){h2=Math.round(h2*max/w);w=max}else{w=Math.round(w*max/h2);h2=max}}
      canvas.width=w;canvas.height=h2
      canvas.getContext('2d').drawImage(img,0,0,w,h2)
      await runPhotoAI(canvas.toDataURL('image/jpeg',0.85).split(',')[1],'image/jpeg')
    }
    img.src=e.target.result
  }
  reader.readAsDataURL(file)
}

async function runPhotoAI(b64,mtype){

    const res=await fetch('/api/claude',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        model:'claude-sonnet-4-6',max_tokens:2000,
        messages:[{role:'user',content:[
          {type:'image',source:{type:'base64',media_type:mtype,data:b64}},
          {type:'text',text:`You are the AI assistant for Stephens Advanced LLC, a fire suppression contractor in DFW Texas. Extract ALL invoice and job details from this image. Scan the ENTIRE image top to bottom.

RULES:
- LINE ITEMS: Only items with a dollar amount written next to them. No price = notes field only.
- Copy dollar amounts EXACTLY as written. Never recalculate or change math.
- Copy customer name, address, phone, email exactly as written.
- SUB TOTAL and TOTAL at the bottom are most important — copy exactly.
- Note payment method if visible (check, cash, card, PAID).
- Include work order number and date if visible.
- SERVICE DATE IS CRITICAL: Look for ANY date on the document — handwritten dates, printed dates, invoice dates, "Date:" fields, date stamps. If multiple dates exist, use the SERVICE DATE or DATE OF SERVICE. If only one date exists, use that. The date MUST be extracted accurately in YYYY-MM-DD format. This date determines when the next service is due. IMPORTANT: Dates may be in military/Julian format like "30MAR26", "30 MAR 2026", "15JAN25", "01DEC2025", or DD-MMM-YY. Convert these correctly — "30MAR26" means 2026-03-30, "15JAN25" means 2025-01-15. Also handle DD/MM/YYYY (European) vs MM/DD/YYYY (US) — assume US format unless clearly European.

Known customers: ${JSON.stringify(locList)}

Return ONLY valid JSON, no markdown:
{"customer_name":"","matched_location_id":null,"is_new_customer":true,"new_customer":{"name":"","address":"","city":"","state":"TX","zip":"","contact_name":"","contact_phone":"","email":""},"service_date":null,"work_order_number":"","service_type":"","has_suppression":false,"has_extinguishers":false,"line_items":[{"description":"","quantity":1,"unit_price":0,"total_as_written":""}],"subtotal_as_written":"","total_as_written":"","payment_method":"","notes":"","confidence":"high/medium/low"}

IMPORTANT: Set has_suppression=true if ANY line item mentions suppression, hood, Ansul, kitchen, clean agent, FM-200, halon, novec, semi-annual inspection of systems, fusible link, nozzle, blow-off cap, or similar fire suppression system work. Set has_extinguishers=true if ANY line item mentions extinguisher, fire ext, tag, inspection tag, hydro test, or similar portable extinguisher work. service_date MUST be in YYYY-MM-DD format if found.`}

async function _checkDuplicate(p){
  try{
    const custName=(p.customer_name||'').toLowerCase().trim()
    const woNum=(p.work_order_number||'').trim()
    const svcDate=p.service_date||''
    const totalStr=(p.total_as_written||'').replace(/[^0-9.]/g,'')
    const total=parseFloat(totalStr)||0

    // check by work order number first (most reliable)
    if(woNum){
      const match=D.invs.find(i=>{
        const notes=(i.notes||'').toLowerCase()
        return notes.includes(woNum.toLowerCase())
      })
      if(match){
        const loc=D.locs.find(l=>l.id===match.location_id)
        return{locName:loc?.name||'',invNum:match.invoice_number||'',date:match.date||'',total:fmt(+match.total)}
      }
    }

    // check by customer name + date + approximate total
    if(custName&&svcDate){
      for(const inv of D.invs){
        const loc=D.locs.find(l=>l.id===inv.location_id)
        const locName=(loc?.name||'').toLowerCase()
        if(!locName.includes(custName)&&!custName.includes(locName))continue
        // check if date is close (same month)
        const invDate=inv.date||''
        if(invDate.slice(0,7)===svcDate.slice(0,7)){
          // check if total is close (within 10%)
          const invTotal=+(inv.total||0)
          if(total>0&&invTotal>0&&Math.abs(invTotal-total)/total<0.1){
            return{locName:loc?.name||'',invNum:inv.invoice_number||'',date:invDate,total:fmt(invTotal)}
          }
        }
      }
    }

    // check by customer name + total (no date)
    if(custName&&total>0){
      for(const inv of D.invs){
        const loc=D.locs.find(l=>l.id===inv.location_id)
        const locName=(loc?.name||'').toLowerCase()
        if(!locName.includes(custName)&&!custName.includes(locName))continue
        const invTotal=+(inv.total||0)
        if(Math.abs(invTotal-total)<1){
          return{locName:loc?.name||'',invNum:inv.invoice_number||'',date:inv.date||'',total:fmt(invTotal)}
        }
      }
    }
  }catch(e){console.error('dup check:',e)}
  return null
}

  if(p.payment_method){
    const pm=p.payment_method.toLowerCase()

function aiCustSearch(q){
  const dd=$('ai-loc-dd');if(!dd)return
  if(q.length<1){dd.classList.remove('vis');return}
  const ql=q.toLowerCase()
  const matches=D.locs.filter(l=>l.name.toLowerCase().includes(ql)||(l.city||'').toLowerCase().includes(ql)||(l.address||'').toLowerCase().includes(ql))
  const canMk=q.length>=2&&!matches.some(l=>l.name.toLowerCase()===ql)
  let h=''
  matches.forEach(l=>{
    h+=`<div class="ac-it" onclick="selectAiLoc('${l.id}','${esc(l.name)}')"><div class="ac-n">${esc(l.name)}</div><div class="ac-d">${esc([l.address,l.city].filter(Boolean).join(', '))}</div></div>`
  })
  if(canMk)h+=`<div class="ac-it ac-new" onclick="showAiNewCust('${esc(q)}')"><div class="ac-n">+ Add "${esc(q)}" as new customer</div></div>`
  dd.innerHTML=h;dd.classList.add('vis')
}

// franchise detection — find existing customers that share a name prefix
function detectFranchise(name){
  if(!name||name.length<3)return[]
  const words=name.trim().split(/\s+/)
  // try progressively shorter prefixes: "Look Cinemas" from "Look Cinemas Arlington"
  const matches=[]
  for(let len=words.length-1;len>=1;len--){
    const prefix=words.slice(0,len).join(' ').toLowerCase()
    if(prefix.length<3)continue
    const found=D.locs.filter(l=>l.name.toLowerCase().startsWith(prefix))
    if(found.length){
      return found.map(l=>({id:l.id,name:l.name,city:l.city||'',prefix:words.slice(0,len).join(' ')}))
    }
  }
  return[]
}

async function saveParentBilling(ctx){
  const nm=$('par-name')?.value?.trim()

  const b=$('saveParentBtn');if(b){b.textContent='Saving...';b.style.opacity='.5'}
  const{data,error}=await SB.from('billing_accounts').insert({
    name:nm,address:$('par-addr')?.value?.trim()||null,
    city:$('par-city')?.value?.trim()||null,state:$('par-st')?.value?.trim()||'TX',
    zip:$('par-zip')?.value?.trim()||null,contact_name:$('par-contact')?.value?.trim()||null,
    phone:$('par-phone')?.value?.trim()||null,email:$('par-email')?.value?.trim()||null
  }).select().single()
  if(error){if($('par-err'))$('par-err').textContent='Error: '+error.message;if(b){b.textContent='Save';b.style.opacity=''}return}
  await load()
  _parentBillingId='ba-'+data.id

  const sel=$(ctx+'-parent-selected')
  const s=$(ctx+'-parent-search')
  if(sel){sel.style.display='block';$(ctx+'-parent-name').textContent=nm}

      const dupes=D.invs.filter(inv2=>inv2.location_id===p.matched_location_id&&inv2.date&&Math.abs(new Date(inv2.date+'T12:00:00')-svcDt)<14*86400000)

    const pm=p.payment_method.toLowerCase()
    let mKey='unpaid'
    if(pm.includes('check'))mKey='check'
    else if(pm.includes('cash'))mKey='cash'
    else if(pm.includes('card')||pm.includes('credit')||pm.includes('debit'))mKey='card'
    else if(pm.includes('paid'))mKey='cash'
    const payBtn=document.querySelector(`#rec-pay button[data-m="${mKey}"]`)
    if(payBtn)recSetPay(payBtn)
  }
  recUpdateDue()
  toast('Work order read — review and save')
}

function recUpdateDue(){
  const dateVal=$('rec-date')?.value
  const scopeBtns=$('rec-scope')?.querySelectorAll('button.ts')||[]
  const scopes=Array.from(scopeBtns).map(b=>b.dataset.k)
  const hasSup=scopes.includes('suppression')
  const hasExt=scopes.includes('extinguishers')
  const svcDate=dateVal?new Date(dateVal+'T12:00:00'):null
  const alert=$('rec-due-alert')
  const btn=$('recSaveBtn')
  _recData={hasSup,hasExt,isDue:false,dueType:'',monthsAgo:0}

  if(!svcDate||isNaN(svcDate)||!alert){if(alert)alert.innerHTML='';if(btn)btn.textContent='Record Old Job';return}
  const now=new Date()
  const monthsAgo=Math.round((now-svcDate)/(1000*60*60*24*30.44))
  _recData.monthsAgo=monthsAgo
  const supDue=hasSup&&monthsAgo>=6
  const extDue=hasExt&&!hasSup&&monthsAgo>=12

  if(supDue){
    _recData.isDue=true;_recData.dueType='suppression'
    alert.innerHTML=`<div style="background:var(--bads);border:2px solid var(--bad);border-radius:var(--r);padding:14px;margin-bottom:14px">
      <div style="font-size:13px;font-weight:800;color:var(--bad);margin-bottom:4px">REINSPECTION DUE — Suppression</div>
      <div style="font-size:12px;color:var(--w2)">Last service ${monthsAgo} months ago. Semi-annual (6 mo) required.</div>
    </div>`
    if(btn)btn.textContent='Record Old Job + Schedule Reinspection'
  }else if(extDue){
    _recData.isDue=true;_recData.dueType='extinguishers'
    alert.innerHTML=`<div style="background:var(--warns);border:2px solid var(--warn);border-radius:var(--r);padding:14px;margin-bottom:14px">
      <div style="font-size:13px;font-weight:800;color:var(--warn);margin-bottom:4px">REINSPECTION DUE — Extinguishers</div>
      <div style="font-size:12px;color:var(--w2)">Last service ${monthsAgo} months ago. Annual (12 mo) required.</div>
    </div>`
    if(btn)btn.textContent='Record Old Job + Schedule Reinspection'
  }else{
    const nextMonths=hasSup?6-monthsAgo:hasExt?12-monthsAgo:null
    if(nextMonths!==null&&nextMonths>0){
      alert.innerHTML=`<div style="background:var(--oks);border:2px solid var(--ok);border-radius:var(--r);padding:12px;margin-bottom:14px">
        <div style="font-size:12px;font-weight:700;color:var(--ok)">Not yet due — ~${nextMonths} month${nextMonths!==1?'s':''} until next inspection</div>
      </div>`
    }else{alert.innerHTML=''}
    if(btn)btn.textContent='Record Old Job'
  }
}

async function saveRecordInvoice(){
  const btn=$('recSaveBtn');if(btn){btn.innerHTML='<span class="spin"></span> Saving...';btn.disabled=true}
  const resetBtn=()=>{if(btn){btn.textContent=_recData.isDue?'Record Old Job + Schedule Reinspection':'Record Old Job';btn.disabled=false}}
  const locId=$('rec-loc')?.value
  let finalLocId=locId
  if(!locId){
    const nm=$('ai-nc-name')?.value?.trim()
    if(!nm){toast('Select a customer',false);resetBtn();return}
    const city=$('ai-nc-city')?.value?.trim()||''
    const baId2=_parentBillingId?.startsWith('ba-')?_parentBillingId.slice(3):null
    const{data:newLoc,error}=await SB.from('locations').insert({
      name:nm,address:$('ai-nc-addr')?.value?.trim()||null,city:city||null,
      state:$('ai-nc-st')?.value?.trim()||'TX',zip:$('ai-nc-zip')?.value?.trim()||null,
      contact_name:$('ai-nc-contact')?.value?.trim()||null,contact_phone:$('ai-nc-phone')?.value?.trim()||null,
      contact_email:$('ai-nc-email')?.value?.trim()||null,
      billing_account_id:baId2||null
    }).select().single()
    if(error){toast('Error saving customer',false);resetBtn();return}
    _parentBillingId=null
    finalLocId=newLoc.id;await load()
  }
  const lines=[]
  for(let i=0;i<_aiN;i++){
    const d=($('ald'+i)?.value||'').trim();if(!d)continue
    const q=parseFloat($('alq'+i)?.value)||1
    const up=parseFloat($('alup'+i)?.value)||parseFloat($('alp'+i)?.value)||0
    const lt=parseFloat($('alp'+i)?.value)||(q*up)
    lines.push({description:d,quantity:q,unit_price:up,total:lt})
  }
  if(!lines.length){toast('Add at least one line item',false);resetBtn();return}
  const total=lines.reduce((s,l2)=>s+l2.total,0)
  const invNum='INV-'+Date.now().toString().slice(-6)
  const isPaid=_recPayMethod&&_recPayMethod!=='unpaid'
  const payNote=_recPayMethod==='old_system'?'Old system file — paid':_recPayMethod==='check'?'Check #'+($('rec-check-num')?.value?.trim()||'?'):_recPayMethod==='cash'?'Cash — paid in full':_recPayMethod==='card'?'Card — paid in full':null
  const{data:inv,error}=await SB.from('invoices').insert({
    location_id:finalLocId,invoice_number:invNum,date:$('rec-date')?.value||td(),
    due_date:null,status:isPaid?'paid':'record',subtotal:total,total,
    notes:$('ai-notes')?.value?.trim()||null,
    ...(isPaid?{payment_method:_recPayMethod,payment_note:payNote,paid_at:new Date().toISOString()}:{})
  }).select().single()
  if(error){toast('Error saving',false);resetBtn();return}
  await SB.from('invoice_lines').insert(lines.map((l2,i)=>({invoice_id:inv.id,description:l2.description,quantity:l2.quantity,unit_price:l2.unit_price,total:l2.total,sort_order:i})))

  // always auto-schedule next service based on service date and scope
  let scheduledMsg=''
  if(finalLocId){
    const scopeBtns=$('rec-scope')?.querySelectorAll('button.ts')||[]
    const scopes=Array.from(scopeBtns).map(b=>b.dataset.k)
    const hasSup2=scopes.includes('suppression')
    const hasExt2=scopes.includes('extinguishers')
    const svcDateStr=$('rec-date')?.value||td()
    const svcDt=new Date(svcDateStr+'T12:00:00')
    // calculate next service: suppression=6 months from service date, ext-only=12 months
    const intervalMonths=hasSup2?6:hasExt2?12:0
    if(intervalMonths){
      const nextDate=new Date(svcDt)
      nextDate.setMonth(nextDate.getMonth()+intervalMonths)
      // if next date is in the past, schedule from today instead
      if(nextDate<=new Date()){nextDate.setTime(Date.now());nextDate.setDate(nextDate.getDate()+7)}
      const nds=nextDate.toISOString().split('T')[0]
      // check if a job already exists for this location near this date (within 30 days)
      const nearbyJobs=D.jobs.filter(j2=>j2.location_id===finalLocId&&j2.status==='scheduled'&&Math.abs(new Date(j2.scheduled_date+'T12:00:00')-nextDate)<30*86400000)
      if(!nearbyJobs.length){
        try{
          await SB.from('jobs').insert({
            location_id:finalLocId,type:'inspection',scope:scopes.length?scopes:['extinguishers','suppression'],
            scheduled_date:nds,scheduled_time:'09:00',status:'scheduled',
            notes:'Next service — from recorded work order ('+svcDateStr+')'
          })
          scheduledMsg=' + next service '+new Date(nds+'T12:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})
        }catch(e){console.error('auto-schedule:',e)}
      }else{
        scheduledMsg=' (service already scheduled)'
      }
    }
  }

  await load();_recordMode=false;popAll()
  toast('Recorded'+scheduledMsg)
  openInvDetail(inv.id)
}

function updateAiTotal(){
  let total=0
  for(let i=0;i<_aiN;i++){
    const q=parseFloat($('alq'+i)?.value)||1
    const up=parseFloat($('alup'+i)?.value)||0
    const lt=q*up
    const tp=$('alp'+i);if(tp)tp.value=lt.toFixed(2)
    total+=lt
  }
  const el=$('ai-running-total');if(el)el.textContent=fmtD(total)
}
function updateAiTotalFromLine(idx){
  const q=parseFloat($('alq'+idx)?.value)||1
  const lt=parseFloat($('alp'+idx)?.value)||0
  const up=$('alup'+idx);if(up&&q>0)up.value=(lt/q).toFixed(2)
  let total=0
  for(let i=0;i<_aiN;i++){total+=parseFloat($('alp'+i)?.value)||0}
  const el=$('ai-running-total');if(el)el.textContent=fmtD(total)
}

function updateRecTotal(){
  let total=0

    const q=parseFloat($('alq'+i)?.value)||1
    const up=parseFloat($('alup'+i)?.value)||0
    const lt=q*up

  }
  const el=$('rec-running-total');if(el)el.textContent=fmtD(total)
}

function updateRecTotalFromLine(idx){

  let total=0
  for(let i=0;i<_aiN;i++){total+=parseFloat($('alp'+i)?.value)||0}
  const el=$('rec-running-total');if(el)el.textContent=fmtD(total)
}

  }
  const inv=D.invs.find(x=>x.id===invId)||{}
  const loc=D.locs.find(x=>x.id===inv.location_id)||{}
  const ba=loc.billing_account_id?D.bas.find(b=>b.id===loc.billing_account_id):null
  // ONLY use email from THIS location — never from a stale form field for a different location
  const locContacts=contactsForEntity('location',inv.location_id).filter(c=>c.email)
  const fieldEmail=$('det-email-to')?.value?.trim()||$('inv-email-to')?.value?.trim()||''
  // verify the field email belongs to this location — reject stale emails from other invoices
  const locEmails=[loc.contact_email,ba?.email,...locContacts.map(c=>c.email)].filter(Boolean).map(e=>e.toLowerCase())
  const manualTo=fieldEmail&&(locEmails.includes(fieldEmail.toLowerCase())||!locEmails.length)?fieldEmail:''
  if(locContacts.length>1||locContacts.length===1&&manualTo){
    // show contact picker
    const primary=locContacts.find(c=>c.is_primary)||locContacts[0]
    let ph=`<div class="ov-hdr"><button class="ov-back" onclick="pop()">‹</button><div class="ov-title">Send To</div></div><div class="ov-body">
      <div style="font-size:12px;color:var(--g2);margin-bottom:12px">Choose who receives Invoice ${inv.invoice_number||''}</div>`
    locContacts.forEach(c=>{
      ph+=`<div style="background:var(--c1);border:1px solid var(--b1);border-radius:var(--rs);padding:12px;margin-bottom:8px;cursor:pointer;display:flex;align-items:center;gap:10px" onclick="pop();_showEmailPreview('${invId}','${esc(c.email)}','${esc(loc.name)}','${esc(inv.invoice_number||'')}')">
        ${c.is_primary?'<span style="font-size:14px">⭐</span>':'<span style="width:14px"></span>'}
        <div><div style="font-size:13px;font-weight:700">${esc(c.name)}</div>
        <div style="font-size:11px;color:var(--g1)">${esc(c.email)}${c.role?' · '+c.role:''}</div></div>
      </div>`
    })
    if(manualTo&&!locContacts.find(c=>c.email===manualTo)){
      ph+=`<div style="background:var(--c1);border:1px solid var(--b1);border-radius:var(--rs);padding:12px;margin-bottom:8px;cursor:pointer" onclick="pop();_showEmailPreview('${invId}','${esc(manualTo)}','${esc(loc.name)}','${esc(inv.invoice_number||'')}')">
        <div style="font-size:13px;font-weight:700">Custom: ${esc(manualTo)}</div>
      </div>`
    }
    ph+=`</div>`
    push(ph)
    return
  }
  const to=manualTo||locContacts[0]?.email||loc.contact_email||ba?.email||''
  if(!to){toast('No email — enter one in the email field',false);return}
  await _showEmailPreview(invId,to,loc.name||'',inv.invoice_number||'')
}

async function sendInvoiceEmail(invId,toEmail,custName,invNum,btn){
  // Show email preview overlay — user reviews everything then taps Send
  const emailField=$('inv-email-to')
  const to=emailField?emailField.value.trim():toEmail
  if(!to){
    const st=$('inv-email-status');if(st){st.textContent='No email address — enter one above.';st.style.color='var(--bad)'}
    return
  }
  if(btn){btn.innerHTML='<span class="spin"></span>';btn.style.pointerEvents='none'}
  await _showEmailPreview(invId,to,custName,invNum)
  if(btn){btn.innerHTML='✉️ Send Email';btn.style.pointerEvents=''}
}

async function _showEmailPreview(invId,to,custName,invNum){
  const{data:invFresh}=await SB.from('invoices').select('*').eq('id',invId).single()
  const inv=invFresh||D.invs.find(x=>x.id===invId)||{}
  const{data:lines}=await SB.from('invoice_lines').select('*').eq('invoice_id',invId).order('sort_order')
  const ls=lines||[]
  const total=ls.reduce((s,l)=>s+(+l.total||0),0)||+inv.total||0
  const loc=D.locs.find(x=>x.id===inv.location_id)||{}
  const subj=`Invoice ${inv.invoice_number||invNum} — Stephens Advanced LLC`

  // fetch all reports for this job
  let rpts=[]
  if(inv.job_id){
    const{data:r}=await SB.from('reports').select('id,report_type,report_data,created_at').eq('job_id',inv.job_id).order('created_at')

    <div style="font-size:11px;color:var(--g1);margin-bottom:4px">TO</div>
    <div style="font-size:15px;font-weight:700;color:var(--w);margin-bottom:12px">${esc(to)}</div>
    <div style="font-size:11px;color:var(--g1);margin-bottom:4px">SUBJECT</div>
    <div style="font-size:14px;font-weight:600;color:var(--w)">${esc(subj)}</div>
  </div>`
  h+=`<div style="background:var(--c2);border-radius:var(--r);padding:16px;margin-bottom:16px">
    <div style="font-size:11px;color:var(--g1);margin-bottom:8px">INVOICE</div>
    <div style="font-size:16px;font-weight:800;color:var(--fire);margin-bottom:4px">${esc(inv.invoice_number||'')}</div>
    <div style="font-size:13px;color:var(--w);margin-bottom:12px">${esc(custName||loc.name||'')}</div>`
  if(ls.length){
    h+=`<table style="width:100%;font-size:12px;color:var(--w);border-collapse:collapse">`
    ls.forEach(l=>{
      h+=`<tr><td style="padding:6px 0;border-bottom:1px solid var(--b1)">${esc(l.description)}</td>
        <td style="padding:6px 0;border-bottom:1px solid var(--b1);text-align:right;white-space:nowrap">${l.quantity} × $${(+l.unit_price).toFixed(2)}</td>
        <td style="padding:6px 0;border-bottom:1px solid var(--b1);text-align:right;font-weight:700;white-space:nowrap">$${(+l.total).toFixed(2)}</td></tr>`
    })
    h+=`<tr><td colspan="2" style="padding:8px 0;font-weight:800;font-size:14px">TOTAL</td>
      <td style="padding:8px 0;text-align:right;font-weight:900;font-size:16px;color:var(--fire)">$${total.toFixed(2)}</td></tr></table>`
  }
  h+=`</div>`

  // show attached reports
  if(rpts.length){
    h+=`<div style="background:var(--c2);border-radius:var(--r);padding:16px;margin-bottom:16px">
      <div style="font-size:11px;color:var(--g1);margin-bottom:8px">PDF ATTACHMENTS · ${rpts.length}</div>`
    rpts.forEach(r=>{
      const icon=r.report_type==='extinguisher'?'🧯':r.report_type==='dry_chemical'?'🏭':r.report_type==='clean_agent'?'💨':'🔥'
      const name=r.report_type==='extinguisher'?'Extinguisher Report':r.report_type==='dry_chemical'?'Dry Chemical / Paint Booth Report':r.report_type==='clean_agent'?'Clean Agent Report':'Kitchen Hood Report'
      const sysLoc=r.report_data?.sysLocation||''
      h+=`<div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--b1)">
        <span style="font-size:18px">${icon}</span>
        <div style="flex:1"><div style="font-size:13px;font-weight:700;color:var(--w)">${name}</div>

        <span style="font-size:11px;font-weight:700;color:var(--ok)">PDF</span>

    h+=`</div>`
  }else{
    h+=`<div style="font-size:11px;color:var(--g1);padding:8px 0;text-align:center">No reports to attach.</div>`
  }

  // ═══ DOCUMENTS (vendor work orders, POs, photos, etc.) ═══
  const atts=await loadInvoiceAttachments(invId)
  h+=`<div style="background:var(--c2);border-radius:var(--r);padding:16px;margin-bottom:16px" id="review-docs-section">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
      <div style="font-size:11px;color:var(--g1)">DOCUMENTS<span id="review-docs-count">${atts.length?` · ${atts.length}`:''}</span></div>

    <div style="font-size:10px;color:var(--g2);margin-top:6px;text-align:center">Customer signs once for invoice and all reports</div>
  </div>`

  // store data for the send action
  window._pendingEmail={invId,to,custName:custName||loc.name||'',invNum:inv.invoice_number||invNum,inv,ls,total,loc,rpts,atts}

  const totalAttachCount=rpts.length+atts.length
  const sendLabel=totalAttachCount?'✉️ Send Invoice + '+totalAttachCount+' Attachment'+(totalAttachCount>1?'s':''):'✉️ Send Invoice'
  h+=`<button id="confirmSendBtn" onclick="_confirmSendEmail()" style="width:100%;padding:16px;border-radius:var(--r);background:var(--fire);color:#fff;font-size:16px;font-weight:800;border:none;cursor:pointer;min-height:54px;margin-bottom:8px">${sendLabel}</button>`

  h+=`<button class="btn-dim" onclick="pop()">← Back</button>`
  h+=`</div>`
  push(h)
  // use the same proven initRptSig that works on report forms
  setTimeout(()=>initRptSig('custsend','custSendSig','custSendSigPh'),500)
}

async function _confirmSendEmail(){
  const d=window._pendingEmail;if(!d)return
  const btn=$('confirmSendBtn');if(btn){btn.innerHTML='<span class="spin"></span> Sending...';btn.style.pointerEvents='none'}
  const st=$('confirmSendStatus')

  // capture customer signature — white bg + dark ink (same as tech sig)
  let custSigData=''
  const custSigCanvas=$('custSendSig')
  if(custSigCanvas&&custSigCanvas.width>0){
    try{
      const w=custSigCanvas.width,h=custSigCanvas.height
      const tmp=document.createElement('canvas');tmp.width=w;tmp.height=h
      const tctx=tmp.getContext('2d');tctx.fillStyle='#ffffff';tctx.fillRect(0,0,w,h);tctx.drawImage(custSigCanvas,0,0)
      custSigData=tmp.toDataURL('image/jpeg',0.7)||''
    }catch(e){console.error('sig capture:',e)}
  }
  if(custSigData&&custSigData.length>100&&d.inv.job_id){
    try{await SB.from('jobs').update({signature_data:custSigData}).eq('id',d.inv.job_id)}catch(e){console.error('save cust sig:',e)}
  }

  // generate portal link
  let portalUrl=''
  try{const pTk=await getOrCreatePortalToken(d.inv.location_id,d.loc.billing_account_id||null);if(pTk)portalUrl='https://stephensadvanced.com/portal?t='+pTk}catch(e){}

  // generate Square payment link
  let payUrl=''
  if(st){st.textContent='Creating payment link...';st.style.color='var(--g1)'}
  try{
    const payRes=await fetch('/api/create-payment-link',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({invoiceNumber:d.invNum,customerName:d.custName,amount:d.total,invoiceId:d.invId,customerEmail:d.to})
    })
    const payData=await payRes.json()
    if(payData.success&&payData.paymentLink)payUrl=payData.paymentLink
  }catch(e){console.error('payment link:',e)}

  // fetch customer-uploaded documents so they can be listed in the email body
  let docsMeta=[]
  try{docsMeta=await loadInvoiceAttachments(d.invId)}catch(e){console.error('load docs:',e)}

  let html=buildInvoiceEmailHtml({
    invNum:d.invNum,custName:d.custName,
    addr:[d.loc.address,d.loc.city,d.loc.state,d.loc.zip].filter(Boolean).join(', '),
    date:d.inv.date?new Date(d.inv.date).toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'}):'',
    dueDate:d.inv.due_date?new Date(d.inv.due_date).toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'}):'',
    lines:d.ls,total:d.total,portalUrl,payUrl,
    poNumber:d.inv.po_number||'',
    docs:docsMeta,rpts:d.rpts
  })

  // append job photos to email if any exist
  const job2=D.jobs.find(j2=>j2.id===d.inv.job_id)
  if(job2?.photos?.length){
    let photoHtml='<div style="margin-top:20px;padding-top:16px;border-top:1px solid #eee"><div style="font-size:12px;font-weight:800;text-transform:uppercase;letter-spacing:1px;color:#999;margin-bottom:12px">Site Photos</div>'
    job2.photos.forEach(p=>{photoHtml+=`<img src="${p}" style="max-width:100%;border-radius:8px;margin-bottom:8px;border:1px solid #eee">`})
    photoHtml+='</div>'
    html=html.replace('</div></div></div>',photoHtml+'</div></div></div>')
  }

  // append prompt-pay discount notice to every invoice email
  const hasDiscountLine=(d.ls||[]).some(l=>(l.description||'').toLowerCase().includes('discount'))
  if(!hasDiscountLine){
    const discountHtml=`<div style="margin-top:16px;padding:14px 18px;background:#fef3c7;border:1px solid #f59e0b;border-radius:8px;text-align:center">
      <div style="font-size:14px;font-weight:800;color:#92400e">💰 10% Prompt Pay Discount</div>
      <div style="font-size:12px;color:#a16207;margin-top:4px">A 10% discount is applied when payment is received within 24 hours of service completion. Use the Pay Now button above.</div>
    </div>`
    html=html.replace('</div></div></div>',discountHtml+'</div></div></div>')
  }

  // build report PDF attachments — convert HTML to real PDFs
  let attachments=[]
  if(st){st.textContent='Generating PDFs...';st.style.color='var(--g1)'}
  for(let ri=0;ri<d.rpts.length;ri++){
    const rpt=d.rpts[ri]
    let rHtml=''
    const rd=rpt.report_data||{}
    if(rpt.report_type==='extinguisher'&&rd.units){rHtml=buildExtReportHtml(rd,d.loc,custSigData)}
    else if(rpt.report_type==='kitchen_suppression'){rHtml=buildKitchenReportFromData(rd,d.loc,d.inv,custSigData)}
    else if(rpt.report_type==='dry_chemical'){rHtml=buildDryChemReportFromData(rd,d.loc,d.inv,custSigData)}
    else if(rpt.report_type==='clean_agent'){rHtml=buildCleanAgentReportFromData(rd,d.loc,d.inv,custSigData)}
    if(!rHtml)continue
    const sysLoc=rpt.report_data?.sysLocation||''
    const rType=rpt.report_type==='extinguisher'?'Extinguisher-Report':rpt.report_type==='clean_agent'?'Clean-Agent-Report':rpt.report_type==='dry_chemical'?'Dry-Chemical-Report':'Suppression-Report'
    const suffix=d.rpts.length>1?'-'+(sysLoc||ri+1):''
    try{
      // render full HTML doc in hidden iframe — force white background
      const iframe=document.createElement('iframe')
      iframe.style.cssText='position:absolute;left:-9999px;top:0;width:580px;height:1056px;border:none;background:#fff'
      document.body.appendChild(iframe)
      const idoc=iframe.contentDocument||iframe.contentWindow.document
      // strip scripts, force white bg and black text on all elements
      let cleanHtml=rHtml.replace(/<script[\s\S]*?<\/script>/gi,'')
      cleanHtml=cleanHtml.replace('</head>','<style>*{color-scheme:light!important}html,body{background:#fff!important;color:#222!important}@media(prefers-color-scheme:dark){html,body{background:#fff!important;color:#222!important}}</style></head>')
      idoc.open();idoc.write(cleanHtml);idoc.close()
      // wait for content + fonts to render
      await new Promise(r=>setTimeout(r,500))
      const pdfBlob=await html2pdf().set({margin:[0.5,0.5,0.5,0.5],filename:'report.pdf',image:{type:'jpeg',quality:0.98},html2canvas:{scale:2,useCORS:true,windowWidth:580,backgroundColor:'#ffffff'},jsPDF:{unit:'in',format:'letter',orientation:'portrait'}}).from(idoc.body).outputPdf('blob')
      document.body.removeChild(iframe)
      // Store PDF permanently — DO NOT modify the PDF generation above this line
      try{await uploadDocument(pdfBlob,'Stephens-Advanced-'+rType+suffix+'.pdf','report_pdf','job',d.inv.job_id,{report_type:rpt.report_type,invoice_id:d.inv.id})}catch(e){console.error('doc upload:',e)}
      const buf=await pdfBlob.arrayBuffer()
      const b64=btoa(new Uint8Array(buf).reduce((s,b)=>s+String.fromCharCode(b),''))
      attachments.push({filename:'Stephens-Advanced-'+rType+suffix+'.pdf',content:b64})
    }catch(e){console.error('PDF gen error:',e)}
  }

  // attach customer-uploaded documents (vendor POs, work orders, photos)
  if(docsMeta.length&&st){st.textContent='Attaching '+docsMeta.length+' document'+(docsMeta.length>1?'s':'')+'...';st.style.color='var(--g1)'}
  for(const a of docsMeta){
    try{
      const{data:blob,error:dlErr}=await SB.storage.from(INV_ATTACH_BUCKET).download(a.file_path)
      if(dlErr||!blob){console.error('doc download:',dlErr);continue}
      const buf=await blob.arrayBuffer()
      const b64=btoa(new Uint8Array(buf).reduce((s,b)=>s+String.fromCharCode(b),''))
      // sanitize filename for email attachment
      const safeName=(a.file_name||'attachment').replace(/[^\w.\-]+/g,'_')
      attachments.push({filename:safeName,content:b64})
    }catch(e){console.error('doc attach:',e)}
  }

  // HARD CONFIRM — show exactly who gets this email
  if(!confirm('SEND EMAIL TO:\n\n'+d.to+'\n\nInvoice '+d.invNum+' for '+d.custName+'\n\nAre you sure?')){
    if(st)st.textContent='Cancelled';if(btn){btn.innerHTML='✉️ Send Email';btn.style.pointerEvents=''}
    return
  }

  if(st){st.textContent='Sending to '+d.to+'...';st.style.color='var(--g1)'}

  try{
    const res=await fetch('/api/send-email',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({to:d.to,subject:`Invoice ${d.invNum} — Stephens Advanced LLC`,html,invoiceNumber:d.invNum,customerName:d.custName,attachments})
    })
    const data=await res.json()
    if(data.success){
      await SB.from('invoices').update({status:'sent'}).eq('id',d.invId)
      audit('sent','invoice',d.invId,'jon',{to:d.to},'Invoice '+d.invNum+' sent to '+d.to)
      await load()
      // Bug #6 fix: refresh the status badge on any invoice detail overlay
      // currently in the stack so it no longer shows stale "DRAFT" text.
      try{
        OVS.forEach(slotId=>{
          const el=document.getElementById(slotId)
          if(!el||el.dataset.invId!==d.invId)return
          el.querySelectorAll('.badge').forEach(b=>{
            if(b.classList.contains('bdraft')){
              b.classList.remove('bdraft');b.classList.add('bsent');b.textContent='sent'
            }
          })
        })
      }catch(e){console.error('badge refresh:',e)}
      if(st){st.innerHTML='✓ Sent to '+esc(d.to);st.style.color='var(--ok)'}
      if(btn){
        btn.innerHTML='✓ Sent';btn.style.background='var(--ok)';btn.style.pointerEvents='none'
        // Bug #7 fix: clear next-step buttons after sending
        const btnRow=document.createElement('div')
        btnRow.style.cssText='display:flex;flex-direction:column;gap:8px;margin-top:12px'
        // Primary: return to the (now fresh) invoice detail
        const backBtn=document.createElement('button')
        backBtn.style.cssText='width:100%;padding:16px;border-radius:var(--r);background:var(--info);color:#fff;font-size:15px;font-weight:800;border:none;cursor:pointer;min-height:54px'
        backBtn.textContent='← Back to Invoice'
        backBtn.onclick=()=>pop()
        btnRow.appendChild(backBtn)
        // Secondary: close out the job entirely and return to calendar
        if(d.inv.job_id){
          const doneBtn=document.createElement('button')
          doneBtn.style.cssText='width:100%;padding:14px;border-radius:var(--r);background:var(--ok);color:#fff;font-size:14px;font-weight:800;border:none;cursor:pointer;min-height:48px'
          doneBtn.textContent='✓ Close Job & Return to Calendar'
          doneBtn.onclick=async()=>{
            doneBtn.textContent='Closing...';doneBtn.disabled=true
            await SB.from('jobs').update({status:'completed',completed_at:new Date().toISOString()}).eq('id',d.inv.job_id)
            try{await SB.from('calendar_events').update({color:'#9ca3af'}).eq('job_id',d.inv.job_id)}catch(e){}
            audit('completed','job',d.inv.job_id,'jon',{status:'completed'},'Job completed after invoice sent')
            await load()
            toast('Job closed out ✓')
            popAll()
            rCal()
          }
          btnRow.appendChild(doneBtn)
        }
        btn.parentElement.appendChild(btnRow)
      }
      toast('Invoice emailed with '+attachments.length+' report'+(attachments.length!==1?'s':''))
    }else{throw new Error(data.error||'Send failed')}
  }catch(err){
    if(st){st.textContent='Error: '+err.message;st.style.color='var(--bad)'}
    if(btn){btn.innerHTML='✉️ Retry Send';btn.style.pointerEvents=''}
    toast('Send failed',false)
  }
}

async function getOrCreatePortalToken(locId,baId){
  // check for existing token
  const col=baId?'billing_account_id':'location_id'
  const val=baId||locId
  if(!val)return null
  const{data:existing}=await SB.from('portal_tokens').select('token').eq(col,val).eq('is_active',true).limit(1)
  if(existing?.[0])return existing[0].token
  // generate new token
  const arr=new Uint8Array(16);crypto.getRandomValues(arr)
  const token=Array.from(arr,b=>b.toString(16).padStart(2,'0')).join('')
  await SB.from('portal_tokens').insert({token,location_id:locId||null,billing_account_id:baId||null})
  return token
}

function buildInvoiceEmailHtml({invNum,custName,addr,date,dueDate,lines,total,portalUrl,payUrl,poNumber,docs,rpts}){
  const lineRows=lines.map(l=>{const isTrv=(l.description||'').startsWith('Travel —');return`

async function createAndSendContract(locId){
  const l=D.locs.find(x=>x.id===locId);if(!l)return
  const ba=l.billing_account_id?D.bas.find(b=>b.id===l.billing_account_id):null
  const email=l.contact_email||(ba?ba.email:null)
  if(!email){alert('No email on file for this location. Add a contact email first.');return}
  try{
    const{data:c,error}=await SB.from('contracts').insert({
      location_id:locId,
      billing_account_id:l.billing_account_id||null,
      type:'recurring',
      frequency:'semi-annual',
      services_included:['suppression','extinguishers'],
      status:'draft',
      language:l.preferred_language||'en'
    }).select().single()
    if(error)throw error
    D.contracts=(D.contracts||[]);D.contracts.push(c)
    await sendContractEmail(c.id)
  }catch(e){console.error('createAndSendContract:',e);alert('Error: '+e.message)}
}

async function sendContractEmail(contractId){
  try{
    const res=await fetch('/api/send-contract',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({contractId})})
    const data=await res.json()
    if(!res.ok)throw new Error(data.error||'Send failed')
    const idx=(D.contracts||[]).findIndex(c=>c.id===contractId)
    if(idx>=0){D.contracts[idx].status='sent';D.contracts[idx].sent_at=new Date().toISOString()}
    alert('Contract sent!')
    pop();
  }catch(e){console.error('sendContractEmail:',e);alert('Error sending contract: '+e.message)}
}

async function resendContractEmail(contractId){
  if(!confirm('Resend contract email?'))return
  await sendContractEmail(contractId)
}

async function saveJob(){
  setLoad('saveJobBtn',true)
  let lid=nSt.loc?.id,ba=nSt.loc?.ba||null
  if(nSt.mk){
    const nm=$('nn')?.value?.trim();if(!nm){toast('Enter business name',false);setLoad('saveJobBtn',false,'Create Job');return}
    const city=$('nc2')?.value?.trim()||''
    const{data,error}=await SB.from('locations').insert({name:nm,address:$('na')?.value?.trim()||null,city:city||null,state:$('ns2')?.value?.trim()||'TX',zip:$('nz2')?.value?.trim()||null,contact_name:$('nco2')?.value?.trim()||null,contact_phone:$('np2')?.value?.trim()||null,is_brycer_jurisdiction:_isBrycerCity(city),brycer_ahj_name:_isBrycerCity(city)?(city||'').trim()+' Fire Department':null}).select().single()
    if(error){toast('Error creating customer',false);setLoad('saveJobBtn',false,'Create Job');return}
    lid=data.id
  }
  if(!lid){toast('Select a customer',false);setLoad('saveJobBtn',false,'Create Job');return}
  const ty=document.querySelector('#nTy button.on')?.dataset.k||'inspection'
  const sc=Array.from(document.querySelectorAll('#nSc button.gn')).map(b=>b.dataset.k)
  // capture form values BEFORE popAll destroys the DOM
  const jobDate=$('ndt')?.value||new Date(Date.now()+86400000).toISOString().split('T')[0]
  const jobTime=$('ntm')?.value||'09:00'
  const jobNoteTxt=$('nnt')?.value?.trim()||''
  const assignTo=$('nAssign')?.value||null
  // double-booking check
  const conflicts=D.jobs.filter(j2=>j2.scheduled_date===jobDate&&j2.scheduled_time===jobTime&&j2.status==='scheduled')
  if(conflicts.length){
    const cNames=conflicts.map(j2=>{const cl=D.locs?.find(x=>x.id===j2.location_id);return cl?.name||'Unknown'}).join(', ')
    if(!confirm(`Warning: ${conflicts.length} job${conflicts.length>1?'s':''} already scheduled at ${jobTime} on ${jobDate} (${cNames}). Schedule anyway?`)){
      setLoad('saveJobBtn',false,'Create Job');return
    }
  }
  // auto-detect scope from location equipment if not manually set
  let finalScope=sc
  if(!finalScope.length){
    const loc2=D.locs.find(x=>x.id===lid)||{}
    finalScope=[]
    if(loc2.suppression_systems?.length)finalScope.push('suppression')
    if(loc2.extinguishers?.length)finalScope.push('extinguishers')
    if(loc2.emergency_lights?.[0]?.fixture_count)finalScope.push('elights')
    if(!finalScope.length)finalScope=['extinguishers','suppression']
  }
  const{data:newJob,error}=await SB.from('jobs').insert({location_id:lid,billing_account_id:ba,type:ty,scope:finalScope,scheduled_date:jobDate,scheduled_time:jobTime,status:'scheduled',notes:jobNoteTxt||null,assigned_to:assignTo||null}).select().single()
  if(error){toast('Error creating job',false);setLoad('saveJobBtn',false,'Create Job');return}
  // sync to calendar_events
  if(newJob?.id)try{await syncJobToCalendar(newJob.id,lid,jobDate,jobTime)}catch(e){console.error('cal sync:',e)}
  if(newJob?.id)audit('created','job',newJob.id,'jon',{scheduled_date:jobDate,scheduled_time:jobTime,scope:finalScope},'Job created for '+(D.locs.find(x=>x.id===lid)?.name||'?'))
  await load();toast('Job created ✓')
  nSt={loc:null,mk:false};window._preCalDate=null;window._preCalTime=null
  popAll()
  rCal()
  if(newJob?.id)setTimeout(()=>openJob(newJob.id),100)
}

function addToCalendar({title,date,time,addr,notes}){
  const fmtDT=(d,t)=>(d+'T'+t+':00').replace(/-|:/g,'')
  const endHr=(parseInt((time||'09').split(':')[0])+2).toString().padStart(2,'0')
  const endTime=endHr+':'+(time||'09:00').split(':')[1]
  const ics=[
    'BEGIN:VCALENDAR',
    'VERSION:2.0',
    'PRODID:-//Stephens Advanced//App//EN',
    'BEGIN:VEVENT',
    'DTSTART:'+fmtDT(date,time),
    'DTEND:'+fmtDT(date,endTime),
    'SUMMARY:'+title,
    addr?'LOCATION:'+addr:'',
    notes?'DESCRIPTION:'+notes.replace(/\n/g,'\\n'):'',
    'END:VEVENT',
    'END:VCALENDAR'
  ].filter(Boolean).join('\r\n')
  const blob=new Blob([ics],{type:'text/calendar;charset=utf-8'})
  const url=URL.createObjectURL(blob)
  const a=document.createElement('a');a.href=url;a.download='stephens-job.ics';a.click()
  setTimeout(()=>URL.revokeObjectURL(url),5000)
}
