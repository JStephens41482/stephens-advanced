// Tap-through from the overdue banner (per design audit issue C2).
// Opens Riker chat and immediately sends "handle my overdue jobs" so he
// returns a tabular card list with tappable ::ACTIONS:: buttons — instead
// of the old "here's a generic list" flow.
function askRikerAboutOverdue(){
  openChat()
  setTimeout(()=>{
    const input=$('chatInput')
    if(input){input.value='Handle my overdue jobs — which ones should I reschedule or call about?';sendChat()}
  },150)
}

function closeChat(){
  _chatOpen=false
  $('chatOv').classList.remove('open')
}

function parseRikerMessage(raw){
  let text=raw||''
  const actions=[]
  // strip ::ACTIONS:: trailer → tappable buttons
  text=text.replace(/(?:^|\n)::ACTIONS::\s*([^\n]+)/g,(_,line)=>{
    line.split(/\s*\|\s*/).map(s=>s.trim()).filter(Boolean).slice(0,3).forEach(l=>actions.push(l))
    return ''
  })
  // detect a markdown table and pull it out as cards
  let cards=null
  const lines=text.split('\n')
  for(let i=0;i<lines.length-1;i++){
    if(lines[i].includes('|')&&/^\s*\|?[\s\-|:]+\|[\s\-|:]+/.test(lines[i+1])){
      const header=lines[i].split('|').map(s=>s.trim()).filter(Boolean)
      const rows=[]
      let j=i+2
      while(j<lines.length&&lines[j].includes('|')){
        const r=lines[j].split('|').map(s=>s.trim()).filter(Boolean)
        if(r.length)rows.push(r)
        j++
      }
      if(header.length>=2&&rows.length){
        cards={header,rows}
        text=[...lines.slice(0,i),...lines.slice(j)].join('\n').trim()
      }
      break
    }
  }
  return{text:text.trim(),cards,actions}
}

function renderRikerCards(cards){
  if(!cards)return''
  const headers=cards.header
  return`<div style="margin-top:10px;display:flex;flex-direction:column;gap:6px">${cards.rows.map(row=>{
    const title=esc(row[0]||'')
    const fields=row.slice(1).map((v,i)=>({k:headers[i+1]||'',v:v||''})).filter(f=>f.v)
    return`<div style="background:var(--c1);border:1px solid var(--b1);border-left:3px solid var(--slate);border-radius:var(--rs);padding:10px 12px">
      <div style="font-weight:700;font-size:13px;color:var(--w);margin-bottom:4px">${title}</div>
      <div style="display:flex;flex-wrap:wrap;gap:8px 14px;font-size:11px">${fields.map(f=>`<div><span style="color:var(--g1);text-transform:uppercase;letter-spacing:.06em;font-size:9.5px;font-weight:700">${esc(f.k)}</span> <span style="color:var(--w2);font-weight:600">${esc(f.v)}</span></div>`).join('')}</div>
    </div>`
  }).join('')}</div>`
}

function renderRikerActions(actions){
  if(!actions||!actions.length)return''
  return`<div style="margin-top:10px;display:flex;flex-wrap:wrap;gap:6px">${actions.map(a=>`<button onclick="sendChatAsUser(${JSON.stringify(a).replace(/"/g,'&quot;')})" style="padding:9px 14px;border-radius:var(--rs);background:var(--fires);border:1px solid var(--fire);color:var(--fire);font-size:12.5px;font-weight:700;cursor:pointer;min-height:40px">${esc(a)}</button>`).join('')}</div>`
}

function sendChatAsUser(text){
  const input=$('chatInput');if(!input)return
  input.value=text
  sendChat()
}

function renderChat(){
  const wrap=$('chatMsgs');if(!wrap)return
  wrap.innerHTML=_chatMsgs.map(m=>{
    const cls=m.role==='user'?'user':'ai'
    if(m.content==='_confirm_'){
      return`<div class="chat-msg ai"><div class="chat-bubble" style="padding:0;overflow:hidden">
        <div style="padding:10px 14px;font-size:13px;font-weight:600">Ready?</div>
        <div style="display:flex;border-top:1px solid var(--b1)">
          <button onclick="confirmChatActions(true)" style="flex:1;padding:12px;font-size:14px;font-weight:800;background:var(--ok);color:#fff;border:none;cursor:pointer;min-height:44px">Yes, do it</button>
          <button onclick="confirmChatActions(false)" style="flex:1;padding:12px;font-size:14px;font-weight:700;background:var(--c2);color:var(--g1);border:none;border-left:1px solid var(--b1);cursor:pointer;min-height:44px">Cancel</button>
        </div>
      </div></div>`
    }
    let cardsHtml='',actionsHtml='',body=m.content||''
    if(m.role!=='user'){
      const parsed=parseRikerMessage(body)
      body=parsed.text
      cardsHtml=renderRikerCards(parsed.cards)
      actionsHtml=renderRikerActions(parsed.actions)
    }
    const content=body.replace(/\n/g,'<br>').replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>').replace(/`(.+?)`/g,'<code style="background:var(--c3);padding:2px 5px;border-radius:4px;font-size:12px">$1</code>')
    return`<div class="chat-msg ${cls}"><div class="chat-bubble">${content}${cardsHtml}${actionsHtml}</div></div>`
  }).join('')
  wrap.scrollTop=wrap.scrollHeight
}

async function confirmChatActions(yes){
  // remove the confirm message
  _chatMsgs=_chatMsgs.filter(m=>m.content!=='_confirm_')
  if(!yes){
    window._pendingActions=null
    _chatMsgs.push({role:'assistant',content:'Cancelled.'})
    renderChat()
    return
  }
  const actions=window._pendingActions||[]
  window._pendingActions=null
  for(const act of actions){
    await execChatAction(act)
  }
  renderChat()
}

// Riker session for app context — one session per browser install (localStorage)
const RIKER_APP_SESSION_KEY='riker_app_session'

async function sendChat(){
  const input=$('chatInput')
  const msg=input?.value?.trim()
  if(!msg)return
  input.value=''
  input.style.height='44px'

  _chatMsgs.push({role:'user',content:msg})
  renderChat()

  const btn=$('chatSendBtn');if(btn)btn.disabled=true

  // Server-side Riker builds the full context (prompts, memory, calendar,
  // rate card, William availability). Client only sends the turn + a few
  // UX hints about what's open on screen.
  const sessionId=localStorage.getItem(RIKER_APP_SESSION_KEY)||null
  try{
    const res=await fetch('/api/riker',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        context:'app',
        session_id:sessionId,
        message:msg,
        // Multi-tech: send the cookie-resolved tech identity, not a guess
        // from D.techs[0]. window._me is populated at boot by /api/auth-sms
        // ?action=check. Falls back to first-active for backwards-compat

        // migration landed (some sessions predate the tech_id resolution).
        auth:{tech_id:(window._me?.tech?.id)||(D.techs||[]).find(tt=>tt.active)?.id||null},

          active_location_id:(window._openLocId||null),
          active_job_id:(window._openJobId||null)
        }
      })
    })
    const data=await res.json()
    if(data.session_id)localStorage.setItem(RIKER_APP_SESSION_KEY,data.session_id)
    const reply=data.reply||'Done.'
    if(reply)_chatMsgs.push({role:'assistant',content:reply})
    // Apply UI-only client hints (open_screen, open_client, open_job, toast)
    for(const hint of (data.client_hints||[])){
      try{await execChatAction(hint)}catch(e){console.error('client hint:',e)}
    }
    // If anything was written server-side, refresh local data
    const wrote=(data.actions_taken||[]).some(a=>a.ok&&!['lookup_client','lookup_invoice','open_screen','open_client','open_job','toast','memory_write','memory_delete','view_invoices','view_equipment','view_next_service'].includes(a.type))
    if(wrote){
      try{await load()}catch(e){console.error('refresh after action:',e)}
    }
  }catch(e){
    console.error('chat error:',e)
    _chatMsgs.push({role:'assistant',content:'Connection error — check your internet and try again.'})
  }

  renderChat()
  if(btn)btn.disabled=false
  return
}

async function execChatAction(act){

      _chatMsgs.push({role:'assistant',content:`✓ Added client: **${act.name}**`})

        const loc=D.locs.find(l=>l.id===inv.location_id)
        _chatMsgs.push({role:'assistant',content:`**${inv.invoice_number}** — ${loc?.name||'?'}\nStatus: ${inv.status} · $${(+inv.total).toFixed(2)}\nDate: ${inv.date}${inv.paid_at?' · Paid '+inv.paid_at.split('T')[0]:''}`})
      }else{_chatMsgs.push({role:'assistant',content:`No invoice found matching "${act.invoice_number}"`})}
    }
    else if(t==='open_screen'){
      closeChat()
      const map={dashboard:'vJobs',jobs:'vJobs',clients:'vCust',money:'vMoney',techs:'vTechs'}
      const v=map[act.screen]
      if(v){const btn2=document.querySelector(`[data-v="${v}"]`);if(btn2)go(btn2)}
      if(act.screen==='reports')openReports()
    }
    else if(t==='open_client'){closeChat();openCust(act.location_id)}
    else if(t==='open_job'){closeChat();openJob(act.job_id)}
    else if(t==='delete_job'){
      if(confirm('Delete this job?')){
        await trash('jobs',{id:act.job_id},act.reason||'Deleted via AI chat','ai_chat','app')
        await load();rJobs();rJobs()
        audit('deleted','job',act.job_id,'ai_chat',null,'AI soft-deleted job — record preserved in trash')
        _chatMsgs.push({role:'assistant',content:'✓ Job deleted'})
      }else{_chatMsgs.push({role:'assistant',content:'Cancelled.'})}
    }
    else if(t==='add_extinguisher'){
      await SB.from('extinguishers').insert({location_id:act.location_id,type:act.type||'ABC Dry Chemical',size:act.size||null,location_in_building:act.location_in_building||null})
      await load()
      _chatMsgs.push({role:'assistant',content:`✓ Added ${act.type||'extinguisher'} ${act.size||''} to location`})
    }
    else if(t==='add_suppression'){
      await SB.from('suppression_systems').insert({location_id:act.location_id,system_type:act.system_type,category:act.category||'standard',tank_count:act.tank_count||1,nozzle_count:act.nozzle_count||0,fusible_link_count:act.fusible_link_count||0})
      await load()
      _chatMsgs.push({role:'assistant',content:`✓ Added ${act.system_type} to location`})
    }
    else if(t==='send_sms'){
      try{
        await fetch('/api/send-sms',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({to:act.to,body:act.body})})
        _chatMsgs.push({role:'assistant',content:`✓ Text sent to ${act.to}`})
      }catch(e){
        console.error('sms error:',e)
        _chatMsgs.push({role:'assistant',content:`⚠️ SMS failed: ${e.message}`})
      }
    }
    else if(t==='build_route'){
      const date=act.date||td()
      const pool = act.job_ids?.length ? D.jobs.filter(j=>act.job_ids.includes(j.id)) : D.jobs.filter(j=>j.status==='scheduled'&&j.scheduled_date<=date)
      if(!pool.length){_chatMsgs.push({role:'assistant',content:'No jobs available to route.'});return}
      const routed=await routeJobs(pool)
      window._activeRoute=routed
      const totalDist=routed.reduce((s,r)=>s+r.dist,0)
      let summary='**Route built: '+routed.length+' stops · ~'+Math.round(totalDist)+' miles**\n'
      routed.forEach((r,i)=>{const l=r.job.location||{};summary+=(i+1)+'. '+(l.name||'?')+' ('+(l.city||'?')+') — '+Math.round(r.dist)+' mi\n'})
      summary+='\nSay "open route" to see the full route view, or tell me to add/remove stops.'
      _chatMsgs.push({role:'assistant',content:summary})
      closeChat();openRouteView()
    }
    else if(t==='modify_route'){
      const current=window._activeRoute?.map(r=>r.job.id)||[]
      const adds=act.add_job_ids||[]
      const removes=act.remove_job_ids||[]
      const newIds=[...current.filter(id=>!removes.includes(id)),...adds]
      const pool=D.jobs.filter(j=>newIds.includes(j.id))
      if(!pool.length){_chatMsgs.push({role:'assistant',content:'No jobs left in route.'});return}
      const routed=await routeJobs(pool)
      window._activeRoute=routed
      _chatMsgs.push({role:'assistant',content:'Route updated: '+routed.length+' stops'})
      closeChat();openRouteView()
    }
    else if(t==='suggest_job'){
      const loc=D.locs.find(l=>l.id===act.location_id)
      const name=loc?.name||'this location'
      _chatMsgs.push({role:'assistant',content:'**Service suggested for '+name+'**\nReason: '+(act.reason||'Equipment may be due for service')+'\n\nSay "yes, schedule it" to create the job, or "no" to skip.'})
    }
    else if(t==='add_contact'){
      const{data:newCt}=await SB.from('contacts').insert({name:act.name,role:act.role||null,phone:act.phone||null,email:act.email||null,is_primary:false}).select().single()
      if(newCt&&act.location_id)await SB.from('contact_links').insert({contact_id:newCt.id,entity_type:'location',entity_id:act.location_id,relationship:act.role||'contact'})
      await load()
      if(newCt)audit('created','contact',newCt.id,'ai_chat',{name:act.name,role:act.role},'AI added contact: '+act.name)
      _chatMsgs.push({role:'assistant',content:`✓ Added contact: **${act.name}**${act.role?' ('+act.role+')':''}${act.location_id?' to '+(D.locs.find(l=>l.id===act.location_id)?.name||'location'):''}`})
    }
    else if(t==='toast'){toast(act.message)}
  }catch(e){
    console.error('action exec:',e)
    _chatMsgs.push({role:'assistant',content:`Error: ${e.message||'Action failed'}`})
  }
}

// LOCATION BEACON — streams Jon's GPS every 60s while app is open.
// Uses /api/update-location (service-role write) so the same path works
// as the iOS Shortcut. Riker reads jon_location for routing + departure alerts.
let _locWatchId=null
function startLocationBeacon(){
  if(!navigator.geolocation)return
  let _lastWrite=0
  _locWatchId=navigator.geolocation.watchPosition(async pos=>{
    const now=Date.now()
    if(now-_lastWrite<60000)return
    _lastWrite=now
    const{latitude:lat,longitude:lng,accuracy,heading,speed}=pos.coords
    try{
      // Multi-tech: stamp the logged-in tech_id so each tech's beacon
      // writes to its own row in jon_location (keyed by tech_id) instead
      // of every device fighting over id=1. The server falls back to
      // cookie-based tech resolution if tech_id isn't sent (legacy beacons).
      const r=await fetch('/api/update-location',{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        credentials:'same-origin',
        body:JSON.stringify({lat,lng,accuracy:accuracy||null,heading:heading||null,speed:speed||null,source:'app',tech_id:window._me?.tech?.id||null})
      })
      if(!r.ok){
        // Failed POSTs (auth, network, etc.) used to fall through silently
        // because fetch only throws on actual network failure. Surface non-2xx
        // responses so we don't lose 8 days of GPS again.
        const txt=await r.text().catch(()=>'')
        console.error('[beacon] HTTP '+r.status+': '+txt.slice(0,120))
      }
    }catch(e){console.error('[beacon] write failed:',e.message)}
  },err=>console.warn('[beacon]',err.message),{enableHighAccuracy:true,maximumAge:30000,timeout:15000})
}

// STARTUP
// Multi-tech: hide affordances that only the business owner should ever
// touch. Called once at boot and again whenever _me changes (currently
// only at boot, but keep as a function so we can re-call after a future
// "switch identity" feature). Uses CSS class .owner-only — anything
// tagged with that class disappears for non-owners. Also hides the
// Money + Crew bottom-nav tabs by id.
//
// Note: this is UI-only defense. The real gate lives server-side in
// Riker tools (Phase D). A determined non-owner could still hit the
// Supabase service-role key directly via a forged API call — but no
// employee has that key, and the visible buttons are all that an
// in-app actor can reach.
function applyOwnerGates(){
  const isOwner = _isOwner()
  const navMoney=document.getElementById('navMoney')
  const navTechs=document.getElementById('navTechs')
  const navCosts=document.getElementById('navCosts')
  if(navMoney)navMoney.style.display=isOwner?'':'none'
  if(navTechs)navTechs.style.display=isOwner?'':'none'
  if(navCosts)navCosts.style.display=isOwner?'':'none'
  // Sweep any rendered .owner-only elements.
  document.querySelectorAll('.owner-only').forEach(el=>{
    el.style.display=isOwner?'':'none'
  })
  // Body class so CSS can target tap-target visibility on dynamic content
  // that gets re-rendered (jobs list, invoice detail, etc.) after this
  // runs — selectors like `body.not-owner .owner-only{display:none}` keep
  // gating the right things even after innerHTML replacements.
  if(isOwner) document.body.classList.add('is-owner'); else document.body.classList.remove('is-owner')
  if(!isOwner) document.body.classList.add('not-owner'); else document.body.classList.remove('not-owner')
}

function startApp(){
  applyOwnerGates()
  load().then(()=>{
    // hide loading overlay
    const lo=document.getElementById('app-loading');if(lo)lo.style.display='none'
    rCal()
    updateNotifBadge()
    generateNotifications()
    setInterval(()=>{generateNotifications()},30*60*1000)
    startLocationBeacon()
    if(!D.locs.length&&!D.jobs.length){
      setTimeout(()=>load().then(rCal),1200)
    }
  }).catch(err=>{
    const lo=document.getElementById('app-loading');if(lo)lo.style.display='none'
    document.getElementById('calC').innerHTML='<div style="padding:24px;color:#ef4444;font-size:13px;font-weight:600">Load error: '+err.message+'</div>'
    console.error('Startup load error:',err)
  })
}
// auto-start if already authenticated
if(_unlocked)startApp()
