<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="theme-color" content="#0d0f14">
<title>Review &amp; Sign — Stephens Advanced LLC</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--fire:#f05a28;--purple:#a855f7;--darker:#0d0f14;--dark:#1a1a2e;--white:#f0f1f4;--ok:#22c55e;--bad:#ef4444;--radius:12px;--rs:8px;--card:rgba(255,255,255,.04);--b:rgba(255,255,255,.10);--t:rgba(255,255,255,.85);--td:rgba(255,255,255,.55)}
body{font-family:'Inter',system-ui,-apple-system,sans-serif;background:var(--darker);color:var(--t);font-size:14px;line-height:1.55;-webkit-font-smoothing:antialiased;min-height:100vh}
a{color:var(--fire);text-decoration:none}
.hdr{background:rgba(13,15,20,.97);backdrop-filter:blur(12px);border-bottom:1px solid var(--b);padding:18px 16px;position:sticky;top:0;z-index:100}
.hdr-inner{max-width:680px;margin:0 auto;display:flex;align-items:center;gap:12px}
.logo-icon{width:36px;height:36px;background:linear-gradient(135deg,#f05a28,#ff8c5a);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:18px}
.logo{font-size:18px;font-weight:900;color:#fff;letter-spacing:-.3px}
.logo-sub{font-size:10px;color:var(--td);letter-spacing:1.5px;text-transform:uppercase;font-weight:700}
main{max-width:680px;margin:0 auto;padding:20px 16px 64px}
.card{background:var(--card);border:1px solid var(--b);border-radius:var(--radius);padding:18px 20px;margin-bottom:14px}
.card-t{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:1.5px;color:var(--td);margin-bottom:10px}
h1{font-size:24px;font-weight:800;color:#fff;letter-spacing:-.5px;margin-bottom:6px}
.sub{font-size:13px;color:var(--td);margin-bottom:18px}
.row{display:flex;justify-content:space-between;gap:12px;font-size:13px;padding:8px 0;border-bottom:1px solid rgba(255,255,255,.05)}
.row:last-child{border-bottom:none}
.row .l{color:var(--td)}
.row .v{color:var(--t);font-weight:600;text-align:right}
.line{display:grid;grid-template-columns:1fr auto;gap:8px;padding:10px 0;border-bottom:1px solid rgba(255,255,255,.05);align-items:start}
.line:last-of-type{border-bottom:none}
.line-d{font-size:13px;color:var(--t)}
.line-q{font-size:11px;color:var(--td);margin-top:2px}
.line-t{font-size:13px;font-weight:700;color:var(--t);white-space:nowrap}
.total{display:flex;justify-content:space-between;padding-top:14px;margin-top:10px;border-top:1.5px solid var(--fire);font-size:16px;font-weight:800;color:#fff}
input[type="text"]{width:100%;padding:14px 16px;background:#fff;border:2px solid rgba(255,255,255,.18);border-radius:var(--rs);color:#0d0f14;font-size:17px;font-weight:600;font-family:inherit}
input[type="text"]:focus{outline:none;border-color:var(--fire);box-shadow:0 0 0 3px rgba(240,90,40,.25)}
input[type="text"]::placeholder{color:#999;font-weight:400}
.label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--td);margin-bottom:6px;display:block}
canvas{width:100%;height:200px;background:#fff;border-radius:var(--rs);touch-action:none;display:block}
.canvas-wrap{position:relative;background:#fff;border-radius:var(--rs);padding:2px;border:2px solid rgba(255,255,255,.18)}
.canvas-wrap.focused{border-color:var(--fire);box-shadow:0 0 0 3px rgba(240,90,40,.25)}
.canvas-ph{position:absolute;left:14px;top:50%;transform:translateY(-50%);font-size:12px;color:#aaa;pointer-events:none}
.step{display:flex;gap:12px;align-items:flex-start;margin-bottom:18px}
.step-num{flex-shrink:0;width:30px;height:30px;border-radius:50%;background:rgba(255,255,255,.10);color:#fff;font-size:14px;font-weight:900;display:flex;align-items:center;justify-content:center;margin-top:2px;transition:background .2s,color .2s}
.step.done .step-num{background:#22c55e;color:#fff}
.step.done .step-num::before{content:'✓';font-size:16px}
.step.done .step-num span{display:none}
.step-body{flex:1;min-width:0}
.step-title{font-size:14px;font-weight:800;color:#fff;margin-bottom:8px}
.amount-pill{display:inline-block;background:rgba(34,197,94,.10);border:1px solid rgba(34,197,94,.35);border-radius:999px;padding:4px 12px;font-size:12px;font-weight:700;color:#22c55e;margin-left:8px}
.amount-pill.zero{background:rgba(255,255,255,.06);border-color:rgba(255,255,255,.15);color:var(--td)}
.amount-big{font-size:28px;font-weight:900;color:#fff;letter-spacing:-.5px}
.amount-row{display:flex;align-items:baseline;gap:10px;margin-bottom:4px}
.amount-row .l{font-size:11px;color:var(--td);text-transform:uppercase;letter-spacing:1.5px;font-weight:700}
.pay-grid{display:flex;flex-direction:column;gap:8px}
.pay-opt{display:flex;align-items:center;gap:14px;padding:14px 16px;background:rgba(255,255,255,.04);border:1.5px solid rgba(255,255,255,.10);border-radius:var(--rs);cursor:pointer;transition:all .15s;color:var(--t)}
.pay-opt:hover{background:rgba(255,255,255,.06);border-color:rgba(255,255,255,.20)}
.pay-opt.selected{background:rgba(34,197,94,.08);border-color:#22c55e}
.pay-opt input[type="radio"]{appearance:none;-webkit-appearance:none;width:18px;height:18px;border:2px solid rgba(255,255,255,.30);border-radius:50%;margin:0;flex-shrink:0;cursor:pointer;position:relative}
.pay-opt.selected input[type="radio"]{border-color:#22c55e;background:#22c55e}
.pay-opt.selected input[type="radio"]::after{content:'';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:6px;height:6px;background:#fff;border-radius:50%}
.pay-opt-label{flex:1;font-size:14px;font-weight:600;color:#fff}
.pay-opt-sub{font-size:11px;color:var(--td);font-weight:400;margin-top:2px}
.pay-opt-icon{font-size:20px;width:24px;text-align:center}
.btn-status{font-size:12px;color:var(--td);text-align:center;margin-top:10px;font-weight:600}
.btn-status.ready{color:#22c55e}
.btn{display:inline-block;padding:14px 28px;border-radius:var(--rs);font-size:15px;font-weight:800;text-decoration:none;cursor:pointer;border:none;width:100%;text-align:center;font-family:inherit}
.btn-primary{background:linear-gradient(135deg,#f05a28,#ff7d4a);color:#fff}
.btn-primary:disabled{opacity:.5;cursor:not-allowed}
.btn-ghost{background:transparent;color:var(--td);border:1px solid var(--b)}
.spin{display:inline-block;width:14px;height:14px;border:2px solid #fff;border-right-color:transparent;border-radius:50%;animation:s 1s linear infinite}
@keyframes s{to{transform:rotate(360deg)}}
.banner-bad{background:rgba(239,68,68,.08);border:1.5px solid #ef4444;border-radius:var(--radius);padding:16px;margin-bottom:14px;text-align:center}
.banner-good{background:rgba(34,197,94,.08);border:1.5px solid #22c55e;border-radius:var(--radius);padding:24px;margin-bottom:14px;text-align:center}
.muted{font-size:11px;color:var(--td);line-height:1.6;margin-top:14px;padding:12px 14px;background:rgba(255,255,255,.03);border-radius:var(--rs)}
.foot{margin-top:32px;padding:18px 0;border-top:1px solid var(--b);text-align:center;font-size:11px;color:var(--td)}
.foot-ph{color:var(--t);font-weight:700;text-decoration:underline;text-decoration-color:rgba(255,255,255,.30)}
@media(max-width:540px){main{padding:14px 12px 40px}.card{padding:14px 16px}h1{font-size:20px}}
</style>
</head>
<body>
<header class="hdr">
  <div class="hdr-inner">
    <div class="logo-icon">🔥</div>
    <div>
      <div class="logo">Stephens Advanced</div>
      <div class="logo-sub">Review &amp; Sign</div>
    </div>
  </div>
</header>
<main id="root">
  <div class="card" style="text-align:center;color:var(--td)">
    <div class="spin" style="border-color:var(--fire);border-right-color:transparent;width:24px;height:24px;margin:0 auto 12px"></div>
    Loading…
  </div>
</main>
<script>
const SB = supabase.createClient(
  'https://motjasdokoxwiodwzyps.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1vdGphc2Rva294d2lvZHd6eXBzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMzNDI2NTcsImV4cCI6MjA4ODkxODY1N30.IMf0plnDRhVgts9LjJr219Tax4J175iuWN1u6ZKTZ-I',
  {auth:{persistSession:false,autoRefreshToken:false,detectSessionInUrl:false}}
)
const $ = id => document.getElementById(id)
const esc = s => String(s == null ? '' : s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;')
const fmt = n => '$' + (+(n||0)).toFixed(2)
const token = new URLSearchParams(location.search).get('token') || ''
let state = { sig: '', sigOn: false, drawn: false, payment: null, invoiceId: null, amount: 0 }

function showError(msg){
  $('root').innerHTML = `<div class="banner-bad"><div style="font-size:32px;margin-bottom:8px">⚠️</div><div style="font-weight:800;color:#fff;font-size:16px;margin-bottom:6px">Could not load</div><div style="font-size:13px;color:var(--td)">${esc(msg)}</div></div>
  <div class="foot">Need help? Call <a class="foot-ph" href="tel:+12149944799">(214) 994-4799</a></div>`
}
function showSigned(data){
  const pm = state.payment
  let payLine = ''
  if(pm === 'cash') payLine = '<div style="font-size:13px;color:var(--t);margin-top:10px"><strong>Cash payment</strong> — please hand to the technician.</div>'
  else if(pm === 'check') payLine = '<div style="font-size:13px;color:var(--t);margin-top:10px"><strong>Check payment</strong> — please hand to the technician.</div>'
  else if(pm === 'card') payLine = `<div style="font-size:13px;color:var(--t);margin-top:10px"><strong>Pay with card</strong> — we'll text you a secure link shortly.</div>${data?.payment_link?`<a class="btn btn-primary" style="margin-top:14px;display:inline-block" href="${esc(data.payment_link)}">💳 Pay ${fmt(state.amount)} now</a>`:''}`
  else if(pm === 'invoice') payLine = '<div style="font-size:13px;color:var(--t);margin-top:10px"><strong>Pay later</strong> — we\'ll email you the invoice.</div>'
  $('root').innerHTML = `<div class="banner-good"><div style="font-size:48px;margin-bottom:10px">✓</div><div style="font-weight:800;color:#22c55e;font-size:20px;margin-bottom:8px">Signed — thank you!</div><div style="font-size:13px;color:var(--td)">A copy will be emailed to you.</div>${payLine}</div>
  <div class="foot">Stephens Advanced LLC · Fire Suppression &amp; Safety<br>jonathan@stephensadvanced.com · <a class="foot-ph" href="tel:+12149944799">(214) 994-4799</a></div>`
}

async function load(){
  if(!token){showError('No signing token in URL.');return}
  try{
    const { data: sigReq, error } = await SB.from('signature_requests').select('*').eq('token', token).maybeSingle()
    if(error || !sigReq){showError('This signing link is invalid or has been removed.');return}
    if(sigReq.signed_at){
      $('root').innerHTML = `<div class="banner-good"><div style="font-size:48px;margin-bottom:10px">✓</div><div style="font-weight:800;color:#22c55e;font-size:18px">Already signed</div><div style="font-size:13px;color:var(--td);margin-top:8px">Signed by ${esc(sigReq.signed_by_name||'')} on ${new Date(sigReq.signed_at).toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'})}</div></div>
      <div class="foot">Need a copy? Call <a class="foot-ph" href="tel:+12149944799">(214) 994-4799</a></div>`
      return
    }
    if(sigReq.expires_at && new Date(sigReq.expires_at) < new Date()){
      showError('This signing link has expired. Please contact us for a fresh one.');return
    }
    // Pull the linked job, invoice, lines, location
    const [{data:job},{data:loc},{data:inv}] = await Promise.all([
      SB.from('jobs').select('id,job_number,scope,completed_at,scheduled_date,technician,notes').eq('id', sigReq.job_id).maybeSingle(),
      SB.from('locations').select('id,name,address,city,state,zip,contact_name,contact_phone').eq('id', sigReq.location_id).maybeSingle(),
      sigReq.invoice_id ? SB.from('invoices').select('id,invoice_number,date,subtotal,total,status,invoice_lines(description,quantity,unit_price,total,sort_order,deleted_at)').eq('id', sigReq.invoice_id).maybeSingle() : Promise.resolve({data:null})
    ])
    const lines = inv?.invoice_lines ? inv.invoice_lines.filter(l=>!l.deleted_at).sort((a,b)=>(a.sort_order||0)-(b.sort_order||0)) : []
    render({sigReq, job, loc, inv, lines})
  }catch(e){
    console.error(e)
    showError('Network error: ' + (e.message || e))
  }
}

function render({sigReq, job, loc, inv, lines}){
  const dateStr = job?.completed_at ? new Date(job.completed_at).toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric',timeZone:'UTC'}) : ''
  const amount = inv ? +inv.total||0 : 0
  const hasCharge = amount > 0
  state.invoiceId = inv?.id || null
  state.amount = amount

  let h = `<h1>Please review and sign</h1>
  <div class="sub">Service performed at <strong>${esc(loc?.name||'your location')}</strong>${dateStr?` on ${esc(dateStr)}`:''}.</div>`

  // Amount card — always visible (no charge / amount due)
  h += `<div class="card"><div class="card-t">Amount due</div>
    <div class="amount-row"><span class="amount-big">${hasCharge?fmt(amount):'No charge'}</span>${hasCharge?'':'<span class="amount-pill zero">Informational sign-off only</span>'}</div>
    ${inv?`<div style="font-size:12px;color:var(--td);margin-top:4px">Invoice ${esc(inv.invoice_number||'')}</div>`:''}
  </div>`

  // Service location card
  if(loc){
    h += `<div class="card"><div class="card-t">Service location</div>
      <div class="row"><span class="l">Site</span><span class="v">${esc(loc.name||'')}</span></div>
      ${(loc.address||loc.city)?`<div class="row"><span class="l">Address</span><span class="v">${esc([loc.address,loc.city,loc.state,loc.zip].filter(Boolean).join(', '))}</span></div>`:''}
      ${job?.technician?`<div class="row"><span class="l">Technician</span><span class="v">${esc(job.technician)}</span></div>`:''}
      ${job?.scope?.length?`<div class="row"><span class="l">Scope</span><span class="v">${esc(job.scope.join(' · '))}</span></div>`:''}
    </div>`
  }

  // Invoice line items (only if we have them)
  if(inv && lines.length){
    h += `<div class="card"><div class="card-t">Line items</div>`
    lines.forEach(l => {
      const qty = +l.quantity||1, price = +l.unit_price||0, total = +l.total||(qty*price)
      h += `<div class="line"><div><div class="line-d">${esc(l.description||'')}</div>${qty!==1||price?`<div class="line-q">${qty} × ${fmt(price)}</div>`:''}</div><div class="line-t">${fmt(total)}</div></div>`
    })
    h += `<div class="total"><span>Total</span><span>${fmt(inv.total)}</span></div></div>`
  }

  // Tech notes
  if(job?.notes){
    h += `<div class="card"><div class="card-t">Tech notes</div><div style="font-size:13px;color:var(--t);white-space:pre-wrap">${esc(job.notes)}</div></div>`
  }

  // Signature + payment
  h += `<div class="card"><div class="card-t">Sign-off</div>
    <div style="font-size:12px;color:var(--td);margin-bottom:18px">By signing below, I acknowledge the service described above was performed${hasCharge?` and authorize charges of <strong style="color:#fff">${fmt(amount)}</strong>`:''}.</div>

    <div class="step" id="step1">
      <div class="step-num"><span>1</span></div>
      <div class="step-body">
        <div class="step-title">Type your full name</div>
        <input type="text" id="signerName" placeholder="e.g. John Smith" autocomplete="name">
      </div>
    </div>

    <div class="step" id="step2">
      <div class="step-num"><span>2</span></div>
      <div class="step-body">
        <div class="step-title">Draw your signature</div>
        <div class="canvas-wrap" id="canvasWrap">
          <canvas id="sigCanvas" width="600" height="200"></canvas>
          <div class="canvas-ph" id="sigPh">Sign with your finger or mouse</div>
        </div>
        <button class="btn btn-ghost" style="margin-top:8px;padding:8px 14px;font-size:12px;width:auto" onclick="clearSig()">Clear signature</button>
      </div>
    </div>

    ${hasCharge?`
    <div class="step" id="step3">
      <div class="step-num"><span>3</span></div>
      <div class="step-body">
        <div class="step-title">How are you paying today?</div>
        <div class="pay-grid">
          <label class="pay-opt" data-pay="cash">
            <input type="radio" name="pay" value="cash">
            <span class="pay-opt-icon">💵</span>
            <span class="pay-opt-label">Cash<div class="pay-opt-sub">Hand to technician now</div></span>
          </label>
          <label class="pay-opt" data-pay="check">
            <input type="radio" name="pay" value="check">
            <span class="pay-opt-icon">🧾</span>
            <span class="pay-opt-label">Check<div class="pay-opt-sub">Hand to technician now</div></span>
          </label>
          <label class="pay-opt" data-pay="card">
            <input type="radio" name="pay" value="card">
            <span class="pay-opt-icon">💳</span>
            <span class="pay-opt-label">Pay with card<div class="pay-opt-sub">We'll text you a secure payment link</div></span>
          </label>
          <label class="pay-opt" data-pay="invoice">
            <input type="radio" name="pay" value="invoice">
            <span class="pay-opt-icon">📧</span>
            <span class="pay-opt-label">Pay later (invoice)<div class="pay-opt-sub">Email me the invoice</div></span>
          </label>
        </div>
      </div>
    </div>
    `:''}
  </div>

  <button class="btn btn-primary" id="submitBtn" onclick="submitSignature()" disabled>Sign and submit</button>
  <div class="btn-status" id="btnStatus">${hasCharge?'Complete steps 1, 2, and 3 above to enable':'Complete steps 1 and 2 above to enable'}</div>
  <div class="muted">Your typed name, drawn signature, and payment selection will be emailed back to you and to Stephens Advanced as a record of authorization.</div>
  <div class="foot">Stephens Advanced LLC · Fire Suppression &amp; Safety<br>jonathan@stephensadvanced.com · <a class="foot-ph" href="tel:+12149944799">(214) 994-4799</a></div>`

  $('root').innerHTML = h

  // Wire signature canvas
  const c = $('sigCanvas')
  // Resize canvas to actual displayed pixel ratio
  const rect = c.getBoundingClientRect()
  c.width = rect.width * 2; c.height = 400
  const ctx = c.getContext('2d')
  ctx.scale(2,2); ctx.strokeStyle = '#222'; ctx.lineWidth = 2.5; ctx.lineCap = 'round'; ctx.lineJoin = 'round'

  function gp(e){const r = c.getBoundingClientRect();const t = e.touches?e.touches[0]:e;return {x:t.clientX-r.left, y:t.clientY-r.top}}
  function down(e){e.preventDefault();state.sigOn=true;state.drawn=true;const p=gp(e);ctx.beginPath();ctx.moveTo(p.x,p.y);if($('sigPh'))$('sigPh').style.display='none';updateSubmit()}
  function move(e){if(!state.sigOn)return;e.preventDefault();const p=gp(e);ctx.lineTo(p.x,p.y);ctx.stroke()}
  function up(){state.sigOn=false}
  c.addEventListener('mousedown',down);c.addEventListener('mousemove',move);c.addEventListener('mouseup',up);c.addEventListener('mouseleave',up)
  c.addEventListener('touchstart',down,{passive:false});c.addEventListener('touchmove',move,{passive:false});c.addEventListener('touchend',up)
  $('signerName').addEventListener('input', updateSubmit)

  // Wire payment-method radios (only present when there's a charge)
  document.querySelectorAll('.pay-opt').forEach(opt => {
    opt.addEventListener('click', () => {
      state.payment = opt.dataset.pay
      document.querySelectorAll('.pay-opt').forEach(o => o.classList.remove('selected'))
      opt.classList.add('selected')
      const r = opt.querySelector('input[type="radio"]')
      if(r) r.checked = true
      updateSubmit()
    })
  })
}

function updateSubmit(){
  const name = $('signerName')?.value?.trim() || ''
  const nameOk = name.length >= 2
  const hasCharge = state.amount > 0
  const payOk = !hasCharge || !!state.payment
  const ok = state.drawn && nameOk && payOk
  $('submitBtn').disabled = !ok
  if($('step1')) $('step1').classList.toggle('done', nameOk)
  if($('step2')) $('step2').classList.toggle('done', state.drawn)
  if($('step3')) $('step3').classList.toggle('done', !!state.payment)
  const s = $('btnStatus')
  if(s){
    if(ok){ s.textContent = '✓ Ready to submit'; s.classList.add('ready') }
    else { s.classList.remove('ready')
      if(!nameOk) s.textContent = 'Type your full name above (step 1) to enable'
      else if(!state.drawn) s.textContent = 'Draw your signature above (step 2) to enable'
      else if(!payOk) s.textContent = 'Pick a payment method (step 3) to enable'
      else s.textContent = 'Complete the steps above to enable'
    }
  }
}

function clearSig(){
  const c = $('sigCanvas')
  if(!c)return
  const ctx = c.getContext('2d')
  ctx.clearRect(0,0,c.width,c.height)
  state.drawn = false
  if($('sigPh'))$('sigPh').style.display=''
  updateSubmit()
}

async function submitSignature(){
  const name = $('signerName').value.trim()
  const c = $('sigCanvas')
  const sigData = c.toDataURL('image/png')
  const hasCharge = state.amount > 0
  if(!name || !state.drawn){return}
  if(hasCharge && !state.payment){return}
  const btn = $('submitBtn')
  btn.disabled = true
  btn.innerHTML = '<span class="spin"></span> Signing…'
  try{
    const res = await fetch('/api/sign-job', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({
        token,
        signed_by_name: name,
        signature_data: sigData,
        payment_method: state.payment || null
      })
    })
    const data = await res.json()
    if(!res.ok){throw new Error(data.error||'Sign failed')}
    showSigned(data)
  }catch(e){
    console.error(e)
    btn.innerHTML = 'Sign and submit'
    btn.disabled = false
    alert('Could not submit: ' + (e.message||e))
  }
}

load()
</script>
</body>
